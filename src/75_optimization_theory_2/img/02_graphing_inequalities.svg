<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#2b8a3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">도화지 반갈죽: 부등식을 2D 그래프 영토로 그리기</text>

    <!-- Coordinate system & Line rendering -->
    <g transform="translate(150, 150)">
        <!-- Axes -->
        <line x1="-100" y1="0" x2="100" y2="0" stroke="#868e96" stroke-width="2" /> <!-- X -->
        <line x1="0" y1="-80" x2="0" y2="80" stroke="#868e96" stroke-width="2" /> <!-- Y -->

        <!-- Base Line (y = x) -->
        <line x1="-60" y1="60" x2="60" y2="-60" stroke="#e03131" stroke-width="3" />
        <text x="70" y="-70" fill="#c92a2a" font-size="12" font-family="monospace" font-weight="bold">y = x (국경선)</text>

        <!-- Upper Region (y > x) Highlighted Area -->
        <polygon points="-60,60 -100,60 -100,-80 80,-80 60,-60" fill="#a5d8ff" opacity="0.4" />
        <text x="-40" y="-30" fill="#1864ab" font-size="16" font-family="monospace" font-weight="bold">y > x</text>
        <text x="-40" y="-15" fill="#1864ab" font-size="10" font-family="sans-serif">형광펜 구역 (천장)</text>

        <!-- Test point -->
        <circle cx="-30" cy="-40" r="4" fill="#0b7285" />
        <text x="-25" y="-45" fill="#0b7285" font-size="12" font-family="sans-serif" font-weight="bold">테스트 점 (-3,
            4)</text>
    </g>

    <!-- Step Rules Panel -->
    <g transform="translate(380, 100)">
        <rect x="0" y="0" width="200" height="120" fill="#ebfbee" stroke="#40c057" stroke-width="2" rx="8" />
        <text x="100" y="25" fill="#2b8a3e" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">그래프 영토 판독 3원칙</text>

        <!-- Step 1 -->
        <rect x="10" y="40" width="180" height="20" fill="#b2f2bb" rx="3" />
        <text x="100" y="54" fill="#099268" font-size="11" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">1. 식을 y = ~~ 로 바꾼다</text>

        <!-- Step 2 -->
        <rect x="10" y="65" width="180" height="20" fill="#b2f2bb" rx="3" />
        <text x="100" y="79" fill="#099268" font-size="11" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">2. 국경선(빨간 선)을 긋는다</text>

        <!-- Step 3 -->
        <rect x="10" y="90" width="180" height="20" fill="#ffe3e3" stroke="#fa5252" stroke-width="1" rx="3" />
        <text x="100" y="104" fill="#c92a2a" font-size="11" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">3. y가 크면 윗쪽(천장) 색칠!</text>
    </g>

</svg>