<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#e03131" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">왕관은 모서리에 꽂힌다: 영역 내의 최대·최소 해킹</text>

    <!-- Feasible Region Map -->
    <g transform="translate(150, 150)">
        <!-- Axes -->
        <line x1="-80" y1="60" x2="80" y2="60" stroke="#868e96" stroke-width="2" />
        <line x1="-60" y1="-80" x2="-60" y2="80" stroke="#868e96" stroke-width="2" />

        <!-- Feasible Polygon Region (Hexagon/Pentagon approx) -->
        <!-- Points: (0,0), (60,0), (40,40), (20,60), (0,40) mapped to coord system -->
        <!-- Let's map coordinates: Origin at (-60,60) -->
        <polygon points="-60,60 20,60 40,0 -10,-40 -60,0" fill="#ffc9c9" stroke="#fa5252" stroke-width="2" />
        <text x="-15" y="15" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold">생존 구역</text>

        <!-- Vertices Highlights -->
        <circle cx="20" cy="60" r="5" fill="#f03e3e" />
        <circle cx="40" cy="0" r="5" fill="#f03e3e" />
        <circle cx="-10" cy="-40" r="5" fill="#f03e3e" />
        <circle cx="-60" cy="0" r="5" fill="#f03e3e" />
        <circle cx="-60" cy="60" r="5" fill="#f03e3e" />

        <!-- Internal Point (Ignored) -->
        <circle cx="-10" cy="10" r="3" fill="#868e96" />
        <circle cx="10" cy="30" r="3" fill="#868e96" />
    </g>

    <!-- Sliding Goal Line (k) -->
    <path d="M 280 110 L 320 110" fill="none" stroke="#adb5bd" stroke-width="4" marker-end="url(#arrow-grey)" />

    <g transform="translate(450, 150)">
        <!-- Same Axes and Region -->
        <line x1="-80" y1="60" x2="80" y2="60" stroke="#868e96" stroke-width="2" />
        <line x1="-60" y1="-80" x2="-60" y2="80" stroke="#868e96" stroke-width="2" />
        <polygon points="-60,60 20,60 40,0 -10,-40 -60,0" fill="#e9ecef" stroke="#adb5bd" stroke-width="1" />

        <!-- Sliding straight lines (y = -2x + k) -->
        <line x1="-80" y1="40" x2="20" y2="-60" stroke="#339af0" stroke-width="1" stroke-dasharray="4,4" />
        <line x1="-60" y1="60" x2="40" y2="-40" stroke="#339af0" stroke-width="2" stroke-dasharray="2,2" />

        <!-- The Maximum Line hitting the vertex -->
        <line x1="-30" y1="80" x2="70" y2="-20" stroke="#1864ab" stroke-width="3" />
        <circle cx="40" cy="0" r="6" fill="#f08c00" />

        <text x="50" y="-10" fill="#d9480f" font-size="12" font-family="sans-serif" font-weight="bold">최대 이익(점)!</text>
        <rect x="-100" y="-80" width="130" height="25" fill="#e7f5ff" rx="3" />
        <text x="-35" y="-63" fill="#1864ab" font-size="11" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">"이익선 (k) 이탈 직전"</text>
    </g>

    <defs>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>