<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#5f3dc4" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">데칼코마니 거울 쌍둥이: 지수함수와 로그함수 (Inverse Function)</text>

    <g transform="translate(150, 180)">
        <!-- Axes -->
        <line x1="0" y1="0" x2="300" y2="0" stroke="#868e96" stroke-width="2" />
        <line x1="0" y1="0" x2="0" y2="-150" stroke="#868e96" stroke-width="2" />

        <!-- Mirror Line (y = x) -->
        <path d="M 0 0 L 150 -150" fill="none" stroke="#adb5bd" stroke-width="2" stroke-dasharray="8,4" />
        <text x="160" y="-140" fill="#868e96" font-size="14" font-family="sans-serif" font-weight="bold">거울 (y =
            x)</text>

        <!-- Exponential Curve -->
        <path d="M -50 -15 Q 80 -20 120 -150" fill="none" stroke="#e03131" stroke-width="4" />
        <text x="50" y="-120" fill="#e03131" font-size="16" font-family="sans-serif" font-weight="bold">지수함수 (y =
            2^x)</text>

        <!-- Logarithmic Curve -->
        <path d="M 15 50 Q 20 -80 150 -120" fill="none" stroke="#1864ab" stroke-width="4" />
        <text x="160" y="-100" fill="#1864ab" font-size="16" font-family="sans-serif" font-weight="bold">로그함수 (y =
            log₂x)</text>

        <!-- Point Tying -->
        <!-- Point on Exp (2, 4) roughly scaled -->
        <circle cx="50" cy="-70" r="5" fill="#e03131" />
        <text x="25" y="-75" fill="#e03131" font-size="12" font-family="sans-serif" font-weight="bold">(x, y)</text>

        <!-- Point on Log (4, 2) roughly scaled -->
        <circle cx="70" cy="-50" r="5" fill="#1864ab" />
        <text x="80" y="-40" fill="#1864ab" font-size="12" font-family="sans-serif" font-weight="bold">(y, x)</text>

        <path d="M 50 -70 L 70 -50" fill="none" stroke="#495057" stroke-width="2" stroke-dasharray="3,3" />
    </g>

    <!-- Explanation -->
    <text x="300" y="225" fill="#5f3dc4" font-size="14" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">y = x 선을 기준으로 데칼코마니처럼 접으면 완벽하게 겹친다! (역함수)</text>

</svg>