<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%">
    <rect width="600" height="300" fill="#2d3436" />
    
    <!-- Title -->
    <text x="300" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        "-1 을 곱하는 마법": 수직선 상의 180° 회전 변환
    </text>

    <!-- Number Line Main Axis -->
    <line x1="50" y1="200" x2="550" y2="200" stroke="#b2bec3" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Origin marker -->
    <line x1="300" y1="180" x2="300" y2="220" stroke="#00cec9" stroke-width="4"/>
    <text x="300" y="240" font-family="Arial" font-size="20" font-weight="bold" fill="#00cec9" text-anchor="middle">0</text>
    
    <!-- -3 Marker -->
    <line x1="150" y1="190" x2="150" y2="210" stroke="#ff7675" stroke-width="3"/>
    <text x="150" y="240" font-family="Arial" font-size="18" fill="#ff7675" text-anchor="middle">-3</text>

    <!-- +3 Marker -->
    <line x1="450" y1="190" x2="450" y2="210" stroke="#74b9ff" stroke-width="3"/>
    <text x="450" y="240" font-family="Arial" font-size="18" fill="#74b9ff" text-anchor="middle">+3</text>

    <!-- Phase 1: Start at +3 -->
    <g>
        <!-- Arrow starting at 0 to +3 -->
        <path d="M 300 180 L 450 180 L 440 170 M 450 180 L 440 190" fill="none" stroke="#74b9ff" stroke-width="4">
            <!-- Animate rotation from origin 300, 200 -->
            <animateTransform attributeName="transform" type="rotate"
                values="0 300 200; 180 300 200; 360 300 200" 
                keyTimes="0; 0.5; 1" 
                dur="6s" repeatCount="indefinite" />
            <!-- Change color from blue(+) to red(-) back to blue(+) -->
            <animate attributeName="stroke" values="#74b9ff; #ff7675; #74b9ff" 
                     keyTimes="0; 0.5; 1" dur="6s" repeatCount="indefinite" />
        </path>
    </g>
    
    <!-- Dynamic Equation Text -->
    <g>
        <text x="300" y="100" font-family="Arial" font-size="32" font-weight="bold" fill="#74b9ff" text-anchor="middle">
            <animate attributeName="fill" values="#74b9ff; #ff7675; #74b9ff" keyTimes="0; 0.5; 1" dur="6s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1; 0; 0" keyTimes="0; 0.1; 1" dur="6s" repeatCount="indefinite" />
            +3 
        </text>

        <text x="300" y="100" font-family="Arial" font-size="32" font-weight="bold" fill="#ff7675" text-anchor="middle">
            <animate attributeName="opacity" values="0; 1; 1; 0" keyTimes="0; 0.2; 0.8; 1" dur="6s" repeatCount="indefinite" />
            (-3) × (-1) = +3
        </text>
        
        <text x="300" y="100" font-family="Arial" font-size="32" font-weight="bold" fill="#74b9ff" text-anchor="middle">
            <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.5; 0.6; 0.9; 1" dur="6s" repeatCount="indefinite" />
            (+3) × (-1) = -3
        </text>
    </g>

    <!-- Flip Direction Arrow -->
    <path d="M 350 130 A 70 70 0 0 0 250 130 L 255 120 M 250 130 L 260 135" fill="none" stroke="#ffeaa7" stroke-width="3" stroke-dasharray="5,5">
        <animate attributeName="opacity" values="0; 1; 0; 1; 0" dur="6s" repeatCount="indefinite" />
    </path>
    <text x="300" y="70" font-family="Arial" font-size="16" fill="#ffeaa7" text-anchor="middle">
        <animate attributeName="opacity" values="0; 1; 0; 1; 0" dur="6s" repeatCount="indefinite" />
        × (-1) 방향 반전!
    </text>
</svg>
