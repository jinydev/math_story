<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%">
    <rect width="600" height="300" fill="#2d3436" />
    
    <!-- Title -->
    <text x="300" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        AND 논리 게이트 (Logical AND Gate)
    </text>

    <!-- AND Gate Symbol Body -->
    <path d="M 250 100 L 300 100 A 50 50 0 0 1 300 200 L 250 200 Z" fill="#0984e3" stroke="#74b9ff" stroke-width="4" />
    <text x="290" y="157" font-family="Arial" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">AND</text>

    <!-- Input Wire A (Top) -->
    <line x1="100" y1="125" x2="250" y2="125" stroke="#b2bec3" stroke-width="6" />
    <text x="70" y="130" font-family="Arial" font-size="20" font-weight="bold" fill="#dfe6e9" text-anchor="middle">A</text>
    
    <!-- Input A State (Pulse 1) -->
    <circle cx="100" cy="125" r="8" fill="#ff7675">
        <animate attributeName="cx" values="100; 250; 250" dur="2s" repeatCount="indefinite" />
        <animate attributeName="fill" values="#ff7675; #00b894; #00b894" keyTimes="0; 0.5; 1" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <!-- Input Wire B (Bottom) -->
    <line x1="100" y1="175" x2="250" y2="175" stroke="#b2bec3" stroke-width="6" />
    <text x="70" y="180" font-family="Arial" font-size="20" font-weight="bold" fill="#dfe6e9" text-anchor="middle">B</text>

    <!-- Input B State (Pulse 1) -->
    <circle cx="100" cy="175" r="8" fill="#ff7675">
        <animate attributeName="cx" values="100; 250; 250" dur="2s" repeatCount="indefinite" />
        <animate attributeName="fill" values="#ff7675; #00b894; #00b894" keyTimes="0; 0.5; 1" dur="2s" repeatCount="indefinite" />
    </circle>

    <!-- Glowing effect for Input 1s -->
    <text x="175" y="115" font-family="Arial" font-size="16" font-weight="bold" fill="#00b894" text-anchor="middle">전원 ON (1)</text>
    <text x="175" y="195" font-family="Arial" font-size="16" font-weight="bold" fill="#00b894" text-anchor="middle">전원 ON (1)</text>

    <!-- Output Wire -->
    <line x1="350" y1="150" x2="500" y2="150" stroke="#b2bec3" stroke-width="6" />
    <text x="530" y="155" font-family="Arial" font-size="20" font-weight="bold" fill="#dfe6e9" text-anchor="middle">OUT</text>

    <!-- Output State (Result 1) -->
    <circle cx="350" cy="150" r="10" fill="#00b894" stroke="#ffeaa7" stroke-width="2">
        <animate attributeName="cx" values="350; 350; 500" keyTimes="0; 0.5; 1" dur="2s" repeatCount="indefinite" />
        <animate attributeName="r" values="0; 0; 10; 10" keyTimes="0; 0.49; 0.5; 1" dur="2s" repeatCount="indefinite" />
    </circle>

    <!-- Info text -->
    <text x="300" y="250" font-family="Arial" font-size="18" fill="#ffeaa7" text-anchor="middle">
        A와 B가 모두 전송되었을 때(1 AND 1), 출력선으로 1(ON)이 발사됩니다!
    </text>

</svg>
