<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#e03131" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">세상을 두 동강 내는 기호: 부등호와 부등식 (Inequalities)</text>

    <!-- Equality -->
    <g transform="translate(100, 150)">
        <rect x="-80" y="-80" width="160" height="120" fill="#f1f3f5" stroke="#868e96" stroke-width="2" rx="8" />
        <text x="0" y="-55" fill="#495057" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">방정식 (=)</text>

        <text x="0" y="-15" fill="#495057" font-size="30" font-family="monospace" font-weight="bold"
            text-anchor="middle">x = 5</text>

        <rect x="-60" y="10" width="120" height="20" fill="#e9ecef" rx="3" />
        <text x="0" y="24" fill="#495057" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">단 1개의 정답 (점)</text>
    </g>

    <!-- VS Text -->
    <circle cx="240" cy="110" r="15" fill="#fcc419" />
    <text x="240" y="115" fill="#fff" font-size="14" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">VS</text>

    <!-- Inequality -->
    <g transform="translate(420, 150)">
        <rect x="-140" y="-80" width="280" height="120" fill="#fff5f5" stroke="#fa5252" stroke-width="2" rx="8" />
        <text x="0" y="-55" fill="#c92a2a" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">부등식 (>, <, ≥, ≤)</text>

                <text x="0" y="-15" fill="#e03131" font-size="30" font-family="monospace" font-weight="bold"
                    text-anchor="middle">x > 5</text>

                <!-- Number Line Visualization inside -->
                <line x1="-120" y1="15" x2="120" y2="15" stroke="#868e96" stroke-width="2" />
                <circle cx="-50" cy="15" r="5" fill="#fff" stroke="#e03131" stroke-width="2" />
                <text x="-50" y="30" fill="#495057" font-size="10" font-family="sans-serif">5</text>

                <path d="M -45 15 L 110 15" fill="none" stroke="#e03131" stroke-width="4"
                    marker-end="url(#arrow-red)" />

                <text x="30" y="5" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold"
                    text-anchor="middle">무한한 정답의 세계 (영역)</text>
    </g>

    <defs>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e03131" />
        </marker>
    </defs>
</svg>