<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#e03131" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">음수(-)의 배신: 곱하거나 나눌 때 뒤집히는 부등호</text>

    <!-- Positive Multiplication (Safe) -->
    <g transform="translate(100, 150)">
        <rect x="-80" y="-80" width="160" height="120" fill="#e7f5ff" stroke="#339af0" stroke-width="2" rx="8" />
        <text x="0" y="-55" fill="#1864ab" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">양수(+) 곱하기</text>

        <text x="0" y="-20" fill="#495057" font-size="20" font-family="monospace" font-weight="bold"
            text-anchor="middle">2 &lt; 5</text>

        <rect x="-60" y="-5" width="120" height="30" fill="#a5d8ff" rx="4" />
        <text x="0" y="15" fill="#1864ab" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">양쪽에 × 2</text>

        <text x="0" y="65" fill="#1864ab" font-size="24" font-family="monospace" font-weight="bold"
            text-anchor="middle">4 &lt; 10</text>
        <text x="0" y="90" fill="#868e96" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">(방향 그대로 유지)</text>
    </g>

    <!-- VS Text -->
    <circle cx="300" cy="110" r="15" fill="#fcc419" />
    <text x="300" y="115" fill="#fff" font-size="14" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">VS</text>

    <!-- Negative Multiplication (Flip!) -->
    <g transform="translate(500, 150)">
        <rect x="-100" y="-80" width="200" height="120" fill="#fff5f5" stroke="#e03131" stroke-width="2" rx="8" />
        <text x="0" y="-55" fill="#c92a2a" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">🚨 음수(-) 곱하기 🚨</text>

        <text x="0" y="-20" fill="#495057" font-size="20" font-family="monospace" font-weight="bold"
            text-anchor="middle">2 &lt; 5</text>

        <rect x="-80" y="-5" width="160" height="30" fill="#ffc9c9" rx="4" />
        <text x="0" y="15" fill="#c92a2a" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">양쪽에 × (-1)</text>

        <!-- Flip Animation representation -->
        <path d="M -30 35 Q 0 20 30 35" fill="none" stroke="#e03131" stroke-width="3" stroke-dasharray="3,3"
            marker-end="url(#arrow-red)" />

        <text x="0" y="65" fill="#e03131" font-size="28" font-family="monospace" font-weight="bold"
            text-anchor="middle">-2 &gt; -5</text>

        <rect x="-60" y="75" width="120" height="20" fill="#f03e3e" rx="4" />
        <text x="0" y="89" fill="#fff" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">💥 부등호 방향 뒤집힘!</text>
    </g>

    <defs>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e03131" />
        </marker>
    </defs>
</svg>