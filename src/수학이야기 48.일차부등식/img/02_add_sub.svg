<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#2b8a3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">요지부동의 저울: 덧셈과 뺄셈에서의 부등호 방향</text>

    <!-- Left Scale: Inequality A < B -->
    <g transform="translate(150, 150)">
        <!-- Scale Base -->
        <polygon points="-20,50 20,50 0,20" fill="#868e96" />
        <line x1="-80" y1="20" x2="80" y2="0" stroke="#fcc419" stroke-width="4" />

        <!-- Left Weight (Light) A -->
        <rect x="-90" y="-10" width="30" height="30" fill="#a5d8ff" stroke="#339af0" stroke-width="2" />
        <text x="-75" y="10" fill="#1864ab" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">5</text>

        <!-- Right Weight (Heavy) B -->
        <rect x="60" y="-40" width="40" height="40" fill="#ffc9c9" stroke="#fa5252" stroke-width="2" />
        <text x="80" y="-15" fill="#c92a2a" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">10</text>

        <!-- Sign -->
        <text x="0" y="-40" fill="#495057" font-size="24" font-family="monospace" font-weight="bold"
            text-anchor="middle">5 &lt; 10</text>
    </g>

    <!-- Mid Arrow (+3) -->
    <path d="M 280 120 L 320 120" fill="none" stroke="#2b8a3e" stroke-width="4" marker-end="url(#arrow-green)" />
    <text x="300" y="110" fill="#2b8a3e" font-size="14" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">양쪽 모두에</text>
    <text x="300" y="140" fill="#2b8a3e" font-size="16" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">+ 3 더하기!</text>

    <!-- Right Scale: A+C < B+C -->
    <g transform="translate(450, 150)">
        <!-- Scale Base -->
        <polygon points="-20,50 20,50 0,20" fill="#868e96" />
        <line x1="-80" y1="20" x2="80" y2="0" stroke="#fcc419" stroke-width="4" />

        <!-- Left Weight (Light) A+C -->
        <rect x="-90" y="-10" width="30" height="30" fill="#a5d8ff" stroke="#339af0" stroke-width="2" />
        <rect x="-90" y="-30" width="30" height="20" fill="#d3f9d8" stroke="#40c057" stroke-width="2" />
        <text x="-75" y="10" fill="#1864ab" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">5</text>
        <text x="-75" y="-15" fill="#2b8a3e" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">+3</text>

        <!-- Right Weight (Heavy) B+C -->
        <rect x="60" y="-40" width="40" height="40" fill="#ffc9c9" stroke="#fa5252" stroke-width="2" />
        <rect x="60" y="-60" width="40" height="20" fill="#d3f9d8" stroke="#40c057" stroke-width="2" />
        <text x="80" y="-15" fill="#c92a2a" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">10</text>
        <text x="80" y="-45" fill="#2b8a3e" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">+3</text>

        <!-- Sign Unchanged -->
        <text x="0" y="-40" fill="#2b8a3e" font-size="24" font-family="monospace" font-weight="bold"
            text-anchor="middle">8 &lt; 13</text>
        <text x="0" y="-15" fill="#40c057" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">(방향 안 바뀜!)</text>
    </g>

    <defs>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
        </marker>
    </defs>
</svg>