<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#862e9c" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">네 번째 전략: 암호 해독가의 시선 '규칙 찾기(Find a Pattern)'</text>

    <!-- Number Sequence Graphic -->
    <g transform="translate(45, 100)">
        <!-- Term 1 -->
        <rect x="0" y="0" width="50" height="50" fill="#e7f5ff" stroke="#1864ab" stroke-width="2" rx="4" />
        <text x="25" y="32" fill="#1864ab" font-size="20" font-weight="bold" text-anchor="middle">2</text>
        <text x="25" y="-10" fill="#495057" font-size="10" font-weight="bold" text-anchor="middle">첫째</text>

        <!-- Pattern Link -->
        <path d="M 50 25 C 70 -5, 80 -5, 100 25" fill="none" stroke="#e03131" stroke-width="3"
            marker-end="url(#arrow-red)" />
        <text x="75" y="0" fill="#e03131" font-size="12" font-weight="bold" text-anchor="middle">+3</text>

        <!-- Term 2 -->
        <rect x="100" y="0" width="50" height="50" fill="#e7f5ff" stroke="#1864ab" stroke-width="2" rx="4" />
        <text x="125" y="32" fill="#1864ab" font-size="20" font-weight="bold" text-anchor="middle">5</text>
        <text x="125" y="-10" fill="#495057" font-size="10" font-weight="bold" text-anchor="middle">둘째</text>

        <!-- Pattern Link -->
        <path d="M 150 25 C 170 -5, 180 -5, 200 25" fill="none" stroke="#e03131" stroke-width="3"
            marker-end="url(#arrow-red)" />
        <text x="175" y="0" fill="#e03131" font-size="12" font-weight="bold" text-anchor="middle">+4</text>

        <!-- Term 3 -->
        <rect x="200" y="0" width="50" height="50" fill="#e7f5ff" stroke="#1864ab" stroke-width="2" rx="4" />
        <text x="225" y="32" fill="#1864ab" font-size="20" font-weight="bold" text-anchor="middle">9</text>
        <text x="225" y="-10" fill="#495057" font-size="10" font-weight="bold" text-anchor="middle">셋째</text>

        <!-- Pattern Link -->
        <path d="M 250 25 C 270 -5, 280 -5, 300 25" fill="none" stroke="#e03131" stroke-width="3"
            marker-end="url(#arrow-red)" />
        <text x="275" y="0" fill="#e03131" font-size="12" font-weight="bold" text-anchor="middle">+5</text>

        <!-- Term 4 -->
        <rect x="300" y="0" width="50" height="50" fill="#e7f5ff" stroke="#1864ab" stroke-width="2" rx="4" />
        <text x="325" y="32" fill="#1864ab" font-size="20" font-weight="bold" text-anchor="middle">14</text>
        <text x="325" y="-10" fill="#495057" font-size="10" font-weight="bold" text-anchor="middle">넷째</text>

        <!-- Pattern Link (Predict) -->
        <path d="M 350 25 C 370 -5, 380 -5, 400 25" fill="none" stroke="#12b886" stroke-width="3" stroke-dasharray="4,2"
            marker-end="url(#arrow-green)" />
        <text x="375" y="0" fill="#12b886" font-size="12" font-weight="bold" text-anchor="middle">+6 (예측)</text>

        <!-- Term 5 (Question) -->
        <rect x="400" y="0" width="50" height="50" fill="#ebfbee" stroke="#2b8a3e" stroke-width="3"
            stroke-dasharray="4,2" rx="4" />
        <text x="425" y="32" fill="#2b8a3e" font-size="20" font-weight="bold" text-anchor="middle">20</text>
        <text x="425" y="-10" fill="#2b8a3e" font-size="10" font-weight="bold" text-anchor="middle">다섯째?</text>

        <!-- The insight/Rule -->
        <rect x="60" y="70" width="370" height="30" fill="#fff" stroke="#adb5bd" rx="4" />
        <text x="245" y="89" fill="#862e9c" font-size="11" font-weight="bold" text-anchor="middle">발견된 뒷골목 규칙성: [ 더해지는
            숫자가 1씩 커지고 있군! ]</text>
    </g>

    <defs>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e03131" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#12b886" />
        </marker>
    </defs>
</svg>