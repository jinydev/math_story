<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#c92a2a" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">천문학적 데이터를 가두는 마법: 로그 스케일 시각화 (Log Scale)</text>

    <!-- Linear Graph (Exploding virus data) -->
    <g transform="translate(100, 180)">
        <line x1="0" y1="0" x2="160" y2="0" stroke="#868e96" stroke-width="2" />
        <line x1="0" y1="0" x2="0" y2="-120" stroke="#868e96" stroke-width="2" />

        <!-- Y-axis ticks (Linear) -->
        <text x="-40" y="-10" fill="#868e96" font-size="10" font-family="sans-serif">100</text>
        <text x="-40" y="-60" fill="#868e96" font-size="10" font-family="sans-serif">10,000</text>
        <text x="-40" y="-110" fill="#868e96" font-size="10" font-family="sans-serif">1,000,000</text>

        <!-- Linear Curve -->
        <path d="M 0 0 Q 120 -5 140 -120" fill="none" stroke="#fa5252" stroke-width="3" />

        <text x="80" y="-130" fill="#e03131" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">그래프 폭발 (왜곡)</text>
        <text x="80" y="25" fill="#495057" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">일반 차트 (Linear)</text>
    </g>

    <!-- Flat vs Log Scale -->
    <text x="300" y="110" fill="#adb5bd" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">로그 씌우기 ➡️</text>

    <!-- Log Graph (Linearized virus data) -->
    <g transform="translate(450, 180)">
        <line x1="0" y1="0" x2="160" y2="0" stroke="#868e96" stroke-width="2" />
        <line x1="0" y1="0" x2="0" y2="-120" stroke="#868e96" stroke-width="2" />

        <!-- Y-axis ticks (Log) -->
        <text x="-40" y="-10" fill="#1864ab" font-size="10" font-family="sans-serif">10² (100)</text>
        <text x="-40" y="-60" fill="#1864ab" font-size="10" font-family="sans-serif">10⁴ (1만)</text>
        <text x="-40" y="-110" fill="#1864ab" font-size="10" font-family="sans-serif">10⁶ (100만)</text>

        <!-- Log Curve (Straight Line!) -->
        <path d="M 0 -10 L 140 -115" fill="none" stroke="#228be6" stroke-width="3" />
        <circle cx="140" cy="-115" r="4" fill="#1864ab" />

        <text x="70" y="-80" fill="#1864ab" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">아름다운 직선형 변환</text>
        <text x="80" y="25" fill="#495057" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">로그 차트 (Log Scale)</text>
    </g>

</svg>