<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 350">
    <rect width="650" height="350" fill="#121212" rx="15" />

    <text x="325" y="35" fill="#38d9a9" font-size="22" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">SymPy: 인간의 한계를 넘는 AI 도구</text>

    <!-- Input Block -->
    <rect x="50" y="70" width="550" height="60" fill="#2b2b2b" stroke="#74c0fc" stroke-width="2" rx="5" />
    <text x="70" y="105" fill="#a5d8ff" font-size="20" font-family="monospace" font-weight="bold">P = x³ - 4x² + x +
        6</text>

    <!-- Method 1: Factor -->
    <path d="M 200 130 L 200 170" stroke="#fcc419" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="130" y="140" width="140" height="25" fill="#fcc419" rx="12" />
    <text x="200" y="157" fill="#000" font-size="14" font-weight="bold" font-family="monospace"
        text-anchor="middle">sp.factor(P)</text>

    <rect x="50" y="180" width="300" height="50" fill="#343a40" stroke="#fcc419" stroke-width="2" rx="5" />
    <text x="60" y="210" fill="#ffe066" font-size="18" font-family="monospace" font-weight="bold"> (x-3) * (x-2) *
        (x+1)</text>

    <!-- Method 2: Roots -->
    <path d="M 450 130 L 450 170" stroke="#ff8787" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="380" y="140" width="140" height="25" fill="#fa5252" rx="12" />
    <text x="450" y="157" fill="#fff" font-size="14" font-weight="bold" font-family="monospace"
        text-anchor="middle">sp.roots(P)</text>

    <rect x="370" y="180" width="230" height="50" fill="#343a40" stroke="#ff8787" stroke-width="2" rx="5" />
    <text x="390" y="210" fill="#ffc9c9" font-size="20" font-family="monospace" font-weight="bold"> {-1:1, 2:1,
        3:1}</text>
    <text x="485" y="250" fill="#ff8787" font-size="14" font-weight="bold" font-family="monospace"
        text-anchor="middle">Root 배열 추출: [-1, 2, 3]</text>

    <line x1="50" y1="280" x2="600" y2="280" stroke="#495057" stroke-width="2" />
    <text x="325" y="315" fill="#0ca678" font-size="18" font-weight="bold" text-anchor="middle">조립제법(Hammer)을 0.002초만에
        끝내는 궁극의 해킹 툴</text>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>