<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Glowing Effect -->
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Cell Gradients -->
    <radialGradient id="cell-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#065f46"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg-grad)"/>

  <!-- Title -->
  <text x="400" y="40" font-family="'Inter', sans-serif" font-size="28" font-weight="bold" fill="#f8fafc" text-anchor="middle">Exponential Growth: The Power of Exponents</text>
  <text x="400" y="70" font-family="'Inter', sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">When cells divide, they multiply by themselves. This is called a Power!</text>

  <!-- Stage 1 (2^1) -->
  <g transform="translate(150, 200)">
    <circle cx="0" cy="0" r="25" fill="url(#cell-grad)" filter="url(#neon)"/>
    <text x="0" y="80" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#34d399" text-anchor="middle">2^1 = 2</text>
    <text x="0" y="105" font-family="'Inter', sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">(2 cells)</text>

    <!-- The other cell to make it 2 -->
    <circle cx="0" cy="-60" r="25" fill="url(#cell-grad)" filter="url(#neon)"/>
  </g>

  <!-- Arrow 1 -->
  <path d="M 220 200 L 280 200" stroke="#475569" stroke-width="4" stroke-dasharray="10 5" fill="none"/>
  <polygon points="280,195 290,200 280,205" fill="#475569"/>
  <text x="250" y="190" font-family="'Inter', sans-serif" font-size="16" fill="#cbd5e1" text-anchor="middle">× 2</text>

  <!-- Stage 2 (2^2) -->
  <g transform="translate(400, 200)">
    <circle cx="-30" cy="0" r="25" fill="url(#cell-grad)" filter="url(#neon)"/>
    <circle cx="30" cy="0" r="25" fill="url(#cell-grad)" filter="url(#neon)"/>
    <circle cx="-30" cy="-60" r="25" fill="url(#cell-grad)" filter="url(#neon)"/>
    <circle cx="30" cy="-60" r="25" fill="url(#cell-grad)" filter="url(#neon)"/>
    
    <text x="0" y="80" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#34d399" text-anchor="middle">2^2 = 4</text>
    <text x="0" y="105" font-family="'Inter', sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">(2 × 2 cells)</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 520 200 L 580 200" stroke="#475569" stroke-width="4" stroke-dasharray="10 5" fill="none"/>
  <polygon points="580,195 590,200 580,205" fill="#475569"/>
  <text x="550" y="190" font-family="'Inter', sans-serif" font-size="16" fill="#cbd5e1" text-anchor="middle">× 2</text>

  <!-- Stage 3 (2^3) -->
  <g transform="translate(680, 200)">
    <!-- Top row -->
    <circle cx="-30" cy="-90" r="20" fill="url(#cell-grad)" filter="url(#neon)"/>
    <circle cx="30" cy="-90" r="20" fill="url(#cell-grad)" filter="url(#neon)"/>
    
    <!-- Middle row 1 -->
    <circle cx="-30" cy="-30" r="20" fill="url(#cell-grad)" filter="url(#neon)"/>
    <circle cx="30" cy="-30" r="20" fill="url(#cell-grad)" filter="url(#neon)"/>
    
    <!-- Middle row 2 -->
    <circle cx="-30" cy="30" r="20" fill="url(#cell-grad)" filter="url(#neon)"/>
    <circle cx="30" cy="30" r="20" fill="url(#cell-grad)" filter="url(#neon)"/>

    <!-- Bottom row -->
    <circle cx="-30" cy="90" r="20" fill="url(#cell-grad)" filter="url(#neon)"/>
    <circle cx="30" cy="90" r="20" fill="url(#cell-grad)" filter="url(#neon)"/>
    
    <!-- Base text down lower to avoid overlap -->
    <text x="0" y="130" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#34d399" text-anchor="middle">2^3 = 8</text>
    <text x="0" y="155" font-family="'Inter', sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">(2 × 2 × 2)</text>
  </g>

</svg>
