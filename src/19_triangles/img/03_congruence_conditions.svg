<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="500">
    <rect width="800" height="500" fill="#2d3436" />
    <text x="400" y="50" font-family="Arial" font-size="28" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        삼각형의 절대 복사: 3대 합동 조건 (Congruence)
    </text>

    <!-- 1. SSS Congruence -->
    <g transform="translate(150, 150)">
        <text x="0" y="0" font-family="Arial" font-size="24" font-weight="bold" fill="#ff7675" text-anchor="middle">SSS (변-변-변)</text>
        <text x="0" y="25" font-family="Arial" font-size="14" fill="#b2bec3" text-anchor="middle">세 뼈대가 같으면 무조건 똑같이 조립됨</text>
        
        <!-- Base Triangle -->
        <polygon points="-50,150 50,150 0,60" fill="none" stroke="#636e72" stroke-width="2" stroke-dasharray="5,5" />
        
        <!-- Animated Lines forming the triangle -->
        <line x1="-50" y1="150" x2="50" y2="150" stroke="#ff7675" stroke-width="4">
            <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" repeatCount="indefinite" />
        </line>
        <line x1="50" y1="150" x2="0" y2="60" stroke="#ff7675" stroke-width="4">
            <animate attributeName="stroke-dasharray" values="0,110;110,0" dur="2s" repeatCount="indefinite" />
        </line>
        <line x1="0" y1="60" x2="-50" y2="150" stroke="#ff7675" stroke-width="4">
            <animate attributeName="stroke-dasharray" values="0,110;110,0" dur="2s" repeatCount="indefinite" />
        </line>

        <!-- Tick marks defining sides -->
        <line x1="0" y1="145" x2="0" y2="155" stroke="#ffffff" stroke-width="2" />
        <line x1="20" y1="100" x2="30" y2="110" stroke="#ffffff" stroke-width="2" />
        <line x1="25" y1="95" x2="35" y2="105" stroke="#ffffff" stroke-width="2" />
        <line x1="-30" y1="100" x2="-20" y2="110" stroke="#ffffff" stroke-width="2" />
        <line x1="-35" y1="95" x2="-25" y2="105" stroke="#ffffff" stroke-width="2" />
        <line x1="-40" y1="90" x2="-30" y2="100" stroke="#ffffff" stroke-width="2" />
    </g>

    <!-- 2. SAS Congruence -->
    <g transform="translate(400, 150)">
        <text x="0" y="0" font-family="Arial" font-size="24" font-weight="bold" fill="#74b9ff" text-anchor="middle">SAS (변-각-변)</text>
        <text x="0" y="25" font-family="Arial" font-size="14" fill="#b2bec3" text-anchor="middle">두 뼈대와 그 사이 끼인 각 고정</text>
        
        <polygon points="-50,150 50,150 0,60" fill="none" stroke="#636e72" stroke-width="2" stroke-dasharray="5,5" />
        
        <!-- Sides -->
        <line x1="-50" y1="150" x2="50" y2="150" stroke="#74b9ff" stroke-width="4" />
        <line x1="-50" y1="150" x2="0" y2="60" stroke="#74b9ff" stroke-width="4" />
        
        <!-- Included Angle Indicator -->
        <path d="M-30,150 A20,20 0 0,1 -25,105" fill="none" stroke="#ffeaa7" stroke-width="4">
            <animate attributeName="stroke-dasharray" values="0,50;50,0" dur="2s" repeatCount="indefinite" />
        </path>
    </g>

    <!-- 3. ASA Congruence -->
    <g transform="translate(650, 150)">
        <text x="0" y="0" font-family="Arial" font-size="24" font-weight="bold" fill="#55efc4" text-anchor="middle">ASA (각-변-각)</text>
        <text x="0" y="25" font-family="Arial" font-size="14" fill="#b2bec3" text-anchor="middle">한 바닥 뼈대와 양 끝의 레이저 각도</text>
        
        <polygon points="-50,150 50,150 0,60" fill="none" stroke="#636e72" stroke-width="2" stroke-dasharray="5,5" />
        
        <!-- Side -->
        <line x1="-50" y1="150" x2="50" y2="150" stroke="#55efc4" stroke-width="4" />
        
        <!-- Angle Indicators at edges -->
        <path d="M-30,150 A20,20 0 0,1 -25,105" fill="none" stroke="#ffeaa7" stroke-width="4" />
        <path d="M30,150 A20,20 0 0,0 25,105" fill="none" stroke="#ffeaa7" stroke-width="4" />
        
        <!-- Laser beams extending from angles to meet at vertex -->
        <line x1="-50" y1="150" x2="0" y2="60" stroke="#fdcb6e" stroke-width="2" stroke-dasharray="10,5">
            <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" repeatCount="indefinite" />
        </line>
        <line x1="50" y1="150" x2="0" y2="60" stroke="#fdcb6e" stroke-width="2" stroke-dasharray="10,5">
            <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" repeatCount="indefinite" />
        </line>
    </g>

    <!-- Info text below -->
    <text x="400" y="420" font-family="Arial" font-size="18" fill="#b2bec3" text-anchor="middle">
        모든 내각이나 길이를 다 알 필요 없습니다. 우주의 법칙은 단 3개의 확정된 조건만으로도
    </text>
    <text x="400" y="450" font-family="Arial" font-size="18" fill="#b2bec3" text-anchor="middle">
        완벽히 똑같은 클론(Clone) 삼각형을 복제해냅니다. (Python 객체 지향의 데이터 생성자 파라미터와 동일)
    </text>

</svg>
