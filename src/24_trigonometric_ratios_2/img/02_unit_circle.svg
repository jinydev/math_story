<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A202C" />
      <stop offset="100%" stop-color="#2D3748" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bgGrad)" rx="15" />

  <text x="400" y="40" font-family="'Inter', sans-serif" font-size="28" font-weight="bold" fill="#F7FAFC" text-anchor="middle" filter="url(#glow)">위대한 둥근 포털: 단위원 (Unit Circle)</text>
  <text x="400" y="70" font-family="'Inter', sans-serif" font-size="16" fill="#A0AEC0" text-anchor="middle">"반지름이 1인 원 위의 좌표 (x, y) 가 곧 코사인과 사인 값 그 자체이다!"</text>

  <!-- The Unit Circle System -->
  <!-- Center at (250, 250), Radius R=150 -->
  <g transform="translate(0, 0)">
    
    <!-- Coordinate Axes -->
    <!-- X axis -->
    <line x1="50" y1="250" x2="450" y2="250" stroke="#718096" stroke-width="2"/>
    <text x="460" y="255" font-family="'Inter', sans-serif" font-size="16" fill="#A0AEC0">x (Cos축)</text>
    <text x="410" y="240" font-family="'Inter', sans-serif" font-size="14" fill="#A0AEC0">(1, 0)</text>

    <!-- Y axis -->
    <line x1="250" y1="50" x2="250" y2="450" stroke="#718096" stroke-width="2"/>
    <text x="240" y="40" font-family="'Inter', sans-serif" font-size="16" fill="#A0AEC0">y (Sin축)</text>
    <text x="260" y="90" font-family="'Inter', sans-serif" font-size="14" fill="#A0AEC0">(0, 1)</text>

    <!-- The Circle (Radius = 150 representing 1.0) -->
    <circle cx="250" cy="250" r="150" fill="none" stroke="#E2E8F0" stroke-width="3" stroke-dasharray="10, 6" filter="url(#glow)"/>

    <!-- A specific Point P on the circle at angle Theta (e.g. 60 degrees -> -60 in SVG y-axis) -->
    <!-- Center(250,250), R=150. Theta=60 deg -> x = 250 + 150*cos(60) = 250 + 75 = 325 -->
    <!-- y = 250 - 150*sin(60) = 250 - 150*0.866 = 250 - 129.9 = 120.1 -->
    
    <!-- Hypotenuse (Radius = 1) -->
    <line x1="250" y1="250" x2="325" y2="120" stroke="#9F7AEA" stroke-width="4" filter="url(#glow)"/>
    <text x="270" y="180" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#E9D8FD" filter="url(#glow)">R = 1</text>

    <!-- Opposite (Y length = sin) -->
    <line x1="325" y1="250" x2="325" y2="120" stroke="#FC8181" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
    <text x="335" y="190" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#FC8181" filter="url(#glow)">y = sin θ</text>

    <!-- Adjacent (X length = cos) -->
    <line x1="250" y1="250" x2="325" y2="250" stroke="#4FD1C5" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
    <text x="270" y="275" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#4FD1C5" filter="url(#glow)">x = cos θ</text>

    <!-- Angle Arc -->
    <path d="M 290 250 A 40 40 0 0 0 270 215" fill="none" stroke="#F6AD55" stroke-width="3"/>
    <text x="300" y="235" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#F6AD55">θ</text>

    <!-- The Point Dot P(x,y) -->
    <circle cx="325" cy="120" r="8" fill="#F6E05E" filter="url(#glow)"/>
    <text x="340" y="115" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#F6E05E">P (cos θ, sin θ)</text>
  </g>

  <!-- Explanation Panel on the Right -->
  <g transform="translate(480, 150)">
    <rect x="0" y="0" width="300" height="200" fill="rgba(45, 55, 72, 0.8)" rx="10" stroke="#CBD5E0" stroke-width="2"/>
    
    <text x="15" y="30" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#F7FAFC">단위원이란?</text>
    <text x="15" y="55" font-family="'Inter', sans-serif" font-size="14" fill="#A0AEC0">빗변(반지름) 길이가 정확히 1 인 원.</text>

    <text x="15" y="90" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#F7FAFC">왜 우주의 법칙인가?</text>
    <text x="15" y="115" font-family="'Inter', sans-serif" font-size="14" fill="#FC8181" font-weight="bold">sin θ = 높이 / 1 = 곧 높이 (y축 좌표!)</text>
    <text x="15" y="140" font-family="'Inter', sans-serif" font-size="14" fill="#4FD1C5" font-weight="bold">cos θ = 밑변 / 1 = 곧 밑변 (x축 좌표!)</text>

    <text x="15" y="180" font-family="'Inter', sans-serif" font-size="13" fill="#E2E8F0">삼각형이 아무리 뱅글뱅글 360도 이상을</text>
    <text x="15" y="195" font-family="'Inter', sans-serif" font-size="13" fill="#E2E8F0">돌아도 좌표 (x, y) 추적만 하면 비율 끝!!</text>
  </g>

</svg>
