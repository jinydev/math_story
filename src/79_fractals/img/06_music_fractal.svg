<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="300">
    <rect width="800" height="300" fill="#2d3436" />
    <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        음악 속의 프랙탈: 바흐의 푸가 (Fugue)
    </text>

    <!-- Base Motive -->
    <text x="100" y="100" font-family="Arial" font-size="16" fill="#fdcb6e">단순한 기본 테마 (Motif)</text>
    <path d="M 100 130 Q 120 100, 140 130 T 180 130" fill="none" stroke="#fdcb6e" stroke-width="4" />
    
    <!-- Level 1 Fractal Iteration (Different voices/pitches) -->
    <text x="300" y="100" font-family="Arial" font-size="16" fill="#00b894">피치가 변형된 재귀 호출</text>
    <path d="M 300 130 Q 310 115, 320 130 T 340 130" fill="none" stroke="#00b894" stroke-width="3" />
    <path d="M 330 160 Q 340 145, 350 160 T 370 160" fill="none" stroke="#00b894" stroke-width="3" />
    <path d="M 350 100 Q 360 85, 370 100 T 390 100" fill="none" stroke="#00b894" stroke-width="3" />

    <!-- Level 2 Fractal Symphony -->
    <text x="500" y="100" font-family="Arial" font-size="16" fill="#0984e3">수십 개의 얽힌 프랙탈 교향곡</text>
    <g fill="none" stroke="#0984e3" stroke-width="2">
        <path d="M 500 130 Q 505 120, 510 130 T 520 130" />
        <path d="M 515 150 Q 520 140, 525 150 T 535 150" />
        <path d="M 525 110 Q 530 100, 535 110 T 545 110" />
        
        <path d="M 540 135 Q 545 125, 550 135 T 560 135" stroke="#74b9ff"/>
        <path d="M 555 155 Q 560 145, 565 155 T 575 155" stroke="#74b9ff"/>
        <path d="M 565 115 Q 570 105, 575 115 T 585 115" stroke="#74b9ff"/>

        <path d="M 580 120 Q 585 110, 590 120 T 600 120" stroke="#a29bfe"/>
        <path d="M 595 160 Q 600 150, 605 160 T 615 160" stroke="#a29bfe"/>
        <path d="M 610 100 Q 615 90, 620 100 T 630 100" stroke="#a29bfe"/>
        
        <path d="M 620 140 Q 625 130, 630 140 T 640 140" stroke="#81ecec"/>
        <path d="M 635 170 Q 640 160, 645 170 T 655 170" stroke="#81ecec"/>
        <path d="M 645 90 Q 650 80, 655 90 T 665 90" stroke="#81ecec"/>
        
        <!-- Infinite recursive looping concept -->
        <circle cx="720" cy="130" r="30" stroke="#ffeaa7" stroke-width="3" stroke-dasharray="5">
            <animateTransform attributeName="transform" type="rotate" from="0 720 130" to="360 720 130" dur="5s" repeatCount="indefinite"/>
        </circle>
        <text x="720" y="135" font-family="Arial" font-size="12" fill="#ffeaa7" text-anchor="middle">무한루프</text>
    </g>

    <path d="M 210 130 L 270 130" stroke="#dfe6e9" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 420 130 L 470 130" stroke="#dfe6e9" stroke-width="2" marker-end="url(#arrow)"/>

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#dfe6e9" />
        </marker>
    </defs>
</svg>
