<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%">
    <rect width="600" height="300" fill="#2d3436" />
    
    <!-- Title -->
    <text x="300" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        톱니바퀴의 맞물림과 최소공배수 (LCM of 8 and 12 is 24)
    </text>

    <!-- Gear A (Small Gear, 8 teeth) on the Left -->
    <g transform="translate(180, 150)">
        <animateTransform attributeName="transform" type="rotate" from="0 180 150" to="360 180 150" dur="4s" repeatCount="indefinite" />
        <circle cx="0" cy="0" r="50" fill="#74b9ff" stroke="#0984e3" stroke-width="4" />
        <circle cx="0" cy="0" r="10" fill="#2d3436" />
        <!-- Teeth representation -->
        <line x1="0" y1="-50" x2="0" y2="-65" stroke="#74b9ff" stroke-width="8" />
        <line x1="0" y1="50" x2="0" y2="65" stroke="#74b9ff" stroke-width="8" />
        <line x1="-50" y1="0" x2="-65" y2="0" stroke="#74b9ff" stroke-width="8" />
        <line x1="50" y1="0" x2="65" y2="0" stroke="#74b9ff" stroke-width="8" />
        <line x1="-35" y1="-35" x2="-45" y2="-45" stroke="#74b9ff" stroke-width="8" />
        <line x1="35" y1="35" x2="45" y2="45" stroke="#74b9ff" stroke-width="8" />
        <line x1="-35" y1="35" x2="-45" y2="45" stroke="#74b9ff" stroke-width="8" />
        <line x1="35" y1="-35" x2="45" y2="-45" stroke="#74b9ff" stroke-width="8" />
        
        <!-- Red Marking indicating the Sync Point -->
        <circle cx="58" cy="0" r="6" fill="#ff7675" />
        <!-- Add text that doesn't rotate, wait, text in this group rotates. -->
    </g>

    <!-- Stat for Gear A -->
    <text x="180" y="250" font-family="Arial" font-size="18" font-weight="bold" fill="#74b9ff" text-anchor="middle">
        작은 기어: 8 개의 톱니
    </text>

    <!-- Gear B (Large Gear, 12 teeth) on the Right -->
    <g transform="translate(320, 150)">
        <!-- Spins in opposite direction and 8/12 = 2/3 speed -->
        <animateTransform attributeName="transform" type="rotate" from="0 320 150" to="-240 320 150" dur="4s" repeatCount="indefinite" />
        <circle cx="0" cy="0" r="75" fill="#55efc4" stroke="#00b894" stroke-width="4" />
        <circle cx="0" cy="0" r="15" fill="#2d3436" />
        <!-- Teeth (Simplified mathematically to 12 marks every 30 degrees) -->
        <g stroke="#55efc4" stroke-width="8">
            <line x1="0" y1="-75" x2="0" y2="-90" />
            <line x1="0" y1="75" x2="0" y2="90" />
            <line x1="-75" y1="0" x2="-90" y2="0" />
            <line x1="75" y1="0" x2="90" y2="0" />
            <!-- Rotate 30, 60, 120, 150... omitted manually for demo SVG brevity, utilizing simple lines -->
            <line x1="-37" y1="-65" x2="-45" y2="-78" />
            <line x1="37" y1="-65" x2="45" y2="-78" />
            <line x1="-65" y1="-37" x2="-78" y2="-45" />
            <line x1="65" y1="-37" x2="78" y2="-45" />
            <line x1="-37" y1="65" x2="-45" y2="78" />
            <line x1="37" y1="65" x2="45" y2="78" />
            <line x1="-65" y1="37" x2="-78" y2="45" />
            <line x1="65" y1="37" x2="78" y2="45" />
        </g>
        
        <!-- Red Marking indicating the Sync Point -->
        <circle cx="-83" cy="0" r="6" fill="#ff7675" />
    </g>

    <text x="320" y="270" font-family="Arial" font-size="18" font-weight="bold" fill="#55efc4" text-anchor="middle">
        거대 기어: 12 개의 톱니
    </text>

    <!-- Info Center -->
    <text x="450" y="100" font-family="Arial" font-size="16" fill="#ffeaa7">
        <tspan x="450" dy="0">두 빨간 점이 한 번 만날 때마다:</tspan>
        <tspan x="450" dy="25">작은 톱니 3회전 = 24칸</tspan>
        <tspan x="450" dy="25">거대 톱니 2회전 = 24칸</tspan>
        <tspan x="450" dy="25">최소공배수(LCM) = 24</tspan>
    </text>

</svg>
