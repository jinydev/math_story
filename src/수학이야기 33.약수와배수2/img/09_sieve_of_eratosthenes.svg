<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="600">
    <rect width="800" height="600" fill="#2d3436" />
    <text x="400" y="50" font-family="Arial" font-size="28" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        에라토스테네스의 체 (Sieve of Eratosthenes)
    </text>
    <text x="400" y="85" font-family="Arial" font-size="16" fill="#b2bec3" text-anchor="middle">
        소수(Prime)의 배수들을 격자판에서 자비 없이 지워나가는 고대 그리스의 해킹 알고리즘
    </text>

    <g transform="translate(100, 120)">
        <!-- Grid drawing: 1 to 20 just for demonstration -->
        <!-- Row 1 (1 to 5) -->
        <g transform="translate(0, 0)">
            <rect x="0" y="0" width="100" height="100" fill="#636e72" stroke="#2d3436" stroke-width="2" />
            <text x="50" y="60" font-family="Arial" font-size="30" fill="#b2bec3" text-anchor="middle">1</text>
            <!-- 1 is crossed out immediately -->
            <line x1="20" y1="20" x2="80" y2="80" stroke="#ff7675" stroke-width="4" />
        </g>
        
        <g transform="translate(120, 0)">
            <rect x="0" y="0" width="100" height="100" fill="#00b894" stroke="#2d3436" stroke-width="2" />
            <text x="50" y="60" font-family="Arial" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
            <circle cx="50" cy="50" r="40" fill="none" stroke="#ffeaa7" stroke-width="4" stroke-dasharray="250" stroke-dashoffset="250">
                <animate attributeName="stroke-dashoffset" to="0" dur="1s" fill="freeze" />
            </circle>
        </g>

        <g transform="translate(240, 0)">
            <rect x="0" y="0" width="100" height="100" fill="#0984e3" stroke="#2d3436" stroke-width="2" />
            <text x="50" y="60" font-family="Arial" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
             <circle cx="50" cy="50" r="40" fill="none" stroke="#ffeaa7" stroke-width="4" stroke-dasharray="250" stroke-dashoffset="250">
                <animate attributeName="stroke-dashoffset" to="0" begin="2s" dur="1s" fill="freeze" />
            </circle>
        </g>

        <g transform="translate(360, 0)">
            <rect x="0" y="0" width="100" height="100" fill="#636e72" stroke="#2d3436" stroke-width="2" />
            <text x="50" y="60" font-family="Arial" font-size="30" fill="#b2bec3" text-anchor="middle">4</text>
            <!-- Crossed out by 2 -->
            <line x1="20" y1="20" x2="80" y2="80" stroke="#ff7675" stroke-width="4" stroke-dasharray="100" stroke-dashoffset="100">
                <animate attributeName="stroke-dashoffset" to="0" begin="1s" dur="0.5s" fill="freeze" />
            </line>
        </g>

        <g transform="translate(480, 0)">
            <rect x="0" y="0" width="100" height="100" fill="#6c5ce7" stroke="#2d3436" stroke-width="2" />
            <text x="50" y="60" font-family="Arial" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle">5</text>
             <circle cx="50" cy="50" r="40" fill="none" stroke="#ffeaa7" stroke-width="4" stroke-dasharray="250" stroke-dashoffset="250">
                <animate attributeName="stroke-dashoffset" to="0" begin="4s" dur="1s" fill="freeze" />
            </circle>
        </g>

        <!-- Row 2 -->
        <g transform="translate(0, 120)">
            <rect x="0" y="0" width="100" height="100" fill="#636e72" stroke="#2d3436" stroke-width="2" />
            <text x="50" y="60" font-family="Arial" font-size="30" fill="#b2bec3" text-anchor="middle">6</text>
            <!-- Crossed out by 2 -->
             <line x1="20" y1="20" x2="80" y2="80" stroke="#ff7675" stroke-width="4" stroke-dasharray="100" stroke-dashoffset="100">
                <animate attributeName="stroke-dashoffset" to="0" begin="1.2s" dur="0.5s" fill="freeze" />
            </line>
        </g>

        <g transform="translate(120, 120)">
            <rect x="0" y="0" width="100" height="100" fill="#e17055" stroke="#2d3436" stroke-width="2" />
            <text x="50" y="60" font-family="Arial" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle">7</text>
             <circle cx="50" cy="50" r="40" fill="none" stroke="#ffeaa7" stroke-width="4" stroke-dasharray="250" stroke-dashoffset="250">
                <animate attributeName="stroke-dashoffset" to="0" begin="5s" dur="1s" fill="freeze" />
            </circle>
        </g>

        <g transform="translate(240, 120)">
            <rect x="0" y="0" width="100" height="100" fill="#636e72" stroke="#2d3436" stroke-width="2" />
            <text x="50" y="60" font-family="Arial" font-size="30" fill="#b2bec3" text-anchor="middle">8</text>
            <!-- Crossed out by 2 -->
             <line x1="20" y1="20" x2="80" y2="80" stroke="#ff7675" stroke-width="4" stroke-dasharray="100" stroke-dashoffset="100">
                <animate attributeName="stroke-dashoffset" to="0" begin="1.4s" dur="0.5s" fill="freeze" />
            </line>
        </g>

        <g transform="translate(360, 120)">
            <rect x="0" y="0" width="100" height="100" fill="#636e72" stroke="#2d3436" stroke-width="2" />
            <text x="50" y="60" font-family="Arial" font-size="30" fill="#b2bec3" text-anchor="middle">9</text>
             <!-- Crossed out by 3 -->
             <line x1="20" y1="20" x2="80" y2="80" stroke="#fdcb6e" stroke-width="4" stroke-dasharray="100" stroke-dashoffset="100">
                <animate attributeName="stroke-dashoffset" to="0" begin="3s" dur="0.5s" fill="freeze" />
            </line>
        </g>

        <g transform="translate(480, 120)">
            <rect x="0" y="0" width="100" height="100" fill="#636e72" stroke="#2d3436" stroke-width="2" />
            <text x="50" y="60" font-family="Arial" font-size="30" fill="#b2bec3" text-anchor="middle">10</text>
             <!-- Crossed out by 2 -->
             <line x1="20" y1="20" x2="80" y2="80" stroke="#ff7675" stroke-width="4" stroke-dasharray="100" stroke-dashoffset="100">
                <animate attributeName="stroke-dashoffset" to="0" begin="1.6s" dur="0.5s" fill="freeze" />
            </line>
        </g>

        <!-- Legend and Info -->
        <g transform="translate(0, 260)">
             <rect x="0" y="0" width="30" height="10" fill="#ff7675" />
             <text x="40" y="10" font-family="Arial" font-size="16" fill="#dfe6e9">가장 강력한 소수 2의 배수들(짝수)이 소탕되는 붉은 빗금 (1 sec)</text>
             
             <rect x="0" y="30" width="30" height="10" fill="#fdcb6e" />
             <text x="40" y="40" font-family="Arial" font-size="16" fill="#dfe6e9">그 다음 소수 3의 배수(9, 15...)들이 연쇄 폭발하는 노란 빗금 (3 sec)</text>
             
             <circle cx="15" cy="65" r="10" fill="none" stroke="#ffeaa7" stroke-width="3" />
             <text x="40" y="70" font-family="Arial" font-size="16" fill="#dfe6e9">살아남은 최후의 승자, 완벽한 소수(Prime) 덩어리들의 포획망</text>
        </g>
    </g>

</svg>
