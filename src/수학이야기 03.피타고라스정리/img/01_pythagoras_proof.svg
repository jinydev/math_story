<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%">
    <rect width="600" height="600" fill="#2d3436" />
    
    <!-- Title -->
    <text x="300" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        피타고라스 정리 기하학적 증명 ($a^2 + b^2 = c^2$)
    </text>

    <!-- Main Right Triangle in the Center -->
    <!-- Triangle vertices: A(300, 350) - Right angle, B(400, 350) - Base=100(a), C(300, 200) - Height=150(b) -->
    <polygon points="300,350 400,350 300,200" fill="#b2bec3" stroke="#dfe6e9" stroke-width="2" />
    <!-- Right Angle notation -->
    <polyline points="300,335 315,335 315,350" fill="none" stroke="#ff7675" stroke-width="3" />
    <text x="360" y="320" font-family="Arial" font-size="18" fill="#dfe6e9">c</text>

    <!-- Square a^2 (Base) -->
    <rect x="300" y="350" width="100" height="100" fill="#74b9ff" fill-opacity="0.6" stroke="#0984e3" stroke-width="2" />
    <text x="350" y="405" font-family="Arial" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">a²</text>
    <text x="350" y="340" font-family="Arial" font-size="18" fill="#74b9ff" text-anchor="middle">a = 3</text>

    <!-- Square b^2 (Height) -->
    <rect x="150" y="200" width="150" height="150" fill="#55efc4" fill-opacity="0.6" stroke="#00b894" stroke-width="2" />
    <text x="225" y="280" font-family="Arial" font-size="22" font-weight="bold" fill="#2d3436" text-anchor="middle">b²</text>
    <text x="280" y="280" font-family="Arial" font-size="18" fill="#55efc4">b = 4</text>

    <!-- Square c^2 (Hypotenuse) -->
    <!-- Length c = sqrt(100^2 + 150^2) = 180.27 -->
    <!-- Angle = atan(150/100) = 56.3 degrees -->
    <g transform="translate(400, 350) rotate(-123.69)">
        <!-- Animate the area filling -->
        <rect x="0" y="0" width="180.27" height="180.27" fill="#ff7675" fill-opacity="0.6" stroke="#d63031" stroke-width="2" />
        <rect x="0" y="0" width="180.27" height="180.27" fill="#fab1a0" fill-opacity="0.9">
             <animate attributeName="height" from="0" to="180.27" dur="2s" fill="freeze" />
        </rect>
        <text x="90" y="100" font-family="Arial" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle" transform="rotate(123.69, 90, 100)">c²</text>
    </g>

    <!-- Equation -->
    <text x="300" y="550" font-family="Arial" font-size="24" font-weight="bold" fill="#ffeaa7" text-anchor="middle">
        Area(a²) + Area(b²) = Area(c²)
    </text>

</svg>
