<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
    <rect width="600" height="300" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#862e9c" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">두 번째 시선: '4차원 (The 4th Dimension)'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"공간 (x,y,z) 의 무브먼트에 '시간(t)' 이라는 축이 추가된
        아인슈타인의 시공간"</text>

    <!-- Left Side: Hypercube (Tesseract) projection -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="220" height="180" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#862e9c" font-size="14" font-weight="bold" text-anchor="middle">초입방체
            (Tesseract)</text>

        <!-- Outer Cube -->
        <path d="M 40 40 L 140 40 L 180 80 L 80 80 Z" fill="none" stroke="#adb5bd" stroke-width="1.5" />
        <path d="M 40 40 L 40 140 L 80 180 L 80 80 Z" fill="none" stroke="#adb5bd" stroke-width="1.5" />
        <path d="M 140 40 L 140 140 L 180 180 L 180 80 Z" fill="none" stroke="#adb5bd" stroke-width="1.5" />
        <path d="M 40 140 L 140 140 L 180 180 L 80 180 Z" fill="none" stroke="#adb5bd" stroke-width="1.5" />

        <!-- Inner Cube -->
        <path d="M 80 80 L 120 80 L 140 100 L 100 100 Z" fill="#f3d9fa" fill-opacity="0.5" stroke="#862e9c"
            stroke-width="2" />
        <path d="M 80 80 L 80 120 L 100 140 L 100 100 Z" fill="#eebefa" fill-opacity="0.5" stroke="#862e9c"
            stroke-width="2" />
        <path d="M 120 80 L 120 120 L 140 140 L 140 100 Z" fill="#eebefa" fill-opacity="0.5" stroke="#862e9c"
            stroke-width="2" />
        <path d="M 80 120 L 120 120 L 140 140 L 100 140 Z" fill="#f3d9fa" fill-opacity="0.5" stroke="#862e9c"
            stroke-width="2" />

        <!-- Connecting lines (4th dimension axes) -->
        <line x1="40" y1="40" x2="80" y2="80" stroke="#f59f00" stroke-width="2" stroke-dasharray="2,2" />
        <line x1="140" y1="40" x2="120" y2="80" stroke="#f59f00" stroke-width="2" stroke-dasharray="2,2" />
        <line x1="180" y1="80" x2="140" y2="100" stroke="#f59f00" stroke-width="2" stroke-dasharray="2,2" />
        <line x1="80" y1="80" x2="100" y2="100" stroke="#f59f00" stroke-width="2" stroke-dasharray="2,2" />

        <line x1="40" y1="140" x2="80" y2="120" stroke="#f59f00" stroke-width="2" stroke-dasharray="2,2" />
        <line x1="140" y1="140" x2="120" y2="120" stroke="#f59f00" stroke-width="2" stroke-dasharray="2,2" />
        <line x1="180" y1="180" x2="140" y2="140" stroke="#f59f00" stroke-width="2" stroke-dasharray="2,2" />
        <line x1="80" y1="180" x2="100" y2="140" stroke="#f59f00" stroke-width="2" stroke-dasharray="2,2" />

        <text x="110" y="165" fill="#d9480f" font-size="10" font-weight="bold" text-anchor="middle">"수학적 4차원: 직교하는 축
            4개"</text>
    </g>

    <!-- Divider -->
    <line x1="300" y1="80" x2="300" y2="260" stroke="#adb5bd" stroke-dasharray="4,4" />

    <!-- Right Side: Spacetime concept -->
    <g transform="translate(320, 80)">
        <rect x="0" y="0" width="220" height="180" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">물리학의 시공간
            (Space-Time)</text>

        <!-- Meeting analogy -->
        <rect x="25" y="40" width="170" height="40" fill="#e7f5ff" rx="5" />
        <text x="110" y="58" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">"스타벅스 강남점 3층
            창가자리"</text>
        <text x="110" y="73" fill="#495057" font-size="10" text-anchor="middle">공간 좌표 (x, y, z) 3개</text>

        <text x="110" y="100" fill="#fa5252" font-size="20" font-weight="bold" text-anchor="middle">+</text>

        <rect x="25" y="115" width="170" height="40" fill="#fff5f5" rx="5" />
        <text x="110" y="133" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">"오후 2시 정각"</text>
        <text x="110" y="148" fill="#495057" font-size="10" text-anchor="middle">시간 좌표 (t) 1개</text>

        <!-- Sum -->
        <rect x="25" y="165" width="170" height="15" fill="#212529" rx="3" />
        <text x="110" y="176" fill="#f8f9fa" font-size="10" font-weight="bold" text-anchor="middle">좌표 4개 = 4차원 시공간
            우주</text>
    </g>

</svg>