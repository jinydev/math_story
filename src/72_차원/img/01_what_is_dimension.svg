<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
    <rect width="600" height="300" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#0b7285" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">첫 번째 시선: '차원(Dimension) 이란 무엇인가?'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"내 위치를 정확히 설명하기 위해 필요한 '숫자의 개수' 가 바로
        차원이다"</text>

    <!-- 0D - Point -->
    <g transform="translate(40, 90)">
        <rect x="0" y="0" width="100" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="50" y="25" fill="#495057" font-size="14" font-weight="bold" text-anchor="middle">0차원 (점)</text>
        <text x="50" y="45" fill="#868e96" font-size="10" text-anchor="middle">위치만 있고 크기 없음</text>

        <!-- Point -->
        <circle cx="50" cy="90" r="5" fill="#212529" />
        <text x="50" y="115" fill="#212529" font-size="12" font-weight="bold" text-anchor="middle">"여기"</text>

        <rect x="10" y="130" width="80" height="15" fill="#f1f3f5" />
        <text x="50" y="141" fill="#495057" font-size="10" text-anchor="middle">숫자 0개 필요</text>
    </g>

    <!-- 1D - Line -->
    <g transform="translate(170, 90)">
        <rect x="0" y="0" width="100" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="50" y="25" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">1차원 (선)</text>
        <text x="50" y="45" fill="#868e96" font-size="10" text-anchor="middle">앞뒤만 이동 가능</text>

        <!-- Line & Point -->
        <line x1="10" y1="90" x2="90" y2="90" stroke="#1864ab" stroke-width="3" />
        <circle cx="70" cy="90" r="5" fill="#d9480f" />

        <!-- Coordinate -->
        <line x1="10" y1="110" x2="10" y2="105" stroke="#adb5bd" stroke-width="1" />
        <text x="10" y="120" fill="#868e96" font-size="10" text-anchor="middle">0</text>
        <text x="70" y="115" fill="#d9480f" font-size="12" font-weight="bold" text-anchor="middle">x=7</text>

        <rect x="10" y="130" width="80" height="15" fill="#e7f5ff" />
        <text x="50" y="141" fill="#1864ab" font-size="10" font-weight="bold" text-anchor="middle">숫자 1개 필요</text>
    </g>

    <!-- 2D - Plane -->
    <g transform="translate(300, 90)">
        <rect x="0" y="0" width="120" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="60" y="25" fill="#2b8a3e" font-size="14" font-weight="bold" text-anchor="middle">2차원 (면)</text>
        <text x="60" y="45" fill="#868e96" font-size="10" text-anchor="middle">체스판, 종이 위</text>

        <!-- Plane & Point -->
        <rect x="25" y="60" width="70" height="60" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2" />
        <circle cx="70" cy="80" r="5" fill="#d9480f" />
        <line x1="25" y1="80" x2="70" y2="80" stroke="#adb5bd" stroke-dasharray="2,2" />
        <line x1="70" y1="120" x2="70" y2="80" stroke="#adb5bd" stroke-dasharray="2,2" />

        <text x="70" y="70" fill="#d9480f" font-size="12" font-weight="bold" text-anchor="middle">(4, 3)</text>

        <rect x="20" y="130" width="80" height="15" fill="#ebfbee" />
        <text x="60" y="141" fill="#2b8a3e" font-size="10" font-weight="bold" text-anchor="middle">숫자 2개 필요(x,y)</text>
    </g>

    <!-- 3D - Space -->
    <g transform="translate(450, 90)">
        <rect x="0" y="0" width="120" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="60" y="25" fill="#862e9c" font-size="14" font-weight="bold" text-anchor="middle">3차원 (공간)</text>
        <text x="60" y="45" fill="#868e96" font-size="10" text-anchor="middle">우리의 현실 우주</text>

        <!-- Cube & Point -->
        <path d="M 30 70 L 70 70 L 90 60 L 50 60 Z" fill="#f3d9fa" stroke="#862e9c" stroke-width="1.5" />
        <path d="M 30 70 L 30 110 L 70 110 L 70 70 Z" fill="#f8f0fc" stroke="#862e9c" stroke-width="1.5" />
        <path d="M 70 110 L 90 100 L 90 60 L 70 70 Z" fill="#eebefa" stroke="#862e9c" stroke-width="1.5" />

        <circle cx="80" cy="85" r="5" fill="#d9480f" />
        <line x1="80" y1="85" x2="80" y2="105" stroke="#adb5bd" stroke-dasharray="1,1" />

        <text x="80" y="75" fill="#d9480f" font-size="10" font-weight="bold" text-anchor="middle">(4, 3, 5)</text>

        <rect x="15" y="130" width="90" height="15" fill="#f3d9fa" />
        <text x="60" y="141" fill="#862e9c" font-size="9" font-weight="bold" text-anchor="middle">숫자 3개 필요(x,y,z)</text>
    </g>

</svg>