<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#e03131" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">상관관계는 인과관계가 아니다: 통계의 귀여운 사기극</text>

    <!-- Ice cream vs Shark Attacks -->
    <g transform="translate(100, 150)">
        <rect x="-80" y="-80" width="160" height="120" fill="#fff5f5" stroke="#ff8787" stroke-width="2" rx="8" />
        <text x="0" y="-55" fill="#c92a2a" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">아이스크림 🍦</text>

        <path d="M -40 -30 L 40 10" fill="none" stroke="#fa5252" stroke-width="4" marker-end="url(#arrow-red)" />

        <circle cx="-30" cy="-20" r="3" fill="#c92a2a" />
        <circle cx="-10" cy="-15" r="3" fill="#c92a2a" />
        <circle cx="10" cy="-5" r="3" fill="#c92a2a" />
        <circle cx="20" cy="5" r="3" fill="#c92a2a" />

        <text x="0" y="30" fill="#495057" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">판매량 폭증!</text>
    </g>

    <!-- The "Fake" connection -->
    <path d="M 180 110 L 250 110" fill="none" stroke="#495057" stroke-width="3" stroke-dasharray="5,5"
        marker-end="url(#arrow-grey)" />
    <circle cx="215" cy="110" r="15" fill="#fcc419" />
    <text x="215" y="115" fill="#fff" font-size="16" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">?</text>

    <text x="215" y="80" fill="#e03131" font-size="14" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">원인?</text>

    <g transform="translate(350, 150)">
        <rect x="-80" y="-80" width="160" height="120" fill="#fff5f5" stroke="#ff8787" stroke-width="2" rx="8" />
        <text x="0" y="-55" fill="#c92a2a" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">상어 공격 🦈</text>

        <path d="M -40 -30 L 40 10" fill="none" stroke="#fa5252" stroke-width="4" marker-end="url(#arrow-red)" />

        <circle cx="-30" cy="-20" r="3" fill="#c92a2a" />
        <circle cx="-10" cy="-15" r="3" fill="#c92a2a" />
        <circle cx="10" cy="-5" r="3" fill="#c92a2a" />
        <circle cx="20" cy="5" r="3" fill="#c92a2a" />

        <text x="0" y="30" fill="#495057" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">사망자 폭증!</text>
    </g>

    <!-- The Real Cause (Hidden variable) -->
    <g transform="translate(225, 230)">
        <rect x="-100" y="-30" width="200" height="40" fill="#e3fafc" stroke="#0c8599" stroke-width="2" rx="20" />
        <text x="0" y="-5" fill="#0b7285" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">⭐ 숨겨진 제3의 변수: 여름 (폭염)</text>
        <path d="M -50 -30 L -100 -80" fill="none" stroke="#0c8599" stroke-width="3" marker-end="url(#arrow-teal)" />
        <path d="M 50 -30 L 100 -80" fill="none" stroke="#0c8599" stroke-width="3" marker-end="url(#arrow-teal)" />
    </g>

    <defs>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#fa5252" />
        </marker>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057" />
        </marker>
        <marker id="arrow-teal" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#0c8599" />
        </marker>
    </defs>
</svg>