<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#e8590c" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">초간단 기적의 공식: 이항분포의 기댓값과 분산 (np, npq)</text>

    <!-- Nightmare Calculation -->
    <g transform="translate(80, 150)">
        <rect x="-70" y="-80" width="140" height="120" fill="#fff5f5" stroke="#fa5252" stroke-width="2" rx="8" />
        <text x="0" y="-55" fill="#c92a2a" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">(기존) 악몽의 방식</text>

        <text x="0" y="-20" fill="#c92a2a" font-size="24" font-family="monospace" font-weight="bold"
            text-anchor="middle">E(X)</text>
        <text x="0" y="5" fill="#fa5252" font-size="12" font-family="sans-serif" text-anchor="middle">"표를 그리고 칸마다 전부
            곱함"</text>
        <text x="0" y="25" fill="#fa5252" font-size="12" font-family="sans-serif" text-anchor="middle">(100번 던지면 표가
            101개)</text>
    </g>

    <!-- Arrow -->
    <path d="M 160 110 L 220 110" fill="none" stroke="#adb5bd" stroke-width="4" marker-end="url(#arrow-grey)" />
    <text x="190" y="80" fill="#2b8a3e" font-size="16" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">치트키</text>
    <text x="190" y="100" fill="#2b8a3e" font-size="16" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">발동!</text>

    <!-- Miracle Formula -->
    <g transform="translate(350, 130)">

        <rect x="-90" y="-60" width="280" height="120" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2" rx="8" />
        <text x="50" y="-35" fill="#2b8a3e" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">이항분포 B(n, p)의 치트 공식</text>

        <!-- Mean -->
        <text x="-40" y="10" fill="#2b8a3e" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">기댓값(E)</text>
        <text x="-40" y="35" fill="#099268" font-size="24" font-family="monospace" font-weight="bold"
            text-anchor="middle">n × p</text>

        <!-- Variance -->
        <text x="60" y="10" fill="#2b8a3e" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">분산(V)</text>
        <text x="60" y="35" fill="#099268" font-size="24" font-family="monospace" font-weight="bold"
            text-anchor="middle">n p q</text>

        <!-- Std Dev -->
        <text x="150" y="10" fill="#2b8a3e" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">표준편차(σ)</text>
        <text x="150" y="35" fill="#099268" font-size="24" font-family="monospace" font-weight="bold"
            text-anchor="middle">√npq</text>

    </g>

    <!-- q definition -->
    <text x="440" y="220" fill="#868e96" font-size="12" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">* q 는 실패 확률 (1 - p)</text>

    <defs>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>