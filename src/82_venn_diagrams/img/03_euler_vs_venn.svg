<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="350">
    <defs>
        <style>
            .bg {
                fill: #f8fafc;
                rx: 10;
                stroke: #cbd5e1;
                stroke-width: 2;
            }

            /* Venn / Euler Sets */
            .set-u {
                fill: none;
                stroke: #64748b;
                stroke-width: 2.5;
                stroke-dasharray: 6 4;
            }

            .set-a {
                fill: #ef4444;
                fill-opacity: 0.15;
                stroke: #dc2626;
                stroke-width: 3;
            }

            .set-b {
                fill: #3b82f6;
                fill-opacity: 0.15;
                stroke: #2563eb;
                stroke-width: 3;
            }

            /* Text */
            .title {
                font-family: 'Pretendard', sans-serif;
                font-size: 20px;
                fill: #0f172a;
                font-weight: bold;
                text-anchor: middle;
            }

            .big-label {
                font-family: 'Pretendard', sans-serif;
                font-size: 24px;
                font-weight: 800;
                text-anchor: middle;
            }

            .small-label {
                font-family: 'Courier New', monospace;
                font-size: 16px;
                font-weight: bold;
                text-anchor: middle;
                dominant-baseline: middle;
                fill: #1e293b;
            }

            .desc {
                font-family: 'Pretendard', sans-serif;
                font-size: 14px;
                fill: #64748b;
                text-anchor: middle;
            }

            .desc-highlight {
                font-family: 'Pretendard', sans-serif;
                font-size: 15px;
                fill: #dc2626;
                font-weight: bold;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <!-- Title -->
    <text x="300" y="40" class="title">오일러 다이어그램 vs 벤 다이어그램 (교집합이 없는 경우)</text>

    <!-- Left: Euler Diagram -->
    <g transform="translate(150, 180)">
        <!-- Title -->
        <text x="0" y="-100" class="big-label" fill="#0f172a">오일러 (Euler)</text>

        <!-- Sets -->
        <circle cx="-50" cy="10" r="50" class="set-a" />
        <text x="-50" y="10" class="small-label" fill="#dc2626">A (홀수)</text>

        <circle cx="60" cy="10" r="40" class="set-b" />
        <text x="60" y="10" class="small-label" fill="#2563eb">B (짝수)</text>

        <!-- Description -->
        <text x="0" y="85" class="desc">"안 겹치면? 아예 떨어뜨려 그려!"</text>
        <text x="0" y="105" class="desc">(직관적이고 현실 지향적)</text>
    </g>

    <!-- Divider Line -->
    <line x1="300" y1="70" x2="300" y2="300" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 4" />

    <!-- Right: Venn Diagram -->
    <g transform="translate(450, 180)">
        <!-- Title -->
        <text x="0" y="-100" class="big-label" fill="#0f172a">벤 (Venn)</text>

        <!-- Sets (Forced Intersection) -->
        <circle cx="-35" cy="10" r="55" class="set-a" />
        <text x="-65" y="10" class="small-label" fill="#dc2626">A</text>

        <circle cx="35" cy="10" r="55" class="set-b" />
        <text x="65" y="10" class="small-label" fill="#2563eb">B</text>

        <!-- Empty Intersection Indicator -->
        <text x="0" y="10" class="small-label" fill="#0f172a" font-size="20px">∅</text>
        <text x="0" y="30" class="desc-highlight">(공집합)</text>

        <!-- Description -->
        <text x="0" y="85" class="desc">"안 겹쳐도 무조건 교차시켜!"</text>
        <text x="0" y="105" class="desc">(모든 논리적 가능성 우선, 겹친 곳은 비움)</text>
    </g>

    <text x="300" y="335" class="desc" fill="#0f172a" font-weight="bold">※ 벤 다이어그램은 존재하지 않는 부분까지도 수학적/논리적으로 엄격하게 그려넣어
        공집합(∅)으로 처리함</text>

</svg>