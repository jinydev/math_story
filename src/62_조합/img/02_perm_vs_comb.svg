<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
    <rect width="600" height="300" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#c92a2a" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">두 번째 선택: '순열(P)과 조합(C)의 숙명적 관계'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"일단 뽑고(C), 나중에 서열을 주어 일렬로 배치한다(!). P = C ×
        r!"</text>

    <!-- Permutation Side (The Overcounted Universe) -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="180" height="180" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="90" y="25" fill="#c92a2a" font-size="14" font-weight="bold" text-anchor="middle">순열 (Permutation,
            P)</text>
        <text x="90" y="45" fill="#495057" font-size="11" text-anchor="middle">"의자에 직급(서열) 이 존재한다"</text>

        <!-- 6 variations of A,B,C -->
        <rect x="20" y="60" width="140" height="100" fill="#fff5f5" stroke="#fa5252" rx="5" stroke-dasharray="2,2" />
        <text x="80" y="80" fill="#c92a2a" font-size="14" font-family="monospace" text-anchor="middle">A-B-C</text>
        <text x="80" y="95" fill="#c92a2a" font-size="14" font-family="monospace" text-anchor="middle">A-C-B</text>
        <text x="80" y="110" fill="#c92a2a" font-size="14" font-family="monospace" text-anchor="middle">B-A-C</text>
        <text x="80" y="125" fill="#c92a2a" font-size="14" font-family="monospace" text-anchor="middle">B-C-A</text>
        <text x="80" y="140" fill="#c92a2a" font-size="14" font-family="monospace" text-anchor="middle">C-A-B</text>
        <text x="80" y="155" fill="#c92a2a" font-size="14" font-family="monospace" text-anchor="middle">C-B-A</text>

        <!-- r! label -->
        <text x="120" y="105" fill="#fa5252" font-size="11" font-weight="bold">총 3!개</text>
        <text x="120" y="120" fill="#fa5252" font-size="11" font-weight="bold">(6가지)</text>
    </g>

    <!-- Transformation Machine -->
    <g transform="translate(250, 140)">
        <path d="M 0 0 L 70 0" fill="none" stroke="#adb5bd" stroke-width="4" marker-end="url(#arrow)" />
        <!-- dividing action -->
        <rect x="15" y="-25" width="40" height="20" fill="#f8f9fa" stroke="#495057" rx="3" />
        <text x="35" y="-10" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">÷ 3!</text>
        <text x="35" y="20" fill="#495057" font-size="10" text-anchor="middle">나누기(뭉개기)</text>
    </g>

    <!-- Combination Side (The Compressed Universe) -->
    <g transform="translate(350, 80)">
        <rect x="0" y="0" width="180" height="180" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="90" y="25" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">조합 (Combination,
            C)</text>
        <text x="90" y="45" fill="#495057" font-size="11" text-anchor="middle">"우리는 그냥 한 팀 덩어리다"</text>

        <!-- The Single Bowl -->
        <path d="M 40 90 Q 40 160 90 160 Q 140 160 140 90" fill="#e7f5ff" stroke="#339af0" stroke-width="3" />
        <ellipse cx="90" cy="90" rx="50" ry="15" fill="#d0ebff" stroke="#339af0" stroke-width="2" />

        <text x="75" y="120" font-size="18" font-family="monospace">A</text>
        <text x="105" y="120" font-size="18" font-family="monospace">B</text>
        <text x="90" y="145" font-size="18" font-family="monospace">C</text>

        <!-- Single group label -->
        <text x="90" y="175" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">단 1가지의 묶음(Set)</text>
    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>