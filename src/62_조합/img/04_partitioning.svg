<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
    <rect width="600" height="300" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#0b7285" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">네 번째 선택: '조 나누기 (Partitioning)'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"6명을 똑같은 크기(2명, 2명, 2명) 의 방 3개에 밀어 넣을 때 발생하는
        중복 대참사"</text>

    <!-- Total Group (6) -->
    <g transform="translate(60, 70)">
        <rect x="0" y="0" width="100" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="50" y="25" fill="#0b7285" font-size="14" font-weight="bold" text-anchor="middle">총 6명</text>

        <text x="30" y="60" font-size="24">👩</text>
        <text x="70" y="60" font-size="24">👦</text>
        <text x="30" y="100" font-size="24">👨</text>
        <text x="70" y="100" font-size="24">👧</text>
        <text x="30" y="140" font-size="24">👴</text>
        <text x="70" y="140" font-size="24">👵</text>
    </g>

    <!-- Step 1: Picking Combinations -->
    <path d="M 170 145 L 210 145" fill="none" stroke="#adb5bd" stroke-width="4" marker-end="url(#arrow)" />
    <text x="190" y="130" fill="#495057" font-size="11" font-weight="bold" text-anchor="middle">팀 짜기</text>

    <!-- Three Rooms -->
    <g transform="translate(230, 70)">
        <!-- Room 1 -->
        <rect x="0" y="0" width="80" height="90" fill="#e3fafc" stroke="#0c8599" rx="5" stroke-dasharray="2,2" />
        <text x="40" y="25" fill="#0c8599" font-size="12" font-weight="bold" text-anchor="middle">A조 (2명)</text>
        <text x="25" y="65" font-size="20">👩</text>
        <text x="55" y="65" font-size="20">👦</text>
        <text x="40" y="105" fill="#c92a2a" font-size="11" font-weight="bold" text-anchor="middle">6 C 2</text>

        <text x="95" y="50" font-size="16" font-weight="bold">×</text>

        <!-- Room 2 -->
        <rect x="110" y="0" width="80" height="90" fill="#e3fafc" stroke="#0c8599" rx="5" stroke-dasharray="2,2" />
        <text x="150" y="25" fill="#0c8599" font-size="12" font-weight="bold" text-anchor="middle">B조 (2명)</text>
        <text x="135" y="65" font-size="20">👨</text>
        <text x="165" y="65" font-size="20">👧</text>
        <text x="150" y="105" fill="#c92a2a" font-size="11" font-weight="bold" text-anchor="middle">4 C 2</text>

        <text x="205" y="50" font-size="16" font-weight="bold">×</text>

        <!-- Room 3 -->
        <rect x="220" y="0" width="80" height="90" fill="#e3fafc" stroke="#0c8599" rx="5" stroke-dasharray="2,2" />
        <text x="260" y="25" fill="#0c8599" font-size="12" font-weight="bold" text-anchor="middle">C조 (2명)</text>
        <text x="245" y="65" font-size="20">👴</text>
        <text x="275" y="65" font-size="20">👵</text>
        <text x="260" y="105" fill="#c92a2a" font-size="11" font-weight="bold" text-anchor="middle">2 C 2</text>
    </g>

    <!-- Step 2: The Crash (Divider) -->
    <g transform="translate(230, 190)">
        <rect x="0" y="0" width="300" height="60" fill="#fff5f5" stroke="#fa5252" rx="5" />
        <text x="150" y="20" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">🚨 비상경보!</text>
        <text x="150" y="38" fill="#495057" font-size="11" text-anchor="middle">"방의 크기가 전부 2명으로 (A조, B조, C조) 이름(서열) 이
            없잖아!"</text>
        <text x="150" y="52" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">방 3개가 서로 지들끼리 섞이는
            '3!' 경우만큼 가짜가 복제됨.</text>

        <text x="320" y="35" fill="#fa5252" font-size="14" font-weight="bold" font-family="monospace">÷ 3!</text>
    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>