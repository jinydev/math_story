<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="600">
    <defs>
        <style>
            .bg {
                fill: #f8fafc;
                rx: 12;
                stroke: #e2e8f0;
                stroke-width: 2;
            }

            /* Tree Edges */
            .edge {
                stroke: #cbd5e1;
                stroke-width: 3;
                fill: none;
            }

            .edge-active {
                stroke: #3b82f6;
                stroke-width: 4;
                fill: none;
            }

            .edge-error {
                stroke: #ef4444;
                stroke-width: 4;
                fill: none;
                stroke-dasharray: 6 6;
            }

            /* Nodes */
            .root-node {
                fill: #1e40af;
                stroke: #60a5fa;
                stroke-width: 4;
                r: 24;
            }

            .dir-node {
                fill: #3b82f6;
                stroke: #93c5fd;
                stroke-width: 3;
                r: 20;
            }

            .file-node {
                fill: #10b981;
                stroke: #6ee7b7;
                stroke-width: 3;
                r: 16;
            }

            .error-node {
                fill: #ef4444;
                stroke: #fca5a5;
                stroke-width: 3;
                r: 20;
            }

            .node-text {
                font-family: 'Pretendard', 'Courier New', sans-serif;
                font-size: 14px;
                font-weight: bold;
                fill: #ffffff;
                text-anchor: middle;
                dominant-baseline: central;
            }

            .label-text {
                font-family: 'Pretendard', sans-serif;
                font-size: 14px;
                font-weight: bold;
                fill: #475569;
                text-anchor: middle;
            }

            /* Explanations */
            .title {
                font-family: 'Pretendard', sans-serif;
                font-size: 26px;
                fill: #0f172a;
                font-weight: bold;
                text-anchor: middle;
            }

            .subtitle {
                font-family: 'Pretendard', sans-serif;
                font-size: 16px;
                fill: #64748b;
                font-weight: normal;
                text-anchor: middle;
            }

            .box {
                fill: #ffffff;
                stroke: #94a3b8;
                stroke-width: 1;
                rx: 6;
            }

            .box-text {
                font-family: 'Pretendard', sans-serif;
                font-size: 15px;
                fill: #334155;
            }

            .red-text {
                fill: #ef4444;
                font-weight: bold;
            }
        </style>
    </defs>

    <!-- Base -->
    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="45" class="title">수형도(Tree): 회로(Cycle)를 거부하는 무결점 생태계</text>
    <text x="400" y="70" class="subtitle">위에서 아래로 분기만 할 뿐, 절대 한 바퀴 꼬이지 않는 컴퓨터 파일 시스템의 뼈대</text>

    <!-- ===============================
       LEFT: 정상적인 폴더 트리 시스템
       =============================== -->
    <g transform="translate(200, 150)">

        <!-- Edges for Normal Tree -->
        <path d="M 0,0 L -100,80" class="edge-active" />
        <path d="M 0,0 L 100,80" class="edge-active" />

        <path d="M -100,80 L -150,160" class="edge-active" />
        <path d="M -100,80 L -50,160" class="edge-active" />

        <path d="M 100,80 L 50,160" class="edge-active" />
        <path d="M 100,80 L 150,160" class="edge-active" />

        <path d="M -50,160 L -80,240" class="edge-active" />
        <path d="M -50,160 L -20,240" class="edge-active" />

        <!-- Nodes -->
        <!-- Level 1 (Root) -->
        <circle cx="0" cy="0" class="root-node" /> <text x="0" y="0" class="node-text">C:\</text>

        <!-- Level 2 -->
        <circle cx="-100" cy="80" class="dir-node" /> <text x="-100" y="80" class="node-text">User</text>
        <circle cx="100" cy="80" class="dir-node" /> <text x="100" y="80" class="node-text">Prog</text>

        <!-- Level 3 -->
        <circle cx="-150" cy="160" class="file-node" /> <text x="-150" y="160" class="node-text">A.txt</text>
        <circle cx="-50" cy="160" class="dir-node" /> <text x="-50" y="160" class="node-text">Doc</text>
        <circle cx="50" cy="160" class="file-node" /> <text x="50" y="160" class="node-text">X.exe</text>
        <circle cx="150" cy="160" class="file-node" /> <text x="150" y="160" class="node-text">Y.dll</text>

        <!-- Level 4 -->
        <circle cx="-80" cy="240" class="file-node" /> <text x="-80" y="240" class="node-text">M.doc</text>
        <circle cx="-20" cy="240" class="file-node" /> <text x="-20" y="240" class="node-text">N.pdf</text>

        <!-- Info Box -->
        <rect x="-100" y="280" width="200" height="50" class="box" />
        <text x="0" y="300" font-family="'Pretendard', sans-serif" font-size="14px" fill="#1d4ed8" font-weight="bold"
            text-anchor="middle">정상: 완벽한 수형도 (Tree)</text>
        <text x="0" y="318" font-family="'Pretendard', sans-serif" font-size="13px" fill="#475569"
            text-anchor="middle">어떤 노드끼리도 순환 고리가 없음</text>
    </g>


    <!-- ===============================
       RIGHT: 회로가 생겨 망가진 트리 (ERROR)
       =============================== -->
    <g transform="translate(600, 150)">

        <!-- Edges for Error Tree -->
        <path d="M 0,0 L -70,80" class="edge" />
        <path d="M 0,0 L 70,80" class="edge" />

        <path d="M -70,80 L -70,180" class="edge" />
        <path d="M 70,80 L 70,180" class="edge" />

        <!-- ERROR CYCLE EDGE (The loop) -->
        <path d="M -70,180 L 70,180" class="edge-error" />
        <path d="M -70,80 L 70,80" class="edge-error" />

        <!-- Nodes -->
        <circle cx="0" cy="0" class="root-node" /> <text x="0" y="0" class="node-text">Root</text>

        <circle cx="-70" cy="80" class="error-node" /> <text x="-70" y="80" class="node-text">D1</text>
        <circle cx="70" cy="80" class="error-node" /> <text x="70" y="80" class="node-text">D2</text>

        <circle cx="-70" cy="180" class="error-node" /> <text x="-70" y="180" class="node-text">F1</text>
        <circle cx="70" cy="180" class="error-node" /> <text x="70" y="180" class="node-text">F2</text>

        <!-- Cycle Annotation -->
        <path d="M -20,130 C 0,100 40,100 20,130 C 0,160 -40,160 -20,130" stroke="#ef4444" stroke-width="3" fill="none"
            opacity="0.5" />
        <text x="0" y="135" class="red-text" text-anchor="middle" font-size="18px">무한 루프 늪!</text>

        <!-- Info Box -->
        <rect x="-100" y="280" width="200" height="50" class="box" stroke="#ef4444" />
        <text x="0" y="300" font-family="'Pretendard', sans-serif" font-size="14px" class="red-text"
            text-anchor="middle">오류: 회로(Cycle) 발생</text>
        <text x="0" y="318" font-family="'Pretendard', sans-serif" font-size="13px" fill="#475569"
            text-anchor="middle">트리 아님. 탐색 시 영원히 갇힘</text>
    </g>

    <!-- Bottom Global Info Box -->
    <rect x="50" y="520" width="700" height="50" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2" />
    <text x="400" y="550" font-family="'Pretendard', sans-serif" font-size="16px" fill="#0369a1" font-weight="bold"
        text-anchor="middle">
        수형도의 강력한 제1법칙: [점의 개수(V) - 1 = 무조건 선의 개수(E)] 이 규칙을 벗어나 꼬이면 그 즉시 회로가 생겨버린다!
    </text>

</svg>