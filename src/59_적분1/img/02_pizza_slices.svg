<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 1. 4조각 피자 -->
  <circle cx="100" cy="100" r="50" fill="#f4a261" stroke="#e76f51" stroke-width="4"/>
  <line x1="100" y1="50" x2="100" y2="150" stroke="#e76f51" stroke-width="3"/>
  <line x1="50" y1="100" x2="150" y2="100" stroke="#e76f51" stroke-width="3"/>
  <text x="100" y="180" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">4조각으로 자른다</text>
  
  <!-- 화살표 1 -->
  <path d="M160 100 L 190 100 L 180 90 M 190 100 L 180 110" fill="none" stroke="#666" stroke-width="3"/>
  
  <!-- 2. 지그재그 테트리스 -->
  <!-- 위쪽 조각들 -->
  <path d="M220 100 A 50 50 0 0 1 270 50 L 270 100 Z" fill="#f4a261" stroke="#e76f51" stroke-width="2"/>
  <path d="M290 100 A 50 50 0 0 1 340 50 L 340 100 Z" fill="#f4a261" stroke="#e76f51" stroke-width="2"/>
  <!-- 아래쪽 조각들 -->
  <path d="M255 100 A 50 50 0 0 0 305 150 L 255 150 Z" fill="#f4a261" stroke="#e76f51" stroke-width="2"/>
  <path d="M325 100 A 50 50 0 0 0 375 150 L 325 150 Z" fill="#f4a261" stroke="#e76f51" stroke-width="2"/>
  <text x="290" y="180" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">지그재그로 붙인다</text>
  
  <!-- 화살표 2 -->
  <path d="M390 100 L 420 100 L 410 90 M 420 100 L 410 110" fill="none" stroke="#666" stroke-width="3"/>
  
  <!-- 3. 무한대 (직사각형) -->
  <rect x="440" y="70" width="120" height="60" fill="#f4a261" stroke="#e76f51" stroke-width="2"/>
  <!-- 세로선들 (무한 조각 표시) -->
  <line x1="450" y1="70" x2="450" y2="130" stroke="#e76f51" stroke-width="1"/>
  <line x1="460" y1="70" x2="460" y2="130" stroke="#e76f51" stroke-width="1"/>
  <line x1="470" y1="70" x2="470" y2="130" stroke="#e76f51" stroke-width="1"/>
  <line x1="480" y1="70" x2="480" y2="130" stroke="#e76f51" stroke-width="1"/>
  <line x1="490" y1="70" x2="490" y2="130" stroke="#e76f51" stroke-width="1"/>
  <line x1="500" y1="70" x2="500" y2="130" stroke="#e76f51" stroke-width="1"/>
  <line x1="510" y1="70" x2="510" y2="130" stroke="#e76f51" stroke-width="1"/>
  <line x1="520" y1="70" x2="520" y2="130" stroke="#e76f51" stroke-width="1"/>
  <line x1="530" y1="70" x2="530" y2="130" stroke="#e76f51" stroke-width="1"/>
  <line x1="540" y1="70" x2="540" y2="130" stroke="#e76f51" stroke-width="1"/>
  <line x1="550" y1="70" x2="550" y2="130" stroke="#e76f51" stroke-width="1"/>
  <text x="500" y="160" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e76f51" text-anchor="middle">∞</text>
  <text x="500" y="180" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">극한! 완벽한 사각형</text>
</svg>
