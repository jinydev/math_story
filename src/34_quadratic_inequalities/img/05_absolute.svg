<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#f03e3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">다섯 번째 부등식: '절댓값의 거리 감각 (|x| &lt; k)'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"절댓값은 단순한 양수화 기계가 아니다. '원점으로부터 떨어진
        거리(Distance)' 의 스캐너다!"</text>

    <!-- Left Side: |x| < 3 (Close Range) -->
    <g transform="translate(40, 80)">
        <rect x="0" y="0" width="240" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="120" y="25" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">| x | &lt; 3 (사거리 안의
            타겟)</text>

        <!-- Axes -->
        <line x1="20" y1="90" x2="220" y2="90" stroke="#495057" stroke-width="2" /> <!-- x axis -->

        <!-- Origin -->
        <circle cx="120" cy="90" r="4" fill="#212529" />
        <text x="120" y="110" font-size="12" font-weight="bold" text-anchor="middle">0 (원점)</text>

        <!-- Boundary Points -->
        <circle cx="60" cy="90" r="4" fill="#fff" stroke="#1864ab" stroke-width="2" />
        <circle cx="180" cy="90" r="4" fill="#fff" stroke="#1864ab" stroke-width="2" />
        <text x="60" y="110" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">-3</text>
        <text x="180" y="110" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">3</text>

        <!-- Range highlight (Inside) -->
        <rect x="60" y="86" width="120" height="8" fill="#e7f5ff" opacity="0.8" />
        <!-- Distance lines -->
        <path d="M 120 70 Q 150 50 180 70" fill="none" stroke="#1864ab" stroke-width="1.5" stroke-dasharray="2,2"
            marker-end="url(#arrow-blue)" />
        <text x="150" y="60" fill="#1864ab" font-size="9" text-anchor="middle">거리 3 미만</text>

        <!-- Formula translation -->
        <rect x="25" y="125" width="190" height="18" fill="#e7f5ff" rx="3" />
        <text x="120" y="138" fill="#1864ab" font-size="11" font-weight="bold" text-anchor="middle">번역: -3 &lt; x &lt;
            3</text>
    </g>

    <!-- Right Side: |x| > 3 (Out of Range) -->
    <g transform="translate(320, 80)">
        <rect x="0" y="0" width="240" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="120" y="25" fill="#e8590c" font-size="14" font-weight="bold" text-anchor="middle">| x | &gt; 3 (도망친
            타겟)</text>

        <!-- Axes -->
        <line x1="20" y1="90" x2="220" y2="90" stroke="#495057" stroke-width="2" /> <!-- x axis -->

        <!-- Origin -->
        <circle cx="120" cy="90" r="4" fill="#212529" />
        <text x="120" y="110" font-size="12" font-weight="bold" text-anchor="middle">0 (원점)</text>

        <!-- Boundary Points -->
        <circle cx="60" cy="90" r="4" fill="#fff" stroke="#e8590c" stroke-width="2" />
        <circle cx="180" cy="90" r="4" fill="#fff" stroke="#e8590c" stroke-width="2" />
        <text x="60" y="110" fill="#e8590c" font-size="12" font-weight="bold" text-anchor="middle">-3</text>
        <text x="180" y="110" fill="#e8590c" font-size="12" font-weight="bold" text-anchor="middle">3</text>

        <!-- Range highlight (Outside) -->
        <line x1="60" y1="88" x2="20" y2="88" stroke="#fcc419" stroke-width="5" opacity="0.8"
            marker-end="url(#arrow-orange-left)" />
        <line x1="180" y1="88" x2="220" y2="88" stroke="#fcc419" stroke-width="5" opacity="0.8"
            marker-end="url(#arrow-orange-right)" />

        <!-- Distance lines -->
        <path d="M 120 70 Q 170 30 200 70" fill="none" stroke="#e8590c" stroke-width="1.5" stroke-dasharray="2,2"
            marker-end="url(#arrow-orange)" />
        <text x="160" y="45" fill="#e8590c" font-size="9" text-anchor="middle">거리 3 초과 쭈욱~</text>

        <!-- Formula translation -->
        <rect x="25" y="125" width="190" height="18" fill="#fff4e6" rx="3" />
        <text x="120" y="138" fill="#e8590c" font-size="11" font-weight="bold" text-anchor="middle">번역: x &lt; -3 또는 x
            &gt; 3</text>
    </g>

    <defs>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#1864ab" />
        </marker>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8590c" />
        </marker>
        <marker id="arrow-orange-left" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#fcc419" />
        </marker>
        <marker id="arrow-orange-right" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#fcc419" />
        </marker>
    </defs>
</svg>