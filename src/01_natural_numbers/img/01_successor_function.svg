<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300">
    <rect width="700" height="300" fill="#212529" rx="15" />

    <text x="350" y="40" fill="#69db7c" font-size="22" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">페아노 공리 2: 영원히 +1을 가동하는 Successor 함수 엔진</text>

    <!-- Factory Conveyor Belt -->
    <line x1="50" y1="200" x2="650" y2="200" stroke="#495057" stroke-width="15" />
    <line x1="50" y1="210" x2="650" y2="210" stroke="#868e96" stroke-width="2" stroke-dasharray="20,10" />

    <!-- Successor Machine Box -->
    <rect x="250" y="100" width="120" height="130" fill="#343a40" stroke="#38d9a9" stroke-width="4" rx="10" />
    <text x="310" y="135" fill="#38d9a9" font-size="24" font-weight="bold" font-family="monospace"
        text-anchor="middle">S( n )</text>
    <text x="310" y="170" fill="#a9e34b" font-size="18" font-weight="bold" text-anchor="middle">n + 1</text>
    <circle cx="310" cy="200" r="20" fill="#2b8a3e" />

    <!-- Seed Entry -->
    <circle cx="100" cy="180" r="25" fill="#fcc419" />
    <text x="100" y="188" fill="#212529" font-size="24" font-weight="bold" font-family="monospace"
        text-anchor="middle">1</text>
    <text x="100" y="140" fill="#ffd43b" font-size="14" font-weight="bold" text-anchor="middle">SEED(씨앗)</text>
    <line x1="130" y1="180" x2="240" y2="180" stroke="#ffd43b" stroke-width="4" stroke-dasharray="8,4"
        marker-end="url(#arrow-yellow)" />

    <!-- Output Generation -->
    <line x1="380" y1="180" x2="440" y2="180" stroke="#38d9a9" stroke-width="4" stroke-dasharray="8,4"
        marker-end="url(#arrow-green)" />

    <circle cx="480" cy="180" r="25" fill="#69db7c" />
    <text x="480" y="188" fill="#212529" font-size="24" font-weight="bold" font-family="monospace"
        text-anchor="middle">2</text>

    <circle cx="580" cy="180" r="25" fill="#69db7c" />
    <text x="580" y="188" fill="#212529" font-size="24" font-weight="bold" font-family="monospace"
        text-anchor="middle">3</text>

    <!-- Curved loop to show recursion -->
    <path d="M 480 150 Q 380 50 250 120" fill="none" stroke="#22b8cf" stroke-width="4" marker-end="url(#arrow-blue)" />
    <text x="375" y="90" fill="#3bc9db" font-size="14" font-weight="bold" text-anchor="middle">다시 자신을 넣는다 (재귀)</text>

    <!-- Result text -->
    <text x="530" y="110" fill="#69db7c" font-size="14" font-family="monospace" font-weight="bold"
        text-anchor="middle">2 = S(1)</text>
    <text x="620" y="110" fill="#69db7c" font-size="14" font-family="monospace" font-weight="bold"
        text-anchor="middle">3 = S(S(1))</text>

    <defs>
        <marker id="arrow-yellow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd43b" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#38d9a9" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#22b8cf" />
        </marker>
    </defs>
</svg>