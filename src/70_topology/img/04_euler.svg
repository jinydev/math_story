<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#2b8a3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">네 번째 규칙: '오일러의 다면체 정리 (V - E + F = 2)'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"우주에 존재하는 모든 점, 선, 면을 다 구부려도 이 숫자의 조합은
        불변한다!"</text>

    <!-- Left: Cube -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">정육면체 (Cube)</text>

        <!-- 3D Cube Projection -->
        <path d="M 60 70 L 120 70 L 140 50 L 80 50 Z" fill="#e7f5ff" fill-opacity="0.7" stroke="#339af0"
            stroke-width="2" />
        <path d="M 60 70 L 60 130 L 120 130 L 120 70 Z" fill="#d0ebff" fill-opacity="0.8" stroke="#339af0"
            stroke-width="2" />
        <path d="M 120 70 L 140 50 L 140 110 L 120 130 Z" fill="#b9dfef" fill-opacity="0.9" stroke="#339af0"
            stroke-width="2" />

        <text x="30" y="60" fill="#e8590c" font-size="11" font-weight="bold">V(점): 8</text>
        <text x="30" y="75" fill="#2b8a3e" font-size="11" font-weight="bold">E(선): 12</text>
        <text x="30" y="90" fill="#862e9c" font-size="11" font-weight="bold">F(면): 6</text>

        <!-- Formula Calculation -->
        <rect x="15" y="125" width="190" height="18" fill="#f1f3f5" />
        <text x="110" y="138" fill="#212529" font-size="12" font-family="monospace" font-weight="bold"
            text-anchor="middle">8 - 12 + 6 = 2</text>
    </g>

    <!-- Divider -->
    <path d="M 290 145 C 300 120, 300 170, 310 145" fill="none" stroke="#2b8a3e" stroke-width="3" />
    <text x="300" y="125" fill="#2b8a3e" font-size="20" font-weight="bold" text-anchor="middle">=</text>

    <!-- Right: Tetrahedron or abstract Blob -->
    <g transform="translate(320, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#e8590c" font-size="14" font-weight="bold" text-anchor="middle">정사면체
            (Tetrahedron)</text>

        <!-- 3D Tetrahedron Projection -->
        <path d="M 110 50 L 60 120 L 160 120 Z" fill="#ffe3e3" fill-opacity="0.7" stroke="#fa5252" stroke-width="2" />
        <path d="M 110 50 L 100 100 L 160 120 Z" fill="#ffc9c9" fill-opacity="0.8" stroke="#fa5252" stroke-width="2" />
        <path d="M 110 50 L 60 120 L 100 100 Z" fill="#ffa8a8" fill-opacity="0.9" stroke="#fa5252" stroke-width="2" />

        <!-- Dashed hidden line -->
        <!-- <line x1="60" y1="120" x2="160" y2="120" stroke="#fa5252" stroke-dasharray="2,2"/> -->

        <text x="170" y="60" fill="#e8590c" font-size="11" font-weight="bold">V(점): 4</text>
        <text x="170" y="75" fill="#2b8a3e" font-size="11" font-weight="bold">E(선): 6</text>
        <text x="170" y="90" fill="#862e9c" font-size="11" font-weight="bold">F(면): 4</text>

        <!-- Formula Calculation -->
        <rect x="15" y="125" width="190" height="18" fill="#f1f3f5" />
        <text x="110" y="138" fill="#212529" font-size="12" font-family="monospace" font-weight="bold"
            text-anchor="middle">4 - 6 + 4 = 2</text>
    </g>

</svg>