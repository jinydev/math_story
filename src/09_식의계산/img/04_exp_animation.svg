<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <style>
      .merge-anim { animation: merge 4s infinite ease-in-out; }
      .final-appear { animation: appear 4s infinite ease-in-out; }
      
      @keyframes merge {
        0%, 20% { transform: translateY(0); opacity: 1; }
        40%, 80% { transform: translateY(60px); opacity: 0; }
        90%, 100% { transform: translateY(0); opacity: 1; }
      }
      @keyframes appear {
        0%, 30% { opacity: 0; }
        40%, 80% { opacity: 1; }
        90%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="800" height="300" fill="url(#bg)" rx="10"/>

  <text x="400" y="40" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#f8fafc" text-anchor="middle">지수법칙: 곱셈은 덧셈으로 (Exponent Addition)</text>

  <g transform="translate(250, 120)">
    <!-- Base text -->
    <g class="merge-anim">
      <text x="0" y="0" font-family="'Courier New', monospace" font-size="60" font-weight="bold" fill="#38bdf8" text-anchor="middle">a</text>
      <text x="20" y="-30" font-family="'Courier New', monospace" font-size="30" font-weight="bold" fill="#facc15" text-anchor="left">2</text>

      <text x="80" y="0" font-family="'Courier New', monospace" font-size="60" font-weight="bold" fill="#f8fafc" text-anchor="middle">×</text>

      <text x="160" y="0" font-family="'Courier New', monospace" font-size="60" font-weight="bold" fill="#38bdf8" text-anchor="middle">a</text>
      <text x="180" y="-30" font-family="'Courier New', monospace" font-size="30" font-weight="bold" fill="#facc15" text-anchor="left">3</text>
    </g>
    
    <!-- Final Result -->
    <g transform="translate(80, 80)" class="final-appear">
      <text x="0" y="0" font-family="'Courier New', monospace" font-size="60" font-weight="bold" fill="#f8fafc" text-anchor="middle">=</text>
      <text x="80" y="0" font-family="'Courier New', monospace" font-size="80" font-weight="bold" fill="#38bdf8" text-anchor="middle">a</text>
      <text x="120" y="-40" font-family="'Courier New', monospace" font-size="30" font-weight="bold" fill="#facc15" text-anchor="left">2+3</text>
      <text x="240" y="0" font-family="'Courier New', monospace" font-size="60" font-weight="bold" fill="#f8fafc" text-anchor="middle">=</text>
      <text x="320" y="0" font-family="'Courier New', monospace" font-size="80" font-weight="bold" fill="#34d399" text-anchor="middle">a</text>
      <text x="350" y="-40" font-family="'Courier New', monospace" font-size="40" font-weight="bold" fill="#34d399" text-anchor="left">5</text>
    </g>
  </g>

</svg>
