<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="machine-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="screen-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>

    <!-- Neon Glow -->
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="10"/>

  <!-- Title -->
  <text x="400" y="40" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#f8fafc" text-anchor="middle">대입 (Substitution) = 자판기(함수)에 동전(숫자) 넣기</text>

  <!-- Input Coin -->
  <g transform="translate(150, 150)">
    <circle cx="40" cy="40" r="30" fill="#fbbf24" stroke="#f59e0b" stroke-width="4"/>
    <text x="40" y="48" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#78350f" text-anchor="middle">x=3</text>
    
    <!-- Movement line -->
    <path d="M 80 40 L 160 40" fill="none" stroke="#fbbf24" stroke-width="4" stroke-dasharray="8 8" class="dash-anim"/>
    <polygon points="160,35 170,40 160,45" fill="#fbbf24"/>
  </g>

  <!-- Vending Machine (Formula Box) -->
  <g transform="translate(340, 100)">
    <!-- Machine Base -->
    <rect x="0" y="0" width="180" height="240" rx="10" fill="url(#machine-grad)" stroke="#475569" stroke-width="3"/>
    
    <!-- Top Sign -->
    <rect x="20" y="10" width="140" height="30" rx="5" fill="#0f172a"/>
    <text x="90" y="30" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#38bdf8" text-anchor="middle" filter="url(#neon)">MATH MACHINE</text>
    
    <!-- Screen -->
    <rect x="20" y="60" width="140" height="80" rx="5" fill="url(#screen-grad)" stroke="#10b981" stroke-width="2"/>
    <text x="90" y="90" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#34d399" text-anchor="middle" filter="url(#neon)">Formula:</text>
    <text x="90" y="120" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#a7f3d0" text-anchor="middle" filter="url(#neon)">2x + 5</text>

    <!-- Slot -->
    <rect x="10" y="100" width="5" height="40" fill="#000000"/> <!-- Fake side slot -->
    
    <!-- Dispenser -->
    <rect x="40" y="180" width="100" height="30" rx="5" fill="#0f172a" stroke="#475569" stroke-width="2"/>
  </g>

  <!-- Output Product -->
  <g transform="translate(560, 260)">
     <!-- Movement line -->
    <path d="M -30 30 L 30 30" fill="none" stroke="#38bdf8" stroke-width="4" stroke-dasharray="8 8"/>
    <polygon points="30,25 40,30 30,35" fill="#38bdf8"/>

    <!-- The Product -->
    <rect x="60" y="5" width="80" height="50" rx="10" fill="#38bdf8" filter="url(#neon)"/>
    <text x="100" y="35" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#0f172a" text-anchor="middle">11</text>
    <text x="100" y="75" font-family="'Inter', sans-serif" font-size="16" fill="#e2e8f0" text-anchor="middle">결과값 (Result)</text>
  </g>

</svg>
