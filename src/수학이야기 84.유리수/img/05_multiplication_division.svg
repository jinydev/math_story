<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A202C" />
      <stop offset="100%" stop-color="#2D3748" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" rx="15" />

  <text x="400" y="50" font-family="'Inter', sans-serif" font-size="28" font-weight="bold" fill="#F7FAFC" text-anchor="middle" filter="url(#glow)">곱셈과 역수 (Multiplication &amp; Reciprocal)</text>
  <text x="400" y="80" font-family="'Inter', sans-serif" font-size="16" fill="#A0AEC0" text-anchor="middle">나누기 기호는 항상 등 뒤의 적(분수)을 위아래로 거꾸로 뒤집어버립니다.</text>

  <!-- Left Side: Multiplication Example -->
  <g transform="translate(100, 150)">
    <text x="150" y="-30" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#4FD1C5" text-anchor="middle">1. 깔끔한 병렬 곱셈</text>
    
    <!-- frac 1 -->
    <text x="50" y="20" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#F7FAFC" text-anchor="middle">1</text>
    <line x1="30" y1="30" x2="70" y2="30" stroke="#F7FAFC" stroke-width="3"/>
    <text x="50" y="60" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#F7FAFC" text-anchor="middle">2</text>
    
    <text x="100" y="45" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#E2E8F0" text-anchor="middle">×</text>
    
    <!-- frac 2 -->
    <text x="150" y="20" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#F7FAFC" text-anchor="middle">3</text>
    <line x1="130" y1="30" x2="170" y2="30" stroke="#F7FAFC" stroke-width="3"/>
    <text x="150" y="60" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#F7FAFC" text-anchor="middle">4</text>
    
    <text x="200" y="45" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#E2E8F0" text-anchor="middle">=</text>
    
    <!-- Result -->
    <text x="250" y="20" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#4FD1C5" text-anchor="middle">3</text>
    <line x1="230" y1="30" x2="270" y2="30" stroke="#4FD1C5" stroke-width="3"/>
    <text x="250" y="60" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#4FD1C5" text-anchor="middle">8</text>

    <!-- Connectors -->
    <path d="M 75 10 Q 150 -20 225 10" fill="none" stroke="#4FD1C5" stroke-width="2" marker-end="url(#arrow_right)"/>
    <text x="150" y="0" font-family="'Inter', sans-serif" font-size="14" fill="#4FD1C5" text-anchor="middle">1 × 3</text>
    
    <path d="M 75 70 Q 150 100 225 70" fill="none" stroke="#4FD1C5" stroke-width="2" marker-end="url(#arrow_right)"/>
    <text x="150" y="95" font-family="'Inter', sans-serif" font-size="14" fill="#4FD1C5" text-anchor="middle">2 × 4</text>
  </g>

  <!-- Right Side: Division (Flip) Example -->
  <g transform="translate(450, 150)">
    <text x="150" y="-30" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#FC8181" text-anchor="middle">2. 나눗셈은 뒤집기 (역수)</text>
    
    <!-- frac 1 -->
    <text x="50" y="20" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#F7FAFC" text-anchor="middle">3</text>
    <line x1="30" y1="30" x2="70" y2="30" stroke="#F7FAFC" stroke-width="3"/>
    <text x="50" y="60" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#F7FAFC" text-anchor="middle">4</text>
    
    <text x="100" y="45" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#FC8181" text-anchor="middle">÷</text>
    
    <!-- frac 2 -->
    <text x="150" y="20" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#F6AD55" text-anchor="middle">5</text>
    <line x1="130" y1="30" x2="170" y2="30" stroke="#F6AD55" stroke-width="3"/>
    <text x="150" y="60" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#F6AD55" text-anchor="middle">2</text>
    
    <text x="200" y="45" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#E2E8F0" text-anchor="middle">?</text>
    
    <!-- Arrow point to inverted section below -->
    <path d="M 125 90 L 125 130" fill="none" stroke="#FC8181" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrow_down)"/>
  </g>

  <!-- Lower Section for Inversion -->
  <g transform="translate(450, 300)">
    <!-- frac 1 -->
    <text x="50" y="20" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#F7FAFC" text-anchor="middle">3</text>
    <line x1="30" y1="30" x2="70" y2="30" stroke="#F7FAFC" stroke-width="3"/>
    <text x="50" y="60" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#F7FAFC" text-anchor="middle">4</text>
    
    <!-- Changed to multiply -->
    <text x="100" y="45" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#4FD1C5" text-anchor="middle" filter="url(#glow)">×</text>
    
    <!-- Flipped frac 2 -->
    <text x="150" y="20" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#F6AD55" text-anchor="middle">2</text>
    <line x1="130" y1="30" x2="170" y2="30" stroke="#F6AD55" stroke-width="3"/>
    <text x="150" y="60" font-family="'Inter', sans-serif" font-size="30" font-weight="bold" fill="#F6AD55" text-anchor="middle">5</text>
    
    <!-- Swap arrow visual -->
    <path d="M 175 10 Q 200 40 175 70" fill="none" stroke="#F6AD55" stroke-width="2" marker-end="url(#arrow_up)"/>
    <path d="M 125 70 Q 100 40 125 10" fill="none" stroke="#F6AD55" stroke-width="2" marker-end="url(#arrow_up)"/>
    <text x="220" y="45" font-family="'Inter', sans-serif" font-size="14" fill="#F6AD55" text-anchor="middle">위아래</text>
    <text x="220" y="60" font-family="'Inter', sans-serif" font-size="14" fill="#F6AD55" text-anchor="middle">뒤집기!</text>
  </g>

</svg>
