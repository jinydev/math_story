<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
    <rect width="600" height="300" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#862e9c" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">여섯 번째 나열: '원순열 (Circular Permutation)'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"우주에는 시작과 끝이 없다. 동그란 탁자에서는 빙글빙글 돌면 모두 똑같은
        세계!"</text>

    <!-- Straight Line vs Circle Concept -->
    <g transform="translate(60, 70)">
        <rect x="-10" y="-10" width="460" height="200" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="220" y="15" fill="#862e9c" font-size="14" font-weight="bold" text-anchor="middle">일렬 줄 세우기(4!) vs 원탁 줄
            세우기(원순열)</text>

        <!-- Straight Line -->
        <rect x="20" y="40" width="160" height="40" fill="#f1f3f5" rx="5" />
        <text x="40" y="65" fill="#d9480f" font-size="16" font-weight="bold">A</text>
        <text x="80" y="65" fill="#2b8a3e" font-size="16" font-weight="bold">B</text>
        <text x="120" y="65" fill="#1864ab" font-size="16" font-weight="bold">C</text>
        <text x="160" y="65" fill="#f59f00" font-size="16" font-weight="bold">D</text>

        <!-- Cycle transformation -->
        <path d="M 200 60 L 250 60" fill="none" stroke="#adb5bd" stroke-width="3" stroke-dasharray="4,2"
            marker-end="url(#arrow)" />

        <!-- Circular Tables (showing rotation equals same) -->
        <!-- Table 1 -->
        <circle cx="320" cy="90" r="30" fill="#ffe3e3" stroke="#fa5252" stroke-width="2" />
        <text x="320" y="50" fill="#d9480f" font-size="14" font-weight="bold" text-anchor="middle">A</text>
        <text x="365" y="95" fill="#2b8a3e" font-size="14" font-weight="bold" text-anchor="middle">B</text>
        <text x="320" y="140" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">C</text>
        <text x="275" y="95" fill="#f59f00" font-size="14" font-weight="bold" text-anchor="middle">D</text>
        <text x="320" y="160" fill="#c92a2a" font-size="11" font-weight="bold" text-anchor="middle">(같은 우주 1)</text>

        <!-- Table 2 (rotated by 90 deg) -->
        <circle cx="430" cy="90" r="30" fill="#e7f5ff" stroke="#339af0" stroke-width="2" />
        <text x="430" y="50" fill="#f59f00" font-size="14" font-weight="bold" text-anchor="middle">D</text>
        <text x="475" y="95" fill="#d9480f" font-size="14" font-weight="bold" text-anchor="middle">A</text>
        <text x="430" y="140" fill="#2b8a3e" font-size="14" font-weight="bold" text-anchor="middle">B</text>
        <text x="385" y="95" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">C</text>
        <text x="430" y="160" fill="#1864ab" font-size="11" font-weight="bold" text-anchor="middle">(같은 우주 2 -
            회전함!)</text>

        <!-- Rule string -->
        <rect x="20" y="100" width="200" height="70" fill="#f8f9fa" />
        <text x="120" y="120" fill="#862e9c" font-size="12" font-weight="bold" text-anchor="middle">"4명이 원탁에서
            뱅글뱅글</text>
        <text x="120" y="135" fill="#862e9c" font-size="12" font-weight="bold" text-anchor="middle">자리를 한 칸씩 옮기면,</text>
        <text x="120" y="150" fill="#862e9c" font-size="12" font-weight="bold" text-anchor="middle">서로 바라보는 시야가
            똑같다!"</text>
        <text x="120" y="165" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">=> 즉 4세트가 중복된다
            (÷4)</text>

    </g>

    <!-- Final Formula Text -->
    <text x="300" y="280" fill="#e8590c" font-size="16" font-family="monospace" font-weight="bold"
        text-anchor="middle">원순열 법칙: n! ÷ n = (n-1)!</text>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>