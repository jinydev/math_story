<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#862e9c" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">네 번째 나열: '중복순열 (nΠr)'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"골랐던 녀석을 또 고르고, 자리마저 중요한 잔혹한 조합의 세계"</text>

    <!-- Physical Example: Password / Padlock -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#862e9c" font-size="14" font-weight="bold" text-anchor="middle">비밀번호 자물쇠
            (r=3칸)</text>

        <!-- Lock body -->
        <rect x="50" y="50" width="120" height="70" fill="#eebefa" rx="10" />
        <rect x="70" y="25" width="80" height="30" fill="none" stroke="#adb5bd" stroke-width="6" rx="15" />

        <!-- Dials -->
        <rect x="60" y="65" width="25" height="40" fill="#fff" stroke="#adb5bd" rx="3" />
        <text x="72.5" y="92" fill="#d9480f" font-size="16" font-weight="bold" text-anchor="middle">5</text>
        <text x="72.5" y="60" fill="#868e96" font-size="8" text-anchor="middle">▲</text>
        <text x="72.5" y="113" fill="#868e96" font-size="8" text-anchor="middle">▼</text>

        <rect x="97.5" y="65" width="25" height="40" fill="#fff" stroke="#adb5bd" rx="3" />
        <text x="110" y="92" fill="#d9480f" font-size="16" font-weight="bold" text-anchor="middle">5</text>
        <text x="110" y="60" fill="#868e96" font-size="8" text-anchor="middle">▲</text>
        <text x="110" y="113" fill="#868e96" font-size="8" text-anchor="middle">▼</text>

        <rect x="135" y="65" width="25" height="40" fill="#fff" stroke="#adb5bd" rx="3" />
        <text x="147.5" y="92" fill="#d9480f" font-size="16" font-weight="bold" text-anchor="middle">7</text>
        <text x="147.5" y="60" fill="#868e96" font-size="8" text-anchor="middle">▲</text>
        <text x="147.5" y="113" fill="#868e96" font-size="8" text-anchor="middle">▼</text>

        <text x="110" y="140" fill="#c92a2a" font-size="10" font-weight="bold" text-anchor="middle">0~9 (10개) 숫자를 중복 사용
            가능!</text>
    </g>

    <!-- Math Engine (Pi) -->
    <g transform="translate(320, 80)">
        <path d="M -20 75 L 10 75" fill="none" stroke="#adb5bd" stroke-width="3" stroke-dasharray="4,2"
            marker-end="url(#arrow)" />

        <rect x="30" y="0" width="230" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="145" y="25" fill="#0b7285" font-size="14" font-weight="bold" text-anchor="middle">수학 모델: 거듭제곱 폭탄
            (n^r)</text>

        <!-- Slot math -->
        <rect x="50" y="45" width="45" height="45" fill="#e7f5ff" rx="5" />
        <text x="72.5" y="72" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">10</text>
        <path d="M 100 65 L 115 65" stroke="#adb5bd" stroke-width="2" />
        <text x="107.5" y="60" fill="#495057" font-size="16" font-weight="bold" text-anchor="middle">×</text>

        <rect x="120" y="45" width="45" height="45" fill="#e7f5ff" rx="5" />
        <text x="142.5" y="72" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">10</text>
        <path d="M 170 65 L 185 65" stroke="#adb5bd" stroke-width="2" />
        <text x="177.5" y="60" fill="#495057" font-size="16" font-weight="bold" text-anchor="middle">×</text>

        <rect x="190" y="45" width="45" height="45" fill="#e7f5ff" rx="5" />
        <text x="212.5" y="72" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">10</text>

        <rect x="40" y="100" width="210" height="40" fill="#f8f9fa" />
        <text x="145" y="115" fill="#c92a2a" font-size="12" font-family="monospace" font-weight="bold"
            text-anchor="middle">10 Π 3 = 10³ = 1,000가지</text>
        <text x="145" y="130" fill="#495057" font-size="10" text-anchor="middle">중복허용(무제한 리필) 이 만들어낸 기하급수!</text>
    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>