<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#f08c00" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">하늘을 뚫어버리는 광기: 탄젠트함수 (tan x) 의 점근선</text>

    <!-- Axes Setup -->
    <g transform="translate(50, 140)">
        <!-- X-axis -->
        <line x1="0" y1="0" x2="500" y2="0" stroke="#868e96" stroke-width="2" />
        <path d="M 500 0 L 490 5 L 490 -5 Z" fill="#868e96" />
        <text x="500" y="-10" fill="#495057" font-size="12" font-family="sans-serif">x (라디안 각도)</text>

        <!-- Y-axis -->
        <line x1="20" y1="-80" x2="20" y2="80" stroke="#868e96" stroke-width="2" />
        <path d="M 20 -80 L 15 -70 L 25 -70 Z" fill="#868e96" />
        <text x="30" y="-75" fill="#495057" font-size="12" font-family="sans-serif">y = tan(x)</text>

        <!-- Asymptotes (점근선) -->
        <!-- PI/2 Asymptote (approx x=120 if PI=200? Wait, PI/2=120, PI=220, 3PI/2=320, 2PI=420) -->
        <line x1="120" y1="-80" x2="120" y2="80" stroke="#c92a2a" stroke-width="2" stroke-dasharray="6,4" />
        <text x="120" y="-90" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">점근선 (π/2)</text>

        <line x1="320" y1="-80" x2="320" y2="80" stroke="#c92a2a" stroke-width="2" stroke-dasharray="6,4" />
        <text x="320" y="-90" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">점근선 (3π/2)</text>

        <!-- Tangent Curves Generaton -->
        <!-- Branch 1: 0 to PI/2 (20 to 120) -->
        <path d="M 20 0 Q 70 0 110 -80" fill="none" stroke="#f59f00" stroke-width="4" />

        <!-- Branch 2: PI/2 to 3PI/2 (120 to 320), centered at PI (220) -->
        <path d="M 130 80 Q 170 0 220 0 Q 270 0 310 -80" fill="none" stroke="#f59f00" stroke-width="4" />

        <!-- Branch 3: 3PI/2 to 2PI... (320 to 420...) -->
        <path d="M 330 80 Q 370 0 420 0 Q 450 0 470 -40" fill="none" stroke="#f59f00" stroke-width="4" />

        <!-- X Points -->
        <!-- 0 -->
        <circle cx="20" cy="0" r="4" fill="#d9480f" />
        <text x="10" y="15" fill="#d9480f" font-size="12" font-family="sans-serif" text-anchor="middle">0</text>

        <!-- PI -->
        <circle cx="220" cy="0" r="4" fill="#d9480f" />
        <text x="235" y="15" fill="#d9480f" font-size="12" font-family="sans-serif" text-anchor="middle">π</text>

        <!-- 2PI -->
        <circle cx="420" cy="0" r="4" fill="#d9480f" />
        <text x="435" y="15" fill="#d9480f" font-size="12" font-family="sans-serif" text-anchor="middle">2π</text>

        <!-- Labels for infinity -->
        <text x="75" y="-50" fill="#c92a2a" font-size="10" font-family="sans-serif">무한대 폭주 🚀</text>
        <text x="275" y="-50" fill="#c92a2a" font-size="10" font-family="sans-serif">무한대 폭주 🚀</text>

    </g>
</svg>