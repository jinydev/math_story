<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#2b8a3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">한 박자 늦은 쌍둥이 형제: 코사인함수 (cos x) 의 그래프</text>

    <!-- Axes Setup -->
    <g transform="translate(50, 140)">
        <!-- X-axis -->
        <line x1="0" y1="0" x2="500" y2="0" stroke="#868e96" stroke-width="2" />
        <path d="M 500 0 L 490 5 L 490 -5 Z" fill="#868e96" />
        <text x="500" y="-10" fill="#495057" font-size="12" font-family="sans-serif">x (라디안 각도)</text>

        <!-- Y-axis -->
        <line x1="20" y1="-80" x2="20" y2="80" stroke="#868e96" stroke-width="2" />
        <path d="M 20 -80 L 15 -70 L 25 -70 Z" fill="#868e96" />
        <text x="30" y="-75" fill="#495057" font-size="12" font-family="sans-serif">y = cos(x)</text>

        <!-- Sine Wave (Faded for comparison) -->
        <path d="M 20 0 
             C 100 -120, 140 -120, 220 0 
             C 300 120,  340 120,  420 0
             C 470 -60,  490 -60,  500 -20" fill="none" stroke="#a5d8ff" stroke-width="2" stroke-dasharray="4,4" />
        <text x="260" y="-30" fill="#74c0fc" font-size="12" font-family="sans-serif">sin(x) [비교용]</text>

        <!-- Cosine Wave Generation (0 to 2*PI, slightly extended) -->
        <!-- Starts at Max (x=20, y=-60), crosses 0 at PI/2, Min at PI, crosses 0 at 3PI/2, Max at 2PI -->
        <path d="M 20 -60
             C 70 -60,   90 -30,   120 0
             C 170 60,   190 60,   220 60
             C 270 60,   290 30,   320 0
             C 370 -60,  390 -60,  420 -60
             C 470 -60,  490 -30,  500 -15" fill="none" stroke="#2b8a3e" stroke-width="4" />

        <!-- Markers -->
        <!-- Guidelines -->
        <line x1="20" y1="-60" x2="480" y2="-60" stroke="#eebefa" stroke-width="1" stroke-dasharray="4,4" />
        <line x1="20" y1="60" x2="480" y2="60" stroke="#eebefa" stroke-width="1" stroke-dasharray="4,4" />
        <text x="-5" y="-55" fill="#e03131" font-size="14" font-family="monospace">+1</text>
        <text x="-5" y="65" fill="#339af0" font-size="14" font-family="monospace">-1</text>

        <!-- X Points -->
        <!-- 0 (Peak) -->
        <circle cx="20" cy="-60" r="4" fill="#e03131" />
        <text x="10" y="-70" fill="#e03131" font-size="12" font-family="sans-serif" text-anchor="middle">0</text>

        <!-- PI / 2 (Cross zero) -->
        <circle cx="120" cy="0" r="4" fill="#2b8a3e" />
        <text x="120" y="-10" fill="#2b8a3e" font-size="12" font-family="sans-serif" text-anchor="middle">π/2</text>

        <!-- PI (Valley) -->
        <circle cx="220" cy="60" r="4" fill="#e03131" />
        <text x="220" y="75" fill="#e03131" font-size="12" font-family="sans-serif" text-anchor="middle">π</text>

        <!-- 3*PI / 2 (Cross zero) -->
        <circle cx="320" cy="0" r="4" fill="#2b8a3e" />
        <text x="320" y="15" fill="#2b8a3e" font-size="12" font-family="sans-serif" text-anchor="middle">3π/2</text>

        <!-- 2*PI (Peak) -->
        <circle cx="420" cy="-60" r="4" fill="#e03131" />
        <text x="420" y="-70" fill="#e03131" font-size="12" font-family="sans-serif" text-anchor="middle">2π</text>

        <!-- Note -->
        <rect x="230" y="80" width="220" height="25" fill="#ebfbee" rx="4" />
        <text x="340" y="97" fill="#099268" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">"sin 그래프를 왼쪽으로 90° 민 모양"</text>

    </g>
</svg>