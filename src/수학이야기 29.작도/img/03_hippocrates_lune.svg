<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="500">
    <defs>
        <style>
            .bg {
                fill: #f8fafc;
                rx: 12;
                stroke: #cbd5e1;
                stroke-width: 2;
            }

            /* Triangle */
            .triangle {
                fill: #dbeafe;
                stroke: #3b82f6;
                stroke-width: 3;
            }

            /* Circles and Arcs */
            .semicircle-base {
                fill: #f1f5f9;
                stroke: #64748b;
                stroke-width: 2;
                stroke-dasharray: 4 4;
            }

            .semicircle-ab {
                fill: #fef08a;
                stroke: #eab308;
                stroke-width: 2;
                opacity: 0.6;
            }

            .semicircle-ac {
                fill: #fef08a;
                stroke: #eab308;
                stroke-width: 2;
                opacity: 0.6;
            }

            /* Lunes */
            .lune {
                fill: #f59e0b;
                stroke: #b45309;
                stroke-width: 3;
            }

            /* Text */
            .title {
                font-family: 'Pretendard', sans-serif;
                font-size: 26px;
                fill: #0f172a;
                font-weight: bold;
                text-anchor: middle;
            }

            .subtitle {
                font-family: 'Pretendard', sans-serif;
                font-size: 16px;
                fill: #64748b;
                font-weight: normal;
                text-anchor: middle;
            }

            .label-text {
                font-family: 'Pretendard', sans-serif;
                font-size: 18px;
                font-weight: bold;
                fill: #334155;
            }

            .math-text {
                font-family: 'Courier New', monospace;
                font-size: 16px;
                font-weight: bold;
                fill: #ef4444;
            }

            /* Math block */
            .math-box {
                fill: #ffffff;
                stroke: #94a3b8;
                stroke-width: 1;
                rx: 8;
            }

            .blue-text {
                fill: #1d4ed8;
                font-weight: bold;
            }

            .orange-text {
                fill: #d97706;
                font-weight: bold;
            }
        </style>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="45" class="title">원적 문제의 첫 단추: 히포크라테스의 초승달 (Lune)</text>
    <text x="400" y="70" class="subtitle">직선으로만 이뤄진 '삼각형의 넓이'가, 곡선으로 둘러싸인 '두 개의 초승달 넓이 합'과 완벽히 일치하다!</text>

    <!-- Diagram Group -->
    <g transform="translate(150, 150)">

        <!-- Big Semicircle on Hypotenuse BC (Radius 150) -->
        <!-- Point B(0, 200), Point C(300, 200), Center(150, 200) -->
        <path d="M 0,200 A 150 150 0 0 1 300,200 L 0,200 Z" class="semicircle-base" />
        <text x="150" y="225" class="label-text" text-anchor="middle">가장 큰 반원 (지름 BC)</text>

        <!-- Medium Semicircle on Side AC (Radius 100) -->
        <!-- Point A(100, 0), Point C(300, 200), Center(200, 100) -->
        <!-- Dist AC = sqrt(200^2 + 200^2) = 282. Radius = 141.4 -->
        <!-- Exact Arc for visually fitting Lune: We create the lune by overlapping paths -->

        <!-- Right triangle ABC -->
        <!-- Angle at A is 90 degrees. Let's place A at (96, 72) for perfect right angle from circle (150,200) radius 150.
         Wait, an easier right triangle is A(0,0), B(0, 200), C(200, 0) - wait, hypotenuse would be on x axis.
         Let's use Center(150, 200), R=150. A is on the circle.
         Let A be at (150, 50). Then AB^2 + AC^2 = 150^2 + 150^2 = 45000. BC^2 = 300^2 = 90000. Correct!
         A(150, 50), B(0, 200), C(300, 200)
    -->

        <!-- Left Semicircle on AB -->
        <!-- Center of AB: (75, 125). Radius = sqrt(75^2 + 75^2) = 106.06 -->
        <path d="M 0,200 A 106.06 106.06 0 0 1 150,50 L 0,200 Z" class="semicircle-ab" />
        <text x="50" y="100" class="label-text" fill="#b45309" transform="rotate(-45, 50, 100)">반원 AB</text>

        <!-- Right Semicircle on AC -->
        <!-- Center of AC: (225, 125). Radius = 106.06 -->
        <path d="M 150,50 A 106.06 106.06 0 0 1 300,200 L 150,50 Z" class="semicircle-ac" />
        <text x="250" y="100" class="label-text" fill="#b45309" transform="rotate(45, 250, 100)">반원 AC</text>

        <!-- Base Right Triangle -->
        <path d="M 150,50 L 0,200 L 300,200 Z" class="triangle" />

        <!-- Redraw the Lune Arcs to make them pop out (The intersection difference) -->
        <!-- Left Lune -->
        <path d="M 0,200 A 106.06 106.06 0 0 1 150,50 A 150 150 0 0 0 0,200 Z" class="lune" />
        <text x="60" y="140" class="label-text" fill="#ffffff" font-size="14px">초승달 1</text>

        <!-- Right Lune -->
        <path d="M 150,50 A 106.06 106.06 0 0 1 300,200 A 150 150 0 0 0 150,50 Z" class="lune" />
        <text x="240" y="140" class="label-text" fill="#ffffff" font-size="14px">초승달 2</text>

        <!-- Right Angle symbol -->
        <rect x="140" y="60" width="10" height="10" fill="none" stroke="#3b82f6" stroke-width="2"
            transform="rotate(45, 150, 50)" />

        <!-- Nodes -->
        <circle cx="150" cy="50" r="6" fill="#1e293b" /> <text x="150" y="30" class="label-text" text-anchor="middle">A
            (직각)</text>
        <circle cx="0" cy="200" r="6" fill="#1e293b" /> <text x="-20" y="200" class="label-text">B</text>
        <circle cx="300" cy="200" r="6" fill="#1e293b" /> <text x="315" y="200" class="label-text">C</text>

    </g>

    <!-- Explanation Box -->
    <g transform="translate(500, 170)">
        <rect x="0" y="0" width="280" height="170" class="math-box" />
        <text x="20" y="30" font-family="'Pretendard', sans-serif" font-size="16px" fill="#0f172a"
            font-weight="bold">피타고라스 증명 콤보</text>

        <text x="20" y="60" class="math-text">1. AB² + AC² = BC²</text>

        <text x="20" y="85" font-family="'Pretendard', sans-serif" font-size="14px" fill="#475569">원의 넓이는 반지름² 에
            비례하므로</text>
        <text x="20" y="105" class="math-text">(반원 AB) + (반원 AC) = </text>
        <text x="20" y="125" class="math-text">(큰 반원 BC)</text>

        <text x="20" y="150" font-family="'Pretendard', sans-serif" font-size="15px">
            <tspan class="orange-text">초승달 1+2</tspan> = <tspan class="blue-text">삼각형 ABC</tspan>
        </text>
    </g>

    <rect x="50" y="420" width="700" height="50" rx="6" fill="#f8fafc" stroke="#94a3b8" />
    <text x="400" y="450" font-family="'Pretendard', sans-serif" font-size="16px" fill="#334155" text-anchor="middle">
        원적 문제: 불규칙한 곡선의 넓이를 반듯하게 똑떨어지는 다각형 면적으로 100% 치환해 내는 역사적 성과
    </text>
</svg>