<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#f59f00" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">두 번째 선택: '비둘기집의 원리 일반화 (Math.ceil)'</text>

    <!-- Title / Setup -->
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"집이 N개, 비둘기가 M마리면? 하나의 방에는 무조건 ⌈M/N⌉ 마리가
        산다!"</text>

    <!-- Generalized Problem -->
    <g transform="translate(60, 80)">

        <!-- Large Flock of Pigeons -->
        <rect x="0" y="0" width="120" height="100" fill="#fff4e6" stroke="#f59f00" stroke-width="2" rx="5" />
        <text x="60" y="30" font-size="24" text-anchor="middle">🐦🐦🐦</text>
        <text x="60" y="60" font-size="24" text-anchor="middle">🐦🐦🐦</text>
        <text x="60" y="90" font-size="24" text-anchor="middle">🐦</text>
        <text x="60" y="-10" fill="#d9480f" font-size="14" font-weight="bold" text-anchor="middle">비둘기 총 7마리 (M)</text>

        <!-- Formula Engine Arrow -->
        <path d="M 130 50 L 220 50" fill="none" stroke="#adb5bd" stroke-width="3" marker-end="url(#arrow)" />
        <rect x="145" y="35" width="60" height="30" fill="#fff" stroke="#adb5bd" rx="3" />
        <text x="175" y="54" fill="#495057" font-size="12" font-weight="bold" text-anchor="middle">균등 배분</text>

    </g>

    <!-- Holes Setup -->
    <g transform="translate(320, 80)">
        <text x="90" y="-10" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">비둘기집 3개 (N)</text>

        <!-- Hole 1 -->
        <rect x="0" y="0" width="50" height="100" fill="#fff" stroke="#adb5bd" stroke-width="2" rx="5" />
        <text x="25" y="30" font-size="20" text-anchor="middle">🐦</text>
        <text x="25" y="60" font-size="20" text-anchor="middle">🐦</text>

        <!-- Hole 2 -->
        <rect x="65" y="0" width="50" height="100" fill="#fff" stroke="#adb5bd" stroke-width="2" rx="5" />
        <text x="90" y="30" font-size="20" text-anchor="middle">🐦</text>
        <text x="90" y="60" font-size="20" text-anchor="middle">🐦</text>

        <!-- Hole 3 (The Overcrowded one) -->
        <rect x="130" y="0" width="60" height="100" fill="#ffe3e3" stroke="#fa5252" stroke-width="3" rx="5" />
        <text x="160" y="30" font-size="20" text-anchor="middle">🐦</text>
        <text x="160" y="60" font-size="20" text-anchor="middle">🐦</text>
        <text x="160" y="90" font-size="20" text-anchor="middle">🐦 (초과!)</text>

        <!-- Rule Explanation -->
        <rect x="-30" y="120" width="250" height="40" fill="#f8f9fa" />
        <text x="95" y="135" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">⌈ 7 / 3 ⌉ = 2.333...
            의 올림 = 3</text>
        <text x="95" y="152" fill="#495057" font-size="11" text-anchor="middle">적어도 한 방에는 '3마리 이상' 이 산다!</text>
    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>