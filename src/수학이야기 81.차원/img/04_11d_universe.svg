<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#1864ab" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">네 번째 시선: '11차원 우주 (M-이론과 초끈이론)'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"거시 우주 4차원에 덧붙여진 양자(Quantum) 세계의 숨겨진 7개의
        차원"</text>

    <!-- Left Side: Visible Universe (4D) -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="200" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="100" y="25" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">관측 가능한 거시 우주
            (4D)</text>

        <!-- 3D Space Coordinates -->
        <line x1="100" y1="90" x2="160" y2="90" stroke="#f59f00" stroke-width="2" /> <!-- x -->
        <line x1="100" y1="90" x2="100" y2="40" stroke="#2b8a3e" stroke-width="2" /> <!-- y -->
        <line x1="100" y1="90" x2="50" y2="120" stroke="#c92a2a" stroke-width="2" /> <!-- z -->
        <text x="50" y="105" fill="#495057" font-size="10">공간 (x,y,z)</text>

        <!-- Time dimension -->
        <path d="M 120 120 L 160 120" stroke="#862e9c" stroke-width="2" marker-end="url(#arrow-purple)" />
        <text x="140" y="135" fill="#862e9c" font-size="10" font-weight="bold" text-anchor="middle">시간 (t)</text>

        <text x="100" y="145" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">인간의 눈에 보이는 세상</text>
    </g>

    <!-- Connection / Zoom In -->
    <path d="M 270 120 L 330 120" fill="none" stroke="#adb5bd" stroke-width="3" stroke-dasharray="4,2"
        marker-end="url(#arrow)" />
    <text x="300" y="110" fill="#495057" font-size="10" font-weight="bold" text-anchor="middle">원자보다 수억배 축소하면...</text>

    <ellipse cx="300" cy="140" rx="30" ry="10" fill="none" stroke="#fa5252" stroke-width="1.5" />
    <line x1="300" y1="60" x2="330" y2="90" stroke="#fa5252" stroke-width="1.5" stroke-dasharray="2,2" />

    <!-- Right Side: Hidden Dimensions (7D) -> String Theory -->
    <g transform="translate(340, 80)">
        <rect x="0" y="0" width="230" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="115" y="25" fill="#fa5252" font-size="14" font-weight="bold" text-anchor="middle">숨겨진 양자 우주 (칼라비-야우
            도형)</text>

        <!-- Abstract Calabi-Yau representation (intertwined string loops) -->
        <path
            d="M 60 80 C 40 40, 100 40, 100 80 C 100 120, 160 120, 160 80 C 160 40, 100 40, 100 80 C 100 120, 40 120, 60 80"
            fill="none" stroke="#e8590c" stroke-width="2" />
        <path d="M 80 60 C 120 40, 120 100, 80 120 C 40 140, 40 80, 80 60" fill="none" stroke="#fcc419"
            stroke-width="1.5" stroke-dasharray="2,2" />
        <circle cx="110" cy="80" r="30" fill="none" stroke="#fa5252" stroke-width="1" />

        <text x="180" y="85" fill="#d9480f" font-size="20">🎸</text>

        <!-- Text -->
        <rect x="15" y="130" width="200" height="15" fill="#fff5f5" />
        <text x="115" y="141" fill="#c92a2a" font-size="9" font-weight="bold" text-anchor="middle">돌돌 말려있는 7공간 축 (이 끈의
            진동이 만물을 생성)</text>
    </g>

    <!-- Top summary Math -->
    <text x="300" y="280" fill="#212529" font-size="12" font-weight="bold" font-family="monospace"
        text-anchor="middle">M-Theory: 4D 거시세계 + 7D 미시세계 = 11D Universe</text>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
        <marker id="arrow-purple" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#862e9c" />
        </marker>
    </defs>
</svg>