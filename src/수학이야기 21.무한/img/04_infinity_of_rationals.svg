<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="400">
    <defs>
        <style>
            .bg {
                fill: #f8fafc;
                rx: 10;
                stroke: #94a3b8;
                stroke-width: 2;
            }

            .axis-line {
                stroke: #cbd5e1;
                stroke-width: 2;
            }

            .grid-line {
                stroke: #e2e8f0;
                stroke-width: 1;
                stroke-dasharray: 4 4;
            }

            /* Fraction circles */
            .node {
                fill: #ffffff;
                stroke: #3b82f6;
                stroke-width: 2;
                r: 24;
            }

            .node-text {
                font-family: 'Courier New', monospace;
                font-size: 16px;
                font-weight: bold;
                fill: #1e293b;
                text-anchor: middle;
                dominant-baseline: middle;
            }

            .node-red {
                fill: #fee2e2;
                stroke: #ef4444;
                stroke-width: 2;
                r: 24;
            }

            /* Zigzag Arrow */
            .zigzag {
                stroke: #eab308;
                stroke-width: 4;
                fill: none;
                stroke-linejoin: round;
                marker-end: url(#arrowhead);
            }

            .arrow {
                stroke: #eab308;
                stroke-width: 4;
                stroke-linecap: round;
                marker-end: url(#arrowhead);
            }

            /* Text styling */
            .title {
                font-family: 'Pretendard', sans-serif;
                font-size: 22px;
                fill: #0f172a;
                font-weight: bold;
                text-anchor: middle;
            }

            .subtitle {
                font-family: 'Pretendard', sans-serif;
                font-size: 16px;
                fill: #64748b;
                font-weight: normal;
                text-anchor: middle;
            }
        </style>

        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#eab308" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="300" y="35" class="title">칸토어의 지그재그 로직 (유리수의 1:1 매핑)</text>
    <text x="300" y="60" class="subtitle">조밀한 유리수(분수)를 2차원 그리드에 나열하고 지그재그로 스캔형 카운트!</text>

    <g transform="translate(80, 100)">
        <!-- Column Text -->
        <text x="0" y="-15" font-family="'Courier New', monospace" font-size="20px" font-weight="bold" fill="#64748b"
            text-anchor="middle">1</text>
        <text x="90" y="-15" font-family="'Courier New', monospace" font-size="20px" font-weight="bold" fill="#64748b"
            text-anchor="middle">2</text>
        <text x="180" y="-15" font-family="'Courier New', monospace" font-size="20px" font-weight="bold" fill="#64748b"
            text-anchor="middle">3</text>
        <text x="270" y="-15" font-family="'Courier New', monospace" font-size="20px" font-weight="bold" fill="#64748b"
            text-anchor="middle">4</text>
        <text x="360" y="-15" font-family="'Courier New', monospace" font-size="20px" font-weight="bold" fill="#64748b"
            text-anchor="middle">...</text>

        <!-- Row Text -->
        <text x="-40" y="25" font-family="'Courier New', monospace" font-size="20px" font-weight="bold" fill="#64748b"
            text-anchor="middle">/1</text>
        <text x="-40" y="115" font-family="'Courier New', monospace" font-size="20px" font-weight="bold" fill="#64748b"
            text-anchor="middle">/2</text>
        <text x="-40" y="205" font-family="'Courier New', monospace" font-size="20px" font-weight="bold" fill="#64748b"
            text-anchor="middle">/3</text>

        <!-- Row 1 (y=20) -->
        <circle cx="0" cy="20" class="node" /> <text x="0" y="22" class="node-text">1/1</text>
        <circle cx="90" cy="20" class="node" /> <text x="90" y="22" class="node-text">2/1</text>
        <circle cx="180" cy="20" class="node" /> <text x="180" y="22" class="node-text">3/1</text>
        <circle cx="270" cy="20" class="node" /> <text x="270" y="22" class="node-text">4/1</text>

        <!-- Row 2 (y=110) -->
        <circle cx="0" cy="110" class="node" /> <text x="0" y="112" class="node-text">1/2</text>
        <circle cx="90" cy="110" class="node-red" /> <text x="90" y="112" class="node-text">2/2</text> <!-- 중복 1/1 -->
        <circle cx="180" cy="110" class="node" /> <text x="180" y="112" class="node-text">3/2</text>
        <circle cx="270" cy="110" class="node" /> <text x="270" y="112" class="node-text">4/2</text>

        <!-- Row 3 (y=200) -->
        <circle cx="0" cy="200" class="node" /> <text x="0" y="202" class="node-text">1/3</text>
        <circle cx="90" cy="200" class="node" /> <text x="90" y="202" class="node-text">2/3</text>
        <circle cx="180" cy="200" class="node-red" /> <text x="180" y="202" class="node-text">3/3</text> <!-- 중복 1/1 -->
        <circle cx="270" cy="200" class="node" /> <text x="270" y="202" class="node-text">4/3</text>

        <!-- Zigzag arrows mapping -->
        <!-- 1. 1/1 -> 2/1 -->
        <line x1="24" y1="20" x2="66" y2="20" class="arrow" />

        <!-- 2. 2/1 -> 1/2 -->
        <line x1="73" y1="37" x2="17" y2="93" class="arrow" />

        <!-- 3. 1/2 -> 1/3 -->
        <line x1="0" y1="134" x2="0" y2="176" class="arrow" />

        <!-- 4. 1/3 -> 2/2 (Red, Skip conceptual) -> 3/1 -->
        <line x1="17" y1="183" x2="73" y2="127" class="arrow" />
        <line x1="107" y1="93" x2="163" y2="37" class="arrow" />

        <!-- 5. 3/1 -> 4/1 -->
        <line x1="204" y1="20" x2="246" y2="20" class="arrow" />

        <!-- 6. 4/1 -> 3/2 -->
        <line x1="253" y1="37" x2="197" y2="93" class="arrow" />

        <!-- Note Box -->
        <rect x="250" y="150" width="180" height="70" fill="#fffbeb" stroke="#fef08a" rx="5" />
        <text x="340" y="170" font-family="'Pretendard', sans-serif" font-size="14px" fill="#b45309" font-weight="bold"
            text-anchor="middle">중복(2/2, 3/3 등)은 제끼며</text>
        <text x="340" y="190" font-family="'Pretendard', sans-serif" font-size="14px" fill="#b45309" font-weight="bold"
            text-anchor="middle">지그재그 화살표를 계속</text>
        <text x="340" y="210" font-family="'Pretendard', sans-serif" font-size="14px" fill="#b45309" font-weight="bold"
            text-anchor="middle">돌리면 모두 1:1 매핑됨!</text>
    </g>
</svg>