<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#c2255c" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">숫자의 신분증과 주민등록번호: 지표와 가수 (Characteristic &amp; Mantissa)</text>

    <!-- Number 345 -->
    <g transform="translate(100, 150)">
        <text x="0" y="-80" fill="#495057" font-size="28" font-family="serif" font-weight="bold"
            text-anchor="middle">log 345</text>
        <path d="M 0 -70 L 0 -40" fill="none" stroke="#adb5bd" stroke-width="3" marker-end="url(#arrow-down)" />

        <text x="-40" y="-10" fill="#a61e4d" font-size="32" font-family="monospace" font-weight="bold">2</text>
        <text x="0" y="-10" fill="#495057" font-size="32" font-family="monospace" font-weight="bold">.</text>
        <text x="60" y="-10" fill="#1864ab" font-size="32" font-family="monospace" font-weight="bold">5378</text>

        <!-- Ji-pyo -->
        <rect x="-60" y="20" width="80" height="30" fill="#ffe3e3" stroke="#ff8787" stroke-width="2" rx="4" />
        <text x="-20" y="40" fill="#c92a2a" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">지표 (정수)</text>
        <text x="-20" y="70" fill="#868e96" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">세 자릿수다!</text>

        <!-- Ga-su -->
        <rect x="30" y="20" width="100" height="30" fill="#e7f5ff" stroke="#74c0fc" stroke-width="2" rx="4" />
        <text x="80" y="40" fill="#1864ab" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">가수 (소수)</text>
        <text x="80" y="70" fill="#868e96" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">3, 4, 5 순서다!</text>
    </g>

    <!-- Number 3.45 -->
    <g transform="translate(450, 150)">
        <text x="0" y="-80" fill="#495057" font-size="28" font-family="serif" font-weight="bold"
            text-anchor="middle">log 3.45</text>
        <path d="M 0 -70 L 0 -40" fill="none" stroke="#adb5bd" stroke-width="3" marker-end="url(#arrow-down)" />

        <text x="-40" y="-10" fill="#a61e4d" font-size="32" font-family="monospace" font-weight="bold">0</text>
        <text x="0" y="-10" fill="#495057" font-size="32" font-family="monospace" font-weight="bold">.</text>
        <text x="60" y="-10" fill="#1864ab" font-size="32" font-family="monospace" font-weight="bold">5378</text>

        <!-- Ji-pyo -->
        <rect x="-60" y="20" width="80" height="30" fill="#ffe3e3" stroke="#ff8787" stroke-width="2" rx="4" />
        <text x="-20" y="40" fill="#c92a2a" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">지표 (정수)</text>

        <!-- Ga-su -->
        <rect x="30" y="20" width="100" height="30" fill="#e7f5ff" stroke="#74c0fc" stroke-width="2" rx="4" />
        <text x="80" y="40" fill="#1864ab" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">가수 (소수)</text>
    </g>

    <!-- Connect Mantissas -->
    <path d="M 160 140 Q 275 190 490 140" fill="none" stroke="#339af0" stroke-width="2" stroke-dasharray="4,4" />
    <text x="275" y="170" fill="#1864ab" font-size="14" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">숫자 배열 (3-4-5)이 같으면 가수가 똑같다!!</text>

    <defs>
        <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>