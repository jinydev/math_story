<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#d9480f" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">세상의 비밀번호 10을 생략하다: 상용로그 (Common Logarithm)</text>

    <!-- Definition -->
    <g transform="translate(150, 150)">

        <text x="-50" y="0" fill="#495057" font-size="36" font-family="serif" font-weight="bold">log</text>
        <text x="5" y="15" fill="#f03e3e" font-size="24" font-family="serif" font-weight="bold">10</text>
        <text x="40" y="0" fill="#1864ab" font-size="36" font-family="serif" font-weight="bold">N</text>

        <!-- Arrow -->
        <path d="M 80 -15 L 140 -15" fill="none" stroke="#adb5bd" stroke-width="4" marker-end="url(#arrow-grey)" />
        <text x="110" y="-25" fill="#868e96" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">생략!</text>

        <text x="180" y="0" fill="#495057" font-size="36" font-family="serif" font-weight="bold">log</text>
        <text x="240" y="0" fill="#1864ab" font-size="36" font-family="serif" font-weight="bold">N</text>

    </g>

    <!-- Scale Demo -->
    <g transform="translate(300, 210)">
        <!-- Ruler Line -->
        <line x1="-150" y1="0" x2="150" y2="0" stroke="#adb5bd" stroke-width="3" />

        <!-- 10^1 -->
        <circle cx="-100" cy="0" r="5" fill="#f03e3e" />
        <text x="-100" y="25" fill="#495057" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">10</text>
        <text x="-100" y="-15" fill="#e03131" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">log = 1</text>

        <!-- 10^2 -->
        <circle cx="0" cy="0" r="5" fill="#f03e3e" />
        <text x="0" y="25" fill="#495057" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">100</text>
        <text x="0" y="-15" fill="#e03131" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">log = 2</text>

        <!-- 10^3 -->
        <circle cx="100" cy="0" r="5" fill="#f03e3e" />
        <text x="100" y="25" fill="#495057" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">1000</text>
        <text x="100" y="-15" fill="#e03131" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">log = 3</text>

    </g>

    <defs>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>