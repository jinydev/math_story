<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="500">
    <defs>
        <style>
            .bg {
                fill: #fdfbf7;
                rx: 10;
                stroke: #e0dcd3;
                stroke-width: 2;
            }

            .line {
                stroke: #D4A373;
                stroke-width: 2;
                stroke-dasharray: 4;
            }

            .text-label {
                font-family: 'Pretendard', sans-serif;
                font-size: 14px;
                fill: #4a4e69;
                font-weight: bold;
            }

            .ratio-label {
                font-family: 'Pretendard', sans-serif;
                font-size: 16px;
                fill: #9d8189;
                font-weight: bold;
            }

            .bracket {
                stroke: #9d8189;
                stroke-width: 2;
                fill: none;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <!-- Simple Abstract Face Outline -->
    <ellipse cx="200" cy="250" rx="120" ry="160" fill="none" stroke="#264653" stroke-width="3" />
    <!-- Eyes -->
    <ellipse cx="150" cy="220" rx="15" ry="8" fill="none" stroke="#264653" stroke-width="2" />
    <ellipse cx="250" cy="220" rx="15" ry="8" fill="none" stroke="#264653" stroke-width="2" />
    <!-- Nose -->
    <path d="M 200 220 L 195 280 L 205 280 Z" fill="none" stroke="#264653" stroke-width="2" />
    <!-- Mouth -->
    <path d="M 160 320 Q 200 330 240 320" fill="none" stroke="#264653" stroke-width="2" />
    <path d="M 170 320 Q 200 340 230 320" fill="none" stroke="#264653" stroke-width="2" />

    <!-- Horizontal Lines (Division of Thirds) -->
    <!-- Hairline -->
    <line x1="80" y1="90" x2="320" y2="90" class="line" />
    <text x="330" y="95" class="text-label">상안면 (헤어라인)</text>

    <!-- Brow line -->
    <line x1="60" y1="190" x2="340" y2="190" class="line" />
    <text x="350" y="195" class="text-label">중안면 (눈썹)</text>

    <!-- Nose line -->
    <line x1="60" y1="290" x2="340" y2="290" class="line" />
    <text x="350" y="295" class="text-label">하안면 (코끝)</text>

    <!-- Chin line -->
    <line x1="100" y1="410" x2="300" y2="410" class="line" />
    <text x="310" y="415" class="text-label">턱끝</text>

    <!-- Vertical Brackets for 1:1:1 Ratio -->
    <path d="M 50 90 L 40 90 L 40 190 L 50 190" class="bracket" />
    <text x="15" y="145" class="ratio-label">1.0</text>

    <path d="M 50 190 L 40 190 L 40 290 L 50 290" class="bracket" />
    <text x="15" y="245" class="ratio-label">1.0</text>

    <path d="M 50 290 L 40 290 L 40 410 L 50 410" class="bracket" />
    <text x="15" y="355" class="ratio-label">1.0</text>

    <!-- Golden Ratio 1.618 overlays -->
    <!-- Nose width to Mouth width -->
    <line x1="180" y1="285" x2="180" y2="350" class="line" />
    <line x1="220" y1="285" x2="220" y2="350" class="line" />
    <line x1="150" y1="330" x2="150" y2="360" class="line" />
    <line x1="250" y1="330" x2="250" y2="360" class="line" />

    <!-- Arrows for ratios -->
    <path d="M 180 340 L 220 340" stroke="#E76F51" stroke-width="2" marker-end="url(#arrow)"
        marker-start="url(#arrow)" />
    <text x="200" y="335" class="text-label" fill="#E76F51" font-size="11px" text-anchor="middle">1.0</text>

    <path d="M 150 355 L 250 355" stroke="#E76F51" stroke-width="2" marker-end="url(#arrow)"
        marker-start="url(#arrow)" />
    <text x="200" y="368" class="text-label" fill="#E76F51" font-size="11px" text-anchor="middle">1.618</text>

    <!-- Title -->
    <text x="200" y="460" font-family="'Pretendard', sans-serif" font-size="18px" fill="#2A9D8F" text-anchor="middle"
        font-weight="bold">
        아름다움의 수학적 절대 공식 (1 : 1.618)
    </text>
</svg>