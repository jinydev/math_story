<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#e8590c" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">첫 번째 전략: 뇌를 해킹하는 '그림 그리기(Draw a Picture)'</text>

    <!-- Problem Text Simulation -->
    <rect x="30" y="50" width="240" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
    <text x="150" y="70" fill="#495057" font-size="12" font-weight="bold" text-anchor="middle">[텍스트 지옥: 머리 아픈 문제]</text>
    <text x="40" y="100" fill="#495057" font-size="10">"개구리 한 마리가 10m 깊이의</text>
    <text x="40" y="120" fill="#495057" font-size="10">우물에 빠졌습니다. 낮에는 3m를</text>
    <text x="40" y="140" fill="#495057" font-size="10">올라가지만 밤이면 미끄러져 2m를</text>
    <text x="40" y="160" fill="#495057" font-size="10">다시 내려옵니다. 며칠 만에 탈출할까?"</text>

    <!-- Transformation Arrow -->
    <path d="M 285 125 L 345 125" fill="none" stroke="#e8590c" stroke-width="4" marker-end="url(#arrow-orange)" />
    <text x="315" y="115" fill="#e8590c" font-size="12" font-weight="bold" text-anchor="middle">시각화!</text>

    <!-- Visualization / Drawing -->
    <g transform="translate(370, 50)">
        <rect x="0" y="0" width="200" height="180" fill="#fff" stroke="#adb5bd" rx="5" />

        <!-- Well lines (Y-axis) -->
        <line x1="30" y1="10" x2="30" y2="160" stroke="#adb5bd" stroke-width="2" />
        <text x="10" y="15" fill="#495057" font-size="10">0m</text>
        <text x="5" y="165" fill="#495057" font-size="10">10m</text>

        <!-- Day 1 Line -->
        <path d="M 30 160 C 50 140, 50 115, 70 115" fill="none" stroke="#2b8a3e" stroke-width="2"
            marker-end="url(#arrow-green)" />
        <path d="M 70 115 C 80 125, 80 135, 90 145" fill="none" stroke="#fa5252" stroke-width="2"
            marker-end="url(#arrow-red)" />

        <!-- Day 8 Final Jump -->
        <path d="M 90 55 C 120 30, 150 10, 180 10" fill="none" stroke="#2b8a3e" stroke-width="3" stroke-dasharray="4,2"
            marker-end="url(#arrow-green)" />

        <text x="90" y="100" fill="#495057" font-size="20" font-weight="bold">...</text>

        <!-- Labels -->
        <text x="80" y="170" fill="#2b8a3e" font-size="9" font-weight="bold">낮 (+3)</text>
        <text x="110" y="145" fill="#fa5252" font-size="9" font-weight="bold">밤 (-2)</text>

        <text x="140" y="60" fill="#e8590c" font-size="11" font-weight="bold">마지막 날엔</text>
        <text x="140" y="75" fill="#e8590c" font-size="11" font-weight="bold">탈출이라 미끄러지지 않음!</text>
    </g>

    <defs>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8590c" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#fa5252" />
        </marker>
    </defs>
</svg>