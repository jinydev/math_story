<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#c92a2a" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">연속 세계의 평균(E) 과 분산(V) 도출 엔진</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"더러운 시그마(Σ) 덧셈 노가다를 매끄러운 인테그랄(∫) 곱셈 면적으로
        스왑(Swap)하라!"</text>

    <!-- Left: Discrete World (Sigma) -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#e8590c" font-size="14" font-weight="bold" text-anchor="middle">이산계 (주사위 세계)</text>

        <text x="30" y="60" fill="#d9480f" font-size="14" font-weight="bold">E(X) =</text>
        <text x="80" y="60" fill="#c92a2a" font-size="20" font-family="serif" font-weight="bold">∑</text>
        <text x="105" y="60" fill="#1864ab" font-size="14" font-family="monospace">x_i</text>
        <text x="135" y="60" fill="#495057" font-size="14" font-weight="bold">×</text>
        <text x="155" y="60" fill="#2b8a3e" font-size="14" font-family="monospace">P(x_i)</text>

        <text x="30" y="100" fill="#d9480f" font-size="14" font-weight="bold">V(X) =</text>
        <text x="80" y="100" fill="#c92a2a" font-size="20" font-family="serif" font-weight="bold">∑</text>
        <text x="105" y="100" fill="#1864ab" font-size="14" font-family="monospace">(x_i - m)²</text>
        <text x="180" y="100" fill="#495057" font-size="14" font-weight="bold">×</text>
        <text x="195" y="100" fill="#2b8a3e" font-size="12" font-family="monospace">P(x_i)</text>

        <rect x="15" y="125" width="190" height="18" fill="#ffe3e3" rx="3" />
        <text x="110" y="138" fill="#c92a2a" font-size="9" font-weight="bold" text-anchor="middle">"값 × 확률을 일일이
            더한다(Σ)"</text>
    </g>

    <!-- Transform Arrow -->
    <path d="M 290 145 C 300 110, 300 110, 310 145" fill="none" stroke="#2b8a3e" stroke-width="3"
        marker-end="url(#arrow-green)" />
    <rect x="280" y="115" width="40" height="20" fill="#ebfbee" rx="3" />
    <text x="300" y="130" fill="#0ca678" font-size="10" font-weight="bold" text-anchor="middle">Lim!</text>

    <!-- Right: Continuous World (Integral) -->
    <g transform="translate(320, 80)">
        <rect x="0" y="0" width="240" height="150" fill="#fff" stroke="#2b8a3e" stroke-width="2" rx="5" />
        <text x="120" y="25" fill="#2b8a3e" font-size="14" font-weight="bold" text-anchor="middle">연속계 (정규 분포 세계)</text>

        <text x="20" y="60" fill="#0ca678" font-size="14" font-weight="bold">E(X) =</text>
        <text x="70" y="65" fill="#1864ab" font-size="28" font-family="serif" font-weight="bold">∫</text>
        <text x="85" y="60" fill="#1864ab" font-size="14" font-family="monospace">x</text>
        <text x="105" y="60" fill="#495057" font-size="14" font-weight="bold">·</text>
        <text x="120" y="60" fill="#2b8a3e" font-size="14" font-family="monospace">f(x)</text>
        <text x="150" y="60" fill="#495057" font-size="14" font-family="monospace">dx</text>

        <text x="20" y="100" fill="#0ca678" font-size="14" font-weight="bold">V(X) =</text>
        <text x="70" y="105" fill="#1864ab" font-size="28" font-family="serif" font-weight="bold">∫</text>
        <text x="85" y="100" fill="#1864ab" font-size="14" font-family="monospace">x²</text>
        <text x="105" y="100" fill="#495057" font-size="14" font-weight="bold">·</text>
        <text x="120" y="100" fill="#2b8a3e" font-size="14" font-family="monospace">f(x)</text>
        <text x="150" y="100" fill="#495057" font-size="14" font-family="monospace">dx</text>
        <text x="175" y="100" fill="#fa5252" font-size="14" font-weight="bold">- m²</text>

        <rect x="15" y="125" width="210" height="18" fill="#e6fcf5" rx="3" />
        <text x="120" y="138" fill="#087f5b" font-size="9" font-weight="bold" text-anchor="middle">"값 × 곡선높이를 무한히
            적분한다(∫)"</text>
    </g>

    <defs>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
        </marker>
    </defs>
</svg>