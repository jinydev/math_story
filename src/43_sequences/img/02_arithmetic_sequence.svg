<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f4fce3" rx="10" />

    <text x="300" y="40" fill="#2b8a3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">등차수열 (Arithmetic Sequence) : 첫째항 2, 공차 3</text>

    <g transform="translate(50, 100)">
        <!-- Circles and numbers -->
        <circle cx="20" cy="40" r="30" fill="#69db7c" />
        <text x="20" y="48" fill="#fff" font-size="24" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">2</text>
        <text x="20" y="90" fill="#5c940d" font-size="14" font-family="sans-serif" text-anchor="middle">a1</text>

        <circle cx="120" cy="40" r="30" fill="#69db7c" />
        <text x="120" y="48" fill="#fff" font-size="24" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">5</text>
        <text x="120" y="90" fill="#5c940d" font-size="14" font-family="sans-serif" text-anchor="middle">a2</text>

        <circle cx="220" cy="40" r="30" fill="#69db7c" />
        <text x="220" y="48" fill="#fff" font-size="24" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">8</text>
        <text x="220" y="90" fill="#5c940d" font-size="14" font-family="sans-serif" text-anchor="middle">a3</text>

        <circle cx="320" cy="40" r="30" fill="#69db7c" />
        <text x="320" y="48" fill="#fff" font-size="24" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">11</text>
        <text x="320" y="90" fill="#5c940d" font-size="14" font-family="sans-serif" text-anchor="middle">a4</text>

        <circle cx="420" cy="40" r="30" fill="#69db7c" />
        <text x="420" y="48" fill="#fff" font-size="24" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">14</text>
        <text x="420" y="90" fill="#5c940d" font-size="14" font-family="sans-serif" text-anchor="middle">a5</text>

    </g>

    <!-- Add lines and 공차 -->
    <g fill="none" stroke="#2b8a3e" stroke-width="2" stroke-dasharray="4,4">
        <path d="M 100 120 Q 120 90 140 120" />
        <path d="M 200 120 Q 220 90 240 120" />
        <path d="M 300 120 Q 320 90 340 120" />
        <path d="M 400 120 Q 420 90 440 120" />
    </g>

    <g fill="#2b8a3e" font-size="16" font-family="sans-serif" font-weight="bold" text-anchor="middle">
        <text x="120" y="105">+3</text>
        <text x="220" y="105">+3</text>
        <text x="320" y="105">+3</text>
        <text x="420" y="105">+3</text>
    </g>

    <rect x="180" y="200" width="240" height="40" fill="#40c057" rx="5" />
    <text x="300" y="226" fill="white" font-size="18" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">an = 2 + (n - 1) * 3</text>
</svg>