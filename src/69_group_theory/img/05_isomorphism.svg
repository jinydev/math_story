<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#862e9c" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">다섯 번째 구조: '우주 간의 번역기, 동형사상 (Isomorphism)'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"겉모습과 언어(기호) 는 완전히 다르지만, 그 내부 뼈대(구조) 가 동일한
        평행 우주!"</text>

    <!-- Left Universe: Group Z_4 (Addition mod 4) -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="180" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="90" y="25" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">우주 A (시계 덧셈 군)</text>

        <circle cx="90" cy="80" r="40" fill="#e7f5ff" stroke="#339af0" stroke-dasharray="4,2" />
        <text x="90" y="60" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">{ 0, 1, 2, 3 }</text>
        <text x="90" y="80" fill="#1864ab" font-size="16" font-weight="bold" text-anchor="middle">연산: +</text>
        <text x="90" y="100" fill="#1864ab" font-size="10" font-weight="bold" text-anchor="middle">(Mod 4)</text>

        <!-- Example inside Universe A -->
        <rect x="20" y="120" width="140" height="20" fill="#d0ebff" rx="3" />
        <text x="90" y="134" fill="#0b7285" font-size="12" font-weight="bold" text-anchor="middle">1 + 3 = 0
            (원점폭발)</text>
    </g>

    <!-- The Isomorphism Bridge (Mapping f) -->
    <path d="M 250 145 C 275 110, 275 110, 300 145" fill="none" stroke="#862e9c" stroke-width="4"
        marker-end="url(#arrow-purple)" />
    <path d="M 250 155 C 275 190, 275 190, 300 155" fill="none" stroke="#862e9c" stroke-width="4"
        marker-start="url(#arrow-purple-rev)" />

    <rect x="240" y="135" width="70" height="30" fill="#f3d9fa" stroke="#ae3ec9" rx="15" />
    <text x="275" y="154" fill="#862e9c" font-size="12" font-weight="bold" text-anchor="middle">f 매핑(1:1)</text>

    <!-- Right Universe: Group R (Multiplication of i) -->
    <g transform="translate(320, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#c92a2a" font-size="14" font-weight="bold" text-anchor="middle">우주 B (복소수 곱셈
            군)</text>

        <circle cx="110" cy="80" r="45" fill="#ffe3e3" stroke="#fa5252" stroke-dasharray="4,2" />
        <text x="110" y="60" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">{ 1, i, -1, -i
            }</text>
        <text x="110" y="80" fill="#c92a2a" font-size="16" font-weight="bold" text-anchor="middle">연산: ×</text>
        <text x="110" y="100" fill="#c92a2a" font-size="10" font-weight="bold" text-anchor="middle">(Complex)</text>

        <!-- Example inside Universe B -->
        <rect x="15" y="120" width="190" height="20" fill="#fcc419" rx="3" />
        <text x="110" y="134" fill="#d9480f" font-size="12" font-weight="bold" text-anchor="middle">i × (-i) = 1
            (원점폭발)</text>
    </g>

    <!-- Connection mapping -->
    <path d="M 160 200 L 400 200" fill="none" stroke="#adb5bd" stroke-dasharray="2,2" />
    <text x="280" y="195" fill="#862e9c" font-size="10" font-weight="bold" text-anchor="middle">물리법칙(구조표) 이 소름 돋게 100%
        똑같다!</text>

    <!-- Map Dictionary -->
    <text x="190" y="220" fill="#495057" font-size="12" font-family="monospace" text-anchor="middle">0 ↔ 1</text>
    <text x="260" y="220" fill="#495057" font-size="12" font-family="monospace" text-anchor="middle">1 ↔ i</text>
    <text x="330" y="220" fill="#495057" font-size="12" font-family="monospace" text-anchor="middle">2 ↔ -1</text>
    <text x="400" y="220" fill="#495057" font-size="12" font-family="monospace" text-anchor="middle">3 ↔ -i</text>

    <defs>
        <marker id="arrow-purple" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#862e9c" />
        </marker>
        <marker id="arrow-purple-rev" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#862e9c" />
        </marker>
    </defs>
</svg>