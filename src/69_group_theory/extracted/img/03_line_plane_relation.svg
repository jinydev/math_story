<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">직선(광선)과 평면(방패)의 위치 관계</text>

    <!-- Sub Views for 3 Relations -->
    <!-- 1. Intersect (Pierce) -->
    <g transform="translate(100, 100)">
        <rect x="0" y="0" width="200" height="200" rx="15" fill="#112233" stroke="#555" />
        <text x="100" y="30" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">1. 한 점에서 만남 (관통)</text>

        <polygon points="20,150 180,150 140,80 60,80" fill="#00ffcc" opacity="0.3" stroke="#00ffcc" />

        <path d="M 100 40 L 100 200" stroke="#ff0055" stroke-width="5" filter="url(#glow)" />
        <circle cx="100" cy="115" r="5" fill="#ffffff" />
    </g>

    <!-- 2. Parallel -->
    <g transform="translate(350, 100)">
        <rect x="0" y="0" width="200" height="200" rx="15" fill="#112233" stroke="#555" />
        <text x="100" y="30" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">2. 평행함 (비껴감)</text>

        <polygon points="20,180 180,180 140,110 60,110" fill="#ffaa00" opacity="0.3" stroke="#ffaa00" />

        <path d="M 40 70 L 160 70" stroke="#00ffcc" stroke-width="5" filter="url(#glow)" />
    </g>

    <!-- 3. Contained -->
    <g transform="translate(600, 100)">
        <rect x="0" y="0" width="200" height="200" rx="15" fill="#112233" stroke="#555" />
        <text x="100" y="30" fill="#4da6ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">3. 포함됨 (누워있음)</text>

        <polygon points="20,150 180,150 140,80 60,80" fill="#4da6ff" opacity="0.3" stroke="#4da6ff" />

        <path d="M 60 120 L 160 120" stroke="#ffaa00" stroke-width="5" filter="url(#glow)" />
    </g>

    <!-- Core focus: The Perpendicular Rule -->
    <rect x="150" y="320" width="600" height="240" rx="15" fill="#0d1a26" stroke="#ff0055" stroke-width="3"
        filter="url(#glow)" />
    <text x="450" y="360" fill="#ff0055" font-family="sans-serif" font-size="24" font-weight="bold"
        text-anchor="middle">🛡️ 보스 룰: "완벽한 수직(직교) 관통의 필수 조건"</text>

    <!-- The large diagram for perpendicular rules -->
    <g transform="translate(450, 480)">
        <polygon points="-150,50 150,50 50,-50 -250,-50" fill="rgba(255, 0, 85, 0.1)" stroke="#ff0055" />

        <!-- Two intersecting lines on the plane -->
        <line x1="-150" y1="20" x2="50" y2="-20" stroke="#ffff00" stroke-width="3" />
        <text x="60" y="-20" fill="#ffff00" font-family="serif" font-size="16">직선 m</text>
        <line x1="-50" y1="40" x2="-50" y2="-40" stroke="#00ffcc" stroke-width="3" />
        <text x="-40" y="-40" fill="#00ffcc" font-family="serif" font-size="16">직선 n</text>

        <!-- The piercing vertical line -->
        <line x1="-50" y1="-100" x2="-50" y2="80" stroke="#ffffff" stroke-width="5" filter="url(#glow)" />
        <text x="-20" y="-80" fill="#ffffff" font-family="serif" font-size="20" font-weight="bold">광선검 l</text>

        <!-- 90 degree markers -->
        <!-- Marker for m -->
        <path d="M -50 -20 L -30 -15 L -30 5 L -50 0" fill="none" stroke="#ff0055" stroke-width="2" />
        <!-- Marker for n -->
        <path d="M -50 -20 L -70 -20 L -70 0 L -50 0" fill="none" stroke="#ff0055" stroke-width="2" />

        <text x="180" y="0" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">조건: 광선검 l 은 평면
            위의</text>
        <text x="180" y="25" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">어떤 교차하는 두 직선(m,
            n)과</text>
        <text x="180" y="50" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold">동시에 모두 직각을 이룰
            때에만!</text>
        <text x="180" y="75" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold">l ⊥ P (평면과 수직) 임을
            인정받는다.</text>
    </g>

</svg>