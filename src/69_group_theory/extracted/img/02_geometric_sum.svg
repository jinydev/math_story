<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">등비수열의 합 (Geometric Sum): 시프트 시뮬레이션</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"공비 r을 곱해 오른쪽으로 1칸
        밀어버린 뒤 수직으로 폭격(뺄셈)하여 가운데를 증발시킨다."</text>

    <g transform="translate(100, 200)">

        <!-- Top Row S -->
        <text x="0" y="0" fill="#00ffcc" font-weight="bold" font-size="28" font-family="monospace"
            filter="url(#glow)">S</text>
        <text x="40" y="0" fill="#fff" font-weight="bold" font-size="28" font-family="monospace">
            = <tspan fill="#ff00ff">a</tspan> + ar + ar² + ... + arⁿ⁻¹
        </text>

        <!-- Bottom Row rS -->
        <text x="-40" y="80" fill="#0088ff" font-weight="bold" font-size="28" font-family="monospace"
            filter="url(#glow)">rS</text>
        <text x="40" y="80" fill="#fff" font-weight="bold" font-size="28" font-family="monospace">
            = ar + ar² + ... + arⁿ⁻¹ + <tspan fill="#ff00ff">arⁿ</tspan>
        </text>

        <!-- Subtraction Line -->
        <path d="M -50 110 L 650 110" fill="none" stroke="#fff" stroke-width="3" />
        <text x="-70" y="45" fill="#ff0055" font-weight="bold" font-size="40">-</text>
        <circle cx="-60" cy="30" r="20" fill="none" stroke="#ff0055" stroke-width="3" />

        <!-- The Canceled Terms -->
        <!-- Strike-through lines -->
        <path d="M 120 -20 L 170 20 M 170 -20 L 120 20" fill="none" stroke="#ff0055" stroke-width="4"
            filter="url(#glow)" />
        <path d="M 120 60 L 170 100 M 170 60 L 120 100" fill="none" stroke="#ff0055" stroke-width="4"
            filter="url(#glow)" />

        <path d="M 210 -20 L 260 20 M 260 -20 L 210 20" fill="none" stroke="#ff0055" stroke-width="4"
            filter="url(#glow)" />
        <path d="M 210 60 L 260 100 M 260 60 L 210 100" fill="none" stroke="#ff0055" stroke-width="4"
            filter="url(#glow)" />

        <path d="M 400 -20 L 480 20 M 480 -20 L 400 20" fill="none" stroke="#ff0055" stroke-width="4"
            filter="url(#glow)" />
        <path d="M 400 60 L 480 100 M 480 60 L 400 100" fill="none" stroke="#ff0055" stroke-width="4"
            filter="url(#glow)" />

        <!-- Arrows mapping cancellation -->
        <path d="M 145 20 L 145 50" fill="none" stroke="#ff0055" stroke-width="2" stroke-dasharray="4 4"
            marker-end="url(#arrow_d)" />
        <path d="M 235 20 L 235 50" fill="none" stroke="#ff0055" stroke-width="2" stroke-dasharray="4 4"
            marker-end="url(#arrow_d)" />
        <path d="M 440 20 L 440 50" fill="none" stroke="#ff0055" stroke-width="2" stroke-dasharray="4 4"
            marker-end="url(#arrow_d)" />

        <!-- Final Result Row -->
        <text x="-40" y="160" fill="#ffff00" font-weight="bold" font-size="28" font-family="monospace">(1-r)S</text>
        <text x="40" y="160" fill="#fff" font-weight="bold" font-size="28" font-family="monospace">
            = <tspan fill="#ff00ff">a</tspan>
            <tspan fill="#ff00ff">- arⁿ</tspan>
        </text>

    </g>

    <defs>
        <marker id="arrow_d" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ff0055" />
        </marker>
    </defs>

    <!-- Big Alert Bottom -->
    <rect x="100" y="450" width="700" height="110" rx="10" fill="#1b001b" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="480" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">
        무한한 마디의 폭주 기관차(등비수열) 도 자기 자신의 사본을 <tspan fill="#00ffcc" font-weight="bold">1칸 시프트(Shift)</tspan> 하여
    </text>
    <text x="450" y="510" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">
        통째로 뺄셈 감산 처리를 해버리면, 가운뎃동강이 모조리 '0' 이 되어 소멸된다.
    </text>
    <text x="450" y="540" fill="#ff00ff" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">
        S = a(1 - rⁿ) / (1 - r)
    </text>
</svg>