<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">아인슈타인도 놀란 기적: 단리 vs 복리</text>

    <!-- Chart Area -->
    <g transform="translate(150, 150)">

        <!-- Axes -->
        <line x1="0" y1="350" x2="600" y2="350" stroke="#888888" stroke-width="3" />
        <line x1="0" y1="350" x2="0" y2="0" stroke="#888888" stroke-width="3" />

        <text x="300" y="380" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">투자 기간 (시간
            x)</text>
        <text x="-40" y="180" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle"
            transform="rotate(-90, -40, 180)">자산 규모 (y)</text>

        <!-- Initial Principal -->
        <circle cx="0" cy="300" r="5" fill="#ffffff" />
        <text x="-20" y="305" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="end">원금 A</text>

        <!-- Simple Interest (Linear) -->
        <path d="M 0 300 L 550 150" fill="none" stroke="#4da6ff" stroke-width="5" stroke-dasharray="8 4"
            filter="url(#glow)" />
        <text x="560" y="155" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold">단리
            (Simple)</text>
        <text x="560" y="175" fill="#aaaaaa" font-family="sans-serif" font-size="14">y = A + A·rx</text>

        <!-- Compound Interest (Exponential) -->
        <path d="M 0 300 Q 300 280 500 20" fill="none" stroke="#ff4d4d" stroke-width="5" filter="url(#glow)" />
        <text x="510" y="25" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold">복리
            (Compound)</text>
        <text x="510" y="45" fill="#aaaaaa" font-family="sans-serif" font-size="14">y = A·(1+r)^x</text>

        <!-- Gap highlight -->
        <path d="M 500 20 L 500 163" fill="none" stroke="#ffaa00" stroke-width="2" stroke-dasharray="4 4" />
        <rect x="360" y="70" width="130" height="30" rx="5" fill="#112233" stroke="#ffaa00" stroke-width="1" />
        <text x="425" y="90" fill="#ffaa00" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">초격차 구간 (스노우볼)</text>
    </g>

    <!-- Properties Cards -->
    <g transform="translate(150, 420)">
        <rect x="0" y="0" width="280" height="150" rx="10" fill="#112233" stroke="#4da6ff" stroke-width="2" />
        <text x="140" y="30" fill="#4da6ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">정직한 단리 (일차함수)</text>
        <circle cx="140" cy="70" r="30" fill="#2b4c7e" />
        <text x="140" y="76" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">+ α</text>
        <text x="140" y="130" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">최초 원금에만 똑같은
            보폭으로 더해짐</text>
    </g>

    <g transform="translate(470, 420)">
        <rect x="0" y="0" width="280" height="150" rx="10" fill="#331111" stroke="#ff4d4d" stroke-width="2" />
        <text x="140" y="30" fill="#ff4d4d" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">무법자 복리 (지수함수)</text>
        <circle cx="110" cy="70" r="20" fill="#7a2b2b" />
        <circle cx="150" cy="70" r="30" fill="#a03b3b" />
        <circle cx="200" cy="70" r="40" fill="#cc4d4d" />
        <text x="140" y="130" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">합쳐진 몸통 전체에 또
            곱해지는 눈뭉치 효과</text>
    </g>

</svg>