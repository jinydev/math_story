<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">내접 사각형 매크로: 마주 보는 눈동자의 합은 무조건 180°</text>

    <!-- Circle base -->
    <g transform="translate(250, 270)">
        <circle cx="0" cy="0" r="180" fill="none" stroke="#224455" stroke-width="4" stroke-dasharray="8 8" />

        <!-- Quadrilateral ABCD inscribed -->
        <!-- Point A (top left) -->
        <circle cx="-130" cy="-124" r="6" fill="#ff5555" filter="url(#glow)" />
        <text x="-160" y="-130" fill="#ff5555" font-family="sans-serif" font-size="20" font-weight="bold">A</text>

        <!-- Point B (bottom left) -->
        <circle cx="-160" cy="83" r="6" fill="#ffffff" filter="url(#glow)" />
        <text x="-190" y="100" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold">B</text>

        <!-- Point C (bottom right) -->
        <circle cx="120" cy="134" r="6" fill="#00ffcc" filter="url(#glow)" />
        <text x="140" y="160" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold">C</text>

        <!-- Point D (top right) -->
        <circle cx="155" cy="-91" r="6" fill="#ffffff" filter="url(#glow)" />
        <text x="180" y="-100" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold">D</text>

        <!-- Quadrilateral paths -->
        <polygon points="-130,-124 -160,83 120,134 155,-91" fill="none" stroke="#ffff00" stroke-width="3"
            filter="url(#glow)" />

        <!-- Angles A and C (Opposite) -->
        <!-- Angle A -->
        <path d="M -115 -74 Q -95 -100 -105 -125" fill="none" stroke="#ff5555" stroke-width="3" />
        <text x="-95" y="-95" fill="#ff5555" font-family="monospace" font-size="20" font-weight="bold">110°</text>

        <!-- Angle C -->
        <path d="M 85 90 Q 75 115 102 125" fill="none" stroke="#00ffcc" stroke-width="3" />
        <text x="60" y="115" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold">70°</text>

        <!-- Eye connection beam -->
        <line x1="-120" y1="-110" x2="110" y2="120" stroke="#ffaa00" stroke-width="3" stroke-dasharray="10 10" />
        <rect x="-80" y="-20" width="150" height="40" rx="10" fill="#0d1115" stroke="#ffaa00" stroke-width="2" />
        <text x="-5" y="8" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle"
            filter="url(#glow)">
            110° + 70° = 180°
        </text>

        <!-- Exterior angle at C -->
        <line x1="120" y1="134" x2="260" y2="160" stroke="#777" stroke-width="2" stroke-dasharray="5 5" />
        <line x1="155" y1="-91" x2="120" y2="134" stroke="#ffff00" stroke-width="3" />

        <!-- Ext angle path -->
        <path d="M 148 100 Q 170 115 160 140" fill="none" stroke="#ff5555" stroke-width="4" filter="url(#glow)" />
        <text x="180" y="130" fill="#ff5555" font-family="monospace" font-size="20" font-weight="bold">110°</text>
        <text x="190" y="105" fill="#aaaaaa" font-family="sans-serif" font-size="14" font-weight="bold">외각 (궁둥이
            꼬리)</text>

        <!-- Clone Bug explanation -->
        <g transform="translate(300, -100)">
            <rect x="0" y="0" width="220" height="150" rx="15" fill="#1b0d1a" stroke="#ff00ff" stroke-width="3" />
            <text x="110" y="30" fill="#ff00ff" font-family="sans-serif" font-size="18" font-weight="bold"
                text-anchor="middle" filter="url(#glow)">그림자 복제품 오류!</text>

            <text x="10" y="65" fill="#ffffff" font-family="sans-serif" font-size="14">내부 C (70°) + 이웃 외각 <tspan
                    fill="#ff5555">?</tspan> = 180°</text>
            <text x="10" y="90" fill="#ffffff" font-family="sans-serif" font-size="14">반대 A (<tspan fill="#ff5555">110°
                </tspan>) + 내부 C (70°) = 180°</text>
            <text x="10" y="130" fill="#ffff00" font-family="sans-serif" font-size="16" font-weight="bold">∴ 외각 = 반대편 내각
                A (<tspan fill="#ff5555">110°</tspan>)</text>

            <!-- Copy arrow -->
            <path d="M -100 -20 Q -40 -30 20 -10" fill="none" stroke="#ff5555" stroke-width="3" stroke-dasharray="5 5"
                marker-end="url(#arrow_r)" />
            <text x="-40" y="-40" fill="#ff5555" font-family="sans-serif" font-size="16" font-weight="bold">완벽한 쌍둥이
                복사(Clone)!</text>
        </g>

    </g>

    <defs>
        <marker id="arrow_r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ff5555" />
        </marker>
    </defs>

    <!-- Explanation Panel -->
    <rect x="80" y="520" width="740" height="60" rx="10" fill="#1b1111" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="545" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        원 안에 꼭 껴있는 4각형의 사방 팔방 꼭짓점이 뒤틀려도, <tspan fill="#ffaa00" font-weight="bold">마주 보는 반대편 각도의 합계 180° 질량 락다운</tspan>은
    </text>
    <text x="450" y="570" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        절대 풀리지 않으며 이로 인해 바깥으로 삐져나온 <tspan fill="#ff5555" font-weight="bold">꼬리(외각)는 반대편 내각(내대각) 과 $100\%$ 쌍둥이 복제</tspan>
        됩니다!
    </text>

</svg>