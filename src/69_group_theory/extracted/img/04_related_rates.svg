<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <radialGradient id="ripple" cx="50%" cy="50%" r="50%">
            <stop offset="70%" stop-color="rgba(0,255,204,0.1)" />
            <stop offset="100%" stop-color="rgba(0,255,204,0.6)" />
        </radialGradient>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">거대 면적 파동: 시간에 대한 변화율 (Related Rates)</text>

    <!-- Split View -->

    <!-- Left Side: The Physics Phenomenon (Ripple) -->
    <g transform="translate(50, 100)">
        <rect x="0" y="0" width="400" height="400" rx="15" fill="#001824" stroke="#00ffcc" stroke-width="4" />
        <text x="200" y="40" fill="#00ffcc" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">호수 물결 파동 (Ripple Effect)</text>

        <!-- Expanding Circles -->
        <!-- Center (Drop) -->
        <circle cx="200" cy="220" r="5" fill="#ffffff" filter="url(#glow)" />

        <!-- t=1 -->
        <circle cx="200" cy="220" r="40" fill="none" stroke="#27c93f" stroke-width="2" stroke-dasharray="8 4" />
        <text x="250" y="240" fill="#27c93f" font-family="monospace" font-size="14">t=1 (r=2)</text>

        <!-- t=2 -->
        <circle cx="200" cy="220" r="80" fill="none" stroke="#ffaa00" stroke-width="3" stroke-dasharray="10 5" />
        <text x="290" y="250" fill="#ffaa00" font-family="monospace" font-size="14">t=2 (r=4)</text>

        <!-- t=3 -->
        <circle cx="200" cy="220" r="140" fill="url(#ripple)" stroke="#ff0055" stroke-width="4" filter="url(#glow)" />
        <text x="350" y="225" fill="#ff0055" font-family="monospace" font-size="16" font-weight="bold">t=3 (r=6)</text>

        <!-- Radius Rate Vector -->
        <line x1="200" y1="220" x2="330" y2="120" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow_w)" />
        <text x="280" y="160" fill="#ffffff" font-family="sans-serif" font-size="16"
            transform="rotate(-38 280 160)">r'(t) = 2 cm/s (일정)</text>
    </g>

    <!-- Transformation Arrow -->
    <path d="M 460 300 Q 480 300 500 300" stroke="#00ffcc" stroke-width="6" marker-end="url(#arrow_c)" />
    <rect x="450" y="270" width="60" height="25" rx="5" fill="#2a2200" />
    <text x="480" y="287" fill="#ffff00" font-family="monospace" font-size="14" font-weight="bold"
        text-anchor="middle">diff()</text>

    <!-- Right Side: The Math Engine -->
    <g transform="translate(520, 100)">
        <rect x="0" y="0" width="330" height="400" rx="15" fill="#1b1111" stroke="#ff0055" stroke-width="4" />
        <text x="165" y="40" fill="#ff0055" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">면적 팽창 스피드 S'(t)</text>

        <!-- Formula Lines -->
        <rect x="20" y="70" width="290" height="80" rx="10" fill="#000000" stroke="#4da6ff" stroke-width="2" />
        <text x="35" y="100" fill="#aaaaaa" font-family="sans-serif" font-size="16">1. 원래 면적 공식 (Area)</text>
        <text x="165" y="130" fill="#4da6ff" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">S(r) = π r²</text>

        <rect x="20" y="170" width="290" height="80" rx="10" fill="#000000" stroke="#ffaa00" stroke-width="2" />
        <text x="35" y="200" fill="#aaaaaa" font-family="sans-serif" font-size="16">2. 시간(t) 유기체 빙의 (r=2t)</text>
        <text x="165" y="235" fill="#ffaa00" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">S(t) = 4π t²</text>

        <!-- The derivative punch -->
        <rect x="20" y="270" width="290" height="110" rx="10" fill="#331122" stroke="#ff0055" stroke-width="3"
            filter="url(#glow)" />
        <text x="35" y="300" fill="#ff5588" font-family="sans-serif" font-size="16" font-weight="bold">3. 미분! (초당 면적 팽창
            파워)</text>
        <text x="165" y="340" fill="#ff0055" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">S'(t) = 8π t</text>
        <text x="165" y="365" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">(시간이 지날수록
            폭발적으로 증가!)</text>
    </g>

    <defs>
        <marker id="arrow_w" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" />
        </marker>
        <marker id="arrow_c" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#00ffcc" />
        </marker>
    </defs>

    <!-- Explanation Footer -->
    <rect x="150" y="530" width="600" height="50" rx="10" fill="#0f0f15" stroke="#ffff00" stroke-width="2" />
    <text x="450" y="560" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        반지름이 일정히 커져도, 평수(면적) 팽창 속도는 <tspan fill="#ffff00" font-weight="bold">시간(t)에 비례하여 미친 듯이 가속증식</tspan> 합니다.
    </text>
</svg>