<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">측정의 근본적 한계: 참값(True) 과 근삿값(Approximate)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"현실 세계의 물리량은 아날로그
        데이터다. 디지털 눈금망(Grid) 으로 완벽하게 포획할 수 없다."</text>

    <!-- High-Tech Ruler / Measurement Setup -->
    <g transform="translate(100, 200)">

        <!-- The Object being measured (Pencil / Rod) -->
        <rect x="0" y="-40" width="530" height="40" rx="5" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
        <polygon points="530,-40 560,-20 530,0" fill="#ff00ff" filter="url(#glow)" />

        <text x="250" y="-15" fill="#ff00ff" font-family="monospace" font-size="18" font-weight="bold"
            filter="url(#glow)">미지의 실물 데이터 (True Value)</text>

        <!-- The Measuring Tool (Ruler) -->
        <rect x="-20" y="20" width="760" height="80" rx="5" fill="#001a11" stroke="#00ffcc" stroke-width="3" />

        <!-- Ticks on the Ruler -->
        <line x1="0" y1="20" x2="0" y2="50" stroke="#00ffcc" stroke-width="4" />
        <text x="0" y="70" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">1.5</text>

        <line x1="100" y1="20" x2="100" y2="35" stroke="#00ffcc" stroke-width="2" />
        <line x1="200" y1="20" x2="200" y2="50" stroke="#00ffcc" stroke-width="4" />
        <text x="200" y="70" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">1.6</text>

        <line x1="300" y1="20" x2="300" y2="35" stroke="#00ffcc" stroke-width="2" />
        <line x1="400" y1="20" x2="400" y2="50" stroke="#00ffcc" stroke-width="4" />
        <text x="400" y="70" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">1.7 cm (눈금 A)</text>

        <line x1="500" y1="20" x2="500" y2="35" stroke="#00ffcc" stroke-width="2" />
        <line x1="600" y1="20" x2="600" y2="50" stroke="#00ffcc" stroke-width="4" />
        <text x="600" y="70" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">1.8 cm (눈금 B)</text>

        <!-- The Problem Location: Pencil tip is at 560 (between 400 and 600 mapping to 1.7 and 1.8) -->
        <!-- Actually, 1.7 is at 400, 1.8 is at 600. So 560 is 1.78. -->

        <!-- Dotted line from tip -->
        <line x1="560" y1="-20" x2="560" y2="120" stroke="#ffff00" stroke-width="2" stroke-dasharray="5 5"
            filter="url(#glow)" />

        <!-- Warning Box -->
        <rect x="490" y="130" width="220" height="90" rx="10" fill="#220000" stroke="#ff5555" stroke-width="2" />
        <text x="600" y="155" fill="#ff5555" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">측정 한계 (Blind Spot)</text>
        <text x="600" y="180" fill="#ffffff" font-family="monospace" font-size="12" text-anchor="middle">"1.7 과 1.8 사이의
            미지 영역."</text>
        <text x="600" y="200" fill="#ffff00" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">가장 가까운 1.8 로 타협 (반올림)</text>

        <!-- Arrow pointing to nearest tick -->
        <path d="M 560 50 Q 580 80 600 50" fill="none" stroke="#ffff00" stroke-width="3" marker-end="url(#arrow_y)" />
    </g>

    <defs>
        <marker id="arrow_y" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ffff00" />
        </marker>
    </defs>

    <!-- Code Box (Python Float Issue) -->
    <g transform="translate(100, 430)">
        <rect x="0" y="0" width="700" height="120" rx="8" fill="#111" stroke="#4da6ff" stroke-width="2" />
        <text x="20" y="25" fill="#4da6ff" font-family="monospace" font-size="16" font-weight="bold">import math</text>
        <text x="20" y="50" fill="#aaaaaa" font-family="monospace" font-size="14"># 컴퓨터 메모리(Ruler) 의 영구적 한계
            (64-bit)</text>
        <text x="20" y="75" fill="#ffffff" font-family="monospace" font-size="16">print(f"{math.pi:.50f}")</text>
        <text x="20" y="100" fill="#ff5555" font-family="monospace" font-size="14" font-weight="bold"
            filter="url(#glow)">> 3.141592653589793<tspan fill="#555">1159979634685... (쓰레기 데이터)</tspan></text>
    </g>

</svg>