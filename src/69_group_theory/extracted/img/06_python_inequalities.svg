<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">AI 융단 폭격 렌더링: 최소 골짜기 스캐너</text>

    <!-- Monitor Frame -->
    <rect x="100" y="80" width="700" height="380" rx="10" fill="#0d1a26" stroke="#555566" stroke-width="4" />

    <!-- Graph Plot Area -->
    <rect x="120" y="100" width="660" height="340" fill="none" stroke="#223344" stroke-width="2" />

    <!-- Grid lines -->
    <line x1="120" y1="270" x2="780" y2="270" stroke="#223344" stroke-dasharray="5 5" />
    <line x1="120" y1="185" x2="780" y2="185" stroke="#223344" stroke-dasharray="5 5" />
    <line x1="450" y1="100" x2="450" y2="440" stroke="#223344" stroke-dasharray="5 5" />

    <!-- The Curve ( y = x + 4/x ) -->
    <!-- Minimum is at x=2, y=4. Let's map x=2 to center 450,. -->
    <path d="M 150 120 Q 250 400 450 350 T 750 120" fill="none" stroke="#00ffcc" stroke-width="6" filter="url(#glow)" />

    <!-- Data Points (Brute Force Bombardment) -->
    <circle cx="200" cy="270" r="3" fill="#ffaa00" opacity="0.6" />
    <circle cx="230" cy="300" r="3" fill="#ffaa00" opacity="0.6" />
    <circle cx="270" cy="325" r="3" fill="#ffaa00" opacity="0.6" />
    <circle cx="320" cy="342" r="3" fill="#ffaa00" opacity="0.6" />
    <circle cx="380" cy="348" r="3" fill="#ffaa00" opacity="0.8" />
    <circle cx="520" cy="348" r="3" fill="#ffaa00" opacity="0.8" />
    <circle cx="580" cy="342" r="3" fill="#ffaa00" opacity="0.6" />
    <circle cx="630" cy="325" r="3" fill="#ffaa00" opacity="0.6" />
    <circle cx="670" cy="300" r="3" fill="#ffaa00" opacity="0.6" />
    <circle cx="700" cy="270" r="3" fill="#ffaa00" opacity="0.6" />

    <!-- Lowest Vertex Detection -->
    <circle cx="450" cy="350" r="8" fill="#ff0055" stroke="#ffffff" stroke-width="2" filter="url(#glow)" />
    <line x1="450" y1="350" x2="450" y2="440" stroke="#ff0055" stroke-width="2" stroke-dasharray="5 5" />
    <line x1="120" y1="350" x2="450" y2="350" stroke="#ff0055" stroke-width="2" stroke-dasharray="5 5" />

    <rect x="400" y="320" width="100" height="25" rx="5" fill="#331111" stroke="#ff0055" />
    <text x="450" y="337" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
        text-anchor="middle">Min(2, 4)</text>

    <!-- Labels -->
    <text x="450" y="460" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">x = 2.0 (최적
        좌표)</text>
    <text x="90" y="355" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">y = 4.0</text>

    <text x="250" y="150" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold">f(x) = x + 4/x</text>

    <!-- Explain Box Down below -->
    <rect x="150" y="490" width="600" height="80" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
    <text x="450" y="520" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold"
        text-anchor="middle">np.linspace(0.01, 10.0, 100000) 작동 중...</text>
    <text x="450" y="550" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">10만 개의 픽셀 데이터를
        무식하게 다 때려넣어서 가장 낮은 바닥(4.0)을 역으로 스캔!</text>

</svg>