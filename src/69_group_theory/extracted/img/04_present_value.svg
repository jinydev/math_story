<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">타임머신 역연산: 미래가치(FV)와 현재가치(PV)</text>

    <!-- Timeline -->
    <line x1="150" y1="300" x2="750" y2="300" stroke="#555566" stroke-width="4" />
    <rect x="130" y="280" width="40" height="40" rx="5" fill="#555566" />
    <text x="150" y="305" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
        text-anchor="middle">현재</text>

    <rect x="730" y="280" width="40" height="40" rx="5" fill="#555566" />
    <text x="750" y="305" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
        text-anchor="middle">미래</text>

    <!-- Future Value (Blowing up) => Forward -->
    <g transform="translate(0, -50)">
        <path d="M 180 300 Q 450 150 720 300" fill="none" stroke="#00ffcc" stroke-width="5" stroke-dasharray="10 5"
            marker-end="url(#arrow)" filter="url(#glow)" />

        <rect x="350" y="190" width="200" height="40" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2"
            filter="url(#glow)" />
        <text x="450" y="215" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">복리 증폭: × (1+r)ⁿ</text>

        <circle cx="150" cy="300" r="30" fill="#331111" stroke="#ff0055" stroke-width="2" />
        <text x="150" y="305" fill="#ff0055" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">PV</text>

        <circle cx="750" cy="300" r="60" fill="#331111" stroke="#00ffcc" stroke-width="2" filter="url(#glow)" />
        <text x="750" y="305" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">FV</text>
    </g>

    <!-- Present Value (Discounting) => Backward -->
    <g transform="translate(0, 50)">
        <path d="M 720 300 Q 450 450 180 300" fill="none" stroke="#ff0055" stroke-width="5" stroke-dasharray="10 5"
            marker-end="url(#arrow)" filter="url(#glow)" />

        <rect x="350" y="370" width="200" height="40" rx="10" fill="#221122" stroke="#ff0055" stroke-width="2"
            filter="url(#glow)" />
        <text x="450" y="395" fill="#ff0055" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">할인 압축: ÷ (1+r)ⁿ</text>

        <circle cx="750" cy="300" r="60" fill="#221122" stroke="#555566" stroke-width="2" stroke-dasharray="5 5" />
        <text x="750" y="305" fill="#555566" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">거품 돈</text>

        <circle cx="150" cy="300" r="40" fill="#331111" stroke="#ff0055" stroke-width="3" filter="url(#glow)" />
        <text x="150" y="305" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">진짜 돈</text>
    </g>

    <!-- Equations -->
    <rect x="100" y="500" width="300" height="60" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
    <text x="250" y="535" fill="#00ffcc" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle">FV =
        PV × (1 + r)ⁿ</text>
    <text x="250" y="520" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">미래가치 공식
        (곱셈)</text>

    <rect x="500" y="500" width="300" height="60" rx="10" fill="#221122" stroke="#ff0055" stroke-width="2" />
    <text x="650" y="535" fill="#ff0055" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle">PV =
        FV / (1 + r)ⁿ</text>
    <text x="650" y="520" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">현재가치 공식
        (나눗셈)</text>

</svg>