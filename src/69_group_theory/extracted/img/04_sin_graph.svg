<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glow-strong" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">우주의 심장 박동: 사인 함수 (Sine Wave)</text>

    <!-- HUD Limits -->
    <text x="50" y="155" fill="#ff00ff" font-family="sans-serif" font-size="18" font-weight="bold"
        filter="url(#glow)">MAX: +1</text>
    <text x="50" y="455" fill="#ff00ff" font-family="sans-serif" font-size="18" font-weight="bold"
        filter="url(#glow)">MIN: -1</text>

    <!-- Coordinate System Grid -->
    <g opacity="0.2">
        <!-- horizontal grid lines -->
        <line x1="100" y1="150" x2="850" y2="150" stroke="#ffffff" stroke-width="1" stroke-dasharray="5 5" />
        <line x1="100" y1="225" x2="850" y2="225" stroke="#ffffff" stroke-width="1" stroke-dasharray="5 5" />
        <line x1="100" y1="375" x2="850" y2="375" stroke="#ffffff" stroke-width="1" stroke-dasharray="5 5" />
        <line x1="100" y1="450" x2="850" y2="450" stroke="#ffffff" stroke-width="1" stroke-dasharray="5 5" />
    </g>

    <!-- Axes -->
    <line x1="100" y1="300" x2="850" y2="300" stroke="#555566" stroke-width="3" />
    <polygon points="850,295 860,300 850,305" fill="#555566" />
    <text x="830" y="330" fill="#aaaaaa" font-family="sans-serif" font-size="20">x (rad)</text>

    <line x1="150" y1="500" x2="150" y2="100" stroke="#555566" stroke-width="3" />
    <polygon points="145,100 150,90 155,100" fill="#555566" />
    <text x="130" y="120" fill="#aaaaaa" font-family="sans-serif" font-size="20">y</text>

    <!-- Y Ticks -->
    <line x1="145" y1="150" x2="155" y2="150" stroke="#ff00ff" stroke-width="3" />
    <text x="130" y="155" fill="#ff00ff" font-family="monospace" font-size="20" font-weight="bold"
        text-anchor="end">1</text>

    <line x1="145" y1="450" x2="155" y2="450" stroke="#ff00ff" stroke-width="3" />
    <text x="130" y="455" fill="#ff00ff" font-family="monospace" font-size="20" font-weight="bold"
        text-anchor="end">-1</text>

    <!-- X Ticks -->
    <!-- Origin = 150, 2π = 750 => width = 600 -->
    <!-- π/2 = 300, π = 450, 3π/2 = 600, 2π = 750 -->
    <g fill="#4da6ff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">
        <line x1="300" y1="295" x2="300" y2="305" stroke="#4da6ff" stroke-width="3" />
        <text x="300" y="330">π/2 (90°)</text>

        <line x1="450" y1="295" x2="450" y2="305" stroke="#4da6ff" stroke-width="3" />
        <text x="450" y="330">π (180°)</text>

        <line x1="600" y1="295" x2="600" y2="305" stroke="#4da6ff" stroke-width="3" />
        <text x="600" y="330">3π/2 (270°)</text>

        <line x1="750" y1="295" x2="750" y2="305" stroke="#4da6ff" stroke-width="3" />
        <text x="750" y="330">2π (360°)</text>
    </g>

    <!-- SINE WAVE CURVE -->
    <!-- 
       A smooth cubic bezier approximation of sine:
       From (150, 300) to (300, 150)
       to (450, 300) to (600, 450) to (750, 300) 
  -->
    <path
        d="M 150 300 C 205 300, 245 150, 300 150 C 355 150, 395 300, 450 300 C 505 300, 545 450, 600 450 C 655 450, 695 300, 750 300"
        fill="none" stroke="#00ffcc" stroke-width="6" filter="url(#glow-strong)" />

    <path d="M 750 300 C 786 300, 813 200, 850 200" fill="none" stroke="#00ffcc" stroke-width="6"
        stroke-dasharray="10 5" opacity="0.5" />

    <!-- Points and descriptions -->
    <circle cx="150" cy="300" r="8" fill="#ffffff" filter="url(#glow)" />
    <text x="130" y="290" fill="#ffffff" font-family="sans-serif" font-size="14">출발</text>

    <circle cx="300" cy="150" r="10" fill="#ff00ff" filter="url(#glow)" />
    <text x="300" y="110" fill="#ff00ff" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">최고 고도 도달 (+1)</text>

    <circle cx="450" cy="300" r="8" fill="#ffffff" filter="url(#glow)" />

    <circle cx="600" cy="450" r="10" fill="#ff00ff" filter="url(#glow)" />
    <text x="600" y="490" fill="#ff00ff" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">최저 수심 도달 (-1)</text>

    <circle cx="750" cy="300" r="10" fill="#ffaa00" filter="url(#glow)" />
    <text x="750" y="270" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">1주기 (제자리 복귀)</text>

    <!-- Title Indicator -->
    <rect x="650" y="100" width="180" height="50" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
    <text x="740" y="132" fill="#00ffcc" font-family="monospace" font-size="26" font-weight="bold"
        text-anchor="middle">y = sin(x)</text>

</svg>