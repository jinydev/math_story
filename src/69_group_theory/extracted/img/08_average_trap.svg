<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">블랙 데이터 사이언스: 사기 그래프와 Y축의 마법</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"단 5%의 차이를 6배의 기적으로
        위장하는 plt.ylim() 해킹 기술"</text>

    <!-- Left: Honest Graph -->
    <g transform="translate(150, 150)">
        <rect x="-50" y="-30" width="300" height="300" rx="10" fill="#112233" stroke="#4da6ff" stroke-width="2" />
        <text x="100" y="-5" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">1. 정직한 그래프 (Base 0)</text>

        <!-- Axes -->
        <line x1="20" y1="220" x2="180" y2="220" stroke="#ffffff" stroke-width="2" />
        <line x1="20" y1="20" x2="20" y2="220" stroke="#ffffff" stroke-width="2" />

        <!-- Y-axis Ticks -->
        <text x="10" y="225" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="end">0</text>
        <text x="10" y="125" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="end">25</text>
        <text x="10" y="25" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="end">50</text>

        <!-- Bars -->
        <!-- A = 50% (Scale: 100% = 200px -> 50% = 100px height) -->
        <rect x="50" y="120" width="30" height="100" fill="#777777" />
        <text x="65" y="110" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">A (50)</text>

        <!-- B = 55% (Scale: 55% = 110px height) -->
        <rect x="110" y="110" width="30" height="110" fill="#00ffcc" />
        <text x="125" y="100" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">B (55)</text>

        <text x="100" y="250" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">"겨우 5% 차이.. 눈에
            띄지도 않네"</text>
    </g>

    <!-- Arrow pointing to the hack -->
    <g transform="translate(450, 270)">
        <path d="M -40 0 Q 0 -50 40 0" fill="none" stroke="#ff00ff" stroke-width="6" marker-end="url(#arrowPink)"
            filter="url(#glow)" />
        <text x="0" y="-30" fill="#ff00ff" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">plt.ylim(49, 56)</text>
        <text x="0" y="-10" fill="#ff00ff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">밑둥 싹둑 자르기!</text>
    </g>

    <!-- Right: Deceptive Graph -->
    <g transform="translate(550, 150)">
        <rect x="-50" y="-30" width="300" height="300" rx="10" fill="#331111" stroke="#ff4d4d" stroke-width="2" />
        <text x="100" y="-5" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">2. 사기꾼 그래프 (Base 49)</text>

        <!-- Axes -->
        <!-- We draw a jagged base to show it's cut -->
        <path d="M 15 220 L 25 210 L 15 200 L 25 190" fill="none" stroke="#ff4d4d" stroke-width="2" />
        <line x1="20" y1="210" x2="180" y2="210" stroke="#ffffff" stroke-width="2" />
        <line x1="20" y1="20" x2="20" y2="190" stroke="#ffffff" stroke-width="2" />

        <!-- Y-axis Ticks (Now represents 49 to 56) -->
        <!-- Range = 7. Height = 190px. 1 unit = ~27px -->
        <text x="10" y="215" fill="#ff4d4d" font-family="sans-serif" font-size="12" font-weight="bold"
            text-anchor="end">49</text>
        <text x="10" y="188" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="end">50</text>
        <text x="10" y="53" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="end">55</text>

        <!-- Bars -->
        <!-- A = 50 (value 1 above base 49 -> 27px height) -->
        <rect x="50" y="183" width="30" height="27" fill="#777777" />
        <text x="65" y="173" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">A (50)</text>

        <!-- B = 55 (value 6 above base 49 -> 162px height) -->
        <rect x="110" y="48" width="30" height="162" fill="#ff4d4d" />
        <text x="125" y="38" fill="#ff4d4d" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">B (55)</text>

        <text x="100" y="250" fill="#ff4d4d" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">"세상에! 무려 6배의 경이로운 우위!"</text>
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="500" width="600" height="60" rx="10" fill="#2b1111" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">시각화 차트의 시선을 통제하는
        프로그래머의 권력.</text>
    <text x="450" y="550" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">세로축이 '0' 에서 시작하는지
        비판적으로 감시하는 것이 데이터 문해력의 첫걸음입니다.</text>

    <defs>
        <marker id="arrowPink" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff00ff" />
        </marker>
    </defs>
</svg>