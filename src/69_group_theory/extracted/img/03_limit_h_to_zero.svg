<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">Limit 무한소 해킹: 분모 에러(System Crash) 우회하기</text>

    <!-- Two panels: Left = Crash, Right = Success with Limit -->

    <!-- LEFT PANEL: Crash -->
    <rect x="50" y="100" width="380" height="400" rx="15" fill="#2a000d" stroke="#ff0000" stroke-width="4" />
    <text x="240" y="140" fill="#ff0000" font-family="sans-serif" font-size="24" font-weight="bold"
        text-anchor="middle">❌ 오류: 단순 대입 시도</text>

    <text x="240" y="200" fill="#ffffff" font-family="monospace" font-size="20" text-anchor="middle">h = 0 직접 입력</text>
    <text x="240" y="240" fill="#ffaa00" font-family="monospace" font-size="24" text-anchor="middle">f(x + 0) -
        f(x)</text>
    <line x1="120" y1="260" x2="360" y2="260" stroke="#ffffff" stroke-width="2" />
    <text x="240" y="290" fill="#ffaa00" font-family="monospace" font-size="24" text-anchor="middle">0</text>

    <text x="240" y="340" fill="#ffffff" font-family="monospace" font-size="30" font-weight="bold"
        text-anchor="middle">↓</text>
    <text x="240" y="390" fill="#ff0000" font-family="monospace" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">0 / 0 ERROR!</text>
    <text x="240" y="430" fill="#ff6666" font-family="sans-serif" font-size="14" text-anchor="middle">ZeroDivisionError:
        System Halted</text>

    <!-- Divider Arrow -->
    <path d="M 450 300 L 480 300" stroke="#ffffff" stroke-width="4" marker-end="url(#arrowhead)" />
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" />
        </marker>
    </defs>
    <text x="465" y="280" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">백신 투여</text>

    <!-- RIGHT PANEL: Success -->
    <rect x="520" y="100" width="350" height="400" rx="15" fill="#001a33" stroke="#00ffcc" stroke-width="4" />
    <text x="695" y="140" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
        text-anchor="middle">✅ 극한(Limit) 방어막 전개</text>

    <rect x="570" y="180" width="100" height="120" fill="rgba(0, 255, 204, 0.2)" stroke="#00ffcc"
        stroke-dasharray="4 4" />
    <text x="620" y="240" fill="#00ffcc" font-family="monospace" font-size="36" font-weight="bold"
        text-anchor="middle">lim</text>
    <text x="620" y="270" fill="#00ffcc" font-family="monospace" font-size="18" text-anchor="middle">h → 0</text>

    <text x="750" y="210" fill="#ffffff" font-family="monospace" font-size="20" text-anchor="middle">f(x + h) -
        f(x)</text>
    <line x1="680" y1="230" x2="820" y2="230" stroke="#ffffff" stroke-width="2" />
    <text x="750" y="260" fill="#ff0055" font-family="monospace" font-size="24" text-anchor="middle"
        font-weight="bold">h</text>

    <text x="695" y="320" fill="#ffffff" font-family="monospace" font-size="24" font-weight="bold"
        text-anchor="middle">↓ (예: x² 미분 과정)</text>

    <text x="695" y="360" fill="#ffffff" font-family="monospace" font-size="20" text-anchor="middle">lim [2x + h]</text>
    <line x1="720" y1="355" x2="750" y2="355" stroke="#ff0055" stroke-width="3" transform="rotate(-30 735 355)" />

    <text x="695" y="420" fill="#00ffcc" font-family="monospace" font-size="40" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">= 2x 도출 성공!</text>

    <!-- Footer explanation -->
    <rect x="150" y="520" width="600" height="50" rx="10" fill="#0f0f15" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="550" fill="#ffaa00" font-family="sans-serif" font-size="16" text-anchor="middle">Limit 매크로는 분모 폭탄
        h가 약분되어 사라질 때까지 버티다가 마지막에 먼지(h)를 지웁니다.</text>

</svg>