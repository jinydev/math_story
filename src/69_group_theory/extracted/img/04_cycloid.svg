<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#aaaaaa" />
        </marker>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">달리는 바퀴의 궤적: 사이클로이드 (Cycloid)</text>

    <!-- Ground Line -->
    <line x1="50" y1="280" x2="750" y2="280" stroke="#777777" stroke-width="3" />
    <text x="750" y="300" fill="#777777" font-family="sans-serif" font-size="16" text-anchor="end">지면 (Ground)</text>

    <!-- The Cycloid Curve -->
    <!-- Generated via param eq: x = r(t - sin(t)), y = r(1 - cos(t)) -->
    <path d="M 100 280 
           C 150 180, 250 80, 314 80 
           C 378 80, 478 180, 528 280 
           C 578 180, 678 80, 742 80" fill="none" stroke="#00ffcc" stroke-width="5" filter="url(#glow)" />

    <!-- Wheel 1 (Start) -->
    <g transform="translate(100, 220)">
        <circle cx="0" cy="0" r="60" fill="none" stroke="#4da6ff" stroke-width="3" stroke-dasharray="8 6"
            opacity="0.6" />
        <line x1="0" y1="0" x2="0" y2="60" stroke="#4da6ff" stroke-width="2" opacity="0.6" />
        <circle cx="0" cy="60" r="8" fill="#ff4d4d" />
        <text x="0" y="85" fill="#ff4d4d" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">스티커</text>
    </g>

    <!-- Wheel 2 (Middle) -->
    <g transform="translate(314, 220)">
        <circle cx="0" cy="0" r="60" fill="none" stroke="#4da6ff" stroke-width="3" opacity="0.8" />
        <line x1="0" y1="0" x2="0" y2="-60" stroke="#4da6ff" stroke-width="4" />
        <circle cx="0" cy="-60" r="8" fill="#ff4d4d" filter="url(#glow)" />
        <text x="0" y="-75" fill="#ff4d4d" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">최고점 (y = 2r)</text>

        <!-- Motion Arrow -->
        <path d="M 60 -10 A 70 70 0 0 1 80 40" fill="none" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)" />
        <text x="95" y="20" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">회전 진행</text>
    </g>

    <!-- Wheel 3 (End of one cycle) -->
    <g transform="translate(528, 220)">
        <circle cx="0" cy="0" r="60" fill="none" stroke="#4da6ff" stroke-width="3" stroke-dasharray="8 6"
            opacity="0.6" />
        <line x1="0" y1="0" x2="0" y2="60" stroke="#4da6ff" stroke-width="2" opacity="0.6" />
        <circle cx="0" cy="60" r="8" fill="#ff4d4d" />
    </g>

    <!-- Distance Brace -->
    <line x1="100" y1="310" x2="100" y2="330" stroke="#aaaaaa" stroke-width="2" />
    <line x1="528" y1="310" x2="528" y2="330" stroke="#aaaaaa" stroke-width="2" />
    <line x1="100" y1="320" x2="528" y2="320" stroke="#aaaaaa" stroke-width="2" />
    <text x="314" y="340" fill="#aaaaaa" font-family="monospace" font-size="20" font-weight="bold"
        text-anchor="middle">2πr (바퀴 한 바퀴 둘레)</text>

    <!-- Explanation Texts -->
    <rect x="150" y="350" width="500" height="40" rx="10" fill="#112233" stroke="#4da6ff" stroke-width="2" />
    <text x="400" y="375" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">최단 시간으로 빗면을 미끄러지는
        <tspan fill="#ff4d4d" font-weight="bold">최단 강하 곡선 (Brachistochrone)</tspan> 마법!</text>

</svg>