<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="30" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">부등식의 덧셈/뺄셈: 절대 변하지 않는 승패</text>

    <!-- Left: Original State -->
    <g transform="translate(100, 130)">
        <text x="150" y="0" fill="#4da6ff" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">초기 상태</text>
        <text x="150" y="35" fill="#ffffff" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">5 &lt; 10</text>

        <!-- Scale base -->
        <path d="M 150 250 L 100 290 L 200 290 Z" fill="#445566" />
        <!-- Scale beam tilted -->
        <line x1="50" y1="200" x2="250" y2="230" stroke="#ffffff" stroke-width="6" />
        <!-- Pivot -->
        <circle cx="150" cy="215" r="8" fill="#ff4d4d" />

        <!-- Left Pan (Lighter - 5kg) -->
        <line x1="50" y1="200" x2="50" y2="240" stroke="#aaaaaa" stroke-width="2" />
        <path d="M 20 240 L 80 240 Q 50 270 20 240" fill="#778899" />
        <!-- Weight 5 -->
        <rect x="35" y="190" width="30" height="30" fill="#00ffcc" filter="url(#glow)" />
        <text x="50" y="212" fill="#000000" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">5</text>

        <!-- Right Pan (Heavier - 10kg) -->
        <line x1="250" y1="230" x2="250" y2="270" stroke="#aaaaaa" stroke-width="2" />
        <path d="M 220 270 L 280 270 Q 250 300 220 270" fill="#778899" />
        <!-- Weight 10 -->
        <rect x="230" y="190" width="40" height="60" fill="#ff00ff" filter="url(#glow)" />
        <text x="250" y="225" fill="#000000" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">10</text>

        <!-- Monster Mouth -->
        <path d="M 120 70 L 180 50 L 120 90 L 140 70 Z" fill="#ffaa00" transform="translate(0, 40)" />
        <text x="150" y="130" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">"오른쪽이 무겁다!"</text>
    </g>

    <!-- Plus Text -->
    <text x="450" y="330" fill="#ffffff" font-family="sans-serif" font-size="50" font-weight="bold"
        text-anchor="middle">→</text>
    <rect x="360" y="350" width="180" height="40" fill="#1a1a24" stroke="#00ffcc" stroke-width="2" rx="10" />
    <text x="450" y="377" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">양쪽 모두 +3 kg 추가</text>

    <!-- Right: After adding +3 -->
    <g transform="translate(500, 130)">
        <text x="150" y="0" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">덧셈/뺄셈 후</text>
        <text x="150" y="35" fill="#ffffff" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">8 <tspan fill="#00ffcc" font-family="sans-serif" font-size="36" font-weight="bold">&lt;
            </tspan> 13</text>

        <!-- Scale base -->
        <path d="M 150 250 L 100 290 L 200 290 Z" fill="#445566" />
        <!-- Scale beam tilted -->
        <line x1="50" y1="200" x2="250" y2="230" stroke="#ffffff" stroke-width="6" />
        <!-- Pivot -->
        <circle cx="150" cy="215" r="8" fill="#ff4d4d" />

        <!-- Left Pan (Lighter - 5+3) -->
        <line x1="50" y1="200" x2="50" y2="240" stroke="#aaaaaa" stroke-width="2" />
        <path d="M 20 240 L 80 240 Q 50 270 20 240" fill="#778899" />

        <rect x="25" y="170" width="30" height="30" fill="#00ffcc" /> <!-- 5 -->
        <rect x="55" y="180" width="20" height="20" fill="#ffff00" stroke="#000" stroke-width="1" /> <!-- 3 -->
        <text x="40" y="190" fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">5</text>
        <text x="65" y="195" fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold"
            text-anchor="middle">+3</text>

        <!-- Right Pan (Heavier - 10+3) -->
        <line x1="250" y1="230" x2="250" y2="270" stroke="#aaaaaa" stroke-width="2" />
        <path d="M 220 270 L 280 270 Q 250 300 220 270" fill="#778899" />

        <rect x="230" y="170" width="40" height="60" fill="#ff00ff" /> <!-- 10 -->
        <rect x="270" y="210" width="20" height="20" fill="#ffff00" stroke="#000" stroke-width="1" /> <!-- 3 -->
        <text x="250" y="205" fill="#000000" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">10</text>
        <text x="280" y="225" fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold"
            text-anchor="middle">+3</text>

        <!-- Monster Mouth STILL Same direction -->
        <path d="M 120 70 L 180 50 L 120 90 L 140 70 Z" fill="#00ffcc" transform="translate(0, 40)"
            filter="url(#glow)" />
        <text x="150" y="130" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">"방향 절대 안 변함!"</text>
    </g>

    <!-- Big Banner -->
    <rect x="150" y="470" width="600" height="60" rx="15" fill="#2b1133" stroke="#ff00ff" stroke-width="3" />
    <text x="450" y="508" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">양수에 같은 수를 더하거나 빼도 <tspan fill="#ff00ff">부등호 방향은 절대 유지($&lt;$)</tspan></text>

</svg>