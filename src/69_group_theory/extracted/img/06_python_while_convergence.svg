<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">파이썬 while 루프의 비명: 극한 수렴 메모리 한계 부딪치기!</text>

    <!-- Left: Python Code Block -->
    <g transform="translate(50, 80)">
        <rect x="0" y="0" width="400" height="420" rx="10" fill="#111" stroke="#4da6ff" stroke-width="2" />
        <rect x="0" y="0" width="400" height="30" rx="10" fill="#222" />
        <text x="200" y="20" fill="#aaaaaa" font-family="monospace" font-size="14"
            text-anchor="middle">Zeno_Paradox_Loop.py</text>

        <text x="20" y="60" fill="#cc88ff" font-family="monospace" font-size="16">current_piece</text>
        <text x="145" y="60" fill="#ff7b72" font-family="monospace" font-size="16">=</text>
        <text x="165" y="60" fill="#79c0ff" font-family="monospace" font-size="16">0.5</text>

        <text x="20" y="90" fill="#cc88ff" font-family="monospace" font-size="16">total_sum</text>
        <text x="115" y="90" fill="#ff7b72" font-family="monospace" font-size="16">=</text>
        <text x="135" y="90" fill="#79c0ff" font-family="monospace" font-size="16">0.0</text>

        <text x="20" y="130" fill="#ff7b72" font-family="monospace" font-size="16" font-weight="bold">while True:</text>

        <text x="50" y="160" fill="#7a828e" font-family="monospace" font-size="14"># 먼지를 장바구니에 텍스처 합체!</text>
        <text x="50" y="180" fill="#cc88ff" font-family="monospace" font-size="16">total_sum</text>
        <text x="145" y="180" fill="#ff7b72" font-family="monospace" font-size="16">+=</text>
        <text x="175" y="180" fill="#cc88ff" font-family="monospace" font-size="16">current_piece</text>

        <text x="50" y="220" fill="#7a828e" font-family="monospace" font-size="14"># 방어벽: 메모리 인지 이하 티끌이면 탈출</text>
        <text x="50" y="240" fill="#ff7b72" font-family="monospace" font-size="16" font-weight="bold">if</text>
        <text x="80" y="240" fill="#cc88ff" font-family="monospace" font-size="16">current_piece</text>
        <text x="210" y="240" fill="#ff7b72" font-family="monospace" font-size="16">&lt;</text>
        <text x="230" y="240" fill="#79c0ff" font-family="monospace" font-size="16">0.0000000001:</text>

        <text x="80" y="270" fill="#ff7b72" font-family="monospace" font-size="16" font-weight="bold">print</text>
        <text x="135" y="270" fill="#a5d6ff" font-family="monospace" font-size="16">("수렴 완료 록업!")</text>
        <text x="80" y="290" fill="#ff7b72" font-family="monospace" font-size="16" font-weight="bold">break</text>

        <text x="50" y="330" fill="#7a828e" font-family="monospace" font-size="14"># 다음 턴! (반갈죽 공비 r = 0.5)</text>
        <text x="50" y="350" fill="#cc88ff" font-family="monospace" font-size="16">current_piece</text>
        <text x="175" y="350" fill="#ff7b72" font-family="monospace" font-size="16">=</text>
        <text x="195" y="350" fill="#cc88ff" font-family="monospace" font-size="16">current_piece</text>
        <text x="320" y="350" fill="#ff7b72" font-family="monospace" font-size="16">*</text>
        <text x="340" y="350" fill="#79c0ff" font-family="monospace" font-size="16">0.5</text>
    </g>

    <!-- Connection Arrow -->
    <path d="M 460 290 L 485 290 L 485 240 L 510 240" fill="none" stroke="#FFFF00" stroke-width="4"
        stroke-dasharray="6 6" marker-end="url(#arrow_y)" />

    <defs>
        <marker id="arrow_y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
        </marker>
    </defs>

    <!-- Right: Terminal Output & Crash Scene -->
    <g transform="translate(520, 80)">
        <rect x="0" y="0" width="350" height="420" rx="10" fill="#000000" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="175" y="25" fill="#00ffcc" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">Console Output (Terminal)</text>
        <line x1="0" y1="35" x2="350" y2="35" stroke="#00ffcc" stroke-width="1" />

        <g font-family="monospace" font-size="13" fill="#00ff00">
            <text x="10" y="60">Turn 01: Sum = 0.5000000000</text>
            <text x="10" y="80">Turn 02: Sum = 0.7500000000</text>
            <text x="10" y="100">Turn 03: Sum = 0.8750000000</text>
            <text x="10" y="120">Turn 04: Sum = 0.9375000000</text>
            <text x="10" y="140">...</text>
            <text x="10" y="160">Turn 10: Sum = 0.9990234375</text>
            <text x="10" y="180">...</text>
            <text x="10" y="200" fill="#ffff00">Turn 20: Sum = 0.9999990463</text>
            <text x="10" y="220" fill="#ffff00">...</text>
            <text x="10" y="240" fill="#ffaa00">Turn 32: Sum = 0.9999999997</text>
            <text x="10" y="260" fill="#ff5555" font-weight="bold">Turn 33: Sum = 0.9999999998</text>
            <text x="10" y="280" fill="#ff0000" font-weight="bold">Turn 34: Sum = 0.9999999999</text>
        </g>

        <!-- Explosion / Convergence Hit Box -->
        <rect x="10" y="310" width="330" height="90" rx="5" fill="#2d0011" stroke="#ff0000" stroke-width="2" />
        <text x="175" y="335" fill="#ff0000" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">★ 시스템 알림 ★</text>
        <text x="175" y="360" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">조각이 극한 미입자가
            되어</text>
        <text x="175" y="380" fill="#ffcc00" font-family="sans-serif" font-size="15" font-weight="bold"
            text-anchor="middle">수렴 상태 록업! 엔진 셧다운!</text>
    </g>

    <rect x="150" y="530" width="600" height="50" rx="10" fill="#1b1111" stroke="#ff0055" stroke-width="2" />
    <text x="450" y="560" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        1억 번 루프를 돌려도 <tspan fill="#ff0055" font-weight="bold">9</tspan> 가 무한 증식할 뿐, 결코 숫자 <tspan fill="#ffff00"
            font-weight="bold">1.0 의 턱걸이</tspan>를 돌파하지 못합니다.
    </text>
</svg>