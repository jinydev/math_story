<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <!-- Arrowhead markers -->
        <marker id="arrow_down" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 5 10 L 10 0 z" fill="#ff4d4d" />
        </marker>
        <marker id="arrow_right" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffaa00" />
        </marker>
        <marker id="arrow_up" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 10 L 5 0 L 10 10 z" fill="#00ffcc" />
        </marker>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">팩토리얼(n!) 재귀 스택 &amp; 점화식 구조</text>
    <text x="400" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">F(n) = n * F(n-1)
        호출과 바닥에서의 복귀 과정</text>

    <!-- Left Side: Calling down (Recursion) -->
    <g transform="translate(100, 120)" font-family="monospace" font-size="18" font-weight="bold">
        <text x="100" y="-10" fill="#ff4d4d" text-anchor="middle">1. 재귀 호출 (파고들기)</text>

        <!-- Block 5! -->
        <rect x="0" y="20" width="200" height="50" rx="8" fill="#2d2d44" stroke="#ff4d4d" stroke-width="2" />
        <text x="100" y="50" fill="#ffffff" text-anchor="middle">F(5) = 5 * F(4)</text>
        <path d="M 100 70 L 100 110" stroke="#ff4d4d" stroke-width="3" marker-end="url(#arrow_down)" />

        <!-- Block 4! -->
        <rect x="0" y="110" width="200" height="50" rx="8" fill="#2d2d44" stroke="#ff4d4d" stroke-width="2" />
        <text x="100" y="140" fill="#ffffff" text-anchor="middle">F(4) = 4 * F(3)</text>
        <path d="M 100 160 L 100 200" stroke="#ff4d4d" stroke-width="3" marker-end="url(#arrow_down)" />

        <!-- Block 3! -->
        <rect x="0" y="200" width="200" height="50" rx="8" fill="#2d2d44" stroke="#ff4d4d" stroke-width="2" />
        <text x="100" y="230" fill="#ffffff" text-anchor="middle">F(3) = 3 * F(2)</text>
        <path d="M 100 250 L 100 290" stroke="#ff4d4d" stroke-width="3" marker-end="url(#arrow_down)" />

        <!-- Block 2! -->
        <rect x="0" y="290" width="200" height="50" rx="8" fill="#2d2d44" stroke="#ff4d4d" stroke-width="2" />
        <text x="100" y="320" fill="#ffffff" text-anchor="middle">F(2) = 2 * F(1)</text>
        <path d="M 100 340 L 100 380" stroke="#ff4d4d" stroke-width="3" marker-end="url(#arrow_down)" />

        <!-- Base Case (F(1)) -->
        <rect x="250" y="380" width="300" height="50" rx="8" fill="#112211" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="400" y="410" fill="#00ffcc" text-anchor="middle">바닥 조건 (Base Case): F(1) = 1 반환!</text>

        <path d="M 100 405 L 240 405" stroke="#ffaa00" stroke-width="3" marker-end="url(#arrow_right)" />
    </g>

    <!-- Right Side: Returning up (Solving) -->
    <g transform="translate(500, 120)" font-family="monospace" font-size="18" font-weight="bold">
        <text x="100" y="-10" fill="#00ffcc" text-anchor="middle">2. 연산 복귀 (터뜨리며 튕겨올라감)</text>

        <!-- Block F(1)->F(2) return -->
        <path d="M 200 405 L 100 350" stroke="#00ffcc" stroke-width="3" marker-end="url(#arrow_up)" />

        <!-- Return 2! -->
        <rect x="0" y="290" width="200" height="50" rx="8" fill="#2d2d44" stroke="#00ffcc" stroke-width="2" />
        <text x="100" y="320" fill="#00ffcc" text-anchor="middle">2 * 1 = 2 반환</text>
        <path d="M 100 290 L 100 260" stroke="#00ffcc" stroke-width="3" marker-end="url(#arrow_up)" />

        <!-- Return 3! -->
        <rect x="0" y="200" width="200" height="50" rx="8" fill="#2d2d44" stroke="#00ffcc" stroke-width="2" />
        <text x="100" y="230" fill="#00ffcc" text-anchor="middle">3 * 2 = 6 반환</text>
        <path d="M 100 200 L 100 170" stroke="#00ffcc" stroke-width="3" marker-end="url(#arrow_up)" />

        <!-- Return 4! -->
        <rect x="0" y="110" width="200" height="50" rx="8" fill="#2d2d44" stroke="#00ffcc" stroke-width="2" />
        <text x="100" y="140" fill="#00ffcc" text-anchor="middle">4 * 6 = 24 반환</text>
        <path d="M 100 110 L 100 80" stroke="#00ffcc" stroke-width="3" marker-end="url(#arrow_up)" />

        <!-- Return 5! -->
        <rect x="0" y="20" width="200" height="50" rx="8" fill="#112233" stroke="#ffaa00" stroke-width="3"
            filter="url(#glow)" />
        <text x="100" y="50" fill="#ffaa00" text-anchor="middle">5 * 24 = 120 (최종)</text>
    </g>

</svg>