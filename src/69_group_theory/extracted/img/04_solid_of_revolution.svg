<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">평면 도화지에서 3D 마법 소환: 회전체 (Solid of Revolution)</text>

    <!-- Left: Rotation Axis & 2D Rectangle -->
    <g transform="translate(150, 300)">
        <!-- Rotation Axis -->
        <line x1="0" y1="-180" x2="0" y2="180" stroke="#ffffff" stroke-width="4" stroke-dasharray="10 6"
            filter="url(#glow)" />
        <text x="0" y="-200" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">회전축 (Axis)</text>

        <!-- 2D Rectangle -->
        <rect x="0" y="-120" width="100" height="240" fill="#00ffcc" opacity="0.6" stroke="#00ffcc" stroke-width="2" />
        <text x="50" y="0" fill="#000000" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">2D 폴리곤</text>
        <text x="50" y="25" fill="#000000" font-family="sans-serif" font-size="14" text-anchor="middle">(직사각형)</text>

        <!-- Motion lines -->
        <path d="M 120 -100 Q 150 -50 120 0" fill="none" stroke="#ffaa00" stroke-width="3" stroke-dasharray="4 4"
            marker-end="url(#arrow)" />
        <path d="M 120 0 Q 150 50 120 100" fill="none" stroke="#ffaa00" stroke-width="3" stroke-dasharray="4 4"
            marker-end="url(#arrow)" />
    </g>

    <!-- Center Transformation Arrow -->
    <g transform="translate(380, 270)">
        <path d="M 0 0 Q 70 -50 140 0 Q 70 50 0 0" fill="none" stroke="#ff4d4d" stroke-width="4" filter="url(#glow)" />
        <text x="70" y="7" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">360° 고속회전!</text>
    </g>

    <!-- Right: Resulting 3D Cylinder -->
    <g transform="translate(650, 300)">
        <!-- Rotation Axis -->
        <line x1="0" y1="-180" x2="0" y2="180" stroke="#ffffff" stroke-width="2" stroke-dasharray="6 4" opacity="0.5" />

        <!-- Cylinder Back Edge of ellipses -->
        <path d="M -100 -120 A 100 30 0 0 0 100 -120" fill="none" stroke="#4da6ff" stroke-width="2"
            stroke-dasharray="4 4" />
        <path d="M -100 120 A 100 30 0 0 0 100 120" fill="none" stroke="#4da6ff" stroke-width="2"
            stroke-dasharray="4 4" />

        <!-- Cylinder Body (Left, Right) -->
        <line x1="-100" y1="-120" x2="-100" y2="120" stroke="#4da6ff" stroke-width="4" />
        <line x1="100" y1="-120" x2="100" y2="120" stroke="#4da6ff" stroke-width="4" />

        <!-- Cylinder Front Edge of ellipses -->
        <path d="M -100 -120 A 100 30 0 0 1 100 -120" fill="none" stroke="#4da6ff" stroke-width="4" />
        <path d="M -100 120 A 100 30 0 0 1 100 120" fill="none" stroke="#4da6ff" stroke-width="4" />

        <ellipse cx="0" cy="-120" rx="100" ry="30" fill="#4da6ff" opacity="0.2" />

        <!-- Fill Gradient-like illusion -->
        <rect x="-100" y="-120" width="200" height="240" fill="#4da6ff" opacity="0.1" />

        <text x="0" y="0" fill="#4da6ff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle"
            filter="url(#glow)">3D 입체물</text>
        <text x="0" y="30" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">(원통, 부피
            형성)</text>

        <!-- Slicing Knife concept -->
        <line x1="-150" y1="40" x2="150" y2="40" stroke="#ff00ff" stroke-width="2" stroke-dasharray="10 5" />
        <ellipse cx="0" cy="40" rx="100" ry="30" fill="#ff00ff" opacity="0.3" stroke="#ff00ff" stroke-width="2" />
        <text x="160" y="45" fill="#ff00ff" font-family="sans-serif" font-size="14" font-weight="bold">모든 단면은
            '원(Circle)'</text>
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="520" width="600" height="50" rx="10" fill="#113322" stroke="#00ffcc" stroke-width="2" />
    <text x="450" y="550" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">도자기 물레처럼 돌아가는 회전
        "잔상"들이 허공에 물리적인 3D 부피 스킨을 생성한다!</text>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffaa00" />
        </marker>
    </defs>
</svg>