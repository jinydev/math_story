<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="40" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">최적화 미분: 가성비 극한의 도면 치수 재기</text>

    <!-- Top Section: Background problem -->
    <g transform="translate(100, 80)">
        <rect x="0" y="0" width="700" height="120" rx="15" fill="#0d141e" stroke="#4da6ff" stroke-width="3" />
        <text x="350" y="30" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">총 길이 100cm 와이어
            절단 퀘스트</text>

        <!-- The wire -->
        <line x1="100" y1="60" x2="600" y2="60" stroke="#aaaaaa" stroke-width="8" stroke-linecap="round" />

        <!-- Cut point -->
        <line x1="250" y1="40" x2="250" y2="80" stroke="#ff0055" stroke-width="4" stroke-dasharray="5 5"
            filter="url(#glow)" />
        <path d="M 230 20 L 250 40 L 270 20" fill="none" stroke="#ffffff" stroke-width="3" />
        <!-- Scissors simple icon -->

        <text x="175" y="90" fill="#ff0055" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">x (정사각형)</text>
        <text x="425" y="90" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">100 - x (원형)</text>
    </g>

    <!-- Left: Square construction -->
    <g transform="translate(150, 230)">
        <rect x="0" y="0" width="120" height="120" fill="none" stroke="#ff0055" stroke-width="6" filter="url(#glow)" />
        <text x="60" y="150" fill="#ff0055" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">정사각형 면적</text>
        <text x="60" y="170" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">(x/4)²</text>
    </g>

    <text x="310" y="290" fill="#ffffff" font-family="sans-serif" font-size="40" font-weight="bold">+</text>

    <!-- Right: Circle construction -->
    <g transform="translate(350, 230)">
        <circle cx="60" cy="60" r="60" fill="none" stroke="#00ffcc" stroke-width="6" filter="url(#glow)" />
        <text x="60" y="150" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">둥근 원 면적</text>
        <text x="60" y="170" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">π *
            ((100-x)/(2π))²</text>
    </g>

    <!-- Total Equation -->
    <g transform="translate(530, 220)">
        <!-- Giant Arrow -->
        <path d="M 0 70 L 40 70" stroke="#ffff00" stroke-width="6" marker-end="url(#arrow_y)" />

        <rect x="60" y="0" width="260" height="190" rx="10" fill="#1b1111" stroke="#ffaa00" stroke-width="4" />
        <text x="190" y="30" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">합계 면적 최적화 A(x)</text>

        <text x="190" y="70" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">↓ 미분 A'(x) = 0
            타격! ↓</text>

        <rect x="80" y="90" width="220" height="40" fill="#331100" rx="5" />
        <text x="190" y="117" fill="#ff0055" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">x ≈ 56cm</text>
        <text x="190" y="150" fill="#ffaa00" font-family="sans-serif" font-size="14" text-anchor="middle">초 극혐 최솟값 나락
            도출!</text>
        <text x="190" y="175" fill="#00ffcc" font-family="sans-serif" font-size="14" text-anchor="middle">(원형 몰빵시 면적
            최고!) </text>
    </g>

    <!-- The Minimization Graph below -->
    <g transform="translate(100, 430)">
        <rect x="0" y="0" width="700" height="90" rx="10" fill="#110d1a" stroke="#ffffff" stroke-width="2" />
        <path d="M 50 60 Q 350 -100 650 60" fill="none" stroke="#ffff00" stroke-width="6" filter="url(#glow)" />

        <circle cx="350" cy="55" r="8" fill="#ff0055" stroke="#fff" stroke-width="3" />
        <line x1="320" y1="55" x2="380" y2="55" stroke="#ff0055" stroke-width="4" />
        <text x="350" y="80" fill="#ffffff" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">A'(x) = 0 극소점 (최악의 가성비)</text>

        <circle cx="650" cy="60" r="10" fill="#00ffcc" stroke="#fff" stroke-width="3" />
        <text x="650" y="40" fill="#00ffcc" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">경계선 최대 (원형 몰빵)</text>
    </g>

    <defs>
        <marker id="arrow_y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
        </marker>
    </defs>

    <rect x="100" y="535" width="700" height="40" rx="10" fill="#0f0f15" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="560" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        두꺼운 미분 부피 공식을 조립하고 <tspan fill="#ff0055" font-weight="bold">도함수 = 0</tspan>을 구하면, 자원을 가장 비참하게 날리는 포인트를 스캔할 수
        있습니다.
    </text>
</svg>