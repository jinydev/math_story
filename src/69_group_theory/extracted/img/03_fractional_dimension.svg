<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">괴물 프랙탈: 소수 차원 (1.58 Dimension)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"우주의 확장의 법칙을 위배하고,
        면적이 송송 뚫려버린 혼돈(Chaos) 의 구조물"</text>

    <!-- Left Side: Normal 2D Square -->
    <g transform="translate(180, 200)">
        <rect x="-20" y="-40" width="220" height="260" rx="10" fill="#112211" stroke="#00ffcc" stroke-width="2" />
        <text x="90" y="-10" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">유클리드 2차원 공간</text>

        <!-- Normal Square x2 scaling -->
        <rect x="30" y="40" width="120" height="120" fill="none" stroke="#fff" stroke-width="2" />
        <rect x="30" y="40" width="60" height="60" fill="#0055aa" stroke="#00ffcc" stroke-width="2" />
        <rect x="90" y="40" width="60" height="60" fill="#0055aa" stroke="#00ffcc" stroke-width="2" />
        <rect x="30" y="100" width="60" height="60" fill="#0055aa" stroke="#00ffcc" stroke-width="2" />
        <rect x="90" y="100" width="60" height="60" fill="#0055aa" stroke="#00ffcc" stroke-width="2" />

        <!-- Arrows showing scale and mass -->
        <path d="M 20 40 L 20 160" fill="none" stroke="#ffff00" stroke-width="3" marker-end="url(#arrow_y)"
            marker-start="url(#arrow_y)" />
        <text x="0" y="105" fill="#ffff00" font-weight="bold">R=2</text>

        <text x="90" y="180" fill="#fff" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">Mass N = <tspan fill="#00ffcc" font-size="20">4</tspan> 조각</text>
        <text x="90" y="205" fill="#ffff00" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">2^D = 4 (D = 2.0)</text>
    </g>

    <!-- Right Side: Sierpinski Triangle -->
    <g transform="translate(500, 200)">
        <rect x="-20" y="-40" width="240" height="260" rx="10" fill="#1b0022" stroke="#ff00ff" stroke-width="2" />
        <text x="100" y="-10" fill="#ff00ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">프랙탈 다중 차원 우주</text>

        <!-- Sierpinski x2 scaling (Mass=3) -->
        <!-- Main Triangle boundary -->
        <polygon points="100,20 40,140 160,140" fill="none" stroke="#fff" stroke-width="2" />

        <!-- Top sub-triangle -->
        <polygon points="100,20 70,80 130,80" fill="#ff00aa" stroke="#ff00ff" stroke-width="2" filter="url(#glow)" />
        <!-- Bottom Left sub-triangle -->
        <polygon points="70,80 40,140 100,140" fill="#ff00aa" stroke="#ff00ff" stroke-width="2" filter="url(#glow)" />
        <!-- Bottom Right sub-triangle -->
        <polygon points="130,80 100,140 160,140" fill="#ff00aa" stroke="#ff00ff" stroke-width="2" filter="url(#glow)" />

        <!-- Middle hole is empty mapping the anomaly -->
        <text x="100" y="115" fill="#aaaaaa" font-weight="bold" font-size="12" text-anchor="middle">Empty (구멍남)</text>

        <!-- Arrows showing scale and mass -->
        <path d="M 30 140 L 90 20" fill="none" stroke="#ffff00" stroke-width="3" marker-end="url(#arrow_y)"
            marker-start="url(#arrow_y)" />
        <text x="30" y="80" fill="#ffff00" font-weight="bold">R=2</text>

        <text x="100" y="180" fill="#fff" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">Mass N = <tspan fill="#ff00ff" font-size="20">3</tspan> 조각 (1개 상실!)</text>
        <text x="100" y="205" fill="#ffff00" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">2^D = 3 (D ≈ 1.58)</text>
    </g>

    <!-- Transitions -->
    <text x="440" y="280" fill="#ff5555" font-size="32" font-weight="bold" filter="url(#glow)">≠</text>

    <defs>
        <marker id="arrow_y" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ffff00" />
        </marker>
    </defs>

    <!-- Big Alert Bottom -->
    <rect x="100" y="470" width="700" height="90" rx="10" fill="#0d1b2a" stroke="#4da6ff" stroke-width="2" />
    <text x="450" y="505" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        도형을 <tspan fill="#ffff00" font-weight="bold">R배 확대</tspan> 했을 때 필요한 덩어리 개수를 <tspan fill="#00ffcc"
            font-weight="bold">N조각</tspan> 이라고 하면, 그 도형의 차원 공통 분모(D) 는
    </text>
    <text x="450" y="535" fill="#ff00ff" font-family="monospace" font-size="22" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">
        D = log(N) / log(R) (박스 카운팅 알고리즘)
    </text>
</svg>