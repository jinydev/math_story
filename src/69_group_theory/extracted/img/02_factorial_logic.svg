<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">팩토리얼(!) 폭발과 원순열의 붕괴</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"끝까지 한 줄로 다 세우는 악독한
        루프 vs 방향성이 파괴되는 원탁 회의"</text>

    <!-- Left Side: 10! Explosion -->
    <g transform="translate(100, 150)">
        <rect x="0" y="0" width="300" height="300" rx="10" fill="#221111" stroke="#ff4d4d" stroke-width="2" />
        <text x="150" y="40" fill="#ff4d4d" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">1. 직선 줄 세우기 (10!)</text>

        <text x="150" y="90" fill="#ffffff" font-family="monospace" font-size="18" text-anchor="middle">10 × 9 × 8 × 7 ×
            ... × 1</text>

        <path d="M 150 110 L 150 150" stroke="#ff4d4d" stroke-width="4" marker-end="url(#arrowRed)" />

        <text x="150" y="190" fill="#ff4d4d" font-family="monospace" font-size="36" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">3,628,800</text>
        <text x="150" y="240" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">단 10명만 세웠을 뿐인데...</text>
        <text x="150" y="265" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">CPU를 뻗게 만드는 미친
            팽창률</text>
    </g>

    <!-- Right Side: Circular Permutation -->
    <g transform="translate(500, 150)">
        <rect x="0" y="0" width="300" height="300" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="150" y="40" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">2. 원탁 회의 (원순열)</text>

        <!-- Round Table -->
        <circle cx="150" cy="150" r="50" fill="#1a1a24" stroke="#00ffcc" stroke-width="3" />

        <!-- 4 Chairs / People -->
        <circle cx="150" cy="80" r="15" fill="#4da6ff" filter="url(#glow)" />
        <text x="150" y="85" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">A</text>

        <circle cx="220" cy="150" r="15" fill="#4da6ff" />
        <text x="220" y="155" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">B</text>

        <circle cx="150" cy="220" r="15" fill="#4da6ff" />
        <text x="150" y="225" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">C</text>

        <circle cx="80" cy="150" r="15" fill="#4da6ff" />
        <text x="80" y="155" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">D</text>

        <!-- Circular Rotation Arrow -->
        <path d="M 120 110 A 40 40 0 0 1 180 110" fill="none" stroke="#ff00ff" stroke-width="3"
            marker-end="url(#arrowPink)" />

        <rect x="50" y="250" width="200" height="40" rx="5" fill="#111122" stroke="#00ffcc" stroke-width="2" />
        <text x="150" y="275" fill="#ffffff" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">4! / 4 = 3! = 6가지</text>
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="500" width="600" height="60" rx="10" fill="#2b1133" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="525" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">원탁에서는 의자를 옆으로 계속
        굴려서 똑같이 겹치는(중복) 가지 수가 4개나 생긴다.</text>
    <text x="450" y="545" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">따라서 4! 을 4로 나누는 (N-1)! 우주 압축이 발생한다.</text>

    <defs>
        <marker id="arrowRed" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4d4d" />
        </marker>
        <marker id="arrowPink" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff00ff" />
        </marker>
    </defs>
</svg>