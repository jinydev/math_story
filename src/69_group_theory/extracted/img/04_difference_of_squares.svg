<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4d4d" />
        </marker>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">합차 공식 (Difference of Squares): 데칼코마니 결투</text>

    <!-- Left: Original Equation a^2 - b^2 -->
    <g transform="translate(150, 150)">
        <rect x="-30" y="-30" width="160" height="100" rx="10" fill="#2d2d44" stroke="#ff4d4d" stroke-width="2" />
        <text x="50" y="30" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">
            <tspan fill="#00ffcc">x</tspan>² - <tspan fill="#ffaa00">16</tspan>
        </text>
        <text x="50" y="55" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">가운데 항이 실종된 2단
            콤보</text>
    </g>

    <!-- Explanation Arrow -->
    <path d="M 300 170 L 350 170" stroke="#ffffff" stroke-width="4" stroke-dasharray="5" />
    <text x="325" y="160" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">분해!</text>

    <!-- Right: Decalcomania Boxes -->
    <g transform="translate(420, 150)">
        <!-- Box 1: (x + 4) -->
        <rect x="0" y="-40" width="120" height="120" rx="10" fill="#113344" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="60" y="20" fill="#ffffff" font-family="monospace" font-size="34" font-weight="bold"
            text-anchor="middle">
            <tspan fill="#00ffcc">x</tspan>
            <tspan fill="#ffffff">+</tspan>
            <tspan fill="#ffaa00">4</tspan>
        </text>
        <text x="60" y="60" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">힐링 버프</text>

        <!-- Crossed Swords / Clash -->
        <text x="145" y="20" fill="#ff4d4d" font-family="sans-serif" font-size="28" font-weight="bold"
            text-anchor="middle">VS</text>

        <!-- Box 2: (x - 4) -->
        <rect x="170" y="-40" width="120" height="120" rx="10" fill="#441111" stroke="#ff4d4d" stroke-width="3"
            filter="url(#glow)" />
        <text x="230" y="20" fill="#ffffff" font-family="monospace" font-size="34" font-weight="bold"
            text-anchor="middle">
            <tspan fill="#00ffcc">x</tspan>
            <tspan fill="#ff4d4d">-</tspan>
            <tspan fill="#ffaa00">4</tspan>
        </text>
        <text x="230" y="60" fill="#ff4d4d" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">독 데미지</text>
    </g>

    <!-- Bottom Explainer text -->
    <text x="400" y="320" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">+4 와 -4 가 충돌하면 0(제로) 으로 증발!</text>
    <text x="400" y="350" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">모양은 완벽히 데칼코마니처럼
        똑같되, 가운데 부호만 서로 다르게 찢어버린다.</text>

</svg>