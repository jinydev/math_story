<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">삼각함수의 재정의: 반지름 1짜리 만능 추적기</text>

    <!-- Big Coordinate Engine -->
    <g transform="translate(450, 320)">

        <!-- Axes -->
        <line x1="-350" y1="0" x2="350" y2="0" stroke="#555566" stroke-width="2" />
        <line x1="0" y1="-250" x2="0" y2="250" stroke="#555566" stroke-width="2" />

        <text x="360" y="5" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="bold">X</text>
        <text x="-5" y="-260" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="bold">Y</text>

        <!-- The Circle (Radius = 200) -->
        <circle cx="0" cy="0" r="200" fill="none" stroke="#4da6ff" stroke-width="3" stroke-dasharray="10 5" />
        <text x="210" y="20" fill="#4da6ff" font-family="sans-serif" font-size="16" font-weight="bold">단위원 (r =
            1)</text>

        <!-- The Tracking Point -->
        <line x1="0" y1="0" x2="140" y2="-140" stroke="#ffffff" stroke-width="4" />
        <circle cx="140" cy="-140" r="12" fill="#ff00ff" filter="url(#glow)" />

        <!-- Angle Theta -->
        <path d="M 50 0 A 50 50 0 0 0 35 -35" fill="none" stroke="#ffaa00" stroke-width="4" filter="url(#glow)" />
        <text x="65" y="-15" fill="#ffaa00" font-family="sans-serif" font-size="24" font-weight="bold">θ</text>

        <!-- X Shadow (Cosine) -->
        <line x1="140" y1="-140" x2="140" y2="0" stroke="#00ffcc" stroke-width="3" stroke-dasharray="6 6" />
        <line x1="0" y1="0" x2="140" y2="0" stroke="#00ffcc" stroke-width="6" filter="url(#glow)" />
        <text x="70" y="30" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">cos(θ)</text>

        <!-- Y Height (Sine) -->
        <line x1="140" y1="-140" x2="0" y2="-140" stroke="#ff0055" stroke-width="3" stroke-dasharray="6 6" />
        <line x1="0" y1="0" x2="0" y2="-140" stroke="#ff0055" stroke-width="6" filter="url(#glow)" />
        <text x="-35" y="-60" fill="#ff0055" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">sin(θ)</text>

        <!-- Point Coordinates -->
        <rect x="155" y="-160" width="180" height="40" fill="#111122" stroke="#ff00ff" stroke-width="2" rx="10" />
        <text x="245" y="-133" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">P(<tspan fill="#00ffcc">cosθ</tspan>, <tspan fill="#ff0055">sinθ</tspan>)</text>
    </g>

    <!-- HUD Details Left -->
    <rect x="30" y="80" width="220" height="150" fill="#222" stroke="#555" stroke-width="2" rx="10" />
    <text x="140" y="110" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">사인 ≡ 세로</text>
    <text x="140" y="140" fill="#ff0055" font-family="sans-serif" font-size="16" text-anchor="middle"
        font-weight="bold">y = r · sin(θ)</text>
    <text x="140" y="165" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">점의 얼만큼 솟구쳤나</text>
    <text x="140" y="185" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">높이, 위도 스캐너</text>

    <!-- HUD Details Right -->
    <rect x="650" y="80" width="220" height="150" fill="#222" stroke="#555" stroke-width="2" rx="10" />
    <text x="760" y="110" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">코사인 ≡ 가로</text>
    <text x="760" y="140" fill="#00ffcc" font-family="sans-serif" font-size="16" text-anchor="middle"
        font-weight="bold">x = r · cos(θ)</text>
    <text x="760" y="165" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">점이 바닥에 맺히는</text>
    <text x="760" y="185" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">가로 위치, 경도
        스캐너</text>

</svg>