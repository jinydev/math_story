<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glow-heavy" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">쌍둥이 부메랑 곡선: 코사인 함수 (Cosine Wave)</text>

    <!-- HUD Limits -->
    <text x="50" y="155" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
        filter="url(#glow)">MAX: +1</text>
    <text x="50" y="455" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
        filter="url(#glow)">MIN: -1</text>

    <!-- Axes -->
    <line x1="100" y1="300" x2="850" y2="300" stroke="#555566" stroke-width="3" />
    <polygon points="850,295 860,300 850,305" fill="#555566" />
    <text x="830" y="330" fill="#aaaaaa" font-family="sans-serif" font-size="20">x (rad)</text>

    <line x1="150" y1="500" x2="150" y2="100" stroke="#555566" stroke-width="3" />
    <polygon points="145,100 150,90 155,100" fill="#555566" />
    <text x="130" y="120" fill="#aaaaaa" font-family="sans-serif" font-size="20">y</text>

    <!-- Y Ticks -->
    <line x1="145" y1="150" x2="155" y2="150" stroke="#ffaa00" stroke-width="3" />
    <text x="130" y="155" fill="#ffaa00" font-family="monospace" font-size="20" font-weight="bold"
        text-anchor="end">1</text>

    <line x1="145" y1="450" x2="155" y2="450" stroke="#ffaa00" stroke-width="3" />
    <text x="130" y="455" fill="#ffaa00" font-family="monospace" font-size="20" font-weight="bold"
        text-anchor="end">-1</text>

    <!-- X Ticks -->
    <g fill="#4da6ff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">
        <!-- π/2 = 300, π = 450, 3π/2 = 600, 2π = 750 -->
        <line x1="300" y1="295" x2="300" y2="305" stroke="#4da6ff" stroke-width="3" />
        <text x="300" y="330">π/2 (90°)</text>

        <line x1="450" y1="295" x2="450" y2="305" stroke="#4da6ff" stroke-width="3" />
        <text x="450" y="330">π (180°)</text>

        <line x1="600" y1="295" x2="600" y2="305" stroke="#4da6ff" stroke-width="3" />
        <text x="600" y="330">3π/2 (270°)</text>

        <line x1="750" y1="295" x2="750" y2="305" stroke="#4da6ff" stroke-width="3" />
        <text x="750" y="330">2π (360°)</text>
    </g>

    <!-- Faint Sine Wave trace for comparison (shift left by 150 px) -->
    <path
        d="M 150 300 C 205 300, 245 150, 300 150 C 355 150, 395 300, 450 300 C 505 300, 545 450, 600 450 C 655 450, 695 300, 750 300"
        fill="none" stroke="#00ffcc" stroke-width="3" stroke-dasharray="8 4" opacity="0.4" />
    <text x="210" y="240" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold" opacity="0.6">sin
        흔적</text>

    <!-- COSINE WAVE CURVE -->
    <!-- 
       Start from (150, 150). Goes to (300, 300), then (450, 450), then (600, 300), then (750, 150).
       Cubic bezier approximation.
  -->
    <path
        d="M 150 150 C 205 150, 245 300, 300 300 C 355 300, 395 450, 450 450 C 505 450, 545 300, 600 300 C 655 300, 695 150, 750 150"
        fill="none" stroke="#ff00ff" stroke-width="6" filter="url(#glow-heavy)" />

    <path d="M 750 150 C 786 150, 813 250, 850 250" fill="none" stroke="#ff00ff" stroke-width="6"
        stroke-dasharray="10 5" opacity="0.5" />

    <!-- Points and descriptions -->
    <circle cx="150" cy="150" r="10" fill="#ffff00" filter="url(#glow)" />
    <text x="170" y="110" fill="#ffff00" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="start">최고 높이(+1)에서 밥그릇 출발!</text>

    <circle cx="450" cy="450" r="10" fill="#00ffcc" filter="url(#glow)" />
    <text x="450" y="490" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">가장 깊은 계곡 바닥 (-1)</text>

    <circle cx="750" cy="150" r="10" fill="#ffff00" filter="url(#glow)" />
    <text x="750" y="110" fill="#ffff00" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">초기 +1 로 부메랑 복귀</text>

    <!-- Arrow shift visual -->
    <path d="M 300 120 L 170 120" stroke="#ffaa00" stroke-width="4" marker-end="url(#arrow)" stroke-dasharray="6 3" />
    <polygon points="160,120 175,110 175,130" fill="#ffaa00" />
    <text x="235" y="105" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">sin 90도(π/2) 만큼 당겨옴!</text>

    <!-- Title Indicator -->
    <rect x="650" y="400" width="180" height="50" rx="10" fill="#112233" stroke="#ff00ff" stroke-width="2" />
    <text x="740" y="432" fill="#ff00ff" font-family="monospace" font-size="26" font-weight="bold"
        text-anchor="middle">y = cos(x)</text>

</svg>