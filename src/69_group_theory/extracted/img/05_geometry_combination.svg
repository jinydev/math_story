<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">기하학(Geometry) 과 조합론의 만남</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"공간에 던져진 Node(점) 들을
        C 연산으로 추출하여 선(Line) 과 면(Face) 을 렌더링하다."</text>

    <!-- Point Cloud Background Structure -->
    <g transform="translate(100, 160)">

        <!-- Area 1: Generating Lines (nC2) -->
        <rect x="-20" y="0" width="320" height="280" rx="15" fill="#1b1122" stroke="#ff00ff" stroke-width="3" />
        <text x="140" y="30" fill="#ff00ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">1. 선분(Edge) 의 창조</text>

        <!-- Dots configuration -->
        <circle cx="50" cy="80" r="6" fill="#fff" />
        <circle cx="140" cy="100" r="6" fill="#fff" />
        <circle cx="230" cy="70" r="6" fill="#fff" />

        <circle cx="70" cy="160" r="6" fill="#fff" />
        <circle cx="210" cy="180" r="6" fill="#fff" />

        <!-- A highlighted line segment -->
        <path d="M 50 80 L 210 180" fill="none" stroke="#ff5555" stroke-width="4" filter="url(#glow)" />
        <circle cx="50" cy="80" r="8" fill="#ff5555" filter="url(#glow)" />
        <text x="35" y="75" fill="#ff5555" font-weight="bold">A</text>

        <circle cx="210" cy="180" r="8" fill="#ff5555" filter="url(#glow)" />
        <text x="225" y="195" fill="#ff5555" font-weight="bold">B</text>

        <!-- Faint lines -->
        <path d="M 50 80 L 140 100" fill="none" stroke="#fff" stroke-width="1" opacity="0.3" />
        <path d="M 140 100 L 230 70" fill="none" stroke="#fff" stroke-width="1" opacity="0.3" />
        <path d="M 50 80 L 70 160" fill="none" stroke="#fff" stroke-width="1" opacity="0.3" />

        <text x="140" y="240" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">5개의 점 중에서
            <tspan fill="#ff00ff" font-weight="bold">2개를 픽(Pick)</tspan> 하면</text>
        <text x="140" y="260" fill="#ff5555" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">₅C₂ = 10 개의 고유한 선분 생성</text>
    </g>

    <!-- Big Plus/Next Sign -->
    <text x="450" y="310" fill="#ffffff" font-size="40" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">→</text>

    <!-- Area 2: Generating Polygons (nC3) -->
    <g transform="translate(500, 160)">
        <rect x="-20" y="0" width="340" height="280" rx="15" fill="#001122" stroke="#4da6ff" stroke-width="3" />
        <text x="150" y="30" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">2. 면(Face/Polygon) 의 창조</text>

        <!-- Dots configuration -->
        <circle cx="60" cy="80" r="6" fill="#fff" />
        <circle cx="150" cy="110" r="6" fill="#fff" />
        <circle cx="240" cy="70" r="6" fill="#fff" />

        <circle cx="80" cy="170" r="6" fill="#fff" />
        <circle cx="220" cy="190" r="6" fill="#fff" />

        <!-- A highlighted Triangle (Polygon) -->
        <path d="M 150 110 L 80 170 L 220 190 Z" fill="#00ffcc" opacity="0.4" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />

        <circle cx="150" cy="110" r="8" fill="#00ffcc" filter="url(#glow)" />
        <circle cx="80" cy="170" r="8" fill="#00ffcc" filter="url(#glow)" />
        <circle cx="220" cy="190" r="8" fill="#00ffcc" filter="url(#glow)" />

        <text x="150" y="240" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">5개의 점 중에서
            <tspan fill="#4da6ff" font-weight="bold">3개를 픽(Pick)</tspan> 하면</text>
        <text x="150" y="260" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">₅C₃ = 10 개의 고유한 삼각형 생성</text>
    </g>

    <!-- Bottom Computation Alert -->
    <rect x="100" y="470" width="700" height="90" rx="10" fill="#0d1b2a" stroke="#ffff00" stroke-width="2" />
    <text x="450" y="505" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        A점과 B점을 뽑든, B점과 A점을 뽑든 똑같은 선분(AB = BA) 이므로, <tspan fill="#ffff00" font-weight="bold">순서가 없는 조합(C) 모델</tspan>에 완벽
        대응.
    </text>
    <text x="450" y="535" fill="#4da6ff" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">
        3D 게임 엔진은 이 로직을 통해 점(Node) 무리를 던져놓고 무수한 폴리곤(Face) 을 실시간으로 직조해낸다.
    </text>
</svg>