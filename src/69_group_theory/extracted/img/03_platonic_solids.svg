<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .solid-line {
                fill: none;
                stroke: #00ffff;
                stroke-width: 2;
                stroke-linejoin: round;
            }

            .solid-line-back {
                fill: none;
                stroke: #50667b;
                stroke-width: 1.5;
                stroke-dasharray: 4, 4;
                stroke-linejoin: round;
            }

            .solid-fill {
                fill: rgba(0, 255, 255, 0.2);
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .name {
                fill: #ffaa64;
                font-size: 18px;
                text-anchor: middle;
            }

            .specs {
                fill: #ffffff;
                font-size: 14px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="500" y="40" class="title">우주 전체에 오직 5개, 완벽한 플라톤 입체 (정다면체)</text>
    <text x="500" y="70" class="desc">정다각형 면들이 동일한 개수로 각 꼭짓점에 모이는 신성한 대칭의 절대 조건</text>

    <!-- 1. Tetrahedron (Fire) -->
    <g transform="translate(100, 220)">
        <polygon points="0,-70 60,30 -60,30" class="solid-fill" />
        <!-- Back lines -->
        <path d="M0 -70 L0 10 L-60 30 M0 10 L60 30" class="solid-line-back" />
        <!-- Front lines -->
        <path d="M0 -70 L-60 30 L60 30 Z" class="solid-line" />
        <path d="M0 -70 L0 30" class="solid-line" />

        <text x="0" y="90" class="name">1. 정사면체</text>
        <text x="0" y="115" class="specs">불 (Fire)</text>
        <text x="0" y="135" class="specs" fill="#a0a0a0">정삼각형 면 4개</text>
    </g>

    <!-- 2. Cube (Earth) -->
    <g transform="translate(300, 220)">
        <polygon points="-40,-40 40,-40 40,40 -40,40" class="solid-fill" />
        <!-- Isometric Cube -->
        <!-- Back lines -->
        <path d="M-20 -60 L60 -60 L60 20 M-20 -60 L-20 20 L20 40" class="solid-line-back" />
        <path d="M-20 20 L60 20" class="solid-line-back" />
        <!-- Front lines -->
        <polygon points="-40,-40 40,-40 60,-60 -20,-60" fill="rgba(0, 255, 255, 0.4)" stroke="#00ffff"
            stroke-width="2" />
        <polygon points="-40,-40 -40,40 40,40 40,-40" class="solid-line" fill="rgba(0, 255, 255, 0.2)" />
        <polygon points="40,-40 60,-60 60,20 40,40" class="solid-line" fill="rgba(0, 255, 255, 0.1)" />

        <text x="10" y="90" class="name">2. 정육면체</text>
        <text x="10" y="115" class="specs">흙 (Earth)</text>
        <text x="10" y="135" class="specs" fill="#a0a0a0">정사각형 면 6개</text>
    </g>

    <!-- 3. Octahedron (Air) -->
    <g transform="translate(500, 220)">
        <!-- Back diamond -->
        <path d="M0 -70 L-50 -10 L0 10 L50 -10 Z" class="solid-line-back" />
        <path d="M0 70 L-50 -10 M0 70 L0 10 M0 70 L50 -10" class="solid-line-back" />
        <!-- Front Diamond -->
        <polygon points="0,-70 -30,10 0,70 30,10" class="solid-fill" />
        <path d="M0 -70 L-30 10 L0 70 L30 10 Z" class="solid-line" />
        <path d="M-30 10 L30 10" class="solid-line" />

        <text x="0" y="110" class="name">3. 정팔면체</text>
        <text x="0" y="135" class="specs">공기 (Air)</text>
        <text x="0" y="155" class="specs" fill="#a0a0a0">정삼각형 면 8개</text>
    </g>

    <!-- 4. Icosahedron (Water) - Simplified projection -->
    <g transform="translate(700, 220)">
        <polygon points="0,-60 -50,-20 -30,40 30,40 50,-20" fill="rgba(0,255,255,0.2)" stroke="#00ffff"
            stroke-width="2" />
        <path d="M0 -60 L-20 -10 L-30 40" class="solid-line" />
        <path d="M-20 -10 L20 -10 L0 -60" class="solid-line" />
        <path d="M20 -10 L30 40 L-30 40" class="solid-line" />
        <path d="M-50 -20 L-20 -10 L0 30 L-30 40" class="solid-line" />
        <path d="M50 -20 L20 -10 L0 30 L30 40" class="solid-line" />

        <!-- Edge details (simplified for visual representation) -->

        <text x="0" y="110" class="name">4. 정이십면체</text>
        <text x="0" y="135" class="specs">물 (Water)</text>
        <text x="0" y="155" class="specs" fill="#a0a0a0">정삼각형 면 20개</text>
    </g>

    <!-- 5. Dodecahedron (Universe) - Simplified projection -->
    <g transform="translate(900, 220)">
        <!-- Pentagonal outline -->
        <polygon points="0,-60 -58,-18 -36,50 36,50 58,-18" fill="rgba(0,255,255,0.2)" stroke="#00ffff"
            stroke-width="2" />

        <!-- Inner pentagon -->
        <polygon points="0,-25 -25,-5 -15,25 15,25 25,-5" class="solid-line" fill="rgba(0,255,255,0.3)" />

        <!-- Connecting lines -->
        <path d="M0 -60 L0 -25" class="solid-line" />
        <path d="M-58 -18 L-25 -5" class="solid-line" />
        <path d="M-36 50 L-15 25" class="solid-line" />
        <path d="M36 50 L15 25" class="solid-line" />
        <path d="M58 -18 L25 -5" class="solid-line" />

        <text x="0" y="110" class="name">5. 정십이면체</text>
        <text x="0" y="135" class="specs">우주 별빛 (Aether)</text>
        <text x="0" y="155" class="specs" fill="#a0a0a0">정오각형 면 12개</text>
    </g>

</svg>