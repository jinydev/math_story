<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">Brute-Force 공격: 찍어서 0점 조준하기 (Guess &amp; Check)</text>

    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"수식이 안 보이면 무식하게
        아무거나 던져라. 실패한 데이터 값이 방향타를 잡아준다!"</text>

    <!-- Target Info -->
    <rect x="150" y="120" width="600" height="70" rx="15" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="150" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">
        <tspan fill="#00ffcc">닭(다리2)</tspan> + <tspan fill="#ff0055">돼지(다리4)</tspan> = 총 10마리
    </text>
    <text x="450" y="175" fill="#ffff00" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">
        목표 타겟 (Target): 전체 다리 32개!
    </text>

    <!-- Scale / Gauge Graphic -->
    <g transform="translate(150, 250)">

        <!-- Gauge line -->
        <line x1="0" y1="150" x2="600" y2="150" stroke="#555" stroke-width="4" />

        <!-- Target Mark -->
        <line x1="450" y1="120" x2="450" y2="180" stroke="#ffff00" stroke-width="6" filter="url(#glow)" />
        <text x="450" y="100" fill="#ffff00" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">32</text>
        <text x="450" y="210" fill="#ffff00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">Target!</text>

        <!-- Attempt 1 -->
        <circle cx="350" cy="150" r="10" fill="#ff5555" filter="url(#glow)" />
        <text x="350" y="240" fill="#ff5555" font-family="sans-serif" font-size="14" text-anchor="middle">다리 30개</text>
        <path d="M 330 260 L 370 260 M 350 245 L 350 300" stroke="#ff5555" stroke-width="2" />
        <rect x="250" y="300" width="200" height="60" rx="5" fill="#331111" stroke="#ff5555" />
        <text x="350" y="325" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">시도 1: <tspan
                fill="#00ffcc">닭5</tspan> , <tspan fill="#ff0055">돼지5</tspan></text>
        <text x="350" y="345" fill="#ffaa00" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">피드백: "부족하다! 돼지 늘려!"</text>

        <!-- Arrow feedback right -->
        <path d="M 365 140 Q 400 110 435 140" fill="none" stroke="#ffaa00" stroke-width="3" stroke-dasharray="5 5"
            marker-end="url(#arrow)" />

        <!-- Attempt 2 -->
        <circle cx="550" cy="150" r="10" fill="#ff5555" filter="url(#glow)" />
        <text x="550" y="240" fill="#ff5555" font-family="sans-serif" font-size="14" text-anchor="middle">다리 34개</text>
        <path d="M 530 260 L 570 260 M 550 245 L 550 300" stroke="#ff5555" stroke-width="2" />
        <rect x="450" y="300" width="200" height="60" rx="5" fill="#331111" stroke="#ff5555" />
        <text x="550" y="325" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">시도 2: <tspan
                fill="#00ffcc">닭3</tspan> , <tspan fill="#ff0055">돼지7</tspan></text>
        <text x="550" y="345" fill="#ffaa00" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">피드백: "오버했다! 돼지 줄여!"</text>

        <!-- Arrow feedback left -->
        <path d="M 535 140 Q 500 110 465 140" fill="none" stroke="#ffaa00" stroke-width="3" stroke-dasharray="5 5"
            marker-end="url(#arrow)" />

        <!-- Attempt 3 Bingo -->
        <circle cx="450" cy="150" r="14" fill="#00ffcc" filter="url(#glow)" />
        <rect x="350" y="390" width="200" height="60" rx="5" fill="#003322" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="450" y="415" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle"
            font-weight="bold">시도 3: <tspan fill="#00ffcc">닭4</tspan> , <tspan fill="#ff0055">돼지6</tspan></text>
        <text x="450" y="440" fill="#ffff00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">완벽한 타격 (Bingo!)</text>
        <line x1="450" y1="215" x2="450" y2="390" stroke="#00ffcc" stroke-width="4" stroke-dasharray="8 4" />

    </g>

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffaa00" />
        </marker>
    </defs>

    <!-- Explanation -->
    <rect x="100" y="530" width="700" height="40" rx="10" fill="#1b1b1b" stroke="#ffffff" stroke-width="2" />
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="15" text-anchor="middle">
        컴퓨터의 `For` 루프 무차별 대입 구조처럼, 실패한 오답은 타겟 지점으로 우리를 이끄는 <tspan fill="#ffaa00" font-weight="bold">강력한 방향타(피드백)</tspan>
        로 작용합니다.
    </text>
</svg>