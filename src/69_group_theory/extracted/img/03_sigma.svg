<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">Σ (Sigma): 우주 최고의 For-Loop 압축기</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"단순한 덧셈 기호가 아니다.
        1부터 n까지 톱니바퀴를 돌리는 강력한 반복 프로그램 엔진이다."</text>

    <g transform="translate(150, 200)">

        <!-- Giant Sigma Symbol treated as a machine -->
        <path d="M 120 -50 L 20 -50 L 70 25 L 20 100 L 120 100" fill="none" stroke="#00ffcc" stroke-width="15"
            stroke-linejoin="miter" filter="url(#glow)" />
        <path d="M 120 -50 L 20 -50 L 70 25 L 20 100 L 120 100" fill="none" stroke="#ffffff" stroke-width="5"
            stroke-linejoin="miter" />

        <!-- Top: Terminator condition -->
        <rect x="-10" y="-120" width="80" height="40" rx="5" fill="#1b1122" stroke="#ff0055" stroke-width="2" />
        <text x="30" y="-95" fill="#ff0055" font-weight="bold" font-size="20" font-family="monospace"
            text-anchor="middle">50 (n)</text>
        <path d="M 30 -80 L 30 -60" fill="none" stroke="#ff0055" stroke-width="3" stroke-dasharray="2 2"
            marker-end="url(#arrow_d_red)" />
        <text x="30" y="-135" fill="#aaa" font-size="14" text-anchor="middle">종료(End) 조건 뚜껑</text>

        <!-- Bottom: Initializer condition -->
        <rect x="-10" y="130" width="80" height="40" rx="5" fill="#1b1122" stroke="#0088ff" stroke-width="2" />
        <text x="30" y="155" fill="#0088ff" font-weight="bold" font-size="20" font-family="monospace"
            text-anchor="middle">k = 1</text>
        <path d="M 30 130 L 30 110" fill="none" stroke="#0088ff" stroke-width="3" stroke-dasharray="2 2"
            marker-end="url(#arrow_u_blue)" />
        <text x="30" y="190" fill="#aaa" font-size="14" text-anchor="middle">시작(Start) 스위치 부스터</text>

        <!-- Right: Payload / Function -->
        <rect x="150" y="-10" width="160" height="70" rx="10" fill="#1b1122" stroke="#ffff00" stroke-width="3"
            filter="url(#glow)" />
        <text x="230" y="35" fill="#ffff00" font-weight="bold" font-size="30" font-family="monospace"
            text-anchor="middle">2k - 1</text>
        <text x="230" y="-20" fill="#aaa" font-size="14" text-anchor="middle">실행 코드 (일반항 Payload)</text>

    </g>

    <!-- Flow Arrows & Resulting Expansion -->
    <g transform="translate(560, 225)">
        <path d="M -50 0 L 20 0" fill="none" stroke="#fff" stroke-width="4" stroke-dasharray="6 4"
            marker-end="url(#arrow_r_white)" />
        <text x="-15" y="-15" fill="#fff" font-weight="bold" font-size="18" text-anchor="middle">압축 해제</text>

        <text x="40" y="-30" fill="#00ffcc" font-weight="bold" font-size="20" font-family="monospace">k=1: (1)</text>
        <text x="40" y="5" fill="#ff0055" font-weight="bold" font-size="24">+</text>

        <text x="70" y="-30" fill="#00ffcc" font-weight="bold" font-size="20" font-family="monospace">k=2: (3)</text>
        <text x="70" y="5" fill="#ff0055" font-weight="bold" font-size="24">+</text>

        <text x="100" y="-30" fill="#00ffcc" font-weight="bold" font-size="20" font-family="monospace">k=3: (5)</text>
        <text x="100" y="5" fill="#ff0055" font-weight="bold" font-size="24">+</text>

        <text x="130" y="5" fill="#fff" font-weight="bold" font-size="24">. . .</text>
        <text x="190" y="5" fill="#ff0055" font-weight="bold" font-size="24">+</text>

        <text x="220" y="-30" fill="#00ffcc" font-weight="bold" font-size="20" font-family="monospace">k=50: (99)</text>
    </g>

    <defs>
        <marker id="arrow_d_red" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ff0055" />
        </marker>
        <marker id="arrow_u_blue" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 4, 6 2, 0 0" fill="#0088ff" />
        </marker>
        <marker id="arrow_r_white" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#fff" />
        </marker>
    </defs>

    <!-- Big Python Code Box Bottom -->
    <rect x="100" y="440" width="700" height="130" rx="10" fill="#1b1122" stroke="#ffffff" stroke-width="2" />
    <rect x="100" y="440" width="700" height="30" rx="10" fill="#333344" />
    <text x="120" y="460" fill="#fff" font-family="monospace" font-size="14"
        font-weight="bold">python_list_comprehension.py</text>

    <text x="130" y="500" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold">
        sum(<tspan fill="#ffff00">[ (2*k - 1) </tspan>
        <tspan fill="#0088ff">for k in range(1, 51) ]</tspan>)
    </text>

    <text x="130" y="540" fill="#ff00ff" font-family="sans-serif" font-size="16" font-weight="bold">
        => 칠판 한 가득 적어야 하는 수열의 합산 렌더링을
        파이썬의 배열 선언 엔진 한 줄로 압축한 수학계의 발명품이다!
    </text>
</svg>