<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">이항분포의 진화: 거친 블록에서 완벽한 둥근 종으로</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"시행 횟수 n 이 커질수록 통계의
        거친 입자가 매끄러운 자연의 곡선으로 깎여나간다"</text>

    <!-- Left Chart: n = 10, Rough -->
    <g transform="translate(80, 150)">
        <text x="170" y="30" fill="#ff4d4d" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">n = 10 (이산)</text>

        <!-- Axes -->
        <line x1="20" y1="250" x2="320" y2="250" stroke="#ffffff" stroke-width="2" />
        <line x1="20" y1="250" x2="20" y2="50" stroke="#ffffff" stroke-width="2" />

        <!-- Rough Bars -->
        <rect x="50" y="240" width="20" height="10" fill="#221111" stroke="#ff4d4d" stroke-width="2" />
        <rect x="80" y="220" width="20" height="30" fill="#221111" stroke="#ff4d4d" stroke-width="2" />
        <rect x="110" y="170" width="20" height="80" fill="#221111" stroke="#ff4d4d" stroke-width="2" />
        <rect x="140" y="100" width="20" height="150" fill="#221111" stroke="#ff4d4d" stroke-width="2" />
        <rect x="170" y="60" width="20" height="190" fill="#221111" stroke="#ff4d4d" stroke-width="2" />
        <rect x="200" y="120" width="20" height="130" fill="#221111" stroke="#ff4d4d" stroke-width="2" />
        <rect x="230" y="180" width="20" height="70" fill="#221111" stroke="#ff4d4d" stroke-width="2" />
        <rect x="260" y="225" width="20" height="25" fill="#221111" stroke="#ff4d4d" stroke-width="2" />
        <rect x="290" y="245" width="20" height="5" fill="#221111" stroke="#ff4d4d" stroke-width="2" />

        <text x="170" y="280" fill="#ffaa00" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">형태가 불안정하고 모서리가 뾰족하다</text>
    </g>

    <!-- Arrow -->
    <g transform="translate(425, 270)">
        <text x="0" y="0" fill="#ffffff" font-family="sans-serif" font-size="50" font-weight="bold"
            text-anchor="middle">→</text>
        <text x="0" y="30" fill="#aaaaaa" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">n 폭발적 증가</text>
    </g>

    <!-- Right Chart: n = 1000, Normal Curve -->
    <g transform="translate(500, 150)">
        <text x="170" y="30" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">n = 1000 (연속 수렴)</text>

        <!-- Axes -->
        <line x1="20" y1="250" x2="320" y2="250" stroke="#ffffff" stroke-width="2" />
        <line x1="20" y1="250" x2="20" y2="50" stroke="#ffffff" stroke-width="2" />

        <!-- Very thin bars (simulated area) -->
        <!-- We'll just draw the curve directly with a fill -->
        <path
            d="M 20 250 L 40 248 L 70 230 L 100 170 L 120 120 L 145 70 Q 170 50 195 70 L 220 120 L 240 170 L 270 230 L 300 248 L 320 250 Z"
            fill="#223344" stroke="none" />
        <path
            d="M 20 250 L 40 248 L 70 230 L 100 170 L 120 120 L 145 70 Q 170 50 195 70 L 220 120 L 240 170 L 270 230 L 300 248 L 320 250"
            fill="none" stroke="#00ffcc" stroke-width="4" filter="url(#glow)" />

        <line x1="170" y1="60" x2="170" y2="250" stroke="#ffffff" stroke-width="2" stroke-dasharray="4 4" />
        <text x="170" y="270" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">np</text>

        <text x="170" y="295" fill="#4da6ff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">신의 디자인 '정규분포(Bell Curve)' 로 환생!</text>
    </g>

    <!-- Big Conclusion Box -->
    <rect x="100" y="470" width="700" height="80" rx="15" fill="#2b1133" stroke="#ff00ff" stroke-width="4"
        filter="url(#glow)" />
    <text x="450" y="505" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">이항 분포 B(n, p) 는 n이
        커질수록 평균이 <tspan fill="#ff00ff" font-weight="bold">np</tspan>, 분산이 <tspan fill="#ff00ff" font-weight="bold">npq
        </tspan> 인</text>
    <text x="450" y="535" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold"
        text-anchor="middle">정규분포 N(np, npq) 에 완벽하게 근사한다!</text>

</svg>