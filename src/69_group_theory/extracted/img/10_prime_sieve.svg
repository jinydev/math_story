<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .cell {
                fill: #161b22;
                stroke: #30363d;
                stroke-width: 2;
                rx: 8;
            }

            .cell-deleted {
                fill: #21262d;
                stroke: #30363d;
                stroke-width: 2;
                rx: 8;
            }

            .cell-prime {
                fill: rgba(100, 255, 100, 0.2);
                stroke: #64ff64;
                stroke-width: 3;
                rx: 8;
            }

            .num {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
                alignment-baseline: central;
            }

            .num-deleted {
                fill: #484f58;
                font-size: 24px;
                text-anchor: middle;
                alignment-baseline: central;
                text-decoration: line-through;
            }

            .num-prime {
                fill: #64ff64;
                font-size: 24px;
                text-anchor: middle;
                alignment-baseline: central;
            }

            .title {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="40" class="title">에라토스테네스의 체 (Sieve of Eratosthenes)</text>
    <text x="400" y="65" class="desc">파이썬 알고리즘: 살아남은 소수의 '배수'를 무한정 지워나가는 마법의 필터</text>

    <g transform="translate(100, 100)">
        <!-- Row 1 -->
        <rect x="0" y="0" width="100" height="60" class="cell-deleted" />
        <text x="50" y="30" class="num-deleted">1</text>

        <rect x="120" y="0" width="100" height="60" class="cell-prime" />
        <text x="170" y="30" class="num-prime">2</text>

        <rect x="240" y="0" width="100" height="60" class="cell-prime" />
        <text x="290" y="30" class="num-prime">3</text>

        <rect x="360" y="0" width="100" height="60" class="cell-deleted" />
        <text x="410" y="30" class="num-deleted">4</text>
        <text x="410" y="55" fill="#ff6464" font-size="10" text-anchor="middle">2의배수</text>

        <rect x="480" y="0" width="100" height="60" class="cell-prime" />
        <text x="530" y="30" class="num-prime">5</text>

        <!-- Row 2 -->
        <rect x="0" y="80" width="100" height="60" class="cell-deleted" />
        <text x="50" y="110" class="num-deleted">6</text>
        <text x="50" y="135" fill="#ff6464" font-size="10" text-anchor="middle">2의배수</text>

        <rect x="120" y="80" width="100" height="60" class="cell-prime" />
        <text x="170" y="110" class="num-prime">7</text>

        <rect x="240" y="80" width="100" height="60" class="cell-deleted" />
        <text x="290" y="110" class="num-deleted">8</text>
        <text x="290" y="135" fill="#ff6464" font-size="10" text-anchor="middle">2의배수</text>

        <rect x="360" y="80" width="100" height="60" class="cell-deleted" />
        <text x="410" y="110" class="num-deleted">9</text>
        <text x="410" y="135" fill="#ffaa64" font-size="10" text-anchor="middle">3의배수</text>

        <rect x="480" y="80" width="100" height="60" class="cell-deleted" />
        <text x="530" y="110" class="num-deleted">10</text>
        <text x="530" y="135" fill="#ff6464" font-size="10" text-anchor="middle">2의배수</text>

        <!-- Row 3 -->
        <rect x="0" y="160" width="100" height="60" class="cell-prime" />
        <text x="50" y="190" class="num-prime">11</text>

        <rect x="120" y="160" width="100" height="60" class="cell-deleted" />
        <text x="170" y="190" class="num-deleted">12</text>

        <rect x="240" y="160" width="100" height="60" class="cell-prime" />
        <text x="290" y="190" class="num-prime">13</text>

        <rect x="360" y="160" width="100" height="60" class="cell-deleted" />
        <text x="410" y="190" class="num-deleted">14</text>

        <rect x="480" y="160" width="100" height="60" class="cell-deleted" />
        <text x="530" y="190" class="num-deleted">15</text>
        <text x="530" y="215" fill="#ffaa64" font-size="10" text-anchor="middle">3의배수</text>

        <!-- Row 4 -->
        <rect x="0" y="240" width="100" height="60" class="cell-deleted" />
        <text x="50" y="270" class="num-deleted">16</text>

        <rect x="120" y="240" width="100" height="60" class="cell-prime" />
        <text x="170" y="270" class="num-prime">17</text>

        <rect x="240" y="240" width="100" height="60" class="cell-deleted" />
        <text x="290" y="270" class="num-deleted">18</text>

        <rect x="360" y="240" width="100" height="60" class="cell-prime" />
        <text x="410" y="270" class="num-prime">19</text>

        <rect x="480" y="240" width="100" height="60" class="cell-deleted" />
        <text x="530" y="270" class="num-deleted">20</text>

    </g>

</svg>