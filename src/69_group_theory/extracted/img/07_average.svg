<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">절대 밸런스 브레이커: 평균 (Average/Mean) 의 두 얼굴</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"수만 개의 무질서한 데이터
        몸무게를 단 1개의 균형점(Fulcrum) 으로 요약한다. 하지만 '극단치' 라는 독에 취약하다!"</text>

    <!-- Giant Seesaw Mechanics -->
    <g transform="translate(100, 200)">

        <!-- Balance board (Ruler) -->
        <rect x="0" y="100" width="700" height="20" rx="10" fill="#222" stroke="#4da6ff" stroke-width="4"
            filter="url(#glow)" />
        <!-- Number line marks -->
        <line x1="50" y1="100" x2="50" y2="120" stroke="#fff" stroke-width="2" />
        <text x="50" y="140" fill="#aaaaaa" font-family="monospace" font-size="14" text-anchor="middle">10점</text>

        <line x1="150" y1="100" x2="150" y2="120" stroke="#fff" stroke-width="2" />
        <text x="150" y="140" fill="#aaaaaa" font-family="monospace" font-size="14" text-anchor="middle">50점</text>

        <line x1="300" y1="100" x2="300" y2="120" stroke="#fff" stroke-width="2" />
        <!-- Fulcrum Point (Average) -->
        <g transform="translate(300, 120)">
            <polygon points="0,0 20,40 -20,40" fill="#00ffcc" stroke="#ffffff" stroke-width="3" filter="url(#glow)" />
            <text x="0" y="65" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
                text-anchor="middle" filter="url(#glow)">평균 (무게 중심)</text>
            <text x="0" y="90" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold"
                text-anchor="middle">70점</text>
            <!-- Pivot ray -->
            <line x1="0" y1="0" x2="0" y2="-100" stroke="#00ffcc" stroke-width="2" stroke-dasharray="5 5" />
        </g>

        <!-- Data Points on Left -->
        <circle cx="50" cy="80" r="20" fill="#ff5555" stroke="#fff" stroke-width="2" />
        <text x="50" y="86" fill="#111" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">10</text>
        <text x="50" y="50" fill="#ff5555" font-family="sans-serif" font-size="12" font-weight="bold"
            text-anchor="middle">편차 -60</text>

        <rect x="120" y="40" width="60" height="60" fill="#ffaa00" stroke="#fff" stroke-width="2" rx="5" />
        <text x="150" y="76" fill="#111" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">50</text>
        <text x="150" y="25" fill="#ffaa00" font-family="sans-serif" font-size="12" font-weight="bold"
            text-anchor="middle">편차 -20</text>

        <!-- Data Points on Right -->
        <circle cx="450" cy="80" r="20" fill="#00aaff" stroke="#fff" stroke-width="2" />
        <text x="450" y="86" fill="#111" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">90</text>
        <text x="450" y="50" fill="#00aaff" font-family="sans-serif" font-size="12" font-weight="bold"
            text-anchor="middle">편차 +20</text>

        <!-- Outlier (Mutant) on Far Right -->
        <g transform="translate(650, 60)">
            <polygon points="0,-40 30,20 -30,20" fill="#ff00ff" stroke="#fff" stroke-width="3" filter="url(#glow)" />
            <text x="0" y="10" fill="#111" font-family="monospace" font-size="18" font-weight="bold"
                text-anchor="middle">130</text>
            <text x="0" y="-55" fill="#ff00ff" font-family="sans-serif" font-size="14" font-weight="bold"
                text-anchor="middle" filter="url(#glow)">돌연변이!</text>
            <text x="0" y="-75" fill="#ff00ff" font-family="sans-serif" font-size="12" font-weight="bold"
                text-anchor="middle">(Outlier) 편차 +60</text>
        </g>

        <!-- Calculation Engine -->
        <rect x="25" y="240" width="650" height="80" rx="10" fill="#0d1b1a" stroke="#4da6ff" stroke-width="2" />
        <text x="350" y="270" fill="#4da6ff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">Total Sum: (10 + 50 + 90 + 130) = 280</text>
        <text x="350" y="300" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">280 ÷ 4명 = <tspan fill="#00ffcc" font-size="26">70 (평균!)</tspan></text>
    </g>

    <!-- Hacker insight / Warning -->
    <rect x="100" y="530" width="700" height="50" rx="10" fill="#330011" stroke="#ff5555" stroke-width="2" />
    <text x="450" y="560" fill="#ff5555" font-family="sans-serif" font-size="16" text-anchor="middle">
        ⚠️ <tspan fill="#ffffff" font-weight="bold">에러 경고</tspan>: 무지막지한 돌연변이(Outlier) 수명연장자가 1명만 껴있어도 전체 평균(무게중심)이 확
        쏠려버립니다!
    </text>
</svg>