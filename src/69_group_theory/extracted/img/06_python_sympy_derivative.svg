<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">Python SymPy: 1초 만에 미분 머신 렌더링</text>

    <!-- Python Terminal Window -->
    <rect x="100" y="100" width="700" height="400" rx="15" fill="#0d141e" stroke="#223344" stroke-width="4" />

    <!-- Window Header -->
    <rect x="100" y="100" width="700" height="40" fill="#1a2533"
        style="border-top-left-radius: 15px; border-top-right-radius: 15px;" />
    <circle cx="125" cy="120" r="6" fill="#ff5f56" />
    <circle cx="145" cy="120" r="6" fill="#ffbd2e" />
    <circle cx="165" cy="120" r="6" fill="#27c93f" />
    <text x="450" y="125" fill="#aaaaaa" font-family="monospace" font-size="14"
        text-anchor="middle">sympy_derivative.py</text>

    <!-- Terminal Content -->
    <g transform="translate(130, 170)" font-family="monospace" font-size="18">
        <text x="0" y="0" fill="#ff7b72">import</text>
        <text x="70" y="0" fill="#ffffff">sympy</text>
        <text x="130" y="0" fill="#ff7b72">as</text>
        <text x="160" y="0" fill="#ffffff">sp</text>

        <!-- Symbols -->
        <text x="0" y="40" fill="#ffffff">x = sp.</text>
        <text x="75" y="40" fill="#d2a8ff">Symbol</text>
        <text x="140" y="40" fill="#ffffff">('x')</text>
        <text x="220" y="40" fill="#7a828e" font-size="14"># x를 미지수로 지정</text>

        <!-- Original Function -->
        <text x="0" y="80" fill="#ffffff">f = x**</text>
        <text x="80" y="80" fill="#79c0ff">4</text>
        <text x="95" y="80" fill="#ffffff"> - </text>
        <text x="130" y="80" fill="#79c0ff">3</text>
        <text x="145" y="80" fill="#ffffff">*x**</text>
        <text x="195" y="80" fill="#79c0ff">3</text>
        <text x="210" y="80" fill="#ffffff"> + </text>
        <text x="245" y="80" fill="#79c0ff">5</text>
        <text x="260" y="80" fill="#ffffff">*x**</text>
        <text x="310" y="80" fill="#79c0ff">2</text>
        <text x="325" y="80" fill="#ffffff"> - </text>
        <text x="360" y="80" fill="#79c0ff">7</text>
        <text x="375" y="80" fill="#ffffff">*x + </text>
        <text x="430" y="80" fill="#79c0ff">10</text>

        <!-- The Magic Command! -->
        <text x="0" y="140" fill="#ffffff">f_prime = sp.</text>
        <text x="140" y="140" fill="#d2a8ff">diff</text>
        <text x="180" y="140" fill="#ffffff">(f, x)</text>

        <rect x="-10" y="115" width="450" height="35" rx="5" fill="none" stroke="#00ffcc" stroke-width="2"
            filter="url(#glow)" />
        <text x="460" y="138" fill="#00ffcc" font-family="sans-serif" font-weight="bold" font-size="16">← 오토 미분 치트키 단
            1줄!</text>

        <!-- Printing output line -->
        <text x="0" y="190" fill="#ffffff">sp.</text>
        <text x="30" y="190" fill="#d2a8ff">pprint</text>
        <text x="95" y="190" fill="#ffffff">(f_prime)</text>

        <!-- Simulated Output -->
        <path d="M 0 210 L 640 210" stroke="#334455" stroke-dasharray="5 5" stroke-width="2" />
        <text x="0" y="240" fill="#ffaa00" font-size="20">Output (도함수 자판기 탄생):</text>
        <text x="40" y="280" fill="#ffff00" font-size="24" filter="url(#glow)"> 3 2</text>
        <text x="40" y="310" fill="#ffff00" font-size="24" filter="url(#glow)">4⋅x - 9⋅x + 10⋅x - 7</text>

    </g>

    <!-- Explanation footer -->
    <rect x="100" y="520" width="700" height="60" rx="10" fill="#0f0f15" stroke="#00ffcc" stroke-width="2" />
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">복잡한 극한 계산 공식을 몰라도
        <tspan fill="#00ffcc" font-weight="bold">sp.diff()</tspan> 블록 하나면 어떤 괴물 수식의 도함수도 추출됩니다.</text>

</svg>