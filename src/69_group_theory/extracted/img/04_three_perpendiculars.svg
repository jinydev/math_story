<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">삼수선의 정리 (Theorem of 3 Perpendiculars)</text>

    <!-- The 3D Scene -->
    <!-- Base Plane alpha -->
    <g transform="translate(150, 200)">
        <polygon points="50,250 550,250 450,50 -50,50" fill="rgba(0, 255, 204, 0.05)" stroke="#555" />
        <text x="480" y="70" fill="#00ffcc" font-family="serif" font-size="24" font-weight="bold">평면 α</text>

        <!-- The line l on the plane -->
        <line x1="200" y1="200" x2="450" y2="100" stroke="#00ffcc" stroke-width="4" filter="url(#glow)" />
        <text x="430" y="90" fill="#00ffcc" font-family="serif" font-size="20" font-weight="bold">직선 l</text>

        <!-- The Point P in space (ceiling) -->
        <!-- Let's say Point P is at (150, 0) relative to plane origin -->
        <circle cx="150" cy="-100" r="8" fill="#ff0055" stroke="#fff" stroke-width="2" filter="url(#glow)" />
        <text x="170" y="-100" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold">P (천장
            픽셀)</text>

        <!-- Point O on the plane -->
        <circle cx="150" cy="150" r="6" fill="#ffff00" stroke="#fff" stroke-width="2" />
        <text x="130" y="170" fill="#ffff00" font-family="sans-serif" font-size="20" font-weight="bold">O</text>

        <!-- 1. The first perpendicular: PO perp alpha -->
        <line x1="150" y1="-100" x2="150" y2="150" stroke="#ff0055" stroke-width="4" stroke-dasharray="10 5"
            filter="url(#glow)" />
        <rect x="150" y="135" width="15" height="15" fill="none" stroke="#ff0055" stroke-width="2" />

        <text x="150" y="25" fill="#ff0055" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">1콤보: 수직 낙하(PO)</text>

        <!-- Point H on the line l -->
        <circle cx="325" cy="150" r="6" fill="#4da6ff" stroke="#fff" stroke-width="2" />
        <text x="340" y="170" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold">H</text>

        <!-- 2. The second perpendicular: OH perp l -->
        <line x1="150" y1="150" x2="325" y2="150" stroke="#4da6ff" stroke-width="4" stroke-dasharray="8 4"
            filter="url(#glow)" />

        <!-- 90 deg marker at H for line l -->
        <!-- Line l slope is -100/250 = -0.4. OH slope is 0. Wait, they need to look 90 deg in 3D perspective. -->
        <polygon points="325,150 315,145 305,150 315,155" fill="none" stroke="#4da6ff" stroke-width="2" />

        <text x="235" y="140" fill="#4da6ff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">2콤보: 횡단 레이저(OH)</text>

        <!-- 3. The Ultimate Consequence: PH perp l -->
        <line x1="150" y1="-100" x2="325" y2="150" stroke="#ffaa00" stroke-width="6" filter="url(#glow)" />
        <text x="210" y="20" fill="#ffff00" font-family="sans-serif" font-size="20" font-weight="bold">궁극기: 대각선(PH)도 90도
            타깃!</text>

        <!-- 90 deg marker at H for PH and l -->
        <polygon points="325,150 325,135 340,128 340,143" fill="none" stroke="#ffaa00" stroke-width="2" />
    </g>

    <!-- Explanation Box -->
    <rect x="150" y="490" width="600" height="80" rx="10" fill="#0f0f15" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="525" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">조건 1 & 조건 2 가 만족되면 👉 3번 결괏값은 자동으로 100% 동기화!</text>
    <text x="450" y="550" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">세 개의 수직선 중 임의의 2개만
        증명하면 피타고라스를 3D 공간 어디든 소환할 수 있습니다.</text>

</svg>