<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">수심 (Orthocenter) &amp; 방심 (Excenter)</text>

    <!-- Left Side: Orthocenter (H) -->
    <g transform="translate(250, 250)">

        <text x="0" y="-180" fill="#00ffcc" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">1. 수심 (H)</text>

        <!-- Triangle ABC -->
        <!-- A=(0, -100), B=(-100, 80), C=(120, 80) -->
        <path d="M 0 -100 L -100 80 L 120 80 Z" fill="none" stroke="#ffffff" stroke-width="3" />

        <!-- Altitudes (Perpendiculars from vertices to opposite sides) -->
        <!-- From A(0,-100) to BC(y=80) => (0, 80) -->
        <line x1="0" y1="-100" x2="0" y2="80" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="6 4" />
        <polyline points="10,80 10,70 0,70" stroke="#ff4d4d" stroke-width="2" fill="none" />

        <!-- From B(-100,80) to AC. AC vector: (120, 180). Slope=1.5. Perp slope=-0.66 -->
        <!-- Just approximate intersection -->
        <line x1="-100" y1="80" x2="35" y2="-45" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="6 4" />

        <!-- From C(120,80) to AB. AB vector: (-100, 180). Slope=-1.8. Perp slope=0.55 -->
        <line x1="120" y1="80" x2="-35" y2="-35" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="6 4" />

        <!-- Orthocenter H -->
        <!-- Intersection of altitudes. x=0. -->
        <circle cx="0" cy="-14" r="6" fill="#00ffcc" filter="url(#glow)" />
        <text x="15" y="-10" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold"
            filter="url(#glow)">H</text>

        <text x="0" y="120" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">세 꼭짓점에서 내린 수선의
            교점</text>
    </g>

    <line x1="450" y1="100" x2="450" y2="500" stroke="#445566" stroke-width="2" stroke-dasharray="8 8" />

    <!-- Right Side: Excenter (E) -->
    <g transform="translate(650, 250)">

        <text x="0" y="-180" fill="#ffaa00" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">2. 방심 (E)</text>

        <!-- Triangle ABC -->
        <!-- A=(0, -80), B=(-60, 20), C=(40, 20) -->
        <path d="M 0 -80 L -60 20 L 40 20 Z" fill="#2d2d3a" stroke="#ffffff" stroke-width="3" />

        <!-- Extended Lines -->
        <line x1="-60" y1="20" x2="-120" y2="120" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="4 4" />
        <line x1="40" y1="20" x2="80" y2="120" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="4 4" />
        <line x1="-100" y1="20" x2="80" y2="20" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="4 4" />

        <!-- Excircle -->
        <!-- approximate -->
        <circle cx="-10" cy="110" r="90" fill="none" stroke="#ffaa00" stroke-width="3" filter="url(#glow)" />

        <!-- Excenter E -->
        <circle cx="-10" cy="110" r="6" fill="#ffaa00" />
        <text x="-5" y="100" fill="#ffaa00" font-family="monospace" font-size="24" font-weight="bold"
            filter="url(#glow)">E</text>

        <!-- Angle bisectors from exterior angles -->
        <line x1="-60" y1="20" x2="-10" y2="110" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="6 4" />
        <line x1="40" y1="20" x2="-10" y2="110" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="6 4" />

        <!-- Angle marks -->
        <path d="M -80 53 A 40 40 0 0 0 -50 40" fill="none" stroke="#ffffff" stroke-width="2" />
        <path d="M 60 55 A 40 40 0 0 1 20 40" fill="none" stroke="#ffffff" stroke-width="2" />

        <text x="0" y="240" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">두 외각의 이등분선 교점
            (가출한 중심)</text>
    </g>

    <!-- Explanation Texts -->
    <rect x="150" y="520" width="600" height="50" rx="10" fill="#112233" stroke="#4da6ff" stroke-width="2" />
    <text x="450" y="550" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">삼각형 내부에서 빛을 직각으로
        반사하는 <tspan fill="#00ffcc" font-weight="bold">수심</tspan>과, 바깥 세상과 접하는 거대한 우주 <tspan fill="#ffaa00"
            font-weight="bold">방심</tspan></text>

</svg>