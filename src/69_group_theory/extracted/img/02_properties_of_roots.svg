<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
        </marker>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="26" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">거듭제곱근 세탁기: √(a²) = |a|</text>

    <!-- Input Node (-5) -->
    <g transform="translate(100, 150)">
        <circle cx="50" cy="50" r="40" fill="#331111" stroke="#ff4d4d" stroke-width="3" />
        <text x="50" y="60" fill="#ff4d4d" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">-5</text>
        <text x="50" y="120" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">초기값 (음수)</text>
    </g>

    <!-- Stage 1 Arrow (Squaring) -->
    <line x1="200" y1="200" x2="280" y2="200" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)" />
    <text x="240" y="190" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">제곱 (x²)</text>

    <!-- Intermediate Node (25) -->
    <g transform="translate(300, 150)">
        <rect x="0" y="10" width="100" height="80" rx="10" fill="#2d2d44" stroke="#ffaa00" stroke-width="3"
            filter="url(#glow)" />
        <text x="50" y="60" fill="#ffaa00" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">25</text>
        <text x="50" y="120" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">마이너스 소각!</text>
    </g>

    <!-- Stage 2 Arrow (Square Root) -->
    <line x1="420" y1="200" x2="500" y2="200" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)" />
    <text x="460" y="190" fill="#00ffcc" font-family="sans-serif" font-size="22" font-weight="bold"
        text-anchor="middle">√</text>

    <!-- Final Output Node (+5) -->
    <g transform="translate(520, 150)">
        <circle cx="50" cy="50" r="50" fill="#113322" stroke="#00ffcc" stroke-width="4" filter="url(#glow)" />
        <text x="50" y="62" fill="#00ffcc" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">+5</text>
        <text x="50" y="130" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">절댓값 변환 완료</text>
    </g>

    <!-- Big overarching Absolute Value brace/path label -->
    <path d="M 150 120 Q 350 -20 570 120" fill="none" stroke="#4da6ff" stroke-width="3" stroke-dasharray="8"
        marker-end="url(#arrow)" />
    <rect x="300" y="20" width="100" height="40" rx="5" fill="#1a1a24" />
    <text x="350" y="47" fill="#4da6ff" font-family="monospace" font-size="28" font-weight="bold"
        text-anchor="middle">|-5|</text>
    <text x="350" y="70" fill="#4da6ff" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">절댓값 효과 (abs)</text>

</svg>