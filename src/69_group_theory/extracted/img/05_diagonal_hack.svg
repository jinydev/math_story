<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <!-- Glow filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">칸토어의 대각선 논법 (Diagonal Argument)</text>
    <text x="400" y="80" fill="#ff4d4d" font-family="sans-serif" font-size="16" text-anchor="middle">실수(Real Numbers)는
        영원히 자연수와 1:1로 리스트화될 수 없다!</text>

    <!-- Title / List Headers -->
    <rect x="80" y="110" width="640" height="40" rx="5" fill="#2d2d44" stroke="#4da6ff" stroke-width="2" />
    <text x="140" y="137" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">Index (N)</text>
    <text x="450" y="137" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">가상의 무한 실수 표 (Real Numbers)</text>

    <!-- Number List & Diagonal Highlights -->
    <g transform="translate(140, 180)" font-family="monospace" font-size="24" font-weight="bold">

        <!-- Index 1 -->
        <text x="0" y="0" fill="#4da6ff" text-anchor="middle">01</text> <text x="40" y="0" fill="#555">→</text>
        <text x="100" y="0" fill="#aaaaaa">0 . </text>
        <rect x="148" y="-22" width="24" height="28" rx="4" fill="#ff4d4d" filter="url(#glow)" />
        <text x="160" y="0" fill="#ffffff" text-anchor="middle">2</text>
        <text x="175" y="0" fill="#aaaaaa">1 5 4 1 5 4 9 4 ...</text>

        <!-- Index 2 -->
        <text x="0" y="40" fill="#4da6ff" text-anchor="middle">02</text> <text x="40" y="40" fill="#555">→</text>
        <text x="100" y="40" fill="#aaaaaa">0 . 9 </text>
        <rect x="162" y="18" width="24" height="28" rx="4" fill="#ff4d4d" filter="url(#glow)" />
        <text x="174" y="40" fill="#ffffff" text-anchor="middle">9</text>
        <text x="189" y="40" fill="#aaaaaa">3 9 4 3 4 3 1 ...</text>

        <!-- Index 3 -->
        <text x="0" y="80" fill="#4da6ff" text-anchor="middle">03</text> <text x="40" y="80" fill="#555">→</text>
        <text x="100" y="80" fill="#aaaaaa">0 . 1 7 </text>
        <rect x="176" y="58" width="24" height="28" rx="4" fill="#ff4d4d" filter="url(#glow)" />
        <text x="188" y="80" fill="#ffffff" text-anchor="middle">2</text>
        <text x="203" y="80" fill="#aaaaaa">3 3 5 9 5 5 ...</text>

        <!-- Index 4 -->
        <text x="0" y="120" fill="#4da6ff" text-anchor="middle">04</text> <text x="40" y="120" fill="#555">→</text>
        <text x="100" y="120" fill="#aaaaaa">0 . 9 7 8 </text>
        <rect x="190" y="98" width="24" height="28" rx="4" fill="#ff4d4d" filter="url(#glow)" />
        <text x="202" y="120" fill="#ffffff" text-anchor="middle">2</text>
        <text x="217" y="120" fill="#aaaaaa">8 1 5 3 4 ...</text>

        <!-- Index 5 -->
        <text x="0" y="160" fill="#4da6ff" text-anchor="middle">05</text> <text x="40" y="160" fill="#555">→</text>
        <text x="100" y="160" fill="#aaaaaa">0 . 2 8 7 1 </text>
        <rect x="204" y="138" width="24" height="28" rx="4" fill="#ff4d4d" filter="url(#glow)" />
        <text x="216" y="160" fill="#ffffff" text-anchor="middle">5</text>
        <text x="231" y="160" fill="#aaaaaa">3 7 2 3 ...</text>

        <!-- Index 6 -->
        <text x="0" y="200" fill="#4da6ff" text-anchor="middle">06</text> <text x="40" y="200" fill="#555">→</text>
        <text x="100" y="200" fill="#aaaaaa">0 . 9 2 5 5 2 </text>
        <rect x="218" y="178" width="24" height="28" rx="4" fill="#ff4d4d" filter="url(#glow)" />
        <text x="230" y="200" fill="#ffffff" text-anchor="middle">8</text>
        <text x="245" y="200" fill="#aaaaaa">9 8 5 ...</text>

        <!-- Index ... -->
        <text x="0" y="240" fill="#4da6ff" text-anchor="middle">...</text> <text x="40" y="240" fill="#555"> </text>
        <text x="100" y="240" fill="#aaaaaa">. . . . . . . . </text>
        <text x="242" y="240" fill="#ff4d4d" filter="url(#glow)">↘</text>

    </g>

    <!-- New Hacker Number Construction -->
    <rect x="80" y="440" width="640" height="120" rx="10" fill="#112211" stroke="#00ffcc" stroke-width="3" />
    <text x="110" y="470" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold">해킹 로직: n번째 자리 숫자를
        무조건 변조 (1 ↔ 2)</text>

    <g transform="translate(130, 520)" font-family="monospace" font-size="32" font-weight="bold">
        <text x="0" y="0" fill="#ffffff">새로운 X = 0 . </text>

        <text x="220" y="0" fill="#00ffcc" filter="url(#glow)">1</text>
        <path d="M 228 -15 L 295 -105" stroke="#00ffcc" stroke-width="2" stroke-dasharray="4,4" />

        <text x="250" y="0" fill="#00ffcc" filter="url(#glow)">1</text>
        <path d="M 258 -15 L 305 -70" stroke="#00ffcc" stroke-width="2" stroke-dasharray="4,4" />

        <text x="280" y="0" fill="#00ffcc" filter="url(#glow)">1</text>

        <text x="310" y="0" fill="#00ffcc" filter="url(#glow)">1</text>

        <text x="340" y="0" fill="#00ffcc" filter="url(#glow)">2</text>

        <text x="370" y="0" fill="#00ffcc" filter="url(#glow)">1</text>
        <text x="410" y="0" fill="#00ffcc" filter="url(#glow)">. . .</text>
    </g>

    <text x="400" y="585" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">이 새로운 실수 X는 1번과 첫째
        자리가 다르고, 2번과 둘째 자리가 다르므로 기존 리스트에 절대 존재하지 않는다!</text>

</svg>