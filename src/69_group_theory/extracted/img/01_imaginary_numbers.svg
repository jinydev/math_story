<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
        <marker id="arrowRed" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4d4d" />
        </marker>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">허수 i 의 도입: 제곱해서 음수가 되는 마법</text>

    <!-- Real Number Rules -->
    <g transform="translate(100, 150)">
        <rect x="0" y="0" width="250" height="150" rx="15" fill="#223344" stroke="#4da6ff" stroke-width="2" />
        <text x="125" y="30" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">실수 세계 (Real)</text>

        <text x="125" y="70" fill="#ffffff" font-family="monospace" font-size="22" text-anchor="middle">2 × 2 =
            +4</text>
        <text x="125" y="110" fill="#ffffff" font-family="monospace" font-size="22" text-anchor="middle">(-2) × (-2) =
            +4</text>

        <text x="125" y="135" fill="#ffaa00" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">결과는 무조건 양수(+)!</text>
    </g>

    <!-- The Block (Equation) -->
    <g transform="translate(420, 100)">
        <rect x="0" y="0" width="280" height="70" rx="10" fill="#2b1111" stroke="#ff4d4d" stroke-width="3" />
        <text x="140" y="45" fill="#ff4d4d" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">x² = -1</text>

        <text x="140" y="-15" fill="#ff4d4d" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">불가능한 방정식 발생!</text>
    </g>

    <!-- Arrow from Real to Block -->
    <path d="M 350 220 Q 380 220 400 150" fill="none" stroke="#ff4d4d" stroke-width="4" stroke-dasharray="8"
        marker-end="url(#arrowRed)" />
    <text x="360" y="190" fill="#ff4d4d" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">"Error"</text>

    <!-- Magic Solution: Imaginary Number -->
    <g transform="translate(420, 230)">
        <rect x="0" y="0" width="280" height="130" rx="15" fill="#112233" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="140" y="35" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">상상의 숫자 'i' 소환</text>

        <text x="140" y="80" fill="#ffffff" font-family="monospace" font-size="35" font-weight="bold"
            text-anchor="middle">i = √-1</text>

        <text x="140" y="115" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">결론: i² = -1</text>
    </g>

    <!-- Arrow from Block to Imaginary -->
    <path d="M 560 170 L 560 215" fill="none" stroke="#00ffcc" stroke-width="5" marker-end="url(#arrow)" />

</svg>