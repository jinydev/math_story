<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">패턴 해킹: 수열의 틈새(차이) 에서 규칙 발굴하기</text>

    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"일일이 계산하는 것은 원시인이다.
        3개의 단절된 데이터 사이의 점프 폭스(간격) 를 추적해라!"</text>

    <!-- Main Dataset nodes -->
    <g transform="translate(100, 200)">

        <!-- Node 1 -->
        <circle cx="50" cy="50" r="30" fill="#1b1122" stroke="#4da6ff" stroke-width="4" filter="url(#glow)" />
        <text x="50" y="60" fill="#4da6ff" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">2</text>
        <text x="50" y="110" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">1st</text>

        <!-- Node 2 -->
        <circle cx="200" cy="50" r="30" fill="#1b1122" stroke="#00ffcc" stroke-width="4" filter="url(#glow)" />
        <text x="200" y="60" fill="#00ffcc" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">5</text>
        <text x="200" y="110" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">2nd</text>

        <!-- Node 3 -->
        <circle cx="350" cy="50" r="30" fill="#1b1122" stroke="#ffff00" stroke-width="4" filter="url(#glow)" />
        <text x="350" y="60" fill="#ffff00" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">9</text>
        <text x="350" y="110" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">3rd</text>

        <!-- Node 4 -->
        <circle cx="500" cy="50" r="30" fill="#1b1122" stroke="#ffaa00" stroke-width="4" filter="url(#glow)" />
        <text x="500" y="60" fill="#ffaa00" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">14</text>
        <text x="500" y="110" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">4th</text>

        <!-- Far Future Node 100 -->
        <line x1="550" y1="50" x2="650" y2="50" stroke="#ff5555" stroke-width="4" stroke-dasharray="10 10" />
        <circle cx="700" cy="50" r="40" fill="#330011" stroke="#ff5555" stroke-width="4" filter="url(#glow)" />
        <text x="700" y="60" fill="#ff5555" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">???</text>
        <text x="700" y="120" fill="#ff5555" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">100th (Target!)</text>


        <!-- Jumps / Patterns -->
        <!-- Jump 1 -->
        <path d="M 60 15 Q 125 -60 190 15" fill="none" stroke="#ff00ff" stroke-width="3" stroke-dasharray="5 5"
            marker-end="url(#arrow_p)" />
        <text x="125" y="-30" fill="#ff00ff" font-family="monospace" font-size="22" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">+3</text>

        <!-- Jump 2 -->
        <path d="M 210 15 Q 275 -60 340 15" fill="none" stroke="#ff00ff" stroke-width="3" stroke-dasharray="5 5"
            marker-end="url(#arrow_p)" />
        <text x="275" y="-30" fill="#ff00ff" font-family="monospace" font-size="22" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">+4</text>

        <!-- Jump 3 -->
        <path d="M 360 15 Q 425 -60 490 15" fill="none" stroke="#ff00ff" stroke-width="3" stroke-dasharray="5 5"
            marker-end="url(#arrow_p)" />
        <text x="425" y="-30" fill="#ff00ff" font-family="monospace" font-size="22" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">+5</text>

        <!-- Prediction Box -->
        <rect x="180" y="160" width="370" height="70" rx="10" fill="#0d1b1a" stroke="#00ffcc" stroke-width="2" />
        <text x="200" y="190" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold">👉 해커의
            룰(Pattern) 도출</text>
        <text x="200" y="215" fill="#ffffff" font-family="monospace" font-size="16">점프 간격이 [ +1 ] 씩 일정하게 커진다!</text>
    </g>

    <!-- Algorithm engine visual -->
    <g transform="translate(100, 430)">
        <line x1="50" y1="50" x2="700" y2="50" stroke="#4da6ff" stroke-width="2" />
        <rect x="50" y="30" width="40" height="40" rx="5" fill="#4da6ff" filter="url(#glow)" />
        <text x="70" y="55" fill="#0d0d1a" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">A_1</text>
        <rect x="150" y="30" width="40" height="40" rx="5" fill="#4da6ff" />
        <rect x="250" y="30" width="40" height="40" rx="5" fill="#4da6ff" />
        <text x="400" y="55" fill="#4da6ff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">FOR LOOP (1 to 100) >></text>
        <rect x="650" y="10" width="80" height="80" rx="10" fill="#ff0055" filter="url(#glow)" />
        <text x="690" y="60" fill="#ffffff" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">A_100</text>
    </g>

    <defs>
        <marker id="arrow_p" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ff00ff" />
        </marker>
    </defs>

    <!-- Base Explain -->
    <rect x="100" y="530" width="700" height="40" rx="10" fill="#111" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="15" text-anchor="middle">
        도출된 단 1개의 <tspan fill="#ff00ff" font-weight="bold">패턴 코드(n번째는 +n점프)</tspan> 만 찾아내면, 1억 번째의 미래 데이터도 단숨에 찍어낼 수
        있습니다.
    </text>
</svg>