<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">지수법칙 (Laws of Exponents) - 곱셈과 나눗셈</text>

    <!-- Multiplication Rule -->
    <g transform="translate(100, 150)">
        <rect x="-50" y="-60" width="350" height="100" rx="15" fill="#223344" stroke="#4da6ff" stroke-width="2" />

        <text x="0" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold">a</text>
        <text x="25" y="-15" fill="#00ffcc" font-family="monospace" font-size="25" font-weight="bold">2</text>

        <text x="60" y="0" fill="#4da6ff" font-family="monospace" font-size="40" font-weight="bold"> × a</text>
        <text x="140" y="-15" fill="#ffaa00" font-family="monospace" font-size="25" font-weight="bold">3</text>

        <text x="170" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"> = </text>

        <text x="220" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"
            filter="url(#glow)">a</text>

        <!-- The Plus sign for exponents -->
        <rect x="250" y="-35" width="40" height="30" rx="5" fill="#111" stroke="#ff4d4d" stroke-width="2" />
        <text x="270" y="-13" fill="#ff4d4d" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">2+3</text>

        <text x="125" y="80" fill="#4da6ff" font-family="sans-serif" font-size="18" text-anchor="middle">밑이 같게 곱할 땐 지수끼리
            <tspan fill="#ff4d4d" font-weight="bold">합(+)</tspan></text>
    </g>

    <!-- Division Rule -->
    <g transform="translate(450, 150)">
        <rect x="-50" y="-60" width="350" height="100" rx="15" fill="#332222" stroke="#ff4d4d" stroke-width="2" />

        <text x="0" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold">a</text>
        <text x="25" y="-15" fill="#00ffcc" font-family="monospace" font-size="25" font-weight="bold">5</text>

        <text x="60" y="0" fill="#ff4d4d" font-family="monospace" font-size="40" font-weight="bold"> ÷ a</text>
        <text x="140" y="-15" fill="#ffaa00" font-family="monospace" font-size="25" font-weight="bold">3</text>

        <text x="170" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"> = </text>

        <text x="220" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"
            filter="url(#glow)">a</text>

        <!-- The Minus sign for exponents -->
        <rect x="250" y="-35" width="40" height="30" rx="5" fill="#111" stroke="#4da6ff" stroke-width="2" />
        <text x="270" y="-13" fill="#4da6ff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">5-3</text>

        <text x="125" y="80" fill="#ff4d4d" font-family="sans-serif" font-size="18" text-anchor="middle">밑이 같게 나눌 땐 지수끼리
            <tspan fill="#4da6ff" font-weight="bold">차(-)</tspan></text>
    </g>

    <!-- Power Rule -->
    <g transform="translate(250, 280)">
        <rect x="-50" y="-60" width="400" height="100" rx="15" fill="#222233" stroke="#aa44ff" stroke-width="2" />

        <text x="0" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold">(a</text>
        <text x="45" y="-15" fill="#00ffcc" font-family="monospace" font-size="25" font-weight="bold">m</text>
        <text x="65" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold">)</text>
        <text x="85" y="-20" fill="#ffaa00" font-family="monospace" font-size="30" font-weight="bold"
            filter="url(#glow)">n</text>

        <text x="140" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"> = </text>

        <text x="200" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"
            filter="url(#glow)">a</text>

        <!-- The Multiply sign for exponents -->
        <rect x="230" y="-35" width="50" height="30" rx="5" fill="#111" stroke="#00ffcc" stroke-width="2" />
        <text x="255" y="-13" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">m×n</text>

        <text x="150" y="80" fill="#aa44ff" font-family="sans-serif" font-size="18" text-anchor="middle">괄호 바깥의 지수와는
            <tspan fill="#00ffcc" font-weight="bold">곱(×)</tspan></text>
    </g>

</svg>