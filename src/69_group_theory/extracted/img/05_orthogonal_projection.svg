<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">정사영 (Orthogonal Projection) 차원 박살 렌더링</text>

    <!-- Ground Plane (XY Plane) -->
    <g transform="translate(150, 300)">
        <polygon points="0,200 600,200 500,-50 -100,-50" fill="#0d1a26" stroke="#00ffcc" stroke-width="2" />
        <text x="-50" y="-20" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold">바닥면 (XY
            Plane)</text>

        <!-- Sun/Light Source Beams -->
        <!-- We're going to put standard perpendicular rays of light dropping down -->
        <line x1="150" y1="-250" x2="150" y2="40" stroke="#ffff00" stroke-width="2" stroke-dasharray="5 5" opacity="0.6"
            filter="url(#glow)" />
        <line x1="350" y1="-250" x2="350" y2="40" stroke="#ffff00" stroke-width="2" stroke-dasharray="5 5" opacity="0.6"
            filter="url(#glow)" />
        <line x1="250" y1="-250" x2="250" y2="-60" stroke="#ffff00" stroke-width="2" stroke-dasharray="5 5"
            opacity="0.6" filter="url(#glow)" />

        <text x="250" y="-270" fill="#ffff00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">천장 90도 수직 광선 (Z-Axis 파쇄기)</text>

        <!-- The original floating object S (a tilted circle/ellipse) -->
        <!-- Let's represent it as a tilted plane polygon for clarity -->
        <polygon points="100,-150 400,-150 350,-50 50,-50" fill="rgba(255, 0, 85, 0.4)" stroke="#ff0055"
            stroke-width="3" filter="url(#glow)" />
        <text x="225" y="-100" fill="#ffffff" font-family="serif" font-size="24" font-weight="bold"
            text-anchor="middle">오브젝트 넓이: S</text>

        <!-- Ray hit points going down -->
        <line x1="100" y1="-150" x2="100" y2="0" stroke="#ff0055" stroke-width="3" stroke-dasharray="8 4" />
        <line x1="400" y1="-150" x2="400" y2="0" stroke="#ff0055" stroke-width="3" stroke-dasharray="8 4" />
        <line x1="350" y1="-50" x2="350" y2="100" stroke="#ff0055" stroke-width="3" stroke-dasharray="8 4" />
        <line x1="50" y1="-50" x2="50" y2="100" stroke="#ff0055" stroke-width="3" stroke-dasharray="8 4" />

        <!-- The projected shadow S' on the ground -->
        <!-- The length along X axis remains same, but slanted dimension collapses -->
        <polygon points="100,0 400,0 350,100 50,100" fill="rgba(0, 255, 204, 0.6)" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="225" y="55" fill="#112233" font-family="serif" font-size="24" font-weight="bold"
            text-anchor="middle">그림자 압축: S'</text>

        <!-- Angle display -->
        <path d="M 400,-150 Q 450,-150 450,-75" fill="none" stroke="#ffaa00" stroke-width="3" stroke-dasharray="5 5" />
        <text x="470" y="-115" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold">θ (기울어진
            각도)</text>
    </g>

    <!-- Math Box -->
    <rect x="200" y="470" width="500" height="100" rx="15" fill="#0f0f15" stroke="#ffaa00" stroke-width="3" />
    <text x="450" y="510" fill="#ffff00" font-family="sans-serif" font-size="28" font-weight="bold"
        text-anchor="middle">S' = S × cos(θ)</text>
    <text x="450" y="540" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">그림자 넓이 = 원본 넓이 ×
        (코사인 차원 압축률)</text>

</svg>