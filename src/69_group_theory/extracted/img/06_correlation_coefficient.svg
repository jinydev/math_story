<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <linearGradient id="r_grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00ffcc" /> <!-- Negative: Cyan -->
            <stop offset="50%" stop-color="#777777" /> <!-- Zero: Gray -->
            <stop offset="100%" stop-color="#ff4d4d" /> <!-- Positive: Red -->
        </linearGradient>
    </defs>

    <text x="450" y="60" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">팩트 폭격 계기판: 상관계수 (r)</text>

    <!-- Explanation Panel -->
    <g transform="translate(150, 110)">
        <rect x="0" y="0" width="600" height="60" rx="10" fill="#111122" stroke="#ffaa00" stroke-width="2" />
        <text x="300" y="35" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">피어슨의 위대한 유산:
            아무리 발버둥쳐도 영원히 <tspan fill="#ffaa00" font-weight="bold">-1 부터 +1 사이</tspan>에 갇힌다.</text>
    </g>

    <!-- Main Gauge Bar -->
    <g transform="translate(100, 250)">

        <!-- The Bar Background -->
        <rect x="0" y="0" width="700" height="40" rx="20" fill="url(#r_grad)" stroke="#ffffff" stroke-width="2" />

        <!-- Center Line (r = 0) -->
        <line x1="350" y1="-20" x2="350" y2="60" stroke="#ffffff" stroke-width="4" />
        <circle cx="350" cy="20" r="10" fill="#1a1a24" stroke="#ffffff" stroke-width="2" />
        <text x="350" y="-30" fill="#aaaaaa" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">r = 0 (무관계)</text>

        <!-- -1 End (Negative) -->
        <line x1="20" y1="-20" x2="20" y2="60" stroke="#00ffcc" stroke-width="4" filter="url(#glow)" />
        <circle cx="20" cy="20" r="10" fill="#1a1a24" stroke="#00ffcc" stroke-width="2" />
        <text x="20" y="-30" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">r = -1 (음의 앙숙)</text>

        <!-- +1 End (Positive) -->
        <line x1="680" y1="-20" x2="680" y2="60" stroke="#ff4d4d" stroke-width="4" filter="url(#glow)" />
        <circle cx="680" cy="20" r="10" fill="#1a1a24" stroke="#ff4d4d" stroke-width="2" />
        <text x="680" y="-30" fill="#ff4d4d" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">r = +1 (양의 절친)</text>

        <!-- Little scatter plots underneath to show the meaning -->

        <!-- Negative Scatter -->
        <g transform="translate(-30, 100)">
            <rect x="0" y="0" width="100" height="100" fill="none" stroke="#777777" stroke-width="2" />
            <line x1="10" y1="10" x2="90" y2="90" stroke="#00ffcc" stroke-width="3" filter="url(#glow)" />
            <circle cx="20" cy="20" r="3" fill="#ffffff" />
            <circle cx="50" cy="50" r="3" fill="#ffffff" />
            <circle cx="80" cy="80" r="3" fill="#ffffff" />
            <circle cx="30" cy="30" r="3" fill="#ffffff" />
            <circle cx="70" cy="70" r="3" fill="#ffffff" />
            <text x="50" y="125" fill="#00ffcc" font-family="sans-serif" font-size="14" text-anchor="middle">가느다란 일직선
                (우하향)</text>
        </g>

        <!-- Zero Scatter -->
        <g transform="translate(300, 100)">
            <rect x="0" y="0" width="100" height="100" fill="none" stroke="#777777" stroke-width="2" />
            <circle cx="50" cy="50" r="40" fill="#aaaaaa" opacity="0.2" />
            <text x="50" y="60" fill="#aaaaaa" font-family="sans-serif" font-size="30" font-weight="bold"
                text-anchor="middle">?</text>
            <circle cx="20" cy="40" r="3" fill="#ffffff" />
            <circle cx="70" cy="20" r="3" fill="#ffffff" />
            <circle cx="80" cy="80" r="3" fill="#ffffff" />
            <circle cx="30" cy="80" r="3" fill="#ffffff" />
            <circle cx="50" cy="10" r="3" fill="#ffffff" />
            <text x="50" y="125" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">형태 없는
                난장판</text>
        </g>

        <!-- Positive Scatter -->
        <g transform="translate(630, 100)">
            <rect x="0" y="0" width="100" height="100" fill="none" stroke="#777777" stroke-width="2" />
            <line x1="10" y1="90" x2="90" y2="10" stroke="#ff4d4d" stroke-width="3" filter="url(#glow)" />
            <circle cx="20" cy="80" r="3" fill="#ffffff" />
            <circle cx="50" cy="50" r="3" fill="#ffffff" />
            <circle cx="80" cy="20" r="3" fill="#ffffff" />
            <circle cx="30" cy="70" r="3" fill="#ffffff" />
            <circle cx="70" cy="30" r="3" fill="#ffffff" />
            <text x="50" y="125" fill="#ff4d4d" font-family="sans-serif" font-size="14" text-anchor="middle">가느다란 일직선
                (우상향)</text>
        </g>

        <!-- Common threshold in data science (r ~= 0.7) -->
        <line x1="550" y1="-10" x2="550" y2="50" stroke="#ffaa00" stroke-width="2" stroke-dasharray="4 4" />
        <text x="550" y="-15" fill="#ffaa00" font-family="sans-serif" font-size="16" text-anchor="middle">r = 0.7 (실무
            유효선)</text>
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="520" width="600" height="40" rx="10" fill="#2b1111" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="545" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">파이썬 np.corrcoef()의
        마법: 애매함 따위는 없는 냉혹한 확률 매칭!</text>

</svg>