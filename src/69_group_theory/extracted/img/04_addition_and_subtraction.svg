<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow_forward" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#00ffcc" />
        </marker>
        <marker id="arrow_backward" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#ff0055" />
        </marker>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">유리수의 벡터 덧셈과 뺄셈: 수직선 위의 물리 이동</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"더하기(+)는 향하던 방향으로
        전진, 빼기(-)는 머리를 뒤로 돌려 유턴(U-Turn) 한다!"</text>

    <!-- Central Number Line -->
    <g transform="translate(100, 300)">
        <rect x="-50" y="-150" width="800" height="250" rx="15" fill="#0b0b1a" stroke="#ffffff" stroke-width="2"
            opacity="0.5" />

        <!-- Axis -->
        <path d="M 0 0 L 700 0" fill="none" stroke="#fff" stroke-width="4" />

        <!-- Ticks -->
        <!-- -2 (100), -1.5 (150), -1 (200), -0.5 (250), 0 (300), 0.5 (350), 1 (400), 1.5 (450), 2 (500) -->
        <!-- Scale: 1 unit = 100px. Offset Origin -> x=300 -->
        <g transform="translate(300, 0)">
            <circle cx="-200" cy="0" r="4" fill="#fff" />
            <text x="-200" y="25" fill="#fff" font-weight="bold" text-anchor="middle">-2</text>

            <circle cx="-100" cy="0" r="4" fill="#fff" />
            <text x="-100" y="25" fill="#fff" font-weight="bold" text-anchor="middle">-1</text>

            <circle cx="-50" cy="0" r="4" fill="#555" />
            <text x="-50" y="25" fill="#555" font-weight="bold" font-size="12" text-anchor="middle">-0.5</text>

            <circle cx="0" cy="0" r="8" fill="#fff" stroke="#ff00ff" stroke-width="3" />
            <text x="0" y="30" fill="#ff00ff" font-weight="bold" font-size="20" text-anchor="middle"
                filter="url(#glow)">0</text>

            <circle cx="100" cy="0" r="4" fill="#fff" />
            <text x="100" y="25" fill="#fff" font-weight="bold" text-anchor="middle">1</text>

            <circle cx="150" cy="0" r="4" fill="#555" />
            <text x="150" y="25" fill="#555" font-weight="bold" font-size="12" text-anchor="middle">1.5</text>

            <circle cx="200" cy="0" r="4" fill="#fff" />
            <text x="200" y="25" fill="#fff" font-weight="bold" text-anchor="middle">2</text>

            <circle cx="300" cy="0" r="4" fill="#fff" />
            <text x="300" y="25" fill="#fff" font-weight="bold" text-anchor="middle">3</text>
        </g>

        <!-- Vector 1: +1.5 -->
        <!-- Starts at 300, ends at 450 (y=-70) -->
        <path d="M 300 0 L 300 -60" fill="none" stroke="#fff" stroke-dasharray="2 2" opacity="0.5" />
        <path d="M 300 -60 L 440 -60" fill="none" stroke="#00ffcc" stroke-width="5" marker-end="url(#arrow_forward)"
            filter="url(#glow)" />
        <text x="370" y="-75" fill="#00ffcc" font-weight="bold" font-size="18" text-anchor="middle"
            filter="url(#glow)">+ 1.5 (전진)</text>

        <!-- Vector 2: -3  -->
        <!-- Starts at 450 (y=-120), ends at 150 -->
        <path d="M 450 -60 L 450 -120" fill="none" stroke="#fff" stroke-dasharray="2 2" opacity="0.5" />
        <path d="M 450 -120 L 160 -120" fill="none" stroke="#ff0055" stroke-width="5" marker-end="url(#arrow_backward)"
            filter="url(#glow)" />
        <text x="305" y="-135" fill="#ff0055" font-weight="bold" font-size="18" text-anchor="middle"
            filter="url(#glow)">+ ( - 3 ) (완전 유턴하여 후진)</text>

        <path d="M 150 -120 L 150 0" fill="none" stroke="#fff" stroke-dasharray="4 4" opacity="0.8" />

        <!-- Final Destination Marker -->
        <circle cx="150" cy="0" r="10" fill="#ffff00" filter="url(#glow)" />
        <text x="150" y="-20" fill="#ffff00" font-weight="bold" font-size="16" text-anchor="middle"
            filter="url(#glow)">최종 우주 좌표 : -1.5</text>
    </g>

    <!-- Big Alert Bottom -->
    <rect x="100" y="450" width="700" height="110" rx="10" fill="#1b0005" stroke="#ff0055" stroke-width="2" />
    <text x="450" y="480" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">
        방향의 반전: "나의 적(-)의 적(-)은 나의 은인(+)이다"
    </text>
    <text x="450" y="515" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        - 기호는 <tspan fill="#ff0055" font-weight="bold">수직선의 바라보는 머리 방향을 180도 완전히 유턴</tspan> 시키는 물리 회전이다.
    </text>
    <text x="450" y="540" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">
        <tspan fill="#00ffcc">5 - (-3)</tspan> = 뒤돌아서 + 뒤로 걷기 = 결국 <tspan fill="#00ffcc">앞으로 가는 꼴 (5 + 3)</tspan>
    </text>
</svg>