<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .grid {
                fill: none;
                stroke: #30363d;
                stroke-width: 1.5;
            }

            .line-euclid {
                fill: none;
                stroke: #00ffff;
                stroke-width: 4;
            }

            .line-noneuclid {
                fill: none;
                stroke: #ff6464;
                stroke-width: 4;
            }

            .label {
                fill: #ffffff;
                font-size: 18px;
                text-anchor: middle;
            }

            .sub-label {
                fill: #8b949e;
                font-size: 14px;
                text-anchor: middle;
            }

            .title {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="400" y="40" class="title">평행선의 운명: 평면 vs 곡면 (제5공준의 파괴)</text>

    <!-- Left: Flat Plane (Euclidean) -->
    <g transform="translate(200, 200)">
        <!-- Flat Grid -->
        <path d="M-100 -80 L100 -80 M-100 -40 L100 -40 M-100 0 L100 0 M-100 40 L100 40 M-100 80 L100 80" class="grid" />
        <path d="M-80 -100 L-80 100 M-40 -100 L-40 100 M0 -100 L0 100 M40 -100 L40 100 M80 -100 L80 100" class="grid" />
        <!-- Planes -->
        <rect x="-100" y="-100" width="200" height="200" fill="none" stroke="#fff" stroke-width="2" />
        <!-- Parallel Lines -->
        <line x1="-120" y1="-20" x2="120" y2="-20" class="line-euclid" />
        <line x1="-120" y1="20" x2="120" y2="20" class="line-euclid" />

        <text x="0" y="140" class="label">유클리드 평면 기하학</text>
        <text x="0" y="165" class="sub-label">영원히 거리가 유지되며 만나지 않음</text>
    </g>

    <!-- Right: Sphere (Non-Euclidean) -->
    <g transform="translate(600, 200)">
        <!-- Sphere outline -->
        <circle cx="0" cy="0" r="100" fill="#161b22" stroke="#fff" stroke-width="2" />

        <!-- Sphere Grid (Longitudes and Latitudes) -->
        <!-- Latitudes -->
        <path d="M-86 -50 Q0 -70 86 -50" class="grid" />
        <path d="M-100 0 Q0 -20 100 0" class="grid" /> <!-- Equator -->
        <path d="M-86 50 Q0 30 86 50" class="grid" />

        <!-- Parallel Lines (Longitudes) starting parallel at equator -->
        <path d="M -30 100 A 30 100 0 0 1 -30 -100" class="line-noneuclid" />
        <path d="M 30 100 A 30 100 0 0 0 30 -100" class="line-noneuclid" />

        <!-- Intersection Point Marker -->
        <circle cx="0" cy="-100" r="6" fill="#ffff00" />
        <text x="0" y="-120" fill="#ffff00" font-size="14" text-anchor="middle">격돌 (극점)</text>

        <text x="0" y="140" class="label">비유클리드 구면 기하학</text>
        <text x="0" y="165" class="sub-label">처음엔 평행하지만 곡률을 타고 결국 충돌</text>
    </g>

</svg>