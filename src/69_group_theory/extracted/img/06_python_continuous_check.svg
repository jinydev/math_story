<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">파이썬 시각화 엔진: 조건부 조합 함수 한계 검출</text>

    <!-- Two separate graph areas for UI contrast -->
    <rect x="50" y="80" width="800" height="380" rx="10" fill="#0d1a26" stroke="#555566" stroke-width="4" />

    <!-- Left section GUI -->
    <rect x="50" y="80" width="250" height="380" fill="#0a121a" stroke-right="#555566" stroke-width="2" />
    <text x="175" y="120" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
        text-anchor="middle">> Terminal Log</text>
    <line x1="60" y1="130" x2="290" y2="130" stroke="#00ffcc" stroke-dasharray="2 2" />

    <text x="60" y="160" fill="#aaaaaa" font-family="monospace" font-size="12">def combined(x):</text>
    <text x="80" y="180" fill="#aaaaaa" font-family="monospace" font-size="12">if x < 1:</text>
            <text x="100" y="200" fill="#ffaa00" font-family="monospace" font-size="12">return x**2 (Left)</text>
            <text x="80" y="220" fill="#aaaaaa" font-family="monospace" font-size="12">else:</text>
            <text x="100" y="240" fill="#4da6ff" font-family="monospace" font-size="12">return x + 2 (Right)</text>

            <text x="60" y="280" fill="#ffffff" font-family="monospace" font-size="12">Target x = 1</text>
            <text x="60" y="310" fill="#ff0055" font-family="monospace" font-size="12">lim left = 1.0</text>
            <text x="60" y="330" fill="#ff0055" font-family="monospace" font-size="12">lim right = 3.0</text>
            <text x="60" y="350" fill="#ff0055" font-family="monospace" font-size="12">limit_left != limit_right</text>
            <text x="60" y="380" fill="#ff0055" font-family="monospace" font-size="14" font-weight="bold">[ERROR]
                Discontinuous!</text>

            <!-- Right section Graphing -->
            <!-- Target line x=1 -->
            <!-- Mapping: Target Center is roughly x=550. Let's make x=400 the center of coordinate -->
            <line x1="550" y1="100" x2="550" y2="440" stroke="#555566" stroke-dasharray="10 5" />
            <text x="550" y="460" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">x = 1 지뢰
                포인트</text>

            <!-- Left Armor Curve y=x^2 -->
            <path d="M 350 350 Q 450 350 550 300" fill="none" stroke="#ffaa00" stroke-width="6" filter="url(#glow)" />
            <circle cx="550" cy="300" r="6" fill="#0d1a26" stroke="#ffaa00" stroke-width="3" /> <!-- Open Circle -->
            <text x="500" y="320" fill="#ffaa00" font-family="sans-serif" font-size="16">y = 1</text>

            <!-- Right Missile Curve y=x+2 -->
            <path d="M 550 150 L 750 100" fill="none" stroke="#4da6ff" stroke-width="6" filter="url(#glow)" />
            <circle cx="550" cy="150" r="8" fill="#4da6ff" /> <!-- Closed Circle -->
            <text x="580" y="170" fill="#4da6ff" font-family="sans-serif" font-size="16">y = 3</text>

            <!-- Error Marker -->
            <line x1="550" y1="290" x2="550" y2="160" stroke="#ff0055" stroke-width="4" stroke-dasharray="5 5"
                filter="url(#glow)" />
            <text x="600" y="235" fill="#ff0055" font-family="sans-serif" font-size="16" font-weight="bold">Jump: 높이오차
                발생!</text>
            <polygon points="545,225 555,225 550,210" fill="#ff0055" />
            <polygon points="545,280 555,280 550,295" fill="#ff0055" />

            <!-- Footer Banner -->
            <rect x="150" y="490" width="600" height="80" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
            <text x="450" y="520" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
                text-anchor="middle">파이썬을 통한 논리적 오류 검출</text>
            <text x="450" y="545" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">눈으로 대충 그리는
                수학이 아닌, 컴파일러가 숫자(1.0, 3.0) 차이를 스캔하여</text>
            <text x="450" y="565" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">완전한 단층
                지대(Jump Discontinuity)임을 리버스 엔지니어링으로 증명해냅니다.</text>

</svg>