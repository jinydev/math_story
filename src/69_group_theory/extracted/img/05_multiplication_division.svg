<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ff00ff" />
        </marker>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">곱셈은 스케일, 나눗셈은 역전(Reciprocal) 마법</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"통분 고통 없이, 위는 위끼리,
        아래는 아래끼리 가장 순수하게 합체한다."</text>

    <!-- Multiplication Mechanism -->
    <g transform="translate(100, 150)">
        <rect x="-20" y="-30" width="350" height="200" rx="15" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
        <text x="150" y="0" fill="#ff00ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">1. 분수의 곱셈 (위아래 직결)</text>

        <!-- Formula -->
        <text x="40" y="60" fill="#00ffcc" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">a</text>
        <path d="M 20 75 L 60 75" fill="none" stroke="#fff" stroke-width="4" />
        <text x="40" y="110" fill="#ffff00" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">b</text>

        <text x="100" y="90" fill="#fff" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">×</text>

        <text x="160" y="60" fill="#00ffcc" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">c</text>
        <path d="M 140 75 L 180 75" fill="none" stroke="#fff" stroke-width="4" />
        <text x="160" y="110" fill="#ffff00" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">d</text>

        <text x="210" y="90" fill="#fff" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">=</text>

        <!-- Straight arrows -->
        <path d="M 60 50 Q 100 30 140 50" fill="none" stroke="#00ffcc" stroke-width="2" marker-end="url(#arrow)"
            stroke-dasharray="4 2" />
        <path d="M 60 100 Q 100 120 140 100" fill="none" stroke="#ffff00" stroke-width="2" marker-end="url(#arrow)"
            stroke-dasharray="4 2" />

        <text x="270" y="60" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">a × c</text>
        <path d="M 230 75 L 310 75" fill="none" stroke="#fff" stroke-width="4" />
        <text x="270" y="110" fill="#ffff00" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">b × d</text>
    </g>

    <!-- Division Mechanism -->
    <g transform="translate(500, 150)">
        <rect x="-20" y="-30" width="370" height="200" rx="15" fill="#001a11" stroke="#00ffcc" stroke-width="2" />
        <text x="160" y="0" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">2. 분수의 나눗셈 (역수 스위칭)</text>

        <!-- Formula -->
        <text x="40" y="60" fill="#00ffcc" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">a</text>
        <path d="M 20 75 L 60 75" fill="none" stroke="#fff" stroke-width="4" />
        <text x="40" y="110" fill="#ffff00" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">b</text>

        <text x="100" y="90" fill="#ff5555" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">÷</text>

        <text x="160" y="60" fill="#00ffcc" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">c</text>
        <path d="M 140 75 L 180 75" fill="none" stroke="#fff" stroke-width="4" />
        <text x="160" y="110" fill="#ffff00" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">d</text>

        <!-- Transformation Arrow -->
        <path d="M 160 40 Q 210 -10 260 40" fill="none" stroke="#ff00ff" stroke-width="3" marker-end="url(#arrow)"
            filter="url(#glow)" />
        <path d="M 160 130 Q 210 180 260 130" fill="none" stroke="#ff00ff" stroke-width="3" marker-end="url(#arrow)"
            filter="url(#glow)" />

        <text x="230" y="90" fill="#fff" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">=</text>

        <text x="290" y="60" fill="#00ffcc" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">a</text>
        <path d="M 270 75 L 310 75" fill="none" stroke="#fff" stroke-width="4" />
        <text x="290" y="110" fill="#ffff00" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">b</text>

        <text x="340" y="90" fill="#00ffcc" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">×</text>

        <!-- Inverted Fraction! -->
        <text x="390" y="60" fill="#ffff00" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">d</text>
        <path d="M 370 75 L 410 75" fill="none" stroke="#ff00ff" stroke-width="4" filter="url(#glow)" />
        <text x="390" y="110" fill="#00ffcc" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">c</text>
    </g>

    <!-- Big Alert Bottom -->
    <rect x="100" y="450" width="700" height="110" rx="10" fill="#220022" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="480" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">
        컴퓨터 알고리즘의 대원칙: "나눗셈 결함 우회(Bypass)"
    </text>
    <text x="450" y="515" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        나누기는 기계적 리소스를 심하게 퍼먹으므로, 소프트웨어 공학에서는
    </text>
    <text x="450" y="540" fill="#ff00ff" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">
        무조건 타겟 값을 역수(Reciprocal) 로 뒤집은 뒤, 압도적으로 빠른 '거꾸로 곱하기' 로 치환한다!
    </text>
</svg>