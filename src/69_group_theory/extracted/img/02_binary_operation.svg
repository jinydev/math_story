<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">이항연산과 우주의 결계 '닫힘 (Closure)'</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"믹서기를 부착해 융합시킬 때,
        결괏값이 우주 생태계(집합) 밖으로 튕겨 나가지 않는가?"</text>

    <!-- Left: Closure Success (Natural Numbers with Addition) -->
    <g transform="translate(100, 150)">
        <rect x="-50" y="0" width="350" height="300" rx="20" fill="#112211" stroke="#00ff00" stroke-width="3"
            stroke-dasharray="10 5" />
        <text x="125" y="-15" fill="#00ff00" font-weight="bold" font-size="24" text-anchor="middle"
            filter="url(#glow)">[합격] 정수(Z) + 덧셈(+)</text>

        <!-- Machine -->
        <rect x="75" y="100" width="100" height="80" rx="10" fill="#222" stroke="#fff" stroke-width="2" />
        <text x="125" y="150" fill="#fff" font-weight="bold" font-size="40" text-anchor="middle"
            filter="url(#glow)">+</text>
        <text x="125" y="170" fill="#aaa" font-size="12" text-anchor="middle">믹서기</text>

        <!-- Inputs -->
        <circle cx="50" cy="50" r="20" fill="#0088ff" />
        <text x="50" y="56" fill="#fff" font-weight="bold" font-size="18" text-anchor="middle">-3</text>
        <path d="M 60 70 L 90 100" fill="none" stroke="#fff" stroke-width="2" marker-end="url(#arrow_w)" />

        <circle cx="200" cy="50" r="20" fill="#0088ff" />
        <text x="200" y="56" fill="#fff" font-weight="bold" font-size="18" text-anchor="middle">5</text>
        <path d="M 190 70 L 160 100" fill="none" stroke="#fff" stroke-width="2" marker-end="url(#arrow_w)" />

        <!-- Output -->
        <path d="M 125 180 L 125 220" fill="none" stroke="#fff" stroke-width="3" marker-end="url(#arrow_w)" />
        <circle cx="125" cy="240" r="25" fill="#00ffcc" filter="url(#glow)" />
        <text x="125" y="247" fill="#000" font-weight="bold" font-size="20" text-anchor="middle">2</text>
        <text x="125" y="285" fill="#00ffcc" font-weight="bold" font-size="16" text-anchor="middle">"동일한 정수 우주에
            존재"</text>
    </g>

    <!-- Right: Closure Fail (Integers with Division) -->
    <g transform="translate(550, 150)">
        <rect x="-50" y="0" width="350" height="300" rx="20" fill="#221111" stroke="#ff0055" stroke-width="3"
            stroke-dasharray="10 5" />
        <text x="125" y="-15" fill="#ff0055" font-weight="bold" font-size="24" text-anchor="middle"
            filter="url(#glow)">[불합격] 정수(Z) + 나눗셈(÷)</text>

        <!-- Machine -->
        <rect x="75" y="100" width="100" height="80" rx="10" fill="#222" stroke="#fff" stroke-width="2" />
        <text x="125" y="150" fill="#fff" font-weight="bold" font-size="40" text-anchor="middle"
            filter="url(#glow)">÷</text>
        <text x="125" y="170" fill="#aaa" font-size="12" text-anchor="middle">믹서기</text>

        <!-- Inputs -->
        <circle cx="50" cy="50" r="20" fill="#0088ff" />
        <text x="50" y="56" fill="#fff" font-weight="bold" font-size="18" text-anchor="middle">3</text>
        <path d="M 60 70 L 90 100" fill="none" stroke="#fff" stroke-width="2" marker-end="url(#arrow_w)" />

        <circle cx="200" cy="50" r="20" fill="#0088ff" />
        <text x="200" y="56" fill="#fff" font-weight="bold" font-size="18" text-anchor="middle">2</text>
        <path d="M 190 70 L 160 100" fill="none" stroke="#fff" stroke-width="2" marker-end="url(#arrow_w)" />

        <!-- Output flying out -->
        <path d="M 130 180 L 180 320" fill="none" stroke="#ff0055" stroke-width="3" stroke-dasharray="4 4"
            marker-end="url(#arrow_r)" />

        <g transform="translate(190, 340)">
            <circle cx="0" cy="0" r="25" fill="#ffff00" filter="url(#glow)" />
            <text x="0" y="7" fill="#000" font-weight="bold" font-size="18" text-anchor="middle">1.5</text>
            <!-- Explosion icon -->
            <path d="M -30 -30 L -15 -15 M 30 -30 L 15 -15 M -30 30 L -15 15 M 30 30 L 15 15" stroke="#ff0000"
                stroke-width="4" />
        </g>

        <text x="250" y="320" fill="#ff0055" font-weight="bold" font-size="16" text-anchor="left">"소수?! 정수 우주 밖으로
            이탈!"</text>
        <text x="250" y="340" fill="#ff0055" font-weight="bold" font-size="16" text-anchor="left">==> 생태계 붕괴 (닫혀 있지
            않음)</text>
    </g>

    <defs>
        <marker id="arrow_w" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ffffff" />
        </marker>
        <marker id="arrow_r" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ff0055" />
        </marker>
    </defs>

    <!-- Big Alert Bottom -->
    <rect x="100" y="500" width="700" height="70" rx="10" fill="#221111" stroke="#ffff00" stroke-width="2" />
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        새로운 구조(Cluster) 나 프로그램을 개발할 때, 입력값에 대한 반환값(Return) 이
    </text>
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        원래 설계했던 자료형(Set Type) 을 절대로 파괴하지 않음을 증명하는 가혹한 안정성 테스트다.
    </text>
</svg>