<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">수면(X축) 해킹: 2D 그래프 부등식 렌더러</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"방정식 f(x)=0 을
        지평선(수면) 으로 삼아, 솟아오른 놈(>) 과 잠수함(<) 을 형광펜으로 분리한다."</text>

            <!-- Main Graph Area -->
            <g transform="translate(100, 160)">
                <rect x="0" y="0" width="700" height="300" rx="10" fill="#050511" stroke="#333" stroke-width="2" />

                <!-- Grid -->
                <path
                    d="M 100 0 L 100 300 M 200 0 L 200 300 M 300 0 L 300 300 M 400 0 L 400 300 M 500 0 L 500 300 M 600 0 L 600 300"
                    fill="none" stroke="#222" stroke-width="1" />
                <path d="M 0 50 L 700 50 M 0 100 L 700 100 M 0 200 L 700 200 M 0 250 L 700 250" fill="none"
                    stroke="#222" stroke-width="1" />

                <!-- Y Axis -->
                <path d="M 350 0 L 350 300" fill="none" stroke="#555" stroke-width="2" />
                <text x="360" y="20" fill="#555" font-weight="bold">y</text>

                <!-- X Axis (The Sea Level) -->
                <path d="M 0 150 L 700 150" fill="none" stroke="#ff00ff" stroke-width="4" filter="url(#glow)" />
                <text x="680" y="140" fill="#ff00ff" font-weight="bold" filter="url(#glow)">x축 (y=0 수면)</text>

                <!-- The Parabola Curve f(x) = x^2 - 3x - 4 (Roots at -1 and 4) -->
                <!-- Maps roughly x=-1 to 250, x=4 to 500 -->
                <path d="M 150 0 Q 375 400 600 0" fill="none" stroke="#ffffff" stroke-width="5" />
                <text x="170" y="30" fill="#fff" font-weight="bold" font-family="monospace">y = f(x)</text>

                <!-- Roots -->
                <circle cx="250" cy="150" r="6" fill="#fff" />
                <text x="235" y="175" fill="#fff" font-weight="bold">x=α</text>
                <circle cx="500" cy="150" r="6" fill="#fff" />
                <text x="500" y="175" fill="#fff" font-weight="bold">x=β</text>

                <!-- Region 1: In the sky (y > 0) -> f(x) > 0 -->
                <path d="M 150 0 Q 200 70 250 150 L 150 150 Z" fill="#00ffcc" opacity="0.4" />
                <path d="M 500 150 Q 550 70 600 0 L 600 150 Z" fill="#00ffcc" opacity="0.4" />

                <!-- Highlighted line in sky -->
                <path d="M 150 0 Q 200 70 250 150" fill="none" stroke="#00ffcc" stroke-width="5" filter="url(#glow)" />
                <path d="M 500 150 Q 550 70 600 0" fill="none" stroke="#00ffcc" stroke-width="5" filter="url(#glow)" />

                <!-- Region 2: Underwater (y < 0) -> f(x) < 0 -->
                <path d="M 250 150 Q 375 300 500 150 Z" fill="#0055ff" opacity="0.4" />
                <path d="M 250 150 Q 375 300 500 150" fill="none" stroke="#0088ff" stroke-width="5"
                    filter="url(#glow)" />

                <!-- Labels for Regions -->
                <rect x="50" y="40" width="100" height="30" rx="5" fill="#000" stroke="#00ffcc" />
                <text x="100" y="60" fill="#00ffcc" font-weight="bold" text-anchor="middle" filter="url(#glow)">f(x)
                    &gt; 0 구역</text>

                <rect x="600" y="40" width="100" height="30" rx="5" fill="#000" stroke="#00ffcc" />
                <text x="650" y="60" fill="#00ffcc" font-weight="bold" text-anchor="middle" filter="url(#glow)">f(x)
                    &gt; 0 구역</text>

                <rect x="325" y="240" width="100" height="30" rx="5" fill="#000" stroke="#0088ff" />
                <text x="375" y="260" fill="#0088ff" font-weight="bold" text-anchor="middle" filter="url(#glow)">f(x)
                    &lt; 0 구역</text>
            </g>

            <!-- Big Alert Bottom -->
            <rect x="100" y="490" width="700" height="80" rx="10" fill="#1b1100" stroke="#ffff00" stroke-width="2" />
            <text x="450" y="525" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
                도형(곡선) 이 <tspan fill="#00ffcc" font-weight="bold">수면(x축) 위로 치솟으면 > 0</tspan>, <tspan fill="#0088ff"
                    font-weight="bold">수면 아래로 잠항하면 < 0</tspan>.
            </text>
            <text x="450" y="550" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
                인수분해 공식을 까먹어도 그래프의 오직 상/하 픽셀 위치만으로 해의 범위를 영구적으로 잡아챈다.
            </text>
</svg>