<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">죽음의 트랩 (∞ - ∞): 마법의 부적 '켤레 합차 버프' 투척!</text>

    <!-- 1. The Trap -->
    <g transform="translate(50, 80)">
        <rect x="0" y="0" width="370" height="150" rx="10" fill="#1b0a0a" stroke="#ff0000" stroke-width="3" />
        <text x="185" y="30" fill="#ff5555" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">1. 무한 몬스터들의 정면 충돌 (에러!)</text>

        <text x="185" y="90" fill="#ffffff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">
            <tspan fill="#ff00ff">√(n² + n)</tspan>
            <tspan fill="#ff0000" font-family="sans-serif" font-size="40">-</tspan>
            <tspan fill="#4da6ff">n</tspan>
        </text>
        <text x="185" y="130" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">"둘다 무한대잖아? 빼면
            0 이겠지? (X)" -> 오답 폭파!</text>
    </g>

    <!-- Arrow -->
    <path d="M 430 150 L 470 150" stroke="#ffff00" stroke-width="4" marker-end="url(#arrow_r)" filter="url(#glow)" />

    <!-- 2. Applying Conjugate Spell -->
    <g transform="translate(480, 80)">
        <rect x="0" y="0" width="370" height="150" rx="10" fill="#0a1b0a" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="185" y="30" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">2. '플러스(+) 쌍둥이 켤레 부적' 투척!</text>

        <text x="185" y="65" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">위, 아래 층판에 똑같이 강제
            융합!</text>
        <text x="185" y="95" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">
            ( √(n² + n) - n ) × <tspan fill="#ffff00">[ √(n² + n) + n ]</tspan>
        </text>
        <path d="M 50 110 L 320 110" stroke="#ffffff" stroke-width="2" />
        <text x="185" y="135" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">
            1 × <tspan fill="#ffff00">[ √(n² + n) + n ]</tspan>
        </text>
    </g>

    <!-- Down Arrow -->
    <path d="M 450 250 L 450 290" stroke="#4da6ff" stroke-width="6" marker-end="url(#arrow_d)" filter="url(#glow)" />

    <!-- 3. Result and Calculation -->
    <g transform="translate(150, 320)">
        <rect x="0" y="0" width="600" height="180" rx="15" fill="#111122" stroke="#4da6ff" stroke-width="3" />
        <text x="300" y="40" fill="#4da6ff" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">3. 루트 허물 폭파! 익숙한 분수꼴 (∞ / ∞) 로 변신!</text>

        <!-- Exploded Numerator -->
        <text x="220" y="90" fill="#ff00ff" font-family="monospace" font-size="24" font-weight="bold">
            (n² + n) - n² <tspan fill="#ffffff">= </tspan>
            <tspan fill="#ffaa00" font-size="34">1</tspan>
            <tspan fill="#ffffff" font-size="34">n</tspan>
        </text>

        <line x1="160" y1="110" x2="440" y2="110" stroke="#ffffff" stroke-width="3" />

        <!-- Surviving Denominator -->
        <text x="210" y="150" fill="#ffffff" font-family="monospace" font-size="24" font-weight="bold">
            √( <tspan fill="#00ffcc" font-size="34">1</tspan>n² + n ) + <tspan fill="#4da6ff" font-size="34">1</tspan>n
        </text>

        <!-- Scan limits -->
        <g transform="translate(480, 80)">
            <text x="0" y="0" fill="#aaaaaa" font-family="sans-serif" font-size="16">위층 1차 깡패 계수:</text>
            <text x="130" y="0" fill="#ffaa00" font-family="monospace" font-size="20" font-weight="bold"
                filter="url(#glow)">1</text>

            <text x="0" y="30" fill="#aaaaaa" font-family="sans-serif" font-size="16">아래층 1차 깡패 합:</text>
            <text x="130" y="30" fill="#00ffcc" font-family="monospace" font-size="20">1</text>
            <text x="145" y="30" fill="#ffffff" font-family="sans-serif" font-size="18">+</text>
            <text x="160" y="30" fill="#4da6ff" font-family="monospace" font-size="20">1</text>
            <text x="180" y="30" fill="#ffffff" font-family="sans-serif" font-size="18">=</text>
            <text x="200" y="30" fill="#ffffff" font-family="monospace" font-size="24" font-weight="bold"
                filter="url(#glow)">2</text>
        </g>
    </g>

    <!-- Final Answer -->
    <g transform="translate(450, 550)">
        <rect x="-150" y="-30" width="300" height="60" rx="30" fill="#ffff00" opacity="0.1" />
        <text x="0" y="-5" fill="#ffff00" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">최종 정답 = 1 / 2 (0.5)</text>
        <text x="0" y="20" fill="#ffaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">결코 0으로 증발하지 않고
            0.5 에 록다운 됨!</text>
    </g>

    <defs>
        <marker id="arrow_r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
        </marker>
        <marker id="arrow_d" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#4da6ff" />
        </marker>
    </defs>
</svg>