<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ffffff" />
        </marker>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">절대 반지 단위원 (Unit Circle): 우주 진폭의 파동 생성기</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"반지름(빗변)을 1로 고정하는
        순간, 점의 [x좌표 = Cosine], [y좌표 = Sine] 이라는 미친 매핑이 터진다."</text>

    <!-- Left: Unit Circle Diagram -->
    <g transform="translate(300, 320)">

        <!-- Coordinate Axes -->
        <path d="M -220 0 L 220 0" fill="none" stroke="#444455" stroke-width="2" marker-end="url(#arrow)" />
        <path d="M 0 220 L 0 -220" fill="none" stroke="#444455" stroke-width="2" marker-end="url(#arrow)" />

        <text x="230" y="5" fill="#fff" font-weight="bold" font-size="16">X</text>
        <text x="-10" y="-230" fill="#fff" font-weight="bold" font-size="16">Y</text>

        <!-- The Unit Circle -->
        <circle cx="0" cy="0" r="160" fill="none" stroke="#00ffcc" stroke-width="3" stroke-dasharray="8 4" opacity="0.6"
            filter="url(#glow)" />

        <text x="175" y="20" fill="#00ffcc" font-weight="bold" font-size="16">1</text>
        <text x="-185" y="20" fill="#00ffcc" font-weight="bold" font-size="16">-1</text>
        <text x="-25" y="-170" fill="#00ffcc" font-weight="bold" font-size="16">1</text>
        <text x="-25" y="180" fill="#00ffcc" font-weight="bold" font-size="16">-1</text>

        <!-- Angle theta Arc -->
        <path d="M 40 0 A 40 40 0 0 0 28 -28" fill="none" stroke="#ffff00" stroke-width="3" filter="url(#glow)" />
        <text x="50" y="-15" fill="#ffff00" font-weight="bold" font-size="20" filter="url(#glow)">θ</text>

        <!-- Point P (Quadrant 1) -->
        <!-- angle 45 deg: x=113, y=-113 -->
        <g transform="translate(0, 0)">
            <!-- Triangle Fill -->
            <polygon points="0,0 113,0 113,-113" fill="#ff00ff" opacity="0.1" />

            <!-- Hypotenuse -->
            <path d="M 0 0 L 113 -113" fill="none" stroke="#ffffff" stroke-width="4" filter="url(#glow)" />
            <text x="30" y="-60" fill="#ffffff" font-weight="bold" font-size="20">R = 1</text>

            <!-- Sine (Y height) -->
            <path d="M 113 0 L 113 -113" fill="none" stroke="#ff0055" stroke-width="4" filter="url(#glow)" />
            <text x="125" y="-50" fill="#ff0055" font-weight="bold" font-size="18">y (Sine)</text>

            <!-- Cosine (X base) -->
            <path d="M 0 0 L 113 0" fill="none" stroke="#0088ff" stroke-width="4" filter="url(#glow)" />
            <text x="50" y="25" fill="#0088ff" font-weight="bold" font-size="18">x (Cosine)</text>

            <!-- The Point P -->
            <circle cx="113" cy="-113" r="8" fill="#ff00ff" filter="url(#glow)" />
            <text x="135" y="-120" fill="#ff00ff" font-weight="bold" font-size="24" filter="url(#glow)">P (cos θ, sin
                θ)</text>
        </g>

        <!-- Ghost Point P2 (Quadrant 2 to show negative x) 135 deg: x=-113, y=-113 -->
        <g transform="translate(0, 0)" opacity="0.3">
            <path d="M 0 0 L -113 -113" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="4 2" />
            <path d="M -113 0 L -113 -113" fill="none" stroke="#ff0055" stroke-width="2" stroke-dasharray="4 2" />
            <path d="M 0 0 L -113 0" fill="none" stroke="#0088ff" stroke-width="2" stroke-dasharray="4 2" />
            <circle cx="-113" cy="-113" r="5" fill="#fff" />
            <text x="-160" y="-125" fill="#fff" font-weight="bold" font-size="14">(-x, +y)</text>
        </g>

    </g>

    <!-- Right: Properties Panel -->
    <g transform="translate(600, 180)">
        <rect x="-40" y="0" width="300" height="250" rx="10" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
        <text x="110" y="40" fill="#ff00ff" font-weight="bold" font-size="20" text-anchor="middle"
            filter="url(#glow)">마법의 SOH-CAH 매핑</text>

        <path d="M -20 60 L 240 60" fill="none" stroke="#fff" stroke-dasharray="4 4" opacity="0.3" />

        <text x="-20" y="90" fill="#0088ff" font-weight="bold" font-size="18">cos(θ) = 밑변 / 빗변</text>
        <text x="-20" y="115" fill="#aaa" font-size="16">= x / <tspan fill="#fff" font-weight="bold">1</tspan> = <tspan
                fill="#0088ff" font-weight="bold">x 좌표</tspan></text>

        <text x="-20" y="155" fill="#ff0055" font-weight="bold" font-size="18">sin(θ) = 높이 / 빗변</text>
        <text x="-20" y="180" fill="#aaa" font-size="16">= y / <tspan fill="#fff" font-weight="bold">1</tspan> = <tspan
                fill="#ff0055" font-weight="bold">y 좌표</tspan></text>

        <text x="-20" y="225" fill="#00ffcc" font-weight="bold" font-size="18">가동 허용 범위:</text>
        <text x="-20" y="245" fill="#fff" font-weight="bold" font-size="16">x, y 모두 -1.0 ~ 1.0</text>
    </g>

    <!-- Big Alert Bottom -->
    <rect x="100" y="520" width="700" height="60" rx="10" fill="#0a1a2a" stroke="#0088ff" stroke-width="2" />
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        단위원 위를 도는 입자 P의 <tspan fill="#0088ff" font-weight="bold">그림자(X)</tspan> 가 코사인 파동이 되고, <tspan fill="#ff0055"
            font-weight="bold">고도(Y)</tspan> 가 사인 파동(Wave) 으로 변이한다!
    </text>
</svg>