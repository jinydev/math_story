<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">데이터베이스 격자 타일링: 행렬(Matrix) 의 구조</text>

    <g transform="translate(150, 150)">
        <!-- Matrix Bracket Left -->
        <path d="M 60 -20 L 20 -20 L 20 280 L 60 280" fill="none" stroke="#00ffcc" stroke-width="8"
            filter="url(#glow)" />

        <!-- Matrix Bracket Right -->
        <path d="M 440 -20 L 480 -20 L 480 280 L 440 280" fill="none" stroke="#00ffcc" stroke-width="8"
            filter="url(#glow)" />

        <!-- The numbers -->
        <g font-family="monospace" font-size="50" font-weight="bold" fill="#ffffff" text-anchor="middle">
            <!-- Row 1 -->
            <text x="100" y="60">3</text>
            <text x="250" y="60">5</text>
            <text x="400" y="60">1</text>

            <!-- Row 2 -->
            <text x="100" y="220">4</text>
            <text x="250" y="220">-2</text>
            <text x="400" y="220">0</text>
        </g>

        <!-- Highlight Row 1 -->
        <rect x="40" y="0" width="420" height="80" fill="none" stroke="#ff0055" stroke-width="4" stroke-dasharray="10 5"
            rx="10" />
        <text x="-40" y="50" fill="#ff0055" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="end"
            filter="url(#glow)">1행 (Row 1)</text>

        <!-- Highlight Row 2 -->
        <text x="-40" y="210" fill="#ff5588" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="end">2행 (Row 2)</text>

        <!-- Highlight Column 2 -->
        <rect x="190" y="-30" width="120" height="300" fill="none" stroke="#ffff00" stroke-width="4"
            stroke-dasharray="10 5" rx="10" />
        <text x="250" y="-60" fill="#ffff00" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">2열 (Col 2)</text>

        <!-- Label Col 1 and Col 3 -->
        <text x="100" y="-60" fill="#aaaaaa" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">1열</text>
        <text x="400" y="-60" fill="#aaaaaa" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">3열</text>

        <!-- The Intersection (1행 2열: 5) -->
        <circle cx="250" cy="45" r="45" fill="none" stroke="#ff00ff" stroke-width="6" filter="url(#glow)" />
        <text x="600" y="100" fill="#ff00ff" font-family="sans-serif" font-size="22" font-weight="bold"
            filter="url(#glow)">← 1행 2열의 원소 (5)</text>
        <text x="600" y="130" fill="#aaaaaa" font-family="monospace" font-size="18">A[0][1] (Python 인덱스)</text>

        <!-- Dimension -->
        <path d="M 600 220 L 620 220" stroke="#4da6ff" stroke-width="4" marker-end="url(#arrow_b)" />
        <text x="640" y="230" fill="#4da6ff" font-family="sans-serif" font-size="26" font-weight="bold">크기: 2 x 3
            행렬</text>
        <text x="640" y="260" fill="#cccccc" font-family="sans-serif" font-size="18">(2행 3열 / 2 by 3 Matrix)</text>
    </g>

    <defs>
        <marker id="arrow_b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#4da6ff" />
        </marker>
    </defs>

    <rect x="150" y="520" width="600" height="50" rx="10" fill="#11111a" stroke="#ffffff" stroke-width="2" />
    <text x="450" y="550" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        가로줄은 <tspan fill="#ff0055" font-weight="bold">행(Row)</tspan>, 세로기둥은 <tspan fill="#ffff00" font-weight="bold">
            열(Column)</tspan> 로 부르며 <tspan fill="#4da6ff" font-weight="bold">행 x 열</tspan> 규격으로 덩치를 표기합니다.
    </text>
</svg>