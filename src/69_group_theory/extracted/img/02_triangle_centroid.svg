<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">접시 돌리기의 황금점: 삼각형의 무게중심 (Centroid G)</text>

    <!-- Coordinate Grid Lines -->
    <g opacity="0.1">
        <line x1="0" y1="150" x2="900" y2="150" stroke="#ffffff" stroke-width="1" />
        <line x1="0" y1="250" x2="900" y2="250" stroke="#ffffff" stroke-width="1" />
        <line x1="0" y1="350" x2="900" y2="350" stroke="#ffffff" stroke-width="1" />
        <line x1="0" y1="450" x2="900" y2="450" stroke="#ffffff" stroke-width="1" />

        <line x1="200" y1="0" x2="200" y2="600" stroke="#ffffff" stroke-width="1" />
        <line x1="400" y1="0" x2="400" y2="600" stroke="#ffffff" stroke-width="1" />
        <line x1="600" y1="0" x2="600" y2="600" stroke="#ffffff" stroke-width="1" />
        <line x1="800" y1="0" x2="800" y2="600" stroke="#ffffff" stroke-width="1" />
    </g>

    <!-- Triangle Vertices -->
    <!-- A: (200, 150), B: (200, 450), C: (800, 450) -->
    <g transform="translate(0, 0)">

        <!-- Triangle Polygon -->
        <polygon points="200,150 200,450 800,450" fill="#4da6ff" opacity="0.2" stroke="#4da6ff" stroke-width="4" />

        <!-- Medians (중선) -->
        <!-- Midpoint B-C: (500, 450) -->
        <line x1="200" y1="150" x2="500" y2="450" stroke="#ffaa00" stroke-width="2" stroke-dasharray="5 5" />
        <circle cx="500" cy="450" r="4" fill="#ffaa00" />

        <!-- Midpoint A-C: (500, 300) -->
        <line x1="200" y1="450" x2="500" y2="300" stroke="#ffaa00" stroke-width="2" stroke-dasharray="5 5" />
        <circle cx="500" cy="300" r="4" fill="#ffaa00" />

        <!-- Midpoint A-B: (200, 300) -->
        <line x1="800" y1="450" x2="200" y2="300" stroke="#ffaa00" stroke-width="2" stroke-dasharray="5 5" />
        <circle cx="200" cy="300" r="4" fill="#ffaa00" />

        <!-- The Centroid (G) -->
        <!-- G = ( (200+200+800)/3, (150+450+450)/3 ) = (400, 350) -->
        <circle cx="400" cy="350" r="10" fill="#ff4d4d" filter="url(#glow)" />
        <text x="420" y="340" fill="#ff4d4d" font-family="sans-serif" font-size="24" font-weight="bold">G (무게중심)</text>

        <!-- Balancing needle from below -->
        <polygon points="400,350 390,480 410,480" fill="#cccccc" opacity="0.8" />
        <ellipse cx="400" cy="480" rx="30" ry="10" fill="#555555" />
        <text x="400" y="510" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">접시 돌리기
            받침점</text>

        <!-- Vertex Labels -->
        <circle cx="200" cy="150" r="6" fill="#ffffff" />
        <text x="180" y="140" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="end">A (x1, y1)</text>

        <circle cx="200" cy="450" r="6" fill="#ffffff" />
        <text x="180" y="470" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="end">B (x2, y2)</text>

        <circle cx="800" cy="450" r="6" fill="#ffffff" />
        <text x="820" y="470" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="start">C (x3, y3)</text>
    </g>

    <!-- Formula Panel -->
    <rect x="550" y="100" width="300" height="150" rx="15" fill="#111122" stroke="#00ffcc" stroke-width="2" />
    <text x="700" y="135" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">우주의 밀도 밸런스 공식</text>
    <text x="700" y="170" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">3개의 꼭짓점 좌표의 가벼운
        '평균'</text>
    <text x="700" y="210" fill="#ffaa00" font-family="monospace" font-size="20" font-weight="bold"
        text-anchor="middle">G = ( Σx / 3 , Σy / 3 )</text>

    <!-- Explanation Bottom -->
    <rect x="150" y="540" width="600" height="40" rx="10" fill="#2b1111" stroke="#ff4d4d" stroke-width="2" />
    <text x="450" y="565" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">3D 그래픽스 게임 엔진이 매
        프레임마다 파편(폴리곤)의 흔들림을 잡아주는 핵심 스크립트!</text>

</svg>