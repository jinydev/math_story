<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">NumPy 의 미친 행렬 코어 연산: * 와 @ 의 우주적 차이</text>

    <!-- Left Side: * (Element-wise) -->
    <g transform="translate(50, 80)">
        <rect x="0" y="0" width="380" height="420" rx="15" fill="#0d141e" stroke="#334455" stroke-width="3" />

        <text x="190" y="40" fill="#aaaaaa" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">허접한 별표 (*) 쓰레기 매크로</text>
        <text x="190" y="65" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">(같은 칸, 같은 주소끼리
            1:1 곱하기)</text>

        <!-- Code Block -->
        <rect x="20" y="80" width="340" height="80" rx="8" fill="#111" stroke="#4da6ff" stroke-width="2" />
        <text x="35" y="105" fill="#ff7b72" font-family="monospace" font-size="14">print</text><text x="75" y="105"
            fill="#ffffff" font-family="monospace" font-size="14">(A * B)</text>
        <text x="35" y="130" fill="#7a828e" font-family="monospace" font-size="14"># 그저 자리 똑같은 칸끼리 곱하는 노가다</text>

        <!-- Matrix Eq -->
        <g transform="translate(190, 240)">
            <path d="M -90 -50 L -110 -50 L -110 50 L -90 50" fill="none" stroke="#666" stroke-width="4" />
            <path d="M -30 -50 L -10 -50 L -10 50 L -30 50" fill="none" stroke="#666" stroke-width="4" />
            <!-- A -->
            <text x="-90" y="-15" fill="#ffffff" font-family="monospace" font-size="18">1</text>
            <text x="-90" y="25" fill="#ffffff" font-family="monospace" font-size="18">3</text>
            <text x="-40" y="-15" fill="#ffffff" font-family="monospace" font-size="18">2</text>
            <text x="-40" y="25" fill="#ffffff" font-family="monospace" font-size="18">4</text>

            <text x="0" y="0" fill="#4da6ff" font-family="sans-serif" font-size="30" font-weight="bold"
                text-anchor="middle">*</text>

            <path d="M 10 -50 L 30 -50 L 30 50 L 10 50" fill="none" stroke="#666" stroke-width="4" />
            <path d="M 110 -50 L 90 -50 L 90 50 L 110 50" fill="none" stroke="#666" stroke-width="4" />
            <!-- B -->
            <text x="30" y="-15" fill="#ffffff" font-family="monospace" font-size="18">5</text>
            <text x="30" y="25" fill="#ffffff" font-family="monospace" font-size="18">7</text>
            <text x="80" y="-15" fill="#ffffff" font-family="monospace" font-size="18">6</text>
            <text x="80" y="25" fill="#ffffff" font-family="monospace" font-size="18">8</text>

            <text x="0" y="90" fill="#ffffff" font-family="sans-serif" font-size="30" font-weight="bold"
                text-anchor="middle">=</text>

            <path d="M -50 110 L -70 110 L -70 210 L -50 210" fill="none" stroke="#4da6ff" stroke-width="4" />
            <path d="M 50 110 L 70 110 L 70 210 L 50 210" fill="none" stroke="#4da6ff" stroke-width="4" />
            <!-- Result -->
            <text x="-50" y="145" fill="#aaaaaa" font-family="monospace" font-size="20"> 5</text>
            <text x="-50" y="185" fill="#aaaaaa" font-family="monospace" font-size="20">21</text>
            <text x="20" y="145" fill="#aaaaaa" font-family="monospace" font-size="20">12</text>
            <text x="20" y="185" fill="#aaaaaa" font-family="monospace" font-size="20">32</text>
        </g>

        <!-- Big X Mark -->
        <path d="M 80 180 L 300 380 M 300 180 L 80 380" stroke="#ff0000" stroke-width="8" opacity="0.3" />
        <text x="190" y="400" fill="#ff0000" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">행렬의 공간 렌더링에선 전혀 못 씀!</text>
    </g>

    <!-- Right Side: @ (Matrix Prod) -->
    <g transform="translate(470, 80)">
        <rect x="0" y="0" width="380" height="420" rx="15" fill="#1b1111" stroke="#ff0055" stroke-width="4"
            filter="url(#glow)" />

        <text x="190" y="40" fill="#ff0055" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">골뱅이 (@) 의 시공간 압축 교차 격발</text>
        <text x="190" y="65" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">(진짜배기 내적 L자 곱셈
            시뮬레이션!)</text>

        <!-- Code Block -->
        <rect x="20" y="80" width="340" height="80" rx="8" fill="#111" stroke="#ff0055" stroke-width="2" />
        <text x="35" y="105" fill="#ff7b72" font-family="monospace" font-size="14">print</text><text x="75" y="105"
            fill="#ffffff" font-family="monospace" font-size="14">(A </text><text x="95" y="105" fill="#ff0055"
            font-family="monospace" font-size="18" font-weight="bold" filter="url(#glow)">@</text><text x="115" y="105"
            fill="#ffffff" font-family="monospace" font-size="14"> B)</text>
        <text x="35" y="130" fill="#ffaa00" font-family="monospace" font-size="14"># np.dot(A, B) 와 완벽히 동일한 AI 핏줄</text>

        <!-- Matrix Eq -->
        <g transform="translate(190, 240)">
            <path d="M -90 -50 L -110 -50 L -110 50 L -90 50" fill="none" stroke="#666" stroke-width="4" />
            <path d="M -30 -50 L -10 -50 L -10 50 L -30 50" fill="none" stroke="#666" stroke-width="4" />
            <!-- A -->
            <text x="-90" y="-15" fill="#ffffff" font-family="monospace" font-size="18">1</text>
            <text x="-90" y="25" fill="#ffffff" font-family="monospace" font-size="18">3</text>
            <text x="-40" y="-15" fill="#ffffff" font-family="monospace" font-size="18">2</text>
            <text x="-40" y="25" fill="#ffffff" font-family="monospace" font-size="18">4</text>

            <text x="0" y="0" fill="#ff0055" font-family="sans-serif" font-size="30" font-weight="bold"
                text-anchor="middle" filter="url(#glow)">@</text>

            <path d="M 10 -50 L 30 -50 L 30 50 L 10 50" fill="none" stroke="#666" stroke-width="4" />
            <path d="M 110 -50 L 90 -50 L 90 50 L 110 50" fill="none" stroke="#666" stroke-width="4" />
            <!-- B -->
            <text x="30" y="-15" fill="#ffffff" font-family="monospace" font-size="18">5</text>
            <text x="30" y="25" fill="#ffffff" font-family="monospace" font-size="18">7</text>
            <text x="80" y="-15" fill="#ffffff" font-family="monospace" font-size="18">6</text>
            <text x="80" y="25" fill="#ffffff" font-family="monospace" font-size="18">8</text>

            <text x="0" y="90" fill="#ffffff" font-family="sans-serif" font-size="30" font-weight="bold"
                text-anchor="middle">=</text>

            <path d="M -50 110 L -70 110 L -70 210 L -50 210" fill="none" stroke="#ff0055" stroke-width="6"
                filter="url(#glow)" />
            <path d="M 50 110 L 70 110 L 70 210 L 50 210" fill="none" stroke="#ff0055" stroke-width="6"
                filter="url(#glow)" />
            <!-- Result -->
            <text x="-45" y="145" fill="#ffaa00" font-family="monospace" font-size="24" font-weight="bold">19</text>
            <text x="-45" y="195" fill="#ff0055" font-family="monospace" font-size="24" font-weight="bold">43</text>
            <text x="25" y="145" fill="#ffaa00" font-family="monospace" font-size="24" font-weight="bold">22</text>
            <text x="25" y="195" fill="#ff0055" font-family="monospace" font-size="24" font-weight="bold">50</text>
        </g>

        <text x="190" y="400" fill="#ffcc00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">이것이 AI 딥러닝 뉴럴네트워크의 심장 텐서곱!</text>
    </g>

    <rect x="150" y="520" width="600" height="60" rx="10" fill="#0f0f15" stroke="#ffffff" stroke-width="2" />
    <text x="450" y="545" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        파이썬 NumPy 엔진에서 강력한 L자 교차 연산(선형 변환 곱셈)을 때릴 때는
    </text>
    <text x="450" y="565" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        절대로 별표 <tspan fill="#4da6ff" font-weight="bold">(*)</tspan> 가 아닌 사냥꾼 골뱅이 <tspan fill="#ff0055"
            font-weight="bold">(@)</tspan> 마크를 격발시켜야 공간이 왜곡됩니다.
    </text>
</svg>