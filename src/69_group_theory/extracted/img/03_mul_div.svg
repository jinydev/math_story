<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">🚨 음수(-) 병기의 파괴력: 부등호 뒤집기 플립(Flip)</text>

    <!-- Left: Original state (5 > 2) -->
    <g transform="translate(50, 150)">
        <text x="175" y="-30" fill="#4da6ff" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">양수 세계 (정상)</text>

        <text x="175" y="15" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">5 <tspan fill="#4da6ff" filter="url(#glow)">&gt;</tspan> 2</text>

        <!-- Number line -->
        <line x1="30" y1="120" x2="320" y2="120" stroke="#ffffff" stroke-width="4" />
        <polygon points="320,115 330,120 320,125" fill="#ffffff" />

        <!-- Ticks -->
        <line x1="50" y1="110" x2="50" y2="130" stroke="#aaaaaa" stroke-width="2" />
        <text x="50" y="150" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">0</text>

        <line x1="150" y1="110" x2="150" y2="130" stroke="#ffffff" stroke-width="2" />
        <circle cx="150" cy="120" r="10" fill="#ffcc00" />
        <text x="150" y="155" fill="#ffcc00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">2</text>

        <line x1="300" y1="110" x2="300" y2="130" stroke="#ffffff" stroke-width="2" />
        <circle cx="300" cy="120" r="12" fill="#00ffcc" filter="url(#glow)" />
        <text x="300" y="155" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">5</text>

        <text x="175" y="210" fill="#4da6ff" font-family="sans-serif" font-size="18" text-anchor="middle">수직선의 오른쪽일수록
            부자!</text>
    </g>

    <!-- Middle: Attack event -->
    <g transform="translate(450, 150)">
        <rect x="-80" y="20" width="160" height="40" fill="#ff0055" stroke="#ffffff" stroke-width="2" rx="5"
            filter="url(#glow)" />
        <text x="0" y="47" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">❌ 양변에 (-1) 곱하기</text>

        <!-- Flip Arrow -->
        <path d="M -50 90 Q 0 40 50 90" fill="none" stroke="#ff0055" stroke-width="6" stroke-dasharray="8 4"
            marker-end="url(#arrow)" />
        <polygon points="55,90 40,80 40,100" fill="#ff0055" />
        <text x="0" y="120" fill="#ff0055" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">강제 대칭 이동!</text>
    </g>

    <!-- Right: Result state (-5 < -2) -->
    <g transform="translate(550, 150)">
        <text x="150" y="-30" fill="#ff0055" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">음수 세계 (지옥)</text>

        <text x="150" y="15" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">-5 <tspan fill="#ff0055" filter="url(#glow)">&lt;</tspan> -2</text>

        <!-- Number line -->
        <line x1="-20" y1="120" x2="270" y2="120" stroke="#ffffff" stroke-width="4" />
        <polygon points="270,115 280,120 270,125" fill="#ffffff" />

        <!-- Ticks -->
        <line x1="250" y1="110" x2="250" y2="130" stroke="#aaaaaa" stroke-width="2" />
        <text x="250" y="150" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">0</text>

        <!-- -2 -> yellow -->
        <line x1="150" y1="110" x2="150" y2="130" stroke="#ffffff" stroke-width="2" />
        <circle cx="150" cy="120" r="10" fill="#ffcc00" />
        <text x="150" y="155" fill="#ffcc00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">-2</text>

        <!-- -5 -> cyan -->
        <line x1="50" y1="110" x2="50" y2="130" stroke="#ffffff" stroke-width="2" />
        <circle cx="50" cy="120" r="12" fill="#00ffcc" />
        <text x="50" y="155" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">-5</text>

        <text x="150" y="210" fill="#ff0055" font-family="sans-serif" font-size="18" text-anchor="middle">-5가 더 왼쪽에 처박힘
            (더 거지됨)</text>
        <text x="150" y="235" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">부등호 입 방향 뒤집힘!</text>
    </g>

    <!-- Big warning box -->
    <rect x="100" y="450" width="700" height="80" rx="10" fill="#2b0011" stroke="#ff0055" stroke-width="4"
        filter="url(#glow)" />
    <text x="450" y="490" fill="#ffffff" font-family="sans-serif" font-size="22" text-anchor="middle">부등식 양변에 <tspan
            fill="#ff0055" font-weight="bold">음수(-)</tspan>를 곱하거나 나누는 즉시,</text>
    <text x="450" y="520" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
        text-anchor="middle">이유 불문하고 부등호 방향을 화들짝 까뒤집어야 한다!</text>

</svg>