<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">파티 모자의 비밀: 원뿔의 겉넓이와 1/3 부피</text>

    <!-- Left: 3D Cone and its parts -->
    <g transform="translate(250, 250)">

        <!-- Cone Body -->
        <path d="M 0 -150 L -100 100 A 100 30 0 0 0 100 100 Z" fill="#ff4d4d" opacity="0.3" stroke="#ff4d4d"
            stroke-width="2" />

        <!-- Base Ellipse -->
        <ellipse cx="0" cy="100" rx="100" ry="30" fill="none" stroke="#ff4d4d" stroke-width="2"
            stroke-dasharray="5 5" />
        <path d="M -100 100 A 100 30 0 0 0 100 100" fill="none" stroke="#ff4d4d" stroke-width="4" filter="url(#glow)" />

        <!-- Right Triangle Core -->
        <polygon points="0,-150 0,100 100,100" fill="#00ffcc" opacity="0.5" />
        <line x1="0" y1="-150" x2="0" y2="100" stroke="#00ffcc" stroke-width="3" stroke-dasharray="6 4" />
        <line x1="0" y1="100" x2="100" y2="100" stroke="#00ffcc" stroke-width="3" />
        <line x1="0" y1="-150" x2="100" y2="100" stroke="#ffaa00" stroke-width="4" filter="url(#glow)" />

        <!-- Labels -->
        <text x="10" y="-30" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="start">높이 (h)</text>
        <text x="50" y="125" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">반지름 (r)</text>
        <text x="70" y="-10" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="start">모선 (l)</text>

        <!-- Right angle square -->
        <rect x="0" y="90" width="10" height="10" fill="none" stroke="#00ffcc" stroke-width="2" />

        <text x="0" y="170" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">3D 원뿔 형태</text>
        <text x="0" y="195" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">원기둥 대비 무조건 부피
            1/3로 깎임</text>
    </g>

    <!-- Right: 2D Net (전개도) -->
    <g transform="translate(650, 250)">

        <!-- Sector (옆면 부채꼴) -->
        <!-- Center (0, -100), radius = generatrix_l approx 180ish for visual -->
        <path d="M 0 -100 L -120 50 A 150 150 0 0 0 120 50 Z" fill="#ffaa00" opacity="0.3" stroke="#ffaa00"
            stroke-width="3" />
        <line x1="0" y1="-100" x2="120" y2="50" stroke="#ffaa00" stroke-width="3" stroke-dasharray="4 4" />
        <text x="80" y="-10" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="start">모선 (l)</text>

        <!-- Arc length label -->
        <path d="M -130 60 A 165 165 0 0 0 130 60" fill="none" stroke="#ffffff" stroke-width="2"
            stroke-dasharray="4 4" />
        <text x="0" y="110" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">호의 길이 = 밑면 원의 둘레
            (2πr)</text>

        <!-- Base Circle (밑면) -->
        <circle cx="0" cy="110" r="40" fill="#ff4d4d" opacity="0.5" stroke="#ff4d4d" stroke-width="2" />
        <line x1="0" y1="110" x2="40" y2="110" stroke="#00ffcc" stroke-width="2" />
        <text x="20" y="105" fill="#00ffcc" font-family="sans-serif" font-size="12" font-weight="bold"
            text-anchor="middle">r</text>

        <text x="0" y="180" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">가위로 펼친 부채꼴 넓이: πrl</text>
    </g>

    <!-- Equation & Formula Board -->
    <g transform="translate(150, 470)">
        <rect x="0" y="0" width="600" height="50" rx="10" fill="#112233" stroke="#4da6ff" stroke-width="2" />

        <text x="150" y="30" fill="#ff4d4d" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">부피(Vol) = 1/3 πr²h</text>
        <text x="450" y="30" fill="#ffaa00" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">겉넓이(Area) = πr² + πrl</text>
        <line x1="300" y1="5" x2="300" y2="45" stroke="#4da6ff" stroke-width="2" />
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="535" width="600" height="40" rx="10" fill="#2b1111" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="560" fill="#ffffff" font-family="sans-serif" font-size="15" text-anchor="middle">블렌더나 언리얼 코어 충돌 물리에
        사용하는 입체 도형의 1/3 압축 최적화(Optimization)</text>

</svg>