<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">위상수학 (Topology): 고무판 기하학의 위대한 변환</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"합법: 늘리고 구부리기 / 불법:
        찢고 구멍 뚫기"</text>

    <!-- Left: Circle -->
    <g transform="translate(150, 250)">
        <circle cx="0" cy="0" r="100" fill="none" stroke="#00ffcc" stroke-width="8" filter="url(#glow)" />
        <!-- Nodes representing rubber points -->
        <circle cx="0" cy="-100" r="6" fill="#fff" />
        <circle cx="86.6" cy="50" r="6" fill="#fff" />
        <circle cx="-86.6" cy="50" r="6" fill="#fff" />
        <text x="0" y="140" fill="#00ffcc" font-weight="bold" font-size="20" text-anchor="middle"
            filter="url(#glow)">완벽한 원 (Circle)</text>
        <text x="0" y="165" fill="#aaa" font-size="14" text-anchor="middle">모든 점까지의 거리가 같음</text>
    </g>

    <!-- Middle: The magical transformation arrows -->
    <g transform="translate(450, 250)">
        <!-- Squiggly transform arrow -->
        <path d="M -150 -20 Q 0 -80 150 -20" fill="none" stroke="#ff00ff" stroke-width="4" stroke-dasharray="8 4"
            filter="url(#glow)" />
        <path d="M -150 20 Q 0 80 150 20" fill="none" stroke="#ff00ff" stroke-width="4" stroke-dasharray="8 4"
            filter="url(#glow)" />
        <!-- Hands manipulating concept -->
        <circle cx="-50" cy="-60" r="15" fill="#fff" opacity="0.2" />
        <circle cx="50" cy="60" r="15" fill="#fff" opacity="0.2" />

        <text x="0" y="5" fill="#ff00ff" font-weight="bold" font-size="16" text-anchor="middle" filter="url(#glow)">손으로
            잡아당기고 각을 잡음</text>
        <text x="0" y="25" fill="#fff" font-weight="bold" font-size="14" text-anchor="middle">(연속적 변형)</text>
    </g>

    <!-- Right: Triangle -->
    <g transform="translate(750, 250)">
        <path d="M 0 -110 L 100 60 L -100 60 Z" fill="none" stroke="#ff0055" stroke-width="8" stroke-linejoin="round"
            filter="url(#glow)" />
        <circle cx="0" cy="-110" r="6" fill="#fff" />
        <circle cx="100" cy="60" r="6" fill="#fff" />
        <circle cx="-100" cy="60" r="6" fill="#fff" />

        <text x="0" y="140" fill="#ff0055" font-weight="bold" font-size="20" text-anchor="middle"
            filter="url(#glow)">정삼각형 (Triangle)</text>
        <text x="0" y="165" fill="#aaa" font-size="14" text-anchor="middle">3개의 뾰족한 각이 존재</text>
    </g>

    <!-- Center Label -->
    <text x="450" y="440" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">원 == 삼각형 == 사각형</text>
    <text x="450" y="470" fill="#ffff00" font-weight="bold" font-size="16" text-anchor="middle">"모두 동일한 [구멍 1개 짜리 고무 밴드]
        동족이다."</text>

    <!-- Big Alert Bottom -->
    <rect x="100" y="500" width="700" height="70" rx="10" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        길이 5cm, 각도 90도 같은 유클리드의 딱딱한 잣대는 전부 무시된다.
    </text>
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        오직 <tspan fill="#00ffcc" font-weight="bold">"어떻게 이어져 있는가? (연결성)"</tspan> 구조 신분증만 살아남는 세계.
    </text>
</svg>