<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">광산 해킹: 원시 데이터(Raw Data) 긁어오기</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"현실 세계에 흩뿌려져 있는 숫자
        쓰레기(파편)들을 억지로라도 메모리에 삽입(Input)하는 최초의 행위"</text>

    <!-- Real World Chaos (Left) -->
    <g transform="translate(100, 150)">
        <rect x="-50" y="-30" width="250" height="280" rx="20" fill="#1b1111" stroke="#ff5555" stroke-width="3"
            stroke-dasharray="10 5" />
        <text x="75" y="0" fill="#ff5555" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">무질서한 현실 세계 (모집단)</text>
        <text x="75" y="25" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">"너 폰 몇 시간
            봐?"</text>

        <!-- Raw Data Nodes -->
        <path d="M 10 70 L 40 50 L 50 80 Z" fill="#331111" stroke="#ff5555" stroke-width="2" />
        <text x="35" y="70" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">3.0</text>

        <path d="M 80 120 L 110 100 L 120 130 Z" fill="#331111" stroke="#ff5555" stroke-width="2" />
        <text x="105" y="120" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">1.5</text>

        <path d="M 20 160 L 50 140 L 60 170 Z" fill="#331111" stroke="#ff5555" stroke-width="2" />
        <text x="45" y="160" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">5.5</text>

        <path d="M 110 180 L 140 160 L 150 190 Z" fill="#331111" stroke="#ff5555" stroke-width="2" />
        <text x="135" y="180" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">2.0</text>

        <text x="75" y="230" fill="#ff5555" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">가공되지 않은 흙 = 변량(Variate)</text>
    </g>

    <!-- Extractor / Input Function (Middle) -->
    <g transform="translate(380, 240)">

        <path d="M 0 -30 L 60 0 L 0 30 Z" fill="#332200" stroke="#ffaa00" stroke-width="3" filter="url(#glow)" />
        <text x="25" y="5" fill="#ffaa00" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">Input()</text>

        <path d="M -90 -30 Q -45 -10 0 0" fill="none" stroke="#ffaa00" stroke-width="4" stroke-dasharray="10 5"
            marker-end="url(#arrow_y)" />
        <path d="M -90 40 Q -45 20 0 0" fill="none" stroke="#ffaa00" stroke-width="4" stroke-dasharray="10 5"
            marker-end="url(#arrow_y)" />
    </g>

    <!-- Python List Memory (Right) -->
    <g transform="translate(550, 150)">
        <rect x="0" y="-30" width="280" height="280" rx="10" fill="#001a11" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="140" y="0" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">컴퓨터 메모리 저장소</text>
        <text x="140" y="25" fill="#aaaaaa" font-family="monospace" font-size="14" text-anchor="middle">screen_time_data
            = [ ]</text>

        <!-- Array visual -->
        <g transform="translate(30, 80)">
            <rect x="0" y="0" width="40" height="40" fill="#0d1b1a" stroke="#00ffcc" stroke-width="2" />
            <text x="20" y="25" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
                text-anchor="middle">3.0</text>

            <rect x="40" y="0" width="40" height="40" fill="#0d1b1a" stroke="#00ffcc" stroke-width="2" />
            <text x="60" y="25" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
                text-anchor="middle">1.5</text>

            <rect x="80" y="0" width="40" height="40" fill="#0d1b1a" stroke="#00ffcc" stroke-width="2" />
            <text x="100" y="25" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
                text-anchor="middle">5.5</text>

            <rect x="120" y="0" width="40" height="40" fill="#0d1b1a" stroke="#00ffcc" stroke-width="2" />
            <text x="140" y="25" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
                text-anchor="middle">2.0</text>

            <rect x="160" y="0" width="60" height="40" fill="#003322" stroke="#00ffcc" stroke-width="2"
                stroke-dasharray="5 5" />
            <text x="190" y="25" fill="#00ffcc" font-family="monospace" font-size="14"
                text-anchor="middle">append</text>
        </g>

        <text x="140" y="170" fill="#ffffff" font-family="monospace" font-size="22" font-weight="bold"
            text-anchor="middle">[3.0, 1.5, 5.5, 2.0]</text>

        <text x="140" y="220" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">최종 확보된 '원시 데이터(Raw Data)' 묶음!</text>
    </g>

    <!-- Connection Line from Input to List -->
    <path d="M 460 240 L 530 240" fill="none" stroke="#00ffcc" stroke-width="4" marker-end="url(#arrow_g)" />

    <defs>
        <marker id="arrow_y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffaa00" />
        </marker>
        <marker id="arrow_g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#00ffcc" />
        </marker>
    </defs>

    <!-- Base Explain -->
    <rect x="100" y="480" width="700" height="80" rx="10" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="510" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        단순히 수학 교과서에 찍혀있는 무의미한 숫자 덩어리들이 아니라, 통계학자나 해커가
    </text>
    <text x="450" y="540" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        직접 <tspan fill="#ff00ff" font-weight="bold">input(설문지/수집)</tspan> 함수를 돌려 컴퓨터 <tspan fill="#4da6ff"
            font-weight="bold">List(배열)</tspan> 에 구겨 넣었을 때 비로소 진정한 파워를 가집니다.
    </text>
</svg>