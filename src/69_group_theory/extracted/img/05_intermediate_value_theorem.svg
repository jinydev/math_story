<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">사이값 정리: 실근 레이더 스캐닝 시스템</text>

    <!-- Grid and Axes -->
    <line x1="100" y1="350" x2="800" y2="350" stroke="#ffffff" stroke-width="3" />
    <text x="820" y="355" fill="#ffffff" font-family="serif" font-size="20" font-weight="bold">X 축 (y=0 지표면)</text>

    <!-- Boundary lines -->
    <line x1="250" y1="100" x2="250" y2="500" stroke="#555" stroke-dasharray="5 5" />
    <text x="250" y="530" fill="#aaaaaa" font-family="serif" font-size="18" text-anchor="middle">x = a</text>

    <line x1="650" y1="100" x2="650" y2="500" stroke="#555" stroke-dasharray="5 5" />
    <text x="650" y="530" fill="#aaaaaa" font-family="serif" font-size="18" text-anchor="middle">x = b</text>

    <!-- Point A (Below ground) -->
    <circle cx="250" cy="450" r="8" fill="#4da6ff" stroke="#fff" stroke-width="2" filter="url(#glow)" />
    <text x="180" y="455" fill="#4da6ff" font-family="sans-serif" font-size="18" font-weight="bold">f(a) < 0</text>
            <text x="180" y="475" fill="#aaaaaa" font-family="sans-serif" font-size="12">(음수 / 지하)</text>

            <!-- Point B (Above ground) -->
            <circle cx="650" cy="150" r="8" fill="#ff0055" stroke="#fff" stroke-width="2" filter="url(#glow)" />
            <text x="700" y="155" fill="#ff0055" font-family="sans-serif" font-size="18" font-weight="bold">f(b) >
                0</text>
            <text x="700" y="175" fill="#aaaaaa" font-family="sans-serif" font-size="12">(양수 / 지상)</text>

            <!-- The Continuous Function Curve -->
            <!-- Starts at A, cuts the X axis at C, goes up to B -->
            <path d="M 250 450 C 400 450, 450 150, 650 150" fill="none" stroke="#00ffcc" stroke-width="6"
                filter="url(#glow)" />

            <!-- The Intersection Point (The Root c) -->
            <circle cx="450" cy="350" r="12" fill="#ffff00" stroke="#ff0055" stroke-width="4" filter="url(#glow)" />
            <text x="450" y="320" fill="#ffff00" font-family="sans-serif" font-size="20" font-weight="bold"
                text-anchor="middle">여기를 반드시 관통한다!</text>
            <text x="450" y="380" fill="#ffff00" font-family="sans-serif" font-size="16" font-weight="bold"
                text-anchor="middle">근 x = c</text>

            <!-- Scanner effect from left to right -->
            <rect x="445" y="100" width="10" height="400" fill="#00ffcc" opacity="0.3" filter="url(#glow)" />
            <path d="M 430 250 L 470 250" stroke="#00ffcc" stroke-width="4" />
            <text x="450" y="240" fill="#00ffcc" font-family="monospace" font-size="14" text-anchor="middle">Scanning
                Root...</text>

            <!-- Lower Banner -->
            <rect x="150" y="550" width="600" height="40" rx="5" fill="#112233" stroke="#00ffcc" />
            <text x="450" y="575" fill="#00ffcc" font-family="sans-serif" font-size="16" text-anchor="middle">f(a) ×
                f(b) < 0 (부호가 다를 때), 이 구간 안에 무조건 정답(해)이 1개 이상 존재!</text>

</svg>