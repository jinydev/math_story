<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <pattern id="hatch" width="10" height="10" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
            <line x1="0" y1="0" x2="0" y2="10" stroke="#ffcc00" stroke-width="2" opacity="0.6" />
        </pattern>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">연립부등식 필터 엔진: 교집합(AND) 추출</text>

    <!-- Context Box -->
    <rect x="100" y="80" width="700" height="100" fill="#222233" stroke="#aaaaaa" stroke-width="2" rx="10" />

    <text x="150" y="115" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold">아빠의 조건 (A):</text>
    <text x="350" y="115" fill="#ffffff" font-family="monospace" font-size="24" font-weight="bold">x &gt; 2</text>
    <text x="480" y="115" fill="#aaaaaa" font-family="sans-serif" font-size="16">"문제집 2장 이상은 무조건 풀어라!"</text>

    <text x="150" y="155" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold">엄마의 조건 (B):</text>
    <text x="350" y="155" fill="#ffffff" font-family="monospace" font-size="24" font-weight="bold">x ≤ 6</text>
    <text x="480" y="155" fill="#aaaaaa" font-family="sans-serif" font-size="16">"눈 나빠지니 최대 6장까지만 풀어!"</text>

    <!-- Number Line Canvas -->
    <g transform="translate(0, 100)">

        <!-- Base Number Line -->
        <line x1="100" y1="250" x2="800" y2="250" stroke="#ffffff" stroke-width="4" />
        <polygon points="800,245 810,250 800,255" fill="#ffffff" />
        <polygon points="100,245 90,250 100,255" fill="#ffffff" />

        <!-- Ticks & Numbers -->
        <line x1="200" y1="240" x2="200" y2="260" stroke="#aaaaaa" stroke-width="2" />
        <text x="200" y="285" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">0</text>

        <line x1="300" y1="240" x2="300" y2="260" stroke="#ffffff" stroke-width="2" />
        <text x="300" y="290" fill="#4da6ff" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">2</text>

        <line x1="500" y1="240" x2="500" y2="260" stroke="#ffffff" stroke-width="2" />
        <text x="500" y="290" fill="#00ffcc" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">6</text>

        <line x1="700" y1="240" x2="700" y2="260" stroke="#aaaaaa" stroke-width="2" />
        <text x="700" y="285" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">10</text>

        <!-- Plot A: Blue (x > 2) -->
        <circle cx="300" cy="250" r="12" fill="#1a1a24" stroke="#4da6ff" stroke-width="4" filter="url(#glow)" />
        <rect x="312" y="160" width="450" height="90" fill="#4da6ff" opacity="0.3" />
        <line x1="300" y1="238" x2="300" y2="160" stroke="#4da6ff" stroke-width="3" />
        <line x1="300" y1="160" x2="750" y2="160" stroke="#4da6ff" stroke-width="3" />
        <polygon points="740,150 760,160 740,170" fill="#4da6ff" />
        <text x="650" y="145" fill="#4da6ff" font-family="monospace" font-size="20" font-weight="bold">x &gt; 2</text>

        <!-- Plot B: Green (x <= 6) -->
        <circle cx="500" cy="250" r="12" fill="#00ffcc" filter="url(#glow)" />
        <rect x="150" y="190" width="350" height="60" fill="#00ffcc" opacity="0.3" />
        <line x1="500" y1="250" x2="500" y2="190" stroke="#00ffcc" stroke-width="3" />
        <line x1="500" y1="190" x2="160" y2="190" stroke="#00ffcc" stroke-width="3" />
        <polygon points="170,180 150,190 170,200" fill="#00ffcc" />
        <text x="250" y="175" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold">x ≤ 6</text>

        <!-- Intersection Area (Hatched) -->
        <!-- The overlapping region is from x=300 to x=500, height from 190 to 250 (roughly) -->
        <rect x="312" y="190" width="188" height="60" fill="url(#hatch)" />

        <!-- Sandwich Highlight Box -->
        <rect x="300" y="140" width="200" height="150" fill="none" stroke="#ffcc00" stroke-width="4"
            stroke-dasharray="8 4" rx="10" filter="url(#glow)" />

        <text x="400" y="340" fill="#ffcc00" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">여기가 정답 (교집합)!</text>

        <rect x="250" y="360" width="300" height="60" fill="#2b1111" stroke="#ffcc00" stroke-width="3" rx="10" />
        <text x="400" y="400" fill="#ffcc00" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">2 &lt; x ≤ 6</text>
    </g>

</svg>