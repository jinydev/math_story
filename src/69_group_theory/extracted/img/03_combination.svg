<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">계급장을 떼버리는 압축 엔진: 조합 (Combination)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"A와 B가 뽑히든, B와 A가
        뽑히든 결국 같은 청소 당번 바구니다."</text>

    <!-- Top Area: Permutation Over-rendering (20 cases) -->
    <g transform="translate(100, 150)">
        <rect x="0" y="0" width="300" height="250" rx="10" fill="#221111" stroke="#ff4d4d" stroke-width="2" />
        <text x="150" y="30" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">1. 무식한 순열 렌더링 (5P2)</text>

        <!-- Redundant pairs -->
        <rect x="50" y="60" width="80" height="40" rx="5" fill="#331111" stroke="#ffaa00" />
        <text x="90" y="85" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">[A, B]</text>

        <rect x="170" y="60" width="80" height="40" rx="5" fill="#331111" stroke="#ffaa00" />
        <text x="210" y="85" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">[B, A]</text>

        <line x1="130" y1="80" x2="170" y2="80" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="4 2" />
        <text x="150" y="115" fill="#ffaa00" font-family="sans-serif" font-size="14" text-anchor="middle">중복 버그
            발생!</text>

        <!-- More pairs -->
        <rect x="50" y="130" width="80" height="40" rx="5" fill="#331111" stroke="#00ffcc" />
        <text x="90" y="155" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">[C, E]</text>

        <rect x="170" y="130" width="80" height="40" rx="5" fill="#331111" stroke="#00ffcc" />
        <text x="210" y="155" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">[E, C]</text>

        <line x1="130" y1="150" x2="170" y2="150" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="4 2" />

        <text x="150" y="220" fill="#aaaaaa" font-family="monospace" font-size="16" text-anchor="middle">총 5 × 4 = 20 가지
            뻥튀기 생성</text>
    </g>

    <!-- Filter Pipeline -> -->
    <g transform="translate(420, 250)">
        <path d="M 0 0 L 60 0 L 40 -20 M 60 0 L 40 20" fill="none" stroke="#ff00ff" stroke-width="5"
            filter="url(#glow)" />
        <text x="30" y="-30" fill="#ff00ff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">나누기 2!</text>
        <text x="30" y="40" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">압축 병합</text>
    </g>

    <!-- Right Area: Combination Compressed (10 cases) -->
    <g transform="translate(500, 150)">
        <rect x="0" y="0" width="300" height="250" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="150" y="30" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">2. 평등의 바구니 묶음 (5C2)</text>

        <!-- Compressed Baskets -->
        <!-- Basket 1 -->
        <path d="M 110 60 L 190 60 L 180 110 L 120 110 Z" fill="#223344" stroke="#ffaa00" stroke-width="2" />
        <text x="150" y="95" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">A, B 묶음</text>

        <!-- Basket 2 -->
        <path d="M 110 130 L 190 130 L 180 180 L 120 180 Z" fill="#223344" stroke="#00ffcc" stroke-width="2" />
        <text x="150" y="165" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">C, E 묶음</text>

        <!-- Formula -->
        <rect x="50" y="200" width="200" height="35" rx="5" fill="#111122" stroke="#00ffcc" stroke-width="2" />
        <text x="150" y="223" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">20 / 2! = 10가지 바구니</text>
    </g>

    <!-- Logic Formula Bottom -->
    <rect x="150" y="450" width="600" height="100" rx="10" fill="#221122" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="480" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">궁극의 제어 스위치 조합(C) 작동 원리</text>
    <text x="450" y="520" fill="#ffffff" font-family="monospace" font-size="24" text-anchor="middle">nCr = nPr /
        r!</text>
    <text x="450" y="565" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">"뽑은 놈들끼리 줄 서서 난리
        치는 팩토리얼(r!)로 분모를 깔아 나눠버린다!"</text>

</svg>