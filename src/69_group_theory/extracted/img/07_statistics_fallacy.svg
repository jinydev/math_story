<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ff4d4d" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">통계의 허와 실: 제3의 숨은 변수 (Lurking Variable)</text>

    <!-- Top "Illusion" Section -->
    <rect x="50" y="100" width="800" height="150" fill="#221111" stroke="#ff4d4d" stroke-width="3" rx="15" />
    <text x="450" y="130" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">가짜 뉴스의 함정 (상관관계를 인과관계로 착각)</text>

    <g transform="translate(200, 180)">
        <!-- Ice Cream (A) -->
        <rect x="-60" y="-40" width="120" height="60" rx="10" fill="#00ffcc" stroke="#ffffff" stroke-width="2" />
        <text x="0" y="0" fill="#111122" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">아이스크림</text>
        <text x="0" y="-50" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">폭풍 판매! (A) 📈</text>
    </g>

    <!-- Fake Causal Arrow -->
    <path d="M 280 180 Q 450 150 620 180" fill="none" stroke="#ffaa00" stroke-width="8" stroke-dasharray="10 5"
        marker-end="url(#arrowOrange)" />
    <text x="450" y="150" fill="#ffaa00" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">상어를 불러들인다?? (X)</text>

    <g transform="translate(700, 180)">
        <!-- Shark Attacks (B) -->
        <rect x="-60" y="-40" width="120" height="60" rx="10" fill="#ff4d4d" stroke="#ffffff" stroke-width="2" />
        <text x="0" y="0" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">상어 습격</text>
        <text x="0" y="-50" fill="#ff4d4d" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">폭풍 증가! (B) 📈</text>
    </g>


    <!-- Bottom "Truth" Section -->
    <rect x="50" y="280" width="800" height="230" fill="#112233" stroke="#00ffcc" stroke-width="3" rx="15" />
    <text x="450" y="320" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">진실: 모든 것을 조종하는 제3의 변수 (Lurking Variable)</text>

    <!-- The Real Cause (C) -->
    <g transform="translate(450, 400)">
        <circle cx="0" cy="0" r="50" fill="#ffaa00" filter="url(#glow)" />
        <text x="0" y="-5" fill="#111122" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">여름(폭염)</text>
        <text x="0" y="20" fill="#111122" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">진짜 원인 (C)</text>
    </g>

    <!-- Cause Arrow to Ice Cream -->
    <path d="M 400 380 Q 300 380 230 460" fill="none" stroke="#00ffcc" stroke-width="6" marker-end="url(#arrowCyan)" />
    <text x="280" y="410" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">더워서 많이 사먹음</text>

    <rect x="150" y="450" width="120" height="40" rx="5" fill="#00ffcc" opacity="0.5" />
    <text x="210" y="475" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">아이스크림 (A)</text>

    <!-- Cause Arrow to Shark -->
    <path d="M 500 380 Q 600 380 670 460" fill="none" stroke="#ff4d4d" stroke-width="6" marker-end="url(#arrowRed)" />
    <text x="620" y="410" fill="#ff4d4d" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">더워서 바다로 뛰어듦</text>

    <rect x="630" y="450" width="120" height="40" rx="5" fill="#ff4d4d" opacity="0.5" />
    <text x="690" y="475" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">상어 습격 (B)</text>

    <line x1="280" y1="470" x2="620" y2="470" stroke="#777777" stroke-width="4" stroke-dasharray="10 5"
        marker-end="url(#arrowGray)" marker-start="url(#arrowGrayStart)" />
    <text x="450" y="490" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">그냥 동일 엔진(C)에 의해
        우연히 같이 상승했을 뿐! (상관성 O, 인과성 X)</text>

    <!-- Explanation Bottom -->
    <rect x="150" y="535" width="600" height="40" rx="10" fill="#221133" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="560" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">데이터 사이언티스트의 핵심 역량:
        가짜 연관성을 끊어내는 '도메인 지식'</text>

    <defs>
        <marker id="arrowOrange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffaa00" />
        </marker>
        <marker id="arrowCyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
        <marker id="arrowRed" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4d4d" />
        </marker>
        <marker id="arrowGray" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#777777" />
        </marker>
        <marker id="arrowGrayStart" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#777777" />
        </marker>
    </defs>
</svg>