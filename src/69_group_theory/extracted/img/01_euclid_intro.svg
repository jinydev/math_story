<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">스파게티 코드를 완벽한 트리로 정렬: 유클리드 시스템</text>

    <!-- Chaos (Before Euclid) -->
    <g transform="translate(100, 150)">
        <rect x="0" y="0" width="300" height="350" rx="15" fill="#331111" stroke="#ff0055" stroke-width="3"
            stroke-dasharray="10 5" />
        <text x="150" y="40" fill="#ff0055" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">Before: 혼돈의 수학 데이터</text>

        <!-- Spaghetti lines and loose facts -->
        <path d="M 50 100 Q 150 50, 200 150 T 100 250 T 250 300" fill="none" stroke="#ffaa00" stroke-width="2"
            opacity="0.6" />
        <path d="M 250 100 Q 50 150, 150 200 T 50 300 T 200 320" fill="none" stroke="#00ffcc" stroke-width="2"
            opacity="0.6" />

        <rect x="40" y="100" width="90" height="30" fill="#222" stroke="#ffaa00" stroke-width="1" />
        <text x="85" y="120" fill="#ffaa00" font-family="sans-serif" font-size="12" text-anchor="middle">피타고라스 정리</text>

        <rect x="180" y="150" width="90" height="30" fill="#222" stroke="#00ffcc" stroke-width="1" />
        <text x="225" y="170" fill="#00ffcc" font-family="sans-serif" font-size="12" text-anchor="middle">이집트 측량법</text>

        <rect x="60" y="240" width="90" height="30" fill="#222" stroke="#ff00ff" stroke-width="1" />
        <text x="105" y="260" fill="#ff00ff" font-family="sans-serif" font-size="12" text-anchor="middle">탈레스의 발견</text>

        <rect x="170" y="280" width="90" height="30" fill="#222" stroke="#4da6ff" stroke-width="1" />
        <text x="215" y="300" fill="#4da6ff" font-family="sans-serif" font-size="12" text-anchor="middle">바빌로니아
            계산</text>
    </g>

    <!-- Arrow -->
    <path d="M 420 325 L 480 325" stroke="#ffffff" stroke-width="6" marker-end="url(#arrow)" filter="url(#glow)" />
    <text x="450" y="300" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">컴파일</text>
    <text x="450" y="360" fill="#00ffcc" font-family="monospace" font-size="16"
        text-anchor="middle">Euclid_Compiler.exe</text>

    <!-- Order (After Euclid) -->
    <g transform="translate(500, 150)">
        <rect x="0" y="0" width="350" height="350" rx="15" fill="#112233" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="175" y="40" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">After: 원론(Elements) 논리 트리</text>

        <!-- Tree structure -->
        <!-- Root -->
        <rect x="125" y="70" width="100" height="40" rx="5" fill="#ffff00" stroke="#000" stroke-width="2"
            filter="url(#glow)" />
        <text x="175" y="95" fill="#000" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">공리/공준 (10개)</text>

        <!-- Level 1 -->
        <line x1="175" y1="110" x2="80" y2="160" stroke="#00ffcc" stroke-width="2" />
        <line x1="175" y1="110" x2="175" y2="160" stroke="#00ffcc" stroke-width="2" />
        <line x1="175" y1="110" x2="270" y2="160" stroke="#00ffcc" stroke-width="2" />

        <rect x="40" y="160" width="80" height="30" rx="5" fill="#224455" stroke="#00ffcc" stroke-width="1" />
        <text x="80" y="180" fill="#00ffcc" font-family="sans-serif" font-size="12" text-anchor="middle">명제 1번</text>
        <rect x="135" y="160" width="80" height="30" rx="5" fill="#224455" stroke="#00ffcc" stroke-width="1" />
        <text x="175" y="180" fill="#00ffcc" font-family="sans-serif" font-size="12" text-anchor="middle">명제 2번</text>
        <rect x="230" y="160" width="80" height="30" rx="5" fill="#224455" stroke="#00ffcc" stroke-width="1" />
        <text x="270" y="180" fill="#00ffcc" font-family="sans-serif" font-size="12" text-anchor="middle">명제 3번</text>

        <!-- Level 2 -->
        <line x1="80" y1="190" x2="60" y2="240" stroke="#00ffcc" stroke-width="2" />
        <line x1="80" y1="190" x2="110" y2="240" stroke="#00ffcc" stroke-width="2" />
        <line x1="175" y1="190" x2="175" y2="240" stroke="#00ffcc" stroke-width="2" />
        <line x1="270" y1="190" x2="240" y2="240" stroke="#00ffcc" stroke-width="2" />
        <line x1="270" y1="190" x2="290" y2="240" stroke="#00ffcc" stroke-width="2" />

        <rect x="20" y="240" width="310" height="40" rx="5" fill="#224455" stroke="#00ffcc" stroke-width="1"
            stroke-dasharray="2 2" />
        <text x="175" y="265" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">수십, 수백 개의 중간
            증명들...</text>

        <!-- Final Level -->
        <line x1="175" y1="280" x2="175" y2="310" stroke="#ff00ff" stroke-width="4" filter="url(#glow)" />
        <rect x="100" y="310" width="150" height="30" rx="5" fill="#550055" stroke="#ff00ff" stroke-width="2" />
        <text x="175" y="330" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">피타고라스 정리 (명제 47)</text>
    </g>

</svg>