<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">동자순열(같은 문자가 있는 순열): 중복된 우주의 삭제</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"거대한 전체 배열(N!) 에서,
        구분 불가능한 쌍둥이들의 환영(K!) 만큼을 나누어(÷) 파괴하라."</text>

    <!-- Left: The Map Problem -->
    <g transform="translate(80, 150)">
        <rect x="0" y="0" width="300" height="300" rx="10" fill="#001122" stroke="#4da6ff" stroke-width="3" />
        <text x="150" y="30" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">네비게이션 최단 경로</text>

        <!-- Grid Lines -->
        <path d="M 50 250 L 50 100 L 250 100" fill="none" stroke="#333" stroke-width="2" />
        <path d="M 116 250 L 116 100" fill="none" stroke="#333" stroke-width="2" />
        <path d="M 183 250 L 183 100" fill="none" stroke="#333" stroke-width="2" />
        <path d="M 250 250 L 250 100" fill="none" stroke="#333" stroke-width="2" />

        <path d="M 50 200 L 250 200" fill="none" stroke="#333" stroke-width="2" />
        <path d="M 50 150 L 250 150" fill="none" stroke="#333" stroke-width="2" />
        <path d="M 50 250 L 250 250" fill="none" stroke="#333" stroke-width="2" />

        <!-- Path Example -->
        <path d="M 50 250 L 116 250 L 116 200 L 183 200 L 183 100 L 250 100" fill="none" stroke="#00ffcc"
            stroke-width="5" marker-end="url(#arrow_c)" filter="url(#glow)" />

        <circle cx="50" cy="250" r="8" fill="#ff5555" />
        <text x="50" y="270" fill="#ff5555" font-weight="bold" text-anchor="middle">START</text>

        <circle cx="250" cy="100" r="8" fill="#ffff00" />
        <text x="250" y="85" fill="#ffff00" font-weight="bold" text-anchor="middle">END</text>

        <!-- Text Encoding -->
        <text x="150" y="285" fill="#ffffff" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">인코딩: R, U, R, U, U, R (오른쪽 3, 위쪽 2)</text>
    </g>

    <!-- Right: The Mathematical Solution -->
    <g transform="translate(420, 150)">
        <rect x="0" y="0" width="400" height="300" rx="10" fill="#1b1111" stroke="#ff00ff" stroke-width="3" />
        <text x="200" y="30" fill="#ff00ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">문자열 나열 알고리즘</text>

        <!-- Total string -->
        <text x="200" y="65" fill="#ffffff" font-family="monospace" font-size="18" text-anchor="middle">대상: [ R, R, R,
            U, U ]</text>

        <!-- Step 1 -->
        <rect x="20" y="90" width="360" height="50" rx="5" fill="#000" stroke="#ffaa00" />
        <text x="30" y="110" fill="#ffaa00" font-family="monospace" font-size="14" font-weight="bold">Step 1: 일단 서로 다르다고
            치고 전체 배열 (5!)</text>
        <text x="30" y="130" fill="#aaaaaa" font-family="sans-serif" font-size="12">-> 가짜 경우의 수가 120개 무식하게 생성됨.</text>

        <!-- Step 2 -->
        <rect x="20" y="150" width="360" height="70" rx="5" fill="#000" stroke="#4da6ff" />
        <text x="30" y="170" fill="#4da6ff" font-family="monospace" font-size="14" font-weight="bold">Step 2: 똑같이 생긴 R
            (3개) 끼리 뒤섞인 건 무효!</text>
        <text x="30" y="190" fill="#4da6ff" font-family="monospace" font-size="14" font-weight="bold">U (2개) 끼리 뒤섞인 건
            무효! (강제 분모 나누기)</text>
        <text x="30" y="210" fill="#ff5555" font-family="sans-serif" font-size="14" font-weight="bold">-> (÷ 3!) 그리고 (÷
            2!) 로 거품 제거 실행.</text>

        <!-- Final calculation -->
        <text x="200" y="245" fill="#ffff00" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">5! / (3! × 2!) = 10</text>
        <text x="200" y="275" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">결론: 목적지까지 갈 수
            있는 고유한 맵은 딱 10개.</text>
    </g>

    <!-- Big Alert Bottom -->
    <rect x="100" y="480" width="700" height="80" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
    <text x="450" y="515" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        2D 물리적 맵을 <tspan fill="#00ffcc" font-weight="bold">'1차원 텍스트(String) 조합'</tspan> 으로 완벽하게 다운그레이드 하여,
    </text>
    <text x="450" y="540" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        컴퓨터(파이썬) 가 <tspan fill="#4da6ff" font-weight="bold">If</tspan> 조건 없이 다이렉트로 연산하게 만든 수학자들의 인코딩 해킹 스킬입니다.
    </text>

    <defs>
        <marker id="arrow_c" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#00ffcc" />
        </marker>
    </defs>

</svg>