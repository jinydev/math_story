<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">영원히 사라지지 않는 추락: 반감기 (Half-Life)</text>

    <!-- Chart Area -->
    <g transform="translate(150, 100)">

        <!-- Axes -->
        <line x1="0" y1="350" x2="650" y2="350" stroke="#888888" stroke-width="3" />
        <line x1="0" y1="350" x2="0" y2="0" stroke="#888888" stroke-width="3" />

        <text x="325" y="380" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">지나간 시간
            (Time)</text>
        <text x="-40" y="180" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle"
            transform="rotate(-90, -40, 180)">남은 양 (Amount)</text>

        <!-- Initial Amount -->
        <circle cx="0" cy="50" r="5" fill="#4da6ff" />
        <text x="-15" y="55" fill="#4da6ff" font-family="sans-serif" font-size="16" text-anchor="end">100%
            (1000개)</text>
        <line x1="0" y1="50" x2="650" y2="50" stroke="#333333" stroke-width="1" stroke-dasharray="4 4" />

        <!-- Half-Life Points and Curve -->
        <path d="M 0 50 Q 150 300 650 345" fill="none" stroke="#00ffcc" stroke-width="5" filter="url(#glow)" />

        <text x="500" y="320" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold">y =
            (0.5)^x</text>

        <!-- T=1 -->
        <circle cx="150" cy="200" r="6" fill="#ff4d4d" />
        <line x1="150" y1="350" x2="150" y2="200" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="4 4" />
        <line x1="0" y1="200" x2="150" y2="200" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="4 4" />
        <text x="150" y="370" fill="#ff4d4d" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">1차 반감기</text>
        <text x="-15" y="205" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="end">50% (500개)</text>

        <!-- T=2 -->
        <circle cx="300" cy="275" r="6" fill="#ffaa00" />
        <line x1="300" y1="350" x2="300" y2="275" stroke="#ffaa00" stroke-width="2" stroke-dasharray="4 4" />
        <line x1="0" y1="275" x2="300" y2="275" stroke="#ffaa00" stroke-width="2" stroke-dasharray="4 4" />
        <text x="300" y="370" fill="#ffaa00" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">2차 반감기</text>
        <text x="-15" y="280" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="end">25% (250개)</text>

        <!-- T=3 -->
        <circle cx="450" cy="312.5" r="6" fill="#ffff00" />
        <line x1="450" y1="350" x2="450" y2="312.5" stroke="#ffff00" stroke-width="2" stroke-dasharray="4 4" />
        <line x1="0" y1="312.5" x2="450" y2="312.5" stroke="#ffff00" stroke-width="2" stroke-dasharray="4 4" />
        <text x="450" y="370" fill="#ffff00" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">3차</text>
        <text x="-15" y="317.5" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="end">12.5%
            (125개)</text>

        <!-- Asymptote Indicator -->
        <rect x="520" y="355" width="130" height="40" rx="5" fill="#112233" stroke="#00ffcc" />
        <text x="585" y="372" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">점근선(Asymptote)</text>
        <text x="585" y="388" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">영원히 0에 닿지
            못함</text>
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="515" width="600" height="50" rx="10" fill="#2b1133" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="545" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">고고학자들의 탄소-14
        (C-14) 방사성 동위원소 연대 측정의 핵심 알고리즘!</text>

</svg>