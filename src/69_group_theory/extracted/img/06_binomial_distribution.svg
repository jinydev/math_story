<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">거대한 흑백 논리 프로토타입: 이항분포 B(n, p)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"모든 것을 성공(O) 아니면
        실패(X) 단 두 가지 옵션으로 치환한 압축 모델"</text>

    <!-- Model Structure -->
    <g transform="translate(150, 150)">
        <!-- Base Box representing B(n, p) -->
        <rect x="0" y="0" width="600" height="250" rx="15" fill="#112233" stroke="#4da6ff" stroke-width="4"
            filter="url(#glow)" />

        <text x="300" y="45" fill="#4da6ff" font-family="sans-serif" font-size="30" font-weight="bold"
            text-anchor="middle">Binomial Distribution</text>
        <text x="300" y="85" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">B( n, p )</text>

        <!-- n part -->
        <rect x="50" y="120" width="200" height="100" rx="10" fill="#223344" stroke="#ffaa00" stroke-width="2" />
        <text x="150" y="150" fill="#ffaa00" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">n</text>
        <text x="150" y="180" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">총 시행 반복 횟수</text>
        <text x="150" y="200" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">"총알 100만 발
            발사"</text>

        <!-- p part -->
        <rect x="350" y="120" width="200" height="100" rx="10" fill="#223344" stroke="#00ffcc" stroke-width="2" />
        <text x="450" y="150" fill="#00ffcc" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">p</text>
        <text x="450" y="180" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">1방당 적중 확률</text>
        <text x="450" y="200" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">"성공 확률
            0.8"</text>
    </g>

    <!-- Independence Engine Visualization -->
    <g transform="translate(150, 420)">
        <rect x="0" y="0" width="600" height="80" rx="10" fill="#221122" stroke="#ff00ff" stroke-width="2" />

        <text x="300" y="30" fill="#ff00ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">단위 코어: 독립 시행 (Independent Trials)</text>

        <!-- Mini Chain indicating reset -->
        <path d="M 150 50 L 190 50 M 210 50 L 250 50 M 270 50 L 310 50 M 330 50 L 370 50" stroke="#ff4d4d"
            stroke-width="3" stroke-dasharray="4 2" />

        <rect x="190" y="40" width="20" height="20" fill="#111111" stroke="#aaaaaa" />
        <rect x="250" y="40" width="20" height="20" fill="#111111" stroke="#aaaaaa" />
        <rect x="310" y="40" width="20" height="20" fill="#111111" stroke="#aaaaaa" />

        <text x="300" y="65" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">매 회차마다 메모리를
            리셋하며 철저하게 무소속으로 돌아가는 엔진</text>
    </g>

    <!-- Explanation Bottom -->
    <text x="450" y="540" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">수백 칸의 더러운 확률분포표를 단 2개의 설정값 (n과 p) 로 초압축 시켜버린 우주 해킹 설계도</text>

</svg>