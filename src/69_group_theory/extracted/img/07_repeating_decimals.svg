<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">CPU 무한루프 디버깅: 순환소수 (Repeating Loop)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"나눗셈 추적 도중, '역사에 이미
        존재했던 나머지' 가 출현하면 그 뒤로는 영원한 무한 반복이다."</text>

    <!-- While Loop Code Visual Box Left -->
    <g transform="translate(50, 150)">
        <rect x="0" y="0" width="350" height="280" rx="15" fill="#1b1b22" stroke="#55bbff" stroke-width="2" />
        <text x="20" y="30" fill="#55bbff" font-family="monospace" font-size="16" font-weight="bold">while (rem !=
            0):</text>

        <text x="40" y="60" fill="#aaa" font-family="monospace" font-size="14">if rem in history:</text>
        <text x="60" y="80" fill="#ff5555" font-family="monospace" font-size="14" font-weight="bold"
            filter="url(#glow)">BREAK! LOOP DETECTED!</text>

        <text x="40" y="110" fill="#aaa" font-family="monospace" font-size="14">history.append(rem)</text>
        <text x="40" y="140" fill="#aaa" font-family="monospace" font-size="14">rem = (rem * 10) % 7</text>

        <text x="20" y="180" fill="#55bbff" font-family="monospace" font-size="16" font-weight="bold"># 1 ÷ 7 의 나머지(rem)
            역사:</text>
        <text x="20" y="210" fill="#fff" font-family="monospace" font-size="18">[1, 3, 2, 6, 4, 5, <tspan fill="#ff0055"
                font-weight="bold" filter="url(#glow)">1</tspan>]</text>

        <path d="M 280 200 Q 330 160 300 120" fill="none" stroke="#ff0055" stroke-width="3" stroke-dasharray="4"
            marker-end="url(#arrow_l)" filter="url(#glow)" />
        <text x="180" y="250" fill="#ff0055" font-weight="bold">
            <- 과거로 회귀 (무한 패턴 확정)</text>
    </g>

    <!-- Circular Loop Right Side -->
    <g transform="translate(620, 270)">
        <!-- Base Gear/Ring -->
        <circle cx="0" cy="0" r="120" fill="none" stroke="#333" stroke-width="15" />
        <circle cx="0" cy="0" r="120" fill="none" stroke="#00ffcc" stroke-width="4" stroke-dasharray="20 10"
            filter="url(#glow)">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s"
                repeatCount="indefinite" />
        </circle>

        <text x="0" y="-10" fill="#fff" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle"
            filter="url(#glow)">0.142857</text>
        <text x="0" y="30" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">무한루프 갇힘</text>

        <!-- Nodes on the circle -->
        <g transform="translate(0, -120)">
            <circle cx="0" cy="0" r="15" fill="#111" stroke="#00ffcc" stroke-width="2" />
            <text x="0" y="5" fill="#fff" font-weight="bold" text-anchor="middle">1</text>
        </g>
        <g transform="translate(103.9, -60)">
            <circle cx="0" cy="0" r="15" fill="#111" stroke="#ff00ff" stroke-width="2" />
            <text x="0" y="5" fill="#fff" font-weight="bold" text-anchor="middle">4</text>
        </g>
        <g transform="translate(103.9, 60)">
            <circle cx="0" cy="0" r="15" fill="#111" stroke="#00ffcc" stroke-width="2" />
            <text x="0" y="5" fill="#fff" font-weight="bold" text-anchor="middle">2</text>
        </g>
        <g transform="translate(0, 120)">
            <circle cx="0" cy="0" r="15" fill="#111" stroke="#ff00ff" stroke-width="2" />
            <text x="0" y="5" fill="#fff" font-weight="bold" text-anchor="middle">8</text>
        </g>
        <g transform="translate(-103.9, 60)">
            <circle cx="0" cy="0" r="15" fill="#111" stroke="#00ffcc" stroke-width="2" />
            <text x="0" y="5" fill="#fff" font-weight="bold" text-anchor="middle">5</text>
        </g>
        <g transform="translate(-103.9, -60)">
            <circle cx="0" cy="0" r="15" fill="#111" stroke="#ff00ff" stroke-width="2" />
            <text x="0" y="5" fill="#fff" font-weight="bold" text-anchor="middle">7</text>
        </g>
    </g>

    <defs>
        <marker id="arrow_l" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ff0055" />
        </marker>
    </defs>

    <!-- Big Alert Bottom -->
    <rect x="50" y="470" width="800" height="90" rx="10" fill="#001b1b" stroke="#00ffcc" stroke-width="2" />
    <text x="450" y="500" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        무한 반복되는 숫자의 배열(순환마디) 는 컴퓨터과학의 Memory Overflow 버그와 같다.
    </text>
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        수학자들은 이것을 <tspan fill="#ff00ff" font-weight="bold">0.<tspan text-decoration="overline">142857</tspan>
        </tspan> 로 점을 찍어 압축시켜 표현하고,
    </text>
    <text x="450" y="550" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">
        그것을 규칙적인 비율(분수) 1/7 로 온전히 복구해 내는 신비로운 기술을 보유하고 있다.
    </text>
</svg>