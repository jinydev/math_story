<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <!-- Glow filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">히포크라테스의 초승달 (Hippocrates's Lune)</text>

    <!-- Right Triangle Base -->
    <g transform="translate(400, 350)">

        <!-- Large Bottom Semicircle (Hypotenuse BC) -->
        <!-- Hypotenuse is 200 units wide -->
        <path d="M -100 0 A 100 100 0 0 1 100 0" fill="#444455" stroke="#aaa" stroke-width="2" stroke-dasharray="5" />
        <text x="0" y="30" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">가장 큰 반원 (지름
            BC)</text>

        <!-- The Right Triangle ABC -->
        <!-- Let's use a 3-4-5 ratio triangle for clean drawing -->
        <!-- Points: B(-100, 0), C(100, 0). A is at (-60, -80) to make it a right triangle on the hypotenuse -->
        <!-- Actually let's just make it a simple isosceles right triangle for symmetry: A(0, -100) -->
        <polygon points="-100,0 100,0 0,-100" fill="#4da6ff" fill-opacity="0.8" stroke="#ffffff" stroke-width="3"
            filter="url(#glow)" />

        <text x="0" y="-40" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">Area</text>

        <!-- Right angle marker at A -->
        <path d="M -15 -85 L 0 -70 L 15 -85" fill="none" stroke="#ffffff" stroke-width="2" />

        <!-- Vertex Labels -->
        <text x="-120" y="5" fill="#ffffff" font-family="sans-serif" font-size="20">B</text>
        <text x="110" y="5" fill="#ffffff" font-family="sans-serif" font-size="20">C</text>
        <text x="0" y="-120" fill="#ffffff" font-family="sans-serif" font-size="20" text-anchor="middle">A</text>

        <!-- Left Small Semicircle on AB -->
        <!-- Diameter = sqrt(100^2 + 100^2) = 141.4, Radius = 70.7 -->
        <!-- Center of AB is (-50, -50). Angle is 45 degrees -->
        <g transform="translate(-50, -50) rotate(45)">
            <path d="M -70.7 0 A 70.7 70.7 0 0 1 70.7 0" fill="#ffaa00" fill-opacity="0.9" />
        </g>

        <!-- Right Small Semicircle on AC -->
        <g transform="translate(50, -50) rotate(-45)">
            <path d="M -70.7 0 A 70.7 70.7 0 0 1 70.7 0" fill="#ffaa00" fill-opacity="0.9" />
        </g>

        <!-- To make the Lunes visible (Orange), we need to clear the intersection with the large semicircle -->
        <!-- Or just draw the large semicircle on top but with background color, then the triangle on top of that -->
    </g>

    <!-- Re-rendered properly with layering -->
    <g transform="translate(400, 350)">
        <!-- 1. Two yellow semicircles on top -->
        <!-- Left -->
        <g transform="translate(-50, -50) rotate(45)">
            <path d="M -70.7 0 A 70.7 70.7 0 0 1 70.7 0 Z" fill="#ffaa00" filter="url(#glow)" />
        </g>
        <!-- Right -->
        <g transform="translate(50, -50) rotate(-45)">
            <path d="M -70.7 0 A 70.7 70.7 0 0 1 70.7 0 Z" fill="#ffaa00" filter="url(#glow)" />
        </g>

        <!-- 2. Large semicircle (Subtracts from the yellow ones, leaving the lunes) -->
        <path d="M -100 0 A 100 100 0 0 1 100 0 Z" fill="#1a1a24" />
        <path d="M -100 0 A 100 100 0 0 1 100 0" fill="none" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="5" />

        <!-- 3. The Right Triangle in the middle -->
        <polygon points="-100,0 100,0 0,-100" fill="#4da6ff" fill-opacity="1" stroke="#ffffff" stroke-width="2"
            filter="url(#glow)" />
        <text x="0" y="-40" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">△ ABC (넓이)</text>

        <!-- Point out the Lunes -->
        <!-- Left Lune Text -->
        <path d="M -120 -80 L -160 -120" stroke="#ffaa00" stroke-width="2" marker-start="url(#arrow)" />
        <text x="-165" y="-130" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="end">초승달 1</text>

        <!-- Right Lune Text -->
        <path d="M 120 -80 L 160 -120" stroke="#ffaa00" stroke-width="2" />
        <text x="165" y="-130" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="start">초승달 2</text>
    </g>

    <!-- Equation -->
    <g transform="translate(400, 480)">
        <rect x="-350" y="0" width="700" height="70" rx="10" fill="#222233" stroke="#ff4d4d" stroke-width="2" />
        <text x="0" y="45" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">
            <tspan fill="#ffaa00">초승달 2개의 넓이 합</tspan> = <tspan fill="#4da6ff">직각삼각형(△ABC)의 넓이</tspan>
        </text>
    </g>

</svg>