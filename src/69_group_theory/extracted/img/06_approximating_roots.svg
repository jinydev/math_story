<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <!-- Glow filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">이분법(Bisection): 루트 2 근삿값 포위 사격</text>
    <text x="400" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">목표: 1.4142... (x² =
        2 인 지점)을 향해 절반씩 범위를 폭파한다!</text>

    <!-- Number line base scale -->
    <g transform="translate(150, 0)">

        <!-- Step 1 -->
        <text x="-50" y="160" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="bold">Step 1</text>
        <line x1="0" y1="150" x2="500" y2="150" stroke="#555" stroke-width="4" />
        <circle cx="0" cy="150" r="8" fill="#00ffcc" /> <text x="0" y="180" fill="#00ffcc" font-family="monospace"
            text-anchor="middle" font-weight="bold">1.0</text>
        <circle cx="500" cy="150" r="8" fill="#ff4d4d" /> <text x="500" y="180" fill="#ff4d4d" font-family="monospace"
            text-anchor="middle" font-weight="bold">2.0</text>

        <!-- Midpoint test -->
        <circle cx="250" cy="150" r="8" fill="#ffaa00" filter="url(#glow)" />
        <text x="250" y="130" fill="#ffaa00" font-family="sans-serif" font-size="14" text-anchor="middle">찌름!
            (1.5)</text>
        <text x="250" y="110" fill="#ffaa00" font-family="monospace" font-size="12" text-anchor="middle">1.5² = 2.25 (>
            2)</text>

        <!-- Target line (invisible actual root 2) -->
        <line x1="207.1" y1="120" x2="207.1" y2="500" stroke="#ffffff" stroke-width="1" stroke-dasharray="5"
            opacity="0.3" />

        <!-- Cross out right half -->
        <line x1="270" y1="140" x2="480" y2="160" stroke="#ff4d4d" stroke-width="4" opacity="0.7" />
        <line x1="270" y1="160" x2="480" y2="140" stroke="#ff4d4d" stroke-width="4" opacity="0.7" />


        <!-- Step 2 -->
        <text x="-50" y="260" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="bold">Step 2</text>
        <!-- Scope lines -->
        <path d="M 0 190 L 0 250 M 250 190 L 500 250" stroke="#555" stroke-width="2" stroke-dasharray="4"
            opacity="0.5" />

        <line x1="0" y1="250" x2="500" y2="250" stroke="#555" stroke-width="4" />
        <circle cx="0" cy="250" r="8" fill="#00ffcc" /> <text x="0" y="280" fill="#00ffcc" font-family="monospace"
            text-anchor="middle" font-weight="bold">1.0</text>
        <circle cx="500" cy="250" r="8" fill="#ff4d4d" /> <text x="500" y="280" fill="#ff4d4d" font-family="monospace"
            text-anchor="middle" font-weight="bold">1.5</text>

        <!-- Midpoint test -->
        <circle cx="250" cy="250" r="8" fill="#ffaa00" filter="url(#glow)" />
        <text x="250" y="230" fill="#ffaa00" font-family="sans-serif" font-size="14" text-anchor="middle">찌름!
            (1.25)</text>
        <text x="250" y="210" fill="#ffaa00" font-family="monospace" font-size="12" text-anchor="middle">1.25² = 1.56 (<
                2)</text>

                <!-- Cross out left half -->
                <line x1="20" y1="240" x2="230" y2="260" stroke="#ff4d4d" stroke-width="4" opacity="0.7" />
                <line x1="20" y1="260" x2="230" y2="240" stroke="#ff4d4d" stroke-width="4" opacity="0.7" />

                <!-- Step 3 -->
                <text x="-50" y="360" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="bold">Step
                    3</text>
                <!-- Scope lines -->
                <path d="M 250 290 L 0 350 M 500 290 L 500 350" stroke="#555" stroke-width="2" stroke-dasharray="4"
                    opacity="0.5" />

                <line x1="0" y1="350" x2="500" y2="350" stroke="#555" stroke-width="4" />
                <circle cx="0" cy="350" r="8" fill="#00ffcc" /> <text x="0" y="380" fill="#00ffcc"
                    font-family="monospace" text-anchor="middle" font-weight="bold">1.25</text>
                <circle cx="500" cy="350" r="8" fill="#ff4d4d" /> <text x="500" y="380" fill="#ff4d4d"
                    font-family="monospace" text-anchor="middle" font-weight="bold">1.5</text>

                <!-- Midpoint test -->
                <circle cx="250" cy="350" r="8" fill="#ffaa00" filter="url(#glow)" />
                <text x="250" y="330" fill="#ffaa00" font-family="sans-serif" font-size="14" text-anchor="middle">찌름!
                    (1.375)</text>
                <text x="250" y="310" fill="#ffaa00" font-family="monospace" font-size="12" text-anchor="middle">1.375²
                    = 1.89 (< 2)</text>

                        <!-- Cross out left half -->
                        <line x1="20" y1="340" x2="230" y2="360" stroke="#ff4d4d" stroke-width="4" opacity="0.7" />
                        <line x1="20" y1="360" x2="230" y2="340" stroke="#ff4d4d" stroke-width="4" opacity="0.7" />

                        <!-- Final Zoom in Concept -->
                        <text x="250" y="450" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
                            text-anchor="middle">... 계속 절반씩 좁히다 보면 (Step 14) ...</text>
                        <rect x="50" y="480" width="400" height="60" rx="10" fill="#2d2d44" stroke="#00ffcc"
                            stroke-width="3" filter="url(#glow)" />
                        <text x="250" y="520" fill="#00ffcc" font-family="monospace" font-size="28" font-weight="bold"
                            text-anchor="middle">포위 성공! ≒ 1.41418...</text>

    </g>

</svg>