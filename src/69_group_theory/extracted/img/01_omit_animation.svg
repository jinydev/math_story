<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">기호 생략 (Omitting Multiplication / Division)</text>

    <!-- Multiplication Omit -->
    <g transform="translate(400, 150)">
        <rect x="-350" y="-50" width="700" height="100" rx="15" fill="#2d2d44" stroke="#4da6ff" stroke-width="2" />

        <text x="-280" y="15" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold">x</text>

        <!-- The times sign disappearing -->
        <text x="-210" y="15" fill="#ff4d4d" font-family="monospace" font-size="40" font-weight="bold" opacity="0.4"
            text-decoration="line-through">×</text>

        <text x="-140" y="15" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold">5</text>

        <text x="-30" y="15" fill="#ffaa00" font-family="monospace" font-size="40" font-weight="bold">→</text>

        <!-- Result -->
        <text x="100" y="15" fill="#00ffcc" font-family="monospace" font-size="50" font-weight="bold"
            filter="url(#glow)">5x</text>

        <text x="250" y="5" fill="#aaaaaa" font-family="sans-serif" font-size="16">숫자가 앞으로!</text>
        <text x="250" y="30" fill="#aaaaaa" font-family="sans-serif" font-size="16">곱하기는 생략!</text>
    </g>

    <!-- Division Omit -->
    <g transform="translate(400, 300)">
        <rect x="-350" y="-50" width="700" height="100" rx="15" fill="#332222" stroke="#ff4d4d" stroke-width="2" />

        <text x="-280" y="15" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold">a</text>

        <!-- The divide sign disappearing -->
        <text x="-210" y="15" fill="#ff4d4d" font-family="monospace" font-size="40" font-weight="bold" opacity="0.4"
            text-decoration="line-through">÷</text>

        <text x="-140" y="15" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold">b</text>

        <text x="-30" y="15" fill="#ffaa00" font-family="monospace" font-size="40" font-weight="bold">→</text>

        <!-- Result Fraction -->
        <text x="120" y="-5" fill="#00ffcc" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">a</text>
        <line x1="90" y1="5" x2="150" y2="5" stroke="#00ffcc" stroke-width="4" filter="url(#glow)" />
        <text x="120" y="35" fill="#00ffcc" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">b</text>

        <text x="250" y="5" fill="#aaaaaa" font-family="sans-serif" font-size="16">나누기는 가로줄로!</text>
        <text x="250" y="30" fill="#aaaaaa" font-family="sans-serif" font-size="16">뒤에 놈이 분모로!</text>
    </g>

</svg>