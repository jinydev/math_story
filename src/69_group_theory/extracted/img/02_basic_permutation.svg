<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">서열화 배치 알고리즘: 순열 (Permutation, nPr)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"4명 중 3명을 골라,
        1-2-3등석이라는 완벽한 서열(좌표) 위에 꽂아 넣는 행위"</text>

    <!-- Middle Setup: Waitlist vs Seats -->
    <g transform="translate(150, 160)">

        <!-- Candidates Waiting Zone -->
        <rect x="-50" y="0" width="200" height="200" rx="10" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
        <text x="50" y="30" fill="#ff00ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">대기자 4명 (n=4)</text>

        <circle cx="20" cy="80" r="20" fill="#331133" />
        <text x="20" y="86" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">A</text>

        <circle cx="80" cy="80" r="20" fill="#331133" />
        <text x="80" y="86" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">B</text>

        <circle cx="20" cy="140" r="20" fill="#331133" />
        <text x="20" y="146" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">C</text>

        <circle cx="80" cy="140" r="20" fill="#331133" />
        <text x="80" y="146" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle">D</text>

        <!-- The 3 Seats Sequence (r=3) -->
        <rect x="250" y="20" width="400" height="150" rx="10" fill="#001a11" stroke="#00ffcc" stroke-width="2" />
        <text x="450" y="50" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">임명된 권력의 의자 (r=3, 서열 존재)</text>

        <!-- Slot 1 -->
        <rect x="280" y="70" width="80" height="60" rx="5" fill="#003322" stroke="#00ffcc" />
        <text x="320" y="90" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">센터 1번</text>
        <text x="320" y="115" fill="#ffff00" font-size="18" font-weight="bold" text-anchor="middle"
            filter="url(#glow)">4명 배틀</text>

        <!-- Separator (x) -->
        <text x="385" y="110" fill="#aaaaaa" font-size="24" font-weight="bold" text-anchor="middle">×</text>

        <!-- Slot 2 -->
        <rect x="410" y="70" width="80" height="60" rx="5" fill="#003322" stroke="#00ffcc" />
        <text x="450" y="90" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">보컬 2번</text>
        <text x="450" y="115" fill="#ffff00" font-size="18" font-weight="bold" text-anchor="middle"
            filter="url(#glow)">3명 생존</text>

        <!-- Separator (x) -->
        <text x="515" y="110" fill="#aaaaaa" font-size="24" font-weight="bold" text-anchor="middle">×</text>

        <!-- Slot 3 -->
        <rect x="540" y="70" width="80" height="60" rx="5" fill="#003322" stroke="#00ffcc" />
        <text x="580" y="90" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">댄스 3번</text>
        <text x="580" y="115" fill="#ffff00" font-size="18" font-weight="bold" text-anchor="middle"
            filter="url(#glow)">2명 생존</text>

        <!-- Arrows showing permutation logic -->
        <path d="M 160 100 L 250 100" fill="none" stroke="#ffff00" stroke-width="3" stroke-dasharray="5 5"
            marker-end="url(#arrow_y)" />
    </g>

    <defs>
        <marker id="arrow_y" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#ffff00" />
        </marker>
    </defs>

    <!-- Explanation Bottom -->
    <g transform="translate(100, 420)">
        <rect x="0" y="0" width="700" height="120" rx="10" fill="#0d1b2a" stroke="#4da6ff" stroke-width="2" />
        <text x="350" y="30" fill="#4da6ff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">수학적 암호 해독</text>

        <text x="350" y="65" fill="#ffffff" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">₄P₃ = 4 × 3 × 2 = <tspan fill="#ff00ff" filter="url(#glow)">24</tspan>가지 우주 생성</text>

        <text x="350" y="100" fill="#aaaaaa" font-family="sans-serif" font-size="16"
            text-anchor="middle">조합(Combination)이라면 "A-B-C 나 C-B-A 나 똑같아!" 라고 했겠지만,</text>
        <text x="350" y="125" fill="#aaaaaa" font-family="sans-serif" font-size="16"
            text-anchor="middle">순열(Permutation)은 <tspan fill="#ffff00">서열(자리 번호) 이 다르므로 각자의 독립된 평행우주</tspan>로
            인정함.</text>
    </g>

</svg>