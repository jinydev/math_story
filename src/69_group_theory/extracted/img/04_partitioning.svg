<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">익명 객체의 붕괴: 조 나누기 (Partitioning)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"수용 인원(크기) 이 똑같은 빈
        방들은 서열 확인이 불가하여 환영(거품) 을 생성한다."</text>

    <!-- Left Side: Named/Distinguishable Rooms -->
    <g transform="translate(60, 150)">
        <rect x="0" y="0" width="370" height="280" rx="15" fill="#1b1122" stroke="#ff00ff" stroke-width="3" />
        <text x="185" y="30" fill="#ff00ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">상황 1: 방 크기가 다른 경우 (정상 연산)</text>

        <!-- Room 1 (3 people) -->
        <rect x="20" y="60" width="100" height="100" rx="10" fill="#331133" stroke="#ff00ff" />
        <text x="70" y="80" fill="#ffffff" font-weight="bold" text-anchor="middle">스위트룸(3인)</text>
        <circle cx="50" cy="110" r="10" fill="#fff" />
        <circle cx="70" cy="130" r="10" fill="#fff" />
        <circle cx="90" cy="110" r="10" fill="#fff" />
        <text x="70" y="180" fill="#ff00ff" font-weight="bold" text-anchor="middle" filter="url(#glow)">₆C₃</text>

        <text x="135" y="115" fill="#fff" font-size="20">×</text>

        <!-- Room 2 (2 people) -->
        <rect x="150" y="60" width="80" height="100" rx="10" fill="#331133" stroke="#ff00ff" />
        <text x="190" y="80" fill="#ffffff" font-weight="bold" text-anchor="middle">더블룸(2인)</text>
        <circle cx="175" cy="120" r="10" fill="#fff" />
        <circle cx="205" cy="120" r="10" fill="#fff" />
        <text x="190" y="180" fill="#ff00ff" font-weight="bold" text-anchor="middle" filter="url(#glow)">₃C₂</text>

        <text x="245" y="115" fill="#fff" font-size="20">×</text>

        <!-- Room 3 (1 person) -->
        <rect x="260" y="60" width="80" height="100" rx="10" fill="#331133" stroke="#ff00ff" />
        <text x="300" y="80" fill="#ffffff" font-weight="bold" text-anchor="middle">싱글(1인)</text>
        <circle cx="300" cy="120" r="10" fill="#fff" />
        <text x="300" y="180" fill="#ff00ff" font-weight="bold" text-anchor="middle" filter="url(#glow)">₁C₁</text>

        <!-- Conclusion 1 -->
        <rect x="20" y="210" width="330" height="50" rx="5" fill="#000" stroke="#ff00ff" />
        <text x="185" y="230" fill="#ffffff" font-size="14" text-anchor="middle">방 이름표 역할(식별 가능) 하므로 거품 없음.</text>
        <text x="185" y="250" fill="#ffaa00" font-weight="bold" text-anchor="middle">단순 연속 연산: 6C3 × 3C2 × 1C1</text>
    </g>

    <!-- Right Side: Anonymous/Indistinguishable Rooms -->
    <g transform="translate(470, 150)">
        <rect x="0" y="0" width="370" height="280" rx="15" fill="#001a11" stroke="#00ffcc" stroke-width="3" />
        <text x="185" y="30" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">상황 2: 방 크기가 동일한 경우 (버그 발생)</text>

        <!-- Room A (2 people) -->
        <rect x="20" y="60" width="90" height="100" rx="10" fill="#003322" stroke="#00ffcc" />
        <text x="65" y="80" fill="#aaaaaa" font-weight="bold" text-anchor="middle">이름없음(2)</text>
        <circle cx="50" cy="120" r="10" fill="#00ffcc" />
        <circle cx="80" cy="120" r="10" fill="#00ffcc" />
        <text x="65" y="180" fill="#ffff00" font-weight="bold" text-anchor="middle">₆C₂</text>

        <text x="125" y="115" fill="#fff" font-size="20">×</text>

        <!-- Room B (2 people) -->
        <rect x="140" y="60" width="90" height="100" rx="10" fill="#003322" stroke="#00ffcc" />
        <text x="185" y="80" fill="#aaaaaa" font-weight="bold" text-anchor="middle">이름없음(2)</text>
        <circle cx="170" cy="120" r="10" fill="#00ffcc" />
        <circle cx="200" cy="120" r="10" fill="#00ffcc" />
        <text x="185" y="180" fill="#ffff00" font-weight="bold" text-anchor="middle">₄C₂</text>

        <text x="245" y="115" fill="#fff" font-size="20">×</text>

        <!-- Room C (2 people) -->
        <rect x="260" y="60" width="90" height="100" rx="10" fill="#003322" stroke="#00ffcc" />
        <text x="305" y="80" fill="#aaaaaa" font-weight="bold" text-anchor="middle">이름없음(2)</text>
        <circle cx="290" cy="120" r="10" fill="#00ffcc" />
        <circle cx="320" cy="120" r="10" fill="#00ffcc" />
        <text x="305" y="180" fill="#ffff00" font-weight="bold" text-anchor="middle">₂C₂</text>

        <!-- The Shuffle Overlay (Bug) -->
        <path d="M 30 145 Q 185 165 340 145" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="4 2"
            marker-end="url(#arrow_w)" />
        <path d="M 340 135 Q 185 115 30 135" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="4 2"
            marker-end="url(#arrow_w)" />

        <text x="185" y="145" fill="#ff5555" font-weight="bold" font-size="14" text-anchor="middle"
            filter="url(#glow)">방 3개가 서로 자리바꾸는 중복 발생 (3!)</text>

        <!-- Conclusion 2 -->
        <rect x="20" y="210" width="330" height="50" rx="5" fill="#000" stroke="#00ffcc" />
        <text x="185" y="230" fill="#ffffff" font-size="14" text-anchor="middle">구별 불가한 방 3개가 섞이므로 거품 타파!</text>
        <text x="185" y="250" fill="#00ffcc" font-weight="bold" text-anchor="middle">연산 최적화: (6C2 × 4C2 × 2C2) ÷
            3!</text>
    </g>

    <defs>
        <marker id="arrow_w" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ffffff" />
        </marker>
    </defs>

    <!-- Big Alert Bottom -->
    <rect x="100" y="470" width="700" height="80" rx="10" fill="#1b1100" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="505" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        분할(Partition) 의 본질: 속성(크기) 이 완벽히 <tspan fill="#ffff00" font-weight="bold">동일한 그룹이 K개</tspan> 만들어지면,
    </text>
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        그 유령 자루들이 배열되는 환영을 파괴하기 위해 기계적으로 <tspan fill="#ff5555" font-weight="bold">" ÷ K! "</tspan> 을 강제 집행한다.
    </text>
</svg>