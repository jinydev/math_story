<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">리미트(lim) 무스비 찢기: 극한값의 사칙연산 분배</text>
    <text x="450" y="80" fill="#ffaa00" font-family="sans-serif" font-size="16" text-anchor="middle">(주의: 두 몬스터가 모두 "안전한
        상수로 수렴할 때만" 발동 가능!)</text>

    <!-- Left: Original Clumped Formula -->
    <g transform="translate(100, 150)">
        <!-- Outer Limit Shell -->
        <rect x="0" y="0" width="280" height="250" rx="20" fill="#1b1122" stroke="#ff0055" stroke-width="4"
            stroke-dasharray="10 5" filter="url(#glow)" />

        <text x="140" y="60" fill="#ff0055" font-family="serif" font-size="50" font-weight="bold" text-anchor="middle"
            filter="url(#glow)">lim</text>
        <text x="140" y="90" fill="#ff55aa" font-family="sans-serif" font-size="18" text-anchor="middle">n → ∞</text>

        <!-- Internal Monsters -->
        <text x="140" y="160" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">
            (<tspan fill="#4da6ff">A</tspan>
            <tspan fill="#ffff00">×</tspan>
            <tspan fill="#00ffcc">B</tspan>)
        </text>

        <text x="140" y="210" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">함수끼리 지저분하게 믹스된
            상태</text>
    </g>

    <!-- The Magic Arrow -->
    <path d="M 400 280 L 480 280" stroke="#ffff00" stroke-width="8" marker-end="url(#arrow_y)" filter="url(#glow)" />
    <text x="440" y="260" fill="#ffff00" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">스펠 분배 폭격!</text>
    <text x="440" y="320" fill="#ffff00" font-family="sans-serif" font-size="14" text-anchor="middle">(사칙연산 복제)</text>

    <!-- Right: Distributed Formula -->
    <g transform="translate(520, 150)">

        <!-- Monster A gets its own limit -->
        <rect x="0" y="30" width="130" height="190" rx="15" fill="#0d1b2a" stroke="#4da6ff" stroke-width="3" />
        <text x="65" y="90" fill="#4da6ff" font-family="serif" font-size="34" font-weight="bold" text-anchor="middle"
            filter="url(#glow)">lim</text>
        <text x="65" y="160" fill="#4da6ff" font-family="monospace" font-size="46" font-weight="bold"
            text-anchor="middle">A</text>

        <!-- Operator stays untouched -->
        <text x="160" y="150" fill="#ffff00" font-family="sans-serif" font-size="50" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">×</text>

        <!-- Monster B gets its own limit -->
        <rect x="190" y="30" width="130" height="190" rx="15" fill="#002222" stroke="#00ffcc" stroke-width="3" />
        <text x="255" y="90" fill="#00ffcc" font-family="serif" font-size="34" font-weight="bold" text-anchor="middle"
            filter="url(#glow)">lim</text>
        <text x="255" y="160" fill="#00ffcc" font-family="monospace" font-size="46" font-weight="bold"
            text-anchor="middle">B</text>

        <path d="M 65 240 L 65 270" stroke="#4da6ff" stroke-width="4" marker-end="url(#arrow_b)" />
        <text x="65" y="300" fill="#4da6ff" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">3</text>

        <path d="M 255 240 L 255 270" stroke="#00ffcc" stroke-width="4" marker-end="url(#arrow_c)" />
        <text x="255" y="300" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">5</text>

    </g>

    <!-- Total Result -->
    <rect x="520" y="470" width="320" height="70" rx="10" fill="#221111" stroke="#ff00ff" stroke-width="2" />
    <text x="590" y="515" fill="#ffffff" font-family="monospace" font-size="34" font-weight="bold">
        3 <tspan fill="#ffff00">×</tspan> 5 = <tspan fill="#ff00ff" filter="url(#glow)">15</tspan>
    </text>
    <text x="590" y="490" fill="#ff55aa" font-family="sans-serif" font-size="14">최종 폭발 한계 락다운 종착역 정답!</text>

    <defs>
        <marker id="arrow_y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
        </marker>
        <marker id="arrow_b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#4da6ff" />
        </marker>
        <marker id="arrow_c" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#00ffcc" />
        </marker>
    </defs>

    <rect x="100" y="470" width="350" height="70" rx="10" fill="#0f0f15" stroke="#ffffff" stroke-width="2" />
    <text x="275" y="500" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        리미트는 <tspan fill="#ff0055" font-weight="bold">+ - × ÷</tspan> 가리지 않고
    </text>
    <text x="275" y="525" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        각 파츠별로 껍데기를 깨고 분배, 침투 복제됩니다!
    </text>
</svg>