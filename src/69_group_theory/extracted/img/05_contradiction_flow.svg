<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .box {
                fill: #161b22;
                stroke: #30363d;
                stroke-width: 3;
                rx: 10;
                ry: 10;
            }

            .box-error {
                fill: rgba(255, 0, 0, 0.2);
                stroke: #ff0000;
                stroke-width: 4;
                rx: 10;
                ry: 10;
            }

            .box-success {
                fill: rgba(0, 255, 0, 0.2);
                stroke: #00ff00;
                stroke-width: 4;
                rx: 10;
                ry: 10;
            }

            .text-main {
                fill: #ffffff;
                font-size: 20px;
                text-anchor: middle;
                alignment-baseline: central;
            }

            .text-sub {
                fill: #aaaaaa;
                font-size: 14px;
                text-anchor: middle;
            }

            .arrow {
                fill: none;
                stroke: #00ffff;
                stroke-width: 4;
                marker-end: url(#arrowhead);
            }
        </style>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#00ffff" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="400" y="40" class="title">배수진의 극의: 귀류법 (Proof by Contradiction)</text>
    <text x="400" y="65" class="desc">결론을 부정하여 스스로 모순(에러)에 빠지게 만들어 원래 명제의 참을 증명하는 기법</text>

    <!-- Step 1 -->
    <g transform="translate(150, 150)">
        <rect x="-120" y="-40" width="240" height="80" class="box" />
        <text x="0" y="-15" fill="#ffaa44" font-size="16" text-anchor="middle">Step 1: 억지 부정 (가정)</text>
        <text x="0" y="15" class="text-main">결론(q)이 거짓이다!</text>
        <text x="0" y="45" class="text-sub">(&#8730;2 는 유리수다! 라고 우김)</text>
    </g>

    <path d="M 280 150 L 360 150" class="arrow" />

    <!-- Step 2 -->
    <g transform="translate(500, 150)">
        <rect x="-120" y="-40" width="240" height="80" class="box" />
        <text x="0" y="-15" fill="#00ffff" font-size="16" text-anchor="middle">Step 2: 논리 전개</text>
        <text x="0" y="15" class="text-main">억지 가정을 바탕으로</text>
        <text x="0" y="40" class="text-main">수학 식을 쭉 풀어봄</text>
    </g>

    <path d="M 500 200 L 500 270" class="arrow" />

    <!-- Step 3 -->
    <g transform="translate(500, 330)">
        <rect x="-140" y="-50" width="280" height="100" class="box-error" />
        <text x="0" y="-20" fill="#ffff00" font-size="18" text-anchor="middle">Step 3: 치명적 낭떠러지</text>
        <text x="0" y="10" class="text-main" fill="#ff6464" font-size="24" font-weight="bold">모순 (Contradiction)
            폭발!</text>
        <text x="0" y="40" class="text-sub" fill="#ffaa44">"서로소가 아닌데 서로소라고?!" 에러 발생</text>
    </g>

    <path d="M 350 330 L 280 330" class="arrow" />

    <!-- Step 4 -->
    <g transform="translate(150, 330)">
        <rect x="-120" y="-50" width="240" height="100" class="box-success" />
        <text x="0" y="-20" fill="#00ff00" font-size="18" text-anchor="middle">Step 4: 오리지널 승리</text>
        <text x="0" y="10" class="text-main" fill="#ffffff" font-size="22">부정이 틀렸으므로,</text>
        <text x="0" y="40" class="text-main" fill="#00ff00" font-size="24" font-weight="bold">원래 결론(q)은 참!</text>
    </g>

</svg>