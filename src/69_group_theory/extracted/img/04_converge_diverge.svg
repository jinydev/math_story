<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="40" fill="#ffffff" font-family="sans-serif" font-size="30" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">무한급수의 생사 판독기: 발산(Divergence) vs 수렴(Convergence)</text>

    <!-- Box 1: Exploding Diverge -->
    <g transform="translate(50, 80)">
        <rect x="0" y="0" width="800" height="130" rx="10" fill="#1b0000" stroke="#ff0055" stroke-width="3" />

        <text x="30" y="40" fill="#ff0055" font-family="sans-serif" font-size="26" font-weight="bold"
            filter="url(#glow)">☠️ 발산 폭파 (Diverge)</text>
        <text x="30" y="65" fill="#ff5588" font-family="sans-serif" font-size="16">렌더링 값이 한없이 우주 밖으로 날아가거나 진동하여 에러를 뿜는
            상태</text>

        <!-- Cases -->
        <text x="30" y="105" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold">
            [케이스1] 더 세져! <tspan fill="#ffaaaa">1 + 10 + 100 + 1000 ...</tspan>
            <tspan fill="#ff0000" font-family="sans-serif">→ 무한대 (∞)</tspan>
        </text>
        <text x="450" y="105" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold">
            [케이스2] 똑같애! <tspan fill="#ffaaaa">2 + 2 + 2 + 2 ...</tspan>
            <tspan fill="#ff0000" font-family="sans-serif">→ 무한대 (∞)</tspan>
        </text>
    </g>

    <!-- Box 2: Oscillation Diverge -->
    <g transform="translate(50, 230)">
        <rect x="0" y="0" width="800" height="100" rx="10" fill="#2d1100" stroke="#ff8800" stroke-width="3" />

        <text x="30" y="40" fill="#ffaa00" font-family="sans-serif" font-size="24" font-weight="bold"
            filter="url(#glow)">⚠️ 진동 발산 (Oscillation Diverge)</text>
        <text x="30" y="65" fill="#ffccaa" font-family="sans-serif" font-size="16">부호가 와리가리 흔들려 어느 한 곳에 얼어붙지(수렴하지) 못하는
            치명적 에러!</text>

        <text x="30" y="85" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            transform="translate(420, 0)">
            [역주행 와리가리] <tspan fill="#ffffaa">1 - 1 + 1 - 1 + 1 ...</tspan>
            <tspan fill="#ffaa00" font-family="sans-serif">→ [ 버그 / 정답 불가 ]</tspan>
        </text>
    </g>


    <!-- Box 3: Peaceful Converge -->
    <g transform="translate(50, 350)">
        <rect x="0" y="0" width="800" height="160" rx="10" fill="#001122" stroke="#00ffcc" stroke-width="4"
            filter="url(#glow)" />

        <text x="30" y="40" fill="#00ffcc" font-family="sans-serif" font-size="28" font-weight="bold"
            filter="url(#glow)">✅ 얼어붙는 평화: 수렴 (Convergence)</text>
        <text x="30" y="70" fill="#4da6ff" font-family="sans-serif" font-size="18">뒤로 갈수록 얹어지는 숫자 쪼가리가 제로 픽셀 단위로 산화, 단단한
            유리 천장(상수 한계점 Limit)에 명중!</text>

        <!-- Condition -->
        <g transform="translate(30, 110)">
            <rect x="0" y="0" width="220" height="40" rx="5" fill="#112d44" stroke="#4da6ff" />
            <text x="110" y="26" fill="#ffff00" font-family="monospace" font-size="22" font-weight="bold"
                text-anchor="middle" filter="url(#glow)">| r | &lt; 1</text>
        </g>

        <text x="270" y="135" fill="#ffffff" font-family="monospace" font-size="22" font-weight="bold">
            <tspan fill="#00ffcc">1 + 1/2 + 1/4 + 1/8 ...</tspan>
            <tspan fill="#00ffcc" font-family="sans-serif">→ 벽돌처럼 딱 '2' 로 얼어붙음!</tspan>
        </text>
    </g>

    <!-- Hint Footer -->
    <text x="450" y="550" fill="#aaaaaa" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">
        무한급수가 록다운(수렴) 하려면 더하는 놈이 갈수록 무조건 작아지는 <tspan fill="#ffff00">반갈죽 먼지 (비율 절대값 &lt; 1)</tspan> 여야만 탈락 면제!
    </text>
</svg>