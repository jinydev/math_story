<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4d4d" />
        </marker>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">등비수열 (Geometric Sequence) - 기하급수적 성장</text>

    <!-- Number Line / Sequence Boxes (Scaling Up) -->
    <g transform="translate(100, 200)">

        <!-- Box 1 -->
        <rect x="0" y="-20" width="40" height="40" rx="5" fill="#223344" stroke="#4da6ff" stroke-width="2"
            filter="url(#glow)" />
        <text x="20" y="6" fill="#4da6ff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">1</text>
        <text x="20" y="50" fill="#aaaaaa" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">첫째항</text>

        <!-- Arrow 1 to 2 -->
        <path d="M 50 0 Q 90 -40 130 0" fill="none" stroke="#ff4d4d" stroke-width="4" stroke-dasharray="8"
            marker-end="url(#arrow)" />
        <rect x="65" y="-55" width="50" height="25" rx="5" fill="#2b1111" stroke="#ff4d4d" stroke-width="2" />
        <text x="90" y="-38" fill="#ff4d4d" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">× 3</text>
        <text x="90" y="-65" fill="#ff4d4d" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">공비(r)</text>

        <!-- Box 2 -->
        <rect x="150" y="-30" width="60" height="60" rx="10" fill="#223344" stroke="#4da6ff" stroke-width="3"
            filter="url(#glow)" />
        <text x="180" y="10" fill="#4da6ff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">3</text>
        <text x="180" y="60" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">제 2항</text>

        <!-- Arrow 2 to 3 -->
        <path d="M 230 0 Q 280 -50 330 0" fill="none" stroke="#ff4d4d" stroke-width="5" stroke-dasharray="8"
            marker-end="url(#arrow)" />
        <rect x="255" y="-65" width="50" height="25" rx="5" fill="#2b1111" stroke="#ff4d4d" stroke-width="2" />
        <text x="280" y="-48" fill="#ff4d4d" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">× 3</text>
        <text x="280" y="-75" fill="#ff4d4d" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">공비(r)</text>

        <!-- Box 3 -->
        <rect x="360" y="-45" width="90" height="90" rx="15" fill="#223344" stroke="#4da6ff" stroke-width="4"
            filter="url(#glow)" />
        <text x="405" y="15" fill="#4da6ff" font-family="monospace" font-size="45" font-weight="bold"
            text-anchor="middle">9</text>
        <text x="405" y="75" fill="#aaaaaa" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">제 3항</text>

        <!-- Arrow 3 to 4 -->
        <path d="M 470 0 Q 530 -60 590 0" fill="none" stroke="#ff4d4d" stroke-width="7" stroke-dasharray="8"
            marker-end="url(#arrow)" />
        <rect x="505" y="-75" width="50" height="25" rx="5" fill="#2b1111" stroke="#ff4d4d" stroke-width="2" />
        <text x="530" y="-58" fill="#ff4d4d" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">× 3</text>
        <text x="530" y="-85" fill="#ff4d4d" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">공비(r)</text>

        <!-- Box 4 -->
        <rect x="620" y="-60" width="120" height="120" rx="20" fill="#223344" stroke="#4da6ff" stroke-width="5"
            filter="url(#glow)" />
        <text x="680" y="20" fill="#4da6ff" font-family="monospace" font-size="60" font-weight="bold"
            text-anchor="middle">27</text>
        <text x="680" y="90" fill="#aaaaaa" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">제 4항</text>

    </g>

    <!-- Explanation Text -->
    <rect x="200" y="320" width="400" height="60" rx="10" fill="#2b1111" stroke="#ff4d4d" stroke-width="2" />
    <text x="400" y="345" fill="#ffffff" font-family="monospace" font-size="22" font-weight="bold"
        text-anchor="middle">일반항 = 첫째항 × 공비(r)^(n-1)</text>
    <text x="400" y="370" fill="#ff4d4d" font-family="monospace" font-size="22" font-weight="bold"
        text-anchor="middle">a_n = 1 × 3^(n-1)</text>

</svg>