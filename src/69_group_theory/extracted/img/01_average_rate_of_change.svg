<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">평균 변화율 (Average Rate of Change) 렌더링</text>

    <!-- Graph Background -->
    <g transform="translate(100, 100)">
        <!-- Grid -->
        <path d="M0,100 L700,100 M0,200 L700,200 M0,300 L700,300 M0,400 L700,400" stroke="#222" stroke-width="1" />
        <path d="M100,0 L100,450 M300,0 L300,450 M500,0 L500,450 M700,0 L700,450" stroke="#222" stroke-width="1" />

        <!-- Axes -->
        <line x1="0" y1="400" x2="750" y2="400" stroke="#00ffcc" stroke-width="3" />
        <text x="730" y="425" fill="#00ffcc" font-family="monospace" font-size="18">X 시간</text>

        <line x1="50" y1="450" x2="50" y2="0" stroke="#00ffcc" stroke-width="3" />
        <text x="30" y="-10" fill="#00ffcc" font-family="monospace" font-size="18">Y 고도</text>

        <!-- Parabola y = x^2 curve -->
        <path d="M 50 400 Q 250 380 550 50" fill="none" stroke="#ff0055" stroke-width="6" filter="url(#glow)" />
        <text x="560" y="40" fill="#ff0055" font-family="monospace" font-size="20">y = f(x)</text>

        <!-- Start Point A -->
        <circle cx="150" cy="380" r="8" fill="#ffff00" stroke="#fff" stroke-width="2" />
        <text x="130" y="360" fill="#ffff00" font-family="sans-serif" font-size="18" font-weight="bold">서울(출발지 A)</text>

        <!-- End Point B -->
        <circle cx="450" cy="140" r="8" fill="#ffff00" stroke="#fff" stroke-width="2" />
        <text x="400" y="120" fill="#ffff00" font-family="sans-serif" font-size="18" font-weight="bold">부산(도착지 B)</text>

        <!-- Secant Line (Hal-seon) -->
        <line x1="50" y1="460" x2="550" y2="60" stroke="#4da6ff" stroke-width="4" stroke-dasharray="10 5"
            filter="url(#glow)" />
        <text x="210" y="220" fill="#4da6ff" font-family="sans-serif" font-size="24" font-weight="bold"
            transform="rotate(-38, 210, 220)">두 점을 뚫는 할선 (Secant Line)</text>

        <!-- Delta X, Delta Y triangle -->
        <line x1="150" y1="380" x2="450" y2="380" stroke="#ffff00" stroke-width="3" stroke-dasharray="5 5" />
        <line x1="450" y1="380" x2="450" y2="140" stroke="#ffff00" stroke-width="3" stroke-dasharray="5 5" />

        <text x="300" y="400" fill="#ffff00" font-family="monospace" font-size="20" font-weight="bold">Δx (시간의
            변화량)</text>
        <text x="465" y="270" fill="#ffff00" font-family="monospace" font-size="20" font-weight="bold">Δy (고도의
            변화량)</text>

        <!-- Equation Box -->
        <rect x="40" y="20" width="220" height="100" rx="10" fill="#0d1a26" stroke="#00ffcc" stroke-width="2" />
        <text x="60" y="50" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold">평균 변화율 공식</text>
        <text x="80" y="80" fill="#00ffcc" font-family="monospace" font-size="22" font-weight="bold">Δy / Δx</text>
        <text x="80" y="105" fill="#aaaaaa" font-family="sans-serif" font-size="14">(할선의 기울기)</text>

    </g>
</svg>