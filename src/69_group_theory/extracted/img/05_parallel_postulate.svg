<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">우주적 시한폭탄: 제5공준 (평행선 공준)</text>

    <!-- System 1: Parallel (Never meet) -->
    <g transform="translate(150, 150)">
        <rect x="0" y="0" width="600" height="150" rx="15" fill="#112233" stroke="#00ffcc" stroke-width="3" />
        <text x="300" y="35" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">정상 궤도: 양쪽 내각의 합이 정확히 180° = "절대 충돌 안 함"</text>

        <!-- Top Line -->
        <line x1="50" y1="70" x2="550" y2="70" stroke="#ffffff" stroke-width="4" filter="url(#glow)" />
        <!-- Bottom Line -->
        <line x1="50" y1="120" x2="550" y2="120" stroke="#ffffff" stroke-width="4" filter="url(#glow)" />

        <!-- Transversal Line -->
        <line x1="250" y1="40" x2="350" y2="150" stroke="#4da6ff" stroke-width="3" />

        <!-- Angles -->
        <!-- Top internal angle (left) -->
        <path d="M 285 70 A 30 30 0 0 0 268 90" fill="none" stroke="#ffff00" stroke-width="3" />
        <text x="250" y="85" fill="#ffff00" font-family="sans-serif" font-size="14" font-weight="bold">a</text>

        <!-- Bottom internal angle (left) -->
        <path d="M 335 120 A 30 30 0 0 1 318 100" fill="none" stroke="#ffff00" stroke-width="3" />
        <text x="295" y="115" fill="#ffff00" font-family="sans-serif" font-size="14" font-weight="bold">b</text>

        <!-- Equation -->
        <rect x="420" y="80" width="120" height="30" rx="5" fill="#222" />
        <text x="480" y="100" fill="#ffff00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">a + b = 180°</text>
    </g>

    <!-- System 2: Non-Parallel (Will meet) -->
    <g transform="translate(150, 350)">
        <rect x="0" y="0" width="600" height="200" rx="15" fill="#331111" stroke="#ff0055" stroke-width="3"
            filter="url(#glow)" />
        <text x="300" y="35" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">위험 궤도: 내각의 합이 180° 미만! = "결국 교차(충돌)한다!"</text>

        <!-- Top Line (tilted down) -->
        <line x1="50" y1="60" x2="450" y2="120" stroke="#ff0055" stroke-width="4" filter="url(#glow)" />
        <!-- Extension (dashed) -->
        <line x1="450" y1="120" x2="550" y2="135" stroke="#ff0055" stroke-width="4" stroke-dasharray="8 4"
            opacity="0.5" />

        <!-- Bottom Line (straight horizontal) -->
        <line x1="50" y1="135" x2="450" y2="135" stroke="#ffffff" stroke-width="4" />
        <!-- Extension -->
        <line x1="450" y1="135" x2="550" y2="135" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 4"
            opacity="0.5" />

        <!-- Transversal Line -->
        <line x1="200" y1="40" x2="200" y2="180" stroke="#4da6ff" stroke-width="3" />

        <!-- Angles -->
        <!-- Top internal right -->
        <!-- The origin is x=200, y=82.5 -->
        <path d="M 200 102.5 A 20 20 0 0 0 220 85" fill="none" stroke="#ffff00" stroke-width="3" />
        <text x="215" y="105" fill="#ffff00" font-family="sans-serif" font-size="14" font-weight="bold">a'</text>

        <!-- Bottom internal right -->
        <!-- Origin x=200, y=135 -->
        <path d="M 200 115 A 20 20 0 0 1 220 135" fill="none" stroke="#ffff00" stroke-width="3" />
        <polyline points="200,115 220,115 220,135" fill="none" stroke="#ffff00" stroke-width="1" />
        <text x="215" y="125" fill="#ffff00" font-family="sans-serif" font-size="14" font-weight="bold">90°</text>

        <!-- Crash prediction -->
        <circle cx="550" cy="135" r="30" fill="#ffff00" opacity="0.3" filter="url(#glow)" />
        <circle cx="550" cy="135" r="10" fill="#ffffff" filter="url(#glow)" />
        <text x="550" y="180" fill="#ffff00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">우주 저편 충돌 발생!</text>

        <!-- Equation -->
        <rect x="50" y="80" width="120" height="30" rx="5" fill="#222" />
        <text x="110" y="100" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">a' + 90 &lt; 180°</text>
    </g>

</svg>