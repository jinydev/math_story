<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">은행 단말기 해킹: 파이썬 PMT 주택담보대출 스캐너</text>

    <!-- Target Info -->
    <g transform="translate(100, 100)">
        <rect x="0" y="0" width="300" height="180" rx="15" fill="#221122" stroke="#ff0055" stroke-width="2" />
        <text x="150" y="35" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">내게 떨어진 빚(Mortgage)</text>
        <line x1="20" y1="50" x2="280" y2="50" stroke="#555" />

        <text x="30" y="85" fill="#ffffff" font-family="monospace" font-size="16">원금(PV) = 5억 원</text>
        <text x="30" y="115" fill="#ffffff" font-family="monospace" font-size="16">기간(n) = 30년 (360개월)</text>
        <text x="30" y="145" fill="#ffffff" font-family="monospace" font-size="16">이율(r) = 연 4%</text>
    </g>

    <!-- PMT Function Machine -->
    <g transform="translate(450, 100)">
        <!-- Data link -->
        <path d="M -50 90 L 10 90" stroke="#00ffcc" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)" />

        <rect x="0" y="0" width="350" height="180" rx="15" fill="#112233" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="175" y="40" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">numpy_financial.pmt()</text>
        <line x1="20" y1="60" x2="330" y2="60" stroke="#555" />

        <text x="20" y="95" fill="#aaaaaa" font-family="sans-serif" font-size="14">Input Parameters:</text>
        <text x="40" y="120" fill="#ffff00" font-family="monospace" font-size="14">rate = 0.04 / 12</text>
        <text x="40" y="145" fill="#ffff00" font-family="monospace" font-size="14">nper = 360</text>
        <text x="40" y="170" fill="#ffff00" font-family="monospace" font-size="14">pv = 500,000,000</text>
    </g>

    <!-- Output Processing Downwards -->
    <path d="M 625 280 L 625 320" stroke="#ff0055" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)" />

    <!-- Output Result -->
    <g transform="translate(450, 320)">
        <rect x="0" y="0" width="350" height="100" rx="15" fill="#331111" stroke="#ff0055" stroke-width="3"
            filter="url(#glow)" />
        <text x="175" y="35" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">매달 내야 할 영끌 할부금
            (Return)</text>
        <text x="175" y="75" fill="#ff0055" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">- 2,387,078 원</text>
    </g>

    <!-- Hidden Truth Section -->
    <rect x="100" y="450" width="700" height="100" rx="15" fill="#221122" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="480" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">💡 자본주의 팩트 리포트 스캔 완료!</text>
    <text x="450" y="510" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">238만 원씩 360개월(30년)
        = 은행에 꼴아박는 총액: 8억 6천만 원</text>
    <text x="450" y="535" fill="#ff0055" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">내 원금 5억을 뺀 "순수 이자 헌납액"만 무려 3억 6천만 원!</text>

    <!-- Graphic representation of pie chart -->
    <g transform="translate(250, 370)">
        <circle cx="0" cy="0" r="50" fill="#00ffcc" opacity="0.6" />
        <!-- Roughly 3.6/8.6 is 42% -->
        <path d="M 0 0 L 0 -50 A 50 50 0 0 1 48 14 Z" fill="#ff0055" opacity="0.8" />
        <text x="-15" y="10" fill="#000" font-family="sans-serif" font-size="12" font-weight="bold">원금</text>
        <text x="15" y="-15" fill="#fff" font-family="sans-serif" font-size="12" font-weight="bold">이자!</text>
    </g>

</svg>