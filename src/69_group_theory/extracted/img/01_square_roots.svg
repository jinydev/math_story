<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
        <marker id="arrow_rev" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4d4d" />
        </marker>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">제곱근(Square Root): 면적에서 뿌리(변의 길이)로 역추적</text>

    <!-- Left: Area 9 Square -->
    <g transform="translate(100, 150)">
        <!-- The physical square representation -->
        <rect x="0" y="0" width="200" height="200" fill="#2d2d44" stroke="#ff4d4d" stroke-width="4"
            stroke-dasharray="10" filter="url(#glow)" />
        <!-- Grid lines inside 3x3 -->
        <path d="M 66.6 0 L 66.6 200 M 133.3 0 L 133.3 200" stroke="#ff4d4d" stroke-width="1" opacity="0.3" />
        <path d="M 0 66.6 L 200 66.6 M 0 133.3 L 200 133.3" stroke="#ff4d4d" stroke-width="1" opacity="0.3" />

        <text x="100" y="90" fill="#aaaaaa" font-family="sans-serif" font-size="20" text-anchor="middle">결과물
            (Area)</text>
        <text x="100" y="130" fill="#ff4d4d" font-family="monospace" font-size="48" font-weight="bold"
            text-anchor="middle">9</text>
    </g>

    <!-- Right: Side length 3 -->
    <g transform="translate(550, 200)">
        <line x1="0" y1="0" x2="0" y2="100" stroke="#00ffcc" stroke-width="6" filter="url(#glow)" />

        <text x="50" y="40" fill="#aaaaaa" font-family="sans-serif" font-size="20" text-anchor="middle">뿌리 (Root)</text>
        <text x="50" y="80" fill="#00ffcc" font-family="monospace" font-size="48" font-weight="bold"
            text-anchor="middle">3</text>
    </g>

    <!-- Arrows -->

    <!-- Forward Arrow (Squaring) -->
    <path d="M 520 280 Q 400 350 320 280" fill="none" stroke="#ff4d4d" stroke-width="3" marker-end="url(#arrow_rev)" />
    <text x="420" y="350" fill="#ff4d4d" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">제곱 (x²)</text>
    <text x="420" y="375" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">3 × 3 = 9</text>

    <!-- Reverse Arrow (Square Root) -->
    <path d="M 320 180 Q 400 100 520 180" fill="none" stroke="#00ffcc" stroke-width="6" marker-end="url(#arrow)"
        filter="url(#glow)" />
    <text x="420" y="100" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
        text-anchor="middle">제곱근 (√)</text>
    <text x="420" y="130" fill="#aaaaaa" font-family="monospace" font-size="28" font-weight="bold"
        text-anchor="middle">√9 = 3</text>

</svg>