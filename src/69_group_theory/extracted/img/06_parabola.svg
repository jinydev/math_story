<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .axis {
                stroke: #555555;
                stroke-width: 2;
            }

            .curve-smile {
                stroke: #00ffff;
                stroke-width: 4;
                fill: none;
            }

            .curve-frown {
                stroke: #ff3366;
                stroke-width: 4;
                fill: none;
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .box {
                fill: #161b22;
                stroke: #30363d;
                stroke-width: 2;
                rx: 10;
                ry: 10;
            }

            .label-smile {
                font-size: 20px;
                fill: #00ffff;
                text-anchor: middle;
            }

            .label-frown {
                font-size: 20px;
                fill: #ff3366;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="400" y="40" class="title">이차함수와 포물선 (Parabola) 형태</text>

    <rect x="50" y="80" width="330" height="380" class="box" />
    <rect x="420" y="80" width="330" height="380" class="box" />

    <!-- Left Side: Smile (a > 0) -->
    <g transform="translate(215, 380)">
        <!-- Axes -->
        <line x1="-150" y1="0" x2="150" y2="0" class="axis" />
        <line x1="0" y1="-280" x2="0" y2="50" class="axis" />

        <!-- Parabola y = x^2 -->
        <!-- d="M -100 -200 Q 0 200 100 -200" roughly forming a U shape -->
        <path d="M -120 -250 Q 0 100 120 -250" class="curve-smile" />

        <circle cx="0" cy="0" r="6" fill="#00ffff" />
        <text x="0" y="30" fill="#aaaaaa" font-size="14" text-anchor="middle">꼭짓점 (Vertex)</text>

        <text x="0" y="-230" class="label-smile">y = ax² (a > 0)</text>
        <text x="0" y="-190" fill="#ffffff" font-size="40" text-anchor="middle">😊</text>
        <text x="0" y="-150" fill="#aaaaaa" font-size="16" text-anchor="middle">아래로 볼록 (웃는 입모양)</text>
    </g>

    <!-- Right Side: Frown (a < 0) -->
    <g transform="translate(585, 130)">
        <!-- Axes -->
        <line x1="-150" y1="0" x2="150" y2="0" class="axis" />
        <line x1="0" y1="-50" x2="0" y2="280" class="axis" />

        <!-- Parabola y = -x^2 -->
        <path d="M -120 250 Q 0 -100 120 250" class="curve-frown" />

        <circle cx="0" cy="0" r="6" fill="#ff3366" />
        <text x="0" y="-15" fill="#aaaaaa" font-size="14" text-anchor="middle">꼭짓점 (Vertex)</text>

        <text x="0" y="240" class="label-frown">y = -ax² (a &lt; 0)</text>
        <text x="0" y="190" fill="#ffffff" font-size="40" text-anchor="middle">☹️</text>
        <text x="0" y="140" fill="#aaaaaa" font-size="16" text-anchor="middle">위로 볼록 (우산, 찡그린 입)</text>
    </g>

</svg>