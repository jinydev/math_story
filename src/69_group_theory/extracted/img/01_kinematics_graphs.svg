<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">키네마틱스 동기화 렌더링: 위치 x(t) 와 속도 v(t)</text>

    <!-- Split Screen vertically (Top: Position, Bottom: Velocity) -->

    <!-- Top graph: Position x(t) -->
    <g transform="translate(100, 80)">
        <rect x="0" y="0" width="700" height="200" rx="15" fill="#0d141e" stroke="#4da6ff" stroke-width="3" />
        <text x="350" y="30" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">위치 곡선 x(t)</text>

        <!-- Axes -->
        <line x1="50" y1="160" x2="650" y2="160" stroke="#334455" stroke-width="2" />
        <line x1="100" y1="40" x2="100" y2="180" stroke="#334455" stroke-width="2" />
        <text x="660" y="165" fill="#aaaaaa" font-family="monospace" font-size="14">시간 t</text>
        <text x="85" y="35" fill="#aaaaaa" font-family="monospace" font-size="14">위치 x</text>

        <!-- Position Curve: Starts at origin, goes up to peak, goes down -->
        <!-- Peak around x=350 -->
        <path d="M 100 160 Q 225 30 350 40 T 600 160" fill="none" stroke="#4da6ff" stroke-width="6"
            filter="url(#glow)" />

        <!-- Tangent lines -->
        <!-- Positive slope -->
        <line x1="180" y1="120" x2="280" y2="50" stroke="#ffaa00" stroke-width="3" stroke-dasharray="5 5" />
        <circle cx="230" cy="85" r="6" fill="#ffaa00" />
        <text x="180" y="75" fill="#ffaa00" font-family="monospace" font-size="16" font-weight="bold">v > 0</text>

        <!-- Zero slope -->
        <line x1="300" y1="40" x2="400" y2="40" stroke="#ff0055" stroke-width="4" filter="url(#glow)" />
        <circle cx="350" cy="40" r="8" fill="#ff0055" />
        <text x="350" y="25" fill="#ff0055" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">v = 0 (정점)</text>

        <!-- Negative slope -->
        <line x1="430" y1="50" x2="530" y2="110" stroke="#00ffcc" stroke-width="3" stroke-dasharray="5 5" />
        <circle cx="480" cy="80" r="6" fill="#00ffcc" />
        <text x="510" y="70" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold">v &lt; 0</text>

    </g>

    <!-- Synchronization vertical dashed line -->
    <line x1="450" y1="120" x2="450" y2="400" stroke="#ffffff" stroke-width="2" stroke-dasharray="10 10"
        opacity="0.6" />

    <!-- Bottom graph: Velocity v(t) -->
    <g transform="translate(100, 310)">
        <rect x="0" y="0" width="700" height="200" rx="15" fill="#1b1111" stroke="#ff0055" stroke-width="3" />
        <text x="350" y="30" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">1차 미분: 속도 곡선 v(t) = x'(t)</text>

        <!-- Axes -->
        <line x1="50" y1="100" x2="650" y2="100" stroke="#553344" stroke-width="2" /> <!-- Zero Velocity Line -->
        <line x1="100" y1="40" x2="100" y2="180" stroke="#553344" stroke-width="2" />
        <text x="660" y="105" fill="#aaaaaa" font-family="monospace" font-size="14">시간 t</text>
        <text x="80" y="35" fill="#ff0055" font-family="monospace" font-size="14" font-weight="bold">속도 v</text>
        <text x="25" y="105" fill="#ff0055" font-family="monospace" font-size="14" font-weight="bold">0 (정지)</text>

        <!-- Velocity Line: Starts positive, crosses zero at peak, becomes negative -->
        <line x1="100" y1="40" x2="600" y2="160" stroke="#ff0055" stroke-width="6" filter="url(#glow)" />

        <!-- Match points -->
        <circle cx="230" cy="71" r="6" fill="#ffaa00" />
        <text x="245" y="65" fill="#ffaa00" font-family="monospace" font-size="14">속도(+) 역역</text>

        <!-- Crossing Zero exactly at x=350 -->
        <circle cx="350" cy="100" r="10" fill="#ffffff" stroke="#ff0055" stroke-width="4" filter="url(#glow)" />
        <text x="385" y="90" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold">v = 0 타격!</text>

        <circle cx="480" cy="131" r="6" fill="#00ffcc" />
        <text x="495" y="145" fill="#00ffcc" font-family="monospace" font-size="14">속도(-) 역역</text>
    </g>

    <!-- Explanation Footer -->
    <rect x="150" y="530" width="600" height="50" rx="10" fill="#0f0f15" stroke="#ffffff" stroke-width="2" />
    <text x="450" y="560" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        위치(포물선) 의 기울기가 정확히 <tspan fill="#ff0055" font-weight="bold">0이 되는 수평 정점</tspan>에서, 속도 그래프는 <tspan fill="#ff0055"
            font-weight="bold">0 (X축) 을 돌파</tspan>합니다.
    </text>
</svg>