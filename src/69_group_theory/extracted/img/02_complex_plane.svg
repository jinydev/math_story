<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <marker id="arrowX" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#aaaaaa" />
        </marker>

        <marker id="arrowVec" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">복소 평면 (Complex Plane - Argand Diagram)</text>

    <!-- Coordinate System -->
    <g transform="translate(300, 300)">

        <!-- Grid lines -->
        <g stroke="#334455" stroke-width="1" opacity="0.5">
            <line x1="-200" y1="-50" x2="400" y2="-50" />
            <line x1="-200" y1="-100" x2="400" y2="-100" />
            <line x1="-200" y1="-150" x2="400" y2="-150" />
            <line x1="-200" y1="-200" x2="400" y2="-200" />

            <line x1="50" y1="-250" x2="50" y2="100" />
            <line x1="100" y1="-250" x2="100" y2="100" />
            <line x1="150" y1="-250" x2="150" y2="100" />
            <line x1="200" y1="-250" x2="200" y2="100" />
            <line x1="250" y1="-250" x2="250" y2="100" />
        </g>

        <!-- Axes -->
        <!-- X-axis (Real) -->
        <line x1="-250" y1="0" x2="450" y2="0" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowX)" />
        <text x="450" y="-10" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="end">실수축 (Real Axis)</text>

        <!-- Y-axis (Imaginary) -->
        <line x1="0" y1="150" x2="0" y2="-250" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowX)" />
        <text x="10" y="-230" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="start">허수축 (Imaginary Axis)</text>

        <!-- Origin -->
        <circle cx="0" cy="0" r="4" fill="#ffffff" />
        <text x="-15" y="20" fill="#aaaaaa" font-family="sans-serif" font-size="16">0</text>

        <!-- Ticks on Real Axis -->
        <text x="50" y="20" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">1</text>
        <text x="100" y="20" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">2</text>
        <text x="150" y="20" fill="#4da6ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">3</text>
        <circle cx="150" cy="0" r="3" fill="#4da6ff" />

        <!-- Ticks on Imaginary Axis -->
        <text x="-25" y="-45" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">i</text>
        <text x="-25" y="-95" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">2i</text>
        <circle cx="0" cy="-100" r="3" fill="#ffaa00" />

        <!-- The Complex Number z = 3 + 2i -->
        <g filter="url(#glow)">
            <!-- Projection lines -->
            <line x1="150" y1="0" x2="150" y2="-100" stroke="#4da6ff" stroke-width="2" stroke-dasharray="8 4" />
            <line x1="0" y1="-100" x2="150" y2="-100" stroke="#ffaa00" stroke-width="2" stroke-dasharray="8 4" />

            <!-- Point -->
            <circle cx="150" cy="-100" r="8" fill="#00ffcc" />
            <text x="170" y="-115" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold">z = 3 +
                2i</text>

            <!-- Vector Line -->
            <line x1="0" y1="0" x2="145" y2="-97" stroke="#00ffcc" stroke-width="3" marker-end="url(#arrowVec)" />
        </g>

        <!-- Brace for distance -->
        <text x="65" y="-60" fill="#aaaaaa" font-family="sans-serif" font-size="16" transform="rotate(-33 65 -60)">거리
            (Magnitude) = 5</text>

    </g>

    <!-- Explanation -->
    <rect x="50" y="400" width="700" height="60" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
    <text x="400" y="435" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">복소수는 실수축(x)과
        허수축(y)을 가진 <tspan fill="#00ffcc" font-weight="bold">2차원 평면의 좌표 및 벡터</tspan>가 된다!</text>

</svg>