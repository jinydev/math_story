<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">불연속(Discontinuity) 3대 크래시 유형</text>

    <!-- 1. Hole (Removable) -->
    <g transform="translate(100, 150)">
        <rect x="0" y="0" width="200" height="250" rx="15" fill="#112233" stroke="#4da6ff" stroke-width="2" />
        <text x="100" y="30" fill="#4da6ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">Type 1. 구멍 뚫림</text>
        <text x="100" y="50" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">(제거 가능
            불연속)</text>

        <path d="M 20 180 Q 100 80 180 180" fill="none" stroke="#4da6ff" stroke-width="5" filter="url(#glow)" />
        <circle cx="100" cy="130" r="8" fill="#112233" stroke="#4da6ff" stroke-width="3" /> <!-- The hole -->

        <!-- The exact value dot floating somewhere else -->
        <circle cx="100" cy="80" r="5" fill="#ffff00" filter="url(#glow)" />

        <rect x="10" y="200" width="180" height="40" rx="5" fill="#0d1a26" />
        <text x="100" y="215" fill="#ff0055" font-family="sans-serif" font-size="12" text-anchor="middle">극한값 ≠
            함숫값</text>
        <text x="100" y="230" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">극한값은 있으나 나사가
            빠짐</text>
    </g>

    <!-- 2. Jump -->
    <g transform="translate(350, 150)">
        <rect x="0" y="0" width="200" height="250" rx="15" fill="#221122" stroke="#ff0055" stroke-width="2" />
        <text x="100" y="30" fill="#ff0055" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">Type 2. 단층 지진</text>
        <text x="100" y="50" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">(도약 불연속)</text>

        <!-- Left path -->
        <path d="M 20 160 C 50 160 80 120 100 120" fill="none" stroke="#ff0055" stroke-width="5" filter="url(#glow)" />
        <circle cx="100" cy="120" r="5" fill="#ff0055" />

        <!-- Right path -->
        <path d="M 100 80 C 130 80 160 100 180 100" fill="none" stroke="#ff0055" stroke-width="5" filter="url(#glow)" />
        <circle cx="100" cy="80" r="6" fill="#221122" stroke="#ff0055" stroke-width="2" />

        <!-- The Jump Gap -->
        <line x1="100" y1="120" x2="100" y2="80" stroke="#ffff00" stroke-width="2" stroke-dasharray="4 4" />
        <text x="125" y="105" fill="#ffff00" font-family="sans-serif" font-size="12" font-weight="bold">Jump ↑</text>

        <rect x="10" y="200" width="180" height="40" rx="5" fill="#0d1a26" />
        <text x="100" y="215" fill="#ff0055" font-family="sans-serif" font-size="12" text-anchor="middle">좌극한 ≠
            우극한</text>
        <text x="100" y="230" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">레일 높이가 완전히
            엇갈림</text>
    </g>

    <!-- 3. Infinite -->
    <g transform="translate(600, 150)">
        <rect x="0" y="0" width="200" height="250" rx="15" fill="#332211" stroke="#ffaa00" stroke-width="2" />
        <text x="100" y="30" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">Type 3. 우주 폭주</text>
        <text x="100" y="50" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">(무한 불연속)</text>

        <!-- Asymptote -->
        <line x1="100" y1="70" x2="100" y2="180" stroke="#555" stroke-dasharray="5 5" />

        <!-- Left path exploding -->
        <path d="M 20 180 Q 80 180 95 80" fill="none" stroke="#ffaa00" stroke-width="5" filter="url(#glow)" />

        <!-- Right path exploding -->
        <path d="M 180 180 Q 120 180 105 80" fill="none" stroke="#ffaa00" stroke-width="5" filter="url(#glow)" />

        <text x="100" y="65" fill="#ff0055" font-family="sans-serif" font-size="20">∞</text>

        <rect x="10" y="200" width="180" height="40" rx="5" fill="#0d1a26" />
        <text x="100" y="215" fill="#ff0055" font-family="sans-serif" font-size="12" text-anchor="middle">극한값 =
            무한대(∞)</text>
        <text x="100" y="230" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">분모가 0이 되어
            폭파</text>
    </g>

    <rect x="150" y="450" width="600" height="60" rx="10" fill="#0f0f15" stroke="#00ffcc" />
    <text x="450" y="475" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">✅ 패치(수정) 난이도 분석</text>
    <text x="450" y="495" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">Type 1은 구멍난 곳에
        함숫값만 넣어주면 복구 가능. 2와 3은 복구 불가 파멸 상태.</text>

</svg>