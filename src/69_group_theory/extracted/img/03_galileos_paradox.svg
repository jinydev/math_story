<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <!-- Arrowhead markers -->
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4d4d" />
        </marker>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">갈릴레오의 역설 (Galileo's Paradox)</text>
    <text x="400" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">자연수(전체) vs
        짝수(부분)</text>

    <!-- Box for Nature Numbers (A) -->
    <rect x="50" y="120" width="700" height="60" rx="10" fill="#2d2d44" stroke="#4da6ff" stroke-width="2" />
    <text x="140" y="157" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">A 상자 (자연수:전체)</text>

    <!-- Content A -->
    <g transform="translate(250, 130)" font-family="monospace" font-size="24" font-weight="bold" fill="#ffffff">
        <text x="25" y="28" text-anchor="middle">1</text>
        <text x="95" y="28" text-anchor="middle">2</text>
        <text x="165" y="28" text-anchor="middle">3</text>
        <text x="235" y="28" text-anchor="middle">4</text>
        <text x="305" y="28" text-anchor="middle">5</text>
        <text x="375" y="28" text-anchor="middle">...</text>
        <text x="455" y="28" fill="#00ffcc" text-anchor="middle">n</text>
    </g>

    <!-- Box for Even Numbers (B) -->
    <rect x="50" y="320" width="700" height="60" rx="10" fill="#2d2d44" stroke="#ffaa00" stroke-width="2" />
    <text x="140" y="357" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">B 상자 (짝수:부분)</text>

    <!-- Content B -->
    <g transform="translate(250, 330)" font-family="monospace" font-size="24" font-weight="bold" fill="#ffffff">
        <text x="25" y="28" text-anchor="middle">2</text>
        <text x="95" y="28" text-anchor="middle">4</text>
        <text x="165" y="28" text-anchor="middle">6</text>
        <text x="235" y="28" text-anchor="middle">8</text>
        <text x="305" y="28" text-anchor="middle">10</text>
        <text x="375" y="28" text-anchor="middle">...</text>
        <text x="455" y="28" fill="#00ffcc" text-anchor="middle">2n</text>
    </g>

    <!-- Mapping Arrows f(x) = 2x -->
    <g stroke="#ff4d4d" stroke-width="4" fill="none" marker-end="url(#arrow)" filter="url(#glow)">
        <path d="M 275 190 V 305" />
        <path d="M 345 190 V 305" />
        <path d="M 415 190 V 305" />
        <path d="M 485 190 V 305" />
        <path d="M 555 190 V 305" />
        <path d="M 705 190 V 305" stroke="#00ffcc" stroke-dasharray="10,5" />
    </g>

    <!-- Math labels mapping -->
    <g font-family="sans-serif" font-size="16" fill="#ffffff" font-weight="bold" text-anchor="middle">
        <rect x="255" y="235" width="40" height="24" rx="4" fill="#3a3a55" stroke="#ff4d4d" /> <text x="275" y="253">x
            2</text>
        <rect x="325" y="235" width="40" height="24" rx="4" fill="#3a3a55" stroke="#ff4d4d" /> <text x="345" y="253">x
            2</text>
        <rect x="395" y="235" width="40" height="24" rx="4" fill="#3a3a55" stroke="#ff4d4d" /> <text x="415" y="253">x
            2</text>
        <rect x="465" y="235" width="40" height="24" rx="4" fill="#3a3a55" stroke="#ff4d4d" /> <text x="485" y="253">x
            2</text>
        <rect x="535" y="235" width="40" height="24" rx="4" fill="#3a3a55" stroke="#ff4d4d" /> <text x="555" y="253">x
            2</text>

        <rect x="670" y="235" width="70" height="24" rx="4" fill="#1a1a24" stroke="#00ffcc" /> <text x="705" y="253"
            fill="#00ffcc">f(x)=2x</text>
    </g>

    <rect x="150" y="430" width="500" height="40" rx="8" fill="#221111" stroke="#ff4d4d" stroke-width="2" />
    <text x="400" y="456" fill="#ff4d4d" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">단 한 명의 낙오 없이 완전한 1:1 대응 성공! (부분 = 전체)</text>

</svg>