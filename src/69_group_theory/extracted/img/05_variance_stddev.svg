<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">위험 자산 스캐너: 분산과 표준편차 (Variance, σ)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"기댓값(수익률)은 3.0%로
        같은데 위험도는 극과 극"</text>

    <!-- Left: Stable Stock A -->
    <g transform="translate(100, 150)">
        <rect x="0" y="0" width="300" height="250" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="150" y="40" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">안정 종목 (은행주 A)</text>

        <!-- Graph -->
        <line x1="20" y1="200" x2="280" y2="200" stroke="#555555" stroke-width="2" /> <!-- Baseline -->
        <line x1="150" y1="80" x2="150" y2="200" stroke="#00ffcc" stroke-width="3" stroke-dasharray="4 2"
            filter="url(#glow)" /> <!-- Mean Line -->

        <text x="150" y="70" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">기댓값 평균 (3.0%)</text>

        <!-- Narrow Data Points -->
        <path d="M 50 200 Q 150 100 250 200" fill="none" stroke="#4da6ff" stroke-width="3" />

        <!-- V(X) annotation -->
        <path d="M 120 150 L 180 150" stroke="#ffffff" stroke-width="2" marker-start="url(#block)"
            marker-end="url(#block)" />
        <text x="150" y="140" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">±0.8%
            분산폭</text>

        <!-- Formula Score -->
        <rect x="50" y="210" width="200" height="30" rx="5" fill="#223344" stroke="#00ffcc" />
        <text x="150" y="230" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">표준편차 σ(A) = 0.8</text>
    </g>

    <!-- Right: Risky Bitcoin B -->
    <g transform="translate(500, 150)">
        <rect x="0" y="0" width="300" height="250" rx="10" fill="#221111" stroke="#ff4d4d" stroke-width="2" />
        <text x="150" y="40" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">미친 작전주 (비트코인 B)</text>

        <!-- Graph -->
        <line x1="20" y1="200" x2="280" y2="200" stroke="#555555" stroke-width="2" /> <!-- Baseline -->
        <line x1="150" y1="80" x2="150" y2="200" stroke="#ff4d4d" stroke-width="3" stroke-dasharray="4 2"
            filter="url(#glow)" /> <!-- Mean Line -->

        <text x="150" y="70" fill="#ff4d4d" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">기댓값 평균 (3.0%)</text>

        <!-- Very Wide/Wild Data Points -->
        <path d="M 20 200 Q 150 150 280 200" fill="none" stroke="#ffaa00" stroke-width="3" />

        <!-- V(X) annotation -->
        <path d="M 40 170 L 260 170" stroke="#ffffff" stroke-width="2" marker-start="url(#block)"
            marker-end="url(#block)" />
        <text x="150" y="160" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">±41.0% 거친
            폭락/폭등 분산폭</text>

        <!-- Extreme Points -->
        <text x="40" y="195" fill="#ff4d4d" font-family="sans-serif" font-size="12" font-weight="bold">-50%</text>
        <text x="260" y="195" fill="#ffaa00" font-family="sans-serif" font-size="12" font-weight="bold">+56%</text>

        <!-- Formula Score -->
        <rect x="50" y="210" width="200" height="30" rx="5" fill="#331111" stroke="#ff4d4d" />
        <text x="150" y="230" fill="#ff4d4d" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">표준편차 σ(B) = 41.0</text>
    </g>

    <!-- Big Cheat Code Box -->
    <rect x="200" y="430" width="500" height="120" rx="15" fill="#221122" stroke="#ff00ff" stroke-width="4"
        filter="url(#glow)" />
    <text x="450" y="465" fill="#ff00ff" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">★ 단축키: "제평 - 평제" ★</text>
    <text x="450" y="500" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold"
        text-anchor="middle">V(X) = E(X²) - {E(X)}²</text>
    <text x="450" y="530" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">복잡한 거리 공식을 증발시키고
        단순히 (위쪽칸 제곱 × 확률값) 계산으로 퉁치는 전설의 치트</text>

    <defs>
        <marker id="block" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <rect x="0" y="0" width="5" height="10" fill="#ffffff" />
        </marker>
    </defs>
</svg>