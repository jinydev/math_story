<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">계차수열 (Difference Sequence): 차원의 스펙트럼 깎아내기</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"윗물이 오염되어 불규칙하면, 항과
        항 사이의 갭(Gap) 을 도려내어 '지하 1층(Level 2)' 에 새 수열을 파내라!"</text>

    <!-- Level 1 Area (A_n) -->
    <rect x="50" y="150" width="800" height="150" rx="10" fill="#1b1122" stroke="#00ffcc" stroke-width="2" />
    <text x="120" y="235" fill="#00ffcc" font-weight="bold" font-size="28" filter="url(#glow)">[Level 1] A =</text>

    <g transform="translate(280, 235)">
        <circle cx="0" cy="-10" r="30" fill="#004444" stroke="#00ffcc" stroke-width="3" filter="url(#glow)" />
        <text x="0" y="0" fill="#fff" font-weight="bold" font-size="24" text-anchor="middle">1</text>

        <circle cx="120" cy="-10" r="30" fill="#004444" stroke="#00ffcc" stroke-width="3" filter="url(#glow)" />
        <text x="120" y="0" fill="#fff" font-weight="bold" font-size="24" text-anchor="middle">2</text>

        <circle cx="240" cy="-10" r="30" fill="#004444" stroke="#00ffcc" stroke-width="3" filter="url(#glow)" />
        <text x="240" y="0" fill="#fff" font-weight="bold" font-size="24" text-anchor="middle">5</text>

        <circle cx="360" cy="-10" r="30" fill="#004444" stroke="#00ffcc" stroke-width="3" filter="url(#glow)" />
        <text x="360" y="0" fill="#fff" font-weight="bold" font-size="24" text-anchor="middle">10</text>

        <circle cx="480" cy="-10" r="30" fill="#004444" stroke="#00ffcc" stroke-width="3" filter="url(#glow)" />
        <text x="480" y="0" fill="#fff" font-weight="bold" font-size="24" text-anchor="middle">17</text>
    </g>

    <!-- Connection Arrows (The Gaps) -->
    <g transform="translate(280, 235)">
        <path d="M 30 -10 Q 60 50 90 -10" fill="none" stroke="#ff00ff" stroke-width="4" stroke-dasharray="4 4"
            marker-end="url(#arrow_d)" filter="url(#glow)" />
        <path d="M 150 -10 Q 180 50 210 -10" fill="none" stroke="#ff00ff" stroke-width="4" stroke-dasharray="4 4"
            marker-end="url(#arrow_d)" filter="url(#glow)" />
        <path d="M 270 -10 Q 300 50 330 -10" fill="none" stroke="#ff00ff" stroke-width="4" stroke-dasharray="4 4"
            marker-end="url(#arrow_d)" filter="url(#glow)" />
        <path d="M 390 -10 Q 420 50 450 -10" fill="none" stroke="#ff00ff" stroke-width="4" stroke-dasharray="4 4"
            marker-end="url(#arrow_d)" filter="url(#glow)" />
    </g>

    <!-- Level 2 Area (B_n) -->
    <rect x="50" y="320" width="800" height="120" rx="10" fill="#140014" stroke="#ff00ff" stroke-width="2" />
    <text x="120" y="390" fill="#ff00ff" font-weight="bold" font-size="28" filter="url(#glow)">[Level 2] B =</text>

    <g transform="translate(340, 390)">
        <rect x="-25" y="-30" width="50" height="40" rx="5" fill="#440044" stroke="#ff00ff" stroke-width="2"
            filter="url(#glow)" />
        <text x="0" y="0" fill="#fff" font-weight="bold" font-size="22" text-anchor="middle">+ 1</text>

        <rect x="95" y="-30" width="50" height="40" rx="5" fill="#440044" stroke="#ff00ff" stroke-width="2"
            filter="url(#glow)" />
        <text x="120" y="0" fill="#fff" font-weight="bold" font-size="22" text-anchor="middle">+ 3</text>

        <rect x="215" y="-30" width="50" height="40" rx="5" fill="#440044" stroke="#ff00ff" stroke-width="2"
            filter="url(#glow)" />
        <text x="240" y="0" fill="#fff" font-weight="bold" font-size="22" text-anchor="middle">+ 5</text>

        <rect x="335" y="-30" width="50" height="40" rx="5" fill="#440044" stroke="#ff00ff" stroke-width="2"
            filter="url(#glow)" />
        <text x="360" y="0" fill="#fff" font-weight="bold" font-size="22" text-anchor="middle">+ 7</text>

        <!-- Analysis text inside Level 2 -->
        <text x="180" y="35" fill="#aaa" font-size="16" text-anchor="middle">"지하에서 발견한 아름다운(등차) 규칙성 (공차 +2)"</text>
    </g>

    <defs>
        <marker id="arrow_d" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ff00ff" />
        </marker>
    </defs>

    <!-- Logic Formula Bottom -->
    <rect x="100" y="470" width="700" height="110" rx="10" fill="#0b0b1a" stroke="#ffffff" stroke-width="2" />
    <text x="450" y="500" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">
        A의 4번째 항 (10) 은 어떻게 탄생했는가?
    </text>
    <text x="450" y="525" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">
        최초의 맨바닥 A항(<tspan fill="#00ffcc" font-weight="bold">1</tspan>) 에서 출발하여, 지하 징검다리 3개를 모두 타면 도달한다!
    </text>
    <text x="450" y="560" fill="#ffff00" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">
        A₄ = A₁ + ( B₁ + B₂ + B₃ ) = 1 + (1 + 3 + 5) = 10
    </text>
</svg>