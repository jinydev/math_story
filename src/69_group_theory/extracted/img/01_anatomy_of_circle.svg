<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <!-- Glow filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">원의 뼈대 해부학 (Anatomy of Circle)</text>

    <g transform="translate(400, 320)">

        <!-- Outer Circle (Circumference) -->
        <circle cx="0" cy="0" r="220" fill="none" stroke="#555" stroke-width="2" />
        <path d="M 0 -220 A 220 220 0 0 1 220 0" fill="none" stroke="#00ffcc" stroke-width="6" stroke-dasharray="10 5"
            filter="url(#glow)" />
        <text x="180" y="-180" fill="#00ffcc" font-family="sans-serif" font-size="22" font-weight="bold"
            transform="rotate(45 180 -180)">원주 (C)</text>

        <!-- Diameter -->
        <line x1="-220" y1="0" x2="220" y2="0" stroke="#ff4d4d" stroke-width="4" filter="url(#glow)" />
        <text x="-120" y="-15" fill="#ff4d4d" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">지름 (d = 2r)</text>

        <!-- Radius -->
        <line x1="0" y1="0" x2="0" y2="-220" stroke="#ffaa00" stroke-width="6" filter="url(#glow)" />
        <text x="25" y="-100" fill="#ffaa00" font-family="sans-serif" font-size="22" font-weight="bold">반지름 (r)</text>

        <!-- Sector (Cheesy Pizza Slice) -->
        <path d="M 0 0 L 155.5 155.5 A 220 220 0 0 1 -155.5 155.5 Z" fill="#ffaa00" opacity="0.3" />
        <line x1="0" y1="0" x2="155.5" y2="155.5" stroke="#ffaa00" stroke-width="2" stroke-dasharray="5" />
        <line x1="0" y1="0" x2="-155.5" y2="155.5" stroke="#ffaa00" stroke-width="2" stroke-dasharray="5" />
        <text x="0" y="120" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">부채꼴</text>
        <text x="0" y="145" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">(Sector)</text>

        <!-- Arc (Crust of the slice) -->
        <path d="M 155.5 155.5 A 220 220 0 0 1 -155.5 155.5" fill="none" stroke="#ffaa00" stroke-width="8"
            filter="url(#glow)" />
        <text x="0" y="240" fill="#ffaa00" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">호 (Arc)</text>

        <!-- Chord (Straight cut) -->
        <line x1="-190" y1="-110" x2="-110" y2="-190" stroke="#4da6ff" stroke-width="5" filter="url(#glow)" />
        <path d="M -190 -110 A 220 220 0 0 1 -110 -190" fill="none" stroke="#555" stroke-width="2" />
        <text x="-170" y="-160" fill="#4da6ff" font-family="sans-serif" font-size="22" font-weight="bold"
            transform="rotate(-45 -170 -160)">현 (Chord)</text>

        <!-- Center Point -->
        <circle cx="0" cy="0" r="8" fill="#ffffff" filter="url(#glow)" />
        <text x="-20" y="25" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">배꼽(중심)</text>

        <!-- Central Angle inside Sector -->
        <path d="M 0 40 A 40 40 0 0 1 -28.2 28.2" fill="none" stroke="#fff" stroke-width="2" />
        <text x="0" y="65" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">x°</text>

    </g>

</svg>