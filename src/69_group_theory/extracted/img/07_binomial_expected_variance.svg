<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">지름길의 마법: np, npq 치트키</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"100칸짜리 표 위아래 곱셈 덧셈
        노가다를 단 3음절로 파괴한다"</text>

    <!-- Comparison Context -->
    <g transform="translate(100, 150)">
        <!-- Before Block -->
        <rect x="0" y="0" width="300" height="300" rx="10" fill="#221111" stroke="#ff4d4d" stroke-width="2" />
        <text x="150" y="35" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">기존의 노가다 표 계산법</text>

        <!-- Mini chaotic table -->
        <rect x="25" y="60" width="250" height="40" fill="#331111" stroke="#ffaa00" />
        <rect x="25" y="100" width="250" height="40" fill="#331111" stroke="#ffaa00" />
        <line x1="60" y1="60" x2="60" y2="140" stroke="#ffaa00" />
        <line x1="95" y1="60" x2="95" y2="140" stroke="#ffaa00" />
        <line x1="130" y1="60" x2="130" y2="140" stroke="#ffaa00" />
        <line x1="165" y1="60" x2="165" y2="140" stroke="#ffaa00" />
        <text x="210" y="105" fill="#ffaa00" font-family="monospace" letter-spacing="3" text-anchor="middle">.....
            100칸</text>

        <text x="150" y="180" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">E(X) = (0*P0) +
            (1*P1) + ... + (100*P100)</text>
        <text x="150" y="210" fill="#ffaa00" font-family="monospace" font-size="14" text-anchor="middle">V(X) = 제평 -
            평제...</text>

        <text x="150" y="260" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">인간의 두뇌 다운 (CPU 100%)</text>
    </g>

    <!-- Arrow -->
    <g transform="translate(420, 270)">
        <text x="0" y="0" fill="#ffffff" font-family="sans-serif" font-size="50" font-weight="bold"
            text-anchor="middle">→</text>
        <text x="0" y="30" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">B(n, p) 조건시</text>
    </g>

    <!-- After Block (Cheatcodes) -->
    <g transform="translate(500, 150)">
        <rect x="0" y="0" width="300" height="300" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2"
            filter="url(#glow)" />
        <text x="150" y="35" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">초속 압축 계산기</text>

        <!-- Formula 1 -->
        <rect x="25" y="70" width="250" height="50" rx="5" fill="#223344" stroke="#ff00ff" />
        <text x="70" y="102" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="start">기댓값:</text>
        <text x="150" y="105" fill="#ff00ff" font-family="monospace" font-size="26" font-weight="bold"
            text-anchor="start" filter="url(#glow)">E(X) = np</text>

        <!-- Formula 2 -->
        <rect x="25" y="140" width="250" height="50" rx="5" fill="#223344" stroke="#4da6ff" />
        <text x="70" y="172" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="start">분산:</text>
        <text x="150" y="175" fill="#4da6ff" font-family="monospace" font-size="26" font-weight="bold"
            text-anchor="start" filter="url(#glow)">V(X) = npq</text>

        <!-- Formula 3 -->
        <rect x="25" y="210" width="250" height="50" rx="5" fill="#223344" stroke="#ffaa00" />
        <text x="45" y="242" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="start">표준편차:</text>
        <text x="150" y="245" fill="#ffaa00" font-family="monospace" font-size="26" font-weight="bold"
            text-anchor="start" filter="url(#glow)">σ(X) = √npq</text>
    </g>

    <!-- Detail Note -->
    <rect x="150" y="480" width="600" height="60" rx="10" fill="#221122" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="505" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">q 는 게임에서 패배(실패)할
        잔여 확률 즉, <tspan fill="#ff4d4d" font-weight="bold">"1 - p"</tspan> 를 의미한다.</text>
    <text x="450" y="525" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">n 과 p, q 이 쓰리 콤보 세 개만 곱해주면 더러운 통계 연산 끝!</text>

</svg>