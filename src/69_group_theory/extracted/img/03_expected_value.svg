<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">기댓값의 죽음의 왈츠: 세로 곱하기 수평 합산 (E(X))</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"위 칸(X)과 아래 칸(P)을
        쾅쾅 박치기(곱셈)시킨 뒤, 모조리 더해주면 끝"</text>

    <!-- Table Container -->
    <g transform="translate(150, 150)">

        <!-- Backgrounds -->
        <rect x="150" y="0" width="150" height="70" fill="#223344" stroke="#00ffcc" stroke-width="2" />
        <rect x="300" y="0" width="150" height="70" fill="#221133" stroke="#ff00ff" stroke-width="2" />

        <rect x="150" y="70" width="150" height="70" fill="#223344" stroke="#00ffcc" stroke-width="2" />
        <rect x="300" y="70" width="150" height="70" fill="#221133" stroke="#ff00ff" stroke-width="2" />

        <!-- Labels First Column -->
        <rect x="0" y="0" width="150" height="70" fill="#111122" stroke="#555555" stroke-width="2" />
        <rect x="0" y="70" width="150" height="70" fill="#111122" stroke="#555555" stroke-width="2" />
        <text x="75" y="45" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">당첨금 (X)</text>
        <text x="75" y="115" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">확률 (P)</text>

        <!-- Column 1 Data -->
        <text x="225" y="45" fill="#00ffcc" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">+ 100원</text>
        <text x="225" y="115" fill="#00ffcc" font-family="monospace" font-size="28" text-anchor="middle">1/2</text>

        <!-- Column 2 Data -->
        <text x="375" y="45" fill="#ff00ff" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">0 원</text>
        <text x="375" y="115" fill="#ff00ff" font-family="monospace" font-size="28" text-anchor="middle">1/2</text>

        <!-- Clash Arrows (Top to Bottom) -->
        <path d="M 225 30 L 225 60 L 210 60 L 225 80 L 240 60 L 225 60" fill="#ff4d4d" />
        <path d="M 375 30 L 375 60 L 360 60 L 375 80 L 390 60 L 375 60" fill="#ff4d4d" />
        <text x="225" y="65" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">×</text>
        <text x="375" y="65" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">×</text>

    </g>

    <!-- Output Math Section -->
    <g transform="translate(150, 320)">

        <!-- Path connecting from table -->
        <path d="M 225 -30 L 225 0" stroke="#00ffcc" stroke-width="3" stroke-dasharray="4 2" />
        <path d="M 375 -30 L 375 0" stroke="#ff00ff" stroke-width="3" stroke-dasharray="4 2" />

        <!-- Eq Blocks -->
        <rect x="150" y="0" width="150" height="60" rx="10" fill="#113322" stroke="#00ffcc" stroke-width="2" />
        <text x="225" y="38" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">50 원</text>

        <text x="315" y="38" fill="#ffffff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">+</text>

        <rect x="330" y="0" width="150" height="60" rx="10" fill="#331122" stroke="#ff00ff" stroke-width="2" />
        <text x="405" y="38" fill="#ff00ff" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">0 원</text>

        <text x="505" y="38" fill="#ffffff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">=</text>

        <rect x="540" y="-10" width="160" height="80" rx="10" fill="#221111" stroke="#ffaa00" stroke-width="4"
            filter="url(#glow)" />
        <text x="620" y="25" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">확정된 운명의 수익</text>
        <text x="620" y="55" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">50 원</text>

    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="470" width="600" height="80" rx="10" fill="#221133" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="500" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">참가비가 60원 이라면, 당신은
        게임을 1판 굴릴 때마다 10원씩 강탈당하게 됩니다.</text>
    <text x="450" y="530" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">카지노와 보험사를 불패의 무적으로 만든 "절대 수학 법리" 가 E(X) 입니다.</text>

</svg>