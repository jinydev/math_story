<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">군(Group): 대수학의 가장 완벽한 4대 건축물</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"4개의 지옥 관문을 모두
        통과해야만 거대한 우주의 신전 '군(Group)' 으로 승격된다."</text>

    <!-- Ground -->
    <path d="M 50 450 L 850 450" fill="none" stroke="#444" stroke-width="4" />
    <text x="450" y="480" fill="#fff" font-weight="bold" font-size="20" text-anchor="middle">집합 (M) + 이항연산 (*)</text>

    <!-- Architecture: 4 Pillars -->
    <!-- 1. Closure -->
    <g transform="translate(100, 300)">
        <rect x="0" y="0" width="140" height="150" fill="#1b1122" stroke="#00ffcc" stroke-width="2" />
        <text x="70" y="30" fill="#00ffcc" font-weight="bold" font-size="20" text-anchor="middle">1. 닫힘</text>
        <text x="70" y="55" fill="#aaa" font-size="14" text-anchor="middle">(Closure)</text>
        <circle cx="70" cy="100" r="30" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="4 2" />
        <text x="70" y="105" fill="#fff" font-weight="bold" font-size="16" text-anchor="middle">a*b ∈ M</text>
    </g>

    <!-- 2. Associativity -->
    <g transform="translate(260, 250)">
        <rect x="0" y="0" width="140" height="200" fill="#1b1122" stroke="#0088ff" stroke-width="2" />
        <text x="70" y="30" fill="#0088ff" font-weight="bold" font-size="20" text-anchor="middle">2. 결합 법칙</text>
        <text x="70" y="55" fill="#aaa" font-size="14" text-anchor="middle">(Associativity)</text>

        <text x="70" y="110" fill="#fff" font-weight="bold" font-size="16" text-anchor="middle">(a*b)*c</text>
        <text x="70" y="140" fill="#fff" font-weight="bold" font-size="16" text-anchor="middle">==</text>
        <text x="70" y="170" fill="#fff" font-weight="bold" font-size="16" text-anchor="middle">a*(b*c)</text>
    </g>

    <!-- 3. Identity -->
    <g transform="translate(420, 200)">
        <rect x="0" y="0" width="140" height="250" fill="#1b1122" stroke="#ffff00" stroke-width="2" />
        <text x="70" y="30" fill="#ffff00" font-weight="bold" font-size="20" text-anchor="middle">3. 항등원</text>
        <text x="70" y="55" fill="#aaa" font-size="14" text-anchor="middle">(Identity 'e')</text>

        <rect x="40" y="90" width="60" height="80" rx="5" fill="#fff" opacity="0.2" />
        <text x="70" y="140" fill="#ffff00" font-weight="bold" font-size="40" text-anchor="middle"
            filter="url(#glow)">e</text>

        <text x="70" y="210" fill="#fff" font-weight="bold" font-size="16" text-anchor="middle">a * e = a</text>
        <text x="70" y="230" fill="#aaa" font-size="12" text-anchor="middle">거울 투명인간</text>
    </g>

    <!-- 4. Inverse -->
    <g transform="translate(580, 150)">
        <rect x="0" y="0" width="180" height="300" fill="#140014" stroke="#ff00ff" stroke-width="3"
            filter="url(#glow)" />
        <text x="90" y="30" fill="#ff00ff" font-weight="bold" font-size="20" text-anchor="middle">4. 역원 (역행)</text>
        <text x="90" y="55" fill="#aaa" font-size="14" text-anchor="middle">(Inverse 'a⁻¹')</text>

        <!-- Explosion visual -->
        <path d="M 60 120 L 120 180 M 60 180 L 120 120" fill="none" stroke="#ff00ff" stroke-width="4"
            filter="url(#glow)" />
        <circle cx="90" cy="150" r="30" fill="#ff0055" opacity="0.5" filter="url(#glow)" />

        <text x="90" y="240" fill="#fff" font-weight="bold" font-size="18" text-anchor="middle">a * a⁻¹ = <tspan
                fill="#ffff00">e</tspan></text>
        <text x="90" y="265" fill="#ff00ff" font-size="14" text-anchor="middle">초기화 폭탄(블랙홀)</text>
    </g>

    <!-- Roof (Group) -->
    <path d="M 50 140 L 450 40 L 850 140 Z" fill="#221122" stroke="#ff00ff" stroke-width="4" filter="url(#glow)" />
    <text x="450" y="110" fill="#ffffff" font-weight="bold" font-size="45" font-family="monospace" text-anchor="middle"
        filter="url(#glow)">군 ( Group G )</text>

    <!-- Alerts and comments -->
    <rect x="100" y="520" width="700" height="70" rx="10" fill="#0a1a2a" stroke="#00ffcc" stroke-width="2" />
    <text x="450" y="550" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        자연수 우주는 [항등원 1] 까지는 있지만, [역원 분수(1/2 등)]이 결계에 막혀 파멸된다.
    </text>
    <text x="450" y="575" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        즉 역원(실행 취소) 파트너가 무조건 존재하는 무결점 우주만이 <tspan fill="#ff00ff" font-weight="bold">'군'</tspan> 의 칭호를 받는다.
    </text>
</svg>