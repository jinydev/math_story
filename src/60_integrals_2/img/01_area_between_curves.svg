<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A202C" />
      <stop offset="100%" stop-color="#2D3748" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="hatchArea" width="8" height="8" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#9F7AEA" stroke-width="2" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" rx="15" />

  <!-- Title -->
  <text x="400" y="40" font-family="'Inter', sans-serif" font-size="26" font-weight="bold" fill="#F7FAFC" text-anchor="middle" filter="url(#glow)">두 곡선 사이 공중 영토의 넓이 (Area Between)</text>
  <text x="400" y="70" font-family="'Inter', sans-serif" font-size="16" fill="#A0AEC0" text-anchor="middle">f(x) 지붕 면적 전체에서 g(x) 바닥 면적을 오려내어 순수한 보라색 패티 영역을 남긴다!</text>

  <!-- Main Graph Area -->
  <g transform="translate(150, 320)">
    <!-- X and Y Axes -->
    <line x1="-20" y1="0" x2="550" y2="0" stroke="#718096" stroke-width="2"/>
    <line x1="0" y1="20" x2="0" y2="-220" stroke="#718096" stroke-width="2"/>
    <text x="560" y="5" font-family="sans-serif" font-size="16" fill="#A0AEC0">x 축</text>
    
    <!-- Vertical boundary lines for integration a to b -->
    <line x1="100" y1="0" x2="100" y2="-180" stroke="#CBD5E0" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="400" y1="0" x2="400" y2="-150" stroke="#CBD5E0" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="100" y="25" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#CBD5E0" text-anchor="middle">a</text>
    <text x="400" y="25" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#CBD5E0" text-anchor="middle">b</text>

    <!-- The Area Between (Painted with purple hatch pattern) -->
    <!-- M 100 f(100) Q 250 ... 400 f(400) L 400 g(400) Q 250 ... 100 g(100) Z -->
    <!-- Approximate visually matching curves:
         Top Curve f(x): M 100 -180 Q 250 -250 400 -150
         Bottom Curve g(x): M 100 -50 Q 250 -20 400 -80
    -->
    <path d="M 100 -180 Q 250 -240 400 -150 L 400 -80 Q 250 -10 100 -50 Z" fill="url(#hatchArea)" stroke="#9F7AEA" stroke-width="2"/>

    <!-- A representitive thin vertical slice dx -->
    <rect x="240" y="-210" width="15" height="180" fill="#9F7AEA" opacity="0.8" stroke="#E9D8FD" stroke-width="1" filter="url(#glow)"/>
    
    <!-- Top Curve f(x) Solid line -->
    <path d="M 50 -160 Q 250 -240 450 -130" fill="none" stroke="#FC8181" stroke-width="4" filter="url(#glow)"/>
    <text x="460" y="-135" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#FC8181" filter="url(#glow)">f(x) [Top]</text>

    <!-- Bottom Curve g(x) Solid line -->
    <path d="M 50 -30 Q 250 -10 450 -100" fill="none" stroke="#63B3ED" stroke-width="4" filter="url(#glow)"/>
    <text x="460" y="-90" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#63B3ED" filter="url(#glow)">g(x) [Bottom]</text>

    <!-- Pointing Labels to the representation slice (Width dx, Height f(x)-g(x)) -->
    <line x1="265" y1="-120" x2="330" y2="-120" stroke="#E2E8F0" stroke-width="2" marker-start="url(#arrow-reverse)"/>
    <circle cx="265" cy="-120" r="3" fill="#E2E8F0" />
    <text x="340" y="-130" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#F7FAFC">높이 = f(x) - g(x)</text>
    <text x="340" y="-110" font-family="'Inter', sans-serif" font-size="14" fill="#A0AEC0">위 지붕에서 아래 바닥을 뺀 높이</text>
    
    <text x="248" y="25" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#9F7AEA">dx 폭</text>
  </g>

  <!-- Formula Box Bottom -->
  <g transform="translate(100, 370)">
    <rect x="0" y="0" width="600" height="65" fill="#2D3748" rx="8" stroke="#9F7AEA" stroke-width="2"/>
    <text x="300" y="25" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#F7FAFC" text-anchor="middle">적분 수식 결론</text>
    <!-- We simulate math formula text visually -->
    <text x="300" y="50" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#E9D8FD" text-anchor="middle" filter="url(#glow)">Area = ∫ [ f(x) - g(x) ] dx  (구간 a 부터 b 까지)</text>
  </g>

</svg>
