<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#2b8a3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">첫 번째 합체: '가우스(Gauss) 의 거꾸로 뒤집기 마법'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"등차수열을 죽도록 하나씩 더하지 마라. 거꾸로 복사해서 위아래를
        붙여버려라!"</text>

    <!-- Left: The slow way -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#e8590c" font-size="14" font-weight="bold" text-anchor="middle">순진한 덧셈 (노가다)</text>

        <!-- Linear stair blocks -->
        <rect x="40" y="110" width="20" height="20" fill="#ffc9c9" stroke="#fa5252" />
        <text x="50" y="125" fill="#c92a2a" font-size="10" text-anchor="middle">1</text>

        <rect x="70" y="90" width="20" height="40" fill="#ffc9c9" stroke="#fa5252" />
        <text x="80" y="125" fill="#c92a2a" font-size="10" text-anchor="middle">2</text>

        <rect x="100" y="70" width="20" height="60" fill="#ffc9c9" stroke="#fa5252" />
        <text x="110" y="125" fill="#c92a2a" font-size="10" text-anchor="middle">3</text>

        <text x="140" y="120" fill="#fa5252" font-size="14" font-weight="bold">...</text>

        <rect x="160" y="30" width="20" height="100" fill="#ffc9c9" stroke="#fa5252" />
        <text x="170" y="125" fill="#c92a2a" font-size="10" font-weight="bold" text-anchor="middle">100</text>

        <!-- Hard computation -->
        <rect x="15" y="125" width="190" height="18" fill="#ffe3e3" />
        <text x="110" y="138" fill="#c92a2a" font-size="10" font-weight="bold" text-anchor="middle">S = 1 + 2 + 3 + ...
            + 100 (언제 끝남?)</text>
    </g>

    <!-- Divider -->
    <path d="M 290 145 C 300 120, 300 170, 310 145" fill="none" stroke="#adb5bd" stroke-width="3"
        marker-end="url(#arrow-green)" />

    <!-- Right: Gauss Trick (Rectangle) -->
    <g transform="translate(320, 80)">
        <rect x="0" y="0" width="230" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="115" y="25" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">가우스의 치트키 (사각형
            직조기)</text>

        <!-- Red blocks (original) -->
        <rect x="40" y="110" width="20" height="20" fill="#ffc9c9" stroke="#fa5252" />
        <rect x="70" y="90" width="20" height="40" fill="#ffc9c9" stroke="#fa5252" />
        <rect x="100" y="70" width="20" height="60" fill="#ffc9c9" stroke="#fa5252" />
        <rect x="160" y="30" width="20" height="100" fill="#ffc9c9" stroke="#fa5252" />

        <!-- Blue blocks (inverted copy) making a perfect rectangle of height 101 -->
        <rect x="40" y="30" width="20" height="80" fill="#d0ebff" stroke="#339af0" />
        <text x="50" y="45" fill="#1864ab" font-size="8" font-weight="bold" text-anchor="middle">100</text>

        <rect x="70" y="30" width="20" height="60" fill="#d0ebff" stroke="#339af0" />
        <text x="80" y="45" fill="#1864ab" font-size="8" font-weight="bold" text-anchor="middle">99</text>

        <rect x="100" y="30" width="20" height="40" fill="#d0ebff" stroke="#339af0" />
        <text x="110" y="45" fill="#1864ab" font-size="8" font-weight="bold" text-anchor="middle">98</text>

        <text x="140" y="120" fill="#339af0" font-size="14" font-weight="bold">...</text>

        <rect x="160" y="130" width="20" height="-10" fill="#d0ebff" stroke="#339af0" /> <!-- Abstract small block -->
        <rect x="160" y="130" width="20" height="0" fill="#d0ebff" stroke="#339af0" />
        <text x="170" y="125" fill="#1864ab" font-size="8" font-weight="bold" text-anchor="middle">1</text>

        <!-- Info -->
        <path d="M 30 130 C 20 100, 20 60, 30 30" fill="none" stroke="#2b8a3e" stroke-dasharray="2,2" />
        <text x="20" y="80" fill="#2b8a3e" font-size="10" font-weight="bold" transform="rotate(-90 15 80)">높이: 101 무조건
            고정</text>

        <rect x="15" y="125" width="200" height="18" fill="#e7f5ff" rx="3" />
        <text x="115" y="138" fill="#1864ab" font-size="10" font-weight="bold" text-anchor="middle">2S = 101 × 100개 ➔ S
            = 5050</text>
    </g>

    <defs>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>