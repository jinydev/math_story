<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#f59f00" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">다섯 번째 합체: '무한 연쇄 폭파 기법 (망원급수 / Telescoping Sum)'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"모든 곱셈식을 마이너스(-) 로 분리하라! 앞놈과 뒷놈이 연쇄적으로 파괴될
        것이다"</text>

    <!-- Formula Example: 1/(1x2) + 1/(2x3) + ... -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="480" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="50" y="25" fill="#495057" font-size="14" font-weight="bold" text-anchor="middle">부분분수 분해</text>

        <!-- Block 1 -->
        <rect x="20" y="45" width="80" height="30" fill="#fff4e6" rx="3" />
        <text x="60" y="65" fill="#e8590c" font-size="12" font-weight="bold" text-anchor="middle">1 / (1×2)</text>

        <path d="M 60 75 L 60 90" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow-orange)" />

        <text x="35" y="110" fill="#1864ab" font-size="14" font-weight="bold">1</text>
        <text x="60" y="110" fill="#fa5252" font-size="14" font-weight="bold">-</text>
        <text x="85" y="110" fill="#1864ab" font-size="14" font-weight="bold">½</text>

        <text x="115" y="65" fill="#495057" font-size="14" font-weight="bold">+</text>
        <text x="115" y="110" fill="#495057" font-size="14" font-weight="bold">+</text>

        <!-- Block 2 -->
        <rect x="130" y="45" width="80" height="30" fill="#fff4e6" rx="3" />
        <text x="170" y="65" fill="#e8590c" font-size="12" font-weight="bold" text-anchor="middle">1 / (2×3)</text>

        <path d="M 170 75 L 170 90" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow-orange)" />

        <text x="145" y="110" fill="#1864ab" font-size="14" font-weight="bold">½</text>
        <text x="170" y="110" fill="#fa5252" font-size="14" font-weight="bold">-</text>
        <text x="195" y="110" fill="#1864ab" font-size="14" font-weight="bold">⅓</text>

        <text x="235" y="65" fill="#495057" font-size="14" font-weight="bold">+</text>
        <text x="235" y="110" fill="#495057" font-size="14" font-weight="bold">+</text>

        <!-- Block 3 -->
        <rect x="250" y="45" width="80" height="30" fill="#fff4e6" rx="3" />
        <text x="290" y="65" fill="#e8590c" font-size="12" font-weight="bold" text-anchor="middle">1 / (3×4)</text>

        <path d="M 290 75 L 290 90" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow-orange)" />

        <text x="265" y="110" fill="#1864ab" font-size="14" font-weight="bold">⅓</text>
        <text x="290" y="110" fill="#fa5252" font-size="14" font-weight="bold">-</text>
        <text x="315" y="110" fill="#1864ab" font-size="14" font-weight="bold">¼</text>

        <text x="355" y="65" fill="#495057" font-size="14" font-weight="bold">+ ... +</text>
        <text x="355" y="110" fill="#495057" font-size="14" font-weight="bold">+ ... +</text>

        <!-- Block 4 (n) -->
        <rect x="380" y="45" width="80" height="30" fill="#fff4e6" rx="3" />
        <text x="420" y="65" fill="#e8590c" font-size="10" font-weight="bold" text-anchor="middle">1/n(n+1)</text>

        <path d="M 420 75 L 420 90" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow-orange)" />

        <text x="390" y="110" fill="#1864ab" font-size="12" font-weight="bold">1/n</text>
        <text x="420" y="110" fill="#fa5252" font-size="14" font-weight="bold">-</text>
        <text x="450" y="110" fill="#1864ab" font-size="11" font-weight="bold">1/n+1</text>

        <!-- Elimination lines -->
        <!-- -1/2 and 1/2 -->
        <path d="M 85 115 Q 115 130 145 115" fill="none" stroke="#fa5252" stroke-width="2" />
        <!-- -1/3 and 1/3 -->
        <path d="M 195 115 Q 230 130 265 115" fill="none" stroke="#fa5252" stroke-width="2" />

        <!-- Leftover text -->
        <rect x="150" y="125" width="180" height="18" fill="#e3fafc" rx="3" />
        <text x="240" y="138" fill="#0b7285" font-size="10" font-weight="bold" text-anchor="middle">살아남는 자: 1 (맨 앞) -
            1/n+1 (맨 뒤)</text>
    </g>

    <defs>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>