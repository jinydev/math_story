<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#0b7285" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">네 번째 합체: '차원을 쪼개어 내려가는 계차수열 (Difference)'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"수열에 아무 규칙이 안 보인다면? 그들의 갭(Gap) 을 관찰하라. 아랫
        차원에 진실이 있다!"</text>

    <!-- Level 1: Original Sequence (Seemingly random) -->
    <g transform="translate(60, 90)">
        <rect x="0" y="0" width="480" height="50" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="50" y="30" fill="#495057" font-size="14" font-weight="bold" text-anchor="middle">Level 1 (수열 A)</text>

        <circle cx="120" cy="25" r="15" fill="#e3fafc" stroke="#0b7285" stroke-width="2" />
        <text x="120" y="30" fill="#0b7285" font-size="12" font-weight="bold" text-anchor="middle">1</text>

        <circle cx="200" cy="25" r="15" fill="#e3fafc" stroke="#0b7285" stroke-width="2" />
        <text x="200" y="30" fill="#0b7285" font-size="12" font-weight="bold" text-anchor="middle">2</text>

        <circle cx="280" cy="25" r="15" fill="#e3fafc" stroke="#0b7285" stroke-width="2" />
        <text x="280" y="30" fill="#0b7285" font-size="12" font-weight="bold" text-anchor="middle">5</text>

        <circle cx="360" cy="25" r="15" fill="#e3fafc" stroke="#0b7285" stroke-width="2" />
        <text x="360" y="30" fill="#0b7285" font-size="12" font-weight="bold" text-anchor="middle">10</text>

        <circle cx="440" cy="25" r="15" fill="#e3fafc" stroke="#0b7285" stroke-width="2" />
        <text x="440" y="30" fill="#0b7285" font-size="12" font-weight="bold" text-anchor="middle">17</text>
    </g>

    <!-- Difference arrows and text -->
    <path d="M 180 135 C 160 110, 160 110, 180 135" stroke="none" />

    <line x1="130" y1="145" x2="160" y2="175" stroke="#1864ab" stroke-width="2" marker-end="url(#arrow-blue)" />
    <line x1="190" y1="145" x2="160" y2="175" stroke="#1864ab" stroke-width="2" />

    <line x1="210" y1="145" x2="240" y2="175" stroke="#1864ab" stroke-width="2" marker-end="url(#arrow-blue)" />
    <line x1="270" y1="145" x2="240" y2="175" stroke="#1864ab" stroke-width="2" />

    <line x1="290" y1="145" x2="320" y2="175" stroke="#1864ab" stroke-width="2" marker-end="url(#arrow-blue)" />
    <line x1="350" y1="145" x2="320" y2="175" stroke="#1864ab" stroke-width="2" />

    <line x1="370" y1="145" x2="400" y2="175" stroke="#1864ab" stroke-width="2" marker-end="url(#arrow-blue)" />
    <line x1="430" y1="145" x2="400" y2="175" stroke="#1864ab" stroke-width="2" />

    <!-- Level 2: Difference Sequence (Arithmetic) -->
    <g transform="translate(60, 180)">
        <rect x="0" y="0" width="480" height="40" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="50" y="25" fill="#495057" font-size="14" font-weight="bold" text-anchor="middle">Level 2 (차이 B)</text>

        <rect x="90" y="10" width="20" height="20" fill="#d0ebff" stroke="#1864ab" rx="3" />
        <text x="100" y="25" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">1</text>

        <text x="140" y="25" fill="#495057" font-size="10" font-weight="bold" text-anchor="middle">+2</text>

        <rect x="170" y="10" width="20" height="20" fill="#d0ebff" stroke="#1864ab" rx="3" />
        <text x="180" y="25" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">3</text>

        <text x="220" y="25" fill="#495057" font-size="10" font-weight="bold" text-anchor="middle">+2</text>

        <rect x="250" y="10" width="20" height="20" fill="#d0ebff" stroke="#1864ab" rx="3" />
        <text x="260" y="25" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">5</text>

        <text x="300" y="25" fill="#495057" font-size="10" font-weight="bold" text-anchor="middle">+2</text>

        <rect x="330" y="10" width="20" height="20" fill="#d0ebff" stroke="#1864ab" rx="3" />
        <text x="340" y="25" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">7</text>
    </g>

    <!-- Explanation box -->
    <rect x="120" y="65" width="400" height="18" fill="#fff4e6" rx="3" />
    <text x="320" y="78" fill="#e8590c" font-size="10" font-weight="bold" text-anchor="middle">마지막 A항(17) = A첫항(1) +
        아래차원(B)들의 갭 누적합 (1+3+5+7)</text>

    <defs>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#1864ab" />
        </marker>
    </defs>
</svg>