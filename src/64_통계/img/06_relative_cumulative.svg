<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#a61e4d" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">여섯 번째 통계 보스: 절대량 파괴 '상대도수 &amp; 누적도수'</text>

    <!-- Class A (Small Class) -->
    <g transform="translate(60, 60)">
        <rect x="0" y="0" width="180" height="150" fill="#fff" stroke="#495057" stroke-width="2" rx="5" />
        <rect x="0" y="0" width="180" height="30" fill="#ffe3e3" stroke="#495057" rx="5" />
        <text x="90" y="20" fill="#c92a2a" font-size="14" font-weight="bold" text-anchor="middle">🔥 [A반] 맹수반 🔥</text>

        <text x="90" y="55" fill="#495057" font-size="12" font-weight="bold" text-anchor="middle">총원: 20명</text>
        <path d="M 20 65 L 160 65" fill="none" stroke="#adb5bd" stroke-dasharray="2,2" />

        <text x="90" y="85" fill="#fa5252" font-size="12" font-weight="bold" text-anchor="middle">90점 이상 엘리트: [ 5명
            ]</text>

        <!-- 상대도수 계산 -->
        <rect x="10" y="105" width="160" height="30" fill="#f8f9fa" stroke="#adb5bd" rx="3" />
        <text x="90" y="125" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">상대비율: 5 ÷ 20 = 0.25
            (25%)</text>
    </g>

    <!-- The Battle (VS) -->
    <text x="300" y="140" fill="#e03131" font-size="28" font-weight="bold" font-style="italic"
        text-anchor="middle">VS</text>

    <!-- Class B (Giant Class) -->
    <g transform="translate(360, 60)">
        <rect x="0" y="0" width="180" height="150" fill="#fff" stroke="#495057" stroke-width="2" rx="5" />
        <rect x="0" y="0" width="180" height="30" fill="#e3fafc" stroke="#495057" rx="5" />
        <text x="90" y="20" fill="#0b7285" font-size="14" font-weight="bold" text-anchor="middle">🥶 [B반] 대규모 쩌리반
            🥶</text>

        <text x="90" y="55" fill="#495057" font-size="12" font-weight="bold" text-anchor="middle">총원: 100명</text>
        <path d="M 20 65 L 160 65" fill="none" stroke="#adb5bd" stroke-dasharray="2,2" />

        <text x="90" y="85" fill="#0b7285" font-size="12" font-weight="bold" text-anchor="middle">90점 이상 엘리트: [ 10명
            ]</text>

        <!-- 상대도수 계산 -->
        <rect x="10" y="105" width="160" height="30" fill="#f8f9fa" stroke="#adb5bd" rx="3" />
        <text x="90" y="125" fill="#0b7285" font-size="12" font-weight="bold" text-anchor="middle">상대비율: 10 ÷ 100 = 0.10
            (10%)</text>
    </g>

    <!-- Insight Bottom Text -->
    <rect x="150" y="220" width="300" height="25" fill="none" stroke="#fcc419" stroke-width="2" stroke-dasharray="4,2"
        rx="5" />
    <text x="300" y="236" fill="#f59f00" font-size="11" font-weight="bold" text-anchor="middle">절대 명수는 B반(10명)이 이겼지만,
        퀄리티(비율)는 A반(25%) 압승!</text>

    <!-- 누적도수 미니팝업 -->
    <path d="M 50 20 C 20 -20, -10 30, 10 50" fill="none" stroke="#862e9c" stroke-width="2"
        marker-end="url(#arrow-purple)" />
    <rect x="-40" y="-10" width="80" height="30" fill="#f3d9fa" rx="3" />
    <text x="0" y="3" fill="#862e9c" font-size="9" font-weight="bold" text-anchor="middle">누적도수란?</text>
    <text x="0" y="15" fill="#862e9c" font-size="8" text-anchor="middle">위에서부터 싹다 더해!</text>

    <defs>
        <marker id="arrow-purple" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#862e9c" />
        </marker>
    </defs>
</svg>