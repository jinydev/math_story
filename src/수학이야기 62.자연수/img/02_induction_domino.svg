<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%">
    <rect width="600" height="300" fill="#2d3436" />
    
    <!-- Title -->
    <text x="300" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        수학적 귀납법: 무한의 도미노 (Mathematical Induction)
    </text>

    <!-- Floor line -->
    <line x1="50" y1="220" x2="550" y2="220" stroke="#b2bec3" stroke-width="4" stroke-linecap="round"/>

    <!-- Legend -->
    <text x="50" y="270" font-family="Arial" font-size="16" fill="#74b9ff">n=1 (Base Case)</text>
    <text x="250" y="270" font-family="Arial" font-size="16" fill="#a29bfe">n=k (Inductive Step)</text>
    <text x="450" y="270" font-family="Arial" font-size="16" fill="#fd79a8">n=k+1 (The Next)</text>

    <!-- Domino 1 (Base Case) -->
    <g>
        <rect x="80" y="120" width="20" height="100" fill="#0984e3" rx="3">
            <!-- Animation: Falls to the right -->
            <animateTransform attributeName="transform" type="rotate" 
                              values="0 80 220; 60 80 220; 60 80 220" 
                              dur="3s" repeatCount="indefinite" keyTimes="0; 0.2; 1"/>
        </rect>
    </g>

    <!-- Domino 2 -->
    <g>
        <rect x="140" y="120" width="20" height="100" fill="#6c5ce7" rx="3">
            <animateTransform attributeName="transform" type="rotate" 
                              values="0 140 220; 0 140 220; 60 140 220; 60 140 220" 
                              dur="3s" repeatCount="indefinite" keyTimes="0; 0.15; 0.35; 1"/>
        </rect>
    </g>

    <!-- Domino 3 -->
    <g>
        <rect x="200" y="120" width="20" height="100" fill="#6c5ce7" rx="3">
            <animateTransform attributeName="transform" type="rotate" 
                              values="0 200 220; 0 200 220; 60 200 220; 60 200 220" 
                              dur="3s" repeatCount="indefinite" keyTimes="0; 0.3; 0.5; 1"/>
        </rect>
    </g>

    <!-- Domino 4 (The k-th case) -->
    <g>
        <rect x="260" y="120" width="20" height="100" fill="#6c5ce7" rx="3">
            <animateTransform attributeName="transform" type="rotate" 
                              values="0 260 220; 0 260 220; 60 260 220; 60 260 220" 
                              dur="3s" repeatCount="indefinite" keyTimes="0; 0.45; 0.65; 1"/>
        </rect>
    </g>

    <!-- Domino 5 (The k+1 case) -->
    <g>
        <rect x="320" y="120" width="20" height="100" fill="#d63031" rx="3">
            <animateTransform attributeName="transform" type="rotate" 
                              values="0 320 220; 0 320 220; 60 320 220; 60 320 220" 
                              dur="3s" repeatCount="indefinite" keyTimes="0; 0.6; 0.8; 1"/>
        </rect>
    </g>
    
    <!-- The rest to infinity (fading effect) -->
    <g opacity="0.6">
        <rect x="380" y="120" width="20" height="100" fill="#b2bec3" rx="3">
            <animateTransform attributeName="transform" type="rotate" 
                              values="0 380 220; 0 380 220; 60 380 220; 60 380 220" 
                              dur="3s" repeatCount="indefinite" keyTimes="0; 0.75; 0.95; 1"/>
        </rect>
    </g>
    <g opacity="0.3">
        <rect x="440" y="120" width="20" height="100" fill="#b2bec3" rx="3">
            <animateTransform attributeName="transform" type="rotate" 
                              values="0 440 220; 0 440 220; 60 440 220; 60 440 220" 
                              dur="3s" repeatCount="indefinite" keyTimes="0; 0.9; 1; 1"/>
        </rect>
    </g>

    <text x="500" y="170" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9" opacity="0.5">. . . $\infty$</text>
</svg>
