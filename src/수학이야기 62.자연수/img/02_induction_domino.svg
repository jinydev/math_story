<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350">
    <rect width="700" height="350" fill="#12b886" rx="15" opacity="0.1" />

    <text x="350" y="40" fill="#0ca678" font-size="24" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">수학적 귀납법 (무한의 도미노 쓰러트리기 정석)</text>

    <line x1="50" y1="280" x2="650" y2="280" stroke="#adb5bd" stroke-width="4" />

    <!-- Base Case -->
    <rect x="100" y="120" width="30" height="150" fill="#e03131" rx="5" transform="rotate(25, 115, 270)" />
    <text x="100" y="100" fill="#c92a2a" font-size="18" font-weight="bold" text-anchor="middle">1단계</text>
    <text x="100" y="320" fill="#c92a2a" font-size="16" font-family="monospace" font-weight="bold"
        text-anchor="middle">n = 1</text>
    <rect x="50" y="60" width="100" height="30" fill="#ffe3e3" stroke="#f03e3e" stroke-width="2" rx="4" />
    <text x="100" y="80" fill="#c92a2a" font-size="14" font-weight="bold" text-anchor="middle">"첫 번째를 민다"</text>

    <!-- Arrow -->
    <path d="M 120 200 Q 150 160 180 200" fill="none" stroke="#f03e3e" stroke-width="4" marker-end="url(#arrow-red)" />

    <!-- Inductive Step: k and k+1 -->
    <!-- Falling domino k -->
    <rect x="300" y="120" width="30" height="150" fill="#1c7ed6" rx="5" transform="rotate(25, 315, 270)" />
    <text x="320" y="320" fill="#1864ab" font-size="16" font-family="monospace" font-weight="bold"
        text-anchor="middle">n = k</text>

    <!-- Standing domino k+1 about to be hit -->
    <rect x="400" y="130" width="30" height="150" fill="#74c0fc" rx="5" />
    <text x="415" y="320" fill="#1864ab" font-size="16" font-family="monospace" font-weight="bold"
        text-anchor="middle">n = k+1</text>

    <text x="355" y="100" fill="#1864ab" font-size="18" font-weight="bold" text-anchor="middle">2단계</text>
    <rect x="250" y="60" width="210" height="30" fill="#e7f5ff" stroke="#339af0" stroke-width="2" rx="4" />
    <text x="355" y="80" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">"k가 넘어지면, k+1도
        넘어진다"</text>

    <!-- Impact Spark -->
    <circle cx="355" cy="180" r="15" fill="#fcc419" />
    <path
        d="M 355 160 L 360 170 L 375 165 L 365 180 L 380 190 L 365 195 L 370 210 L 355 200 L 340 210 L 345 195 L 330 190 L 345 180 L 335 165 L 350 170 Z"
        fill="#ffd43b" />

    <!-- Infinite series -->
    <rect x="500" y="130" width="30" height="150" fill="#dee2e6" rx="5" />
    <rect x="550" y="130" width="30" height="150" fill="#dee2e6" rx="5" />
    <text x="640" y="240" fill="#495057" font-size="30" font-weight="bold" letter-spacing="5">...</text>

    <!-- Conclusion -->
    <rect x="200" y="10" width="300" height="30" fill="#fff3cd" stroke="#ffe69c" stroke-width="2" rx="5" />
    <text x="350" y="30" fill="#856404" font-size="14" font-weight="bold" text-anchor="middle">단 2단계 확인만으로 '모든 무한대'가
        쓰러짐을 증명한다!</text>

    <defs>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f03e3e" />
        </marker>
    </defs>
</svg>