<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="300">
    <rect width="800" height="300" fill="#2d3436" />
    <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        유클리드의 완벽한 정수 차원계 (1D, 2D, 3D)
    </text>

    <!-- 1D Line -->
    <g transform="translate(100, 150)">
        <line x1="0" y1="0" x2="100" y2="0" stroke="#74b9ff" stroke-width="4" />
        <circle cx="0" cy="0" r="4" fill="#74b9ff" />
        <circle cx="100" cy="0" r="4" fill="#74b9ff" />
        <text x="50" y="-15" font-family="Arial" font-size="16" fill="#74b9ff" text-anchor="middle">1차원 (선)</text>
        <text x="50" y="25" font-family="Arial" font-size="14" fill="#b2bec3" text-anchor="middle">길이만 존재</text>
    </g>

    <!-- 2D Square -->
    <g transform="translate(350, 100)">
        <rect x="0" y="0" width="100" height="100" fill="none" stroke="#fdcb6e" stroke-width="4" />
        <text x="50" y="-15" font-family="Arial" font-size="16" fill="#fdcb6e" text-anchor="middle">2차원 (면)</text>
        <text x="50" y="55" font-family="Arial" font-size="14" fill="#b2bec3" text-anchor="middle">넓이 배율 $2^2=4$</text>
    </g>

    <!-- 3D Cube (isometric projection approximation) -->
    <g transform="translate(600, 100)">
        <!-- Back Face -->
        <rect x="25" y="-25" width="100" height="100" fill="none" stroke="#55efc4" stroke-width="2" stroke-dasharray="4" opacity="0.5" />
        <!-- Connecting lines -->
        <line x1="0" y1="0" x2="25" y2="-25" stroke="#55efc4" stroke-width="2" opacity="0.5" />
        <line x1="100" y1="0" x2="125" y2="-25" stroke="#55efc4" stroke-width="2" opacity="0.5" />
        <line x1="100" y1="100" x2="125" y2="75" stroke="#55efc4" stroke-width="2" />
        <line x1="0" y1="100" x2="25" y2="75" stroke="#55efc4" stroke-width="2" />
        <!-- Front Face -->
        <rect x="0" y="0" width="100" height="100" fill="none" stroke="#55efc4" stroke-width="4" />
        <text x="50" y="-40" font-family="Arial" font-size="16" fill="#55efc4" text-anchor="middle">3차원 (입체)</text>
        <text x="50" y="55" font-family="Arial" font-size="14" fill="#b2bec3" text-anchor="middle">부피 배율 $2^3=8$</text>
    </g>
</svg>
