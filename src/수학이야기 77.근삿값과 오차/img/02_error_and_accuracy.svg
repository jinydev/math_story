<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A202C" />
      <stop offset="100%" stop-color="#2D3748" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bgGrad)" rx="15" />

  <text x="400" y="40" font-family="'Inter', sans-serif" font-size="28" font-weight="bold" fill="#F7FAFC" text-anchor="middle" filter="url(#glow)">거짓말의 크기: 절대 오차 vs 상대 오차</text>
  <text x="400" y="70" font-family="'Inter', sans-serif" font-size="16" fill="#A0AEC0" text-anchor="middle">"1cm 를 틀렸다." 과연 이것은 치명적인 실수일까요, 애교일까요?</text>

  <!-- Absolute Error the Same -->
  <rect x="50" y="100" width="700" height="150" fill="#2D3748" rx="10" stroke="#4A5568" stroke-width="2"/>
  <text x="70" y="130" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#F6AD55"> Case 1 vs Case 2 (둘 다 1cm 오차발생)</text>

  <!-- Case 1: Pencil -->
  <g transform="translate(80, 160)">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#E2E8F0">연필 길이 (참값 10cm)</text>
    <rect x="0" y="20" width="200" height="20" fill="#4FD1C5" rx="5"/>
    <text x="100" y="35" font-family="'Inter', sans-serif" font-size="12" fill="#1A202C" text-anchor="middle" font-weight="bold">진짜 연필 10cm</text>
    
    <!-- Error chunk 1cm -->
    <rect x="200" y="20" width="40" height="20" fill="rgba(252, 129, 129, 0.4)" stroke="#FC8181" stroke-width="2" rx="4"/>
    <text x="220" y="15" font-family="'Inter', sans-serif" font-size="14" fill="#FC8181" text-anchor="middle">+ 1cm 오차</text>

    <!-- Evaluation -->
    <text x="100" y="70" font-family="'Inter', sans-serif" font-size="18" fill="#FC8181" text-anchor="middle" font-weight="bold">상대 오차 = 10% (치명적!)</text>
  </g>

  <line x1="400" y1="120" x2="400" y2="230" stroke="#4A5568" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Case 2: Bridge -->
  <g transform="translate(420, 160)">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#E2E8F0">초대형 교량 길이 (참값 10,000cm = 100m)</text>
    <rect x="0" y="20" width="300" height="20" fill="#4FD1C5" rx="5"/>
    <text x="150" y="35" font-family="'Inter', sans-serif" font-size="12" fill="#1A202C" text-anchor="middle" font-weight="bold">진짜 대교 100m (10,000cm)</text>
    
    <!-- Error chunk 1cm (tiny representation) -->
    <rect x="300" y="20" width="5" height="20" fill="rgba(252, 129, 129, 0.8)" stroke="#FC8181" stroke-width="1"/>
    <text x="315" y="15" font-family="'Inter', sans-serif" font-size="14" fill="#FC8181" text-anchor="start">+ 1cm 오차</text>

    <!-- Evaluation -->
    <text x="150" y="70" font-family="'Inter', sans-serif" font-size="18" fill="#4FD1C5" text-anchor="middle" font-weight="bold">상대 오차 = 0.01% (아주 훌륭함!)</text>
  </g>

  <!-- Math Summary Box -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="700" height="130" fill="#1A202C" rx="10" stroke="#9F7AEA" stroke-width="2"/>
    
    <!-- Left Equation -->
    <text x="170" y="35" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#9F7AEA" text-anchor="middle" filter="url(#glow)">1. 절대 오차 (Absolute Error)</text>
    <text x="170" y="70" font-family="'Inter', sans-serif" font-size="22" font-weight="bold" fill="#F7FAFC" text-anchor="middle">측정값 - 참값</text>
    <text x="170" y="100" font-family="'Inter', sans-serif" font-size="14" fill="#A0AEC0" text-anchor="middle">둘 다 그냥 "+1cm" 의 팩트 폭격</text>

    <!-- Divider -->
    <line x1="350" y1="20" x2="350" y2="110" stroke="#4A5568" stroke-width="2"/>

    <!-- Right Equation -->
    <text x="530" y="35" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#ECC94B" text-anchor="middle" filter="url(#glow)">2. 상대 오차 (Relative Error)</text>
    <text x="530" y="65" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#F7FAFC" text-anchor="middle">|절대오차| / 참값 (비율)</text>
    <line x1="430" y1="75" x2="630" y2="75" stroke="#F7FAFC" stroke-width="2"/>
    <text x="530" y="100" font-family="'Inter', sans-serif" font-size="14" fill="#A0AEC0" text-anchor="middle">"전체 규모(참값)에 비해서 얼마나 틀렸는가?"를 따지는 평가 지표</text>
  </g>

</svg>
