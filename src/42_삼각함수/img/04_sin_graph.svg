<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#339af0" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">끊임없는 파동 에너지: 사인함수 (sin x) 의 그래프</text>

    <!-- Axes Setup -->
    <g transform="translate(50, 140)">
        <!-- X-axis (Angle) -->
        <line x1="0" y1="0" x2="500" y2="0" stroke="#868e96" stroke-width="2" />
        <path d="M 500 0 L 490 5 L 490 -5 Z" fill="#868e96" />
        <text x="500" y="-10" fill="#495057" font-size="12" font-family="sans-serif">x (라디안 각도)</text>

        <!-- Y-axis (Value) -->
        <line x1="20" y1="-80" x2="20" y2="80" stroke="#868e96" stroke-width="2" />
        <path d="M 20 -80 L 15 -70 L 25 -70 Z" fill="#868e96" />
        <text x="30" y="-75" fill="#495057" font-size="12" font-family="sans-serif">y = sin(x)</text>

        <!-- Sine Wave Generation (0 to 2*PI, slightly extended) -->
        <!-- 2*PI mapped to width 400. y is scaled to amplitude 60 -->
        <path d="M 20 0 
             C 100 -120, 140 -120, 220 0 
             C 300 120,  340 120,  420 0
             C 470 -60,  490 -60,  500 -20" fill="none" stroke="#339af0" stroke-width="4" />

        <!-- Markers -->
        <!-- Y Max/Min -->
        <line x1="15" y1="-50" x2="25" y2="-50" stroke="#868e96" stroke-width="2" />
        <text x="-5" y="-45" fill="#e03131" font-size="14" font-family="monospace">+1</text>

        <line x1="15" y1="50" x2="25" y2="50" stroke="#868e96" stroke-width="2" />
        <text x="-5" y="55" fill="#339af0" font-size="14" font-family="monospace">-1</text>

        <!-- Guidelines -->
        <line x1="20" y1="-50" x2="480" y2="-50" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,4" />
        <line x1="20" y1="50" x2="480" y2="50" stroke="#ced4da" stroke-width="1" stroke-dasharray="4,4" />

        <!-- X Points -->
        <!-- PI / 2 (Peak) -->
        <circle cx="120" cy="-50" r="4" fill="#e03131" />
        <text x="120" y="-60" fill="#e03131" font-size="12" font-family="sans-serif" text-anchor="middle">π/2
            (90°)</text>

        <!-- PI (Cross zero) -->
        <circle cx="220" cy="0" r="4" fill="#339af0" />
        <text x="220" y="15" fill="#339af0" font-size="12" font-family="sans-serif" text-anchor="middle">π (180°)</text>

        <!-- 3*PI / 2 (Valley) -->
        <circle cx="320" cy="50" r="4" fill="#e03131" />
        <text x="320" y="65" fill="#e03131" font-size="12" font-family="sans-serif" text-anchor="middle">3π/2
            (270°)</text>

        <!-- 2*PI (Cycle complete) -->
        <circle cx="420" cy="0" r="4" fill="#339af0" />
        <text x="420" y="-10" fill="#339af0" font-size="12" font-family="sans-serif" text-anchor="middle">2π
            (360°)</text>

        <!-- Cycle Marker -->
        <path d="M 20 80 L 420 80" fill="none" stroke="#f08c00" stroke-width="2" marker-end="url(#arrow-orange)"
            marker-start="url(#arrow-orange)" />
        <text x="220" y="95" fill="#d9480f" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">주기 (주파수 1 사이클) = 2π</text>

    </g>

    <defs>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f08c00" />
        </marker>
    </defs>
</svg>