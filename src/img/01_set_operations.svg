<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .title {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 14px;
                text-anchor: middle;
            }

            .circle {
                fill: none;
                stroke-width: 3;
            }

            .c-a {
                stroke: #0088ff;
            }

            .c-b {
                stroke: #ff6464;
            }

            /* Fill Patterns for 4 operations */
            .fill-intersect {
                fill: rgba(150, 0, 255, 0.5);
            }

            .fill-union-a {
                fill: rgba(0, 136, 255, 0.4);
            }

            .fill-union-b {
                fill: rgba(255, 100, 100, 0.4);
            }

            .fill-diff {
                fill: rgba(0, 136, 255, 0.6);
            }

            .fill-comp {
                fill: rgba(255, 255, 0, 0.2);
            }

            /* Base Universe Box */
            .u-box {
                fill: none;
                stroke: #30363d;
                stroke-width: 2;
                rx: 5;
                ry: 5;
            }

            .u-box-comp {
                fill: rgba(255, 255, 0, 0.2);
                stroke: #30363d;
                stroke-width: 2;
                rx: 5;
                ry: 5;
            }

            .math-title {
                font-size: 18px;
                fill: #ffffff;
                text-anchor: middle;
            }

            .math-symbol {
                font-size: 20px;
                font-weight: bold;
                fill: #00ff00;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="400" y="30" class="title">집합의 4대 연산 (Set Operations)</text>
    <text x="400" y="55" class="desc">교집합(&cap;), 합집합(&cup;), 차집합(&minus;), 여집합(c)</text>

    <!-- 1. Intersection (A ∩ B) -->
    <g transform="translate(100, 150)">
        <rect x="-80" y="-60" width="160" height="120" class="u-box" />
        <!-- Clip Path for Intersection -->
        <clipPath id="clip-intersect">
            <circle cx="20" cy="0" r="40" />
        </clipPath>
        <!-- Draw filled A only where it intersects B -->
        <circle cx="-20" cy="0" r="40" class="fill-intersect" clip-path="url(#clip-intersect)" />

        <circle cx="-20" cy="0" r="40" class="circle c-a" />
        <circle cx="20" cy="0" r="40" class="circle c-b" />

        <text x="-35" y="-5" fill="#0088ff" font-size="14">A</text>
        <text x="35" y="-5" fill="#ff6464" font-size="14">B</text>

        <text x="0" y="90" class="math-title">교집합 (Intersection)</text>
        <text x="0" y="115" class="math-symbol">A ∩ B</text>
    </g>

    <!-- 2. Union (A ∪ B) -->
    <g transform="translate(300, 150)">
        <rect x="-80" y="-60" width="160" height="120" class="u-box" />

        <circle cx="-20" cy="0" r="40" class="fill-union-a" />
        <circle cx="20" cy="0" r="40" class="fill-union-b" />

        <circle cx="-20" cy="0" r="40" class="circle c-a" />
        <circle cx="20" cy="0" r="40" class="circle c-b" />

        <text x="-35" y="-5" fill="#ffffff" font-size="14">A</text>
        <text x="35" y="-5" fill="#ffffff" font-size="14">B</text>

        <text x="0" y="90" class="math-title">합집합 (Union)</text>
        <text x="0" y="115" class="math-symbol">A ∪ B</text>
    </g>

    <!-- 3. Difference (A - B) -->
    <g transform="translate(500, 150)">
        <rect x="-80" y="-60" width="160" height="120" class="u-box" />

        <!-- Clip Path to subtract B from A -->
        <!-- We want everything inside A that is OUTSIDE B. There isn't a simple out-clip, so we use a mask -->
        <mask id="mask-diff">
            <rect x="-100" y="-100" width="200" height="200" fill="white" />
            <circle cx="20" cy="0" r="40" fill="black" /> <!-- Exclude B -->
        </mask>

        <circle cx="-20" cy="0" r="40" class="fill-diff" mask="url(#mask-diff)" />

        <circle cx="-20" cy="0" r="40" class="circle c-a" />
        <circle cx="20" cy="0" r="40" class="circle c-b" />

        <text x="-35" y="-5" fill="#ffffff" font-size="14">A</text>

        <text x="0" y="90" class="math-title">차집합 (Difference)</text>
        <text x="0" y="115" class="math-symbol">A − B</text>
    </g>

    <!-- 4. Complement (A^c) -->
    <g transform="translate(700, 150)">
        <!-- The Universe is filled with color -->
        <rect x="-80" y="-60" width="160" height="120" class="u-box-comp" />

        <!-- Mask to punch a hole where A is -->
        <mask id="mask-comp">
            <rect x="-100" y="-100" width="200" height="200" fill="white" />
            <circle cx="0" cy="0" r="40" fill="black" />
        </mask>

        <!-- Redraw the filled Universe but masked with hole A -->
        <rect x="-80" y="-60" width="160" height="120" class="fill-comp" mask="url(#mask-comp)" />
        <rect x="-80" y="-60" width="160" height="120" fill="none" class="u-box" />

        <!-- Empty A inside (looks like a hole exposing background black) -->
        <circle cx="0" cy="0" r="40" fill="#0d1117" />
        <circle cx="0" cy="0" r="40" class="circle c-a" />

        <text x="0" y="5" fill="#0088ff" font-size="18">A</text>
        <text x="-65" y="-40" fill="#aaaaaa" font-size="16">U</text>

        <text x="0" y="90" class="math-title">여집합 (Complement)</text>
        <text x="0" y="115" class="math-symbol">A^c</text>
    </g>

    <!-- Summary of Python Sets at the bottom -->
    <g transform="translate(400, 380)">
        <rect x="-350" y="0" width="700" height="100" fill="#161b22" stroke="#30363d" stroke-width="2" rx="10" />
        <text x="0" y="30" fill="#00ffff" font-size="18">Python `set` Operators (파이썬 로직)</text>
        <text x="-250" y="60" fill="#ffffff" font-size="16">교집합: <tspan fill="#ff00ff">A &amp; B</tspan></text>
        <text x="-80" y="60" fill="#ffffff" font-size="16">합집합: <tspan fill="#ff00ff">A | B</tspan></text>
        <text x="90" y="60" fill="#ffffff" font-size="16">차집합: <tspan fill="#ff00ff">A - B</tspan></text>
        <text x="250" y="60" fill="#ffffff" font-size="16">대칭 차집합: <tspan fill="#ff00ff">A ^ B</tspan></text>
        <text x="0" y="85" fill="#888888" font-size="14">("A △ B: 양쪽 순수 멤버만 남기고 교부분 제거")</text>
    </g>

</svg>