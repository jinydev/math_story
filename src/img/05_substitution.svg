<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .math {
                font-size: 32px;
                text-anchor: middle;
            }

            .var-x {
                fill: #00ffff;
            }

            .var-y {
                fill: #ff6464;
            }

            .num {
                fill: #ffffff;
            }

            .pill {
                fill: rgba(255, 100, 100, 0.2);
                stroke: #ff6464;
                stroke-width: 3;
                rx: 20;
                ry: 20;
            }

            .arrow {
                fill: none;
                stroke: #ffff00;
                stroke-width: 4;
                stroke-dasharray: 6, 4;
                marker-end: url(#arrowhead);
            }

            .box {
                fill: none;
                stroke: #30363d;
                stroke-width: 2;
                rx: 10;
                ry: 10;
            }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="450" y="40" class="title">필살기 2: 형태 변이 캡슐 투여, 대입법 (Substitution Method)</text>
    <text x="450" y="65" class="desc">하나의 식을 y 덩어리 캡슐로 만들어서, 다른 식의 y 자리에 통째로 주사기를 꽂듯 밀어 넣는 전술</text>

    <!-- Step 1: Definition -->
    <g transform="translate(150, 200)">
        <rect x="-120" y="-60" width="240" height="120" class="box" fill="rgba(255,100,100,0.05)" />
        <text x="0" y="-80" fill="#ffaa64" font-size="18" text-anchor="middle">1번 식: 스파이 y의 정체</text>

        <text x="-50" y="10" class="math var-y">y</text>
        <text x="-10" y="10" class="math">=</text>

        <!-- Capsule -->
        <rect x="15" y="-20" width="100" height="40" class="pill" />
        <text x="65" y="10" class="math var-x" font-size="24">2x + 1</text>
    </g>

    <!-- Step 2: The Attack (Substitution) -->
    <g transform="translate(600, 200)">
        <rect x="-240" y="-60" width="480" height="120" class="box" fill="rgba(0,255,255,0.05)" />
        <text x="0" y="-80" fill="#ffaa64" font-size="18" text-anchor="middle">2번 식: 타겟 공격 (대입 파괴)</text>

        <!-- Original form outline -->
        <text x="-80" y="-30" class="math" fill="#50667b" font-size="20">3x + 2y = 16</text>

        <!-- Substituted form -->
        <text x="-160" y="30" class="math var-x">3x</text>
        <text x="-120" y="30" class="math">+</text>
        <text x="-90" y="30" class="math">2</text>

        <!-- Injection port -->
        <rect x="-70" y="0" width="180" height="40" class="pill" fill="rgba(255,255,0,0.2)" stroke="#ffff00"
            stroke-width="4" stroke-dasharray="4,2" />
        <text x="-60" y="30" class="math" fill="#ffff00">(</text>
        <text x="20" y="30" class="math var-x" font-size="28">2x + 1</text>
        <text x="100" y="30" class="math" fill="#ffff00">)</text>

        <text x="150" y="30" class="math">=</text>
        <text x="200" y="30" class="math num">16</text>
    </g>

    <!-- Injection Arrow -->
    <path d="M 270 200 Q 350 200 500 200" class="arrow" />
    <text x="385" y="180" fill="#ffff00" font-size="18" text-anchor="middle">y 파츠 교체 (대입)</text>

    <!-- Final outcome -->
    <rect x="250" y="330" width="400" height="80" class="box" fill="rgba(0,255,0,0.1)" stroke="#00ff00" />
    <text x="450" y="380" fill="#ffffff" font-size="24" text-anchor="middle">👉 7x = 14 (y 소거 완료!)</text>

</svg>