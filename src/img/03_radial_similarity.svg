<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .polygon1 {
                fill: rgba(0, 255, 255, 0.2);
                stroke: #00ffff;
                stroke-width: 3;
                stroke-linejoin: round;
            }

            .polygon2 {
                fill: rgba(255, 170, 100, 0.1);
                stroke: #ffaa64;
                stroke-width: 3;
                stroke-dasharray: 4, 4;
                stroke-linejoin: round;
            }

            .laser {
                fill: none;
                stroke: #ffffff;
                stroke-width: 2;
                stroke-dasharray: 5, 5;
                opacity: 0.5;
            }

            .point {
                fill: #ff6464;
            }

            .label {
                fill: #ffffff;
                font-size: 18px;
                text-anchor: middle;
            }

            .title {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="40" class="title">닮음의 중심을 지나는 방사선 그리기 (투시도법과 2배 스케일링)</text>
    <text x="400" y="65" class="desc">빛줄기가 퍼져나가며 교차점(O)으로부터 2배 먼 거리에 점을 찍어 똑같은 비율의 도형을 매핑</text>

    <!-- Point O (Center of Similarity) at (100, 250) -->
    <circle cx="100" cy="250" r="6" class="point" />
    <text x="80" y="255" class="label" fill="#ff6464">O</text>

    <!-- Small Triangle ABC -->
    <!-- A: (300, 150), B: (250, 300), C: (380, 280) -->
    <!-- Vector OA = (200, -100) -> 2x = (400, -200) -> A'(500, 50) -->
    <!-- Vector OB = (150, 50) -> 2x = (300, 100) -> B'(400, 350) -->
    <!-- Vector OC = (280, 30) -> 2x = (560, 60) -> C'(660, 310) -->

    <!-- Laser Beams -->
    <line x1="100" y1="250" x2="600" y2="0" class="laser" /> <!-- Past A' -->
    <line x1="100" y1="250" x2="550" y2="400" class="laser" /> <!-- Past B' -->
    <line x1="100" y1="250" x2="800" y2="325" class="laser" /> <!-- Past C' -->

    <!-- Small Triangle -->
    <polygon points="300,150 250,300 380,280" class="polygon1" />
    <circle cx="300" cy="150" r="4" fill="#00ffff" />
    <text x="290" y="140" class="label" fill="#00ffff">A</text>
    <circle cx="250" cy="300" r="4" fill="#00ffff" />
    <text x="240" y="320" class="label" fill="#00ffff">B</text>
    <circle cx="380" cy="280" r="4" fill="#00ffff" />
    <text x="390" y="270" class="label" fill="#00ffff">C</text>

    <!-- Large Triangle -->
    <polygon points="500,50 400,350 660,310" class="polygon2" />
    <circle cx="500" cy="50" r="4" fill="#ffaa64" />
    <text x="500" y="35" class="label" fill="#ffaa64">A'</text>
    <circle cx="400" cy="350" r="4" fill="#ffaa64" />
    <text x="390" y="375" class="label" fill="#ffaa64">B'</text>
    <circle cx="660" cy="310" r="4" fill="#ffaa64" />
    <text x="680" y="315" class="label" fill="#ffaa64">C'</text>

    <!-- Distances Logic overlays -->
    <path d="M 210 180 Q 250 160 290 200" fill="none" stroke="#00ffff" stroke-width="2" marker-end="url(#arrow)" />
    <text x="180" y="200" fill="#00ffff" font-size="14">거리 1배</text>

    <path d="M 310 145 Q 400 90 490 60" fill="none" stroke="#ffaa64" stroke-width="2" marker-end="url(#arrow)" />
    <text x="420" y="100" fill="#ffaa64" font-size="14">거리 2배</text>

</svg>