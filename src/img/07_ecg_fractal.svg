<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .grid {
                stroke: rgba(0, 255, 255, 0.1);
                stroke-width: 1;
            }

            .healthy-line {
                fill: none;
                stroke: #64ff64;
                stroke-width: 3;
                stroke-linejoin: bevel;
                filter: drop-shadow(0 0 3px #64ff64);
            }

            .sick-line {
                fill: none;
                stroke: #ff6464;
                stroke-width: 3;
                stroke-linecap: round;
                filter: drop-shadow(0 0 3px #ff6464);
            }

            .anim-draw {
                stroke-dasharray: 2000;
                animation: draw-wave 4s linear infinite;
            }

            @keyframes draw-wave {
                from {
                    stroke-dashoffset: 2000;
                }

                to {
                    stroke-dashoffset: 0;
                }
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 14px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <!-- Background Grid rendering -->
    <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
        <rect width="20" height="20" fill="none" class="grid" />
    </pattern>
    <rect x="50" y="100" width="700" height="150" fill="url(#gridPattern)" />
    <rect x="50" y="300" width="700" height="150" fill="url(#gridPattern)" />

    <text x="400" y="40" class="title">생체 신호의 프랙탈 (심전도 ECG)</text>
    <text x="400" y="70" class="desc">건강한 심장은 자연의 무작위성(프랙탈 노이즈)을 가지며, 죽어가는 심장은 유클리드의 정칙성을 가진다</text>

    <!-- Healthy ECG (Fractal noise embedded) -->
    <g transform="translate(50, 175)">
        <text x="-10" y="0" fill="#64ff64" font-size="20">HEALTHY [Fractal Noise: High]</text>
        <polyline points="
      0,0 15,2 25,-8 35,5 45,-2 55,10 65,-5 75,-20 85,60 95,-80 105,20 115,-3 125,5 135,-4 145,2 155,-7 165,15 175,-5 185,2 200,0
      215,-4 225,5 235,-7 245,20 255,-5 265,-25 275,70 285,-90 295,25 305,-5 315,8 325,-9 335,4 345,-6 355,12 365,-2 375,5 400,0
      415,2 425,-8 435,5 445,-2 455,10 465,-5 475,-30 485,65 495,-85 505,15 515,-3 525,5 535,-4 545,2 555,-7 565,15 575,-5 585,2 600,0
      615,-5 625,6 635,-8 645,15 655,-10 665,-20 675,55 685,-85 695,20 700,0
    " class="healthy-line anim-draw" />
        <text x="690" y="-50" fill="#64ff64" font-size="16" text-anchor="end">복잡도: 1.5차원 이상 (정상적인 환경 적응)</text>
    </g>

    <!-- Sick ECG (Smooth Euclidean sine wave) -->
    <g transform="translate(50, 375)">
        <text x="-10" y="0" fill="#ff6464" font-size="20">SICK [Fractal Noise: LOW]</text>
        <path d="
      M 0 0 
      Q 25 -30, 50 0 T 100 0 T 150 0 T 200 0 T 250 0 T 300 0 T 350 0 
      T 400 0 T 450 0 T 500 0 T 550 0 T 600 0 T 650 0 T 700 0
    " class="sick-line anim-draw" />

        <text x="690" y="-50" fill="#ff6464" font-size="16" text-anchor="end">복잡도: 1.0차원에 수렴 (외부 자극에 붕괴 직전)</text>
    </g>
</svg>