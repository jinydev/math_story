<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .box {
                fill: #161b22;
                stroke: #30363d;
                stroke-width: 2;
                rx: 10;
            }

            .public-box {
                fill: rgba(0, 255, 255, 0.1);
                stroke: #00ffff;
                stroke-width: 2;
                rx: 10;
            }

            .private-box {
                fill: rgba(255, 215, 0, 0.1);
                stroke: #ffd700;
                stroke-width: 2;
                rx: 10;
            }

            .label-text {
                fill: #ffffff;
                font-size: 16px;
                text-anchor: middle;
            }

            .cyber-text {
                fill: #00ffff;
                font-size: 14px;
                text-anchor: middle;
            }

            .private-text {
                fill: #ffd700;
                font-size: 14px;
                text-anchor: middle;
            }

            .arrow {
                fill: none;
                stroke: #8b949e;
                stroke-width: 3;
                marker-end: url(#head);
            }

            .title {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
            }
        </style>
        <marker id="head" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="40" class="title">RSA 비대칭 키 모듈러 암호화 워크플로우</text>

    <!-- Left Side: Sender (Bob) -->
    <rect x="50" y="100" width="200" height="200" class="box" />
    <text x="150" y="130" class="label-text" font-size="20">보내는 사람 (Bob)</text>

    <text x="150" y="180" class="label-text">평문 (Plaintext)</text>
    <text x="150" y="200" class="cyber-text">"2"</text>

    <rect x="70" y="220" width="160" height="50" class="public-box" />
    <text x="150" y="240" class="cyber-text">영희의 공개키(n,e)</text>
    <text x="150" y="260" class="cyber-text">인터넷에서 다운로드</text>

    <!-- Middle: Internet -->
    <path d="M 260 200 L 540 200" class="arrow" />
    <path d="M 320 180 Q 400 120 480 180" fill="none" stroke="#ffaa64" stroke-width="2" stroke-dasharray="5,5" />
    <text x="400" y="160" class="label-text" fill="#ffaa64">암호문 (Ciphertext)</text>
    <text x="400" y="185" class="label-text" fill="#ff6464">"29"</text>
    <text x="400" y="230" fill="#8b949e" font-size="12" text-anchor="middle">도청자(해커)는 풀지 못함</text>

    <!-- Right Side: Receiver (Alice) -->
    <rect x="550" y="100" width="200" height="200" class="box" />
    <text x="650" y="130" class="label-text" font-size="20">받는 사람 (Alice)</text>

    <rect x="570" y="160" width="160" height="50" class="private-box" />
    <text x="650" y="180" class="private-text">개인키(d,p,q)</text>
    <text x="650" y="200" class="private-text">본인만 가지고 있음</text>

    <text x="650" y="250" class="label-text">복호화 된 원본</text>
    <text x="650" y="270" class="cyber-text">"2"</text>

    <path d="M 650 210 L 650 230" class="arrow" />

</svg>