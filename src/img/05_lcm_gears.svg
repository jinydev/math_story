<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .gear-12 {
                fill: none;
                stroke: #00ffff;
                stroke-width: 8;
                stroke-dasharray: 20, 10;
            }

            .gear-inner-12 {
                fill: rgba(0, 255, 255, 0.1);
                stroke: #00ffff;
                stroke-width: 4;
            }

            .gear-18 {
                fill: none;
                stroke: #64ff64;
                stroke-width: 8;
                stroke-dasharray: 20, 10;
            }

            .gear-inner-18 {
                fill: rgba(100, 255, 100, 0.1);
                stroke: #64ff64;
                stroke-width: 4;
            }

            .sync-point {
                fill: #ff6464;
                stroke: #ffffff;
                stroke-width: 2;
                filter: drop-shadow(0 0 10px #ff6464);
            }

            .pulse {
                animation: pulse 2s infinite alternate;
            }

            @keyframes pulse {
                0% {
                    r: 10;
                    opacity: 0.8;
                }

                100% {
                    r: 15;
                    opacity: 1;
                }
            }

            .arrow {
                stroke: #ffff00;
                stroke-width: 4;
            }

            .title {
                fill: #ffffff;
                font-size: 28px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .box {
                fill: #161b22;
                stroke: #30363d;
                stroke-width: 2;
                rx: 5;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" fill="#0d1117" />

    <text x="400" y="50" class="title">최소공배수 (LCM): 궤도 동기화</text>

    <g transform="translate(0, 20)">
        <!-- Gear 12 (Left) -->
        <g transform="translate(250, 200)">
            <circle cx="0" cy="0" r="100" class="gear-12" />
            <circle cx="0" cy="0" r="80" class="gear-inner-12" />
            <circle cx="0" cy="0" r="10" fill="#00ffff" />
            <!-- Spokes -->
            <line x1="-80" y1="0" x2="80" y2="0" stroke="#00ffff" stroke-width="4" />
            <line x1="0" y1="-80" x2="0" y2="80" stroke="#00ffff" stroke-width="4" />

            <!-- Math Info -->
            <text x="-130" y="-120" fill="#00ffff" font-size="20">12 톱니바퀴</text>
            <path d="M -60 -100 A 70 70 0 0 0 -60 100" fill="none" class="arrow" />
            <polygon points="-60,100 -50,90 -70,90" fill="#ffff00" />
            <text x="-180" y="0" fill="#ffff00" font-size="18">3바퀴 회전</text>
        </g>

        <!-- Gear 18 (Right) -->
        <g transform="translate(500, 200)">
            <circle cx="0" cy="0" r="150" class="gear-18" />
            <circle cx="0" cy="0" r="130" class="gear-inner-18" />
            <circle cx="0" cy="0" r="10" fill="#64ff64" />
            <!-- Spokes -->
            <line x1="-130" y1="0" x2="130" y2="0" stroke="#64ff64" stroke-width="4" />
            <line x1="0" y1="-130" x2="0" y2="130" stroke="#64ff64" stroke-width="4" />
            <line x1="-92" y1="-92" x2="92" y2="92" stroke="#64ff64" stroke-width="4" />
            <line x1="-92" y1="92" x2="92" y2="-92" stroke="#64ff64" stroke-width="4" />

            <!-- Math Info -->
            <text x="120" y="-160" fill="#64ff64" font-size="20">18 톱니바퀴</text>
            <path d="M 120 100 A 100 100 0 0 0 120 -100" fill="none" class="arrow" />
            <polygon points="120,-100 110,-90 130,-90" fill="#ffff00" />
            <text x="180" y="0" fill="#ffff00" font-size="18">2바퀴 회전</text>
        </g>

        <!-- Sync Point -->
        <circle cx="350" cy="200" class="sync-point pulse" />
        <text x="350" y="240" fill="#ff6464" font-size="16" text-anchor="middle">SYNC</text>
    </g>

    <!-- Info Panel -->
    <g transform="translate(100, 380)">
        <rect width="600" height="80" class="box" />
        <text x="300" y="30" fill="#ffffff" font-size="20" text-anchor="middle">12의 배수: 12, 24, [36], 48 ...</text>
        <text x="300" y="60" fill="#ffffff" font-size="20" text-anchor="middle">18의 배수: 18, [36], 54 ...</text>

        <text x="500" y="45" fill="#ff6464" font-size="28" font-weight="bold">LCM = 36</text>
    </g>

</svg>