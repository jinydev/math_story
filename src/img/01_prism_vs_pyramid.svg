<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .shape-line {
                fill: none;
                stroke: #00ffff;
                stroke-width: 3;
                stroke-linejoin: round;
            }

            .shape-line-dash {
                fill: none;
                stroke: #00ffff;
                stroke-width: 2;
                stroke-dasharray: 6, 4;
                stroke-linejoin: round;
            }

            .shape-fill {
                fill: rgba(0, 255, 255, 0.1);
            }

            .pyramid-line {
                fill: none;
                stroke: #ff6464;
                stroke-width: 3;
                stroke-linejoin: round;
            }

            .pyramid-line-dash {
                fill: none;
                stroke: #ff6464;
                stroke-width: 2;
                stroke-dasharray: 6, 4;
                stroke-linejoin: round;
            }

            .pyramid-fill {
                fill: rgba(255, 100, 100, 0.15);
            }

            .label {
                fill: #ffffff;
                font-size: 20px;
                text-anchor: middle;
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .formula {
                fill: #64ff64;
                font-size: 22px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="400" y="40" class="title">각기둥(Prism)과 각뿔(Pyramid)의 부피 비율</text>
    <text x="400" y="70" class="desc">밑면과 높이가 동일할 때, 뿔의 부피는 기둥의 정확히 1/3 이다.</text>

    <!-- Left: Prism -->
    <g transform="translate(200, 250)">
        <!-- Base Bottom -->
        <path d="M-60 50 L60 50 L100 0 L-20 0 Z" class="shape-fill" />
        <path d="M-60 50 L60 50 L100 0" class="shape-line" />
        <path d="M100 0 L-20 0 L-60 50" class="shape-line-dash" />

        <!-- Base Top -->
        <path d="M-60 -100 L60 -100 L100 -150 L-20 -150 Z" fill="rgba(0, 255, 255, 0.2)" stroke="#00ffff"
            stroke-width="3" stroke-linejoin="round" />

        <!-- Vertical Edges -->
        <line x1="-60" y1="50" x2="-60" y2="-100" class="shape-line" />
        <line x1="60" y1="50" x2="60" y2="-100" class="shape-line" />
        <line x1="100" y1="0" x2="100" y2="-150" class="shape-line" />
        <line x1="-20" y1="0" x2="-20" y2="-150" class="shape-line-dash" />

        <!-- Height Line -->
        <line x1="120" y1="50" x2="120" y2="-100" stroke="#fff" stroke-width="2" stroke-dasharray="4,4" />
        <text x="140" y="-15" fill="#fff" font-size="16">높이(h)</text>

        <text x="20" y="25" fill="#00ffff" font-size="16" text-anchor="middle">밑면(A)</text>

        <text x="20" y="110" class="label">사각기둥</text>
        <text x="20" y="140" class="formula">부피(V) = A × h</text>
    </g>

    <!-- Center Ratio text -->
    <text x="400" y="200" fill="#ffffff" font-size="40" font-weight="bold" text-anchor="middle">VS</text>

    <!-- Right: Pyramid -->
    <g transform="translate(600, 250)">
        <!-- Base Bottom (Same as Prism) -->
        <path d="M-60 50 L60 50 L100 0 L-20 0 Z" class="pyramid-fill" />
        <path d="M-60 50 L60 50 L100 0" class="pyramid-line" />
        <path d="M100 0 L-20 0 L-60 50" class="pyramid-line-dash" />

        <!-- Apex -->
        <circle cx="20" cy="-125" r="4" fill="#ff6464" />

        <!-- Slanted Edges -->
        <line x1="-60" y1="50" x2="20" y2="-125" class="pyramid-line" />
        <line x1="60" y1="50" x2="20" y2="-125" class="pyramid-line" />
        <line x1="100" y1="0" x2="20" y2="-125" class="pyramid-line" />
        <line x1="-20" y1="0" x2="20" y2="-125" class="pyramid-line-dash" />

        <!-- Height Line -->
        <line x1="20" y1="-125" x2="20" y2="25" stroke="#fff" stroke-width="2" stroke-dasharray="4,4" />
        <text x="40" y="-30" fill="#fff" font-size="16">높이(h)</text>

        <text x="-15" y="35" fill="#ff6464" font-size="16">밑면(A)</text>

        <text x="20" y="110" class="label">사각뿔</text>
        <text x="20" y="140" fill="#ffaa64" font-size="22" font-weight="bold" text-anchor="middle">부피(V) = ⅓ × A ×
            h</text>
    </g>

</svg>