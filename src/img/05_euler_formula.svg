<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .obj-line {
                fill: none;
                stroke: #00ffff;
                stroke-width: 3;
                stroke-linejoin: round;
            }

            .obj-fill {
                fill: rgba(0, 255, 255, 0.1);
            }

            .obj-dash {
                fill: none;
                stroke: #50667b;
                stroke-width: 2;
                stroke-dasharray: 4, 4;
                stroke-linejoin: round;
            }

            .vertex-dot {
                fill: #ff6464;
            }

            .edge-hi {
                fill: none;
                stroke: #ffff00;
                stroke-width: 4;
            }

            .face-hi {
                fill: rgba(0, 255, 0, 0.3);
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .math {
                fill: #64ff64;
                font-size: 24px;
                text-anchor: middle;
            }

            .math-big {
                fill: #ffaa64;
                font-size: 32px;
                font-weight: bold;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="400" y="40" class="title">위상수학의 시작: 오일러의 다면체 공식 (V - E + F = 2)</text>
    <text x="400" y="65" class="desc">구멍이 없는 모든 3D 덩어리는 (꼭짓점 - 모서리 + 면)의 합이 항상 우주 상수 '2'로 떨어진다.</text>

    <!-- Left: Cube Test -->
    <g transform="translate(200, 240)">
        <!-- Cube Iso -->
        <path d="M-30 -50 L50 -50 L50 30 M-30 -50 L-30 30 L10 50" class="obj-dash" />
        <path d="M-30 30 L50 30" class="obj-dash" />

        <polygon points="-50,-30 30,-30 30,50 -50,50" class="obj-fill" stroke="#00ffff" stroke-width="3" />
        <polygon points="-50,-30 -30,-50 50,-50 30,-30" fill="rgba(0,255,0,0.2)" stroke="#00ffff" stroke-width="3" />
        <polygon points="30,-30 50,-50 50,30 30,50" fill="rgba(0,255,255,0.2)" stroke="#00ffff" stroke-width="3" />

        <!-- Vertices Highlight -->
        <circle cx="-50" cy="-30" r="5" class="vertex-dot" />
        <circle cx="30" cy="-30" r="5" class="vertex-dot" />
        <circle cx="30" cy="50" r="5" class="vertex-dot" />
        <circle cx="-50" cy="50" r="5" class="vertex-dot" />
        <circle cx="-30" cy="-50" r="5" class="vertex-dot" />
        <circle cx="50" cy="-50" r="5" class="vertex-dot" />
        <circle cx="50" cy="30" r="5" class="vertex-dot" />

        <text x="0" y="-80" fill="#fff" font-size="20" text-anchor="middle">[ 정육면체 상자 ]</text>
        <text x="0" y="100" class="math">V(점): 8</text>
        <text x="0" y="130" class="math">E(선): 12</text>
        <text x="0" y="160" class="math">F(면): 6</text>

        <text x="0" y="195" class="math-big">8 - 12 + 6 = 2</text>
    </g>

    <!-- Right: Pyramid Test -->
    <g transform="translate(600, 240)">
        <!-- Pyramid -->
        <path d="M100 20 L-20 20 L-60 40" class="obj-dash" />

        <polygon points="-60,40 60,40 100,20 -20,20" class="obj-fill" />
        <path d="M-60 40 L60 40 L100 20" class="obj-line" />

        <!-- Apex -->
        <circle cx="20" cy="-70" r="5" class="vertex-dot" />
        <circle cx="-60" cy="40" r="5" class="vertex-dot" />
        <circle cx="60" cy="40" r="5" class="vertex-dot" />
        <circle cx="100" cy="20" r="5" class="vertex-dot" />
        <circle cx="-20" cy="20" r="5" class="vertex-dot" opacity="0.5" />

        <path d="M-60 40 L20 -70 L60 40" class="obj-line" fill="rgba(255,255,0,0.15)" />
        <path d="M100 20 L20 -70" class="obj-line" />
        <path d="M-20 20 L20 -70" class="obj-dash" />

        <text x="20" y="-100" fill="#fff" font-size="20" text-anchor="middle">[ 이집트 사각뿔 ]</text>
        <text x="20" y="100" class="math">V(점): 5</text>
        <text x="20" y="130" class="math">E(선): 8</text>
        <text x="20" y="160" class="math">F(면): 5</text>

        <text x="20" y="195" class="math-big">5 - 8 + 5 = 2</text>
    </g>

    <line x1="400" y1="120" x2="400" y2="420" stroke="#30363d" stroke-width="2" stroke-dasharray="4,4" />

</svg>