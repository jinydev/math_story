<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
    <defs>
        <style>
            .bg {
                fill: #0d1117;
            }

            .tri {
                fill: rgba(0, 255, 255, 0.1);
                stroke: #00ffff;
                stroke-width: 1.5;
                filter: drop-shadow(0 0 2px #00ffff);
            }

            .tri-dark {
                fill: #0d1117;
                stroke: none;
            }

            .title {
                fill: #00ffff;
                font-family: 'Roboto Mono', monospace;
                font-size: 24px;
                text-anchor: middle;
                font-weight: bold;
            }

            .desc {
                fill: #8b949e;
                font-family: 'Roboto Mono', monospace;
                font-size: 14px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="300" y="40" class="title">시어핀스키 삼각형 (Sierpinski Triangle)</text>
    <text x="300" y="65" class="desc">가운데 면적을 무한히 도려내어 결국 면적이 0이 되는 공간 파괴의 저주</text>

    <!-- Group holding the fractal -->
    <g transform="translate(300, 100)">
        <!-- Main outer triangle -->
        <polygon points="0,0 -200,346.41 200,346.41" class="tri" />

        <!-- Level 1 Cut -->
        <polygon points="0,346.41 -100,173.205 100,173.205" class="tri-dark" />

        <!-- Level 2 Cuts -->
        <polygon points="-100,346.41 -150,259.807 -50,259.807" class="tri-dark" />
        <polygon points="100,346.41 50,259.807 150,259.807" class="tri-dark" />
        <polygon points="0,173.205 -50,86.602 50,86.602" class="tri-dark" />

        <!-- Level 3 Cuts -->
        <polygon points="-150,346.41 -175,303.11 -125,303.11" class="tri-dark" />
        <polygon points="-50,346.41 -75,303.11 -25,303.11" class="tri-dark" />
        <polygon points="-100,259.807 -125,216.5 -75,216.5" class="tri-dark" />

        <polygon points="50,346.41 25,303.11 75,303.11" class="tri-dark" />
        <polygon points="150,346.41 125,303.11 175,303.11" class="tri-dark" />
        <polygon points="100,259.807 75,216.5 125,216.5" class="tri-dark" />

        <polygon points="-50,173.205 -75,129.9 -25,129.9" class="tri-dark" />
        <polygon points="50,173.205 25,129.9 75,129.9" class="tri-dark" />
        <polygon points="0,86.602 -25,43.3 25,43.3" class="tri-dark" />

        <!-- Level 4 cuts representation -->
        <g class="tri-dark">
            <polygon points="-175,346.41 -187.5,324.76 -162.5,324.76" />
            <polygon points="-125,346.41 -137.5,324.76 -112.5,324.76" />
            <polygon points="-150,303.11 -162.5,281.46 -137.5,281.46" />
            <polygon points="-75,346.41 -87.5,324.76 -62.5,324.76" />
            <polygon points="-25,346.41 -37.5,324.76 -12.5,324.76" />
            <polygon points="-50,303.11 -62.5,281.46 -37.5,281.46" />
            <polygon points="-125,259.81 -137.5,238.16 -112.5,238.16" />
            <polygon points="-75,259.81 -87.5,238.16 -62.5,238.16" />
            <polygon points="-100,216.5 -112.5,194.85 -87.5,194.85" />
            <polygon points="25,346.41 12.5,324.76 37.5,324.76" />
            <polygon points="75,346.41 62.5,324.76 87.5,324.76" />
            <polygon points="50,303.11 37.5,281.46 62.5,281.46" />
            <polygon points="125,346.41 112.5,324.76 137.5,324.76" />
            <polygon points="175,346.41 162.5,324.76 187.5,324.76" />
            <polygon points="150,303.11 137.5,281.46 162.5,281.46" />
            <polygon points="75,259.81 62.5,238.16 87.5,238.16" />
            <polygon points="125,259.81 112.5,238.16 137.5,238.16" />
            <polygon points="100,216.5 87.5,194.85 112.5,194.85" />
            <polygon points="-75,173.21 -87.5,151.56 -62.5,151.56" />
            <polygon points="-25,173.21 -37.5,151.56 -12.5,151.56" />
            <polygon points="-50,129.9 -62.5,108.25 -37.5,108.25" />
            <polygon points="25,173.21 12.5,151.56 37.5,151.56" />
            <polygon points="75,173.21 62.5,151.56 87.5,151.56" />
            <polygon points="50,129.9 37.5,108.25 62.5,108.25" />
            <polygon points="-25,86.6 -37.5,64.95 -12.5,64.95" />
            <polygon points="25,86.6 12.5,64.95 37.5,64.95" />
            <polygon points="0,43.3 -12.5,21.65 12.5,21.65" />
        </g>
    </g>
</svg>