<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 300">
    <rect width="650" height="300" fill="#1e1e1e" rx="10" />
    <text x="325" y="30" fill="#38d9a9" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">복이차식 (Biquadratic) 연쇄 폭발 해체 구조</text>

    <!-- Trivial X^4 Form -->
    <g transform="translate(50, 50)">
        <circle cx="60" cy="50" r="45" fill="#c92a2a" stroke="#ff8787" stroke-width="3" />
        <text x="60" y="58" fill="#fff" font-size="18" font-weight="bold" font-family="monospace"
            text-anchor="middle">x⁴</text>
        <text x="60" y="80" fill="#ffa8a8" font-size="10" font-weight="bold" text-anchor="middle">4차원 시한폭탄</text>
    </g>

    <!-- Process -->
    <path d="M 160 100 L 210 100" stroke="#868e96" stroke-width="3" marker-end="url(#arrow)" />
    <text x="185" y="90" fill="#ced4da" font-size="12" font-weight="bold" text-anchor="middle">치환 (x²=X)</text>

    <!-- First Breakdown: 2 X^2 bombs -->
    <g transform="translate(230, 40)">
        <rect x="0" y="0" width="140" height="120" fill="none" stroke="#fcc419" stroke-width="2" stroke-dasharray="5,5"
            rx="10" />
        <text x="70" y="20" fill="#fcc419" font-size="14" font-weight="bold" text-anchor="middle">2차 분해 완료 (X)</text>

        <circle cx="40" cy="65" r="30" fill="#e67700" stroke="#fcc419" stroke-width="2" />
        <text x="40" y="70" fill="#fff" font-size="14" font-family="monospace" font-weight="bold"
            text-anchor="middle">x²-4</text>

        <circle cx="100" cy="65" r="30" fill="#e67700" stroke="#fcc419" stroke-width="2" />
        <text x="100" y="70" fill="#fff" font-size="14" font-family="monospace" font-weight="bold"
            text-anchor="middle">x²-9</text>
    </g>

    <!-- Second Process -->
    <path d="M 390 100 L 440 100" stroke="#868e96" stroke-width="3" marker-end="url(#arrow)" />
    <text x="415" y="90" fill="#ff6b6b" font-size="12" font-weight="bold" text-anchor="middle">합차 2연속기!</text>

    <!-- Final shatter -->
    <g transform="translate(460, 40)">
        <!-- 4 crystals -->
        <polygon points="30,40 50,50 30,70 10,50" fill="#74c0fc" />
        <text x="30" y="55" fill="#000" font-size="10" font-weight="bold" text-anchor="middle">x+2</text>

        <polygon points="80,20 100,30 80,50 60,30" fill="#74c0fc" />
        <text x="80" y="35" fill="#000" font-size="10" font-weight="bold" text-anchor="middle">x-2</text>

        <polygon points="70,80 90,90 70,110 50,90" fill="#74c0fc" />
        <text x="70" y="95" fill="#000" font-size="10" font-weight="bold" text-anchor="middle">x+3</text>

        <polygon points="120,60 140,70 120,90 100,70" fill="#74c0fc" />
        <text x="120" y="75" fill="#000" font-size="10" font-weight="bold" text-anchor="middle">x-3</text>

        <text x="75" y="140" fill="#74c0fc" font-size="14" font-weight="bold" text-anchor="middle">4개의 안전한 1차 조각</text>
    </g>

    <!-- Example Expression -->
    <text x="325" y="240" fill="#adb5bd" font-size="16" font-family="monospace" text-anchor="middle">
        x⁴ - 13x² + 36 = (x - 2)(x + 2)(x - 3)(x + 3)
    </text>
    <line x1="150" y1="260" x2="500" y2="260" stroke="#495057" stroke-width="2" />

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96" />
        </marker>
    </defs>
</svg>