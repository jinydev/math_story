<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300">
    <rect width="700" height="300" fill="#f4fce3" rx="10" />

    <text x="350" y="30" fill="#2b8a3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">내림차순 (Descending Order) 정렬: 혼돈을 뼈대로!</text>

    <!-- Step 1: The messy equation -->
    <rect x="50" y="50" width="600" height="50" fill="#fff" stroke="#adb5bd" stroke-width="2" rx="5" />
    <text x="350" y="82" fill="#495057" font-size="20" font-family="monospace" font-weight="bold" text-anchor="middle">
        x² + xy - 2y² + 2x + 5y - 3
    </text>
    <text x="350" y="115" fill="#f03e3e" font-size="12" font-weight="bold" text-anchor="middle">정돈되지 않은 혼돈 상태</text>

    <!-- Arrow -->
    <path d="M 350 120 L 350 150" stroke="#868e96" stroke-width="3" marker-end="url(#arrow)" />
    <rect x="360" y="125" width="160" height="20" fill="#20c997" rx="10" />
    <text x="440" y="140" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">기준(Key): x로 정렬!</text>

    <!-- Step 2: Sorted Equation -->
    <rect x="150" y="160" width="400" height="70" fill="#e3fafc" stroke="#15aabf" stroke-width="2" rx="5" />

    <rect x="170" y="175" width="60" height="40" fill="#3bc9db" rx="5" />
    <text x="200" y="202" fill="#fff" font-size="20" font-family="monospace" font-weight="bold"
        text-anchor="middle">x²</text>

    <text x="245" y="202" fill="#0b7285" font-size="20" font-family="monospace" font-weight="bold"
        text-anchor="middle">+</text>

    <rect x="260" y="175" width="100" height="40" fill="#ffa8a8" rx="5" />
    <text x="310" y="202" fill="#c92a2a" font-size="18" font-family="monospace" font-weight="bold"
        text-anchor="middle">(y+2)x</text>

    <text x="375" y="202" fill="#0b7285" font-size="20" font-family="monospace" font-weight="bold"
        text-anchor="middle">-</text>

    <rect x="390" y="175" width="150" height="40" fill="#fcc419" rx="5" />
    <text x="465" y="202" fill="#b08814" font-size="16" font-family="monospace" font-weight="bold"
        text-anchor="middle">(2y²-5y+3)</text>

    <text x="200" y="250" fill="#0b7285" font-size="12" font-weight="bold" text-anchor="middle">[2차 항]</text>
    <text x="310" y="250" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">[1차 계수 덩어리]</text>
    <text x="465" y="250" fill="#b08814" font-size="12" font-weight="bold" text-anchor="middle">[x가 없는 나머지 부품들]</text>

    <text x="350" y="285" fill="#1864ab" font-size="16" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">
        마치 커다란 식 [ A² + B A + C ] 처럼 깔끔한 뼈대가 되었다!
    </text>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96" />
        </marker>
    </defs>
</svg>