<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A202C" />
      <stop offset="100%" stop-color="#2D3748" />
    </linearGradient>

    <!-- Neon Glow Filters -->
    <filter id="glowPink">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowBlue">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F687B3" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#63B3ED" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" rx="15" />

  <!-- Title -->
  <text x="400" y="45" font-family="'Inter', sans-serif" font-size="28" font-weight="bold" fill="#F7FAFC" text-anchor="middle" filter="url(#glowPink)">오목과 볼록: 2차 미분 더블 스캔 (Concavity)</text>
  <text x="400" y="70" font-family="'Inter', sans-serif" font-size="14" fill="#A0AEC0" text-anchor="middle">"등짝이 밀리며 치솟는 U자(아래로 볼록) vs 브레이크 박고 꺾어지는 엎어진 우산(위로 볼록)"</text>

  <!-- Left Side: Concave Up (아래로 볼록, 하늘보고 웃는 입) -->
  <!-- Parabola shape U -->
  <path d="M 100,150 Q 200,350 300,150" fill="none" stroke="#F687B3" stroke-width="5" stroke-linecap="round" filter="url(#glowPink)" />
  
  <text x="200" y="110" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#F687B3" text-anchor="middle" filter="url(#glowPink)">f''(x) &gt; 0 (가속 지대)</text>
  <text x="200" y="135" font-family="'Inter', sans-serif" font-size="16" fill="#E2E8F0" text-anchor="middle">아래로 볼록 (U자 밥그릇)</text>

  <!-- Speed Vectors changing slope (Steeper and steeper upwards) -->
  <line x1="120" y1="210" x2="160" y2="300" stroke="#F687B3" stroke-width="2" stroke-dasharray="4,2" />
  <line x1="180" y1="260" x2="220" y2="260" stroke="#F687B3" stroke-width="2" stroke-dasharray="4,2" />
  <line x1="240" y1="300" x2="280" y2="210" stroke="#F687B3" stroke-width="4" marker-end="url(#arrowPink)" filter="url(#glowPink)" />
  <text x="320" y="240" font-family="'Inter', sans-serif" font-size="12" fill="#F687B3">"기울기 값 상승 중!"</text>


  <!-- Right Side: Concave Down (위로 볼록, 엎어진 우산 슬픈 입) -->
  <!-- Inverted Parabola shape n -->
  <path d="M 500,280 Q 600,80 700,280" fill="none" stroke="#63B3ED" stroke-width="5" stroke-linecap="round" filter="url(#glowBlue)" />
  
  <rect x="520" y="310" width="160" height="60" fill="rgba(99,179,237,0.15)" rx="8" stroke="#63B3ED" stroke-width="1" />
  <text x="600" y="335" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#63B3ED" text-anchor="middle" filter="url(#glowBlue)">f''(x) &lt; 0 (감속)</text>
  <text x="600" y="355" font-family="'Inter', sans-serif" font-size="16" fill="#E2E8F0" text-anchor="middle">위로 볼록 (우산 뚜껑)</text>

  <!-- Speed Vectors changing slope (Flatting out and diving down) -->
  <line x1="520" y1="220" x2="560" y2="130" stroke="#63B3ED" stroke-width="4"  marker-end="url(#arrowBlue)" filter="url(#glowBlue)"/>
  <line x1="580" y1="170" x2="620" y2="170" stroke="#63B3ED" stroke-width="2" stroke-dasharray="4,2" />
  <line x1="640" y1="130" x2="680" y2="220" stroke="#63B3ED" stroke-width="2" stroke-dasharray="4,2" />
  <text x="470" y="190" font-family="'Inter', sans-serif" font-size="12" fill="#63B3ED">"기울기 값 나락 중!"</text>


  <!-- Middle Divider -->
  <line x1="400" y1="100" x2="400" y2="380" stroke="#718096" stroke-width="2" stroke-dasharray="8,8" />

  <!-- Explanation Bottom Box -->
  <rect x="100" y="400" width="600" height="40" fill="rgba(0,0,0,0.6)" rx="5" />
  <text x="400" y="425" font-family="'Inter', sans-serif" font-size="14" fill="#E2E8F0" text-anchor="middle">"2차 미분값이 양수면 하늘을 담는 그릇. 음수면 비를 튕겨내는 우산 껍데기로 형태가 왜곡된다!"</text>

</svg>
