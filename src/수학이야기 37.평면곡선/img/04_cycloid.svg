<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#e3fafc" rx="10" />

    <text x="300" y="30" fill="#0c8599" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">바퀴가 굴러가며 그리는 환상의 곡선: 사이클로이드 (Cycloid)</text>

    <g transform="translate(0, 150)">
        <!-- Base line -->
        <line x1="20" y1="50" x2="580" y2="50" stroke="#868e96" stroke-width="4" />

        <!-- Cycloid path -->
        <path d="M 50 50 Q 120 -80 180 -80 T 310 50 Q 380 -80 440 -80 T 570 50" fill="none" stroke="#22b8cf"
            stroke-width="4" stroke-dasharray="8,8" />

        <!-- Wheel 1 (Start) -->
        <circle cx="50" cy="10" r="40" fill="none" stroke="#868e96" stroke-width="2" />
        <line x1="50" y1="10" x2="50" y2="50" stroke="#f03e3e" stroke-width="3" />
        <circle cx="50" cy="50" r="5" fill="#f03e3e" />

        <!-- Wheel 2 (Middle) -->
        <circle cx="115" cy="10" r="40" fill="none" stroke="#868e96" stroke-width="2" />
        <line x1="115" y1="10" x2="75" y2="10" stroke="#f03e3e" stroke-width="3" />
        <circle cx="75" cy="10" r="5" fill="#f03e3e" />

        <!-- Wheel 3 (Top) -->
        <circle cx="180" cy="10" r="40" fill="#e3fafc" stroke="#868e96" stroke-width="2" />
        <line x1="180" y1="10" x2="180" y2="-30" stroke="#f03e3e" stroke-width="3" />
        <circle cx="180" cy="-30" r="5" fill="#f03e3e" />

        <text x="180" y="-50" fill="#f03e3e" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">최고점!</text>

        <!-- Moving Arrows -->
        <path d="M 60 10 A 30 30 0 0 1 80 -10" fill="none" stroke="#adb5bd" stroke-width="3"
            marker-end="url(#arrow-grey)" />
        <path d="M 125 10 A 30 30 0 0 1 145 -10" fill="none" stroke="#adb5bd" stroke-width="3"
            marker-end="url(#arrow-grey)" />
    </g>

    <defs>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>