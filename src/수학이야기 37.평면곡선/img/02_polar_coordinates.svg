<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
    <rect width="600" height="300" fill="#f3f0ff" rx="10" />

    <text x="300" y="30" fill="#5f3dc4" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">세상을 바라보는 두 개의 시선: 직교좌표 vs 극좌표</text>

    <!-- Left Side: Cartesian Coordinate (x, y) -->
    <g transform="translate(150, 160)">
        <text x="0" y="-110" fill="#7048e8" font-size="18" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">1. 직교좌표 (x, y)</text>

        <!-- Grid -->
        <g stroke="#e5dbff" stroke-width="1">
            <line x1="-80" y1="-80" x2="80" y2="-80" />
            <line x1="-80" y1="-40" x2="80" y2="-40" />
            <line x1="-80" y1="40" x2="80" y2="40" />
            <line x1="-80" y1="80" x2="80" y2="80" />

            <line x1="-80" y1="-80" x2="-80" y2="80" />
            <line x1="-40" y1="-80" x2="-40" y2="80" />
            <line x1="40" y1="-80" x2="40" y2="80" />
            <line x1="80" y1="-80" x2="80" y2="80" />
        </g>

        <!-- Axes -->
        <line x1="-100" y1="0" x2="100" y2="0" stroke="#845ef7" stroke-width="2" marker-end="url(#arrow-purple)" />
        <line x1="0" y1="100" x2="0" y2="-100" stroke="#845ef7" stroke-width="2" marker-end="url(#arrow-purple)" />

        <text x="90" y="15" fill="#845ef7" font-size="14" font-family="sans-serif" font-weight="bold">X</text>
        <text x="10" y="-90" fill="#845ef7" font-size="14" font-family="sans-serif" font-weight="bold">Y</text>

        <!-- Point P -->
        <circle cx="80" cy="-60" r="5" fill="#d6336c" />
        <text x="90" y="-70" fill="#d6336c" font-size="16" font-family="sans-serif" font-weight="bold">P(4, 3)</text>

        <!-- Lines to P -->
        <path d="M 0 0 L 80 0 L 80 -60" fill="none" stroke="#d6336c" stroke-width="3" stroke-dasharray="5,5" />
        <text x="40" y="15" fill="#d6336c" font-size="14" font-family="sans-serif" font-weight="bold">x=4</text>
        <text x="90" y="-30" fill="#d6336c" font-size="14" font-family="sans-serif" font-weight="bold">y=3</text>
    </g>

    <!-- Right Side: Polar Coordinate (r, theta) -->
    <g transform="translate(450, 160)">
        <text x="0" y="-110" fill="#0c8599" font-size="18" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">2. 극좌표 (r, θ)</text>

        <!-- Concentric Circles (Radar) -->
        <g stroke="#c5f6fa" stroke-width="1" fill="none">
            <circle cx="0" cy="0" r="30" />
            <circle cx="0" cy="0" r="60" />
            <circle cx="0" cy="0" r="90" />
        </g>

        <!-- Polar Axis -->
        <line x1="0" y1="0" x2="100" y2="0" stroke="#1098ad" stroke-width="2" marker-end="url(#arrow-teal)" />
        <text x="60" y="15" fill="#1098ad" font-size="14" font-family="sans-serif" font-weight="bold">극축 (Polar
            Axis)</text>

        <!-- Point P -->
        <circle cx="80" cy="-60" r="5" fill="#d6336c" />
        <text x="90" y="-70" fill="#d6336c" font-size="16" font-family="sans-serif" font-weight="bold">P(5, 37°)</text>

        <!-- Vector r -->
        <line x1="0" y1="0" x2="80" y2="-60" stroke="#d6336c" stroke-width="3" />
        <text x="30" y="-40" fill="#d6336c" font-size="16" font-family="sans-serif" font-weight="bold">거리 r=5</text>

        <!-- Angle theta -->
        <path d="M 30 0 A 30 30 0 0 0 24 -18" fill="none" stroke="#d6336c" stroke-width="2"
            marker-end="url(#arrow-pink)" />
        <text x="35" y="-10" fill="#d6336c" font-size="16" font-family="sans-serif" font-weight="bold">θ=37°</text>
    </g>

    <!-- Markers -->
    <defs>
        <marker id="arrow-purple" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#845ef7" />
        </marker>
        <marker id="arrow-teal" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#1098ad" />
        </marker>
        <marker id="arrow-pink" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#d6336c" />
        </marker>
    </defs>
</svg>