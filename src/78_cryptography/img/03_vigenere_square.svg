<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="100%" height="450">
    <defs>
        <style>
            .bg {
                fill: #fdfbf7;
                rx: 10;
                stroke: #e0dcd3;
                stroke-width: 2;
            }

            .table-border {
                stroke: #264653;
                stroke-width: 2;
                fill: none;
            }

            .grid-line {
                stroke: #e0dcd3;
                stroke-width: 1;
            }

            .text-title {
                font-family: 'Pretendard', sans-serif;
                font-size: 18px;
                fill: #e76f51;
                font-weight: bold;
                text-anchor: middle;
            }

            .text-sub {
                font-family: 'Pretendard', sans-serif;
                font-size: 14px;
                fill: #4a4e69;
                text-anchor: middle;
            }

            .text-cell {
                font-family: 'Courier New', monospace;
                font-size: 14px;
                fill: #2a9d8f;
                font-weight: bold;
                text-anchor: middle;
            }

            .text-header {
                font-family: 'Courier New', monospace;
                font-size: 15px;
                fill: #ffffff;
                font-weight: bold;
                text-anchor: middle;
            }

            .row-header {
                fill: #e76f51;
            }

            .col-header {
                fill: #2a9d8f;
            }

            .highlight-row {
                fill: #e76f51;
                opacity: 0.2;
            }

            .highlight-col {
                fill: #2a9d8f;
                opacity: 0.2;
            }

            .highlight-intersect {
                fill: #e63946;
                stroke: #1d3557;
                stroke-width: 2;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="300" y="40" class="text-title">Vigenère Square (비제네르 암호 교차 사각형)</text>
    <text x="300" y="65" class="text-sub">평문의 글자와 톱니바퀴 키(Key)의 글자가 십자가로 만나는 좌표가 암호가 됩니다.</text>

    <!-- Table Container (Offset x: 100, y: 100) -->
    <g transform="translate(140, 90)">

        <!-- Header Backgrounds -->
        <rect x="0" y="0" width="40" height="40" fill="#264653" />
        <rect x="40" y="0" width="280" height="40" class="col-header" />
        <rect x="0" y="40" width="40" height="280" class="row-header" />

        <text x="180" y="-15" class="text-sub" fill="#2a9d8f" font-weight="bold">평문 (Plain Text) [세로축 읽기]</text>
        <text x="-50" y="180" class="text-sub" fill="#e76f51" font-weight="bold" transform="rotate(-90, -50, 180)">키
            (Master Key)</text>

        <!-- Highlight intersection for Key='C', Plain='E' -> Cipher='G' -->
        <rect x="40" y="120" width="280" height="40" class="highlight-row" />
        <rect x="200" y="40" width="40" height="280" class="highlight-col" />
        <rect x="200" y="120" width="40" height="40" class="highlight-intersect" />

        <!-- Grid Lines and Cells (Showing A-G subset for illustration) -->
        <!-- Col Headers A-G -->
        <text x="60" y="25" class="text-header">A</text>
        <text x="100" y="25" class="text-header">B</text>
        <text x="140" y="25" class="text-header">C</text>
        <text x="180" y="25" class="text-header">D</text>
        <text x="220" y="25" class="text-header">E</text>
        <text x="260" y="25" class="text-header">F</text>
        <text x="300" y="25" class="text-header">G</text>

        <!-- Row Headers A-G -->
        <text x="20" y="65" class="text-header">A</text>
        <text x="20" y="105" class="text-header">B</text>
        <text x="20" y="145" class="text-header">C</text>
        <text x="20" y="185" class="text-header">D</text>
        <text x="20" y="225" class="text-header">E</text>
        <text x="20" y="265" class="text-header">F</text>
        <text x="20" y="305" class="text-header">G</text>

        <!-- Cipher Matrix A Row -->
        <text x="60" y="65" class="text-cell">A</text><text x="100" y="65" class="text-cell">B</text>
        <text x="140" y="65" class="text-cell">C</text><text x="180" y="65" class="text-cell">D</text>
        <text x="220" y="65" class="text-cell">E</text><text x="260" y="65" class="text-cell">F</text>
        <text x="300" y="65" class="text-cell">G</text>

        <!-- Cipher Matrix B Row -->
        <text x="60" y="105" class="text-cell">B</text><text x="100" y="105" class="text-cell">C</text>
        <text x="140" y="105" class="text-cell">D</text><text x="180" y="105" class="text-cell">E</text>
        <text x="220" y="105" class="text-cell">F</text><text x="260" y="105" class="text-cell">G</text>
        <text x="300" y="105" class="text-cell">H</text>

        <!-- Cipher Matrix C Row (Highlighted) -->
        <text x="60" y="145" class="text-cell" fill="#ffffff">C</text><text x="100" y="145" class="text-cell"
            fill="#ffffff">D</text>
        <text x="140" y="145" class="text-cell" fill="#ffffff">E</text><text x="180" y="145" class="text-cell"
            fill="#ffffff">F</text>
        <text x="220" y="145" class="text-cell" fill="#ffffff" font-size="18px">G</text> <!-- Intersection target -->
        <text x="260" y="145" class="text-cell" fill="#ffffff">H</text><text x="300" y="145" class="text-cell"
            fill="#ffffff">I</text>

        <!-- Cipher Matrix D Row -->
        <text x="60" y="185" class="text-cell">D</text><text x="100" y="185" class="text-cell">E</text>
        <text x="140" y="185" class="text-cell">F</text><text x="180" y="185" class="text-cell">G</text>
        <text x="220" y="185" class="text-cell">H</text><text x="260" y="185" class="text-cell">I</text>
        <text x="300" y="185" class="text-cell">J</text>

        <!-- Empty spaces indicating continuation -->
        <text x="180" y="340" class="text-cell" fill="#6c757d">... continues to Z x Z ...</text>

        <!-- Grid drawing -->
        <!-- Vertical lines -->
        <line x1="40" y1="0" x2="40" y2="320" class="table-border" />
        <line x1="80" y1="40" x2="80" y2="320" class="grid-line" />
        <line x1="120" y1="40" x2="120" y2="320" class="grid-line" />
        <line x1="160" y1="40" x2="160" y2="320" class="grid-line" />
        <line x1="200" y1="40" x2="200" y2="320" class="grid-line" />
        <line x1="240" y1="40" x2="240" y2="320" class="grid-line" />
        <line x1="280" y1="40" x2="280" y2="320" class="grid-line" />
        <!-- Horizontal lines -->
        <line x1="0" y1="40" x2="320" y2="40" class="table-border" />
        <line x1="40" y1="80" x2="320" y2="80" class="grid-line" />
        <line x1="40" y1="120" x2="320" y2="120" class="grid-line" />
        <line x1="40" y1="160" x2="320" y2="160" class="grid-line" />
        <line x1="40" y1="200" x2="320" y2="200" class="grid-line" />
        <line x1="40" y1="240" x2="320" y2="240" class="grid-line" />
        <line x1="40" y1="280" x2="320" y2="280" class="grid-line" />
    </g>

    <rect x="140" y="90" width="320" height="320" class="table-border" />

</svg>