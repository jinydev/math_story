<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#f59f00" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">아홉 번째 전략: 모든 무기의 혼합 및 기타 전술 (Other Strategies)</text>

    <!-- Swiss Army Knife Concept -->
    <g transform="translate(260, 100)">
        <!-- Base knife handle -->
        <rect x="-80" y="-15" width="160" height="30" fill="#fa5252" rx="15" />
        <circle cx="-60" cy="0" r="5" fill="#fff" />
        <circle cx="60" cy="0" r="5" fill="#fff" />

        <text x="0" y="40" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">융합 맥가이버 칼</text>

        <!-- Blade 1: Draw -->
        <path d="M -60 0 C -120 -80, -90 -90, -80 -80 L -60 0 Z" fill="#2b8a3e" opacity="0.8" />
        <text x="-95" y="-55" fill="#2b8a3e" font-size="10" font-weight="bold" text-anchor="middle">그림!</text>

        <!-- Blade 2: Guess -->
        <path d="M 0 -15 L -20 -70 L 20 -70 Z" fill="#1864ab" opacity="0.8" />
        <text x="0" y="-80" fill="#1864ab" font-size="10" font-weight="bold" text-anchor="middle">찍기!</text>

        <!-- Blade 3: Table -->
        <path d="M 60 0 C 120 -80, 90 -90, 80 -80 L 60 0 Z" fill="#862e9c" opacity="0.8" />
        <text x="95" y="-55" fill="#862e9c" font-size="10" font-weight="bold" text-anchor="middle">표!</text>
    </g>

    <!-- Left Side: Change of perspective -->
    <g transform="translate(100, 140)">
        <circle cx="0" cy="0" r="30" fill="#fff" stroke="#adb5bd" stroke-width="2" />
        <path d="M -15 -5 L 15 -5 M -5 5 L 15 5 M -15 15 L 5 15" fill="none" stroke="#adb5bd" stroke-width="2"
            stroke-linecap="round" />

        <path d="M 40 0 C 60 -30, 80 -30, 100 0" fill="none" stroke="#f59f00" stroke-width="3"
            marker-end="url(#arrow-orange)" />

        <text x="70" y="-20" fill="#f59f00" font-size="10" font-weight="bold" text-anchor="middle">관점 변환</text>
    </g>

    <!-- Right Side: Action Simulation -->
    <g transform="translate(420, 140)">
        <rect x="-30" y="-20" width="60" height="40" fill="#ffe3e3" stroke="#e03131" stroke-width="2" rx="4" />
        <text x="0" y="5" fill="#e03131" font-size="10" font-weight="bold" text-anchor="middle">직접</text>
        <text x="0" y="15" fill="#e03131" font-size="10" font-weight="bold" text-anchor="middle">해보기!</text>

        <path d="M -90 0 C -70 -30, -50 -30, -30 0" fill="none" stroke="#f59f00" stroke-width="3"
            marker-end="url(#arrow-orange)" />
    </g>

    <defs>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59f00" />
        </marker>
    </defs>
</svg>