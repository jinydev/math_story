<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#f08c00" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">파티 모자의 비밀: 원뿔의 성질 (Properties of a Cone)</text>

    <!-- 2D Triangle -->
    <g transform="translate(100, 180)">
        <!-- Axis -->
        <line x1="0" y1="20" x2="0" y2="-120" stroke="#868e96" stroke-width="3" stroke-dasharray="6,4" />

        <!-- Right Triangle -->
        <polygon points="0,0 60,0 0,-100" fill="#fff4e6" stroke="#f59f00" stroke-width="3" />

        <text x="-15" y="-50" fill="#f59f00" font-size="14" font-family="sans-serif" font-weight="bold">높이(h)</text>
        <text x="30" y="20" fill="#f59f00" font-size="14" font-family="sans-serif" font-weight="bold">밑변(r)</text>
        <text x="30" y="-60" fill="#e8590c" font-size="14" font-family="sans-serif" font-weight="bold">직각삼각형</text>
    </g>

    <!-- Arrow passing -->
    <path d="M 200 130 Q 250 100 300 130" fill="none" stroke="#adb5bd" stroke-width="3" marker-end="url(#arrow-grey)" />
    <text x="250" y="115" fill="#868e96" font-size="14" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">1바퀴 회전</text>

    <!-- 3D Cone Result -->
    <g transform="translate(450, 180)">
        <!-- Cone Base (Ellipse) -->
        <ellipse cx="0" cy="0" rx="70" ry="20" fill="#ffe8cc" stroke="#f59f00" stroke-width="2" />
        <!-- Cone Body -->
        <path d="M -70 0 L 0 -110 L 70 0 A 70 20 0 0 1 -70 0 Z" fill="#ffd8a8" stroke="#f59f00" stroke-width="2" />
        <!-- Cone Base Hidden Line -->
        <path d="M -70 0 A 70 20 0 0 1 70 0" fill="none" stroke="#e8590c" stroke-width="2" stroke-dasharray="4,4" />

        <!-- Mod line (Generatrix) -->
        <path d="M 0 -110 L 70 0" fill="none" stroke="#d9480f" stroke-width="3" />
        <text x="45" y="-60" fill="#d9480f" font-size="14" font-family="sans-serif" font-weight="bold">모선 (l)</text>

        <!-- Formula Box -->
        <rect x="-80" y="-150" width="160" height="30" fill="#fff" stroke="#ffd8a8" stroke-width="1" rx="4" />
        <text x="0" y="-130" fill="#d9480f" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">부피 = 1/3 × 밑넓이 × 높이</text>
    </g>

    <defs>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>