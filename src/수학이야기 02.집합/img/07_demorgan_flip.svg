<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%">
    <rect width="800" height="400" fill="#1e272e" />
    
    <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#f5f6fa" text-anchor="middle">
        드모르간의 법칙 (De Morgan's Laws)
    </text>

    <!-- Formula 1 -->
    <text x="400" y="100" font-family="Arial" font-size="36" font-weight="bold" fill="#fbc531" text-anchor="middle">
        ( A ∪ B )<tspan fill="#e84118">^c</tspan>  =  A<tspan fill="#e84118">^c</tspan> ∩ B<tspan fill="#e84118">^c</tspan>
    </text>

    <!-- Visualization Box -->
    <rect x="250" y="150" width="300" height="200" fill="#2f3640" rx="10" />
    <text x="270" y="180" font-family="Arial" font-size="20" font-weight="bold" fill="#718093">U</text>

    <g transform="translate(400, 250)">
        <!-- Inside circles = A U B -->
        <!-- Outside of circles = (A U B)^c -->
        <!-- The background pulses to show what is selected (The outside) -->
        <rect x="-150" y="-100" width="300" height="200" fill="#e84118" fill-opacity="0.8" />
        
        <circle cx="-40" cy="0" r="50" fill="#2f3640" />
        <circle cx="40" cy="0" r="50" fill="#2f3640" />
        
        <text x="-40" y="5" font-family="Arial" font-size="20" font-weight="bold" fill="#f5f6fa" text-anchor="middle">A</text>
        <text x="40" y="5" font-family="Arial" font-size="20" font-weight="bold" fill="#f5f6fa" text-anchor="middle">B</text>

        <!-- Blinking Background (Everything outside both circles) -->
        <animate attributeName="opacity" values="0.3; 1; 0.3" dur="2s" repeatCount="indefinite" />
    </g>

    <!-- Explanation Box -->
    <text x="400" y="380" font-family="Arial" font-size="16" fill="#00a8ff" text-anchor="middle">
        반전 마법사(c)가 괄호를 침투하면: A는 A^c로, ∪는 ∩로, B는 B^c로 180도 뒤집힌다!
    </text>
</svg>
