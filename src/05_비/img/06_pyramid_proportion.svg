<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="500">
    <defs>
        <style>
            .bg {
                fill: #fdfbf7;
                rx: 10;
                stroke: #e2e8f0;
                stroke-width: 2;
            }

            /* Ground */
            .ground {
                stroke: #94a3b8;
                stroke-width: 3;
                stroke-linecap: round;
            }

            /* Pyramid (Large Triangle) */
            .pyramid {
                fill: rgba(234, 179, 8, 0.2);
                stroke: #ca8a04;
                stroke-width: 3;
                stroke-linejoin: round;
            }

            .pyramid-shade {
                fill: rgba(202, 138, 4, 0.4);
            }

            /* Stick (Small Triangle equivalent) */
            .stick {
                stroke: #475569;
                stroke-width: 6;
                stroke-linecap: round;
            }

            /* Shadows */
            .shadow {
                fill: rgba(0, 0, 0, 0.15);
                stroke: none;
            }

            /* Sun Rays (Parallel lines) */
            .sun-ray {
                stroke: #fbbf24;
                stroke-width: 2;
                stroke-dasharray: 6 6;
            }

            /* Measurement Lines */
            .measure-line {
                stroke: #3b82f6;
                stroke-width: 2;
                stroke-dasharray: 4 4;
            }

            .measure-text {
                font-family: 'Courier New', monospace;
                font-size: 20px;
                font-weight: bold;
                fill: #1d4ed8;
                text-anchor: middle;
            }

            .measure-text-red {
                font-family: 'Courier New', monospace;
                font-size: 20px;
                font-weight: bold;
                fill: #ef4444;
                text-anchor: middle;
            }

            /* Title */
            .title {
                font-family: 'Pretendard', sans-serif;
                font-size: 26px;
                fill: #0f172a;
                font-weight: bold;
                text-anchor: middle;
            }

            .formula {
                font-family: 'Courier New', monospace;
                font-size: 22px;
                font-weight: 800;
                fill: #b45309;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <!-- Texts -->
    <text x="400" y="50" class="title">탈레스의 비례식 해킹: 그림자로 피라미드 높이 재기</text>
    <text x="400" y="85" class="formula">A (막대 높이) : B (피라미드 높이) = C (막대 그림자) : D (피라미드 그림자)</text>
    <text x="400" y="115" class="formula" font-size="18px" fill="#ef4444">내항의 곱 (B × C) = 외항의 곱 (A × D)</text>

    <!-- Ground Line -->
    <line x1="50" y1="400" x2="750" y2="400" class="ground" />

    <!-- Sun -->
    <circle cx="100" cy="180" r="30" fill="#fef08a" stroke="#eab308" stroke-width="3" />
    <path
        d="M 100,130 L 100,100 M 100,230 L 100,260 M 50,180 L 20,180 M 150,180 L 180,180 M 65,145 L 45,125 M 135,215 L 155,235 M 135,145 L 155,125 M 65,215 L 45,235"
        stroke="#fef08a" stroke-width="4" stroke-linecap="round" />

    <!-- ===============================
       1. Thales' Stick (Small Triangle)
       =============================== -->
    <g transform="translate(180, 0)">
        <!-- Stick Base (1m) -->
        <line x1="0" y1="300" x2="0" y2="400" class="stick" />
        <text x="-25" y="350" class="measure-text">A</text>
        <text x="-25" y="370" class="measure-text" font-size="14px">1m</text>

        <!-- Stick Shadow (1.5m) -->
        <polygon points="0,400 80,400 80,410 0,410" class="shadow" />
        <text x="40" y="430" class="measure-text">C</text>
        <text x="40" y="450" class="measure-text" font-size="14px">1.5m</text>

        <!-- Parallel Sun Ray for Stick -->
        <line x1="-50" y1="206.25" x2="80" y2="400" class="sun-ray" />
    </g>


    <!-- ===============================
       2. The Great Pyramid (Large Triangle)
       Ratio Scale: Real Height = 146m, Shadow = 219m. 
       We draw it much larger. Say height 200px, shadow 300px.
       =============================== -->
    <g transform="translate(400, 0)">

        <!-- Pyramid 3D shape -->
        <!-- Base center at 150, width 200, height 200 (Y from 400 to 200) -->
        <polygon points="50,400 150,200 250,400" class="pyramid" />
        <polygon points="150,200 250,400 200,400" class="pyramid-shade" />

        <!-- Pyramid Invisible Height Line -->
        <line x1="150" y1="200" x2="150" y2="400" stroke="#ca8a04" stroke-width="2" stroke-dasharray="8 4" />

        <!-- Unknown Height Measurement (Target B) -->
        <line x1="130" y1="200" x2="130" y2="400" class="measure-line" stroke="#ef4444" />
        <text x="110" y="300" class="measure-text-red">B</text>
        <text x="95" y="320" class="measure-text-red" font-size="16px">? m</text>

        <!-- Pyramid Shadow -->
        <!-- From center of pyramid height to shadow tip -->
        <polygon points="150,400 350,400 350,415 150,415" class="shadow" />

        <!-- Shadow Measurement (D) -->
        <line x1="150" y1="435" x2="350" y2="435" class="measure-line" />
        <text x="250" y="460" class="measure-text">D</text>
        <text x="250" y="480" class="measure-text" font-size="14px">219m</text>

        <!-- Parallel Sun Ray for Pyramid -->
        <!-- Angle must match stick: dx=80, dy=100. (Slope = dy/dx = 1.25)
         Pyramid height=200, so shadow dx = 200 / 1.25 = 160. 
         Wait, 150 to 350 is dx=200... 
         Let's adjust ray line to visually hit the tip (150,200) and ground (350,400) -> dx=200, dy=200 -> slope 1.
         Wait stick was (0,300) to (80,400) -> dx=80, dy=100 -> slope 1.25.
         Let's just fake the parallel line visual for illustration. -->
        <line x1="-50" y1="-8" x2="350" y2="400" class="sun-ray" />
    </g>

    <!-- Explanation Box -->
    <rect x="50" y="250" width="220" height="90" fill="#f8fafc" stroke="#94a3b8" rx="5" />
    <text x="160" y="275" font-family="'Pretendard', sans-serif" font-size="14px" fill="#334155"
        text-anchor="middle">"태양빛은 완벽히 평행하다."</text>
    <text x="160" y="295" font-family="'Pretendard', sans-serif" font-size="14px" fill="#334155" text-anchor="middle">고로
        막대가 만든 직각삼각형과</text>
    <text x="160" y="315" font-family="'Pretendard', sans-serif" font-size="14px" fill="#334155"
        text-anchor="middle">피라미드가 만든 직각삼각형은</text>
    <text x="160" y="335" font-family="'Pretendard', sans-serif" font-size="14px" fill="#1d4ed8" font-weight="bold"
        text-anchor="middle">100% 비율이 동일한 쌍둥이(닮음)!</text>

</svg>