<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#f59f00" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">다섯 번째 이동: '도형의 확대와 축소 (Scaling)'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"x 대신 x/2를 대입하면, 도형은 2배로 거대해진다! (수학계의
        원근법)"</text>

    <!-- Left: Original Figure -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="200" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="100" y="25" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">오리지널 (기준점)</text>

        <!-- Axes -->
        <line x1="20" y1="120" x2="180" y2="120" stroke="#ced4da" stroke-width="1" />
        <line x1="50" y1="30" x2="50" y2="140" stroke="#ced4da" stroke-width="1" />
        <text x="40" y="130" font-size="10">0</text>

        <!-- Original Circle -->
        <circle cx="90" cy="80" r="20" fill="#e7f5ff" stroke="#339af0" stroke-width="2" />

        <text x="90" y="83" fill="#1864ab" font-size="10" font-weight="bold" text-anchor="middle">(2, 2)</text>
        <text x="90" y="112" fill="#1864ab" font-size="10" text-anchor="middle">r = 1</text>

        <!-- Equation -->
        <rect x="25" y="132" width="150" height="20" fill="#f8f9fa" />
        <text x="100" y="145" fill="#1864ab" font-size="11" font-family="monospace" font-weight="bold"
            text-anchor="middle">(x-2)² + (y-2)² = 1²</text>
    </g>

    <!-- Arrow -->
    <path d="M 270 145 L 330 145" fill="none" stroke="#f59f00" stroke-width="4" marker-end="url(#arrow-orange)" />
    <text x="300" y="135" fill="#d9480f" font-size="12" font-weight="bold" text-anchor="middle">x ➜ x/2</text>
    <text x="300" y="165" fill="#d9480f" font-size="12" font-weight="bold" text-anchor="middle">y ➜ y/2</text>

    <!-- Right: Dilated Figure -->
    <g transform="translate(340, 80)">
        <rect x="0" y="0" width="200" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="100" y="25" fill="#e8590c" font-size="14" font-weight="bold" text-anchor="middle">2배 확대
            (Dilation)</text>

        <!-- Axes -->
        <line x1="20" y1="120" x2="180" y2="120" stroke="#ced4da" stroke-width="1" />
        <line x1="50" y1="30" x2="50" y2="140" stroke="#ced4da" stroke-width="1" />

        <!-- Scaled Circle (Radius = 2, Center = 4,4 -> 4 scaled by grid is cx=130 cy=40) -->
        <circle cx="130" cy="40" r="40" fill="#fff4e6" stroke="#f59f00" stroke-width="2" stroke-dasharray="2,2" />

        <text x="130" y="45" fill="#d9480f" font-size="12" font-weight="bold" text-anchor="middle">(4, 4)</text>
        <text x="130" y="95" fill="#d9480f" font-size="10" text-anchor="middle">r = 2</text>

        <!-- Expansion Lines from Origin -->
        <line x1="50" y1="120" x2="130" y2="40" stroke="#ced4da" stroke-width="1" stroke-dasharray="2,2" />
        <line x1="50" y1="120" x2="160" y2="10" stroke="#ced4da" stroke-width="1" stroke-dasharray="2,2" />
        <line x1="50" y1="120" x2="170" y2="60" stroke="#ced4da" stroke-width="1" stroke-dasharray="2,2" />

        <!-- Equation -->
        <rect x="15" y="132" width="170" height="20" fill="#f8f9fa" />
        <text x="100" y="145" fill="#d9480f" font-size="11" font-family="monospace" font-weight="bold"
            text-anchor="middle">(x/2-2)² + (y/2-2)² = 1²</text>
    </g>

    <defs>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59f00" />
        </marker>
    </defs>
</svg>