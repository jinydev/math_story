<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#c92a2a" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">세 번째 공간: '머그컵과 도넛의 위상동형 (Homeomorphism)'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"구멍의 개수가 1개로 똑같다면, 너희 둘은 완전히 같은
        도형이다!"</text>

    <!-- Left Side: Coffee Mug -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="160" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="80" y="25" fill="#c92a2a" font-size="14" font-weight="bold" text-anchor="middle">커피 머그컵</text>

        <!-- Mug Body -->
        <path d="M 50 60 L 50 120 C 50 135, 90 135, 90 120 L 90 60 Z" fill="#ffe3e3" stroke="#fa5252"
            stroke-width="3" />
        <!-- Mug Top opening (depression) -->
        <ellipse cx="70" cy="60" rx="20" ry="10" fill="#fff" stroke="#fa5252" stroke-width="2" />

        <!-- Handle (The Hole!) -->
        <path d="M 90 70 C 130 70, 130 110, 90 110" fill="none" stroke="#fa5252" stroke-width="8" />

        <!-- Red circle highlighting the hole -->
        <circle cx="106" cy="90" r="10" fill="none" stroke="#212529" stroke-width="1.5" stroke-dasharray="2,2" />
        <text x="80" y="145" fill="#212529" font-size="11" font-weight="bold" text-anchor="middle">구멍 (Hole) 1개</text>
    </g>

    <!-- Transition Animation / Mathematical Morphing -->
    <path d="M 230 145 C 260 110, 340 180, 360 145" fill="none" stroke="#adb5bd" stroke-width="3" stroke-dasharray="4,2"
        marker-end="url(#arrow-gray)" />
    <text x="290" y="130" font-size="12" font-weight="bold" text-anchor="middle">일대일 대응</text>
    <text x="290" y="165" font-size="12" font-weight="bold" text-anchor="middle">+ 연속 변환</text>

    <text x="290" y="90" fill="#f03e3e" font-size="20" font-weight="bold" text-anchor="middle">≈</text>

    <!-- Right Side: Donut (Torus) -->
    <g transform="translate(380, 80)">
        <rect x="0" y="0" width="160" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="80" y="25" fill="#e8590c" font-size="14" font-weight="bold" text-anchor="middle">도넛 (토러스)</text>

        <!-- Donut Outer / Inner -->
        <ellipse cx="80" cy="85" rx="50" ry="30" fill="#fff4e6" stroke="#e8590c" stroke-width="4" />
        <ellipse cx="80" cy="85" rx="15" ry="8" fill="#fff" stroke="#e8590c" stroke-width="3" />

        <!-- Red circle highlighting the hole -->
        <circle cx="80" cy="85" r="12" fill="none" stroke="#212529" stroke-width="1.5" stroke-dasharray="2,2" />

        <text x="80" y="145" fill="#212529" font-size="11" font-weight="bold" text-anchor="middle">구멍 (Hole) 1개</text>
    </g>

    <defs>
        <marker id="arrow-gray" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>