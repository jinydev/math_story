<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#ae3ec9" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">데이터의 폭격: 분산과 표준편차 (Variance & Standard Deviation)</text>

    <g transform="translate(100, 150)">
        <!-- Axis -->
        <line x1="-50" y1="50" x2="450" y2="50" stroke="#868e96" stroke-width="2" />
        <text x="450" y="70" fill="#868e96" font-size="12" font-family="sans-serif">점수</text>

        <!-- Mean Line (The Commander) -->
        <line x1="200" y1="50" x2="200" y2="-60" stroke="#f03e3e" stroke-width="3" stroke-dasharray="6,4" />
        <text x="200" y="-70" fill="#f03e3e" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">평균 (Mean)</text>
        <rect x="180" y="55" width="40" height="20" fill="#ffe3e3" rx="3" />
        <text x="200" y="70" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">60점</text>

        <!-- Data Points (Distance from Mean = Deviation) -->
        <!-- Point 1 (Far Left) -->
        <circle cx="50" cy="50" r="6" fill="#1864ab" />
        <path d="M 50 20 L 200 20" fill="none" stroke="#228be6" stroke-width="2" marker-start="url(#arrow-blue)"
            marker-end="url(#arrow-blue)" />
        <text x="125" y="10" fill="#1864ab" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">편차 -30</text>

        <!-- Point 2 (Close Right) -->
        <circle cx="260" cy="50" r="6" fill="#1864ab" />
        <path d="M 200 20 L 260 20" fill="none" stroke="#228be6" stroke-width="2" marker-start="url(#arrow-blue)"
            marker-end="url(#arrow-blue)" />
        <text x="230" y="10" fill="#1864ab" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">편차 +15</text>

        <!-- Point 3 (Far Right) -->
        <circle cx="380" cy="50" r="6" fill="#1864ab" />
        <path d="M 200 -20 L 380 -20" fill="none" stroke="#ae3ec9" stroke-width="2" marker-start="url(#arrow-purple)"
            marker-end="url(#arrow-purple)" />
        <text x="290" y="-30" fill="#ae3ec9" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">편차 +45</text>
    </g>

    <!-- Title / Explanation -->
    <text x="300" y="235" fill="#495057" font-size="14" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">평균으로부터 얼마나 산산이 흩어져(산포도) 있는가 측정하는 절대 수치!</text>

    <defs>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#228be6" />
        </marker>
        <marker id="arrow-purple" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ae3ec9" />
        </marker>
    </defs>
</svg>