<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="500">
    <defs>
        <style>
            .bg {
                fill: #F8F9FA;
                rx: 10;
                stroke: #E9ECEF;
                stroke-width: 2;
            }

            .box {
                fill: none;
                stroke: #457B9D;
                stroke-width: 2;
            }

            .spiral {
                fill: none;
                stroke: #E63946;
                stroke-width: 4;
                stroke-linecap: round;
            }

            .text-num {
                font-family: 'Pretendard', sans-serif;
                font-weight: bold;
                fill: #1D3557;
                text-anchor: middle;
                alignment-baseline: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <g transform="translate(100, 50)">
        <g transform="scale(11.5)">
            <!-- Box 21 -->
            <rect x="0" y="0" width="21" height="21" class="box" fill="#f1faee" opacity="0.7" />
            <text x="10.5" y="10.5" class="text-num" font-size="3px">21</text>

            <!-- Box 13 -->
            <rect x="21" y="0" width="13" height="13" class="box" fill="#a8dadc" opacity="0.7" />
            <text x="27.5" y="6.5" class="text-num" font-size="2px">13</text>

            <!-- Box 8 -->
            <rect x="21" y="13" width="8" height="8" class="box" fill="#457b9d" opacity="0.3" />
            <text x="25" y="17" class="text-num" font-size="1.5px">8</text>

            <!-- Box 5 -->
            <rect x="29" y="13" width="5" height="5" class="box" fill="#e63946" opacity="0.2" />
            <text x="31.5" y="15.5" class="text-num" font-size="1px">5</text>

            <!-- Box 3 -->
            <rect x="29" y="18" width="3" height="3" class="box" fill="#f4a261" opacity="0.5" />
            <text x="30.5" y="19.5" class="text-num" font-size="0.8px">3</text>

            <!-- Spiral Arc Path -->
            <path d="M 21 21 
               A 21 21 0 0 1 0 0 
               A 13 13 0 0 1 34 0 
               A 8 8 0 0 1 34 21 
               A 5 5 0 0 1 24 21 
               A 3 3 0 0 1 24 15" class="spiral" />
        </g>
    </g>
    <text x="400" y="450" font-family="'Pretendard', sans-serif" font-size="16px" fill="#6C757D" text-anchor="middle">
        💡 정사각형 크기 비율: 1, 1, 2, 3, 5, 8, 13, 21... (황금 사각형과 나선)
    </text>
</svg>