<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="400">
    <rect width="800" height="400" fill="#2d3436" />
    <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        좌표축의 진화: 1D RAM부터 3D HBM까지
    </text>

    <!-- 1D RAM Linear Array -->
    <g transform="translate(50, 100)">
        <text x="150" y="-15" font-family="Arial" font-size="16" fill="#74b9ff" text-anchor="middle">1차원 메모리 (일반 RAM)</text>
        <text x="150" y="35" font-family="Arial" font-size="12" fill="#b2bec3" text-anchor="middle">X축 단일 좌표 (Index: 0~7)</text>
        
        <rect x="0" y="0" width="40" height="40" fill="none" stroke="#74b9ff" stroke-width="2" />
        <rect x="40" y="0" width="40" height="40" fill="none" stroke="#74b9ff" stroke-width="2" />
        <rect x="80" y="0" width="40" height="40" fill="none" stroke="#74b9ff" stroke-width="2" />
        <rect x="120" y="0" width="40" height="40" fill="#0984e3" stroke="#74b9ff" stroke-width="2" />
        <rect x="160" y="0" width="40" height="40" fill="none" stroke="#74b9ff" stroke-width="2" />
        <rect x="200" y="0" width="40" height="40" fill="none" stroke="#74b9ff" stroke-width="2" />
        <rect x="240" y="0" width="40" height="40" fill="none" stroke="#74b9ff" stroke-width="2" />
        <rect x="280" y="0" width="40" height="40" fill="none" stroke="#74b9ff" stroke-width="2" />
        
        <text x="140" y="25" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">주소 3</text>
    </g>

    <!-- 2D Matrix (VRAM / Pixel Array) -->
    <g transform="translate(450, 70)">
        <text x="150" y="-15" font-family="Arial" font-size="16" fill="#00b894" text-anchor="middle">2차원 메모리 (디스플레이 픽셀)</text>
        <text x="150" y="115" font-family="Arial" font-size="12" fill="#b2bec3" text-anchor="middle">X, Y 평면 좌표 (Array[y][x])</text>
        
        <g stroke="#00b894" stroke-width="2" fill="none">
            <!-- Grid 4x4 -->
            <rect x="60" y="0" width="40" height="40" /> <rect x="100" y="0" width="40" height="40" /> <rect x="140" y="0" width="40" height="40" /> <rect x="180" y="0" width="40" height="40" />
            <rect x="60" y="40" width="40" height="40" /> <rect x="100" y="40" width="40" height="40" /> <rect x="140" y="40" width="40" height="40" fill="#00b894" opacity="0.6"/> <rect x="180" y="40" width="40" height="40" />
            <rect x="60" y="80" width="40" height="40" /> <rect x="100" y="80" width="40" height="40" /> <rect x="140" y="80" width="40" height="40" /> <rect x="180" y="80" width="40" height="40" />
        </g>
        <text x="160" y="65" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">(2, 1)</text>
    </g>

    <!-- 3D HBM (High Bandwidth Memory) -->
    <g transform="translate(250, 200)">
        <text x="200" y="165" font-family="Arial" font-size="16" fill="#fdcb6e" text-anchor="middle">3차원 HBM (AI 시대의 고대역폭 메모리)</text>
        <text x="200" y="185" font-family="Arial" font-size="12" fill="#b2bec3" text-anchor="middle">X, Y, Z 입체 좌표: 칩을 수직으로 쌓아올림 (실리콘 관통 전극: TSV)</text>

        <!-- Base layer -->
        <g stroke="#fdcb6e" stroke-width="2" fill="none" opacity="0.3">
            <polyline points="100,60 160,30 280,30 220,60 100,60" />
            <line x1="160" y1="60" x2="220" y2="30" />
            <line x1="130" y1="45" x2="250" y2="45" />
        </g>
        
        <!-- Middle layer -->
        <g stroke="#fdcb6e" stroke-width="2" fill="none" opacity="0.6">
            <polyline points="100,30 160,0 280,0 220,30 100,30" />
            <line x1="160" y1="30" x2="220" y2="0" />
            <line x1="130" y1="15" x2="250" y2="15" />
        </g>
        
        <!-- Top layer -->
        <g stroke="#fdcb6e" stroke-width="2" fill="none" opacity="1">
            <polyline points="100,0 160,-30 280,-30 220,0 100,0" fill="#2d3436"/>
            <line x1="160" y1="0" x2="220" y2="-30" />
            <line x1="130" y1="-15" x2="250" y2="-15" />
            
            <!-- Highlighted 3D cell -->
            <polygon points="190,-15 220,-30 250,-15 220,0" fill="#fdcb6e" opacity="0.8"/>
        </g>

        <!-- TSV Vertical connect lines -->
        <g stroke="#e17055" stroke-width="3" fill="none" stroke-dasharray="4">
            <line x1="220" y1="-15" x2="220" y2="45" />
            <animate attributeName="stroke-dashoffset" from="10" to="0" dur="0.5s" repeatCount="indefinite" />
        </g>

        <text x="210" y="-35" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">(2, 1, 3)</text>
    </g>

    <!-- Flow paths connecting concepts -->
    <path d="M 220 120 Q 250 160, 300 160 T 360 210" fill="none" stroke="#dfe6e9" stroke-width="2" opacity="0.5" marker-end="url(#arrow)" />
    <path d="M 600 140 Q 580 160, 520 180 T 450 210" fill="none" stroke="#dfe6e9" stroke-width="2" opacity="0.5" marker-end="url(#arrow)" />
    
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#dfe6e9" />
        </marker>
    </defs>
</svg>
