<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%">
    <rect width="600" height="200" fill="#111"/>
    <text x="300" y="40" font-family="Arial" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">선분의 내분 (Internal Division 1:3)</text>
    
    <!-- Straight line A to B -->
    <line x1="100" y1="120" x2="500" y2="120" stroke="#7f8c8d" stroke-width="6"/>
    
    <!-- Points A and B -->
    <circle cx="100" cy="120" r="10" fill="#e74c3c"/>
    <text x="100" y="150" fill="#e74c3c" font-family="Arial" font-size="16" text-anchor="middle">A</text>
    
    <circle cx="500" cy="120" r="10" fill="#3498db"/>
    <text x="500" y="150" fill="#3498db" font-family="Arial" font-size="16" text-anchor="middle">B</text>
    
    <!-- Point P (Division at 1:3 ratio) -> (1*500 + 3*100)/4 = 800/4 = 200 -->
    <circle cx="200" cy="120" r="12" fill="#2ecc71">
        <animate attributeName="r" values="8;16;8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="200" y="150" fill="#2ecc71" font-family="Arial" font-size="16" text-anchor="middle">내분점 P (1:3)</text>
    
    <!-- M ratio bracket -->
    <path d="M100 90 Q150 70 200 90" fill="none" stroke="#f1c40f" stroke-width="2"/>
    <text x="150" y="70" fill="#f1c40f" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">1</text>
    
    <!-- N ratio bracket -->
    <path d="M200 90 Q350 50 500 90" fill="none" stroke="#f1c40f" stroke-width="2"/>
    <text x="350" y="60" fill="#f1c40f" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">3</text>
</svg>
