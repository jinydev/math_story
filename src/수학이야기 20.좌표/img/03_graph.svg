<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
    <rect width="500" height="500" fill="#1e272e"/>
    
    <text x="250" y="40" font-family="Arial" font-size="22" font-weight="bold" fill="#d2dae2" text-anchor="middle">점이 모여 선이 되다: y = 3x</text>

    <!-- Axes -->
    <line x1="50" y1="450" x2="450" y2="450" stroke="#808e9b" stroke-width="2"/> <!-- X-axis -->
    <line x1="50" y1="50" x2="50" y2="450" stroke="#808e9b" stroke-width="2"/>  <!-- Y-axis -->

    <!-- Grid -->
    <g stroke="#485460" stroke-width="1" stroke-dasharray="4,4">
        <line x1="150" y1="50" x2="150" y2="450"/>
        <line x1="250" y1="50" x2="250" y2="450"/>
        <line x1="350" y1="50" x2="350" y2="450"/>
        
        <line x1="50" y1="350" x2="450" y2="350"/>
        <line x1="50" y1="250" x2="450" y2="250"/>
        <line x1="50" y1="150" x2="450" y2="150"/>
    </g>

    <!-- Points (0,0), (1,3), (2,6), (3,9) mapped to SVG scale -->
    <!-- (50,450), (150, 350), (250, 250), (350, 150) -->
    
    <circle cx="50" cy="450" r="0" fill="#ffdd59">
        <animate attributeName="r" values="0;8;8" keyTimes="0;0.1;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="350" r="0" fill="#ffdd59">
        <animate attributeName="r" values="0;0;8;8" keyTimes="0;0.2;0.3;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="250" r="0" fill="#ffdd59">
        <animate attributeName="r" values="0;0;8;8" keyTimes="0;0.4;0.5;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="150" r="0" fill="#ffdd59">
        <animate attributeName="r" values="0;0;8;8" keyTimes="0;0.6;0.7;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="50" r="0" fill="#ffdd59">
        <animate attributeName="r" values="0;0;8;8" keyTimes="0;0.8;0.9;1" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- Animated Line -->
    <path d="M50 450 L450 50" stroke="#0fbcf9" stroke-width="4" fill="none" stroke-dasharray="565" stroke-dashoffset="565">
        <animate attributeName="stroke-dashoffset" values="565; 0; 0" keyTimes="0; 0.9; 1" dur="4s" repeatCount="indefinite"/>
    </path>
    
    <text x="360" y="130" font-family="Arial" font-size="20" font-weight="bold" fill="#0fbcf9">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.9;0.95;1" dur="4s" repeatCount="indefinite"/>
        y = 3x
    </text>
</svg>
