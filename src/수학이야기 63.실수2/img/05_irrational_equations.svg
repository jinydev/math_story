<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A202C" />
      <stop offset="100%" stop-color="#2D3748" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad)" rx="15" />

  <text x="400" y="40" font-family="'Inter', sans-serif" font-size="28" font-weight="bold" fill="#F7FAFC" text-anchor="middle" filter="url(#glow)">이차방정식과 두 개의 무리수 해 (Roots)</text>
  <text x="400" y="70" font-family="'Inter', sans-serif" font-size="16" fill="#A0AEC0" text-anchor="middle">$x^2 = k$ : 제곱이라는 방을 탈출하려면 항상 2개의 열쇠(+, -)가 필요함</text>

  <!-- Central Equation Graphic -->
  <g transform="translate(400, 160)">
    
    <!-- Central X squared box -->
    <rect x="-80" y="-40" width="160" height="80" fill="#2D3748" stroke="#E2E8F0" stroke-width="2" rx="10"/>
    <text x="0" y="10" font-family="'Inter', sans-serif" font-size="40" font-weight="bold" fill="#E2E8F0" text-anchor="middle">$x^2 = 5$</text>

    <!-- Arrow up/right to positive root -->
    <path d="M 60 -40 Q 150 -100 200 -70" fill="none" stroke="#4FD1C5" stroke-width="4" stroke-dasharray="6,4" marker-end="url(#arrow_right)"/>
    
    <!-- Positive Result -->
    <rect x="200" y="-100" width="100" height="60" fill="#2D3748" stroke="#4FD1C5" stroke-width="2" rx="8"/>
    <text x="250" y="-60" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#4FD1C5" text-anchor="middle">$\sqrt{5}$</text>
    <text x="250" y="-30" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#4FD1C5" text-anchor="middle">양의 제곱근</text>

    <!-- Arrow down/right to negative root -->
    <path d="M 60 40 Q 150 100 200 70" fill="none" stroke="#FC8181" stroke-width="4" stroke-dasharray="6,4" marker-end="url(#arrow_right)"/>
    
    <!-- Negative Result -->
    <rect x="200" y="40" width="100" height="60" fill="#2D3748" stroke="#FC8181" stroke-width="2" rx="8"/>
    <text x="250" y="80" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#FC8181" text-anchor="middle">$-\sqrt{5}$</text>
    <text x="250" y="110" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#FC8181" text-anchor="middle">음의 제곱근</text>

    <!-- Parabola visualization on left -->
    <path d="M -300 -100 Q -200 100 -100 -100" fill="none" stroke="#9F7AEA" stroke-width="3"/>
    <!-- Axes -->
    <line x1="-320" y1="0" x2="-80" y2="0" stroke="#718096" stroke-width="2"/>
    <line x1="-200" y1="-120" x2="-200" y2="40" stroke="#718096" stroke-width="2"/>
    
    <!-- Intersections corresponding to roots -->
    <!-- Line y = 5 -->
    <line x1="-320" y1="-60" x2="-80" y2="-60" stroke="#ECC94B" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="-310" y="-70" font-family="'Inter', sans-serif" font-size="14" fill="#ECC94B">y = 5 (목표 높이)</text>
    
    <!-- Intersection points -->
    <circle cx="-275" cy="-60" r="5" fill="#FC8181" filter="url(#glow)"/>
    <circle cx="-125" cy="-60" r="5" fill="#4FD1C5" filter="url(#glow)"/>
    
    <text x="-275" y="-40" font-family="'Inter', sans-serif" font-size="14" fill="#FC8181" text-anchor="middle">$-\sqrt{5}$</text>
    <text x="-125" y="-40" font-family="'Inter', sans-serif" font-size="14" fill="#4FD1C5" text-anchor="middle">$+\sqrt{5}$</text>
  </g>
</svg>
