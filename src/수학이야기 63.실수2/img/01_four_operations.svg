<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A202C" />
      <stop offset="100%" stop-color="#2D3748" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" rx="15" />

  <text x="400" y="40" font-family="'Inter', sans-serif" font-size="28" font-weight="bold" fill="#F7FAFC" text-anchor="middle" filter="url(#glow)">무리수의 핵심 연산 룰 (동류항 룰 &amp; 루트 결합)</text>
  <text x="400" y="70" font-family="'Inter', sans-serif" font-size="16" fill="#A0AEC0" text-anchor="middle">더하기/빼기는 같은 종류끼리만 묶고, 곱하기/나누기는 벽을 뚫고 합칠 수 있다.</text>

  <!-- Left Side: Addition/Subtraction (Like Terms Only) -->
  <g transform="translate(50, 150)">
    <rect x="-10" y="-30" width="360" height="240" fill="#2D3748" stroke="#F6AD55" stroke-width="2" rx="10"/>
    <text x="170" y="0" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#F6AD55" text-anchor="middle">1. 덧셈 / 뺄셈 (문자 $x, y$ 방식)</text>
    
    <text x="20" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#E2E8F0">3</text>
    <text x="40" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#4FD1C5">$\sqrt{2}$</text>
    
    <text x="80" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#F7FAFC">+</text>
    
    <text x="110" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#E2E8F0">5</text>
    <text x="130" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#4FD1C5">$\sqrt{2}$</text>
    
    <text x="180" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#F7FAFC">=</text>

    <!-- Result -->
    <text x="220" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#E2E8F0">8</text>
    <text x="240" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#4FD1C5" filter="url(#glow)">$\sqrt{2}$</text>

    <!-- Connection Lines for Addition -->
    <path d="M 30 60 Q 65 90 100 90 L 100 90 Q 115 90 225 60" fill="none" stroke="#A0AEC0" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow_up)"/>
    <text x="130" y="110" font-family="'Inter', sans-serif" font-size="14" fill="#A0AEC0" text-anchor="middle">앞의 계수(3, 5)만 묶어서 계산!</text>

    <!-- Blocked Example -->
    <line x1="10" y1="130" x2="330" y2="130" stroke="#4A5568" stroke-width="2"/>
    
    <text x="60" y="160" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#4FD1C5">$\sqrt{2}$</text>
    <text x="100" y="160" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#F7FAFC">+</text>
    <text x="130" y="160" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#9F7AEA">$\sqrt{3}$</text>
    
    <text x="180" y="160" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#FC8181">≠</text>
    <text x="230" y="160" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#FC8181">$\sqrt{5}$</text>
    <text x="170" y="190" font-family="'Inter', sans-serif" font-size="14" fill="#FC8181" text-anchor="middle" font-weight="bold">종류가 다르면 합체 불가! (사과+바나나)</text>
  </g>

  <!-- Right Side: Multiplication/Division (Merge Roots) -->
  <g transform="translate(430, 150)">
    <rect x="-10" y="-30" width="340" height="240" fill="#2D3748" stroke="#9F7AEA" stroke-width="2" rx="10"/>
    <text x="160" y="0" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#9F7AEA" text-anchor="middle" filter="url(#glow)">2. 곱셈 / 나눗셈 (벽 허물기)</text>
    
    <text x="50" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#4FD1C5">$\sqrt{2}$</text>
    <text x="100" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#F7FAFC">×</text>
    <text x="140" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#F6AD55">$\sqrt{3}$</text>
    
    <text x="190" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#F7FAFC">=</text>
    
    <!-- Huge combined root -->
    <text x="230" y="50" font-family="'Inter', sans-serif" font-size="28" font-weight="bold" fill="#9F7AEA">$\sqrt{2 \times 3}$</text>
    
    <!-- Connection lines -->
    <path d="M 60 20 Q 150 -10 240 20" fill="none" stroke="#9F7AEA" stroke-width="2" marker-end="url(#arrow_down)"/>
    <path d="M 150 20 Q 200 -10 270 20" fill="none" stroke="#9F7AEA" stroke-width="2" marker-end="url(#arrow_down)"/>
    
    <text x="260" y="80" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#9F7AEA">=</text>
    <text x="290" y="80" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#9F7AEA" filter="url(#glow)">$\sqrt{6}$</text>

    <!-- Extraction Example -->
    <line x1="10" y1="130" x2="310" y2="130" stroke="#4A5568" stroke-width="2"/>
    <text x="20" y="160" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#F7FAFC">$\sqrt{12}$</text>
    <text x="70" y="160" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#A0AEC0">=</text>
    <text x="100" y="160" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#A0AEC0">$\sqrt{4 \times 3}$</text>
    <text x="200" y="160" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#A0AEC0">=</text>
    
    <!-- Pulled out 2 -->
    <text x="230" y="160" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#ECC94B" filter="url(#glow)">2</text>
    <text x="250" y="160" font-family="'Inter', sans-serif" font-size="24" font-weight="bold" fill="#F7FAFC">$\sqrt{3}$</text>

    <text x="160" y="195" font-family="'Inter', sans-serif" font-size="14" fill="#ECC94B" text-anchor="middle">루트 안의 4($2^2$) 가 루트를 탈출!</text>
  </g>
</svg>
