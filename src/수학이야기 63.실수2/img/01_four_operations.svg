<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 350">
  <rect width="750" height="350" fill="#f8f9fa" rx="15" />

  <text x="375" y="40" fill="#212529" font-size="22" font-family="sans-serif" font-weight="bold"
    text-anchor="middle">무리수의 사칙연산 (덧셈 룰 vs 곱셈 룰)</text>

  <!-- Left: Addition/Subtraction (Strict borders) -->
  <rect x="30" y="70" width="330" height="250" fill="#fff" stroke="#ff8787" stroke-width="3" rx="10" />
  <text x="195" y="105" fill="#e03131" font-size="20" font-weight="bold" text-anchor="middle">1. 덧셈/뺄셈 (엄격한 신분제)</text>
  <text x="195" y="130" fill="#868e96" font-size="14" font-weight="bold" text-anchor="middle">"동류항(같은 루트)끼리만 합칠 수
    있다"</text>

  <!-- Same roots -->
  <rect x="50" y="150" width="90" height="40" fill="#ffe3e3" stroke="#ff8787" stroke-width="2" rx="5" />
  <text x="95" y="176" fill="#c92a2a" font-size="20" font-weight="bold" font-family="monospace"
    text-anchor="middle">3√2</text>

  <text x="155" y="176" fill="#495057" font-size="24" font-weight="bold" text-anchor="middle">+</text>

  <rect x="170" y="150" width="90" height="40" fill="#ffe3e3" stroke="#ff8787" stroke-width="2" rx="5" />
  <text x="215" y="176" fill="#c92a2a" font-size="20" font-weight="bold" font-family="monospace"
    text-anchor="middle">5√2</text>

  <text x="280" y="176" fill="#e03131" font-size="24" font-weight="bold" text-anchor="middle">=</text>
  <text x="315" y="176" fill="#e03131" font-size="24" font-weight="bold" font-family="monospace"
    text-anchor="middle">8√2</text>

  <!-- Different roots -->
  <rect x="50" y="220" width="90" height="40" fill="#ffe3e3" stroke="#ff8787" stroke-width="2" rx="5" />
  <text x="95" y="246" fill="#c92a2a" font-size="20" font-weight="bold" font-family="monospace"
    text-anchor="middle">√2</text>

  <text x="155" y="246" fill="#495057" font-size="24" font-weight="bold" text-anchor="middle">+</text>

  <rect x="170" y="220" width="90" height="40" fill="#e3fafc" stroke="#3bc9db" stroke-width="2" rx="5" />
  <text x="215" y="246" fill="#0b7285" font-size="20" font-weight="bold" font-family="monospace"
    text-anchor="middle">√3</text>

  <text x="280" y="246" fill="#868e96" font-size="24" font-weight="bold" text-anchor="middle">!=</text>
  <text x="315" y="246" fill="#495057" font-size="24" font-weight="bold" font-family="monospace"
    text-anchor="middle">√5</text>
  <line x1="295" y1="270" x2="335" y2="220" stroke="#f03e3e" stroke-width="4" />
  <text x="195" y="295" fill="#f03e3e" font-size="14" font-weight="bold" text-anchor="middle">(종류가 다르면 합체 불가!)</text>


  <!-- Right: Multiplication (Free union) -->
  <rect x="390" y="70" width="330" height="250" fill="#fff" stroke="#1c7ed6" stroke-width="3" rx="10" />
  <text x="555" y="105" fill="#1864ab" font-size="20" font-weight="bold" text-anchor="middle">2. 곱셈/나눗셈 (자유로운 합체)</text>
  <text x="555" y="130" fill="#868e96" font-size="14" font-weight="bold" text-anchor="middle">"루트 지붕 아래로 몽땅 들어와!"</text>

  <!-- Mix it up -->
  <rect x="420" y="170" width="60" height="40" fill="#ffe3e3" stroke="#ff8787" stroke-width="2" rx="5" />
  <text x="450" y="196" fill="#c92a2a" font-size="20" font-weight="bold" font-family="monospace"
    text-anchor="middle">√2</text>

  <text x="500" y="196" fill="#495057" font-size="24" font-weight="bold" text-anchor="middle">×</text>

  <rect x="520" y="170" width="60" height="40" fill="#e3fafc" stroke="#3bc9db" stroke-width="2" rx="5" />
  <text x="550" y="196" fill="#0b7285" font-size="20" font-weight="bold" font-family="monospace"
    text-anchor="middle">√3</text>

  <text x="600" y="196" fill="#1864ab" font-size="24" font-weight="bold" text-anchor="middle">=</text>

  <rect x="630" y="160" width="70" height="60" fill="#e7f5ff" stroke="#1c7ed6" stroke-width="3" rx="8" />
  <text x="665" y="198" fill="#1864ab" font-size="24" font-weight="bold" font-family="monospace"
    text-anchor="middle">√6</text>

  <path d="M 450 160 Q 555 120 665 150" fill="none" stroke="#22b8cf" stroke-width="3" stroke-dasharray="6,4"
    marker-end="url(#arrow-blue)" />
  <text x="555" y="250" fill="#1c7ed6" font-size="14" font-weight="bold" text-anchor="middle">루트 벽을 뚫고 내부 숫자끼리
    결합!</text>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
      orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22b8cf" />
    </marker>
  </defs>
</svg>