<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
    <rect width="600" height="300" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#0b7285" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">다섯 번째 나열: '직사각형 도로망 최단 경로'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"우회전(R) 3번, 직진(U) 2번이라는 텍스트들의 똑같은 문자
        나열(동자순열) 문제"</text>

    <!-- Grid Drawing -->
    <g transform="translate(60, 70)">
        <rect x="-10" y="-10" width="220" height="180" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="100" y="15" fill="#0b7285" font-size="14" font-weight="bold" text-anchor="middle">도시 블록 (Grid)</text>

        <!-- Real Grid (3x2) means 3 Right, 2 Up -->
        <!-- Horizontal Lines -->
        <line x1="20" y1="130" x2="170" y2="130" stroke="#ced4da" stroke-width="3" />
        <line x1="20" y1="90" x2="170" y2="90" stroke="#ced4da" stroke-width="3" />
        <line x1="20" y1="50" x2="170" y2="50" stroke="#ced4da" stroke-width="3" />

        <!-- Vertical Lines -->
        <line x1="20" y1="50" x2="20" y2="130" stroke="#ced4da" stroke-width="3" />
        <line x1="70" y1="50" x2="70" y2="130" stroke="#ced4da" stroke-width="3" />
        <line x1="120" y1="50" x2="120" y2="130" stroke="#ced4da" stroke-width="3" />
        <line x1="170" y1="50" x2="170" y2="130" stroke="#ced4da" stroke-width="3" />

        <!-- Start / End Points -->
        <circle cx="20" cy="130" r="6" fill="#fa5252" />
        <text x="5" y="145" fill="#c92a2a" font-size="12" font-weight="bold">시작(A)</text>

        <circle cx="170" cy="50" r="6" fill="#1864ab" />
        <text x="175" y="45" fill="#1864ab" font-size="12" font-weight="bold">도착(B)</text>

        <!-- Path Example -->
        <path d="M 20 130 L 70 130 L 120 130 L 120 90 L 170 90 L 170 50" fill="none" stroke="#f59f00" stroke-width="4"
            stroke-dasharray="4,2" />
        <text x="45" y="125" fill="#d9480f" font-size="12" font-weight="bold">→</text>
        <text x="95" y="125" fill="#d9480f" font-size="12" font-weight="bold">→</text>
        <text x="110" y="115" fill="#d9480f" font-size="12" font-weight="bold">↑</text>
        <text x="145" y="85" fill="#d9480f" font-size="12" font-weight="bold">→</text>
        <text x="160" y="75" fill="#d9480f" font-size="12" font-weight="bold">↑</text>
    </g>

    <!-- Math Transformation -->
    <g transform="translate(320, 70)">
        <path d="M -20 80 L 10 80" fill="none" stroke="#adb5bd" stroke-width="3" stroke-dasharray="4,2"
            marker-end="url(#arrow)" />

        <rect x="30" y="0" width="230" height="180" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="145" y="25" fill="#d9480f" font-size="14" font-weight="bold" text-anchor="middle">"같은 문자가 있는 순열"</text>

        <text x="145" y="55" fill="#495057" font-size="12" text-anchor="middle">가로(R) 3칸, 세로(U) 2칸 무조건 이동!</text>

        <!-- Letter Array -->
        <rect x="40" y="70" width="30" height="30" fill="#fff4e6" stroke="#f59f00" rx="3" />
        <text x="55" y="90" fill="#d9480f" font-size="16" font-weight="bold" text-anchor="middle">R</text>

        <rect x="80" y="70" width="30" height="30" fill="#fff4e6" stroke="#f59f00" rx="3" />
        <text x="95" y="90" fill="#d9480f" font-size="16" font-weight="bold" text-anchor="middle">R</text>

        <rect x="120" y="70" width="30" height="30" fill="#fff4e6" stroke="#f59f00" rx="3" />
        <text x="135" y="90" fill="#d9480f" font-size="16" font-weight="bold" text-anchor="middle">U</text>

        <rect x="160" y="70" width="30" height="30" fill="#fff4e6" stroke="#f59f00" rx="3" />
        <text x="175" y="90" fill="#d9480f" font-size="16" font-weight="bold" text-anchor="middle">R</text>

        <rect x="200" y="70" width="30" height="30" fill="#fff4e6" stroke="#f59f00" rx="3" />
        <text x="215" y="90" fill="#d9480f" font-size="16" font-weight="bold" text-anchor="middle">U</text>

        <!-- Formula -->
        <rect x="40" y="115" width="210" height="50" fill="#f8f9fa" />
        <text x="145" y="135" fill="#1864ab" font-size="14" font-family="monospace" font-weight="bold"
            text-anchor="middle">5! / (3! × 2!) = 10가지</text>
        <text x="145" y="155" fill="#495057" font-size="10" text-anchor="middle">전체 5개를 깐 뒤, 똑같은 녀석들끼리 섞이는 건 나눈다!</text>

    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>