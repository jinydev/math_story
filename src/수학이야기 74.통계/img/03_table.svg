<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#2b8a3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">세 번째 통계 보스: 격자의 마법, '표(Table)를 활용한 자료의 정리'</text>

    <!-- Left: Raw and Classified Group (Messy List) -->
    <g transform="translate(60, 60)">
        <text x="50" y="10" fill="#fa5252" font-size="12" font-weight="bold" text-anchor="middle">분류된 데이터 뭉치</text>

        <rect x="0" y="25" width="100" height="40" fill="#ffe3e3" stroke="#fa5252" rx="4" />
        <text x="50" y="50" fill="#e03131" font-size="14" font-weight="bold" text-anchor="middle">빨강 (5개)</text>

        <rect x="0" y="75" width="100" height="40" fill="#fff3bf" stroke="#f08c00" rx="4" />
        <text x="50" y="100" fill="#e67700" font-size="14" font-weight="bold" text-anchor="middle">노랑 (3개)</text>

        <rect x="0" y="125" width="100" height="40" fill="#ebfbee" stroke="#2b8a3e" rx="4" />
        <text x="50" y="150" fill="#2b8a3e" font-size="14" font-weight="bold" text-anchor="middle">초록 (8개)</text>
    </g>

    <!-- Transformation Arrow -->
    <path d="M 180 120 L 250 120" fill="none" stroke="#2b8a3e" stroke-width="4" marker-end="url(#arrow-green)" />
    <text x="215" y="110" fill="#2b8a3e" font-size="12" font-weight="bold" text-anchor="middle">격자화</text>
    <text x="215" y="135" fill="#495057" font-size="10" text-anchor="middle">표(Table)</text>

    <!-- Right: The Table -->
    <g transform="translate(280, 60)">
        <!-- Main Table -->
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#495057" stroke-width="2" />

        <!-- Table Headers -->
        <rect x="0" y="0" width="220" height="30" fill="#e9ecef" stroke="#495057" />
        <line x1="110" y1="0" x2="110" y2="150" stroke="#495057" stroke-width="2" />
        <text x="55" y="20" fill="#343a40" font-size="12" font-weight="bold" text-anchor="middle">항목 (그룹명)</text>
        <text x="165" y="20" fill="#343a40" font-size="12" font-weight="bold" text-anchor="middle">수량 (도수)</text>

        <!-- Row 1 (Red) -->
        <line x1="0" y1="60" x2="220" y2="60" stroke="#adb5bd" />
        <text x="55" y="50" fill="#e03131" font-size="14" font-weight="bold" text-anchor="middle">빨강 그룹</text>
        <text x="165" y="50" fill="#495057" font-size="14" text-anchor="middle">5</text>

        <!-- Row 2 (Yellow) -->
        <line x1="0" y1="90" x2="220" y2="90" stroke="#adb5bd" />
        <text x="55" y="80" fill="#e67700" font-size="14" font-weight="bold" text-anchor="middle">노랑 그룹</text>
        <text x="165" y="80" fill="#495057" font-size="14" text-anchor="middle">3</text>

        <!-- Row 3 (Green) -->
        <line x1="0" y1="120" x2="220" y2="120" stroke="#adb5bd" />
        <text x="55" y="110" fill="#2b8a3e" font-size="14" font-weight="bold" text-anchor="middle">초록 그룹</text>
        <text x="165" y="110" fill="#495057" font-size="14" text-anchor="middle">8</text>

        <!-- Bottom Line (Total) -->
        <rect x="0" y="120" width="220" height="30" fill="#f8f9fa" />
        <text x="55" y="140" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">합계 (Total)</text>
        <text x="165" y="140" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">16</text>
    </g>

    <!-- Insight tag -->
    <path d="M 500 135 L 530 135" fill="none" stroke="#fa5252" stroke-width="2" />
    <text x="560" y="130" fill="#fa5252" font-size="10" font-weight="bold" text-anchor="middle">합계 계산이</text>
    <text x="560" y="145" fill="#fa5252" font-size="10" font-weight="bold" text-anchor="middle">한눈에 빡!</text>

    <defs>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
        </marker>
    </defs>
</svg>