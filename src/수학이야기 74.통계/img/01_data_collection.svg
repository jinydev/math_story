<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#1864ab" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">첫 번째 통계 보스: '자료의 수집 (Data Collection)'</text>

    <!-- The real world (Chaos) -->
    <g transform="translate(60, 80)">
        <circle cx="50" cy="50" r="50" fill="#fff" stroke="#adb5bd" stroke-width="2" stroke-dasharray="4,4" />
        <text x="50" y="5" fill="#495057" font-size="12" font-weight="bold" text-anchor="middle">현실 세계 (모집단)</text>
        <text x="50" y="30" fill="#adb5bd" font-size="20" text-anchor="middle">👨</text>
        <text x="20" y="50" fill="#adb5bd" font-size="20" text-anchor="middle">👩</text>
        <text x="80" y="60" fill="#adb5bd" font-size="20" text-anchor="middle">🧒</text>
        <text x="40" y="80" fill="#adb5bd" font-size="20" text-anchor="middle">👴</text>
        <text x="70" y="90" fill="#adb5bd" font-size="20" text-anchor="middle">👩‍𹢒</text>
    </g>

    <!-- Data Extraction Arrow -->
    <path d="M 170 130 L 250 130" fill="none" stroke="#1864ab" stroke-width="4" marker-end="url(#arrow-blue)" />
    <text x="210" y="120" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">설문조사 &amp; 크롤링</text>
    <text x="210" y="145" fill="#495057" font-size="10" text-anchor="middle">(Sampling)</text>

    <!-- Data Bin (Raw Data) -->
    <g transform="translate(280, 80)">
        <rect x="0" y="0" width="100" height="100" fill="#e7f5ff" stroke="#339af0" stroke-width="3" rx="10" />
        <text x="50" y="25" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">원시 데이터</text>
        <text x="50" y="40" fill="#1864ab" font-size="10" font-weight="bold" text-anchor="middle">(Raw Data)</text>

        <text x="50" y="65" fill="#495057" font-size="12" text-anchor="middle">[23, 15, 42,</text>
        <text x="50" y="85" fill="#495057" font-size="12" text-anchor="middle"> 38, 22, ...]</text>
    </g>

    <!-- Processing Arrow -->
    <path d="M 400 130 L 450 130" fill="none" stroke="#e8590c" stroke-width="4" marker-end="url(#arrow-orange)" />
    <text x="425" y="120" fill="#e8590c" font-size="12" font-weight="bold" text-anchor="middle">정제</text>

    <!-- Insight (Value) -->
    <g transform="translate(470, 80)">
        <circle cx="40" cy="50" r="40" fill="#fff4e6" stroke="#f59f00" stroke-width="3" />
        <text x="40" y="45" fill="#d9480f" font-size="14" font-weight="bold" text-anchor="middle">통찰 / 쓸모</text>
        <text x="40" y="65" fill="#e8590c" font-size="10" font-weight="bold" text-anchor="middle">(Insight)</text>
    </g>

    <defs>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#1864ab" />
        </marker>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8590c" />
        </marker>
    </defs>
</svg>