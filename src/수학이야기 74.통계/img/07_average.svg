<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#f03e3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">일곱 번째 통계 보스: 무너진 무게중심 회복, '평균(Average)'</text>

    <!-- The Physics Seesaw (Balance) -->
    <g transform="translate(300, 160)">
        <!-- Base triangle -->
        <polygon points="-15,0 15,0 0,-30" fill="#e03131" />

        <!-- The plank -->
        <rect x="-240" y="-35" width="480" height="5" fill="#495057" />

        <!-- Data points (Weights on the seesaw) -->
        <!-- Point 1: Value 60, weight 1 -->
        <rect x="-160" y="-65" width="20" height="30" fill="#a5d8ff" stroke="#339af0" rx="2" />
        <text x="-150" y="-70" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">60점</text>

        <!-- Point 2: Value 70, weight 1 -->
        <rect x="-60" y="-65" width="20" height="30" fill="#a5d8ff" stroke="#339af0" rx="2" />
        <text x="-50" y="-70" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">70점</text>

        <!-- Point 3: Value 100, weight 1 -->
        <rect x="240" y="-65" width="20" height="30" fill="#ffa8a8" stroke="#f03e3e" rx="2" />
        <text x="250" y="-70" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">100점</text>

        <!-- The Fulcrum (Average) pointing to where it balances -->
        <path d="M 10 30 L 10 5" fill="none" stroke="#2b8a3e" stroke-width="3" stroke-dasharray="2,2"
            marker-end="url(#arrow-green)" />
        <rect x="-70" y="35" width="160" height="30" fill="#ebfbee" stroke="#2b8a3e" rx="5" />
        <text x="10" y="55" fill="#2b8a3e" font-size="14" font-weight="bold" text-anchor="middle">무게 중심점 = 76.6점
            (평균)</text>

        <text x="10" y="90" fill="#495057" font-size="11" font-weight="bold" text-anchor="middle">단 한 명의 100점 천재(극단치)
            가</text>
        <text x="10" y="105" fill="#495057" font-size="11" font-weight="bold" text-anchor="middle">평균을 오른쪽으로 훅
            빨아들임!</text>
    </g>

    <!-- Formula box -->
    <rect x="20" y="50" width="180" height="40" fill="#fff" stroke="#adb5bd" rx="4" />
    <text x="110" y="65" fill="#495057" font-size="10" font-weight="bold" text-anchor="middle">평균의 물리적 연산</text>
    <text x="110" y="80" fill="#0b7285" font-size="12" font-weight="bold" text-anchor="middle">전체 점수 합력(Sum) ÷
        개수(N)</text>

    <defs>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
        </marker>
    </defs>
</svg>