<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#1864ab" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">여름엔 아이스크림, 겨울엔 붕어빵: 두 변수의 관계성 (Correlation)</text>

    <!-- Positive Correlation -->
    <g transform="translate(100, 150)">
        <rect x="-80" y="-80" width="160" height="120" fill="#fff4e6" stroke="#f59f00" stroke-width="2" rx="8" />
        <text x="0" y="-55" fill="#d9480f" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">양(+)의 상관관계</text>

        <path d="M -40 -30 L 40 10" fill="none" stroke="#fa5252" stroke-width="4" marker-end="url(#arrow-red)" />

        <!-- Rising data points visually -->
        <circle cx="-30" cy="-20" r="3" fill="#e03131" />
        <circle cx="-10" cy="-15" r="3" fill="#e03131" />
        <circle cx="10" cy="-5" r="3" fill="#e03131" />
        <circle cx="20" cy="5" r="3" fill="#e03131" />

        <text x="0" y="25" fill="#495057" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">X 증가 ➡️ Y 증가</text>
        <text x="0" y="38" fill="#868e96" font-size="10" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">(기온 오르면 콜라 더 팔림)</text>
    </g>

    <!-- Negative Correlation -->
    <g transform="translate(300, 150)">
        <rect x="-80" y="-80" width="160" height="120" fill="#e7f5ff" stroke="#339af0" stroke-width="2" rx="8" />
        <text x="0" y="-55" fill="#1864ab" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">음(-)의 상관관계</text>

        <path d="M -40 10 L 40 -30" fill="none" stroke="#228be6" stroke-width="4" marker-end="url(#arrow-blue)" />

        <circle cx="-30" cy="5" r="3" fill="#1864ab" />
        <circle cx="-15" cy="-2" r="3" fill="#1864ab" />
        <circle cx="5" cy="-15" r="3" fill="#1864ab" />
        <circle cx="25" cy="-25" r="3" fill="#1864ab" />

        <text x="0" y="25" fill="#495057" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">X 증가 ➡️ Y 감소</text>
        <text x="0" y="38" fill="#868e96" font-size="10" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">(기온 오르면 난로 안 팔림)</text>
    </g>

    <!-- No Correlation -->
    <g transform="translate(500, 150)">
        <rect x="-80" y="-80" width="160" height="120" fill="#f1f3f5" stroke="#adb5bd" stroke-width="2" rx="8" />
        <text x="0" y="-55" fill="#495057" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">상관관계 없음 (0)</text>

        <!-- Chaotic points -->
        <circle cx="-30" cy="-20" r="3" fill="#868e96" />
        <circle cx="20" cy="-30" r="3" fill="#868e96" />
        <circle cx="-10" cy="10" r="3" fill="#868e96" />
        <circle cx="30" cy="0" r="3" fill="#868e96" />
        <circle cx="0" cy="-10" r="3" fill="#868e96" />
        <circle cx="-40" cy="5" r="3" fill="#868e96" />

        <text x="0" y="25" fill="#495057" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">아무런 룰(Rule) 없음</text>
        <text x="0" y="38" fill="#868e96" font-size="10" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">(키가 크다고 수학 잘하나?)</text>
    </g>

    <defs>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#fa5252" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#228be6" />
        </marker>
    </defs>
</svg>