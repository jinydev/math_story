<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#e8590c" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">두 번째 구조: '어떤 마법 상자도 허용한다, 이항연산 (*)'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"더하기(+), 곱하기(×) 라는 고정관념을 버려라. 별표(*) 가 지배하는
        닫힌 세계관!"</text>

    <!-- Left Side: Custom Binary Operation Machine -->
    <g transform="translate(40, 80)">
        <rect x="0" y="0" width="240" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="120" y="25" fill="#e8590c" font-size="14" font-weight="bold" text-anchor="middle">이항연산 믹서기 (*
            연산)</text>

        <!-- Input pipes -->
        <path d="M 50 40 L 50 70" fill="none" stroke="#adb5bd" stroke-width="3" marker-end="url(#arrow-gray)" />
        <circle cx="50" cy="30" r="10" fill="#e7f5ff" stroke="#1864ab" stroke-width="2" />
        <text x="50" y="34" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">a</text>

        <path d="M 190 40 L 190 70" fill="none" stroke="#adb5bd" stroke-width="3" marker-end="url(#arrow-gray)" />
        <circle cx="190" cy="30" r="10" fill="#ffe3e3" stroke="#fa5252" stroke-width="2" />
        <text x="190" y="34" fill="#fa5252" font-size="12" font-weight="bold" text-anchor="middle">b</text>

        <!-- Mixer Box -->
        <rect x="40" y="70" width="160" height="50" fill="#fff4e6" stroke="#e8590c" stroke-width="2" rx="5" />
        <text x="120" y="95" fill="#d9480f" font-size="20" font-weight="bold" font-family="monospace"
            text-anchor="middle">a * b</text>
        <text x="120" y="112" fill="#d9480f" font-size="10" font-weight="bold" text-anchor="middle">= a + b + ab</text>

        <!-- Output pipe -->
        <path d="M 120 120 L 120 135" fill="none" stroke="#adb5bd" stroke-width="3" marker-end="url(#arrow-gray)" />
        <text x="120" y="145" fill="#2b8a3e" font-size="12" font-weight="bold" text-anchor="middle">새로운 값 C 배출!</text>
    </g>

    <!-- Right Side: Closure Property (닫힘) -->
    <g transform="translate(320, 80)">
        <rect x="0" y="0" width="240" height="150" fill="#fff" stroke="#2b8a3e" stroke-width="2" rx="5" />
        <text x="120" y="25" fill="#2b8a3e" font-size="14" font-weight="bold" text-anchor="middle">연산의 철가방 방어막: 닫힘
            (Closure)</text>

        <!-- Big Circle representing the Set -->
        <circle cx="120" cy="85" r="50" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2" stroke-dasharray="4,2" />
        <text x="120" y="55" fill="#2b8a3e" font-size="12" font-weight="bold" text-anchor="middle">집합 덩어리 S</text>

        <!-- Elements inside -->
        <circle cx="90" cy="90" r="10" fill="#fff" stroke="#1864ab" />
        <text x="90" y="94" fill="#1864ab" font-size="10" font-weight="bold" text-anchor="middle">a</text>

        <circle cx="150" cy="90" r="10" fill="#fff" stroke="#fa5252" />
        <text x="150" y="94" fill="#fa5252" font-size="10" font-weight="bold" text-anchor="middle">b</text>

        <!-- The Star Operation making a new element inside -->
        <line x1="100" y1="90" x2="140" y2="90" stroke="#fcc419" stroke-width="2" stroke-dasharray="2,2" />
        <circle cx="120" cy="115" r="12" fill="#fff" stroke="#2b8a3e" stroke-width="2" />
        <text x="120" y="120" fill="#2b8a3e" font-size="12" font-weight="bold" text-anchor="middle">C</text>
        <path d="M 120 90 L 120 100" fill="none" stroke="#2b8a3e" marker-end="url(#arrow-green)" />

        <rect x="15" y="140" width="210" height="18" fill="#e6fcf5" rx="3" />
        <text x="120" y="152" fill="#0ca678" font-size="9" font-weight="bold" font-family="monospace"
            text-anchor="middle">a도, b도, 합체물 C도 무조건 이 울타리 안에 있다!</text>
    </g>

    <defs>
        <marker id="arrow-gray" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
        </marker>
    </defs>
</svg>