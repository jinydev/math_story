<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#c92a2a" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">추정(Estimation): 인간이 던지는 95% 신뢰구간 투망</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"모평균 m은 도망가지 않는다. 내가 던진 X̄ 좌우 그물망 안에 m이 걸려들
        확률이 95% 다!"</text>

    <!-- Ground Line -->
    <line x1="50" y1="180" x2="550" y2="180" stroke="#adb5bd" stroke-width="3" />

    <!-- The Unknown Parameter (Target 'm') -->
    <line x1="300" y1="60" x2="300" y2="180" stroke="#fa5252" stroke-width="3" stroke-dasharray="5,5" />
    <circle cx="300" cy="180" r="6" fill="#c92a2a" />
    <text x="300" y="200" fill="#c92a2a" font-size="14" font-weight="bold" text-anchor="middle">진짜 평균 m (과녁)</text>

    <!-- Curve (Distribution of Sample Means) -->
    <path d="M 100 180 C 200 180, 250 60, 300 60 C 350 60, 400 180, 500 180" fill="#ffe3e3" fill-opacity="0.3"
        stroke="#ff8787" stroke-width="2" stroke-dasharray="3,3" />

    <!-- Sample 1 (Hit) -->
    <g transform="translate(250, 0)">
        <circle cx="0" cy="180" r="5" fill="#1864ab" />
        <text x="0" y="195" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">X̄₁</text>

        <!-- Net -->
        <path d="M -80 160 L 80 160" stroke="#1864ab" stroke-width="4" />
        <line x1="-80" y1="155" x2="-80" y2="165" stroke="#1864ab" stroke-width="3" />
        <line x1="80" y1="155" x2="80" y2="165" stroke="#1864ab" stroke-width="3" />

        <!-- Center drop -->
        <line x1="0" y1="160" x2="0" y2="180" stroke="#1864ab" stroke-width="1" stroke-dasharray="2,2" />

        <text x="0" y="150" fill="#0b7285" font-size="10" font-weight="bold" text-anchor="middle">"포획 성공!"</text>
    </g>

    <!-- Sample 2 (Miss) -->
    <g transform="translate(450, 0)">
        <circle cx="0" cy="180" r="5" fill="#f59f00" />
        <text x="0" y="195" fill="#e67700" font-size="12" font-weight="bold" text-anchor="middle">X̄₂</text>

        <!-- Net -->
        <path d="M -80 140 L 80 140" stroke="#f59f00" stroke-width="4" />
        <line x1="-80" y1="135" x2="-80" y2="145" stroke="#f59f00" stroke-width="3" />
        <line x1="80" y1="135" x2="80" y2="145" stroke="#f59f00" stroke-width="3" />

        <!-- Center drop -->
        <line x1="0" y1="140" x2="0" y2="180" stroke="#f59f00" stroke-width="1" stroke-dasharray="2,2" />

        <text x="-40" y="130" fill="#d9480f" font-size="10" font-weight="bold" text-anchor="middle">"실패! (5% 확률)"</text>
    </g>

    <!-- Error Bound E Formula Box -->
    <rect x="40" y="80" width="130" height="40" fill="#fff" stroke="#adb5bd" rx="5" />
    <text x="105" y="98" fill="#495057" font-size="10" font-weight="bold" text-anchor="middle">그물망(투망) 의 반지름 E</text>
    <text x="105" y="112" fill="#2b8a3e" font-size="12" font-weight="bold" font-family="monospace"
        text-anchor="middle">1.96 × (σ / √n)</text>

    <path d="M 105 120 C 105 150, 160 160, 170 160" fill="none" stroke="#2b8a3e" stroke-width="2"
        marker-end="url(#arrow-green)" />

    <defs>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
        </marker>
    </defs>
</svg>