<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#2b8a3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">데이터의 제국: 모집단(Population)과 표본(Sample)</text>

    <!-- The Population (Mother Universe) -->
    <g transform="translate(150, 150)">
        <circle cx="0" cy="-20" r="90" fill="#ebfbee" stroke="#2b8a3e" stroke-width="3" stroke-dasharray="8,4" />
        <text x="0" y="-80" fill="#087f5b" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">모집단 (Mother/Population)</text>

        <!-- Countless population dots -->
        <circle cx="-40" cy="-40" r="3" fill="#2b8a3e" />
        <circle cx="-20" cy="-60" r="3" fill="#2b8a3e" />
        <circle cx="30" cy="-50" r="3" fill="#2b8a3e" />
        <circle cx="50" cy="-10" r="3" fill="#2b8a3e" />
        <circle cx="-10" cy="-20" r="3" fill="#2b8a3e" />
        <circle cx="0" cy="10" r="3" fill="#2b8a3e" />
        <circle cx="-50" cy="20" r="3" fill="#2b8a3e" />
        <circle cx="20" cy="30" r="3" fill="#2b8a3e" />
        <text x="50" y="-40" fill="#2b8a3e" font-size="12">...</text>
        <text x="-60" y="-10" fill="#2b8a3e" font-size="12">...</text>

        <text x="0" y="-35" fill="#e03131" font-size="14" font-family="monospace" font-weight="bold"
            text-anchor="middle">모평균 (m)</text>
        <text x="0" y="-15" fill="#e03131" font-size="10" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">진짜 유전자 타겟</text>

        <!-- Data extraction area -->
        <path d="M 10 10 A 30 30 0 0 1 70 20" fill="none" stroke="#fa5252" stroke-width="2" />
    </g>

    <!-- The Extraction Process (Sampling) -->
    <path d="M 250 130 Q 320 80 400 130" fill="none" stroke="#adb5bd" stroke-width="4" marker-end="url(#arrow-grey)" />
    <text x="325" y="90" fill="#495057" font-size="12" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">무작위 추출 (크기 n)</text>

    <!-- The Sample -->
    <g transform="translate(450, 150)">
        <circle cx="0" cy="-20" r="40" fill="#fff" stroke="#40c057" stroke-width="3" />
        <text x="0" y="-75" fill="#087f5b" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">표본 (Sample)</text>

        <!-- Only 3 dots extracted -->
        <circle cx="-10" cy="-30" r="5" fill="#f03e3e" />
        <circle cx="15" cy="-20" r="5" fill="#f03e3e" />
        <circle cx="-5" cy="-5" r="5" fill="#f03e3e" />

        <text x="0" y="45" fill="#c92a2a" font-size="14" font-family="monospace" font-weight="bold"
            text-anchor="middle">표본평균 ( X̄ )</text>
        <text x="0" y="60" fill="#c92a2a" font-size="10" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">짝퉁(힌트) 데이터</text>
    </g>

    <defs>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>