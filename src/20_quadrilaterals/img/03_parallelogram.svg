<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#099268" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">도형계의 귀족: 평행사변형(Parallelogram)의 5대 마법</text>

    <g transform="translate(300, 150)">
        <!-- Base Parallelogram -->
        <path d="M -80 40 L 60 40 L 80 -40 L -60 -40 Z" fill="#ebfbee" stroke="#2b8a3e" stroke-width="4"
            stroke-linejoin="round" />

        <!-- Magic 1: Two pairs of parallel lines -->
        <path d="M -20 -40 L -10 -45 M -20 -40 L -10 -35 M -10 -40 L 0 -45 M -10 -40 L 0 -35" fill="none"
            stroke="#2b8a3e" stroke-width="2" />
        <path d="M -20 40 L -10 35 M -20 40 L -10 45 M -10 40 L 0 35 M -10 40 L 0 45" fill="none" stroke="#2b8a3e"
            stroke-width="2" />

        <path d="M -70 0 L -65 -5 M -70 0 L -65 5" fill="none" stroke="#2b8a3e" stroke-width="2" />
        <path d="M 70 0 L 75 -5 M 70 0 L 75 5" fill="none" stroke="#2b8a3e" stroke-width="2" />

        <!-- Magic 2: Opposite sides are equal -->
        <text x="0" y="-45" fill="#e03131" font-size="12" font-weight="bold">길이 a</text>
        <text x="-10" y="55" fill="#e03131" font-size="12" font-weight="bold">길이 a</text>

        <text x="-95" y="0" fill="#1864ab" font-size="12" font-weight="bold">비율 b</text>
        <text x="90" y="0" fill="#1864ab" font-size="12" font-weight="bold">비율 b</text>

        <!-- Magic 3: Opposite angles are equal -->
        <path d="M -60 40 A 15 15 0 0 1 -75 25" fill="none" stroke="#f59f00" stroke-width="3" />
        <path d="M 80 -40 A 15 15 0 0 1 65 -25" fill="none" stroke="#f59f00" stroke-width="3" />
        <text x="70" y="-10" fill="#f59f00" font-size="10" font-weight="bold">각도 A</text>
        <text x="-50" y="25" fill="#f59f00" font-size="10" font-weight="bold">각도 A</text>

        <!-- Consecutive angles sum to 180 -->
        <rect x="-95" y="65" width="180" height="25" fill="#fff" stroke="#adb5bd" rx="4" />
        <text x="-5" y="82" fill="#495057" font-size="11" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">"이웃한 두 각을 더하면 무조건 180도!"</text>

        <!-- Diagonals bisect each other -->
        <path d="M -60 -40 L 60 40" fill="none" stroke="#862e9c" stroke-width="2" stroke-dasharray="4,4" />
        <path d="M 80 -40 L -80 40" fill="none" stroke="#862e9c" stroke-width="2" stroke-dasharray="4,4" />

        <circle cx="0" cy="0" r="4" fill="#862e9c" />

        <line x1="-35" y1="-25" x2="-25" y2="-15" stroke="#be4bdb" stroke-width="2" />
        <line x1="25" y1="15" x2="35" y2="25" stroke="#be4bdb" stroke-width="2" />

        <line x1="-45" y1="20" x2="-35" y2="20" stroke="#be4bdb" stroke-width="2" />
        <line x1="-45" y1="25" x2="-35" y2="25" stroke="#be4bdb" stroke-width="2" />
        <line x1="35" y1="-20" x2="45" y2="-20" stroke="#be4bdb" stroke-width="2" />
        <line x1="35" y1="-25" x2="45" y2="-25" stroke="#be4bdb" stroke-width="2" />

        <text x="-40" y="-35" fill="#862e9c" font-size="10" font-weight="bold">대각선 반갈죽!</text>
    </g>

</svg>