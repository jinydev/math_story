<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#ae3ec9" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">진화의 기적: 이산 막대기가 부드러운 정규 곡선이 될 때</text>

    <!-- Stage 1: Small N (Binomial) -->
    <g transform="translate(100, 160)">
        <rect x="-80" y="-100" width="160" height="140" fill="#fff5f5" stroke="#fa5252" stroke-width="2" rx="8" />
        <text x="0" y="-75" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">초보자: 동전 10번 (N=10)</text>

        <!-- Crude Bar Graph -->
        <line x1="-60" y1="20" x2="60" y2="20" stroke="#868e96" stroke-width="2" />
        <rect x="-40" y="-10" width="15" height="30" fill="#ffc9c9" stroke="#fa5252" />
        <rect x="-15" y="-50" width="15" height="70" fill="#ffc9c9" stroke="#fa5252" />
        <rect x="10" y="-30" width="15" height="50" fill="#ffc9c9" stroke="#fa5252" />
        <rect x="35" y="0" width="15" height="20" fill="#ffc9c9" stroke="#fa5252" />

        <text x="0" y="35" fill="#e03131" font-size="10" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">엉성한 막대기 (이산)</text>
    </g>

    <!-- Arrow -->
    <path d="M 200 110 L 260 110" fill="none" stroke="#adb5bd" stroke-width="4" stroke-dasharray="4,4"
        marker-end="url(#arrow-purple)" />
    <text x="230" y="95" fill="#ae3ec9" font-size="11" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">N 증가</text>

    <!-- Stage 2: Medium N -->
    <g transform="translate(320, 160)">
        <rect x="-40" y="-80" width="80" height="100" fill="#f3d9fa" stroke="#ae3ec9" stroke-width="1" rx="4" />
        <!-- Tighter bars -->
        <line x1="-30" y1="10" x2="30" y2="10" stroke="#868e96" stroke-width="2" />
        <!-- 7 bars -->
        <rect x="-28" y="0" width="6" height="10" fill="#eebefa" />
        <rect x="-20" y="-15" width="6" height="25" fill="#eebefa" />
        <rect x="-12" y="-30" width="6" height="40" fill="#eebefa" />
        <rect x="-4" y="-45" width="6" height="55" fill="#eebefa" />
        <rect x="4" y="-35" width="6" height="45" fill="#eebefa" />
        <rect x="12" y="-20" width="6" height="30" fill="#eebefa" />
        <rect x="20" y="-5" width="6" height="15" fill="#eebefa" />
        <text x="0" y="-60" fill="#862e9c" font-size="10" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">N = 50</text>
    </g>

    <!-- Arrow -->
    <path d="M 380 110 L 410 110" fill="none" stroke="#adb5bd" stroke-width="4" stroke-dasharray="4,4"
        marker-end="url(#arrow-purple)" />

    <!-- Stage 3: Large N (Normal Distribution) -->
    <g transform="translate(500, 160)">
        <rect x="-80" y="-100" width="160" height="140" fill="#e7f5ff" stroke="#339af0" stroke-width="2" rx="8" />
        <text x="0" y="-75" fill="#1864ab" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">프로: 동전 10,000번 (N=1만)</text>

        <!-- Continuous Curve -->
        <line x1="-70" y1="20" x2="70" y2="20" stroke="#868e96" stroke-width="2" />
        <!-- Very thin bars creating a curve -->
        <path d="M -60 20 C -30 20, -20 -60, 0 -60 C 20 -60, 30 20, 60 20" fill="#a5d8ff" opacity="0.6" stroke="#1864ab"
            stroke-width="3" />

        <!-- Mapping N, p -> m, simga -->
        <rect x="-65" y="-45" width="130" height="25" fill="#fff" stroke="#adb5bd" rx="3" />
        <text x="0" y="-30" fill="#1864ab" font-size="10" font-family="monospace" font-weight="bold"
            text-anchor="middle">N( np, npq ) 로 강제진화!</text>

        <text x="0" y="35" fill="#1864ab" font-size="10" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">완벽한 종 모양 곡선 (정규)</text>
    </g>

    <defs>
        <marker id="arrow-purple" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ae3ec9" />
        </marker>
    </defs>
</svg>