<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#cf2a27" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">도화지 위의 그림을 3D로 소환하다: 회전체 (Solid of Revolution)</text>

    <!-- Base 2D Shape (Rectangle) -->
    <g transform="translate(100, 150)">
        <line x1="0" y1="50" x2="0" y2="-100" stroke="#868e96" stroke-width="4" stroke-dasharray="8,4" />
        <text x="0" y="70" fill="#868e96" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">회전축 (Axis)</text>

        <!-- Flat Rectangle -->
        <rect x="0" y="-80" width="60" height="120" fill="#ffe3e3" stroke="#ff8787" stroke-width="2" />
        <text x="30" y="-15" fill="#c92a2a" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">2D 렌더링</text>
        <text x="30" y="5" fill="#c92a2a" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">직사각형</text>

        <!-- Swirl arrow to indicate rotation -->
        <path d="M 80 -40 Q 120 0 80 40" fill="none" stroke="#fa5252" stroke-width="3" marker-end="url(#arrow-red)" />
        <text x="130" y="5" fill="#fa5252" font-size="14" font-family="sans-serif" font-weight="bold">360° 회전!</text>
    </g>

    <!-- 3D Solid Result (Cylinder) -->
    <g transform="translate(380, 150)">
        <line x1="0" y1="50" x2="0" y2="-100" stroke="#adb5bd" stroke-width="2" stroke-dasharray="4,4" />

        <!-- 3D Cylinder -->
        <!-- Top Ellipse -->
        <ellipse cx="0" cy="-80" rx="60" ry="15" fill="#f03e3e" stroke="#c92a2a" stroke-width="2" />
        <!-- Body -->
        <path d="M -60 -80 L -60 40 A 60 15 0 0 0 60 40 L 60 -80 A 60 15 0 0 1 -60 -80 Z" fill="#ff6b6b"
            stroke="#c92a2a" stroke-width="2" />
        <!-- Bottom Ellipse (hidden back line) -->
        <path d="M -60 40 A 60 15 0 0 1 60 40" fill="none" stroke="#a61e4d" stroke-width="2" stroke-dasharray="4,4" />

        <text x="0" y="-15" fill="#fff" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">3D 볼륨 제네레이션</text>
        <text x="0" y="5" fill="#fff" font-size="20" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">원기둥</text>
    </g>

    <!-- Arrow passing -->
    <path d="M 240 110 L 290 110" fill="none" stroke="#495057" stroke-width="4" marker-end="url(#arrow-grey)" />

    <defs>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#fa5252" />
        </marker>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057" />
        </marker>
    </defs>
</svg>