<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#2b8a3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">도형의 척추 해부: 오일러의 다면체 정리 (v - e + f = 2)</text>

    <!-- Vertices, Edges, Faces visualization on a Cube -->
    <g transform="translate(150, 150)">
        <!-- Back faces -->
        <path d="M -20 -70 L 40 -80 L 40 -20 L -20 -10 Z" fill="#e9ecef" stroke="#adb5bd" stroke-width="1"
            stroke-dasharray="2,2" />
        <path d="M -80 -20 L -20 -70 L -20 -10 L -80 40 Z" fill="#e9ecef" stroke="#adb5bd" stroke-width="1"
            stroke-dasharray="2,2" />

        <!-- Front faces -->
        <!-- Top Face -->
        <path d="M -80 -20 L -20 -70 L 40 -80 L -20 -30 Z" fill="#d3f9d8" stroke="#40c057" stroke-width="2" />
        <text x="-20" y="-45" fill="#2b8a3e" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">면 (Face)</text>

        <!-- Right Face -->
        <path d="M -20 -30 L 40 -80 L 40 -20 L -20 30 Z" fill="#b2f2bb" stroke="#2b8a3e" stroke-width="2" />

        <!-- Front Face -->
        <path d="M -80 -20 L -20 -30 L -20 30 L -80 40 Z" fill="#8ce99a" stroke="#2b8a3e" stroke-width="2" />

        <!-- Edge Highlight -->
        <line x1="-80" y1="-20" x2="-20" y2="-30" stroke="#c92a2a" stroke-width="4" />
        <text x="-60" y="-35" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold">모서리(Edge)</text>

        <!-- Vertex Highlight -->
        <circle cx="-20" cy="30" r="5" fill="#1864ab" />
        <text x="-15" y="45" fill="#1864ab" font-size="12" font-family="sans-serif"
            font-weight="bold">꼭짓점(Vertex)</text>
    </g>

    <!-- Formula Panel -->
    <g transform="translate(420, 130)">
        <rect x="-130" y="-70" width="260" height="140" fill="#fff4e6" stroke="#f59f00" stroke-width="2" rx="8" />
        <text x="0" y="-45" fill="#d9480f" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">오일러 방정식 (Euler's Formula)</text>

        <text x="0" y="-10" fill="#d9480f" font-size="28" font-family="monospace" font-weight="bold"
            text-anchor="middle">V - E + F = 2</text>

        <text x="-80" y="25" fill="#1864ab" font-size="12" font-family="sans-serif" font-weight="bold">V (꼭짓점 8개)</text>
        <text x="0" y="25" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">- E (모서리 12개)</text>
        <text x="80" y="25" fill="#2b8a3e" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">+ F (면 6개)</text>

        <rect x="-60" y="40" width="120" height="20" fill="#ffe8cc" rx="4" />
        <text x="0" y="54" fill="#d9480f" font-size="14" font-family="monospace" font-weight="bold"
            text-anchor="middle">8 - 12 + 6 = 2</text>
    </g>
</svg>