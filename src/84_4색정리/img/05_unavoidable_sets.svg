<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#862e9c" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">피할 수 없는 집합 (Unavoidable Set): 무한대의 제압</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"수학자 하켄과 아펠의 대반격: 무한대의 지도를 1,936개의 레고 블록으로
        환원 격파!"</text>

    <!-- Left: Infinite Maps -->
    <g transform="translate(40, 80)">
        <rect x="0" y="0" width="180" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="90" y="25" fill="#e8590c" font-size="14" font-weight="bold" text-anchor="middle">세상의 모든 지도 (무한대)</text>

        <text x="90" y="80" fill="#adb5bd" font-size="40" font-family="serif" font-weight="bold"
            text-anchor="middle">∞</text>

        <rect x="20" y="115" width="140" height="20" fill="#fff0f6" rx="3" />
        <text x="90" y="129" fill="#c92a2a" font-size="10" font-weight="bold" text-anchor="middle">"인간은 무한을 증명
            불가!"</text>
    </g>

    <!-- Transform Arrow -->
    <path d="M 230 145 C 245 110, 245 110, 260 145" fill="none" stroke="#228be6" stroke-width="3" stroke-dasharray="4,2"
        marker-end="url(#arrow-blue)" />
    <rect x="210" y="110" width="70" height="30" fill="#e7f5ff" rx="3" />
    <text x="245" y="123" fill="#1864ab" font-size="10" font-weight="bold" text-anchor="middle">불가피한</text>
    <text x="245" y="135" fill="#1864ab" font-size="10" font-weight="bold" text-anchor="middle">패턴 추출</text>

    <!-- Right: 1936 Unavoidable Sets -->
    <g transform="translate(290, 80)">
        <rect x="0" y="0" width="280" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="140" y="25" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">피할 수 없는 집합 (유한
            조각)</text>

        <!-- Pattern 1 -->
        <g transform="translate(20, 50)">
            <circle cx="20" cy="20" r="15" fill="#e3fafc" stroke="#0b7285" stroke-width="2" />
            <circle cx="50" cy="20" r="15" fill="#e3fafc" stroke="#0b7285" stroke-width="2" />
            <circle cx="35" cy="45" r="15" fill="#e3fafc" stroke="#0b7285" stroke-width="2" />
            <text x="35" y="75" fill="#0b7285" font-size="10" font-weight="bold" text-anchor="middle">패턴 #1</text>
        </g>

        <!-- Pattern 2 -->
        <g transform="translate(100, 50)">
            <circle cx="20" cy="30" r="15" fill="#fff0f6" stroke="#a61e4d" stroke-width="2" />
            <circle cx="50" cy="30" r="15" fill="#fff0f6" stroke="#a61e4d" stroke-width="2" />
            <circle cx="35" cy="10" r="10" fill="#fff0f6" stroke="#a61e4d" stroke-width="2" />
            <circle cx="35" cy="50" r="10" fill="#fff0f6" stroke="#a61e4d" stroke-width="2" />
            <text x="35" y="75" fill="#a61e4d" font-size="10" font-weight="bold" text-anchor="middle">패턴 #2</text>
        </g>

        <text x="195" y="70" fill="#adb5bd" font-size="20" font-weight="bold" text-anchor="middle">...</text>

        <!-- Pattern 1936 -->
        <g transform="translate(210, 50)">
            <rect x="10" y="10" width="40" height="40" fill="#f3f0ff" stroke="#6741d9" stroke-width="2" rx="5" />
            <circle cx="30" cy="30" r="10" fill="#fff" stroke="#6741d9" stroke-width="2" />
            <text x="30" y="75" fill="#6741d9" font-size="10" font-weight="bold" text-anchor="middle">패턴 #1936</text>
        </g>

        <!-- Formula Check -->
        <rect x="20" y="125" width="240" height="20" fill="#e7f5ff" rx="3" />
        <text x="140" y="139" fill="#1864ab" font-size="10" font-weight="bold" text-anchor="middle">"모든 지도는 이 1,936개 부품
            중 하나를 무조건 포함한다!"</text>
    </g>

    <defs>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#228be6" />
        </marker>
    </defs>
</svg>