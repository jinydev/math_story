<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#2b8a3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">세 번째 구조: '우주를 담는 철가방 세트, 대수적 구조 (M, *)'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"단순한 숫자 바구니가 아니라, 그 안에서 돌아가는 믹서기 엔진 조합까지 한정판
        세트로 묶어라!"</text>

    <!-- Left: Just a boring set -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="180" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="90" y="25" fill="#495057" font-size="14" font-weight="bold" text-anchor="middle">단순한 집합 (원시 우주)</text>

        <!-- Empty Space (Set Z) -->
        <path d="M 40 120 C 30 70, 70 50, 90 50 C 120 50, 150 70, 140 120 C 130 140, 50 140, 40 120 Z" fill="#e7f5ff"
            stroke="#339af0" stroke-width="2" stroke-dasharray="4,2" />
        <text x="50" y="70" fill="#1864ab" font-size="14" font-weight="bold">Z (정수)</text>

        <text x="90" y="90" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">-1, 0, 1, 2...</text>

        <rect x="15" y="125" width="150" height="18" fill="#ffe3e3" rx="3" />
        <text x="90" y="138" fill="#c92a2a" font-size="10" font-weight="bold" text-anchor="middle">"법칙이 없음. 그냥
            창고"</text>
    </g>

    <!-- Arrow linking -->
    <path d="M 250 145 C 270 120, 270 160, 290 145" fill="none" stroke="#2b8a3e" stroke-width="3"
        marker-end="url(#arrow-green)" />
    <text x="270" y="120" fill="#2b8a3e" font-size="12" font-weight="bold" text-anchor="middle">합체!</text>

    <!-- Right: Algebraic Structure (Set + Operation) -->
    <g transform="translate(310, 80)">
        <rect x="0" y="0" width="260" height="150" fill="#fff" stroke="#2b8a3e" stroke-width="2" rx="5" />
        <text x="130" y="25" fill="#2b8a3e" font-size="14" font-weight="bold" text-anchor="middle">대수적 구조 (Algebraic
            Structure)</text>

        <!-- The Group / Structure Container -->
        <rect x="30" y="40" width="200" height="75" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2" rx="10" />

        <!-- Left item: The Set -->
        <text x="80" y="70" fill="#1864ab" font-size="18" font-weight="bold" text-anchor="middle">Z</text>
        <text x="80" y="85" fill="#1864ab" font-size="10" font-weight="bold" text-anchor="middle">(재료 창고)</text>

        <!-- Comma -->
        <text x="130" y="75" fill="#212529" font-size="24" font-weight="bold" text-anchor="middle">,</text>

        <!-- Right item: The Operation -->
        <circle cx="180" cy="70" r="15" fill="#fff4e6" stroke="#e8590c" stroke-width="2" />
        <text x="180" y="77" fill="#e8590c" font-size="20" font-weight="bold" text-anchor="middle">+</text>
        <text x="180" y="100" fill="#e8590c" font-size="10" font-weight="bold" text-anchor="middle">(믹서기 엔진)</text>

        <text x="130" y="55" fill="#2b8a3e" font-size="14" font-family="monospace" font-weight="bold"
            text-anchor="middle">( Z , + ) 세트</text>

        <rect x="15" y="125" width="230" height="18" fill="#e6fcf5" rx="3" />
        <text x="130" y="138" fill="#0ca678" font-size="10" font-weight="bold" text-anchor="middle">재료(Z)와 조리법(+) 이 함께
            묶인 거대한 유니버스</text>
    </g>

    <defs>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
        </marker>
    </defs>
</svg>