<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">위상 불변량 (Topological Invariant): 오일러 공식</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"모양이 아무리 찌그러져도 점(V)
        - 선(E) + 면(F) 의 합산결과는 영원히 변하지 않는 절대 숫자다."</text>

    <!-- Formula Center -->
    <rect x="200" y="110" width="500" height="70" rx="15" fill="#1b1122" stroke="#ff00ff" stroke-width="3" />
    <text x="450" y="155" fill="#fff" font-family="monospace" font-size="34" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">
        <tspan fill="#00ffcc">V</tspan> - <tspan fill="#ff0055">E</tspan> + <tspan fill="#ffff00">F</tspan> = <tspan
            fill="#ff00ff" font-size="44">2</tspan>
    </text>

    <!-- Left Model: Cube (Genus 0) -->
    <g transform="translate(250, 320)">
        <rect x="-150" y="-120" width="300" height="220" rx="10" fill="#001414" stroke="#00ffcc" stroke-width="2" />

        <!-- 3D Cube Wireframe -->
        <g transform="translate(0, -30)">
            <path d="M -40 -40 L 40 -40 L 40 40 L -40 40 Z" fill="#ffff00" opacity="0.2" />
            <path d="M -20 -60 L 60 -60 L 60 20 L -20 20 Z" fill="none" stroke="#fff" stroke-dasharray="2 2" />

            <!-- Edges -->
            <path d="M -40 -40 L -20 -60 M 40 -40 L 60 -60 M 40 40 L 60 20 M -40 40 L -20 20" fill="none"
                stroke="#ff0055" stroke-width="3" filter="url(#glow)" />
            <path d="M -40 -40 L 40 -40 L 40 40 L -40 40 Z" fill="none" stroke="#ff0055" stroke-width="3"
                filter="url(#glow)" />
            <path d="M -20 -60 L 60 -60 L 60 20" fill="none" stroke="#ff0055" stroke-width="3" filter="url(#glow)" />

            <!-- Vertices -->
            <circle cx="-40" cy="-40" r="5" fill="#00ffcc" />
            <circle cx="40" cy="-40" r="5" fill="#00ffcc" />
            <circle cx="40" cy="40" r="5" fill="#00ffcc" />
            <circle cx="-40" cy="40" r="5" fill="#00ffcc" />
            <circle cx="-20" cy="-60" r="5" fill="#00ffcc" />
            <circle cx="60" cy="-60" r="5" fill="#00ffcc" />
            <circle cx="60" cy="20" r="5" fill="#00ffcc" />
            <circle cx="-20" cy="20" r="5" fill="#00ffcc" />
        </g>

        <text x="0" y="40" fill="#fff" font-weight="bold" font-size="20" text-anchor="middle" filter="url(#glow)">정육면체
            (Cube)</text>
        <text x="0" y="65" fill="#bbb" font-family="monospace" font-size="16" text-anchor="middle">
            <tspan fill="#00ffcc">8(점)</tspan> - <tspan fill="#ff0055">12(선)</tspan> + <tspan fill="#ffff00">6(면)
            </tspan> = <tspan fill="#ff00ff" font-weight="bold">2</tspan>
        </text>
    </g>

    <!-- VS Arrow -->
    <text x="450" y="300" fill="#fff" font-family="monospace" font-size="40" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">VS</text>

    <!-- Right Model: Torus (Genus 1) -->
    <g transform="translate(650, 320)">
        <rect x="-150" y="-120" width="300" height="220" rx="10" fill="#140014" stroke="#ff00ff" stroke-width="2" />

        <!-- Torus / Donut -->
        <g transform="translate(0, -30)">
            <ellipse cx="0" cy="0" rx="60" ry="30" fill="none" stroke="#ff00ff" stroke-width="4" filter="url(#glow)" />
            <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="#113333" stroke-width="2" />
            <path d="M -15 0 Q 0 -10 15 0 Q 0 10 -15 0" fill="#ff00ff" opacity="0.4" filter="url(#glow)" />
            <circle cx="0" cy="-5" r="5" fill="#000" />
        </g>

        <text x="0" y="40" fill="#fff" font-weight="bold" font-size="20" text-anchor="middle" filter="url(#glow)">구멍난 도넛
            (Torus)</text>
        <text x="0" y="65" fill="#bbb" font-family="monospace" font-size="16" text-anchor="middle">
            <tspan fill="#00ffcc">V</tspan> - <tspan fill="#ff0055">E</tspan> + <tspan fill="#ffff00">F</tspan> = <tspan
                fill="#ff00ff" font-weight="bold">0</tspan>
        </text>
        <text x="0" y="85" fill="#ff5555" font-weight="bold" font-size="14" text-anchor="middle">(우주의 법칙이 0으로
            낮아짐)</text>
    </g>

    <!-- Big Alert Bottom -->
    <rect x="100" y="480" width="700" height="90" rx="10" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="510" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        폴리곤(면) 의 개수를 수만 개로 늘려 '둥근 공' 처럼 부드럽게 렌더링을 깎아내도,
    </text>
    <text x="450" y="535" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        물체 한가운데에 <tspan fill="#ff00ff" font-weight="bold">물리적인 결함(구멍/Tunnel)</tspan> 이 뚫려 버리지만 않으면,
    </text>
    <text x="450" y="555" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">
        시스템 메모리는 언제나 "V - E + F = 2" 라는 완벽한 데이터 검증 스펙을 유지한다.
    </text>
</svg>