<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .panel {
                fill: #161b22;
                stroke: #30363d;
                stroke-width: 2;
                rx: 10;
            }

            .roman {
                fill: #ff6464;
                font-size: 60px;
                filter: drop-shadow(0 0 5px rgba(255, 100, 100, 0.5));
            }

            .arabic {
                fill: #00ffff;
                font-size: 60px;
                filter: drop-shadow(0 0 5px rgba(0, 255, 255, 0.5));
            }

            .subtext {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .vs {
                fill: #ffffff;
                font-size: 40px;
                font-style: italic;
            }

            .math-text {
                fill: #ffaa64;
                font-size: 20px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="40" class="title">《산반서》의 충격: 로마 숫자 vs 아라비아 숫자</text>

    <!-- Left Panel: Roman Numerals -->
    <rect x="50" y="80" width="300" height="250" class="panel" />
    <text x="200" y="120" fill="#ffffff" font-size="22" text-anchor="middle">로마 숫자 (Roman)</text>

    <text x="200" y="180" class="roman" text-anchor="middle">CVIII</text>

    <text x="200" y="240" class="math-text">C(100) + V(5) + I(1) + I(1) + I(1)</text>
    <text x="200" y="270" fill="#ff6464" font-size="16" text-anchor="middle">복잡한 기호들의 1차원적 단순 덧셈 나열</text>
    <text x="200" y="300" class="subtext">연산(곱하기, 나누기)이 불가능에 가까움</text>

    <!-- VS text -->
    <text x="400" y="220" class="vs" text-anchor="middle">VS</text>

    <!-- Right Panel: Arabic Numerals -->
    <rect x="450" y="80" width="300" height="250" class="panel" />
    <text x="600" y="120" fill="#ffffff" font-size="22" text-anchor="middle">아라비아 기수법 (Arabic)</text>

    <text x="600" y="180" class="arabic" text-anchor="middle">108</text>

    <text x="600" y="240" class="math-text">1×10² + 0×10¹ + 8×10⁰</text>
    <text x="600" y="270" fill="#00ffff" font-size="16" text-anchor="middle">위치(자릿수)와 기호 '0'을 활용한 압축</text>
    <text x="600" y="300" class="subtext">현대 컴퓨터 산술 알고리즘의 완벽한 조상</text>

</svg>