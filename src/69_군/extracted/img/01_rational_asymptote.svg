<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <!-- Glow effects -->
        <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- Warning striped pattern -->
        <pattern id="stripes" width="20" height="20" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
            <line x1="0" y1="0" x2="0" y2="20" stroke="#ff4d4d" stroke-width="10" opacity="0.4" />
            <line x1="10" y1="0" x2="10" y2="20" stroke="#1a1a24" stroke-width="10" opacity="0.4" />
        </pattern>

        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#4da6ff" />
        </marker>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glowBlue)">유리 함수 (Rational Functions): 점근선 회피 기동</text>

    <!-- Coordinate System (Asymptote Walls) -->
    <g transform="translate(400, 280)">

        <!-- Warning Areas (Danger Zones) around the axes -->
        <rect x="-15" y="-180" width="30" height="360" fill="url(#stripes)" />
        <rect x="-300" y="-15" width="600" height="30" fill="url(#stripes)" />

        <!-- The actual Asymptotes (X=0, Y=0) -->
        <line x1="0" y1="-200" x2="0" y2="200" stroke="#ff4d4d" stroke-width="3" stroke-dasharray="10 5"
            filter="url(#glowRed)" />
        <line x1="-320" y1="0" x2="320" y2="0" stroke="#ff4d4d" stroke-width="3" stroke-dasharray="10 5"
            filter="url(#glowRed)" />

        <text x="0" y="-210" fill="#ff4d4d" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glowRed)">세로 점근선 (x=0)</text>
        <text x="330" y="5" fill="#ff4d4d" font-family="monospace" font-size="20" font-weight="bold" text-anchor="start"
            filter="url(#glowRed)">가로 점근선 (y=0)</text>
        <text x="-25" y="25" fill="#ff4d4d" font-family="monospace" font-size="25" font-weight="bold"
            text-anchor="middle">에러 구역!</text>

        <!-- Hyperbola Curve (Quadrant 1) y = 1/x scaled up for visual -->
        <!-- From (300, 25) to (25, 300) -->
        <!-- We inverted Y because SVG y-axis is downwards. So quadrant 1 is -y, +x -->
        <path d="M 300 -15 Q 40 -40 15 -180" fill="none" stroke="#4da6ff" stroke-width="6" filter="url(#glowBlue)"
            marker-end="url(#arrow)" marker-start="url(#arrow)" />

        <!-- Trace lines for the curve 1 -->
        <circle cx="50" cy="-100" r="5" fill="#ffffff" />
        <line x1="50" y1="0" x2="50" y2="-100" stroke="#aaaaaa" stroke-dasharray="2 4" />
        <line x1="0" y1="-100" x2="50" y2="-100" stroke="#aaaaaa" stroke-dasharray="2 4" />

        <!-- Hyperbola Curve (Quadrant 3) -->
        <path d="M -300 15 Q -40 40 -15 180" fill="none" stroke="#4da6ff" stroke-width="6" filter="url(#glowBlue)"
            marker-end="url(#arrow)" marker-start="url(#arrow)" />

        <circle cx="-50" cy="100" r="5" fill="#ffffff" />
        <line x1="-50" y1="0" x2="-50" y2="100" stroke="#aaaaaa" stroke-dasharray="2 4" />
        <line x1="0" y1="100" x2="-50" y2="100" stroke="#aaaaaa" stroke-dasharray="2 4" />

    </g>

    <!-- Explanation Boxes -->
    <rect x="50" y="100" width="220" height="80" rx="10" fill="#112233" stroke="#4da6ff" stroke-width="2" />
    <text x="160" y="130" fill="#4da6ff" font-family="monospace" font-size="20" font-weight="bold"
        text-anchor="middle">y = 1 / x</text>
    <text x="160" y="160" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">분모 x가 0으로 다가갈수록
        폭주!</text>

    <rect x="530" y="100" width="220" height="80" rx="10" fill="#2b1111" stroke="#ff4d4d" stroke-width="2" />
    <text x="640" y="130" fill="#ff4d4d" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">ZeroDivideError 회피</text>
    <text x="640" y="160" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">결대 벽(X=0)에 닿을 수
        없다!</text>

</svg>