<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">매트릭스(Matrix) 추론: 엑셀 격자망의 배제 매직</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"수진이는 축구광이다." -> 단서
        1개가 무려 6개의 오답 오물들을 'X' 로 날려버리는 파이프라인 정화 장치!</text>

    <!-- Holographic Table Matrix -->
    <g transform="translate(150, 140)">

        <!-- Header / Categories -->
        <rect x="100" y="0" width="100" height="40" fill="#1b1122" stroke="#4da6ff" stroke-width="2" />
        <text x="150" y="26" fill="#4da6ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">축구</text>

        <rect x="200" y="0" width="100" height="40" fill="#1b1122" stroke="#4da6ff" stroke-width="2" />
        <text x="250" y="26" fill="#4da6ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">야구</text>

        <rect x="300" y="0" width="100" height="40" fill="#1b1122" stroke="#4da6ff" stroke-width="2" />
        <text x="350" y="26" fill="#4da6ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">농구</text>

        <!-- Rows (Persons) -->
        <!-- Chulsoo -->
        <rect x="0" y="40" width="100" height="60" fill="#221111" stroke="#ffaa00" stroke-width="2" />
        <text x="50" y="76" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">철수</text>

        <rect x="100" y="40" width="100" height="60" fill="#0d1115" stroke="#4da6ff" stroke-width="1" />
        <circle cx="150" cy="70" r="15" fill="none" stroke="#ff5555" stroke-width="4" />
        <line x1="135" y1="55" x2="165" y2="85" stroke="#ff5555" stroke-width="4" />

        <rect x="200" y="40" width="100" height="60" fill="#0d1115" stroke="#4da6ff" stroke-width="1" />
        <!-- X from YeongHee's Baseball -->
        <circle cx="250" cy="70" r="15" fill="none" stroke="#ff5555" stroke-width="4" />
        <line x1="235" y1="55" x2="265" y2="85" stroke="#ff5555" stroke-width="4" />

        <rect x="300" y="40" width="100" height="60" fill="#0d1115" stroke="#4da6ff" stroke-width="1" />
        <text x="350" y="75" fill="#777" font-family="monospace" font-size="14" text-anchor="middle">?</text>

        <!-- YeongHee -->
        <rect x="0" y="100" width="100" height="60" fill="#221111" stroke="#ffaa00" stroke-width="2" />
        <text x="50" y="136" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">영희</text>

        <rect x="100" y="100" width="100" height="60" fill="#0d1115" stroke="#4da6ff" stroke-width="1" />
        <circle cx="150" cy="130" r="15" fill="none" stroke="#ff5555" stroke-width="4" />
        <line x1="135" y1="115" x2="165" y2="145" stroke="#ff5555" stroke-width="4" />

        <!-- YeongHee likes Baseball -->
        <rect x="200" y="100" width="100" height="60" fill="#003322" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <circle cx="250" cy="130" r="20" fill="none" stroke="#00ffcc" stroke-width="5" />

        <rect x="300" y="100" width="100" height="60" fill="#0d1115" stroke="#4da6ff" stroke-width="1" />
        <circle cx="350" cy="130" r="15" fill="none" stroke="#ff5555" stroke-width="4" />
        <line x1="335" y1="115" x2="365" y2="145" stroke="#ff5555" stroke-width="4" />

        <!-- MinSoo -->
        <rect x="0" y="160" width="100" height="60" fill="#221111" stroke="#ffaa00" stroke-width="2" />
        <text x="50" y="196" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">민수</text>

        <rect x="100" y="160" width="100" height="60" fill="#0d1115" stroke="#4da6ff" stroke-width="1" />
        <circle cx="150" cy="190" r="15" fill="none" stroke="#ff5555" stroke-width="4" />
        <line x1="135" y1="175" x2="165" y2="205" stroke="#ff5555" stroke-width="4" />

        <rect x="200" y="160" width="100" height="60" fill="#0d1115" stroke="#4da6ff" stroke-width="1" />
        <!-- X from YeongHee's Baseball -->
        <circle cx="250" cy="190" r="15" fill="none" stroke="#ff5555" stroke-width="4" />
        <line x1="235" y1="175" x2="265" y2="205" stroke="#ff5555" stroke-width="4" />

        <rect x="300" y="160" width="100" height="60" fill="#0d1115" stroke="#4da6ff" stroke-width="1" />
        <circle cx="350" cy="190" r="20" fill="none" stroke="#ffff00" stroke-width="5" stroke-dasharray="5 5"
            filter="url(#glow)" />
        <text x="350" y="195" fill="#ffff00" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">추론!</text>

        <!-- SuJin -->
        <rect x="0" y="220" width="100" height="60" fill="#221111" stroke="#ffaa00" stroke-width="2" />
        <text x="50" y="256" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">수진</text>

        <!-- Sujin likes Soccer -->
        <rect x="100" y="220" width="100" height="60" fill="#003322" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <circle cx="150" cy="250" r="20" fill="none" stroke="#00ffcc" stroke-width="5" />

        <rect x="200" y="220" width="100" height="60" fill="#0d1115" stroke="#4da6ff" stroke-width="1" />
        <!-- X from Sujin's Soccer -->
        <circle cx="250" cy="250" r="15" fill="none" stroke="#ff5555" stroke-width="4" />
        <line x1="235" y1="235" x2="265" y2="265" stroke="#ff5555" stroke-width="4" />

        <rect x="300" y="220" width="100" height="60" fill="#0d1115" stroke="#4da6ff" stroke-width="1" />
        <!-- X from Sujin's Soccer -->
        <circle cx="350" cy="250" r="15" fill="none" stroke="#ff5555" stroke-width="4" />
        <line x1="335" y1="235" x2="365" y2="265" stroke="#ff5555" stroke-width="4" />

        <!-- Logic Beams -->
        <!-- Vertical beam from Sujin -->
        <line x1="150" y1="220" x2="150" y2="40" stroke="#00ffcc" stroke-width="3" stroke-dasharray="8 8"
            opacity="0.7" />
        <path d="M 145 50 L 150 40 L 155 50" fill="none" stroke="#00ffcc" stroke-width="3" />

        <!-- Horizontal beam from Sujin -->
        <line x1="200" y1="250" x2="400" y2="250" stroke="#00ffcc" stroke-width="3" stroke-dasharray="8 8"
            opacity="0.7" />

        <!-- Vertical and Horizontal beam from YeongHee -->
        <line x1="250" y1="100" x2="250" y2="40" stroke="#00ffcc" stroke-width="3" stroke-dasharray="8 8"
            opacity="0.7" />
        <line x1="250" y1="160" x2="250" y2="280" stroke="#00ffcc" stroke-width="3" stroke-dasharray="8 8"
            opacity="0.7" />
        <line x1="100" y1="130" x2="400" y2="130" stroke="#00ffcc" stroke-width="3" stroke-dasharray="8 8"
            opacity="0.7" />

        <!-- Annotation Box -->
        <rect x="430" y="100" width="220" height="150" rx="10" fill="#111" stroke="#ffaa00" stroke-width="2" />
        <text x="445" y="130" fill="#ffff00" font-family="sans-serif" font-size="16" font-weight="bold">🧠 추론(Inference)
            폭발</text>
        <text x="445" y="160" fill="#ffffff" font-family="sans-serif" font-size="13">수진(축구O) 발견 즉시,</text>
        <text x="445" y="180" fill="#ff5555" font-family="sans-serif" font-size="13">위쪽 세로줄 모두 'X' 처리됨!</text>
        <text x="445" y="210" fill="#00ffcc" font-family="sans-serif" font-size="13">남은 빈칸 하나가 정답 도출!</text>
    </g>

    <!-- Base Explain -->
    <rect x="100" y="480" width="700" height="60" rx="10" fill="#050a11" stroke="#4da6ff" stroke-width="2" />
    <text x="450" y="505" fill="#ffffff" font-family="sans-serif" font-size="15" text-anchor="middle">
        텍스트 단서 하나가 테이블 맵(Table Grid) 에 떨어지는 순간, <tspan fill="#ff5555" font-weight="bold">배제성의 원리(가로/세로 오답 삭제)</tspan> 를
        통해
    </text>
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="15" text-anchor="middle">
        나머지 오답을 도미노처럼 파괴하며 숨어있는 최종 빈칸 정답을 스스로 수면 위로 멱살 잡아 끌어올립니다.
    </text>
</svg>