<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">경우의 수 설계: 합의 법칙(+) vs 곱의 법칙(×)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"독립된 세계관의 분기점(OR)
        인가, 연속된 세계관의 렌더링(AND) 인가?"</text>

    <!-- Left Side: Rule of Sum -->
    <g transform="translate(60, 150)">
        <rect x="0" y="0" width="370" height="280" rx="15" fill="#1b1111" stroke="#ff5555" stroke-width="3" />
        <text x="185" y="30" fill="#ff5555" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">합의 법칙 (Rule of Sum)</text>
        <text x="185" y="55" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">상황: 디저트 중 딱 1개만
            고르기 (OR)</text>

        <!-- Branching out -->
        <circle cx="185" cy="80" r="8" fill="#ffaaaa" filter="url(#glow)" />

        <!-- Path 1: Cake -->
        <path d="M 175 85 Q 90 120 90 160" fill="none" stroke="#ff5555" stroke-width="3" stroke-dasharray="5 5"
            marker-end="url(#arrow_r)" />
        <rect x="50" y="160" width="80" height="40" rx="5" fill="#331111" stroke="#ff5555" />
        <text x="90" y="185" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">케이크 (3종)</text>

        <!-- Path 2: Ice Cream -->
        <path d="M 195 85 Q 280 120 280 160" fill="none" stroke="#ff5555" stroke-width="3" stroke-dasharray="5 5"
            marker-end="url(#arrow_r)" />
        <rect x="240" y="160" width="80" height="40" rx="5" fill="#331111" stroke="#ff5555" />
        <text x="280" y="185" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">아이스크림 (2종)</text>

        <!-- Math Calculation Box -->
        <rect x="40" y="220" width="290" height="40" rx="5" fill="#000" stroke="#ff5555" />
        <text x="185" y="245" fill="#ffaaaa" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">총 경우의 수 = 3 + 2 = 5 가지</text>
    </g>

    <!-- Right Side: Rule of Product -->
    <g transform="translate(470, 150)">
        <rect x="0" y="0" width="370" height="280" rx="15" fill="#001122" stroke="#4da6ff" stroke-width="3" />
        <text x="185" y="30" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">곱의 법칙 (Rule of Product)</text>
        <text x="185" y="55" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">상황: 상의를 고르고 이어서
            하의 고르기 (AND)</text>

        <!-- Branching out Level 1: Tops -->
        <circle cx="185" cy="80" r="8" fill="#aaccff" filter="url(#glow)" />

        <path d="M 185 85 L 100 120" fill="none" stroke="#4da6ff" stroke-width="2" marker-end="url(#arrow_b)" />
        <path d="M 185 85 L 185 120" fill="none" stroke="#4da6ff" stroke-width="2" marker-end="url(#arrow_b)" />
        <path d="M 185 85 L 270 120" fill="none" stroke="#4da6ff" stroke-width="2" marker-end="url(#arrow_b)" />

        <rect x="70" y="120" width="60" height="25" rx="3" fill="#112233" stroke="#4da6ff" />
        <text x="100" y="138" fill="#ffffff" font-size="12" text-anchor="middle">상의 A</text>
        <rect x="155" y="120" width="60" height="25" rx="3" fill="#112233" stroke="#4da6ff" />
        <text x="185" y="138" fill="#ffffff" font-size="12" text-anchor="middle">상의 B</text>
        <rect x="240" y="120" width="60" height="25" rx="3" fill="#112233" stroke="#4da6ff" />
        <text x="270" y="138" fill="#ffffff" font-size="12" text-anchor="middle">상의 C</text>

        <text x="340" y="135" fill="#4da6ff" font-weight="bold">(3종)</text>

        <!-- Branching out Level 2: Bottoms (Nested Loop) -->
        <!-- Top A branches -->
        <path d="M 100 145 L 80 180" fill="none" stroke="#00ffcc" stroke-width="1" marker-end="url(#arrow_g)" />
        <path d="M 100 145 L 120 180" fill="none" stroke="#00ffcc" stroke-width="1" marker-end="url(#arrow_g)" />
        <circle cx="80" cy="180" r="4" fill="#00ffcc" />
        <circle cx="120" cy="180" r="4" fill="#00ffcc" />

        <!-- Top B branches -->
        <path d="M 185 145 L 165 180" fill="none" stroke="#00ffcc" stroke-width="1" marker-end="url(#arrow_g)" />
        <path d="M 185 145 L 205 180" fill="none" stroke="#00ffcc" stroke-width="1" marker-end="url(#arrow_g)" />
        <circle cx="165" cy="180" r="4" fill="#00ffcc" />
        <circle cx="205" cy="180" r="4" fill="#00ffcc" />

        <!-- Top C branches -->
        <path d="M 270 145 L 250 180" fill="none" stroke="#00ffcc" stroke-width="1" marker-end="url(#arrow_g)" />
        <path d="M 270 145 L 290 180" fill="none" stroke="#00ffcc" stroke-width="1" marker-end="url(#arrow_g)" />
        <circle cx="250" cy="180" r="4" fill="#00ffcc" />
        <circle cx="290" cy="180" r="4" fill="#00ffcc" />

        <text x="340" y="185" fill="#00ffcc" font-weight="bold">(2종)</text>

        <!-- Math Calculation Box -->
        <rect x="40" y="220" width="290" height="40" rx="5" fill="#000" stroke="#4da6ff" />
        <text x="185" y="245" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">총 경우의 수 = 3 × 2 = 6 가지</text>
    </g>

    <defs>
        <marker id="arrow_r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#ff5555" />
        </marker>
        <marker id="arrow_b" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#4da6ff" />
        </marker>
        <marker id="arrow_g" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#00ffcc" />
        </marker>
    </defs>

    <!-- Big Alert Bottom -->
    <rect x="100" y="470" width="700" height="80" rx="10" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="500" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        선택 후 상황이 끝난다면 서로의 우주가 겹치지 않으므로 <tspan fill="#ff5555" font-weight="bold">통째로 덧셈(+)</tspan> 하고,
    </text>
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        선택 후 또 다른 선택이 강요되는 중첩 구조라면 <tspan fill="#4da6ff" font-weight="bold">트리 분기만큼 곱셈(×)</tspan> 합니다.
    </text>
</svg>