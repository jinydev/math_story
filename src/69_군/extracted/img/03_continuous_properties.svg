<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">연속 융합 시스템 (Closure Property)</text>

    <!-- Input Sources -->
    <g transform="translate(100, 100)">
        <rect x="0" y="0" width="200" height="150" rx="15" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="100" y="30" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">Input A</text>
        <path d="M 20 100 Q 100 50 180 100" fill="none" stroke="#00ffcc" stroke-width="6" filter="url(#glow)" />
        <text x="100" y="130" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">연속 함수 f(x)</text>
    </g>

    <g transform="translate(100, 300)">
        <rect x="0" y="0" width="200" height="150" rx="15" fill="#331122" stroke="#ff0055" stroke-width="2" />
        <text x="100" y="30" fill="#ff0055" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">Input B</text>
        <path d="M 20 50 Q 100 150 180 50" fill="none" stroke="#ff0055" stroke-width="6" filter="url(#glow)" />
        <text x="100" y="130" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">연속 함수 g(x)</text>
    </g>

    <!-- Fusion Engine -->
    <path d="M 310 175 L 350 250" stroke="#00ffcc" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)" />
    <path d="M 310 375 L 350 300" stroke="#ff0055" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)" />

    <g transform="translate(380, 200)">
        <rect x="0" y="0" width="140" height="150" rx="70" fill="#221133" stroke="#ffaa00" stroke-width="3"
            filter="url(#glow)" />
        <text x="70" y="55" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">Fusion</text>
        <text x="70" y="85" fill="#ffffff" font-family="monospace" font-size="18" text-anchor="middle">＋</text>
        <text x="70" y="105" fill="#ffffff" font-family="monospace" font-size="18" text-anchor="middle">－</text>
        <text x="70" y="125" fill="#ffffff" font-family="monospace" font-size="18" text-anchor="middle">×</text>
    </g>

    <!-- Output Result -->
    <path d="M 530 275 L 580 275" stroke="#ffaa00" stroke-width="5" marker-end="url(#arrow)" filter="url(#glow)" />

    <g transform="translate(620, 150)">
        <rect x="0" y="0" width="220" height="250" rx="15" fill="#0d1a26" stroke="#ffaa00" stroke-width="3"
            filter="url(#glow)" />
        <text x="110" y="40" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">Output (결과물)</text>
        <path d="M 20 150 C 60 50, 160 200, 200 100" fill="none" stroke="#ffaa00" stroke-width="6"
            filter="url(#glow)" />

        <!-- Fused color lines behind it to signify combination -->
        <path d="M 20 150 C 60 50, 160 200, 200 100" fill="none" stroke="#00ffcc" stroke-width="2" opacity="0.8" />
        <path d="M 20 150 C 60 50, 160 200, 200 100" fill="none" stroke="#ff0055" stroke-width="2"
            transform="translate(0, 5)" opacity="0.8" />

        <text x="110" y="210" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">여전히 100% 무적 연속!</text>
    </g>

    <!-- Warning for Division -->
    <rect x="150" y="490" width="600" height="70" rx="10" fill="#331111" stroke="#ff0055" stroke-width="2" />
    <text x="450" y="520" fill="#ff0055" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">🚨 예외 발생 에러: 나눗셈 f(x) / g(x)</text>
    <text x="450" y="545" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">단, 분모가 0이 되는 지점 [
        g(x) = 0 ] 이 폭파 지뢰 구간으로 작동하므로 강제 불연속 터짐!</text>

</svg>