<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">벤 다이어그램 데이터 정제: 포함배제의 원리</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"+통째로 더하고, -교차점을
        빼고, +블랙홀 코어를 다시 메운다. (Inclusion-Exclusion)"</text>

    <!-- High-Tech Venn Diagram Base -->
    <g transform="translate(250, 280)">

        <!-- Circle A -->
        <circle cx="-60" cy="-40" r="100" fill="#ff00ff" fill-opacity="0.2" stroke="#ff00ff" stroke-width="3"
            filter="url(#glow)" />
        <text x="-120" y="-100" fill="#ff00ff" font-family="sans-serif" font-size="28" font-weight="bold">A</text>

        <!-- Circle B -->
        <circle cx="60" cy="-40" r="100" fill="#00ffcc" fill-opacity="0.2" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="120" y="-100" fill="#00ffcc" font-family="sans-serif" font-size="28" font-weight="bold">B</text>

        <!-- Circle C -->
        <circle cx="0" cy="50" r="100" fill="#ffff00" fill-opacity="0.2" stroke="#ffff00" stroke-width="3"
            filter="url(#glow)" />
        <text x="0" y="140" fill="#ffff00" font-family="sans-serif" font-size="28" font-weight="bold">C</text>

        <!-- Intersections labeling (Spies/Duplicates) -->
        <!-- A intersect B (Top middle) -->
        <text x="0" y="-60" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">A∩B</text>
        <text x="0" y="-40" fill="#ff5555" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">- 1</text>

        <!-- A intersect C (Bottom left) -->
        <text x="-60" y="30" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">C∩A</text>
        <text x="-60" y="50" fill="#ff5555" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">- 1</text>

        <!-- B intersect C (Bottom right) -->
        <text x="60" y="30" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">B∩C</text>
        <text x="60" y="50" fill="#ff5555" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">- 1</text>

        <!-- The Core (A intersect B intersect C) -->
        <polygon points="0,-15 -20,15 20,15" fill="#ffffff" opacity="0.3" filter="url(#glow)" />
        <text x="0" y="5" fill="#000000" font-family="monospace" font-size="12" font-weight="bold"
            text-anchor="middle">코어</text>
        <text x="0" y="20" fill="#4da6ff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle"
            filter="url(#glow)">+ 1</text>
    </g>

    <!-- Right Side Algorithm Formula Panel -->
    <g transform="translate(500, 150)">
        <rect x="0" y="0" width="350" height="280" rx="15" fill="#0d1b1a" stroke="#4da6ff" stroke-width="3" />
        <text x="175" y="30" fill="#4da6ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">중복 오차 복구 연산 프로세스</text>

        <!-- Step 1: Inclusion -->
        <rect x="20" y="60" width="310" height="40" rx="5" fill="#113322" stroke="#00ffcc" />
        <text x="30" y="85" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold">+</text>
        <text x="60" y="85" fill="#ffffff" font-family="monospace" font-size="14">|A| + |B| + |C|</text>
        <text x="190" y="85" fill="#aaaaaa" font-family="sans-serif" font-size="12">(단순 합산 : 공통영역 터짐)</text>

        <!-- Step 2: Exclusion -->
        <rect x="20" y="120" width="310" height="60" rx="5" fill="#331111" stroke="#ff5555" />
        <text x="30" y="155" fill="#ff5555" font-family="monospace" font-size="20" font-weight="bold">-</text>
        <text x="50" y="145" fill="#ffffff" font-family="monospace" font-size="14">|A∩B| - |B∩C| - |C∩A|</text>
        <text x="60" y="165" fill="#aaaaaa" font-family="sans-serif" font-size="12">(2개 교집합을 한 번 죽임)</text>

        <!-- Step 3: Re-inclusion (The Core) -->
        <rect x="20" y="200" width="310" height="60" rx="5" fill="#111133" stroke="#4da6ff" />
        <text x="30" y="235" fill="#4da6ff" font-family="monospace" font-size="20" font-weight="bold">+</text>
        <text x="50" y="225" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold">|A ∩ B ∩ C|</text>
        <text x="60" y="245" fill="#ffaa00" font-family="sans-serif" font-size="12">(3번 빠져 텅 빈 코어를 부활시킴)</text>
    </g>

    <!-- Base Context/Code equivalence -->
    <rect x="100" y="470" width="700" height="80" rx="10" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="500" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        파이썬 강제 변환, 빅데이터 분석의 기본!
    </text>
    <text x="450" y="530" fill="#ffff00" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">
        Python 1줄 요약: union_set = A | B | C
    </text>
</svg>