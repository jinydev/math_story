<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">아르키메데스의 마법: 지레의 법칙 (Law of Lever)</text>

    <!-- Fulcrum (Pivot) -->
    <g transform="translate(600, 350)">
        <polygon points="0,-20 30,40 -30,40" fill="#ffaa00" stroke="#ffffff" stroke-width="2" />
        <text x="0" y="70" fill="#aaaaaa" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">받침점 (Fulcrum)</text>
    </g>

    <!-- Lever Board -->
    <line x1="100" y1="330" x2="800" y2="330" stroke="#4da6ff" stroke-width="15" stroke-linecap="round"
        filter="url(#glow)" />

    <!-- Left Side: Boy (Light weight, Long distance) -->
    <g transform="translate(150, 315)">
        <!-- Box/Weight -->
        <rect x="-30" y="-60" width="60" height="60" fill="#113322" stroke="#00ffcc" stroke-width="3" />
        <text x="0" y="-25" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">꼬마</text>
        <text x="0" y="-5" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">10 kg</text>

        <!-- Down Force Arrow -->
        <path d="M 0 50 L 0 100 L -10 90 M 0 100 L 10 90" fill="none" stroke="#00ffcc" stroke-width="4" />
    </g>

    <!-- Right Side: Sumo Wrestler (Heavy weight, Short distance) -->
    <g transform="translate(750, 315)">
        <!-- Box/Weight -->
        <rect x="-60" y="-120" width="120" height="120" fill="#331111" stroke="#ff4d4d" stroke-width="3" />
        <text x="0" y="-60" fill="#ff4d4d" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">스모 선수</text>
        <text x="0" y="-30" fill="#ffffff" font-family="monospace" font-size="22" font-weight="bold"
            text-anchor="middle">100 kg</text>

        <!-- Down Force Arrow -->
        <path d="M 0 50 L 0 150 L -15 135 M 0 150 L 15 135" fill="none" stroke="#ff4d4d" stroke-width="8" />
    </g>

    <!-- Distance Measurement -->
    <g transform="translate(0, 470)">
        <!-- Long Distance -->
        <line x1="150" y1="0" x2="600" y2="0" stroke="#00ffcc" stroke-width="3" stroke-dasharray="10 5" />
        <line x1="150" y1="-15" x2="150" y2="15" stroke="#00ffcc" stroke-width="3" />
        <text x="375" y="-10" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">거리 10m</text>

        <!-- Short Distance -->
        <line x1="600" y1="0" x2="750" y2="0" stroke="#ff4d4d" stroke-width="3" stroke-dasharray="10 5" />
        <line x1="600" y1="-15" x2="600" y2="15" stroke="#ffffff" stroke-width="3" />
        <line x1="750" y1="-15" x2="750" y2="15" stroke="#ff4d4d" stroke-width="3" />
        <text x="675" y="-10" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">거리 1m</text>
    </g>

    <!-- Formula Center -->
    <rect x="250" y="100" width="400" height="100" rx="15" fill="#111122" stroke="#ffaa00" stroke-width="3" />
    <text x="450" y="140" fill="#ffaa00" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">모멘트 (Torque) 평형</text>
    <text x="450" y="175" fill="#ffffff" font-family="monospace" font-size="22" text-anchor="middle">10 kg × 10m == 100
        kg × 1m</text>

    <!-- Explanation Bottom -->
    <rect x="150" y="530" width="600" height="50" rx="10" fill="#221133" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="560" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">부족한 힘(무게)을 거대한 '거리(공간)'로 등가 교환해 내는 물리학적 기적!</text>

</svg>