<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">물리 엔진 연쇄 스택: 위치 → 속도 → 가속도</text>

    <!-- Flowchart structure -->
    <g transform="translate(100, 100)">

        <!-- Step 1: Position x(t) -->
        <rect x="0" y="0" width="200" height="150" rx="15" fill="#0d141e" stroke="#4da6ff" stroke-width="3" />
        <text x="100" y="40" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">STEP 1. 위치 함수</text>
        <text x="100" y="80" fill="#ffffff" font-family="monospace" font-size="36" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">x(t)</text>
        <text x="100" y="120" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">오리지널 거리
            맵</text>
        <text x="100" y="140" fill="#4da6ff" font-family="monospace" font-size="14" text-anchor="middle">예: -5t² + 20t +
            50</text>

        <!-- First Derivative Arrow -->
        <path d="M 200 75 L 260 75" stroke="#ffaa00" stroke-width="6" marker-end="url(#arrow_y)" />
        <rect x="210" y="35" width="40" height="20" rx="5" fill="#555500" />
        <text x="230" y="50" fill="#ffff00" font-family="monospace" font-size="12" font-weight="bold"
            text-anchor="middle">diff()</text>

        <!-- Step 2: Velocity v(t) -->
        <rect x="270" y="0" width="200" height="150" rx="15" fill="#1b1111" stroke="#ff0055" stroke-width="3" />
        <text x="370" y="40" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">STEP 2. 속도 함수</text>
        <text x="370" y="80" fill="#ffffff" font-family="monospace" font-size="36" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">v(t) = x'(t)</text>
        <text x="370" y="120" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">1차 스피드
            계기판</text>
        <text x="370" y="140" fill="#ff0055" font-family="monospace" font-size="14" text-anchor="middle">예: -10t +
            20</text>

        <!-- Second Derivative Arrow -->
        <path d="M 470 75 L 530 75" stroke="#ffaa00" stroke-width="6" marker-end="url(#arrow_y)" />
        <rect x="480" y="35" width="40" height="20" rx="5" fill="#555500" />
        <text x="500" y="50" fill="#ffff00" font-family="monospace" font-size="12" font-weight="bold"
            text-anchor="middle">diff()</text>

        <!-- Step 3: Acceleration a(t) -->
        <rect x="540" y="0" width="200" height="150" rx="15" fill="#001824" stroke="#00ffcc" stroke-width="3" />
        <text x="640" y="40" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">STEP 3. 가속도 함수</text>
        <text x="640" y="80" fill="#ffffff" font-family="monospace" font-size="36" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">a(t) = v'(t)</text>
        <text x="640" y="120" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">이계도 중력/압력
            G</text>
        <text x="640" y="140" fill="#00ffcc" font-family="monospace" font-size="14" text-anchor="middle">예: -10 (상수
            타격)</text>
    </g>

    <!-- Illustration of the 'Braking Paradox' -->
    <g transform="translate(100, 300)">
        <rect x="0" y="0" width="700" height="180" rx="15" fill="#110d1a" stroke="#ffaa00" stroke-width="3" />
        <text x="350" y="35" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">역주행 폭주 (Reverse Boost) 매커니즘 경고!</text>

        <!-- Car Graphic -->
        <rect x="300" y="80" width="100" height="40" rx="10" fill="#4da6ff" />
        <circle cx="320" cy="120" r="12" fill="#aaaaaa" />
        <circle cx="380" cy="120" r="12" fill="#aaaaaa" />

        <!-- Speed (v < 0) Backwards -->
        <path d="M 290 100 L 150 100" stroke="#ff0055" stroke-width="8" marker-end="url(#arrow_r)"
            filter="url(#glow)" />
        <text x="210" y="90" fill="#ff0055" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">속도 v(t) &lt; 0</text>
        <text x="210" y="125" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">(후진 기어
            밟음)</text>

        <!-- Acceleration (a < 0) Backwards -->
        <path d="M 410 100 L 550 100" stroke="#00ffcc" stroke-width="8" marker-end="url(#arrow_c)"
            filter="url(#glow)" />
        <text x="490" y="90" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">가속도 a(t) > 0</text>
        <text x="490" y="125" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">(전진으로 밀어줌 =
            브레이크 역할!)</text>

        <text x="350" y="160" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">차는 후진(-) 중인데, 가속 센서가 (+) 방향으로 밀면 차는 "느려진다(감속)"</text>
    </g>

    <!-- Definitions -->
    <defs>
        <marker id="arrow_y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffaa00" />
        </marker>
        <marker id="arrow_r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ff0055" />
        </marker>
        <marker id="arrow_c" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#00ffcc" />
        </marker>
    </defs>

    <!-- Footer -->
    <rect x="150" y="520" width="600" height="50" rx="10" fill="#0f0f15" stroke="#ffffff" stroke-width="2" />
    <text x="450" y="550" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        게임 물리 엔진은 <tspan fill="#00ffcc" font-weight="bold">위치(거리) 공식 단 1개</tspan>만 있으면 미분을 통해 모든 걸 자동 연산합니다.
    </text>
</svg>