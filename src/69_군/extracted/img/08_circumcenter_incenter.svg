<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .box {
                fill: #161b22;
                stroke: #30363d;
                stroke-width: 2;
                rx: 10;
            }

            .tri {
                fill: rgba(0, 255, 255, 0.1);
                stroke: #00ffff;
                stroke-width: 3;
            }

            .outer-circle {
                fill: rgba(100, 255, 100, 0.1);
                stroke: #64ff64;
                stroke-width: 3;
                stroke-dasharray: 8, 4;
            }

            .inner-circle {
                fill: rgba(255, 100, 100, 0.1);
                stroke: #ff6464;
                stroke-width: 3;
                stroke-dasharray: 8, 4;
            }

            .bisector {
                stroke: #ffff00;
                stroke-width: 2;
                stroke-dasharray: 4, 4;
            }

            .radius {
                stroke: #ffffff;
                stroke-width: 2;
            }

            .center-dot {
                fill: #ffffff;
            }

            .title {
                fill: #ffffff;
                font-size: 20px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 14px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" fill="#0d1117" />

    <!-- Left Side: Circumcenter -->
    <g transform="translate(50, 50)">
        <rect width="320" height="300" class="box" />
        <text x="160" y="30" class="title">외심 (Circumcenter)</text>

        <g transform="translate(160, 150)">
            <!-- Circumcircle -->
            <circle cx="0" cy="0" r="90" class="outer-circle" />

            <!-- Triangle Vertices at (0, -90), (-78, 45), (78, 45) -> Equilateral inside circle for simplicity -->
            <polygon points="0,-90 -78,45 78,45" class="tri" />

            <!-- Perpendicular Bisectors to edges -->
            <line x1="0" y1="0" x2="0" y2="45" class="bisector" />
            <line x1="0" y1="0" x2="-39" y2="-22.5" class="bisector" />
            <line x1="0" y1="0" x2="39" y2="-22.5" class="bisector" />

            <!-- Radius paths to vertices -->
            <line x1="0" y1="0" x2="0" y2="-90" class="radius" />
            <line x1="0" y1="0" x2="-78" y2="45" class="radius" />
            <line x1="0" y1="0" x2="78" y2="45" class="radius" />
            <text x="5" y="-45" fill="#ffffff" font-size="16">R</text>
            <text x="-45" y="10" fill="#ffffff" font-size="16">R</text>
            <text x="35" y="10" fill="#ffffff" font-size="16">R</text>

            <circle cx="0" cy="0" r="5" class="center-dot" />
            <text x="-15" y="15" fill="#64ff64" font-size="20">O</text>
        </g>

        <text x="160" y="270" class="desc">외접원: 세 꼭짓점까지의 거리가 같다</text>
    </g>

    <!-- Right Side: Incenter -->
    <g transform="translate(430, 50)">
        <rect width="320" height="300" class="box" />
        <text x="160" y="30" class="title">내심 (Incenter)</text>

        <g transform="translate(160, 165)">
            <!-- Triangle circumscribing the incircle. Incircle at 0,0, r=45 -->
            <!-- Let's roughly map an equilateral triangle around it -->
            <polygon points="0,-90 -78,45 78,45" class="tri" />

            <!-- Incircle -->
            <circle cx="0" cy="0" r="45" class="inner-circle" />

            <!-- Angle bisectors from vertices to center -->
            <line x1="0" y1="-90" x2="0" y2="0" class="bisector" />
            <line x1="-78" y1="45" x2="0" y2="0" class="bisector" />
            <line x1="78" y1="45" x2="0" y2="0" class="bisector" />

            <!-- Radius paths to edges -->
            <line x1="0" y1="0" x2="0" y2="45" class="radius" />
            <line x1="0" y1="0" x2="-39" y2="-22.5" class="radius" />
            <line x1="0" y1="0" x2="39" y2="-22.5" class="radius" />
            <text x="10" y="30" fill="#ffffff" font-size="16">r</text>
            <text x="-30" y="-10" fill="#ffffff" font-size="16">r</text>
            <text x="15" y="-10" fill="#ffffff" font-size="16">r</text>

            <!-- Right angles at edges -->
            <polyline points="0,40 5,40 5,45" fill="none" stroke="#ffffff" stroke-width="1" />

            <circle cx="0" cy="0" r="5" class="center-dot" />
            <text x="-15" y="15" fill="#ff6464" font-size="20">I</text>
        </g>

        <text x="160" y="270" class="desc">내접원: 세 변까지의 거리가 같다</text>
    </g>

</svg>