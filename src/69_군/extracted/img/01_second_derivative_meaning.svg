<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">이계도함수: 원심력이 쏠리는 더블 미분 가속도 센서 엔진!</text>

    <!-- Split Screen for f''(x) > 0 vs f''(x) < 0 -->

    <!-- Left Side: Positive Acceleration -->
    <g transform="translate(50, 100)">
        <rect x="0" y="0" width="380" height="400" rx="15" fill="#1b0008" stroke="#ff0055" stroke-width="4" />
        <text x="190" y="40" fill="#ff0055" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">f''(x) > 0 (PLUS)</text>
        <text x="190" y="70" fill="#aaaaaa" font-family="sans-serif" font-size="18" text-anchor="middle">엔진 가속! [몸이 뒤로
            눕혀짐]</text>

        <!-- Visualizer details -->
        <path d="M 50 300 C 150 300, 250 150, 330 50" fill="none" stroke="#4da6ff" stroke-width="6" opacity="0.3" />

        <!-- Speed vectors growing -->
        <line x1="80" y1="280" x2="130" y2="230" stroke="#ffaa00" stroke-width="4" marker-end="url(#arrow_y)" />
        <text x="135" y="225" fill="#ffaa00" font-family="monospace" font-size="14">v = 10</text>

        <line x1="160" y1="200" x2="220" y2="140" stroke="#ff6600" stroke-width="6" marker-end="url(#arrow_o)" />
        <text x="225" y="135" fill="#ff6600" font-family="monospace" font-size="16">v = 40 (가속!)</text>

        <line x1="250" y1="110" x2="330" y2="30" stroke="#ff0055" stroke-width="8" filter="url(#glow)"
            marker-end="url(#arrow_r)" />
        <text x="335" y="25" fill="#ff0055" font-family="monospace" font-size="18" font-weight="bold">v = 90
            (부스트!)</text>

        <!-- Acceleration Force Vector (Pushing from behind) -->
        <line x1="30" y1="350" x2="160" y2="350" stroke="#ff0055" stroke-width="6" stroke-dasharray="10 5"
            marker-end="url(#arrow_r)" />
        <text x="95" y="380" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">가속도 a(t) + Push</text>
    </g>

    <!-- Right Side: Negative Acceleration -->
    <g transform="translate(470, 100)">
        <rect x="0" y="0" width="380" height="400" rx="15" fill="#001824" stroke="#00ffcc" stroke-width="4" />
        <text x="190" y="40" fill="#00ffcc" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">f''(x) &lt; 0 (MINUS)</text>
        <text x="190" y="70" fill="#aaaaaa" font-family="sans-serif" font-size="18" text-anchor="middle">급 브레이크! [몸이
            꼬라박힘]</text>

        <!-- Visualizer details -->
        <path d="M 50 300 C 100 200, 200 100, 330 50" fill="none" stroke="#4da6ff" stroke-width="6" opacity="0.3" />

        <!-- Speed vectors shrinking -->
        <line x1="80" y1="240" x2="160" y2="160" stroke="#ff0055" stroke-width="8" filter="url(#glow)"
            marker-end="url(#arrow_r)" />
        <text x="165" y="155" fill="#ff0055" font-family="monospace" font-size="18" font-weight="bold">v = 100</text>

        <line x1="200" y1="120" x2="260" y2="60" stroke="#ffaa00" stroke-width="6" marker-end="url(#arrow_y)" />
        <text x="265" y="55" fill="#ffaa00" font-family="monospace" font-size="16">v = 40 (감속!)</text>

        <line x1="300" y1="40" x2="350" y2="-10" stroke="#00ffcc" stroke-width="4" marker-end="url(#arrow_c)" />
        <text x="355" y="-15" fill="#00ffcc" font-family="monospace" font-size="14">v = 10 (브레이크!)</text>

        <!-- Acceleration Force Vector (Pushing against movement) -->
        <line x1="350" y1="350" x2="220" y2="350" stroke="#00ffcc" stroke-width="6" stroke-dasharray="10 5"
            marker-end="url(#arrow_c)" />
        <text x="285" y="380" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">가속도 a(t) - Pull</text>
    </g>

    <!-- Arrows -->
    <defs>
        <marker id="arrow_y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffaa00" />
        </marker>
        <marker id="arrow_o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ff6600" />
        </marker>
        <marker id="arrow_r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ff0055" />
        </marker>
        <marker id="arrow_c" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#00ffcc" />
        </marker>
    </defs>

    <!-- Mathematical explanation box -->
    <rect x="150" y="530" width="600" height="50" rx="10" fill="#0f0f15" stroke="#ffffff" stroke-width="2" />
    <text x="450" y="560" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        도함수 f'(x)를 미분한 두 번째 칼날 <tspan fill="#ffaa00" font-weight="bold">f''(x)</tspan> 는 현재 터진 스피드의 마력 오르내림을 스캔합니다.
    </text>
</svg>