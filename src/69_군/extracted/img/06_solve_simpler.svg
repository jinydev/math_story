<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">분할 정복(Divide &amp; Conquer): 메가 보스를 꼬마 파편으로 쪼개기</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"해결 불가능한 덩어리를 만났을
        때, 내가 가장 잘 아는 기초 조각(Unit) 시스템 3개로 칼질해버린다!"</text>

    <!-- Giant Boss Polygon -->
    <g transform="translate(150, 200)">
        <text x="130" y="-30" fill="#ff5555" font-family="sans-serif" font-size="20" font-weight="bold"
            filter="url(#glow)">Lv.99 기괴한 오각형 보스</text>

        <polygon points="0,50 100,-70 200,-20 250,120 50,150" fill="#331111" stroke="#ff5555" stroke-width="4"
            filter="url(#glow)" />
        <text x="130" y="50" fill="#ff5555" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">?</text>
        <text x="130" y="80" fill="#ff5555" font-family="sans-serif" font-size="14" text-anchor="middle">"내 넓이 공식 알아?
            모르지? 넌 졌다."</text>
    </g>

    <!-- Slicing Action -->
    <path d="M 400 150 L 500 250" fill="none" stroke="#fff" stroke-width="8" stroke-dasharray="15 10" />
    <path d="M 490 230 L 515 265 L 470 250" fill="#fff" />
    <text x="450" y="190" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">거대 해체 도끼 발동!</text>

    <!-- Decomposed Units -->
    <g transform="translate(550, 150)">
        <text x="125" y="-30" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            filter="url(#glow)">Lv.1 만만한 조각 3형제</text>

        <!-- Unit 1: Triangle -->
        <polygon points="0,30 100,-30 100,60" fill="#003322" stroke="#00ffcc" stroke-width="3" />
        <text x="50" y="30" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">삼각 모듈</text>

        <text x="120" y="50" fill="#ffffff" font-family="monospace" font-size="30" font-weight="bold">+</text>

        <!-- Unit 2: Trapezoid -->
        <polygon points="140,-30 220,-20 220,90 140,60" fill="#003322" stroke="#00ffcc" stroke-width="3" />
        <text x="180" y="40" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">사다리꼴 모듈</text>

        <text x="240" y="60" fill="#ffffff" font-family="monospace" font-size="30" font-weight="bold">+</text>

        <!-- Unit 3: Triangle (bottom) -->
        <polygon points="20,100 120,70 180,110" fill="#003322" stroke="#00ffcc" stroke-width="3" />
        <text x="90" y="105" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">꼬마 삼각</text>

        <!-- System Code overlay -->
        <rect x="-20" y="150" width="300" height="90" rx="10" fill="#0d1115" stroke="#4da6ff" stroke-width="2" />
        <text x="130" y="180" fill="#79c0ff" font-family="monospace" font-size="14" text-anchor="middle">total_area =
            triangle1() \</text>
        <text x="115" y="200" fill="#79c0ff" font-family="monospace" font-size="14" text-anchor="middle"> + trapezoid()
            \</text>
        <text x="115" y="220" fill="#79c0ff" font-family="monospace" font-size="14" text-anchor="middle"> +
            triangle2()</text>
    </g>

    <!-- Number Example Scale Down -->
    <g transform="translate(250, 420)">
        <rect x="-100" y="0" width="700" height="70" rx="10" fill="#221100" stroke="#ffaa00" stroke-width="2" />
        <text x="250" y="25" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">숫자 다운사이징 (Down-Sizing)</text>
        <text x="250" y="50" fill="#ffffff" font-family="monospace" font-size="22" font-weight="bold"
            text-anchor="middle">
            <tspan fill="#ff5555">3의 100승(3^100)</tspan> 끝자리 구하기? 👉 <tspan fill="#00ffcc">3의 1승, 2승, 3승, 4승</tspan> 만
            먼저 쪼개서 보기!
        </text>
    </g>

    <!-- Base Explain -->
    <rect x="100" y="520" width="700" height="60" rx="10" fill="#111" stroke="#4da6ff" stroke-width="2" />
    <text x="450" y="545" fill="#ffffff" font-family="sans-serif" font-size="15" text-anchor="middle">
        구글 엔지니어도 1억 줄 코드를 한 번에 짜지 못합니다. 내가 알고 있는 가장 기초적인 <tspan fill="#4da6ff" font-weight="bold">함수 단위(Unit)</tspan> 들을
    </text>
    <text x="450" y="570" fill="#ffffff" font-family="sans-serif" font-size="15" text-anchor="middle">
        만드는 것으로 쪼개고, 그렇게 쪼개진 꼬마 모듈들을 최종적으로 합체(+) 시키는 마법이 바로 '단순화' 의 힘입니다.
    </text>
</svg>