<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .box {
                fill: #161b22;
                stroke: #30363d;
                stroke-width: 2;
                rx: 10;
            }

            .tri {
                fill: rgba(0, 255, 255, 0.1);
                stroke: #00ffff;
                stroke-width: 3;
            }

            .lock-side {
                stroke: #ff6464;
                stroke-width: 6;
                filter: drop-shadow(0 0 5px #ff6464);
            }

            .lock-angle {
                fill: rgba(100, 255, 100, 0.5);
                stroke: #64ff64;
                stroke-width: 3;
            }

            .title {
                fill: #ffffff;
                font-size: 20px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 14px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" fill="#0d1117" />

    <text x="450" y="40" fill="#00ffff" font-size="28" text-anchor="middle">유클리드의 3대 합동 조건 카탈로그</text>

    <!-- SSS -->
    <g transform="translate(50, 80)">
        <rect width="240" height="220" class="box" />
        <text x="120" y="30" class="title">SSS 합동 (Side-Side-Side)</text>

        <polygon points="120,60 50,160 190,160" class="tri" />
        <!-- Three sides locked -->
        <line x1="120" y1="60" x2="50" y2="160" class="lock-side" />
        <line x1="50" y1="160" x2="190" y2="160" class="lock-side" />
        <line x1="190" y1="160" x2="120" y2="60" class="lock-side" />

        <!-- Marks -->
        <line x1="75" y1="110" x2="95" y2="110" stroke="#fff" stroke-width="2" />
        <line x1="155" y1="105" x2="175" y2="115" stroke="#fff" stroke-width="2" />
        <line x1="160" y1="110" x2="180" y2="120" stroke="#fff" stroke-width="2" />
        <line x1="120" y1="155" x2="120" y2="165" stroke="#fff" stroke-width="2" />
        <line x1="115" y1="155" x2="115" y2="165" stroke="#fff" stroke-width="2" />
        <line x1="125" y1="155" x2="125" y2="165" stroke="#fff" stroke-width="2" />

        <text x="120" y="200" class="desc">3개의 뼈대가 일치하면 고정</text>
    </g>

    <!-- SAS -->
    <g transform="translate(330, 80)">
        <rect width="240" height="220" class="box" />
        <text x="120" y="30" class="title">SAS 합동 (Side-Angle-Side)</text>

        <polygon points="120,60 50,160 190,160" class="tri" />
        <!-- Two sides and included angle locked -->
        <line x1="120" y1="60" x2="50" y2="160" class="lock-side" />
        <line x1="50" y1="160" x2="190" y2="160" class="lock-side" />

        <path d="M 80 160 A 30 30 0 0 1 72 128" class="lock-angle" />

        <text x="120" y="200" class="desc">두 뼈대와 '끼인각'이 일치</text>
    </g>

    <!-- ASA -->
    <g transform="translate(610, 80)">
        <rect width="240" height="220" class="box" />
        <text x="120" y="30" class="title">ASA 합동 (Angle-Side-Angle)</text>

        <polygon points="120,60 50,160 190,160" class="tri" />
        <!-- One side and two adjacent angles locked -->
        <line x1="50" y1="160" x2="190" y2="160" class="lock-side" />

        <path d="M 80 160 A 30 30 0 0 1 72 128" class="lock-angle" />
        <path d="M 160 160 A 30 30 0 0 0 168 128" class="lock-angle" />

        <!-- Laser beams representing angles intersecting -->
        <line x1="50" y1="160" x2="120" y2="60" stroke="#64ff64" stroke-width="2" stroke-dasharray="8,4" />
        <line x1="190" y1="160" x2="120" y2="60" stroke="#64ff64" stroke-width="2" stroke-dasharray="8,4" />

        <text x="120" y="200" class="desc">바닥 뼈대와 '양 끝 레이저각' 일치</text>
    </g>

</svg>