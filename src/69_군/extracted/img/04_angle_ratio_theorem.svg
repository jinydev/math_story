<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">원주각의 드래그 앤 드롭 복제(Clone) 마법 스크립트</text>

    <!-- Circle Area -->
    <g transform="translate(450, 270)">
        <circle cx="0" cy="0" r="180" fill="none" stroke="#223344" stroke-width="3" stroke-dasharray="10 10" />

        <!-- Common Arc AB -->
        <path d="M -155 90 A 180 180 0 0 0 155 90" fill="none" stroke="#ff00ff" stroke-width="12" filter="url(#glow)" />
        <text x="0" y="140" fill="#ff00ff" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">고정된 호 (Arc A-B)</text>

        <circle cx="-155" cy="90" r="8" fill="#ffffff" />
        <text x="-180" y="100" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold">A</text>
        <circle cx="155" cy="90" r="8" fill="#ffffff" />
        <text x="175" y="100" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold">B</text>

        <!-- Point P1 (Left) -->
        <circle cx="-120" cy="-134" r="8" fill="#ffff00" filter="url(#glow)" />
        <text x="-150" y="-140" fill="#ffff00" font-family="sans-serif" font-size="18" font-weight="bold">P1</text>
        <line x1="-120" y1="-134" x2="-155" y2="90" stroke="#ffff00" stroke-width="3" opacity="0.6" />
        <line x1="-120" y1="-134" x2="155" y2="90" stroke="#ffff00" stroke-width="3" opacity="0.6" />

        <path d="M -105 -95 A 50 50 0 0 0 -130 -105" fill="none" stroke="#ffff00" stroke-width="3" />
        <text x="-120" y="-80" fill="#ffff00" font-family="monospace" font-size="20" font-weight="bold"
            filter="url(#glow)">45°</text>

        <!-- Point P2 (Center) -->
        <circle cx="0" cy="-180" r="8" fill="#00ffcc" filter="url(#glow)" />
        <text x="0" y="-200" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">P2</text>
        <line x1="0" y1="-180" x2="-155" y2="90" stroke="#00ffcc" stroke-width="3" opacity="0.6" />
        <line x1="0" y1="-180" x2="155" y2="90" stroke="#00ffcc" stroke-width="3" opacity="0.6" />

        <path d="M -20 -140 A 50 50 0 0 0 20 -140" fill="none" stroke="#00ffcc" stroke-width="3" />
        <text x="0" y="-115" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">45°</text>

        <!-- Point P3 (Right) -->
        <circle cx="140" cy="-113" r="8" fill="#ffaa00" filter="url(#glow)" />
        <text x="160" y="-120" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold">P3</text>
        <line x1="140" y1="-113" x2="-155" y2="90" stroke="#ffaa00" stroke-width="3" opacity="0.6" />
        <line x1="140" y1="-113" x2="155" y2="90" stroke="#ffaa00" stroke-width="3" opacity="0.6" />

        <path d="M 125 -70 A 50 50 0 0 0 105 -100" fill="none" stroke="#ffaa00" stroke-width="3" />
        <text x="120" y="-55" fill="#ffaa00" font-family="monospace" font-size="20" font-weight="bold"
            filter="url(#glow)">45°</text>

        <!-- Center projection line to show 90 -->
        <circle cx="0" cy="0" r="5" fill="#4da6ff" />
        <line x1="0" y1="0" x2="-155" y2="90" stroke="#4da6ff" stroke-width="2" stroke-dasharray="5 5" />
        <line x1="0" y1="0" x2="155" y2="90" stroke="#4da6ff" stroke-width="2" stroke-dasharray="5 5" />
        <path d="M -25 15 A 30 30 0 0 0 25 15" fill="none" stroke="#4da6ff" stroke-width="3" />
        <text x="0" y="-5" fill="#4da6ff" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">90°</text>

        <!-- Hover Drag effect -->
        <path d="M -100 -160 Q 0 -220 120 -140" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="4 4"
            marker-end="url(#arrow_right)" />
        <text x="0" y="-140" fill="#ffffff" font-family="sans-serif" font-size="14" font-style="italic"
            text-anchor="middle">드래그 무빙해도 각도는 영구 고정 (Lock)</text>
    </g>

    <!-- Right Half circle right angle cheat -->
    <g transform="translate(750, 400)">
        <circle cx="0" cy="0" r="100" fill="none" stroke="#223344" stroke-width="2" stroke-dasharray="5 5" />
        <!-- Diameter -->
        <line x1="-100" y1="0" x2="100" y2="0" stroke="#ffffff" stroke-width="4" />
        <text x="0" y="-10" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">핵심! 지름 180° 반원</text>

        <!-- 90 deg triangle -->
        <line x1="-100" y1="0" x2="-20" y2="-98" stroke="#ff0055" stroke-width="3" />
        <line x1="100" y1="0" x2="-20" y2="-98" stroke="#ff0055" stroke-width="3" />
        <path d="M -27 -88 L -18 -81 L -11 -89" fill="none" stroke="#00ffcc" stroke-width="3" />
        <rect x="-22" y="-90" width="4" height="4" fill="#00ffcc" filter="url(#glow)" />

        <text x="-40" y="-110" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold">무조건 90°
            직각!</text>
    </g>

    <defs>
        <marker id="arrow_right" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" />
        </marker>
    </defs>

    <!-- Explanation Panel -->
    <rect x="50" y="520" width="800" height="60" rx="10" fill="#110d1a" stroke="#ffff00" stroke-width="2" />
    <text x="450" y="545" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        호(Arc)의 크기만 고정시켜 놓으면, 시야 카메라를 우주 끝 원 껍데기 어디로 드래그 스탠딩 샷을 날리든
    </text>
    <text x="450" y="570" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        마치 거울 렌더링 매크로가 터진 것처럼 <tspan fill="#ffff00" font-weight="bold">똑같은 앵글 각도값(예: 45도)</tspan> 이 수만 개 복제됩니다!
    </text>

</svg>