<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">변수 (Variable) = 데이터를 담는 상자</text>

    <!-- Box 1: x -->
    <g transform="translate(200, 200)">
        <!-- The Box -->
        <path d="M -60 -50 L 60 -50 L 80 -80 L -40 -80 Z" fill="#2d2d44" stroke="#4da6ff" stroke-width="3"
            filter="url(#glow)" />
        <rect x="-60" y="-50" width="120" height="100" fill="#223344" stroke="#4da6ff" stroke-width="3"
            filter="url(#glow)" />
        <path d="M 60 -50 L 60 50 L 80 20 L 80 -80 Z" fill="#1a2533" stroke="#4da6ff" stroke-width="3" />

        <!-- Label -->
        <rect x="-30" y="10" width="60" height="30" rx="5" fill="#4da6ff" />
        <text x="0" y="32" fill="#111" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">x</text>

        <!-- Content falling in -->
        <circle cx="10" cy="-60" r="20" fill="#ffaa00" filter="url(#glow)" />
        <text x="10" y="-53" fill="#111" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">3</text>

        <path d="M 10 -120 L 10 -90" stroke="#ffaa00" stroke-width="4" stroke-dasharray="6" marker-end="url(#arrow)" />
    </g>

    <!-- Plus Sign -->
    <text x="400" y="220" fill="#ffffff" font-family="monospace" font-size="60" font-weight="bold"
        text-anchor="middle">+</text>

    <!-- Box 2: y -->
    <g transform="translate(600, 200)">
        <!-- The Box -->
        <path d="M -60 -50 L 60 -50 L 80 -80 L -40 -80 Z" fill="#332222" stroke="#ff4d4d" stroke-width="3"
            filter="url(#glow)" />
        <rect x="-60" y="-50" width="120" height="100" fill="#442222" stroke="#ff4d4d" stroke-width="3"
            filter="url(#glow)" />
        <path d="M 60 -50 L 60 50 L 80 20 L 80 -80 Z" fill="#2b1111" stroke="#ff4d4d" stroke-width="3" />

        <!-- Label -->
        <rect x="-30" y="10" width="60" height="30" rx="5" fill="#ff4d4d" />
        <text x="0" y="32" fill="#111" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">y</text>

        <!-- Content calling in -->
        <circle cx="10" cy="-60" r="20" fill="#00ffcc" filter="url(#glow)" />
        <text x="10" y="-53" fill="#111" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">7</text>

        <path d="M 10 -120 L 10 -90" stroke="#00ffcc" stroke-width="4" stroke-dasharray="6" />
        <polygon points="10,-85 5,-95 15,-95" fill="#00ffcc" />
    </g>

</svg>