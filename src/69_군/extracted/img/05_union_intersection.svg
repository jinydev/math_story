<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .bg {
                fill: #1e1e2e;
            }

            .text-title {
                fill: #f9e2af;
                font-family: sans-serif;
                font-size: 24px;
                font-weight: bold;
                text-anchor: middle;
            }

            .text-desc {
                fill: #cdd6f4;
                font-family: sans-serif;
                font-size: 16px;
                text-anchor: middle;
            }

            .text-symbol {
                fill: #f5c2e7;
                font-family: serif;
                font-size: 40px;
                text-anchor: middle;
                font-weight: bold;
            }

            .box {
                fill: none;
                stroke: #45475a;
                stroke-width: 2;
                rx: 10;
                ry: 10;
            }

            .circle-base {
                fill: none;
                stroke-width: 3;
            }

            .circle-fill-union {
                fill: #89b4fa;
                fill-opacity: 0.6;
            }

            .circle-fill-intersection {
                fill: #a6e3a1;
                fill-opacity: 0.8;
            }
        </style>

        <clipPath id="intersect-clip">
            <circle cx="580" cy="220" r="80" />
        </clipPath>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <!-- Left: Union -->
    <rect x="50" y="50" width="320" height="300" class="box" />
    <text x="210" y="90" class="text-title">합집합 (Union)</text>
    <text x="210" y="320" class="text-symbol">A ∪ B</text>

    <g transform="translate(-10, 0)">
        <circle cx="180" cy="220" r="80" class="circle-base circle-fill-union" stroke="#89b4fa" />
        <circle cx="260" cy="220" r="80" class="circle-base circle-fill-union" stroke="#89b4fa" />
        <text x="140" y="225" class="text-title" fill="#11111b">A</text>
        <text x="300" y="225" class="text-title" fill="#11111b">B</text>
    </g>

    <!-- Right: Intersection -->
    <rect x="430" y="50" width="320" height="300" class="box" />
    <text x="590" y="90" class="text-title">교집합 (Intersection)</text>
    <text x="590" y="320" class="text-symbol">A ∩ B</text>

    <g transform="translate(-10, 0)">
        <circle cx="560" cy="220" r="80" class="circle-base" stroke="#45475a" fill="#313244" fill-opacity="0.5" />
        <circle cx="640" cy="220" r="80" class="circle-base" stroke="#45475a" fill="#313244" fill-opacity="0.5" />

        <circle cx="640" cy="220" r="80" class="circle-fill-intersection" clip-path="url(#intersect-clip)" />

        <text x="520" y="225" fill="#cdd6f4" font-size="20" font-weight="bold">A</text>
        <text x="680" y="225" fill="#cdd6f4" font-size="20" font-weight="bold">B</text>
    </g>

</svg>