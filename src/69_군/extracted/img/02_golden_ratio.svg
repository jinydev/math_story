<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">황금비 (Golden Ratio) - 1 : 1.618</text>
    <text x="400" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">A : B = (A+B) :
        A</text>

    <!-- Golden Rectangle Base -->
    <g transform="translate(150, 150)" stroke-width="2">
        <!-- Full Rectangle (Base: 500, Height: 309 approx 500/1.618) -->
        <rect x="0" y="0" width="500" height="309" fill="#112233" stroke="#4da6ff" />

        <!-- First Square (309x309) -->
        <rect x="0" y="0" width="309" height="309" fill="#2d2d44" stroke="#00ffcc" />
        <text x="154" y="154" fill="#00ffcc" font-family="sans-serif" font-size="32" font-weight="bold"
            text-anchor="middle">A (1)</text>

        <!-- Remaining Rectangle (191x309) -->
        <!-- Second Square (191x191) inside the remaining -->
        <rect x="309" y="0" width="191" height="191" fill="#3a3a55" stroke="#ffaa00" />
        <text x="404" y="95" fill="#ffaa00" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">B</text>

        <!-- Third Square (118x118) -->
        <rect x="309" y="191" width="118" height="118" fill="#4d4d77" stroke="#ff4d4d" />

        <!-- Fourth Square (73x73) -->
        <rect x="427" y="191" width="73" height="73" fill="#666699" stroke="#00ffcc" />

        <!-- Fifth Square (45x45) -->
        <rect x="427" y="264" width="45" height="45" fill="#8888aa" stroke="#ffaa00" />

        <!-- Sixth Square (28x28) -->
        <rect x="472" y="264" width="28" height="28" fill="#aaaaaa" stroke="#ff4d4d" />

        <!-- Golden Spiral Path -->
        <path d="M 309 309 
             A 309 309 0 0 1 0 0
             A 191 191 0 0 1 500 191
             A 118 118 0 0 1 382 309
             A 73 73 0 0 1 427 191
             A 45 45 0 0 1 500 236
             A 28 28 0 0 1 472 264" fill="none" stroke="#ffffff" stroke-width="4" filter="url(#glow)" />
    </g>

    <!-- Math Explanation -->
    <g font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
        <!-- Top labels -->
        <path d="M 150 140 L 150 130 L 650 130 L 650 140" fill="none" stroke="#ffffff" stroke-width="2" />
        <text x="400" y="120">전체 길이 (A+B) = 1.618</text>

        <!-- Bottom labels -->
        <path d="M 150 470 L 150 480 L 459 480 L 459 470" fill="none" stroke="#00ffcc" stroke-width="2" />
        <text x="304" y="505" fill="#00ffcc">A (1.0)</text>

        <path d="M 459 470 L 459 480 L 650 480 L 650 470" fill="none" stroke="#ffaa00" stroke-width="2" />
        <text x="554" y="505" fill="#ffaa00">B (0.618)</text>
    </g>

</svg>