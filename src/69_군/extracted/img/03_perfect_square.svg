<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">완전제곱식 (Perfect Square): 단일 코어로 강력 압축!</text>

    <!-- The Equation Analysis -->
    <g transform="translate(100, 120)">

        <!-- x^2 -->
        <rect x="0" y="0" width="120" height="100" rx="10" fill="#2d2d44" stroke="#ffaa00" stroke-width="3" />
        <text x="60" y="60" fill="#ffaa00" font-family="monospace" font-size="42" font-weight="bold"
            text-anchor="middle">x²</text>
        <text x="60" y="130" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">x 의 제곱</text>

        <!-- + -->
        <text x="160" y="60" fill="#ffffff" font-family="monospace" font-size="42" font-weight="bold"
            text-anchor="middle">+</text>

        <!-- 6x -->
        <rect x="200" y="0" width="180" height="100" rx="10" fill="#2d2d44" stroke="#4da6ff" stroke-width="3" />
        <text x="290" y="60" fill="#4da6ff" font-family="monospace" font-size="42" font-weight="bold"
            text-anchor="middle">6x</text>
        <text x="290" y="130" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">2 × x × 3 (검증
            통과!)</text>

        <!-- + -->
        <text x="420" y="60" fill="#ffffff" font-family="monospace" font-size="42" font-weight="bold"
            text-anchor="middle">+</text>

        <!-- 9 -->
        <rect x="460" y="0" width="120" height="100" rx="10" fill="#2d2d44" stroke="#ff4d4d" stroke-width="3" />
        <text x="520" y="60" fill="#ff4d4d" font-family="monospace" font-size="42" font-weight="bold"
            text-anchor="middle">9</text>
        <text x="520" y="130" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">3 의
            제곱쌍둥이</text>
    </g>

    <!-- Compression Arrow -->
    <path d="M 400 270 L 400 300" stroke="#00ffcc" stroke-width="5" marker-end="url(#arrow)" filter="url(#glow)" />

    <!-- Result Box -->
    <g transform="translate(250, 310)">
        <rect x="0" y="0" width="300" height="70" rx="20" fill="#113322" stroke="#00ffcc" stroke-width="4"
            filter="url(#glow)" />
        <text x="150" y="45" fill="#00ffcc" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">( x + 3 )²</text>
    </g>

    <text x="650" y="350" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold">초강력 압축 완료!</text>

</svg>