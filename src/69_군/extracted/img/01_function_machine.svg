<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <!-- Glow filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <!-- Arrow Marker -->
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
        <marker id="arrow_red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4d4d" />
        </marker>
    </defs>

    <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">함수 작동 원리 (Mapping Machine)</text>

    <!-- Left Set: Domain (X) -->
    <g transform="translate(150, 250)">
        <ellipse cx="0" cy="0" rx="80" ry="150" fill="#223344" stroke="#4da6ff" stroke-width="4" filter="url(#glow)" />
        <text x="0" y="-170" fill="#4da6ff" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">정의역 (X)</text>
        <text x="0" y="-145" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">투입할 동전들</text>

        <!-- Elements -->
        <circle cx="0" cy="-80" r="15" fill="#4da6ff" />
        <text x="0" y="-73" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">1</text>

        <circle cx="0" cy="0" r="15" fill="#4da6ff" />
        <text x="0" y="7" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">2</text>

        <circle cx="0" cy="80" r="15" fill="#4da6ff" />
        <text x="0" y="87" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">3</text>
    </g>

    <!-- The Machine (f) in the middle -->
    <g transform="translate(400, 250)">
        <rect x="-60" y="-100" width="120" height="200" rx="20" fill="#2d2d44" stroke="#ffaa00" stroke-width="4"
            filter="url(#glow)" />
        <circle cx="0" cy="0" r="40" fill="#ffaa00" stroke="#111" stroke-width="3" />
        <text x="0" y="15" fill="#111" font-family="sans-serif" font-size="40" font-weight="bold"
            text-anchor="middle">f</text>
        <text x="0" y="-120" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">함수 박스</text>
    </g>

    <!-- Right Set: Codomain (Y) -->
    <g transform="translate(650, 250)">
        <ellipse cx="0" cy="0" rx="80" ry="150" fill="#332222" stroke="#ff4d4d" stroke-width="4" filter="url(#glow)" />
        <text x="0" y="-170" fill="#ff4d4d" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">공역 (Y)</text>
        <text x="0" y="-145" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">전체 상품 메뉴</text>

        <!-- Elements -->
        <circle cx="0" cy="-100" r="15" fill="#ff4d4d" filter="url(#glow)" />
        <text x="0" y="-93" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">콜라</text>

        <circle cx="0" cy="-30" r="15" fill="#ff4d4d" filter="url(#glow)" />
        <text x="0" y="-23" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">사이다</text>

        <circle cx="0" cy="40" r="15" fill="#555" />
        <text x="0" y="47" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">환타</text>
        <text x="40" y="45" fill="#aaaaaa" font-family="sans-serif" font-size="14">안팔림</text>

        <circle cx="0" cy="110" r="15" fill="#555" />
        <text x="0" y="117" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">생수</text>

        <!-- Range Highlight (Chee-yeok) -->
        <rect x="-35" y="-130" width="70" height="130" rx="15" fill="none" stroke="#00ffcc" stroke-width="3"
            stroke-dasharray="5" />
        <text x="50" y="-60" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold">치역</text>
        <text x="60" y="-40" fill="#00ffcc" font-family="sans-serif" font-size="12">선택받은 자들</text>
    </g>

    <!-- Mappings (Arrows) -->
    <!-- 1 -> 콜라 -->
    <path d="M 170 170 Q 300 130 340 210 T 630 150" fill="none" stroke="#00ffcc" stroke-width="4"
        marker-end="url(#arrow)" filter="url(#glow)" />

    <!-- 2 -> 사이다 -->
    <path d="M 170 250 Q 300 250 340 250 T 630 220" fill="none" stroke="#00ffcc" stroke-width="4"
        marker-end="url(#arrow)" />

    <!-- 3 -> 사이다 (Many to One is OK) -->
    <path d="M 170 330 Q 300 350 340 290 T 630 230" fill="none" stroke="#00ffcc" stroke-width="4"
        marker-end="url(#arrow)" />

    <!-- Rules Explanation -->
    <g transform="translate(100, 430)">
        <rect x="0" y="0" width="600" height="60" rx="10" fill="#111" stroke="#fff" stroke-width="2" />
        <text x="300" y="25" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">절대 규칙 1: 하나의 입력(X)은 반드시 단 하나의 결과(Y)만 뱉어야 함!</text>
        <text x="300" y="48" fill="#4da6ff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">절대 규칙 2: 여러 X가 하나의 Y(사이다)를 똑같이 고르는 건 완전 합법! (다대일 대응)</text>
    </g>

</svg>