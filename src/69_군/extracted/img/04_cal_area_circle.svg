<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <!-- Glow filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="26" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">피자 넓이(Area)의 비밀: 얇게 썰어 직사각형으로 렌더링!</text>

    <!-- Left: Sliced Pizza (Circle) -->
    <g transform="translate(200, 250)">
        <circle cx="0" cy="0" r="100" fill="#none" stroke="#555" stroke-width="2" />

        <!-- Slices -->
        <!-- We'll just draw lines from center -->
        <g stroke="#ffaa00" stroke-width="1.5">
            <line x1="-100" y1="0" x2="100" y2="0" />
            <line x1="0" y1="-100" x2="0" y2="100" />
            <line x1="-70.7" y1="-70.7" x2="70.7" y2="70.7" />
            <line x1="-70.7" y1="70.7" x2="70.7" y2="-70.7" />
            <line x1="-92.3" y1="-38.2" x2="92.3" y2="38.2" />
            <line x1="-38.2" y1="-92.3" x2="38.2" y2="92.3" />
            <line x1="-92.3" y1="38.2" x2="92.3" y2="-38.2" />
            <line x1="-38.2" y1="92.3" x2="38.2" y2="-92.3" />
        </g>

        <!-- Circumference highlighted -->
        <circle cx="0" cy="0" r="100" fill="none" stroke="#00ffcc" stroke-width="4" filter="url(#glow)" />
        <line x1="0" y1="0" x2="100" y2="0" stroke="#ff4d4d" stroke-width="4" />
        <text x="50" y="-10" fill="#ff4d4d" font-family="monospace" font-size="16" font-weight="bold">r</text>

        <text x="0" y="-120" fill="#00ffcc" font-family="monospace" font-size="18">테두리 = 2πr</text>
    </g>

    <!-- Arrow -->
    <path d="M 330 250 Q 380 200 430 250" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="5" />
    <text x="380" y="210" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">한없이 얇게!</text>

    <!-- Right: Interlocking slices forming a rectangle -->
    <g transform="translate(500, 200)">
        <!-- Instead of actual individual slices, represent the smoothed visual rect -->

        <!-- The main rectangle body -->
        <rect x="0" y="0" width="200" height="100" fill="#ffaa00" fill-opacity="0.2" stroke="#ffaa00" stroke-width="2"
            stroke-dasharray="2" filter="url(#glow)" />

        <!-- Vertical slice marks suggesting the wedges -->
        <g stroke="#ffaa00" stroke-width="1" opacity="0.6">
            <line x1="20" y1="0" x2="0" y2="100" />
            <line x1="40" y1="0" x2="20" y2="100" />
            <line x1="60" y1="0" x2="40" y2="100" />
            <line x1="80" y1="0" x2="60" y2="100" />
            <line x1="100" y1="0" x2="80" y2="100" />
            <line x1="120" y1="0" x2="100" y2="100" />
            <line x1="140" y1="0" x2="120" y2="100" />
            <line x1="160" y1="0" x2="140" y2="100" />
            <line x1="180" y1="0" x2="160" y2="100" />
            <line x1="200" y1="0" x2="180" y2="100" />
        </g>

        <!-- Top crust (half of circumference) -->
        <line x1="0" y1="0" x2="200" y2="0" stroke="#00ffcc" stroke-width="6" filter="url(#glow)" />
        <!-- Bottom crust (half of circumference) -->
        <line x1="0" y1="100" x2="200" y2="100" stroke="#00ffcc" stroke-width="6" filter="url(#glow)" />

        <text x="100" y="-15" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">가로 = (1/2) * 2πr = πr</text>

        <!-- Side length (radius) -->
        <line x1="0" y1="0" x2="0" y2="100" stroke="#ff4d4d" stroke-width="4" />
        <text x="-15" y="55" fill="#ff4d4d" font-family="monospace" font-size="18" font-weight="bold"
            transform="rotate(-90 -15 55)">세로 = r</text>

        <!-- Result Area -->
        <rect x="-20" y="140" width="240" height="50" rx="10" fill="#2d2d44" stroke="#ffffff" stroke-width="2" />
        <text x="100" y="173" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">
            직사각형 넓이 = <tspan fill="#ffaa00">πr × r = πr²</tspan>
        </text>
    </g>

</svg>