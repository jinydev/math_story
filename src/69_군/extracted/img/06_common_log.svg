<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffaa00" />
        </marker>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">자릿수 압축기: 상용로그 (Common Log)</text>

    <!-- Center Concept: Number 10 turning invisible -->
    <g transform="translate(450, 200)">

        <!-- Old format -->
        <text x="-150" y="0" fill="#ffffff" font-family="monospace" font-size="48" font-weight="bold"
            text-anchor="middle">log<tspan fill="#ff4d4d" font-size="28" dy="15">10</tspan>
            <tspan fill="#00ffcc" dy="-15"> 1000</tspan>
        </text>

        <!-- Arrow -->
        <path d="M -20 0 L 20 0" fill="none" stroke="#ffaa00" stroke-width="4" marker-end="url(#arrow)" />

        <!-- New format (Implicit 10) -->
        <text x="150" y="0" fill="#ffffff" font-family="monospace" font-size="48" font-weight="bold"
            text-anchor="middle">log<tspan fill="#00ffcc"> 1000</tspan></text>

        <!-- Ghost 10 -->
        <text x="120" y="15" fill="#555555" font-family="monospace" font-size="28" font-weight="bold"
            stroke-dasharray="2 2" stroke="#555555" opacity="0.6">10</text>

        <!-- Subtitles -->
        <text x="-150" y="60" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">10진법 인류라서 매번
            쓰기 귀찮음</text>
        <text x="150" y="60" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">어? 안 적혀있네? 그럼 무조건 10!</text>
    </g>

    <!-- Bottom: Zeros to Level Compressor -->
    <g transform="translate(450, 400)">
        <rect x="-350" y="-80" width="700" height="150" rx="10" fill="#112233" stroke="#4da6ff" stroke-width="3" />
        <text x="0" y="-50" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">동그라미 개수 = 로그 압축 레벨</text>

        <!-- Number blocks -->
        <g transform="translate(-250, 10)">
            <rect x="-50" y="-30" width="100" height="40" rx="5" fill="#2b1111" stroke="#ff4d4d" />
            <text x="0" y="-5" fill="#ff4d4d" font-family="monospace" font-size="20" font-weight="bold"
                text-anchor="middle">10</text>
            <text x="0" y="30" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
                text-anchor="middle">레벨 1</text>
        </g>

        <g transform="translate(-80, 10)">
            <rect x="-50" y="-30" width="100" height="40" rx="5" fill="#2b1111" stroke="#ff4d4d" />
            <text x="0" y="-5" fill="#ff4d4d" font-family="monospace" font-size="20" font-weight="bold"
                text-anchor="middle">100</text>
            <text x="0" y="30" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
                text-anchor="middle">레벨 2</text>
        </g>

        <g transform="translate(90, 10)">
            <rect x="-50" y="-30" width="100" height="40" rx="5" fill="#2b1111" stroke="#ff4d4d" />
            <text x="0" y="-5" fill="#ff4d4d" font-family="monospace" font-size="18" font-weight="bold"
                text-anchor="middle">100,000</text>
            <text x="0" y="30" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
                text-anchor="middle">레벨 5</text>
        </g>

        <g transform="translate(260, 10)">
            <rect x="-50" y="-30" width="100" height="40" rx="5" fill="#2b1111" stroke="#ff4d4d" />
            <text x="0" y="-5" fill="#ff4d4d" font-family="monospace" font-size="16" font-weight="bold"
                text-anchor="middle">1,000,000</text>
            <text x="0" y="30" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
                text-anchor="middle">레벨 6</text>
        </g>

        <!-- Connectors -->
        <path d="M -180 -10 L -150 -10" fill="none" stroke="#aaaaaa" stroke-width="2" />
        <path d="M -10 -10 L 20 -10" fill="none" stroke="#aaaaaa" stroke-width="2" />
        <path d="M 160 -10 L 190 -10" fill="none" stroke="#aaaaaa" stroke-width="2" />
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="500" width="600" height="60" rx="10" fill="#112233" stroke="#4da6ff" stroke-width="2"
        opacity="0" />
    <text x="450" y="525" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">천문학적인 자릿수 괴물들을 파이썬
        <tspan fill="#ffaa00" font-weight="bold">math.log10</tspan> 함수로 넣는 순간</text>
    <text x="450" y="550" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">고작 <tspan
            fill="#00ffcc" font-weight="bold">한 자릿수 레벨업 스케일(1~10)</tspan> 로 극도로 압축되어 버린다!</text>

</svg>