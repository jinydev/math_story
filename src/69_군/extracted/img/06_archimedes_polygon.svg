<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <!-- Glow filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="26" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">아르키메데스의 파이(π) 포위망: 폴리곤 렌더링</text>
    <text x="400" y="70" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">원 안쪽 폴리곤(수비)과 바깥쪽
        폴리곤(공격) 사이의 샌드위치 압축</text>

    <!-- Hexagon (6 sides) Example -->
    <g transform="translate(200, 250)">
        <text x="0" y="-150" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">6각형 (n=6)</text>
        <text x="0" y="-120" fill="#ff4d4d" font-family="monospace" font-size="16" text-anchor="middle">하한: 3.000 ~ 상한:
            3.464</text>

        <!-- Perfect Circle -->
        <circle cx="0" cy="0" r="100" fill="none" stroke="#00ffcc" stroke-width="3" filter="url(#glow)" />

        <!-- Inner Hexagon -->
        <polygon points="0,-100 86.6,-50 86.6,50 0,100 -86.6,50 -86.6,-50" fill="none" stroke="#4da6ff" stroke-width="2"
            stroke-dasharray="4" />

        <!-- Outer Hexagon -->
        <polygon points="0,-115.47 100,-57.735 100,57.735 0,115.47 -100,57.735 -100,-57.735" fill="none"
            stroke="#ffaa00" stroke-width="2" stroke-dasharray="4" />
    </g>

    <!-- 12-gon Example -->
    <g transform="translate(600, 250)">
        <text x="0" y="-150" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">24각형 (n=24)</text>
        <text x="0" y="-120" fill="#ff4d4d" font-family="monospace" font-size="16" text-anchor="middle">하한: 3.132 ~ 상한:
            3.159</text>

        <!-- Perfect Circle -->
        <circle cx="0" cy="0" r="100" fill="none" stroke="#00ffcc" stroke-width="3" filter="url(#glow)" />

        <!-- Inner 24-gon (approx using path matching circle almost perfectly) -->
        <circle cx="0" cy="0" r="99" fill="none" stroke="#4da6ff" stroke-width="2" stroke-dasharray="5 5" />

        <!-- Outer 24-gon -->
        <circle cx="0" cy="0" r="102" fill="none" stroke="#ffaa00" stroke-width="2" stroke-dasharray="5 5" />
    </g>

    <!-- Bottom Chart Area -->
    <g transform="translate(100, 420)">
        <!-- Base Timeline Line -->
        <line x1="0" y1="100" x2="600" y2="100" stroke="#555" stroke-width="4" />

        <text x="300" y="30" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">무한 루프 (Limit) 극한 도달의 길</text>

        <!-- Outer Bound Limit Line (coming down) -->
        <path d="M 0 50 Q 300 130 600 140" fill="none" stroke="#ffaa00" stroke-width="3" />
        <text x="0" y="45" fill="#ffaa00" font-family="monospace" font-size="14">외접(tan)</text>

        <!-- Inner Bound Limit Line (coming up) -->
        <path d="M 0 150 Q 300 135 600 140" fill="none" stroke="#4da6ff" stroke-width="3" />
        <text x="0" y="165" fill="#4da6ff" font-family="monospace" font-size="14">내접(sin)</text>

        <!-- The Target Pi Line -->
        <line x1="0" y1="140" x2="600" y2="140" stroke="#00ffcc" stroke-width="2" stroke-dasharray="5"
            filter="url(#glow)" />
        <text x="620" y="145" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold">π =
            3.14159...</text>

        <!-- N ticks -->
        <text x="50" y="115" fill="#aaa" font-size="12">n=6</text>
        <text x="250" y="115" fill="#aaa" font-size="12">n=96</text>
        <text x="500" y="115" fill="#aaa" font-size="12">n=1,000,000</text>
    </g>

</svg>