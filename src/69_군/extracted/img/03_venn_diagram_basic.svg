<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .bg {
                fill: #1e1e2e;
            }

            .text-title {
                fill: #f9e2af;
                font-family: 'Courier New', monospace;
                font-size: 28px;
                font-weight: bold;
                text-anchor: middle;
            }

            .label-set {
                fill: #11111b;
                font-family: sans-serif;
                font-size: 28px;
                font-weight: bold;
                text-anchor: middle;
            }

            .label-desc {
                fill: #cdd6f4;
                font-family: sans-serif;
                font-size: 16px;
                text-anchor: middle;
            }

            .box-u {
                fill: none;
                stroke: #cdd6f4;
                stroke-width: 4;
                rx: 15;
                ry: 15;
                stroke-dasharray: 8 4;
            }

            .label-u {
                fill: #cdd6f4;
                font-family: 'Courier New', monospace;
                font-size: 32px;
                font-weight: bold;
            }

            .circle-a {
                fill: #89b4fa;
                fill-opacity: 0.5;
                stroke: #89b4fa;
                stroke-width: 3;
            }

            .circle-b {
                fill: #f38ba8;
                fill-opacity: 0.5;
                stroke: #f38ba8;
                stroke-width: 3;
            }

            .intersection {
                fill: #cba6f7;
                fill-opacity: 0.7;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="50" class="text-title">기본적인 벤다이어그램 구조</text>

    <!-- Universal Set U -->
    <rect x="100" y="80" width="600" height="380" class="box-u" />
    <text x="120" y="120" class="label-u">U</text>
    <text x="600" y="115" class="label-desc">전체집합 (Universal Set)</text>
    <text x="600" y="140" class="label-desc" font-size="14" opacity="0.7">데이터베이스의 Table Scope</text>

    <!-- Circle A -->
    <circle cx="320" cy="270" r="140" class="circle-a" />

    <!-- Circle B -->
    <circle cx="480" cy="270" r="140" class="circle-b" />

    <!-- Intersection Path to highlight -->
    <path d="M 400 162.5 A 140 140 0 0 1 400 377.5 A 140 140 0 0 1 400 162.5 Z" class="intersection" />

    <!-- Labels in Sets -->
    <text x="240" y="260" class="label-set">A</text>
    <text x="240" y="290" class="label-desc" fill="#11111b" font-weight="bold">집합 A</text>

    <text x="560" y="260" class="label-set">B</text>
    <text x="560" y="290" class="label-desc" fill="#11111b" font-weight="bold">집합 B</text>

    <text x="400" y="260" class="label-set" fill="#11111b">A ∩ B</text>
    <text x="400" y="290" class="label-desc" fill="#11111b" font-weight="bold">교집합</text>

    <!-- Example Data Elements (dots) -->
    <circle cx="180" cy="350" r="5" fill="#cdd6f4" />
    <text x="180" y="370" class="label-desc" font-size="14">원소</text>

    <circle cx="620" cy="180" r="5" fill="#cdd6f4" />
    <text x="620" y="200" class="label-desc" font-size="14">원소</text>

    <circle cx="400" cy="210" r="5" fill="#11111b" />
    <circle cx="400" cy="330" r="5" fill="#11111b" />

    <!-- Elements outside A and B -->
    <circle cx="150" cy="150" r="5" fill="#f9e2af" />
    <text x="150" y="170" class="label-desc" fill="#f9e2af" font-size="14">여집합</text>

</svg>