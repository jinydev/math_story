<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#050510" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">악마의 내적(Dot Product): L자 충돌 행렬 곱셈 (A x B)</text>

    <!-- Title A x B = C -->
    <g transform="translate(140, 160)">

        <!-- Matrix A (The Attacker - Rows) -->
        <path d="M 30 -10 L 10 -10 L 10 170 L 30 170" fill="none" stroke="#ff0055" stroke-width="6"
            filter="url(#glow)" />
        <path d="M 150 -10 L 170 -10 L 170 170 L 150 170" fill="none" stroke="#ff0055" stroke-width="6"
            filter="url(#glow)" />
        <text x="90" y="-30" fill="#ff0055" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">행렬 A (앞놈)</text>
        <text x="90" y="-10" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">가로줄(Row)
            몽둥이</text>

        <g font-family="monospace" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">
            <text x="50" y="50" fill="#ffff00">1</text>
            <text x="130" y="50" fill="#ffff00">2</text>
            <text x="50" y="130">3</text>
            <text x="130" y="130">4</text>
        </g>

        <!-- Highlight Row 1 in A -->
        <rect x="25" y="10" width="130" height="50" fill="none" stroke="#ffff00" stroke-width="4" stroke-dasharray="8 4"
            rx="10" />

        <text x="210" y="90" fill="#ffffff" font-family="sans-serif" font-size="40" font-weight="bold">×</text>

        <!-- Matrix B (The Defender - Columns) -->
        <g transform="translate(260, 0)">
            <path d="M 30 -10 L 10 -10 L 10 170 L 30 170" fill="none" stroke="#00ffcc" stroke-width="6"
                filter="url(#glow)" />
            <path d="M 150 -10 L 170 -10 L 170 170 L 150 170" fill="none" stroke="#00ffcc" stroke-width="6"
                filter="url(#glow)" />
            <text x="90" y="-30" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
                text-anchor="middle">행렬 B (뒷놈)</text>
            <text x="90" y="-10" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">세로줄(Col)
                폭격맞기</text>

            <g font-family="monospace" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">
                <text x="50" y="50" fill="#ffaa00">5</text>
                <text x="130" y="50">6</text>
                <text x="50" y="130" fill="#ffaa00">7</text>
                <text x="130" y="130">8</text>
            </g>

            <!-- Highlight Column 1 in B -->
            <rect x="25" y="10" width="50" height="130" fill="none" stroke="#ffaa00" stroke-width="4"
                stroke-dasharray="8 4" rx="10" />
        </g>

        <text x="470" y="90" fill="#ffffff" font-family="sans-serif" font-size="40" font-weight="bold">=</text>

        <!-- Matrix C (Result) -->
        <g transform="translate(520, 0)">
            <path d="M 30 -10 L 10 -10 L 10 170 L 30 170" fill="none" stroke="#ffff00" stroke-width="8"
                filter="url(#glow)" />
            <path d="M 150 -10 L 170 -10 L 170 170 L 150 170" fill="none" stroke="#ffff00" stroke-width="8"
                filter="url(#glow)" />
            <text x="90" y="-30" fill="#ffff00" font-family="sans-serif" font-size="24" font-weight="bold"
                text-anchor="middle">결과 (A × B)</text>

            <g font-family="monospace" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">
                <text x="50" y="50" fill="#ff0055" filter="url(#glow)">19</text>
                <text x="130" y="50" fill="#333">22</text>
                <text x="50" y="130" fill="#333">43</text>
                <text x="130" y="130" fill="#333">50</text>
            </g>

            <!-- Highlight cell (1,1) in Result -->
            <rect x="20" y="10" width="60" height="50" fill="none" stroke="#ff0055" stroke-width="4" rx="8" />
        </g>
    </g>

    <!-- Crash Logic Breakdown -->
    <g transform="translate(100, 420)">
        <rect x="0" y="0" width="700" height="80" rx="10" fill="#1b1111" stroke="#ff0055" stroke-width="3" />
        <text x="350" y="30" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">크로스 융합 계산 로직 (1행 × 1열)</text>
        <text x="350" y="60" fill="#ffffff" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">
            (<tspan fill="#ffff00">1</tspan> × <tspan fill="#ffaa00">5</tspan>) + (<tspan fill="#ffff00">2</tspan> ×
            <tspan fill="#ffaa00">7</tspan>) = 5 + 14 = <tspan fill="#ff0055">19</tspan>
        </text>
    </g>

    <!-- The "L shape" graphic arrow -->
    <path d="M 230 120 L 330 120 L 330 220" fill="none" stroke="#ff0055" stroke-width="8" marker-end="url(#arrow_r)"
        filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round" />
    <text x="210" y="115" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold">가로(Row)</text>
    <text x="340" y="240" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold">세로(Col)</text>

    <defs>
        <marker id="arrow_r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ff0055" />
        </marker>
    </defs>

    <rect x="150" y="530" width="600" height="40" rx="10" fill="#0f0f15" stroke="#ffffff" stroke-width="2" />
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        앞 놈은 가로로, 뒷 놈은 세로로 충돌하는 <tspan fill="#ff0055" font-weight="bold">"L자 박치기 교차 타격"</tspan>이 행렬 곱의 본질입니다!
    </text>
</svg>