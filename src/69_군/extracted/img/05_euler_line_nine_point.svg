<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">우주의 일직선 정렬: 오일러 선 &amp; 구점원</text>

    <g transform="translate(400, 300)">

        <!-- Triangle -->
        <path d="M 0 -180 L -180 120 L 220 120 Z" fill="none" stroke="#334455" stroke-width="3" />
        <text x="0" y="-195" fill="#556677" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">A</text>
        <text x="-200" y="140" fill="#556677" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">B</text>
        <text x="240" y="140" fill="#556677" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">C</text>

        <!-- Circumcenter O -->
        <!-- Approx O = (20, 10). Let's put it at (20, 20) -->
        <circle cx="20" cy="20" r="7" fill="#4da6ff" />
        <text x="35" y="30" fill="#4da6ff" font-family="monospace" font-size="22" font-weight="bold">O (외심)</text>

        <!-- Centroid G -->
        <!-- Avg of A(0,-180), B(-180,120), C(220,120) = (13.3, 20). 
         Let's manually place them for visual clarity on a line. 
         Let O = (60, 40), G = (20, 0), H = (-60, -80) -->

        <!-- Redefine Points to force perfect collinear visual -->
        <!-- Re-positioning: O = (60, 40), G = (0, 0), H = (-120, -80) => Ratio OG:GH = 60:120 = 1:2. PERFECT! -->

    </g>

    <!-- Fresh Start Coordinates -->
    <g transform="translate(400, 280)">

        <!-- Triangle (artificially drawn to make O, G, H fit) -->
        <!-- We don't need perfect geometry, just the conceptual diagram -->
        <path d="M -80 -200 L -220 120 L 280 160 Z" fill="none" stroke="#223344" stroke-width="4" />

        <!-- Euler Line -->
        <line x1="120" y1="80" x2="-200" y2="-133" stroke="#00ffcc" stroke-width="4" filter="url(#glow)" />

        <rect x="-240" y="-160" width="100" height="30" rx="5" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="-190" y="-140" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">오일러 선</text>

        <!-- Center O (Circumcenter) -->
        <circle cx="90" cy="60" r="8" fill="#4da6ff" filter="url(#glow)" />
        <text x="110" y="70" fill="#4da6ff" font-family="monospace" font-size="22" font-weight="bold">O(외심)</text>

        <!-- Center G (Centroid) -->
        <circle cx="30" cy="20" r="8" fill="#ffaa00" filter="url(#glow)" />
        <text x="45" y="10" fill="#ffaa00" font-family="monospace" font-size="22" font-weight="bold">G(무게중심)</text>

        <!-- Center H (Orthocenter) -->
        <circle cx="-90" cy="-60" r="8" fill="#ff4d4d" filter="url(#glow)" />
        <text x="-100" y="-75" fill="#ff4d4d" font-family="monospace" font-size="22" font-weight="bold">H(수심)</text>

        <!-- 1:2 Ratio Braces / Labels -->
        <path d="M 80 75 L 20 35" fill="none" stroke="#aaaaaa" stroke-width="3" />
        <text x="65" y="45" fill="#ffffff" font-family="monospace" font-size="18" font-weight="bold">1</text>

        <path d="M 20 35 L -100 -45" fill="none" stroke="#aaaaaa" stroke-width="3" />
        <text x="-35" y="-20" fill="#ffffff" font-family="monospace" font-size="18" font-weight="bold">2</text>

        <!-- Nine Point Circle Concept -->
        <!-- Center of Nine Point Circle is midpoint of OH = (0, 0) -->
        <circle cx="0" cy="0" r="80" fill="none" stroke="#ff00ff" stroke-width="3" stroke-dasharray="10 6"
            filter="url(#glow)" />
        <text x="-60" y="30" fill="#ff00ff" font-family="sans-serif" font-size="18" font-weight="bold">구점원</text>

        <!-- Points on Nine point circle (random 9 points for concept) -->
        <circle cx="0" cy="-80" r="4" fill="#ffffff" />
        <circle cx="80" cy="0" r="4" fill="#ffffff" />
        <circle cx="-80" cy="0" r="4" fill="#ffffff" />
        <circle cx="0" cy="80" r="4" fill="#ffffff" />
        <circle cx="56" cy="56" r="4" fill="#ffffff" />
        <circle cx="-56" cy="-56" r="4" fill="#ffffff" />
        <circle cx="56" cy="-56" r="4" fill="#ffffff" />
        <circle cx="-56" cy="56" r="4" fill="#ffffff" />

    </g>

    <!-- Explanation Texts -->
    <rect x="150" y="480" width="500" height="80" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
    <text x="400" y="510" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">아무리 찌그러진 삼각형이라도
        <tspan fill="#4da6ff">외심</tspan>, <tspan fill="#ffaa00">무게중심</tspan>, <tspan fill="#ff4d4d">수심</tspan> 은</text>
    <text x="400" y="535" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">반드시 <tspan
            fill="#00ffcc" font-weight="bold">하나의 일직선(오일러 선) 위에서 1 : 2 황금비율</tspan>을 이룬다!</text>

</svg>