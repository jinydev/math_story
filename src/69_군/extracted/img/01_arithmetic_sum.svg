<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">10살 천재 가우스의 해킹: 등차수열의 합 (Arithmetic Sum)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"거꾸로 뒤집은 사본을 붙여
        '높이가 일정한 직사각형' 을 렌더링하라!"</text>

    <g transform="translate(150, 150)">

        <!-- Original Sequence S (Cyan) -->
        <!-- Heights: 1, 2, 3, 4, 5 -->
        <!-- Block width=60, height_unit=25 -->

        <!-- S Blocks -->
        <!-- 1 -->
        <rect x="0" y="100" width="60" height="25" fill="#00ffcc" stroke="#0a0a14" stroke-width="2"
            filter="url(#glow)" />
        <text x="30" y="118" fill="#0a0a14" font-weight="bold" font-size="16" text-anchor="middle">1</text>

        <!-- 2 -->
        <rect x="60" y="75" width="60" height="50" fill="#00ffcc" stroke="#0a0a14" stroke-width="2"
            filter="url(#glow)" />
        <text x="90" y="106" fill="#0a0a14" font-weight="bold" font-size="20" text-anchor="middle">2</text>

        <!-- 3 -->
        <rect x="120" y="50" width="60" height="75" fill="#00ffcc" stroke="#0a0a14" stroke-width="2"
            filter="url(#glow)" />
        <text x="150" y="94" fill="#0a0a14" font-weight="bold" font-size="20" text-anchor="middle">3</text>

        <!-- 4 -->
        <rect x="180" y="25" width="60" height="100" fill="#00ffcc" stroke="#0a0a14" stroke-width="2"
            filter="url(#glow)" />
        <text x="210" y="82" fill="#0a0a14" font-weight="bold" font-size="20" text-anchor="middle">4</text>

        <!-- 5 -->
        <rect x="240" y="0" width="60" height="125" fill="#00ffcc" stroke="#0a0a14" stroke-width="2"
            filter="url(#glow)" />
        <text x="270" y="70" fill="#0a0a14" font-weight="bold" font-size="20" text-anchor="middle">100</text>

        <text x="-50" y="120" fill="#00ffcc" font-weight="bold" font-size="24" filter="url(#glow)">S =</text>

        <!-- Reversed Sequence S (Magenta) -->
        <!-- 5 -->
        <rect x="0" y="-25" width="60" height="125" fill="#ff00ff" stroke="#0a0a14" stroke-width="2" filter="url(#glow)"
            opacity="0.8" />
        <text x="30" y="50" fill="#fff" font-weight="bold" font-size="20" text-anchor="middle">100</text>

        <!-- 4 -->
        <rect x="60" y="-25" width="60" height="100" fill="#ff00ff" stroke="#0a0a14" stroke-width="2"
            filter="url(#glow)" opacity="0.8" />
        <text x="90" y="38" fill="#fff" font-weight="bold" font-size="20" text-anchor="middle">99</text>

        <!-- 3 -->
        <rect x="120" y="-25" width="60" height="75" fill="#ff00ff" stroke="#0a0a14" stroke-width="2"
            filter="url(#glow)" opacity="0.8" />
        <text x="150" y="26" fill="#fff" font-weight="bold" font-size="20" text-anchor="middle">98</text>

        <!-- 2 -->
        <rect x="180" y="-25" width="60" height="50" fill="#ff00ff" stroke="#0a0a14" stroke-width="2"
            filter="url(#glow)" opacity="0.8" />
        <text x="210" y="14" fill="#fff" font-weight="bold" font-size="20" text-anchor="middle">97</text>

        <!-- 1 -->
        <rect x="240" y="-25" width="60" height="25" fill="#ff00ff" stroke="#0a0a14" stroke-width="2"
            filter="url(#glow)" opacity="0.8" />
        <text x="270" y="-6" fill="#fff" font-weight="bold" font-size="16" text-anchor="middle">1</text>

        <text x="-50" y="-10" fill="#ff00ff" font-weight="bold" font-size="24" filter="url(#glow)">+ S_rev</text>

        <!-- Explanation of sums = 101 -->
        <g transform="translate(0, -50)">
            <path d="M 30 -10 L 30 15 M 90 -10 L 90 15 M 150 -10 L 150 15 M 210 -10 L 210 15 M 270 -10 L 270 15"
                fill="none" stroke="#fff" stroke-dasharray="2 2" />
            <text x="30" y="-15" fill="#ffff00" font-weight="bold" font-size="16" text-anchor="middle">101</text>
            <text x="90" y="-15" fill="#ffff00" font-weight="bold" font-size="16" text-anchor="middle">101</text>
            <text x="150" y="-15" fill="#ffff00" font-weight="bold" font-size="16" text-anchor="middle">101</text>
            <text x="210" y="-15" fill="#ffff00" font-weight="bold" font-size="16" text-anchor="middle">101</text>
            <text x="270" y="-15" fill="#ffff00" font-weight="bold" font-size="16" text-anchor="middle">101</text>
        </g>

        <!-- Bracket holding the whole rectangle -->
        <path d="M 0 140 L 0 150 L 300 150 L 300 140" fill="none" stroke="#fff" stroke-width="2" />
        <text x="150" y="170" fill="#fff" font-weight="bold" font-size="18" text-anchor="middle">총 항의 개수(n) =
            100개</text>

        <!-- Giant formula -->
        <text x="500" y="20" fill="#fff" font-family="monospace" font-size="30" font-weight="bold" text-anchor="left"
            filter="url(#glow)">
            2S = 101 × 100
        </text>
        <text x="500" y="60" fill="#ffff00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="left">
            S = <tspan fill="#00ffcc">5050</tspan>
        </text>
    </g>

    <!-- Big Alert Bottom -->
    <rect x="100" y="450" width="700" height="110" rx="10" fill="#1b1122" stroke="#00ffcc" stroke-width="2" />
    <text x="450" y="480" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">
        <tspan fill="#ff00ff" font-weight="bold">처음 항(a)</tspan> 과 <tspan fill="#ff00ff" font-weight="bold">마지막 끝 항(l)
        </tspan> 을 더하면 하나의 완벽한 기둥 높이가 완성된다.
    </text>
    <text x="450" y="510" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">
        그 기둥을 항의 개수(n) 만큼 쫙 깔아 거대한 직사각형을 만든 뒤,
    </text>
    <text x="450" y="540" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">
        S = n(a + l) / 2
    </text>
</svg>