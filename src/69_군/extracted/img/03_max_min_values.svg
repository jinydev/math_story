<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">최대/최소 (Global Max &amp; Min) 랭킹 스캔 리스트</text>

    <!-- Bounding Domain Box -->
    <!-- Range [A, B] mapping -->
    <g transform="translate(100, 150)">

        <!-- Domain restriction borders -->
        <line x1="100" y1="350" x2="100" y2="50" stroke="#555" stroke-dasharray="10 5" stroke-width="3" />
        <text x="100" y="380" fill="#aaaaaa" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">시작선 A</text>

        <line x1="650" y1="350" x2="650" y2="50" stroke="#555" stroke-dasharray="10 5" stroke-width="3" />
        <text x="650" y="380" fill="#aaaaaa" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">결승선 B</text>

        <!-- Axes -->
        <line x1="0" y1="350" x2="750" y2="350" stroke="#334455" stroke-width="2" />

        <!-- The complex function map -->
        <!-- Starts high, drops, goes up, drops, ends low but not lowest -->
        <path d="M 100 80 C 150 200, 200 300, 250 280 C 350 200, 450 50, 500 120 S 600 250, 650 200" fill="none"
            stroke="#4da6ff" stroke-width="6" filter="url(#glow)" />

        <!-- Point 1: Boundary A -->
        <circle cx="100" cy="80" r="8" fill="#ff0055" stroke="#fff" stroke-width="2" filter="url(#glow)" />
        <text x="100" y="60" fill="#ff0055" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">f(A) = 80</text>
        <rect x="50" y="430" width="100" height="30" fill="#ff0055" />
        <text x="100" y="450" fill="#fff" font-family="sans-serif" font-size="14" text-anchor="middle">경계 후보 1</text>

        <!-- Point 2: Local Minimum -->
        <circle cx="270" cy="275" r="8" fill="#ffaa00" stroke="#fff" stroke-width="2" filter="url(#glow)" />
        <text x="270" y="305" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">극솟값 = -10</text>
        <rect x="220" y="430" width="100" height="30" fill="#ffaa00" />
        <text x="270" y="450" fill="#000" font-family="sans-serif" font-size="14" text-anchor="middle">극소 후보 2</text>

        <!-- Point 3: Local Maximum -->
        <circle cx="450" cy="70" r="8" fill="#ff0055" stroke="#fff" stroke-width="2" filter="url(#glow)" />
        <text x="450" y="50" fill="#ff0055" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">극댓값 = 90</text>
        <rect x="400" y="430" width="100" height="30" fill="#ff0055" />
        <text x="450" y="450" fill="#fff" font-family="sans-serif" font-size="14" text-anchor="middle">극대 후보 3</text>

        <!-- Point 4: Boundary B -->
        <circle cx="650" cy="200" r="8" fill="#ffaa00" stroke="#fff" stroke-width="2" filter="url(#glow)" />
        <text x="680" y="200" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">f(B) = 30</text>
        <rect x="600" y="430" width="100" height="30" fill="#ffaa00" />
        <text x="650" y="450" fill="#000" font-family="sans-serif" font-size="14" text-anchor="middle">경계 후보 4</text>

        <!-- Highlights -->
        <!-- Max label -->
        <rect x="390" y="0" width="120" height="30" rx="5" fill="#ffffff" />
        <text x="450" y="20" fill="#ff0055" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">🏆 최댓값 (Max)</text>
        <!-- Point pointing to Max -->
        <path d="M 450 30 L 450 45" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow_w)" />

        <!-- Min label -->
        <rect x="210" y="320" width="120" height="30" rx="5" fill="#ffffff" />
        <text x="270" y="340" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">💀 최솟값 (Min)</text>
        <!-- Point pointing to Min -->
        <path d="M 270 315 L 270 295" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow_w)" />

    </g>

    <!-- Arrow Definitions -->
    <defs>
        <marker id="arrow_w" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" />
        </marker>
    </defs>

    <!-- Explanation Footer -->
    <rect x="100" y="520" width="700" height="60" rx="10" fill="#0f0f15" stroke="#4da6ff" stroke-width="2" />
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        우주 1위를 가리기 위해서는 [양쪽 경계선의 끝 타점값] 과 [가운데 극값들] 중 오직 가장 크고 작은 것만 찾습니다.
    </text>
</svg>