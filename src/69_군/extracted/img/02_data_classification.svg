<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">IF 조건 필터 스크린: 데이터 기준(Criteria)의 권력</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"어설프게 섞인 폐기물과 보석을
        분리한다. 분석가가 어떤 거름망(칼)을 세팅하느냐가 통계의 운명을 바꾼다."</text>

    <!-- Raw Data Flow from Top -->
    <g transform="translate(450, 120)">
        <rect x="-100" y="0" width="200" height="50" rx="10" fill="#1b1111" stroke="#ff5555" stroke-width="2"
            stroke-dasharray="5 5" />
        <text x="0" y="30" fill="#ff5555" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">혼탁한 원시 데이터 더미</text>

        <!-- Dropping Data -->
        <circle cx="-60" cy="80" r="15" fill="#331111" stroke="#ff5555" stroke-width="2" />
        <text x="-60" y="85" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">33</text>

        <circle cx="-20" cy="110" r="15" fill="#331111" stroke="#ff5555" stroke-width="2" />
        <text x="-20" y="115" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">88</text>

        <circle cx="30" cy="70" r="15" fill="#331111" stroke="#ff5555" stroke-width="2" />
        <text x="30" y="75" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">95</text>

        <circle cx="70" cy="100" r="15" fill="#331111" stroke="#ff5555" stroke-width="2" />
        <text x="70" y="105" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">72</text>
    </g>

    <!-- Logic Filter Engine (Criteria) -->
    <g transform="translate(450, 280)">
        <!-- Hexagon Filter -->
        <polygon points="0,-40 150,-10 150,10 0,40 -150,10 -150,-10" fill="#001133" stroke="#4da6ff" stroke-width="4"
            filter="url(#glow)" />
        <rect x="-100" y="-20" width="200" height="40" rx="5" fill="#332200" />
        <text x="0" y="6" fill="#ffff00" font-family="monospace" font-size="22" font-weight="bold" text-anchor="middle"
            filter="url(#glow)">IF score >= 80:</text>

        <!-- Explanatory Text -->
        <text x="0" y="70" fill="#4da6ff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">분류(Classification) 기준망 작동!</text>
    </g>

    <!-- Branches / Routing -->
    <!-- Left Branch (TRUE) -->
    <path d="M 450 320 Q 250 360 250 420" fill="none" stroke="#00ffcc" stroke-width="6" stroke-dasharray="15 10"
        marker-end="url(#arrow_t)" />
    <rect x="230" y="340" width="40" height="30" rx="5" fill="#003322" stroke="#00ffcc" />
    <text x="250" y="360" fill="#00ffcc" font-family="monospace" font-size="14" font-weight="bold"
        text-anchor="middle">True</text>

    <g transform="translate(250, 420)">
        <rect x="-80" y="0" width="160" height="80" rx="10" fill="#001a11" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="0" y="30" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">우등생 폴더 List</text>

        <circle cx="-30" cy="55" r="15" fill="#003322" stroke="#00ffcc" stroke-width="2" />
        <text x="-30" y="60" fill="#00ffcc" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">88</text>

        <circle cx="30" cy="55" r="15" fill="#003322" stroke="#00ffcc" stroke-width="2" />
        <text x="30" y="60" fill="#00ffcc" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">95</text>
    </g>

    <!-- Right Branch (FALSE) -->
    <path d="M 450 320 Q 650 360 650 420" fill="none" stroke="#ffaa00" stroke-width="6" stroke-dasharray="15 10"
        marker-end="url(#arrow_f)" />
    <rect x="630" y="340" width="50" height="30" rx="5" fill="#332200" stroke="#ffaa00" />
    <text x="655" y="360" fill="#ffaa00" font-family="monospace" font-size="14" font-weight="bold"
        text-anchor="middle">False</text>

    <g transform="translate(650, 420)">
        <rect x="-80" y="0" width="160" height="80" rx="10" fill="#1a1100" stroke="#ffaa00" stroke-width="3"
            filter="url(#glow)" />
        <text x="0" y="30" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">보충수업 폴더 List</text>

        <circle cx="-30" cy="55" r="15" fill="#332200" stroke="#ffaa00" stroke-width="2" />
        <text x="-30" y="60" fill="#ffaa00" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">33</text>

        <circle cx="30" cy="55" r="15" fill="#332200" stroke="#ffaa00" stroke-width="2" />
        <text x="30" y="60" fill="#ffaa00" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">72</text>
    </g>

    <defs>
        <marker id="arrow_t" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#00ffcc" />
        </marker>
        <marker id="arrow_f" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffaa00" />
        </marker>
    </defs>

    <!-- Base Explain -->
    <rect x="100" y="530" width="700" height="50" rx="10" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="560" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        분석가가 코딩하는 <tspan fill="#ffff00" font-weight="bold">단 한 줄의 조건문(Criteria)</tspan> 여부에 따라, 거대한 데이터들은 자신들의 운명이 나뉩니다.
    </text>
</svg>