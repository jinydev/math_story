<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <!-- Glow filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">탈레스의 비례식 (Thales' Proportion)</text>
    <text x="400" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">막대 길이 : 막대 그림자 =
        피라미드 높이 : 피라미드 그림자</text>

    <!-- Sun Rays (Parallel) -->
    <g stroke="#ffcc00" stroke-width="2" stroke-dasharray="10,5" fill="none" filter="url(#glow)" opacity="0.6">
        <path d="M 100 -50 L 300 400" />
        <path d="M 400 -50 L 700 400" />
    </g>

    <!-- Sun -->
    <circle cx="100" cy="50" r="30" fill="#ffcc00" filter="url(#glow)" />

    <!-- Ground Line -->
    <line x1="50" y1="400" x2="750" y2="400" stroke="#555555" stroke-width="4" />

    <!-- Stick (Thales' Stick) -->
    <g transform="translate(180, 0)">
        <!-- Stick -->
        <line x1="20" y1="280" x2="20" y2="400" stroke="#00ffcc" stroke-width="6" />
        <!-- Shadow -->
        <line x1="20" y1="400" x2="100" y2="400" stroke="#111111" stroke-width="10" opacity="0.8" />
        <line x1="20" y1="400" x2="100" y2="400" stroke="#00ffcc" stroke-width="4" stroke-dasharray="4,2" />
        <!-- Triangle -->
        <path d="M 20 280 L 100 400" stroke="#ffaa00" stroke-width="2" fill="none" />

        <!-- Labels -->
        <text x="-15" y="340" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold">높이 1m</text>
        <text x="60" y="425" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">그림자 1.5m</text>
    </g>

    <!-- Pyramid -->
    <g transform="translate(450, 0)">
        <!-- Pyramid Shape -->
        <polygon points="100,200 0,400 200,400" fill="#cc8800" stroke="#ffaa00" stroke-width="3" />
        <!-- Height Line (Unknown) -->
        <line x1="100" y1="200" x2="100" y2="400" stroke="#ff4d4d" stroke-width="4" stroke-dasharray="5,5" />
        <!-- Shadow -->
        <line x1="100" y1="400" x2="250" y2="400" stroke="#111111" stroke-width="10" opacity="0.8" />
        <line x1="100" y1="400" x2="250" y2="400" stroke="#ff4d4d" stroke-width="4" stroke-dasharray="4,2" />
        <!-- Triangle -->
        <path d="M 100 200 L 250 400" stroke="#ffaa00" stroke-width="2" fill="none" />

        <!-- Labels -->
        <text x="50" y="300" fill="#ff4d4d" font-family="sans-serif" font-size="24" font-weight="bold">높이 ?m</text>
        <text x="175" y="425" fill="#ff4d4d" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">그림자 219m</text>
    </g>

    <!-- Equation Box -->
    <rect x="200" y="440" width="400" height="50" rx="8" fill="#2d2d44" stroke="#ffffff" stroke-width="2" />
    <text x="400" y="473" fill="#ffffff" font-family="monospace" font-size="22" font-weight="bold"
        text-anchor="middle">1 : 1.5 = ? : 219</text>

</svg>