<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">궁극의 해킹 툴: 밑 변환 공식 (Base Change)</text>

    <!-- Left: Original Log -->
    <g transform="translate(250, 250)">
        <rect x="-120" y="-100" width="240" height="200" rx="15" fill="#112233" stroke="#4da6ff" stroke-width="3"
            opacity="0.8" />
        <text x="0" y="-60" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">불편하고 특이한 '밑'</text>

        <text x="0" y="20" fill="#ffffff" font-family="monospace" font-size="48" font-weight="bold"
            text-anchor="middle">log<tspan fill="#ff4d4d" font-size="30" dy="15">2 </tspan>
            <tspan fill="#ffaa00" dy="-15">8</tspan>
        </text>

        <!-- Labels -->
        <text x="-30" y="70" fill="#ff4d4d" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">밑 a</text>
        <text x="30" y="70" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">진수 b</text>
    </g>

    <!-- Transform Arrow -->
    <path d="M 390 250 L 490 250" fill="none" stroke="#00ffcc" stroke-width="6" marker-end="url(#arrow)"
        stroke-dasharray="12 6" filter="url(#glow)" />
    <text x="440" y="230" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">비밀열쇠 c 주입</text>

    <!-- Right: Transformed Log (Fraction) -->
    <g transform="translate(680, 250)">
        <rect x="-150" y="-180" width="300" height="360" rx="20" fill="#221133" stroke="#ff00ff" stroke-width="3"
            opacity="0.8" />
        <text x="0" y="-130" fill="#ff00ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">표준으로 통일된 분수 맵</text>

        <!-- Numerator: log_c b -->
        <text x="0" y="-40" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">log<tspan fill="#00ffcc" font-size="25" dy="15">c </tspan>
            <tspan fill="#ffaa00" dy="-15">8</tspan>
        </text>

        <!-- Fraction Line -->
        <line x1="-120" y1="10" x2="120" y2="10" stroke="#ffffff" stroke-width="4" />

        <!-- Denominator: log_c a -->
        <text x="0" y="70" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">log<tspan fill="#00ffcc" font-size="25" dy="15">c </tspan>
            <tspan fill="#ff4d4d" dy="-15">2</tspan>
        </text>

        <!-- Path tracing: Base -> Bottom True Number -->
        <path d="M -300 -10 Q -150 -10 -40 70" fill="none" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="4 4"
            opacity="0.5" />
        <text x="-40" y="110" fill="#ff4d4d" font-family="sans-serif" font-size="14" text-anchor="middle">밑 -> 분모의 진수로
            쫓겨남</text>

        <!-- Path tracing: True Number -> Top True Number -->
        <path d="M -300 -60 Q -150 -60 20 -40" fill="none" stroke="#ffaa00" stroke-width="2" stroke-dasharray="4 4"
            opacity="0.5" />
        <text x="80" y="-80" fill="#ffaa00" font-family="sans-serif" font-size="14" text-anchor="middle">진수 -> 분자의 진수로
            상승</text>
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="480" width="600" height="60" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
    <text x="450" y="505" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">밑이 자연상수 e뿐인 <tspan
            fill="#ff00ff" font-weight="bold">파이썬 math.log() 엔진</tspan> 만으로도</text>
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">세상 모든 로그(log2,
        log10 등)를 직접 커스텀 생성해낼 수 있는 마법</text>

</svg>