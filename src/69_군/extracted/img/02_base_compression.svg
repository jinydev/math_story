<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .coin-small {
                fill: #cd7f32;
                stroke: #a05a2c;
                stroke-width: 2;
            }

            .coin-large {
                fill: #c0c0c0;
                stroke: #808080;
                stroke-width: 3;
                filter: drop-shadow(0 0 10px rgba(192, 192, 192, 0.5));
            }

            .arrow {
                fill: none;
                stroke: #00ffff;
                stroke-width: 4;
                stroke-linecap: round;
                marker-end: url(#arrowhead);
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 15px;
                text-anchor: middle;
            }

            .highlight {
                fill: #00ffff;
                font-size: 18px;
                text-anchor: middle;
            }

            .box {
                fill: rgba(255, 255, 255, 0.05);
                stroke: #30363d;
                stroke-width: 2;
                rx: 10;
                stroke-dasharray: 5, 5;
            }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#00ffff" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="40" class="title">진법의 본질: 묶어서 압축하기 (데이터 압축)</text>
    <text x="400" y="70" class="desc">가벼운 메모리 공간을 유지하기 위해 일정 개수가 차면 새로운 상위 기호로 교환(Carry)한다</text>

    <rect x="50" y="120" width="300" height="200" class="box" />
    <text x="200" y="150" fill="#ffffff" font-size="20" text-anchor="middle">1의 자리 찌꺼기들</text>

    <!-- 10 Small Coins -->
    <g transform="translate(100, 180)">
        <circle cx="20" cy="20" r="15" class="coin-small" /> <text x="20" y="25" fill="#fff" font-size="12"
            text-anchor="middle">1</text>
        <circle cx="60" cy="20" r="15" class="coin-small" /> <text x="60" y="25" fill="#fff" font-size="12"
            text-anchor="middle">1</text>
        <circle cx="100" cy="20" r="15" class="coin-small" /> <text x="100" y="25" fill="#fff" font-size="12"
            text-anchor="middle">1</text>
        <circle cx="140" cy="20" r="15" class="coin-small" /> <text x="140" y="25" fill="#fff" font-size="12"
            text-anchor="middle">1</text>
        <circle cx="180" cy="20" r="15" class="coin-small" /> <text x="180" y="25" fill="#fff" font-size="12"
            text-anchor="middle">1</text>

        <circle cx="20" cy="60" r="15" class="coin-small" /> <text x="20" y="65" fill="#fff" font-size="12"
            text-anchor="middle">1</text>
        <circle cx="60" cy="60" r="15" class="coin-small" /> <text x="60" y="65" fill="#fff" font-size="12"
            text-anchor="middle">1</text>
        <circle cx="100" cy="60" r="15" class="coin-small" /> <text x="100" y="65" fill="#fff" font-size="12"
            text-anchor="middle">1</text>
        <circle cx="140" cy="60" r="15" class="coin-small" /> <text x="140" y="65" fill="#fff" font-size="12"
            text-anchor="middle">1</text>
        <circle cx="180" cy="60" r="15" class="coin-small" /> <text x="180" y="65" fill="#fff" font-size="12"
            text-anchor="middle">1</text>
    </g>
    <text x="200" y="290" fill="#ff6464" font-size="16" text-anchor="middle">메모리 공간 부족! 10개 포화 상태</text>

    <!-- Compression Arrow -->
    <path d="M 370 220 L 460 220" class="arrow" />
    <text x="415" y="200" class="highlight">압축(교환)</text>
    <text x="415" y="245" fill="#888" font-size="14" text-anchor="middle">Base 10</text>

    <!-- Evolved Large Coin -->
    <rect x="490" y="120" width="260" height="200" class="box" />
    <text x="620" y="150" fill="#ffffff" font-size="20" text-anchor="middle">10의 자리 승급</text>

    <circle cx="620" cy="220" r="40" class="coin-large" />
    <text x="620" y="228" fill="#111" font-size="24" text-anchor="middle">10</text>

    <text x="620" y="290" fill="#64ff64" font-size="16" text-anchor="middle">새로운 기호 1개로 메모리 최적화</text>

    <!-- Info Box -->
    <g transform="translate(150, 340)">
        <rect width="500" height="40" fill="#161b22" rx="5" />
        <text x="250" y="25" fill="#ffffff" font-size="16" text-anchor="middle">바운더리(한계치) 개수가 10개면 10진법, 2개면 2진법이
            된다.</text>
    </g>
</svg>