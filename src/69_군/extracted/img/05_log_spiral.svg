<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">생명의 팽창 궤적: 로그 나선 (Logarithmic Spiral)</text>

    <!-- Polar Grids -->
    <g transform="translate(400, 320)">

        <g stroke="#334455" stroke-width="1.5" fill="none">
            <circle cx="0" cy="0" r="40" />
            <circle cx="0" cy="0" r="80" />
            <circle cx="0" cy="0" r="120" />
            <circle cx="0" cy="0" r="160" />
            <circle cx="0" cy="0" r="200" />
            <circle cx="0" cy="0" r="240" />

            <line x1="-250" y1="0" x2="250" y2="0" />
            <line x1="0" y1="-250" x2="0" y2="250" />
            <line x1="-177" y1="-177" x2="177" y2="177" />
            <line x1="-177" y1="177" x2="177" y2="-177" />
        </g>

        <!-- Spiral Curve -->
        <!-- Approximated via cubic bezier arcs expanding outward -->
        <!-- Start inside out -->
        <path d="M 5 0 
             C 5 -5, -8 -8, -10 0
             C -12 10, 15 15, 20 0 
             C 28 -20, -30 -30, -40 0
             C -55 45, 60 70, 80 0
             C 110 -100, -120 -150, -160 0
             C -220 250, 240 330, 320 0" fill="none" stroke="#00ffcc" stroke-width="5" filter="url(#glow)" />

        <!-- Equation display on the Spiral -->
        <rect x="-100" y="-220" width="200" height="50" rx="10" fill="#2b1111" stroke="#ffaa00" stroke-width="2" />
        <text x="0" y="-185" fill="#ffaa00" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">r = a · e^(bθ)</text>

        <!-- Pointers -->
        <line x1="0" y1="0" x2="80" y2="0" stroke="#ff4d4d" stroke-width="3" stroke-dasharray="6 3" />
        <text x="50" y="-15" fill="#ff4d4d" font-family="sans-serif" font-size="16" font-weight="bold">r 커짐</text>

        <line x1="0" y1="0" x2="-160" y2="0" stroke="#ff4d4d" stroke-width="3" stroke-dasharray="6 3" />
        <text x="-120" y="25" fill="#ff4d4d" font-family="sans-serif" font-size="16" font-weight="bold">지수폭발(e)</text>
    </g>

    <!-- Explanation -->
    <rect x="150" y="80" width="500" height="40" rx="10" fill="#112233" stroke="#4da6ff" stroke-width="2" />
    <text x="400" y="105" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">앵무조개, 은하수 궤적 등 우주가
        안정을 유지하며 거대하게 증식하는 황금 스케일러!</text>

</svg>