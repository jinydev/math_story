<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)"> Pandas 테이블 포장기: 원시 폴더(Dictionary)를 행렬(Matrix)로 승격</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"일반적인 텍스트 문서보고 결재할
        사장님은 없다. 엑셀 모양의 정갈한 바둑판(Table) 데이터베이스로 렌더링하라."</text>

    <!-- Messy Text / Dict (Left) -->
    <g transform="translate(100, 150)">
        <rect x="0" y="0" width="280" height="250" rx="15" fill="#1b1111" stroke="#ff5555" stroke-width="3" />
        <text x="140" y="40" fill="#ff5555" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">파이썬 딕셔너리 (Raw Data)</text>

        <text x="20" y="90" fill="#ffffff" font-family="monospace" font-size="14">raw_dict = {</text>
        <text x="40" y="120" fill="#aaaaaa" font-family="monospace" font-size="14">"항목": ["포메라니안", </text>
        <text x="110" y="140" fill="#aaaaaa" font-family="monospace" font-size="14">"푸들", "허스키"],</text>
        <text x="40" y="170" fill="#4da6ff" font-family="monospace" font-size="14">"수량": [12, 8, 2]</text>
        <text x="20" y="200" fill="#ffffff" font-family="monospace" font-size="14">}</text>

        <text x="140" y="230" fill="#ff5555" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">난잡하고 가독성 최악 (가로 나열)</text>
    </g>

    <!-- Conversion Engine (Middle) -->
    <g transform="translate(415, 230)">
        <rect x="-10" y="0" width="90" height="80" rx="10" fill="#332200" stroke="#ffaa00" stroke-width="3"
            filter="url(#glow)" />
        <text x="35" y="30" fill="#ffaa00" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">Pandas</text>
        <text x="35" y="50" fill="#ffff00" font-family="monospace" font-size="12" font-weight="bold"
            text-anchor="middle">DataFrame()</text>
        <text x="35" y="70" fill="#ffaa00" font-family="monospace" font-size="12" font-weight="bold"
            text-anchor="middle">Converter</text>

        <!-- Arrows -->
        <path d="M -30 40 L -20 40" fill="none" stroke="#ff5555" stroke-width="4" marker-end="url(#arrow_c)" />
        <path d="M 90 40 L 100 40" fill="none" stroke="#00ffcc" stroke-width="4" marker-end="url(#arrow_c)" />
    </g>

    <!-- Pretty Table (Right) -->
    <g transform="translate(520, 150)">
        <!-- Glow behind table -->
        <rect x="-10" y="-10" width="300" height="240" fill="#001a11" stroke="#00ffcc" stroke-width="3" rx="10"
            filter="url(#glow)" />

        <text x="140" y="30" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">렌더링된 데이터 테이블 (Table UI)</text>

        <!-- Table Header -->
        <rect x="20" y="50" width="140" height="40" fill="#0d1b1a" stroke="#00ffcc" stroke-width="2" />
        <text x="90" y="75" fill="#4da6ff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">반려견 종류 (항목)</text>

        <rect x="160" y="50" width="100" height="40" fill="#0d1b1a" stroke="#00ffcc" stroke-width="2" />
        <text x="210" y="75" fill="#4da6ff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">학생 수 (도수)</text>

        <!-- Data Rows -->
        <!-- Row 1 -->
        <rect x="20" y="90" width="140" height="30" fill="#1b1b1b" stroke="#333" />
        <text x="90" y="110" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">포메라니안</text>
        <rect x="160" y="90" width="100" height="30" fill="#1b1b1b" stroke="#333" />
        <text x="210" y="110" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">12</text>

        <!-- Row 2 -->
        <rect x="20" y="120" width="140" height="30" fill="#0d0d0d" stroke="#333" />
        <text x="90" y="140" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">푸들</text>
        <rect x="160" y="120" width="100" height="30" fill="#0d0d0d" stroke="#333" />
        <text x="210" y="140" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">8</text>

        <!-- Row 3 -->
        <rect x="20" y="150" width="140" height="30" fill="#1b1b1b" stroke="#333" />
        <text x="90" y="170" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">허스키</text>
        <rect x="160" y="150" width="100" height="30" fill="#1b1b1b" stroke="#333" />
        <text x="210" y="170" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">2</text>

        <!-- Total Row (Safety Check) -->
        <rect x="20" y="180" width="140" height="35" fill="#330011" stroke="#ff5555" stroke-width="2" />
        <text x="90" y="203" fill="#ff5555" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">총 합계 (Total)</text>
        <rect x="160" y="180" width="100" height="35" fill="#330011" stroke="#ff5555" stroke-width="2" />
        <text x="210" y="205" fill="#ff5555" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">22</text>
    </g>

    <defs>
        <marker id="arrow_c" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" />
        </marker>
    </defs>

    <!-- Base Explain -->
    <rect x="100" y="450" width="700" height="100" rx="10" fill="#0d1b1a" stroke="#00ffcc" stroke-width="2" />
    <text x="450" y="480" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">"합계 행(Row) 생성: 가장 완벽한 수학적 데이터 누락 에러 탐지기"</text>
    <text x="450" y="510" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">
        표 맨 아랫줄의 <tspan fill="#ff5555" font-weight="bold">'총 합계'</tspan> 칸은 단순한 덧셈 결과가 아닙니다. 표를 그리기 전 측정했던 원시 데이터의
    </text>
    <text x="450" y="535" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">
        총량 숫자와 정밀하게 일치하는지 비교하는(Debugging) <tspan fill="#ffff00" font-weight="bold">통계학자들의 가장 견고한 안전장치</tspan> 입니다.
    </text>
</svg>