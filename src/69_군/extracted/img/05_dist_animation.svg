<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">분배법칙 심화 (Distributing a Negative)</text>

    <!-- The Initial Expression -->
    <g transform="translate(150, 150)">
        <!-- The Attacker / Distributor -->
        <rect x="-30" y="-40" width="50" height="50" rx="25" fill="#ff4d4d" filter="url(#glow)" />
        <text x="-5" y="-5" fill="#ffffff" font-family="monospace" font-size="35" font-weight="bold"
            text-anchor="middle">-</text>

        <text x="30" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold">(</text>

        <!-- Term 1 -->
        <text x="60" y="0" fill="#00ffcc" font-family="monospace" font-size="40" font-weight="bold">4</text>
        <text x="85" y="0" fill="#4da6ff" font-family="monospace" font-size="40" font-weight="bold">x²</text>

        <!-- Term 2 -->
        <text x="140" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"> - 2</text>
        <text x="215" y="0" fill="#4da6ff" font-family="monospace" font-size="40" font-weight="bold">x</text>

        <!-- Term 3 -->
        <text x="250" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"> + 1</text>

        <text x="320" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold">)</text>
    </g>

    <!-- Laser Beams of Distribution -->
    <!-- To 4x² -->
    <path d="M 145 130 Q 180 80 230 110" fill="none" stroke="#ff4d4d" stroke-width="4" stroke-dasharray="8"
        marker-end="url(#arrow_red)" />
    <circle cx="230" cy="115" r="8" fill="#ff4d4d" filter="url(#glow)" />

    <!-- To -2x -->
    <path d="M 145 125 Q 230 40 330 110" fill="none" stroke="#ff4d4d" stroke-width="4" stroke-dasharray="8"
        marker-end="url(#arrow_red)" />
    <circle cx="330" cy="115" r="8" fill="#ffaa00" filter="url(#glow)" />

    <!-- To +1 -->
    <path d="M 145 140 Q 250 -10 420 110" fill="none" stroke="#ff4d4d" stroke-width="4" stroke-dasharray="8"
        marker-end="url(#arrow_red)" />
    <circle cx="420" cy="115" r="8" fill="#ff4d4d" filter="url(#glow)" />

    <!-- Magic Transformation Arrow -->
    <text x="400" y="240" fill="#ffaa00" font-family="monospace" font-size="40" font-weight="bold"
        text-anchor="middle">↓ 부호 반전 ↓</text>

    <!-- The Result -->
    <g transform="translate(180, 320)">
        <!-- Term 1 result -->
        <rect x="-10" y="-40" width="110" height="50" rx="10" fill="#2b1111" stroke="#ff4d4d" stroke-width="2"
            filter="url(#glow)" />
        <text x="0" y="0" fill="#ff4d4d" font-family="monospace" font-size="40" font-weight="bold">-4</text>
        <text x="50" y="0" fill="#4da6ff" font-family="monospace" font-size="40" font-weight="bold">x²</text>

        <!-- Term 2 result -->
        <rect x="110" y="-40" width="110" height="50" rx="10" fill="#2b2200" stroke="#ffaa00" stroke-width="2"
            filter="url(#glow)" />
        <text x="120" y="0" fill="#ffaa00" font-family="monospace" font-size="40" font-weight="bold"> + 2</text>
        <text x="195" y="0" fill="#4da6ff" font-family="monospace" font-size="40" font-weight="bold">x</text>

        <!-- Term 3 result -->
        <rect x="230" y="-40" width="80" height="50" rx="10" fill="#2b1111" stroke="#ff4d4d" stroke-width="2"
            filter="url(#glow)" />
        <text x="240" y="0" fill="#ff4d4d" font-family="monospace" font-size="40" font-weight="bold"> - 1</text>
    </g>

</svg>