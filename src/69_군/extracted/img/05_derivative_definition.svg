<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">미분 계수 f'(a) vs 도함수 f'(x)</text>

    <!-- Left Side: f'(a) Single ticket -->
    <g transform="translate(50, 100)">
        <rect x="0" y="0" width="370" height="400" rx="20" fill="#112233" stroke="#00ffcc" stroke-width="4" />
        <text x="185" y="40" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">미분 계수 f'(a)</text>
        <text x="185" y="70" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">1회용 단건
            번호표</text>

        <!-- Function block -->
        <rect x="85" y="100" width="200" height="80" rx="10" fill="#0d1a26" stroke="#4da6ff" stroke-width="2" />
        <text x="185" y="130" fill="#4da6ff" font-family="monospace" font-size="18" text-anchor="middle">f(x) =
            x²</text>
        <text x="185" y="160" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">특정 좌표 <tspan
                fill="#ffff00" font-weight="bold">x = 3</tspan> 의뢰</text>

        <!-- Process arrow -->
        <path d="M 185 180 L 185 240" stroke="#00ffcc" stroke-width="4" marker-end="url(#arrow_cc)" />
        <text x="250" y="215" fill="#ffff00" font-family="monospace" font-size="14">lim (h→0)</text>

        <!-- Result block -->
        <rect x="85" y="250" width="200" height="100" rx="10" fill="#003322" stroke="#00ffcc" stroke-width="2" />
        <text x="185" y="290" fill="#00ffcc" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">f'(3) = 6</text>
        <text x="185" y="325" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">숫잣값 1개(스칼라)
            뱉음</text>
        <text x="185" y="360" fill="#ff0055" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">🚨 다른 x 원하면 처음부터 리미트 다시!</text>
    </g>

    <!-- Divider -->
    <line x1="450" y1="120" x2="450" y2="480" stroke="#555" stroke-dasharray="10 10" />

    <!-- Right Side: f'(x) Master Key -->
    <g transform="translate(480, 100)">
        <rect x="0" y="0" width="370" height="400" rx="20" fill="#221122" stroke="#ffaa00" stroke-width="4" />
        <text x="185" y="40" fill="#ffaa00" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">도함수 f'(x)</text>
        <text x="185" y="70" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">만능 스피드 치트
            자판기</text>

        <!-- Function block -->
        <rect x="85" y="100" width="200" height="80" rx="10" fill="#1a0d14" stroke="#ff0055" stroke-width="2" />
        <text x="185" y="130" fill="#ff0055" font-family="monospace" font-size="18" text-anchor="middle">f(x) =
            x²</text>
        <text x="185" y="160" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">미지수 <tspan
                fill="#ffff00" font-weight="bold">x</tspan> 그대로 통과!</text>

        <!-- Process arrow -->
        <path d="M 185 180 L 185 240" stroke="#ffaa00" stroke-width="4" marker-end="url(#arrow_aa)" />
        <text x="250" y="215" fill="#ffff00" font-family="monospace" font-size="14">lim (h→0)</text>

        <!-- Result block -->
        <rect x="85" y="250" width="200" height="120" rx="10" fill="#331100" stroke="#ffaa00" stroke-width="2" />
        <text x="185" y="290" fill="#ffaa00" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">f'(x) = 2x</text>
        <text x="185" y="320" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">함수식 자체(자판기)
            탄생!</text>
        <text x="185" y="340" fill="#ffaa00" font-family="sans-serif" font-size="14" text-anchor="middle">x=3 투입 -> 즉시 6
            뱉음</text>
        <text x="185" y="360" fill="#ffaa00" font-family="sans-serif" font-size="14" text-anchor="middle">x=10 투입 -> 즉시
            20 뱉음</text>
    </g>

    <!-- Arrow Definitions -->
    <defs>
        <marker id="arrow_cc" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#00ffcc" />
        </marker>
        <marker id="arrow_aa" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffaa00" />
        </marker>
    </defs>

    <!-- Explanation Footer -->
    <rect x="100" y="520" width="700" height="60" rx="10" fill="#0f0f15" stroke="#ffffff" stroke-width="2" />
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">도함수(f'(x))는 전체 맵
        데이터의 모든 기울기를 커버하는 강력한 <tspan fill="#ffaa00" font-weight="bold">리모컨(Function)</tspan> 입니다.</text>

</svg>