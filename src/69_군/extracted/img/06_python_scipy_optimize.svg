<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">Python SciPy 렌더링: 경사 하강법 (Gradient Descent) AI</text>

    <!-- Splitting the layout vertically -->

    <!-- Top part: The code -->
    <g transform="translate(100, 80)">
        <rect x="0" y="0" width="700" height="200" rx="15" fill="#0d141e" stroke="#223344" stroke-width="4" />
        <rect x="0" y="0" width="700" height="30" fill="#1a2533"
            style="border-top-left-radius: 15px; border-top-right-radius: 15px;" />

        <!-- Window controls -->
        <circle cx="20" cy="15" r="5" fill="#ff5f56" />
        <circle cx="35" cy="15" r="5" fill="#ffbd2e" />
        <circle cx="50" cy="15" r="5" fill="#27c93f" />
        <text x="350" y="20" fill="#aaaaaa" font-family="monospace" font-size="12"
            text-anchor="middle">scipy_minimize.py</text>

        <!-- Code Content -->
        <g transform="translate(20, 60)" font-family="monospace" font-size="16">
            <text x="0" y="0" fill="#ff7b72">from</text>
            <text x="45" y="0" fill="#ffffff">scipy.optimize</text>
            <text x="180" y="0" fill="#ff7b72">import</text>
            <text x="245" y="0" fill="#ffffff">minimize</text>

            <text x="0" y="35" fill="#ff7b72">def</text>
            <text x="35" y="35" fill="#d2a8ff">vol_func</text>
            <text x="110" y="35" fill="#ffffff">(x):</text>
            <text x="160" y="35" fill="#7a828e" font-size="12"># SciPy는 계곡(Min)만 파고드니까 - 를 붙여 산을 골짜기로 뒤집음!</text>

            <text x="30" y="65" fill="#ff7b72">return</text>
            <text x="95" y="65" fill="#79c0ff"> -</text>
            <text x="115" y="65" fill="#ffffff">(((24 - 2*x[0])**2) * x[0])</text>

            <!-- The core minimize command -->
            <text x="0" y="110" fill="#ffffff">res =</text>
            <text x="55" y="110" fill="#d2a8ff" font-weight="bold">minimize</text>
            <text x="135" y="110" fill="#ffffff">(vol_func, x0=[1.0], bounds=[(0.1, 11.9)])</text>
        </g>

        <!-- Highlight box for minimize -->
        <rect x="70" y="145" width="410" height="30" rx="5" fill="none" stroke="#00ffcc" stroke-width="2"
            filter="url(#glow)" />
        <text x="500" y="165" fill="#00ffcc" font-family="sans-serif" font-weight="bold" font-size="14">← AI 강제 추락 알고리즘
            발동!</text>
    </g>

    <!-- Bottom Part: The Gradient Descent Illustration -->
    <g transform="translate(100, 300)">
        <rect x="0" y="0" width="700" height="200" rx="15" fill="#110d1a" stroke="#ff0055" stroke-width="3" />

        <!-- The Mountain/Valley Surface -->
        <path d="M 50 150 C 150 150, 250 50, 350 150 S 550 150, 650 150" fill="none" stroke="#4da6ff" stroke-width="6"
            opacity="0.3" />
        <!-- The inverted function -vol_func creates a valley instead of a peak -->
        <path d="M 50 50 C 150 50, 250 150, 350 50 S 550 50, 650 50" fill="none" stroke="#ff0055" stroke-width="6"
            filter="url(#glow)" />

        <text x="200" y="35" fill="#ff0055" font-family="monospace" font-size="16" font-weight="bold">-V(x) 반전
            지형맵(계곡)</text>

        <!-- Gradient descent steps -->
        <!-- Start at x0=1.0 (left side going down) -->

        <!-- Step 1 -->
        <circle cx="100" cy="65" r="8" fill="#ffff00" stroke="#fff" stroke-width="2" />
        <text x="135" y="60" fill="#aaaaaa" font-family="monospace" font-size="12">Start x0</text>
        <path d="M 105 75 L 145 95" stroke="#ffff00" stroke-width="3" marker-end="url(#arrow_ai)" />

        <!-- Step 2 -->
        <circle cx="155" cy="100" r="8" fill="#ffff00" stroke="#fff" stroke-width="2" />
        <path d="M 160 110 L 210 130" stroke="#ffff00" stroke-width="3" marker-end="url(#arrow_ai)" />
        <text x="180" y="100" fill="#ffff00" font-family="sans-serif" font-size="14" transform="rotate(22 180 100)">기울기
            따라 이동...</text>

        <!-- Step 3 (The Bottom) -->
        <circle cx="230" cy="140" r="10" fill="#00ffcc" stroke="#fff" stroke-width="3" filter="url(#glow)" />
        <text x="230" y="170" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">Optimal: x = 4.0</text>

        <rect x="230" y="80" width="130" height="30" rx="5" fill="#003322" stroke="#00ffcc" />
        <text x="295" y="100" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">최적화 계곡 타격!</text>
    </g>

    <defs>
        <marker id="arrow_ai" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
        </marker>
    </defs>

    <!-- Explanation footer -->
    <rect x="150" y="520" width="600" height="40" rx="10" fill="#0f0f15" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="545" fill="#ffaa00" font-family="sans-serif" font-size="16" text-anchor="middle">
        AI는 그래프 모양을 몰라도 <tspan fill="#ffffff" font-weight="bold">기울기(미분)가 음수면 오른쪽, 양수면 왼쪽으로</tspan> 계곡 바닥을 찾아 미끄러집니다.
    </text>
</svg>