<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">눈을 의심하게 만드는 마법: 지수적 증가 (Exponential Growth)</text>

    <!-- Left: Linear Addition -->
    <g transform="translate(250, 300)">
        <rect x="-180" y="-200" width="360" height="380" rx="20" fill="#112233" stroke="#4da6ff" stroke-width="3" />
        <text x="0" y="-150" fill="#4da6ff" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">1. 선형적 세계 (더하기)</text>

        <!-- Formula -->
        <text x="0" y="-100" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">y = 2 × x</text>

        <!-- Steps -->
        <text x="-90" y="-30" fill="#aaaaaa" font-family="monospace" font-size="20" font-weight="bold">Step 1:</text>
        <text x="0" y="-30" fill="#ffffff" font-family="monospace" font-size="20">2 + 2 = 4</text>

        <text x="-90" y="10" fill="#aaaaaa" font-family="monospace" font-size="20" font-weight="bold">Step 2:</text>
        <text x="0" y="10" fill="#ffffff" font-family="monospace" font-size="20">4 + 2 = 6</text>

        <text x="-90" y="50" fill="#aaaaaa" font-family="monospace" font-size="20" font-weight="bold">Step 3:</text>
        <text x="0" y="50" fill="#ffffff" font-family="monospace" font-size="20">6 + 2 = 8</text>

        <text x="0" y="100" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">인간의 원시적 뇌가 가장 좋아하는 패턴</text>
        <path d="M -80 140 L 80 140" fill="none" stroke="#4da6ff" stroke-width="4" marker-end="url(#arrow)"
            filter="url(#glow)" />
        <text x="0" y="165" fill="#4da6ff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">지루하고 느린 일직선 성장</text>
    </g>

    <!-- Right: Exponential Multiplication -->
    <g transform="translate(650, 300)">
        <rect x="-180" y="-200" width="360" height="380" rx="20" fill="#2b1111" stroke="#ff4d4d" stroke-width="3" />
        <text x="0" y="-150" fill="#ff4d4d" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">2. 지수적 세계 (곱하기)</text>

        <!-- Formula -->
        <text x="-30" y="-100" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">y = 2</text>
        <text x="10" y="-115" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold"
            filter="url(#glow)">x</text>

        <!-- Steps -->
        <text x="-90" y="-30" fill="#aaaaaa" font-family="monospace" font-size="20" font-weight="bold">Step 1:</text>
        <text x="-20" y="-30" fill="#ffffff" font-family="monospace" font-size="20">2 × 2 = <tspan fill="#ff4d4d">4
            </tspan></text>

        <text x="-90" y="10" fill="#aaaaaa" font-family="monospace" font-size="20" font-weight="bold">Step 2:</text>
        <text x="-20" y="10" fill="#ffffff" font-family="monospace" font-size="20">4 × 2 = <tspan fill="#ff4d4d">8
            </tspan></text>

        <text x="-90" y="50" fill="#aaaaaa" font-family="monospace" font-size="20" font-weight="bold">Step 3:</text>
        <text x="-20" y="50" fill="#ffffff" font-family="monospace" font-size="20">8 × 2 = <tspan fill="#ff4d4d"
                filter="url(#glow)">16</tspan></text>

        <!-- Paper Folding Moon -->
        <text x="0" y="90" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">"0.1mm 종이를 50번 접으면 태양에 닿는다!"</text>
        <path d="M -80 140 Q 0 140 80 100" fill="none" stroke="#ff4d4d" stroke-width="4" marker-end="url(#arrow)"
            filter="url(#glow)" />
        <text x="0" y="155" fill="#ff4d4d" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">우주를 뚫고 나가는 폭발적 팽창</text>

    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="510" width="600" height="60" rx="10" fill="#112233" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="535" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">시간(x)이 상수가 아니라
        거듭제곱의 <tspan fill="#ffaa00" font-weight="bold">어깨 위 지수</tspan>로 올라가는 순간,</text>
    <text x="450" y="560" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">인간의 예측(선형)을 철저히
        붕괴시키는 무서운 폭발(기하급수)이 시작된다!</text>

</svg>