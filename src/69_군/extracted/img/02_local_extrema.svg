<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">극대(Local Max) 와 극소(Local Min) 탐지</text>

    <!-- Split screen to show Peak and Valley specifically -->

    <!-- Left Panel: Local Maximum (Peak) -->
    <g transform="translate(50, 100)">
        <rect x="0" y="0" width="380" height="380" rx="15" fill="#1b1111" stroke="#ff0055" stroke-width="3" />
        <text x="190" y="40" fill="#ff0055" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">봉우리 정상 (극대)</text>

        <!-- Mountain Curve -->
        <path d="M 50 280 Q 190 50 330 280" fill="none" stroke="#4da6ff" stroke-width="6" filter="url(#glow)" />

        <!-- Left Slope (Up) -->
        <line x1="60" y1="250" x2="140" y2="130" stroke="#ff0055" stroke-width="5" filter="url(#glow)" />
        <text x="100" y="210" fill="#ff0055" font-family="monospace" font-size="20" font-weight="bold"
            transform="rotate(-56 100 210)">+ (증가)</text>

        <!-- Peak -->
        <circle cx="190" cy="115" r="8" fill="#ffff00" stroke="#fff" stroke-width="2" filter="url(#glow)" />
        <line x1="130" y1="115" x2="250" y2="115" stroke="#ffff00" stroke-width="5" filter="url(#glow)" />
        <text x="190" y="90" fill="#ffff00" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">f'(x) = 0</text>
        <path d="M 190 140 L 190 320" stroke="#ffff00" stroke-width="2" stroke-dasharray="5 5" />
        <text x="190" y="340" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">극댓값 좌표 x</text>

        <!-- Right Slope (Down) -->
        <line x1="240" y1="130" x2="320" y2="250" stroke="#00ffcc" stroke-width="5" filter="url(#glow)" />
        <text x="270" y="190" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold"
            transform="rotate(56 270 190)">- (감소)</text>

        <!-- Sign change label -->
        <rect x="40" y="320" width="300" height="40" rx="5" fill="#330011" />
        <text x="190" y="345" fill="#ffffff" font-family="monospace" font-size="18" text-anchor="middle">기어 변속: [+] →
            [0] → [-]</text>
    </g>

    <!-- Right Panel: Local Minimum (Valley) -->
    <g transform="translate(470, 100)">
        <rect x="0" y="0" width="380" height="380" rx="15" fill="#0b1a26" stroke="#00ffcc" stroke-width="3" />
        <text x="190" y="40" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">계곡 밑바닥 (극소)</text>

        <!-- Valley Curve -->
        <path d="M 50 110 Q 190 340 330 110" fill="none" stroke="#4da6ff" stroke-width="6" filter="url(#glow)" />

        <!-- Left Slope (Down) -->
        <line x1="60" y1="140" x2="140" y2="260" stroke="#00ffcc" stroke-width="5" filter="url(#glow)" />
        <text x="90" y="190" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold"
            transform="rotate(56 90 190)">- (감소)</text>

        <!-- Valley Low -->
        <circle cx="190" cy="282" r="8" fill="#ffff00" stroke="#fff" stroke-width="2" filter="url(#glow)" />
        <line x1="130" y1="282" x2="250" y2="282" stroke="#ffff00" stroke-width="5" filter="url(#glow)" />
        <text x="190" y="315" fill="#ffff00" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">f'(x) = 0</text>
        <path d="M 190 260 L 190 80" stroke="#ffff00" stroke-width="2" stroke-dasharray="5 5" />
        <text x="190" y="70" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">극솟값 좌표 x</text>

        <!-- Right Slope (Up) -->
        <line x1="240" y1="260" x2="320" y2="140" stroke="#ff0055" stroke-width="5" filter="url(#glow)" />
        <text x="260" y="210" fill="#ff0055" font-family="monospace" font-size="20" font-weight="bold"
            transform="rotate(-56 260 210)">+ (증가)</text>

        <!-- Sign change label -->
        <rect x="40" y="320" width="300" height="40" rx="5" fill="#002233" />
        <text x="190" y="345" fill="#ffffff" font-family="monospace" font-size="18" text-anchor="middle">기어 변속: [-] →
            [0] → [+]</text>
    </g>

    <!-- Explanation Footer -->
    <rect x="150" y="520" width="600" height="50" rx="10" fill="#0f0f15" stroke="#ffff00" stroke-width="2" />
    <text x="450" y="550" fill="#ffff00" font-family="sans-serif" font-size="16" text-anchor="middle">도함수 f'(x) 값이 0을
        찍으면서 전후 <tspan fill="#ff0055">부호가 체인징</tspan> 되어야 완벽한 극값입니다.</text>

</svg>