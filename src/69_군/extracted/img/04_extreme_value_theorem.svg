<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">절대 감옥 렌더링: 최대 · 최소 정리</text>

    <!-- Coordinate System -->
    <line x1="200" y1="500" x2="800" y2="500" stroke="#555566" stroke-width="3" />
    <line x1="250" y1="550" x2="250" y2="100" stroke="#555566" stroke-width="3" />

    <!-- Closed Interval Walls (The Prison) -->
    <rect x="300" y="100" width="400" height="400" fill="rgba(0, 255, 204, 0.05)" />
    <line x1="300" y1="100" x2="300" y2="500" stroke="#00ffcc" stroke-width="3" stroke-dasharray="8 4"
        filter="url(#glow)" />
    <line x1="700" y1="100" x2="700" y2="500" stroke="#00ffcc" stroke-width="3" stroke-dasharray="8 4"
        filter="url(#glow)" />

    <circle cx="300" cy="500" r="6" fill="#00ffcc" />
    <text x="300" y="525" fill="#00ffcc" font-family="serif" font-size="20" font-weight="bold"
        text-anchor="middle">a</text>

    <circle cx="700" cy="500" r="6" fill="#00ffcc" />
    <text x="700" y="525" fill="#00ffcc" font-family="serif" font-size="20" font-weight="bold"
        text-anchor="middle">b</text>

    <text x="500" y="90" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">닫힌 구간 [ a, b ]</text>

    <!-- The Continuous Function Curve -->
    <!-- Starts high, dips low, goes up again, ends middle -->
    <path d="M 300 200 C 400 500, 500 500, 550 150 S 650 350, 700 300" fill="none" stroke="#ffaa00" stroke-width="6"
        filter="url(#glow)" />

    <!-- Endpoints included (Closed) -->
    <circle cx="300" cy="200" r="8" fill="#ffaa00" stroke="#ffffff" stroke-width="2" />
    <circle cx="700" cy="300" r="8" fill="#ffaa00" stroke="#ffffff" stroke-width="2" />

    <!-- Supreme MAX Point -->
    <circle cx="550" cy="150" r="10" fill="#ff0055" stroke="#ffffff" stroke-width="3" filter="url(#glow)" />
    <line x1="250" y1="150" x2="550" y2="150" stroke="#ff0055" stroke-width="2" stroke-dasharray="4 4" />
    <text x="180" y="155" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold">Max (최댓값)</text>

    <!-- Abyss MIN Point -->
    <circle cx="450" cy="400" r="10" fill="#4da6ff" stroke="#ffffff" stroke-width="3" filter="url(#glow)" />
    <!-- (Adjusting visual dip point based on curve drawn approx min is around x=450) -->
    <line x1="250" y1="400" x2="450" y2="400" stroke="#4da6ff" stroke-width="2" stroke-dasharray="4 4" />
    <text x="180" y="405" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold">Min (최솟값)</text>

    <!-- Banner -->
    <rect x="150" y="530" width="600" height="50" rx="10" fill="#0f0f15" stroke="#ffaa00" />
    <text x="450" y="560" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">"단단히 갇힌 닫힌 우주 공간
        속, 연속된 밧줄은 무조건 가장 높은/낮은 곳을 한 번은 찍게 되어있다."</text>

</svg>