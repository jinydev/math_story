<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">보이지 않는 일상의 지배자: 지수와 로그의 활용</text>

    <!-- 3 Blocks for Daily Life Applications -->

    <!-- 1. Decibel (Sound) -->
    <g transform="translate(150, 270)">
        <rect x="-130" y="-150" width="260" height="320" rx="15" fill="#331111" stroke="#ff4d4d" stroke-width="3"
            opacity="0.9" />

        <text x="0" y="-110" fill="#ff4d4d" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">소리 (데시벨 dB)</text>

        <text x="0" y="-60" fill="#ffffff" font-family="monospace" font-size="36" font-weight="bold"
            text-anchor="middle">+ 10 dB</text>
        <text x="0" y="-20" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">숫자는 10만
            올랐지만...</text>

        <path d="M 0 -5 L 0 25" fill="none" stroke="#ffaa00" stroke-width="4" marker-end="url(#arrow)" />

        <text x="0" y="60" fill="#ffaa00" font-family="monospace" font-size="40" font-weight="bold" text-anchor="middle"
            filter="url(#glow)">× 10 배</text>
        <text x="0" y="100" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">실제 파괴(진동) 에너지는</text>
        <text x="0" y="120" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">10배로 폭증한다!</text>

        <!-- 10^1 = 10 log10 -->
        <rect x="-80" y="140" width="160" height="20" rx="5" fill="#111111" />
        <text x="0" y="154" fill="#ff4d4d" font-family="monospace" font-size="12" font-weight="bold"
            text-anchor="middle">Log10 Base</text>
    </g>

    <!-- 2. Richter Scale (Earthquake) -->
    <g transform="translate(450, 270)">
        <rect x="-130" y="-150" width="260" height="320" rx="15" fill="#332211" stroke="#ffaa00" stroke-width="3"
            opacity="0.9" />

        <text x="0" y="-110" fill="#ffaa00" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">지진 (리히터 규모)</text>

        <text x="0" y="-60" fill="#ffffff" font-family="monospace" font-size="36" font-weight="bold"
            text-anchor="middle">M + 1.0</text>
        <text x="0" y="-20" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">스케일 1칸
            올랐지만...</text>

        <path d="M 0 -5 L 0 25" fill="none" stroke="#ff4d4d" stroke-width="4" marker-end="url(#arrow)" />

        <text x="0" y="60" fill="#ff4d4d" font-family="monospace" font-size="40" font-weight="bold" text-anchor="middle"
            filter="url(#glow)">× 31.6 배</text>
        <text x="0" y="100" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">지각을 파수하는 파괴력은</text>
        <text x="0" y="120" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">약 31.6배 팽창한다!</text>

        <!-- 10^1.5 -->
        <rect x="-80" y="140" width="160" height="20" rx="5" fill="#111111" />
        <text x="0" y="154" fill="#ffaa00" font-family="monospace" font-size="12" font-weight="bold"
            text-anchor="middle">10^(1.5 * M)</text>
    </g>

    <!-- 3. pH (Acidity) -->
    <g transform="translate(750, 270)">
        <rect x="-130" y="-150" width="260" height="320" rx="15" fill="#113322" stroke="#00ffcc" stroke-width="3"
            opacity="0.9" />

        <text x="0" y="-110" fill="#00ffcc" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">산성/염기성 (pH)</text>

        <text x="0" y="-60" fill="#ffffff" font-family="monospace" font-size="36" font-weight="bold"
            text-anchor="middle">- 1.0 pH</text>
        <text x="0" y="-20" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">숫자는 단지 1
            줄었으나...</text>

        <path d="M 0 -5 L 0 25" fill="none" stroke="#00ffcc" stroke-width="4" marker-end="url(#arrow)" />

        <text x="0" y="60" fill="#00ffcc" font-family="monospace" font-size="40" font-weight="bold" text-anchor="middle"
            filter="url(#glow)">+ 10 배 (산)</text>
        <text x="0" y="100" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">수소 이온의 신맛 농도는</text>
        <text x="0" y="120" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">10배로 상승한다!</text>

        <!-- -log10[H+] -->
        <rect x="-80" y="140" width="160" height="20" rx="5" fill="#111111" />
        <text x="0" y="154" fill="#00ffcc" font-family="monospace" font-size="12" font-weight="bold"
            text-anchor="middle">-Log10 [H+]</text>
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="500" width="600" height="60" rx="10" fill="#221133" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="525" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">세상의 엄청난 지수 현상을 작은
        <tspan fill="#ff00ff" font-weight="bold">로그형 숫자 캡슐</tspan>에 압축하여 통제하는</text>
    <text x="450" y="550" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">자연계의 필수 제어 코어
        알고리즘!</text>

</svg>