<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">전체 스케일 폭주 버프: 스칼라 배(Scalar Multiplication)</text>

    <g transform="translate(100, 200)">
        <!-- Scalar Value 3 -->
        <text x="30" y="100" fill="#ffff00" font-family="sans-serif" font-size="80" font-weight="bold"
            filter="url(#glow)">3</text>
        <text x="-40" y="140" fill="#ffff00" font-family="monospace" font-size="20" font-weight="bold">스칼라 (버프
            계수)</text>

        <text x="80" y="90" fill="#ffffff" font-family="sans-serif" font-size="40" font-weight="bold">×</text>

        <!-- Matrix A (2x2) -->
        <g transform="translate(130, 0)">
            <path d="M 30 -10 L 10 -10 L 10 170 L 30 170" fill="none" stroke="#4da6ff" stroke-width="6" />
            <path d="M 150 -10 L 170 -10 L 170 170 L 150 170" fill="none" stroke="#4da6ff" stroke-width="6" />
            <text x="90" y="-30" fill="#4da6ff" font-family="sans-serif" font-size="24" font-weight="bold"
                text-anchor="middle">원본 행렬 A</text>

            <g font-family="monospace" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">
                <text x="50" y="50">2</text>
                <text x="130" y="50">-1</text>
                <text x="50" y="130">0</text>
                <text x="130" y="130">4</text>
            </g>
        </g>

        <!-- Distribution Arrows -->
        <path d="M 70 80 Q 150 20 170 30" fill="none" stroke="#ffff00" stroke-dasharray="6 6" stroke-width="4"
            marker-end="url(#arrow_y)" />
        <path d="M 70 80 Q 200 -20 250 30" fill="none" stroke="#ffff00" stroke-dasharray="6 6" stroke-width="4"
            marker-end="url(#arrow_y)" />
        <path d="M 70 100 Q 150 140 170 130" fill="none" stroke="#ffff00" stroke-dasharray="6 6" stroke-width="4"
            marker-end="url(#arrow_y)" />
        <path d="M 70 100 Q 200 180 250 130" fill="none" stroke="#ffff00" stroke-dasharray="6 6" stroke-width="4"
            marker-end="url(#arrow_y)" />

        <text x="360" y="90" fill="#ffffff" font-family="sans-serif" font-size="60" font-weight="bold">=</text>

        <!-- Matrix 3A (Result) -->
        <g transform="translate(430, 0)">
            <path d="M 30 -20 L 10 -20 L 10 180 L 30 180" fill="none" stroke="#ff0055" stroke-width="8"
                filter="url(#glow)" />
            <path d="M 230 -20 L 250 -20 L 250 180 L 230 180" fill="none" stroke="#ff0055" stroke-width="8"
                filter="url(#glow)" />
            <text x="130" y="-30" fill="#ff0055" font-family="sans-serif" font-size="24" font-weight="bold"
                text-anchor="middle" filter="url(#glow)">버프 폭발체 (3A)</text>

            <g font-family="monospace" font-size="40" font-weight="bold" fill="#ff5588" text-anchor="middle">
                <text x="60" y="55">6</text>
                <text x="180" y="55">-3</text>
                <text x="60" y="135">0</text>
                <text x="180" y="135">12</text>
            </g>

            <!-- Subtext logic -->
            <g font-family="sans-serif" font-size="14" fill="#aaaaaa" text-anchor="middle">
                <text x="60" y="15">(3 x 2)</text>
                <text x="180" y="15">(3 x -1)</text>
                <text x="60" y="160">(3 x 0)</text>
                <text x="180" y="160">(3 x 4)</text>
            </g>
        </g>
    </g>

    <defs>
        <marker id="arrow_y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
        </marker>
    </defs>

    <rect x="150" y="510" width="600" height="60" rx="10" fill="#111100" stroke="#ffff00" stroke-width="2" />
    <text x="450" y="535" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        마치 포토샵의 <tspan fill="#ffff00" font-weight="bold">명도 300% 펌핑 버튼</tspan>을 누른 것처럼,
    </text>
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        단 하나의 스칼라 값이 모조리 융단폭격(분배)되어 <tspan fill="#ff0055" font-weight="bold">인벤토리의 전 스탯 픽셀</tspan>을 뻥튀기시킵니다.
    </text>
</svg>