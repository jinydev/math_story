<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">접선의 기울기 (Tangent Line Slope) = 미분 계수</text>

    <!-- Main graph area -->
    <g transform="translate(100, 150)">
        <!-- Grid -->
        <path d="M0,100 L700,100 M0,200 L700,200 M0,300 L700,300 M0,400 L700,400" stroke="#222" stroke-width="1" />
        <path d="M100,0 L100,400 M300,0 L300,400 M500,0 L500,400 M700,0 L700,400" stroke="#222" stroke-width="1" />

        <!-- Axes -->
        <line x1="0" y1="350" x2="750" y2="350" stroke="#00ffcc" stroke-width="3" />
        <text x="730" y="380" fill="#00ffcc" font-family="monospace" font-size="20">X (시간)</text>

        <line x1="50" y1="400" x2="50" y2="0" stroke="#00ffcc" stroke-width="3" />
        <text x="30" y="-10" fill="#00ffcc" font-family="monospace" font-size="20">Y (위치)</text>

        <!-- Mountain Curve f(x) -->
        <!-- Starts low, goes up, goes down, goes up -->
        <path d="M 50 300 C 150 100, 300 300, 450 150 S 650 250, 700 50" fill="none" stroke="#4da6ff" stroke-width="6"
            filter="url(#glow)" />
        <text x="650" y="30" fill="#4da6ff" font-family="monospace" font-size="24" font-weight="bold">y = f(x)</text>

        <!-- Point 1: Positive slope -->
        <circle cx="120" cy="205" r="8" fill="#ff0055" stroke="#fff" stroke-width="2" filter="url(#glow)" />
        <line x1="70" y1="285" x2="170" y2="125" stroke="#ff0055" stroke-width="4" filter="url(#glow)" />

        <rect x="20" y="100" width="120" height="40" rx="5" fill="#550022" stroke="#ff0055" />
        <text x="80" y="125" fill="#ff0055" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">f'(x₁) = +3</text>

        <!-- Point 2: Zero slope (Peak) -->
        <circle cx="215" cy="180" r="8" fill="#ffff00" stroke="#fff" stroke-width="2" filter="url(#glow)" />
        <line x1="135" y1="180" x2="295" y2="180" stroke="#ffff00" stroke-width="4" filter="url(#glow)" />

        <rect x="155" y="120" width="120" height="40" rx="5" fill="#555500" stroke="#ffff00" />
        <text x="215" y="145" fill="#ffff00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">f'(x₂) = 0 (정점)</text>

        <!-- Point 3: Negative slope -->
        <circle cx="340" cy="235" r="8" fill="#ff0055" stroke="#fff" stroke-width="2" filter="url(#glow)" />
        <line x1="290" y1="175" x2="390" y2="295" stroke="#ff0055" stroke-width="4" filter="url(#glow)" />

        <rect x="360" y="180" width="120" height="40" rx="5" fill="#550022" stroke="#ff0055" />
        <text x="420" y="205" fill="#ff0055" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">f'(x₃) = -2</text>

        <!-- Point 4: Steep positive slope -->
        <circle cx="530" cy="200" r="8" fill="#00ffcc" stroke="#fff" stroke-width="2" filter="url(#glow)" />
        <line x1="480" y1="300" x2="580" y2="100" stroke="#00ffcc" stroke-width="4" filter="url(#glow)" />

        <rect x="560" y="160" width="120" height="40" rx="5" fill="#003322" stroke="#00ffcc" />
        <text x="620" y="185" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">f'(x₄) = +6</text>
    </g>

    <!-- Explanation Footer -->
    <rect x="100" y="520" width="700" height="60" rx="10" fill="#0f0f15" stroke="#ff0055" stroke-width="3" />
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">특정 좌표 x스팟을 레이저
        빔(접선)으로 긁었을 때 나오는 빔의 기울기 = <tspan fill="#ff0055" font-weight="bold">"순간 스피드(미분계수)"</tspan></text>

</svg>