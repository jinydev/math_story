<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <!-- Glow filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">수형도 (Tree Diagram): 동전 1개 × 주사위 1개 시나리오</text>
    <text x="400" y="70" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">곱의 법칙 (AND 조건): 사건
        A (2가지) × 사건 B (6가지) = 총 12가지 분기점</text>

    <!-- Root Node -->
    <circle cx="100" cy="300" r="25" fill="#2d2d44" stroke="#ffffff" stroke-width="3" />
    <text x="100" y="306" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
        text-anchor="middle">Start</text>

    <!-- Level 1: Coin Toss (Heads/Tails) -->
    <!-- Heads (H) Branch -->
    <line x1="125" y1="300" x2="250" y2="150" stroke="#00ffcc" stroke-width="4" />
    <circle cx="250" cy="150" r="30" fill="#113322" stroke="#00ffcc" stroke-width="3" filter="url(#glow)" />
    <text x="250" y="157" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">앞 (H)</text>

    <!-- Tails (T) Branch -->
    <line x1="125" y1="300" x2="250" y2="450" stroke="#ff4d4d" stroke-width="4" />
    <circle cx="250" cy="450" r="30" fill="#331111" stroke="#ff4d4d" stroke-width="3" filter="url(#glow)" />
    <text x="250" y="457" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">뒤 (T)</text>

    <!-- Level 2: Dice Roll (1~6) for Heads -->
    <!-- H-1 to H-6 -->
    <g stroke="#00ffcc" stroke-width="2">
        <line x1="280" y1="150" x2="450" y2="50" />
        <line x1="280" y1="150" x2="450" y2="90" />
        <line x1="280" y1="150" x2="450" y2="130" />
        <line x1="280" y1="150" x2="450" y2="170" />
        <line x1="280" y1="150" x2="450" y2="210" />
        <line x1="280" y1="150" x2="450" y2="250" />
    </g>
    <g fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold">
        <circle cx="450" cy="50" r="15" fill="#2d2d44" /> <text x="450" y="55" text-anchor="middle">1</text>
        <circle cx="450" cy="90" r="15" fill="#2d2d44" /> <text x="450" y="95" text-anchor="middle">2</text>
        <circle cx="450" cy="130" r="15" fill="#2d2d44" /> <text x="450" y="135" text-anchor="middle">3</text>
        <circle cx="450" cy="170" r="15" fill="#2d2d44" /> <text x="450" y="175" text-anchor="middle">4</text>
        <circle cx="450" cy="210" r="15" fill="#2d2d44" /> <text x="450" y="215" text-anchor="middle">5</text>
        <circle cx="450" cy="250" r="15" fill="#2d2d44" /> <text x="450" y="255" text-anchor="middle">6</text>
    </g>

    <!-- Final Results Text for Heads -->
    <g fill="#aaaaaa" font-family="monospace" font-size="14" font-weight="bold">
        <text x="480" y="55">(앞, 1)</text>
        <text x="480" y="95">(앞, 2)</text>
        <text x="480" y="135">(앞, 3)</text>
        <text x="480" y="175">(앞, 4)</text>
        <text x="480" y="215">(앞, 5)</text>
        <text x="480" y="255">(앞, 6)</text>
    </g>

    <!-- Level 2: Dice Roll (1~6) for Tails -->
    <!-- T-1 to T-6 -->
    <g stroke="#ff4d4d" stroke-width="2">
        <line x1="280" y1="450" x2="450" y2="350" />
        <line x1="280" y1="450" x2="450" y2="390" />
        <line x1="280" y1="450" x2="450" y2="430" />
        <line x1="280" y1="450" x2="450" y2="470" />
        <line x1="280" y1="450" x2="450" y2="510" />
        <line x1="280" y1="450" x2="450" y2="550" />
    </g>
    <g fill="#ff4d4d" font-family="monospace" font-size="16" font-weight="bold">
        <circle cx="450" cy="350" r="15" fill="#2d2d44" /> <text x="450" y="355" text-anchor="middle">1</text>
        <circle cx="450" cy="390" r="15" fill="#2d2d44" /> <text x="450" y="395" text-anchor="middle">2</text>
        <circle cx="450" cy="430" r="15" fill="#2d2d44" /> <text x="450" y="435" text-anchor="middle">3</text>
        <circle cx="450" cy="470" r="15" fill="#2d2d44" /> <text x="450" y="475" text-anchor="middle">4</text>
        <circle cx="450" cy="510" r="15" fill="#2d2d44" /> <text x="450" y="515" text-anchor="middle">5</text>
        <circle cx="450" cy="550" r="15" fill="#2d2d44" /> <text x="450" y="555" text-anchor="middle">6</text>
    </g>

    <!-- Final Results Text for Tails -->
    <g fill="#aaaaaa" font-family="monospace" font-size="14" font-weight="bold">
        <text x="480" y="355">(뒤, 1)</text>
        <text x="480" y="395">(뒤, 2)</text>
        <text x="480" y="435">(뒤, 3)</text>
        <text x="480" y="475">(뒤, 4)</text>
        <text x="480" y="515">(뒤, 5)</text>
        <text x="480" y="555">(뒤, 6)</text>
    </g>

    <!-- Summary Box on Right -->
    <rect x="580" y="250" width="200" height="100" rx="10" fill="#2d2d44" stroke="#ffaa00" stroke-width="3"
        filter="url(#glow)" />
    <text x="680" y="290" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">총 나뭇잎 개수</text>
    <text x="680" y="325" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold"
        text-anchor="middle">12 개</text>

    <!-- Connecting brace logic representation -->
    <path d="M 550 50 Q 570 150 570 300 Q 570 450 550 550" fill="none" stroke="#555" stroke-width="2" />
    <line x1="570" y1="300" x2="580" y2="300" stroke="#555" stroke-width="2" />

</svg>