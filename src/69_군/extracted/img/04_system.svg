<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">이중 방화벽 해킹: 연립이차부등식 (System of Inequalities)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"두 개의 레이어 보안망을 수직선
        상단에 탑처럼 쌓아 올려, 비가 새지 않는 교집합(AND) 안전 지대만을 추출한다."</text>

    <!-- Main Graph Area -->
    <g transform="translate(100, 160)">

        <!-- Base Number Line -->
        <path d="M 0 200 L 700 200" fill="none" stroke="#fff" stroke-width="4" />

        <!-- Points on Number line: -2, 0, 2, 5 -->
        <!-- Scale: 1 unit = 50px. Origin = 250px x -->
        <g transform="translate(0, 200)">
            <circle cx="150" cy="0" r="6" fill="#000" stroke="#fff" stroke-width="2" />
            <text x="150" y="25" fill="#fff" font-weight="bold" font-size="16" text-anchor="middle">-2</text>

            <circle cx="250" cy="0" r="6" fill="#000" stroke="#fff" stroke-width="2" />
            <text x="250" y="25" fill="#fff" font-weight="bold" font-size="16" text-anchor="middle">0</text>

            <circle cx="350" cy="0" r="6" fill="#000" stroke="#fff" stroke-width="2" />
            <text x="350" y="25" fill="#fff" font-weight="bold" font-size="16" text-anchor="middle">2</text>

            <circle cx="500" cy="0" r="6" fill="#000" stroke="#fff" stroke-width="2" />
            <text x="500" y="25" fill="#fff" font-weight="bold" font-size="16" text-anchor="middle">5</text>
        </g>

        <!-- Layer 1 (Red Roof): x < -2 or x > 2 -->
        <g stroke="#ff5555" stroke-width="4" filter="url(#glow)">
            <!-- Left side (x < -2) -->
            <path d="M 150 200 L 150 140 L 0 140" fill="none" />
            <!-- Right side (x > 2) -->
            <path d="M 350 200 L 350 140 L 700 140" fill="none" />
        </g>
        <rect x="520" y="105" width="160" height="30" rx="5" fill="#220000" stroke="#ff5555" />
        <text x="600" y="125" fill="#ff5555" font-weight="bold" font-size="14" text-anchor="middle">1층: 조건식 1
            (x²-4>0)</text>

        <!-- Layer 2 (Blue Roof): 0 < x < 5 -->
        <g stroke="#0088ff" stroke-width="4" filter="url(#glow)">
            <!-- Connecting 0 and 5 -->
            <path d="M 250 200 L 250 80 L 500 80 L 500 200" fill="none" />
        </g>
        <rect x="300" y="45" width="160" height="30" rx="5" fill="#001122" stroke="#0088ff" />
        <text x="380" y="65" fill="#0088ff" font-weight="bold" font-size="14" text-anchor="middle">2층: 조건식 2 (x²-5x<0)<
                /text>

                <!-- The Intersection (Overlap Zone) x between 2 and 5 -->
                <!-- Safe region -->
                <rect x="350" y="80" width="150" height="120" fill="#00ffcc" opacity="0.3" />

                <path d="M 350 80 L 350 200 M 500 80 L 500 200" fill="none" stroke="#00ffcc" stroke-width="2"
                    stroke-dasharray="6 4" filter="url(#glow)" />

                <path d="M 350 200 L 500 200" fill="none" stroke="#00ffcc" stroke-width="8" filter="url(#glow)" />

                <!-- Rain (Laser scan) mapping the failure of other areas -->
                <!-- x < -2: only Red roof -->
                <path d="M 100 0 L 100 140" fill="none" stroke="#fff" stroke-dasharray="4 4" opacity="0.5" />
                <circle cx="100" cy="140" r="4" fill="#ff5555" /> <!-- Blocked at L1, L2 missing -> Fail -->
                <path d="M 100 140 L 100 200" fill="none" stroke="#ff5555" opacity="0.5" />
                <text x="100" y="-10" fill="#ff5555" font-size="12" text-anchor="middle">L2 부족 (Fail)</text>

                <!-- 0 < x < 2: only Blue roof -->
                <path d="M 300 0 L 300 80" fill="none" stroke="#fff" stroke-dasharray="4 4" opacity="0.5" />
                <circle cx="300" cy="80" r="4" fill="#0088ff" /> <!-- Blocked at L2, L1 missing -> Fail -->
                <path d="M 300 80 L 300 200" fill="none" stroke="#0088ff" opacity="0.5" />
                <text x="300" y="-10" fill="#0088ff" font-size="12" text-anchor="middle">L1 누수 (Fail)</text>

                <!-- 2 < x < 5: Both roofs -->
                <path d="M 425 0 L 425 80" fill="none" stroke="#00ffcc" stroke-dasharray="8 4" stroke-width="2"
                    filter="url(#glow)" />
                <path d="M 425 80 L 425 140" fill="none" stroke="#00ffcc" stroke-dasharray="8 4" stroke-width="2"
                    filter="url(#glow)" />
                <circle cx="425" cy="80" r="5" fill="#00ffcc" />
                <circle cx="425" cy="140" r="5" fill="#00ffcc" />
                <text x="425" y="-10" fill="#00ffcc" font-size="14" font-weight="bold" text-anchor="middle"
                    filter="url(#glow)">완벽 교집합 (Success!)</text>
    </g>

    <!-- Big Alert Bottom -->
    <rect x="100" y="470" width="700" height="90" rx="10" fill="#002222" stroke="#00ffcc" stroke-width="2" />
    <text x="450" y="500" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        연립방정식 기호의 진짜 의미: "데이터베이스 필터 1 레이어 AND 필터 2 레이어"
    </text>
    <text x="450" y="525" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        머리로 암산하면 100% 꼬인다. 무조건 1차원 선(Line) 을 긋고, 각 마스크 영역을
    </text>
    <text x="450" y="550" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">
        서로 다른 층계수(1층, 2층, 3층...) 의 지붕으로 렌더링한 뒤, 수직 단면을 잘라라!
    </text>
</svg>