<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">우주가 선택한 완벽한 포장지: 구의 겉넓이</text>

    <!-- Title Description -->
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">아르키메데스의 소름 돋는 발견:
        "가죽 4장이면 공을 완벽히 덮는다!"</text>

    <!-- Left: A 3D Sphere -->
    <g transform="translate(250, 270)">

        <!-- Outer Sphere Halo (Glow) -->
        <circle cx="0" cy="0" r="122" fill="#00ffcc" opacity="0.1" filter="url(#glow)" />

        <!-- The Sphere Body -->
        <circle cx="0" cy="0" r="120" fill="none" stroke="#00ffcc" stroke-width="4" />

        <!-- Equator line (Horizontal slicing) -->
        <ellipse cx="0" cy="0" rx="120" ry="40" fill="none" stroke="#00ffcc" stroke-width="3" stroke-dasharray="10 6" />
        <ellipse cx="0" cy="0" rx="120" ry="40" fill="#00ffcc" opacity="0.2" />

        <!-- Center Point & Radius -->
        <circle cx="0" cy="0" r="6" fill="#ffffff" filter="url(#glow)" />
        <line x1="0" y1="0" x2="120" y2="0" stroke="#ffffff" stroke-width="3" />
        <text x="60" y="-15" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">r</text>

        <!-- Subtitle -->
        <text x="0" y="160" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">3D 공간 속 아름다운 구슬의 표피</text>

    </g>

    <!-- Equal sign -->
    <text x="450" y="280" fill="#ff4d4d" font-family="sans-serif" font-size="60" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">=</text>

    <!-- Right: 4 Flat Circles -->
    <g transform="translate(680, 270)">

        <text x="0" y="-120" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">가장 뚱뚱한 허리춤을 썬 '평면 원' 4장</text>

        <!-- Circle 1 (Top Left) -->
        <g transform="translate(-60, -40)">
            <circle cx="0" cy="0" r="50" fill="#ffaa00" opacity="0.3" stroke="#ffaa00" stroke-width="3" />
            <text x="0" y="5" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
                text-anchor="middle">πr²</text>
        </g>

        <!-- Circle 2 (Top Right) -->
        <g transform="translate(60, -40)">
            <circle cx="0" cy="0" r="50" fill="#ffaa00" opacity="0.3" stroke="#ffaa00" stroke-width="3" />
            <text x="0" y="5" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
                text-anchor="middle">πr²</text>
        </g>

        <!-- Circle 3 (Bottom Left) -->
        <g transform="translate(-60, 70)">
            <circle cx="0" cy="0" r="50" fill="#ffaa00" opacity="0.3" stroke="#ffaa00" stroke-width="3" />
            <text x="0" y="5" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
                text-anchor="middle">πr²</text>
        </g>

        <!-- Circle 4 (Bottom Right) -->
        <g transform="translate(60, 70)">
            <circle cx="0" cy="0" r="50" fill="#ffaa00" opacity="0.3" stroke="#ffaa00" stroke-width="3" />
            <text x="0" y="5" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
                text-anchor="middle">πr²</text>
        </g>

        <text x="0" y="160" fill="#ffaa00" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">표면 가죽 넓이 = 4 πr²</text>

    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="500" width="600" height="70" rx="10" fill="#221133" stroke="#00ffcc" stroke-width="2" />
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">자연계가 '에너지 방어 가성비'를
        위해 둥근 빗방울 모양을 채택하는 이유!</text>
    <text x="450" y="555" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">NASA의 천체 지표면 복사 패널
        발주량을 계산하는 가장 완벽한 대수학 룰.</text>

</svg>