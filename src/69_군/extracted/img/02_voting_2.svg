<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">정보 손실(Data Loss) 복구: 보다(Borda) 가중치 포인트 시스템</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"1명만 찍는 순간 2지망,
        3지망의 귀중한 민심 데이터는 삭제된다. 순위에 가중치(Point)를 곱해 누적시켜라!"</text>

    <!-- Left: A single Voter's Ballot -->
    <g transform="translate(100, 150)">
        <rect x="-20" y="-30" width="280" height="280" rx="15" fill="#1b1b1b" stroke="#ffff00" stroke-width="3" />
        <text x="120" y="0" fill="#ffff00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">스마트 투표 용지</text>

        <!-- Rank 1 -->
        <rect x="20" y="30" width="200" height="50" rx="5" fill="#003322" stroke="#00ffcc" />
        <text x="40" y="60" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold">1지망</text>
        <text x="110" y="60" fill="#ffffff" font-family="sans-serif" font-size="22" font-weight="bold">후보 A</text>
        <text x="250" y="60" fill="#ffaa00" font-family="monospace" font-size="18" font-weight="bold"
            filter="url(#glow)">+3 pt</text>

        <!-- Rank 2 -->
        <rect x="20" y="100" width="200" height="50" rx="5" fill="#001133" stroke="#4da6ff" />
        <text x="40" y="130" fill="#4da6ff" font-family="monospace" font-size="18" font-weight="bold">2지망</text>
        <text x="110" y="130" fill="#ffffff" font-family="sans-serif" font-size="22" font-weight="bold">후보 B</text>
        <text x="250" y="130" fill="#ffaa00" font-family="monospace" font-size="18" font-weight="bold"
            filter="url(#glow)">+2 pt</text>

        <!-- Rank 3 -->
        <rect x="20" y="170" width="200" height="50" rx="5" fill="#331111" stroke="#ff5555" />
        <text x="40" y="200" fill="#ff5555" font-family="monospace" font-size="18" font-weight="bold">3지망</text>
        <text x="110" y="200" fill="#ffffff" font-family="sans-serif" font-size="22" font-weight="bold">후보 C</text>
        <text x="250" y="200" fill="#ffaa00" font-family="monospace" font-size="18" font-weight="bold"
            filter="url(#glow)">+1 pt</text>
    </g>

    <!-- Accumulation Engine -->
    <g transform="translate(420, 230)">
        <path d="M 0 0 L 50 -10 L 50 10 Z" fill="#ffaa00" filter="url(#glow)" />
        <path d="M 50 -10 L 100 0 L 50 10 Z" fill="#ffaa00" filter="url(#glow)" />
        <text x="50" y="30" fill="#ffff00" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">Score += Point</text>
    </g>

    <!-- Right: Scoreboard (Borda Result) -->
    <g transform="translate(560, 150)">
        <rect x="-20" y="-30" width="280" height="280" rx="15" fill="#0d1b1a" stroke="#00ffcc" stroke-width="3" />
        <text x="120" y="0" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">가중치 누적 스코어보드</text>

        <!-- Candidate A Result (Polarized) -->
        <rect x="20" y="40" width="200" height="40" rx="5" fill="#111" stroke="#333" />
        <text x="35" y="65" fill="#ffffff" font-family="sans-serif" font-size="16">A (호불호 충돌)</text>
        <rect x="20" y="40" width="120" height="40" rx="5" fill="#ff00ff" opacity="0.6" />
        <text x="245" y="65" fill="#ff00ff" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">160 pt</text>

        <!-- Candidate B Result (Consensus Winner) -->
        <rect x="20" y="110" width="200" height="40" rx="5" fill="#111" stroke="#333" />
        <text x="35" y="135" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">B (극강의
            무난함)</text>
        <rect x="20" y="110" width="180" height="40" rx="5" fill="#ffff00" opacity="0.8" filter="url(#glow)" />
        <text x="245" y="135" fill="#ffff00" font-family="monospace" font-size="22" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">210 pt</text>

        <!-- Candidate C Result (Weak) -->
        <rect x="20" y="180" width="200" height="40" rx="5" fill="#111" stroke="#333" />
        <text x="35" y="205" fill="#ffffff" font-family="sans-serif" font-size="16">C (경쟁력 약화)</text>
        <rect x="20" y="180" width="80" height="40" rx="5" fill="#4da6ff" opacity="0.6" />
        <text x="245" y="205" fill="#4da6ff" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">110 pt</text>

        <text x="120" y="260" fill="#ffff00" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">극단적 분쟁 봉합: "B면 아쉽진 않지"</text>
    </g>

    <!-- Base Explain -->
    <rect x="100" y="480" width="700" height="80" rx="10" fill="#1a1100" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="510" fill="#ffffff" font-family="sans-serif" font-size="15" text-anchor="middle">
        단 한 명만 고르는 투표에서는 <tspan fill="#ff00ff" font-weight="bold">차선책(2지망) 이라는 소중한 정보가 증발(Data Loss)</tspan> 합니다.
    </text>
    <text x="450" y="540" fill="#ffffff" font-family="sans-serif" font-size="15" text-anchor="middle">
        보르다는 각 등수별로 가중치 포인트를 먹여, 강성 팬덤을 가진 자보다 <tspan fill="#ffff00" font-weight="bold">모두에게 적당히 욕 안 먹는 자</tspan>가 당선되도록
        유도했습니다.
    </text>
</svg>