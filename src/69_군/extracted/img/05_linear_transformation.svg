<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">시공간을 회전시키는 마법진: 선형 변환 (Linear Transformation)</text>

    <!-- Left: Original 2D Coordinate System -->
    <g transform="translate(150, 250)">
        <text x="0" y="-120" fill="#4da6ff" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">기존 2D 맵 좌표 (2, 1)</text>

        <!-- Grid -->
        <path d="M -100 -100 L 100 -100 M -100 -50 L 100 -50 M -100 0 L 100 0 M -100 50 L 100 50 M -100 100 L 100 100"
            stroke="#334455" stroke-width="1" />
        <path d="M -100 -100 L -100 100 M -50 -100 L -50 100 M 0 -100 L 0 100 M 50 -100 L 50 100 M 100 -100 L 100 100"
            stroke="#334455" stroke-width="1" />

        <!-- Axes -->
        <line x1="-120" y1="0" x2="120" y2="0" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow_w)" />
        <line x1="0" y1="120" x2="0" y2="-120" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow_w)" />

        <!-- The original vector (2, 1) -> (100, -50) because Y is up(negative SVG) -->
        <line x1="0" y1="0" x2="100" y2="-50" stroke="#4da6ff" stroke-width="6" marker-end="url(#arrow_b)"
            filter="url(#glow)" />
        <circle cx="100" cy="-50" r="8" fill="#4da6ff" />
        <text x="120" y="-60" fill="#4da6ff" font-family="monospace" font-size="20" font-weight="bold">v = </text>
        <text x="160" y="-75" fill="#4da6ff" font-family="monospace" font-size="18">[2]</text>
        <text x="160" y="-55" fill="#4da6ff" font-family="monospace" font-size="18">[1]</text>
    </g>

    <!-- Giant Transformation Effect -->
    <g transform="translate(450, 250)">
        <!-- Magic Matrix Card -->
        <rect x="-60" y="-80" width="120" height="150" fill="#221133" stroke="#ff00ff" stroke-width="4" rx="10"
            filter="url(#glow)" />
        <text x="0" y="-100" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">90도 회전 부적 (행렬 R)</text>

        <g font-family="monospace" font-size="24" font-weight="bold" fill="#ffaa00" text-anchor="middle">
            <text x="-25" y="-30">0</text>
            <text x="25" y="-30">-1</text>
            <text x="-25" y="10">1</text>
            <text x="25" y="10">0</text>
        </g>

        <text x="0" y="50" fill="#ff00ff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">R × v</text>
        <path d="M -80 0 L -120 0" stroke="#ff00ff" stroke-width="6" marker-end="url(#arrow_m)" />
        <path d="M 80 0 L 120 0" stroke="#ff00ff" stroke-width="6" marker-end="url(#arrow_m)" />
    </g>

    <!-- Right: Warped 2D Coordinate System -->
    <g transform="translate(750, 250)">
        <text x="0" y="-120" fill="#ff0055" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">회전 완료 맵 (-1, 2)</text>

        <!-- Grid (Rotated visually) -->
        <!-- Notice axes are the same, just vector moved -->
        <path d="M -100 -100 L 100 -100 M -100 -50 L 100 -50 M -100 0 L 100 0 M -100 50 L 100 50 M -100 100 L 100 100"
            stroke="#334455" stroke-width="1" />
        <path d="M -100 -100 L -100 100 M -50 -100 L -50 100 M 0 -100 L 0 100 M 50 -100 L 50 100 M 100 -100 L 100 100"
            stroke="#334455" stroke-width="1" />

        <line x1="-120" y1="0" x2="120" y2="0" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow_w)" />
        <line x1="0" y1="120" x2="0" y2="-120" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow_w)" />

        <!-- New Vector (-1, 2) -> (-50, -100) -->
        <line x1="0" y1="0" x2="-50" y2="-100" stroke="#ff0055" stroke-width="6" marker-end="url(#arrow_r)"
            filter="url(#glow)" />
        <circle cx="-50" cy="-100" r="8" fill="#ff0055" />
        <text x="-80" y="-115" fill="#ff0055" font-family="monospace" font-size="20" font-weight="bold">v' = </text>
        <text x="-40" y="-130" fill="#ff0055" font-family="monospace" font-size="18">[-1]</text>
        <text x="-40" y="-110" fill="#ff0055" font-family="monospace" font-size="18">[ 2]</text>

        <!-- Curved Angle Arc -->
        <path d="M 40 -20 A 45 45 0 0 0 -20 -40" fill="none" stroke="#ffff00" stroke-width="3" stroke-dasharray="8 4"
            marker-end="url(#arrow_y)" />
        <text x="30" y="-45" fill="#ffff00" font-family="sans-serif" font-size="16" font-weight="bold">90° 회전!</text>
    </g>

    <!-- Mathematical explanation -->
    <g transform="translate(150, 440)">
        <rect x="0" y="0" width="600" height="60" rx="10" fill="#110d1a" stroke="#00ffcc" stroke-width="2" />
        <text x="300" y="35" fill="#ffffff" font-family="monospace" font-size="22" font-weight="bold"
            text-anchor="middle">
            <tspan fill="#ff00ff">[행렬 R 부적]</tspan> × <tspan fill="#4da6ff">[2, 1]</tspan> = <tspan fill="#ff0055">[-1,
                2]</tspan>
        </text>
    </g>

    <defs>
        <marker id="arrow_w" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" />
        </marker>
        <marker id="arrow_b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#4da6ff" />
        </marker>
        <marker id="arrow_r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ff0055" />
        </marker>
        <marker id="arrow_y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
        </marker>
        <marker id="arrow_m" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ff00ff" />
        </marker>
    </defs>

    <rect x="150" y="530" width="600" height="40" rx="10" fill="#0f0f15" stroke="#ffffff" stroke-width="2" />
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        행렬을 곱한다는 것은 단순히 숫자를 맞추는 게 아니라 <tspan fill="#ff00ff" font-weight="bold">우주 공간을 강제로 왜곡</tspan>시키는 거대한 렌더링 스펠입니다.
    </text>
</svg>