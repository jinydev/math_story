<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .tri-acute {
                fill: rgba(255, 255, 0, 0.2);
                stroke: #ffff00;
                stroke-width: 3;
            }

            .tri-right {
                fill: rgba(0, 255, 255, 0.2);
                stroke: #00ffff;
                stroke-width: 3;
            }

            .tri-obtuse {
                fill: rgba(255, 0, 100, 0.2);
                stroke: #ff0064;
                stroke-width: 3;
            }

            .formula {
                font-size: 18px;
            }

            .f-acute {
                fill: #ffff00;
            }

            .f-right {
                fill: #00ffff;
            }

            .f-obtuse {
                fill: #ff0064;
            }

            .glow-right {
                filter: drop-shadow(0 0 10px #00ffff);
            }
        </style>
    </defs>

    <rect width="100%" height="100%" fill="#0d1117" />

    <text x="300" y="50" fill="#00ffff" font-size="28" text-anchor="middle">피타고라스 역증명 (Converse Validator)</text>
    <text x="300" y="80" fill="#a0a0a0" font-size="16" text-anchor="middle">세 변의 길이만으로 각도를 판독하는 파이썬 논리 엔진</text>

    <!-- 1. Acute Triangle -->
    <g transform="translate(100, 180)">
        <!-- Base 100, height 120, top point at x=50. left side ~130, right side ~130, base=100 -->
        <!-- wait, a^2+b^2 > c^2 for acute -->
        <polygon points="0,0 120,0 60,-100" class="tri-acute" />
        <text x="-15" y="-50" fill="#ffff00" font-size="20">a</text>
        <text x="125" y="-50" fill="#ffff00" font-size="20">b</text>
        <text x="50" y="25" fill="#ffff00" font-size="20">c</text>
        <text x="60" y="60" class="formula f-acute" text-anchor="middle">c² &lt; a² + b²</text>
        <text x="60" y="85" class="formula f-acute" text-anchor="middle">예각 삼각형</text>
    </g>

    <!-- 2. Right Triangle -->
    <g transform="translate(350, 180)" class="glow-right">
        <!-- Base 120, height 100. a=100, b=120, c=~156 -->
        <polygon points="0,0 120,0 0,-100" class="tri-right" />
        <!-- Right angle indicator -->
        <polyline points="0,-15 15,-15 15,0" fill="none" stroke="#00ffff" stroke-width="2" />
        <text x="-20" y="-50" fill="#00ffff" font-size="20">a</text>
        <text x="60" y="-60" fill="#00ffff" font-size="20">c</text>
        <text x="60" y="25" fill="#00ffff" font-size="20">b</text>
        <text x="60" y="60" class="formula f-right" text-anchor="middle">c² = a² + b²</text>
        <text x="60" y="85" class="formula f-right" text-anchor="middle">직각 삼각형 (90°)</text>
    </g>

    <!-- 3. Obtuse Triangle -->
    <g transform="translate(200, 420)">
        <!-- Base 180, a is leaning left. c is very long -->
        <polygon points="0,0 200,0 -80,-80" class="tri-obtuse" />
        <text x="-60" y="-30" fill="#ff0064" font-size="20">a</text>
        <text x="70" y="-50" fill="#ff0064" font-size="20">c</text>
        <text x="100" y="25" fill="#ff0064" font-size="20">b</text>
        <text x="100" y="60" class="formula f-obtuse" text-anchor="middle">c² > a² + b²</text>
        <text x="100" y="85" class="formula f-obtuse" text-anchor="middle">둔각 삼각형</text>
    </g>

</svg>