<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .circle {
                fill: none;
                stroke: #30363d;
                stroke-width: 4;
            }

            .tick {
                stroke: #8b949e;
                stroke-width: 2;
            }

            .number {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
                alignment-baseline: middle;
            }

            .path-arc {
                fill: none;
                stroke: #ff6464;
                stroke-width: 5;
                stroke-dasharray: 8, 4;
                stroke-linecap: round;
            }

            .path-arc2 {
                fill: none;
                stroke: #00ffff;
                stroke-width: 5;
                stroke-linecap: round;
                marker-end: url(#arrowBlue);
            }

            .title {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
            }

            .desc {
                fill: #ffaa64;
                font-size: 18px;
                text-anchor: middle;
            }
        </style>
        <marker id="arrowBlue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffff" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="40" class="title">모듈러 연산 쳇바퀴 (Modulo 시계)</text>
    <text x="400" y="65" class="desc">"10시에서 5시간이 지나면 왜 15시가 아니라 3시인가?"</text>

    <g transform="translate(400, 240)">
        <!-- Base Circle -->
        <circle cx="0" cy="0" r="120" class="circle" />

        <!-- 12 numbers -->
        <!-- 0 at top (-90 deg) -->
        <text x="0" y="-140" class="number">0</text>
        <text x="70" y="-121" class="number">1</text>
        <text x="121" y="-70" class="number">2</text>
        <text x="140" y="0" class="number" fill="#00ffff">3</text>
        <text x="121" y="70" class="number">4</text>
        <text x="70" y="121" class="number">5</text>
        <text x="0" y="140" class="number">6</text>
        <text x="-70" y="121" class="number">7</text>
        <text x="-121" y="70" class="number">8</text>
        <text x="-140" y="0" class="number">9</text>
        <text x="-121" y="-70" class="number" fill="#ff6464">10</text>
        <text x="-70" y="-121" class="number">11</text>

        <!-- Tick marks -->
        <line x1="0" y1="-120" x2="0" y2="-110" class="tick" />
        <line x1="0" y1="120" x2="0" y2="110" class="tick" />
        <line x1="-120" y1="0" x2="-110" y2="0" class="tick" />
        <line x1="120" y1="0" x2="110" y2="0" class="tick" />

        <!-- Center Point -->
        <circle cx="0" cy="0" r="5" fill="#ffffff" />

        <!-- Arrow 1 (Go to 10) -->
        <!-- Path from 0 to 10 clockwise: radius 80 -->
        <path d="M 0 -80 A 80 80 0 1 1 -69 -40" class="path-arc" />

        <!-- Arrow 2 (Add 5, going past 11 and 0 to reach 3) -->
        <!-- Start at 10 (-69, -40), radius 100 -->
        <!-- 10 is at 300 deg, 3 is at 90 deg. Diff = 150 deg -->
        <path d="M -86 -50 A 100 100 0 0 1 100 0" class="path-arc2" />

        <!-- Math text -->
        <rect x="-100" y="-40" width="200" height="80" fill="#161b22" rx="10" />
        <text x="0" y="-10" fill="#ffffff" font-size="20" text-anchor="middle">10 + 5 = 15</text>
        <text x="0" y="20" fill="#64ff64" font-size="20" text-anchor="middle">15 ≡ 3 (mod 12)</text>
    </g>
</svg>