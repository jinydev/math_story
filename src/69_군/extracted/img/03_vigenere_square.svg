<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .grid-line {
                stroke: #30363d;
                stroke-width: 1;
            }

            .axis-bg {
                fill: #161b22;
            }

            .highlight-bg {
                fill: rgba(0, 255, 255, 0.15);
            }

            .cross-bg {
                fill: rgba(255, 100, 100, 0.4);
            }

            .label-text {
                fill: #ffffff;
                font-size: 16px;
                text-anchor: middle;
                alignment-baseline: middle;
            }

            .axis-text {
                fill: #8b949e;
                font-size: 18px;
                text-anchor: middle;
                alignment-baseline: middle;
            }

            .target-text {
                fill: #00ffff;
                font-size: 20px;
                text-anchor: middle;
                alignment-baseline: middle;
            }

            .cross-text {
                fill: #ffffff;
                font-size: 22px;
                text-anchor: middle;
                alignment-baseline: middle;
            }

            .title {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
            }

            .desc {
                fill: #ffaa64;
                font-size: 16px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="40" class="title">비제네르 사각형 (Vigenère Square) 교차 매핑 원환도</text>
    <text x="400" y="65" class="desc">Key="CAT" &amp; Plain="HELLO" ➔ Cipher="JEL..." 다중 치환</text>

    <!-- Table Origin -->
    <g transform="translate(100, 120)">
        <!-- Header Backgrounds -->
        <rect x="0" y="-40" width="40" height="40" class="axis-bg" />
        <rect x="40" y="-40" width="560" height="40" class="axis-bg" />
        <rect x="0" y="0" width="40" height="280" class="axis-bg" />

        <!-- Vertical Lines -->
        <line x1="40" y1="-40" x2="40" y2="280" class="grid-line" />
        <line x1="80" y1="-40" x2="80" y2="280" class="grid-line" />
        <!-- Skipping to H, E, L -->
        <line x1="320" y1="-40" x2="320" y2="280" class="grid-line" />
        <line x1="360" y1="-40" x2="360" y2="280" class="grid-line" />

        <!-- Horizontal Lines -->
        <line x1="0" y1="0" x2="600" y2="0" class="grid-line" />
        <line x1="0" y1="40" x2="600" y2="40" class="grid-line" />
        <line x1="0" y1="80" x2="600" y2="80" class="grid-line" />
        <line x1="0" y1="120" x2="600" y2="120" class="grid-line" />

        <!-- Top Row labels (Plain) -->
        <text x="60" y="-20" class="axis-text">A</text>
        <text x="220" y="-20" class="target-text">E</text>
        <text x="340" y="-20" class="target-text">H</text>
        <text x="500" y="-20" class="target-text">L</text>

        <!-- Left Column labels (Key) -->
        <text x="20" y="20" class="target-text">A</text>
        <text x="20" y="100" class="target-text">C</text>
        <text x="20" y="220" class="axis-text">T</text>

        <!-- H and C Intersection (Plain H + Key C) -->
        <!-- C is row 3 (y=80~120), H is col 8 (x=320~360) -->
        <rect x="320" y="80" width="40" height="40" class="highlight-bg" />
        <rect x="40" y="80" width="280" height="40" fill="rgba(0, 255, 255, 0.05)" />
        <rect x="320" y="0" width="40" height="80" fill="rgba(0, 255, 255, 0.05)" />
        <rect x="320" y="80" width="40" height="40" class="cross-bg" />
        <text x="340" y="100" class="cross-text">J</text>

        <!-- E and A Intersection (Plain E + Key A) -->
        <!-- A is row 1 (y=0~40), E is col 5 (x=200~240) -->
        <rect x="200" y="0" width="40" height="40" class="highlight-bg" />
        <rect x="40" y="0" width="160" height="40" fill="rgba(0, 255, 255, 0.05)" />
        <rect x="200" y="0" width="40" height="0" fill="rgba(0, 255, 255, 0.05)" />
        <rect x="200" y="0" width="40" height="40" fill="rgba(255, 100, 100, 0.4)" />
        <text x="220" y="20" class="cross-text">E</text>

        <!-- Info panel -->
        <rect x="400" y="150" width="180" height="100" fill="#161b22" rx="10" />
        <text x="490" y="175" fill="#ffffff" font-size="14" text-anchor="middle">Step 1: H + C ➔ J</text>
        <text x="490" y="200" fill="#ffffff" font-size="14" text-anchor="middle">Step 2: E + A ➔ E</text>
        <text x="490" y="225" fill="#ffffff" font-size="14" text-anchor="middle">Step 3: L + T ➔ E</text>

    </g>

</svg>