<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">기하급수 폭발을 잠재우는 마법: 로그 스케일 차트</text>

    <!-- Left Chart: Linear Scale (Exploding) -->
    <g transform="translate(250, 320)">
        <rect x="-180" y="-200" width="360" height="340" rx="15" fill="#112233" stroke="#ff4d4d" stroke-width="3" />
        <text x="0" y="-160" fill="#ff4d4d" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">1. 일반 차트 (Linear)</text>

        <!-- Axes -->
        <line x1="-120" y1="90" x2="120" y2="90" stroke="#777777" stroke-width="2" />
        <line x1="-120" y1="90" x2="-120" y2="-120" stroke="#777777" stroke-width="2" />

        <text x="-135" y="-110" fill="#aaaaaa" font-family="sans-serif" font-size="14">1백만</text>
        <text x="-135" y="0" fill="#aaaaaa" font-family="sans-serif" font-size="14">50만</text>
        <text x="-135" y="90" fill="#aaaaaa" font-family="sans-serif" font-size="14">0</text>

        <!-- Exponential Curve breaking out -->
        <path d="M -120 90 Q -40 85 0 0 T 60 -150 T 100 -280" fill="none" stroke="#ff4d4d" stroke-width="5"
            filter="url(#glow)" />

        <text x="120" y="110" fill="#aaaaaa" font-family="sans-serif" font-size="14">시간(Time)</text>

        <rect x="-140" y="40" width="100" height="40" fill="#000000" stroke="#ff4d4d" stroke-width="1" opacity="0.8" />
        <text x="-90" y="55" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">초반 상황</text>
        <text x="-90" y="70" fill="#ff4d4d" font-family="sans-serif" font-size="12" font-weight="bold"
            text-anchor="middle">분석 불가능</text>

        <text x="60" y="-60" fill="#ff4d4d" font-family="sans-serif" font-size="12" font-weight="bold"
            text-anchor="middle">수직 상승!</text>
    </g>

    <!-- Right Chart: Log Scale (Controlled) -->
    <g transform="translate(650, 320)">
        <rect x="-180" y="-200" width="360" height="340" rx="15" fill="#113322" stroke="#00ffcc" stroke-width="3" />
        <text x="0" y="-160" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">2. 로그 스케일 (Log Scale)</text>

        <!-- Axes -->
        <line x1="-120" y1="90" x2="120" y2="90" stroke="#777777" stroke-width="2" />
        <line x1="-120" y1="90" x2="-120" y2="-120" stroke="#777777" stroke-width="2" />

        <!-- Y-axis ticks are log scale -->
        <text x="-140" y="-90" fill="#ffaa00" font-family="monospace" font-size="14">10^6</text>
        <text x="-140" y="-45" fill="#ffaa00" font-family="monospace" font-size="14">10^4</text>
        <text x="-140" y="0" fill="#ffaa00" font-family="monospace" font-size="14">10^2</text>
        <text x="-140" y="45" fill="#ffaa00" font-family="monospace" font-size="14">10^1</text>
        <text x="-140" y="90" fill="#ffaa00" font-family="monospace" font-size="14">1</text>

        <!-- Grid lines -->
        <line x1="-120" y1="-90" x2="120" y2="-90" stroke="#ffffff" stroke-width="1" stroke-dasharray="2 4"
            opacity="0.2" />
        <line x1="-120" y1="-45" x2="120" y2="-45" stroke="#ffffff" stroke-width="1" stroke-dasharray="2 4"
            opacity="0.2" />
        <line x1="-120" y1="0" x2="120" y2="0" stroke="#ffffff" stroke-width="1" stroke-dasharray="2 4" opacity="0.2" />
        <line x1="-120" y1="45" x2="120" y2="45" stroke="#ffffff" stroke-width="1" stroke-dasharray="2 4"
            opacity="0.2" />

        <!-- Straight Line for Exponential growth -->
        <path d="M -120 90 L 80 -100" fill="none" stroke="#00ffcc" stroke-width="5" filter="url(#glow)" />

        <text x="120" y="110" fill="#aaaaaa" font-family="sans-serif" font-size="14">시간(Time)</text>

        <text x="-20" y="40" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">"직선으로 변환되어 통제됨"</text>
        <text x="60" y="-50" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">일정한 성장이면</text>
        <text x="60" y="-35" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle">기울기 고정!</text>
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="480" width="600" height="90" rx="10" fill="#112233" stroke="#4da6ff" stroke-width="2" />
    <text x="450" y="505" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">바이러스 전염, 비트코인 상승률
        등 기하급수 팽창 모니터링 필수 함수</text>

    <rect x="250" y="525" width="400" height="30" rx="5" fill="#221133" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="545" fill="#ff00ff" font-family="monospace" font-size="16" font-weight="bold"
        text-anchor="middle">plt.yscale('log')</text>

</svg>