<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">자산 2배 더블링 마법: 72의 법칙 치트키</text>

    <!-- Big Target Block Array -->
    <g transform="translate(100, 150)">
        <rect x="0" y="0" width="150" height="300" rx="10" fill="#221122" stroke="#ff0055" stroke-width="3"
            filter="url(#glow)" />
        <text x="75" y="150" fill="#ffffff" font-family="sans-serif" font-size="40" font-weight="bold"
            text-anchor="middle">P</text>
        <text x="75" y="190" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">초기 원금</text>
    </g>

    <!-- The Magic Process (Rule of 72) -->
    <g transform="translate(320, 200)">
        <rect x="0" y="0" width="260" height="200" rx="20" fill="#112233" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />

        <text x="130" y="40" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">복잡한 로그 연산을 버려라!</text>

        <text x="130" y="110" fill="#ffff00" font-family="sans-serif" font-size="60" font-weight="bold"
            text-anchor="middle">72</text>
        <line x1="50" y1="130" x2="210" y2="130" stroke="#ffffff" stroke-width="4" />
        <text x="130" y="165" fill="#ffaa00" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">투자 수익률 (%)</text>

        <!-- Arrow In -->
        <path d="M -50 100 L -10 100" stroke="#00ffcc" stroke-width="6" marker-end="url(#arrow)" filter="url(#glow)" />

        <!-- Arrow Out -->
        <path d="M 270 100 L 310 100" stroke="#00ffcc" stroke-width="6" marker-end="url(#arrow)" filter="url(#glow)" />
    </g>

    <!-- Outcome Block Array (2P) -->
    <g transform="translate(650, 150)">
        <rect x="0" y="0" width="150" height="145" rx="10" fill="#331111" stroke="#ff0055" stroke-width="3"
            filter="url(#glow)" />
        <text x="75" y="80" fill="#ffffff" font-family="sans-serif" font-size="30" font-weight="bold"
            text-anchor="middle">P</text>

        <rect x="0" y="155" width="150" height="145" rx="10" fill="#331111" stroke="#ff0055" stroke-width="3"
            filter="url(#glow)" />
        <text x="75" y="235" fill="#ffffff" font-family="sans-serif" font-size="30" font-weight="bold"
            text-anchor="middle">P</text>

        <!-- Connection bracket -->
        <path d="M 170 0 L 190 0 L 190 300 L 170 300 M 190 150 L 210 150" fill="none" stroke="#ffffff"
            stroke-width="3" />
        <text x="230" y="160" fill="#ff0055" font-family="sans-serif" font-size="40" font-weight="bold">2P</text>
        <text x="75" y="330" fill="#aaaaaa" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">두 배 렌더링 완료!</text>
    </g>

    <!-- Data Example Row -->
    <rect x="150" y="470" width="600" height="100" rx="15" fill="#1a1a24" stroke="#555566" stroke-width="2" />
    <text x="450" y="500" fill="#ffffff" font-family="monospace" font-size="18" font-weight="bold"
        text-anchor="middle">✅ 실전 암산 패치율 분석</text>

    <text x="300" y="530" fill="#ffaa00" font-family="sans-serif" font-size="16" text-anchor="middle">수익률 연 4% -> 72/4 =
        18년</text>
    <text x="600" y="530" fill="#00ffcc" font-family="sans-serif" font-size="16" text-anchor="middle">수익률 연 8% -> 72/8 =
        9년</text>
    <text x="450" y="555" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">※ 수익률이 약간만 폭발해도
        인생의 더블링 턴이 기하급수적으로 빨라짐</text>

</svg>