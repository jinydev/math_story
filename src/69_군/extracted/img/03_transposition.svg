<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .math {
                font-size: 40px;
                text-anchor: middle;
            }

            .var-x {
                fill: #00ffff;
            }

            .num {
                fill: #ffffff;
            }

            .operator {
                fill: #ffaa44;
            }

            .equal {
                fill: #ff6464;
            }

            .highlight {
                fill: none;
                stroke: #ffff00;
                stroke-width: 3;
                stroke-dasharray: 6, 4;
                rx: 8;
                ry: 8;
            }

            .highlight-solid {
                fill: rgba(255, 255, 0, 0.1);
                stroke: #ffff00;
                stroke-width: 3;
                rx: 8;
                ry: 8;
            }

            .arrow {
                fill: none;
                stroke: #ffff00;
                stroke-width: 4;
                stroke-linecap: round;
                marker-end: url(#arrowhead);
            }

            .spark {
                fill: #ffff00;
                font-size: 24px;
                text-anchor: middle;
            }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="400" y="40" class="title">치명적인 지름길 치트키: 이항(Transposition)의 마법</text>
    <text x="400" y="65" class="desc">등호(=)의 다리를 건너서 반대편으로 강제 이주할 땐, 반드시 부호(성별)가 변한다!</text>

    <!-- Step 1: Original Eq -->
    <g transform="translate(250, 150)">
        <rect x="-10" y="-45" width="80" height="60" class="highlight" />
        <text x="0" y="0" class="math var-x" text-anchor="start">2x</text>
        <text x="40" y="0" class="math operator" text-anchor="start">+ 3</text>

        <text x="150" y="0" class="math equal">=</text>

        <text x="220" y="0" class="math num" text-anchor="start">11</text>
    </g>

    <!-- The Magic Jump Arrow -->
    <path d="M 310 110 Q 400 40 480 110" class="arrow" />

    <!-- Spark text on arrow -->
    <text x="395" y="70" class="spark">✨ 부호 체인지! (+ → -)</text>

    <!-- Step 2: Result Eq after transposition -->
    <g transform="translate(250, 260)">
        <text x="0" y="0" class="math var-x" text-anchor="start">2x</text>

        <text x="150" y="0" class="math equal">=</text>

        <text x="220" y="0" class="math num" text-anchor="start">11</text>

        <rect x="290" y="-45" width="80" height="60" class="highlight-solid" />
        <text x="300" y="0" class="math" fill="#ff6464" text-anchor="start">- 3</text>
    </g>

    <!-- Vertical separator linking the steps -->
    <line x1="400" y1="170" x2="400" y2="230" stroke="#30363d" stroke-width="4" marker-end="url(#arrowhead)" />

</svg>