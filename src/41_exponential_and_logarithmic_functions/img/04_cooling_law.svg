<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#1864ab" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">뜨거운 커피가 식어가는 시간: 뉴턴의 냉각 법칙 (Cooling Law)</text>

    <g transform="translate(100, 180)">
        <!-- Axes -->
        <line x1="0" y1="0" x2="440" y2="0" stroke="#868e96" stroke-width="2" />
        <line x1="0" y1="-120" x2="0" y2="20" stroke="#868e96" stroke-width="2" />
        <text x="440" y="15" fill="#868e96" font-size="12" font-family="sans-serif">시간(t)</text>
        <text x="-35" y="-120" fill="#868e96" font-size="12" font-family="sans-serif">온도(T)</text>

        <!-- Room Temperature (Asymptote) -->
        <line x1="0" y1="-30" x2="440" y2="-30" stroke="#f03e3e" stroke-width="2" stroke-dasharray="6,4" />
        <text x="450" y="-25" fill="#f03e3e" font-size="14" font-family="sans-serif" font-weight="bold">실내 온도
            (20°C)</text>

        <!-- Cooling Curve -->
        <path d="M 0 -120 Q 50 -120 100 -75 T 200 -45 T 300 -35 T 400 -31" fill="none" stroke="#339af0"
            stroke-width="4" />

        <!-- Data points -->
        <circle cx="0" cy="-120" r="5" fill="#1864ab" />
        <text x="15" y="-115" fill="#1864ab" font-size="14" font-family="sans-serif" font-weight="bold">커피 (90°C)</text>

        <circle cx="100" cy="-75" r="5" fill="#1864ab" />
        <line x1="100" y1="0" x2="100" y2="-75" stroke="#adb5bd" stroke-dasharray="3,3" />
        <text x="100" y="20" fill="#495057" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">5분</text>

        <circle cx="200" cy="-45" r="5" fill="#1864ab" />
        <line x1="200" y1="0" x2="200" y2="-45" stroke="#adb5bd" stroke-dasharray="3,3" />
        <text x="200" y="20" fill="#495057" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">15분</text>

        <!-- Gap Arrow -->
        <path d="M 50 -115 L 50 -35" fill="none" stroke="#c92a2a" stroke-width="2" marker-start="url(#arrow-red)"
            marker-end="url(#arrow-red)" />
        <text x="60" y="-70" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold">온도 차이 (급격한
            감소)</text>

        <path d="M 350 -34 L 350 -31" fill="none" stroke="#1864ab" stroke-width="1" />
        <text x="360" y="-45" fill="#1864ab" font-size="12" font-family="sans-serif" font-weight="bold">차이 거의 없음 (완만한
            감소)</text>
    </g>

    <defs>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#c92a2a" />
        </marker>
    </defs>
</svg>