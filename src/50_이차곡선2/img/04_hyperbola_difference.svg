<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350">
    <rect width="700" height="350" fill="#1e1e1e" rx="10" />

    <text x="350" y="35" fill="#ff6b6b" font-size="22" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">쌍곡선 렌더링: 두 초점으로부터 거리의 차가 일정 (-)</text>

    <!-- Axes -->
    <line x1="50" y1="200" x2="650" y2="200" stroke="#495057" stroke-width="2" />
    <line x1="350" y1="50" x2="350" y2="350" stroke="#495057" stroke-width="2" />

    <!-- Hyperbola curves -->
    <path d="M250,50 Q180,200 250,350" fill="none" stroke="#3bc9db" stroke-width="4" />
    <path d="M450,50 Q520,200 450,350" fill="none" stroke="#f03e3e" stroke-width="4" />

    <!-- Foci -->
    <circle cx="150" cy="200" r="7" fill="#fab005" />
    <text x="145" y="225" fill="#fab005" font-size="18" font-family="monospace" font-weight="bold">F'(-c)</text>

    <circle cx="550" cy="200" r="7" fill="#fab005" />
    <text x="545" y="225" fill="#fab005" font-size="18" font-family="monospace" font-weight="bold">F(c)</text>

    <!-- Point P and lines -->
    <circle cx="490" cy="110" r="8" fill="#fff" />
    <text x="510" y="100" fill="#fff" font-size="18" font-family="monospace" font-weight="bold">P(x)</text>

    <line x1="150" y1="200" x2="490" y2="110" stroke="#74c0fc" stroke-width="3" stroke-dasharray="8,4" />
    <text x="320" y="135" fill="#74c0fc" font-size="16" font-weight="bold">거리 d1 (멀다)</text>

    <line x1="550" y1="200" x2="490" y2="110" stroke="#ff8787" stroke-width="3" stroke-dasharray="8,4" />
    <text x="530" y="160" fill="#ff8787" font-size="16" font-weight="bold">d2 (짧다)</text>

    <!-- Equation box -->
    <rect x="200" y="300" width="300" height="40" fill="#343a40" stroke="#fa5252" stroke-width="2" rx="5" />
    <text x="350" y="325" fill="#ffc9c9" font-size="20" font-family="monospace" font-weight="bold"
        text-anchor="middle">| d1 - d2 | = 2a (상수)</text>
</svg>