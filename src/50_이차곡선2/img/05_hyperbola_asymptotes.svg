<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
    <rect width="600" height="400" fill="#121212" rx="10" />

    <text x="300" y="30" fill="#20c997" font-size="22" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">쌍곡선을 제어하는 절대 한계: 점근선 (Asymptotes)</text>

    <!-- Axes -->
    <line x1="50" y1="200" x2="550" y2="200" stroke="#495057" stroke-width="1.5" />
    <line x1="300" y1="50" x2="300" y2="350" stroke="#495057" stroke-width="1.5" />

    <!-- Cheat Box -->
    <rect x="220" y="140" width="160" height="120" fill="none" stroke="#fcc419" stroke-width="2"
        stroke-dasharray="5,3" />
    <text x="260" y="155" fill="#fcc419" font-size="12" font-weight="bold">상자: 2a x 2b</text>

    <!-- Asymptote lines -->
    <line x1="120" y1="50" x2="480" y2="350" stroke="#e03131" stroke-width="2" stroke-dasharray="10,5" />
    <line x1="120" y1="350" x2="480" y2="50" stroke="#1c7ed6" stroke-width="2" stroke-dasharray="10,5" />

    <text x="490" y="55" fill="#1c7ed6" font-size="14" font-family="monospace" font-weight="bold">y = +(b/a)x</text>
    <text x="490" y="345" fill="#e03131" font-size="14" font-family="monospace" font-weight="bold">y = -(b/a)x</text>

    <!-- Hyperbola curves hugging the lines -->
    <path d="M 480 60 Q 230 200 480 340" fill="none" stroke="#69db7c" stroke-width="4" />
    <path d="M 120 60 Q 370 200 120 340" fill="none" stroke="#69db7c" stroke-width="4" />

    <rect x="302" y="198" width="80" height="4" fill="#69db7c" />
    <circle cx="380" cy="200" r="5" fill="#69db7c" />
    <text x="370" y="215" fill="#69db7c" font-size="14" font-weight="bold">꼭짓점 (a, 0)</text>

    <rect x="180" y="370" width="240" height="20" fill="#2b2b2b" rx="5" />
    <text x="300" y="384" fill="#a5d8ff" font-size="14" font-weight="bold" text-anchor="middle">점근선을 따라 영원히 평행하게
        도망간다!</text>
</svg>