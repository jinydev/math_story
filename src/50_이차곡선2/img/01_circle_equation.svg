<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
    <rect width="500" height="500" fill="#f8f9fa" />

    <text x="250" y="40" fill="#1864ab" font-size="24" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">원의 방정식: 완벽한 대칭 레이더 (Circle)</text>

    <!-- Coordinate System -->
    <line x1="50" y1="250" x2="450" y2="250" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)" />
    <line x1="250" y1="450" x2="250" y2="50" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)" />
    <text x="460" y="255" fill="#495057" font-size="16" font-weight="bold" font-family="monospace">X</text>
    <text x="255" y="40" fill="#495057" font-size="16" font-weight="bold" font-family="monospace">Y</text>

    <text x="235" y="265" fill="#495057" font-size="14" font-weight="bold" font-family="monospace">O(0,0)</text>

    <!-- The Circle -->
    <circle cx="250" cy="250" r="120" fill="none" stroke="#2b8a3e" stroke-width="4" stroke-dasharray="10,5" />

    <!-- The Triangle -->
    <line x1="250" y1="250" x2="346" y2="178" stroke="#f03e3e" stroke-width="3" />
    <line x1="250" y1="250" x2="346" y2="250" stroke="#1c7ed6" stroke-width="3" stroke-dasharray="6,4" />
    <line x1="346" y1="250" x2="346" y2="178" stroke="#1c7ed6" stroke-width="3" stroke-dasharray="6,4" />

    <rect x="331" y="235" width="15" height="15" fill="none" stroke="#868e96" stroke-width="2" />

    <!-- Labels -->
    <circle cx="346" cy="178" r="6" fill="#f03e3e" />
    <text x="360" y="170" fill="#f03e3e" font-size="18" font-weight="bold" font-family="monospace">P(x, y)</text>

    <text x="290" y="200" fill="#f03e3e" font-size="20" font-weight="bold" font-family="monospace">r</text>
    <text x="300" y="270" fill="#1c7ed6" font-size="20" font-weight="bold" font-family="monospace">x</text>
    <text x="360" y="220" fill="#1c7ed6" font-size="20" font-weight="bold" font-family="monospace">y</text>

    <!-- Formula Highlight -->
    <rect x="150" y="390" width="200" height="50" fill="#e3fafc" stroke="#15aabf" stroke-width="2" rx="10" />
    <text x="250" y="423" fill="#0b7285" font-size="24" font-weight="bold" font-family="monospace" text-anchor="middle">
        x² + y² = r²
    </text>
    <text x="250" y="460" fill="#d9480f" font-size="14" font-weight="bold" text-anchor="middle">
        (가장 단순한 피타고라스 거리)
    </text>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>