<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="600">
    <rect width="800" height="600" fill="#2d3436" />
    <text x="400" y="40" font-family="Arial" font-size="28" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        시어핀스키 삼각형 (Sierpinski Triangle)
    </text>
    <text x="400" y="70" font-family="Arial" font-size="16" fill="#b2bec3" text-anchor="middle">
        가운데 면적을 한없이 도려내어 결국 면적이 0이 되는 거대한 빈 구멍 프랙탈
    </text>

    <!-- Base Outline -->
    <g transform="translate(100, 100)">
        <!-- Level 0 (Solid Triangle) -->
        <polygon points="300,0 0,519.6 600,519.6" fill="#0984e3" />
        
        <!-- Level 1 Hole -->
        <polygon points="300,519.6 150,259.8 450,259.8" fill="#2d3436" />
        
        <!-- Level 2 Holes -->
        <polygon points="150,259.8 75,129.9 225,129.9" fill="#2d3436" />
        <polygon points="450,259.8 375,129.9 525,129.9" fill="#2d3436" />
        <polygon points="300,519.6 225,389.7 375,389.7" fill="#2d3436" />

        <!-- Level 3 Holes -->
        <!-- Top sub-triangle -->
        <polygon points="150,259.8 112.5,194.85 187.5,194.85" fill="#2d3436" />
        <polygon points="75,129.9 37.5,64.95 112.5,64.95" fill="#2d3436" />
        <polygon points="225,129.9 187.5,64.95 262.5,64.95" fill="#2d3436" />

        <!-- Right sub-triangle -->
        <polygon points="450,259.8 412.5,194.85 487.5,194.85" fill="#2d3436" />
        <polygon points="375,129.9 337.5,64.95 412.5,64.95" fill="#2d3436" />
        <polygon points="525,129.9 487.5,64.95 562.5,64.95" fill="#2d3436" />
        
        <!-- Bottom sub-triangle -->
        <polygon points="300,519.6 262.5,454.65 337.5,454.65" fill="#2d3436" />
        <polygon points="225,389.7 187.5,324.75 262.5,324.75" fill="#2d3436" />
        <polygon points="375,389.7 337.5,324.75 412.5,324.75" fill="#2d3436" />
        
        <!-- Dynamic infinite deletion animation overlay -->
        <path d="M 150 259.8 L 75 129.9 L 225 129.9 Z" fill="#ffeaa7" opacity="0">
            <animate attributeName="opacity" values="0; 0.5; 0" dur="2s" repeatCount="indefinite" />
        </path>
    </g>
</svg>
