<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="500">
    <rect width="800" height="500" fill="#2d3436" />
    <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        생존을 위한 프랙탈 파이프라인 (인간의 폐혈관/기관지)
    </text>
    
    <text x="400" y="70" font-family="Arial" font-size="16" fill="#b2bec3" text-anchor="middle">
        유한한 갈비뼈 부피 안에 테니스장만 한 표면적을 구겨 넣는 재귀 엔진
    </text>

    <!-- Main Trachea -->
    <path d="M 400 100 L 400 200" stroke="#ff7675" stroke-width="20" stroke-linecap="round" />
    
    <!-- Bronchi Level 1 -->
    <path d="M 400 190 L 300 280" stroke="#ff7675" stroke-width="14" stroke-linecap="round" />
    <path d="M 400 190 L 500 280" stroke="#ff7675" stroke-width="14" stroke-linecap="round" />

    <!-- Bronchi Level 2 -->
    <!-- Left -->
    <path d="M 305 275 L 220 330" stroke="#ff7675" stroke-width="8" stroke-linecap="round" />
    <path d="M 305 275 L 340 360" stroke="#ff7675" stroke-width="8" stroke-linecap="round" />
    <!-- Right -->
    <path d="M 495 275 L 580 330" stroke="#ff7675" stroke-width="8" stroke-linecap="round" />
    <path d="M 495 275 L 460 360" stroke="#ff7675" stroke-width="8" stroke-linecap="round" />

    <!-- Bronchi Level 3 -->
    <g stroke="#ff7675" stroke-width="4" stroke-linecap="round" opacity="0.8">
        <path d="M 225 325 L 160 350" /> <path d="M 225 325 L 230 400" />
        <path d="M 335 355 L 280 410" /> <path d="M 335 355 L 380 420" />
        
        <path d="M 575 325 L 640 350" /> <path d="M 575 325 L 570 400" />
        <path d="M 465 355 L 520 410" /> <path d="M 465 355 L 420 420" />
    </g>

    <!-- Bronchi Level 4 (Alveoli clusters) -->
    <g stroke="#ff7675" stroke-width="2" stroke-linecap="round" opacity="0.6">
        <circle cx="160" cy="350" r="15" fill="none" stroke-dasharray="2" />
        <circle cx="230" cy="400" r="15" fill="none" stroke-dasharray="2" />
        <circle cx="280" cy="410" r="15" fill="none" stroke-dasharray="2" />
        <circle cx="380" cy="420" r="15" fill="none" stroke-dasharray="2" />
        <circle cx="640" cy="350" r="15" fill="none" stroke-dasharray="2" />
        <circle cx="570" cy="400" r="15" fill="none" stroke-dasharray="2" />
        <circle cx="520" cy="410" r="15" fill="none" stroke-dasharray="2" />
        <circle cx="420" cy="420" r="15" fill="none" stroke-dasharray="2" />
    </g>

    <!-- Information Box -->
    <rect x="50" y="100" width="200" height="100" fill="#2d3436" stroke="#55efc4" stroke-width="2" rx="10" />
    <text x="150" y="130" font-family="Arial" font-size="14" fill="#55efc4" text-anchor="middle">유클리드형 직립 파이프</text>
    <text x="150" y="155" font-family="Arial" font-size="12" fill="#dfe6e9" text-anchor="middle">산소 접촉 면적 부족</text>
    <text x="150" y="175" font-family="Arial" font-size="12" fill="#ff7675" text-anchor="middle">호흡 효율 1%</text>

    <!-- Information Box 2 -->
    <rect x="550" y="100" width="200" height="100" fill="#2d3436" stroke="#0984e3" stroke-width="2" rx="10" />
    <text x="650" y="130" font-family="Arial" font-size="14" fill="#0984e3" text-anchor="middle">프랙탈 분열 기관지</text>
    <text x="650" y="155" font-family="Arial" font-size="12" fill="#dfe6e9" text-anchor="middle">수백만 갈래 복제 구조</text>
    <text x="650" y="175" font-family="Arial" font-size="12" fill="#55efc4" text-anchor="middle">표면적 극대화 달성!</text>
</svg>
