<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
    <rect width="600" height="300" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#1864ab" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">사각형 가문의 진화 트리 (벤 다이어그램)</text>
    <text x="300" y="50" fill="#495057" font-size="12" text-anchor="middle">"일반 사각형부터 완벽한 정사각형까지, 조건이 더해질수록 좁아지는 귀족
        혈통"</text>

    <!-- Level 1: Quadrilateral -->
    <rect x="50" y="70" width="500" height="210" fill="#e7f5ff" stroke="#339af0" stroke-width="2" rx="10" />
    <text x="300" y="90" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">사각형
        (Quadrilateral)</text>
    <path d="M 60 110 L 110 80 L 100 130 Z" fill="none" stroke="#1864ab" stroke-width="1" />
    <!-- Just a random quad icon -->

    <!-- Level 2: Trapezoid -->
    <rect x="80" y="100" width="440" height="170" fill="#d0ebff" stroke="#228be6" stroke-width="2" rx="10" />
    <text x="300" y="120" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">사다리꼴 (+ 한 쌍 평행)</text>

    <!-- Level 3: Parallelogram -->
    <rect x="110" y="130" width="380" height="130" fill="#a5d8ff" stroke="#1c7ed6" stroke-width="2" rx="10" />
    <text x="300" y="150" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">평행사변형 (+ 두 쌍 평행)</text>

    <!-- Level 4a: Rectangle -->
    <rect x="130" y="170" width="160" height="80" fill="#ffd8a8" stroke="#f59f00" stroke-width="2" rx="10" />
    <text x="210" y="190" fill="#d9480f" font-size="12" font-weight="bold" text-anchor="middle">직사각형</text>
    <text x="210" y="205" fill="#e8590c" font-size="10" text-anchor="middle">(+ 네 각 직각)</text>

    <!-- Level 4b: Rhombus -->
    <rect x="310" y="170" width="160" height="80" fill="#ffc9c9" stroke="#f03e3e" stroke-width="2" rx="10" />
    <text x="390" y="190" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">마름모</text>
    <text x="390" y="205" fill="#e03131" font-size="10" text-anchor="middle">(+ 네 변 길이 동일)</text>

    <!-- Level 5: Square (Intersection) -->
    <rect x="250" y="215" width="100" height="35" fill="#eebefa" stroke="#ae3ec9" stroke-width="2" rx="5" />
    <text x="300" y="238" fill="#862e9c" font-size="14" font-weight="bold" text-anchor="middle">정사각형</text>

    <rect x="251" y="216" width="98" height="33" fill="none" stroke="#eebefa" stroke-width="2" />
    <!-- Blend arrows -->
    <path d="M 230 230 L 245 230" stroke="#f59f00" stroke-width="2" marker-end="url(#arrow-orange)" />
    <path d="M 370 230 L 355 230" stroke="#f03e3e" stroke-width="2" marker-end="url(#arrow-red)" />

    <defs>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59f00" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f03e3e" />
        </marker>
    </defs>
</svg>