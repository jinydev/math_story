<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#2b8a3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">왕의 귀환: 다이아몬드 수저, 정사각형(Square)</text>

    <!-- Fusion Process -->
    <g transform="translate(100, 110)">
        <!-- Rectangle -->
        <rect x="-30" y="-40" width="60" height="80" fill="#e7f5ff" stroke="#1864ab" stroke-width="3" />
        <path d="M -30 -30 L -20 -30 L -20 -40" fill="none" stroke="#e03131" stroke-width="2" />
        <text x="0" y="60" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">직사각형 (90° 패치)</text>
    </g>

    <text x="180" y="115" fill="#adb5bd" font-size="24" font-weight="bold" text-anchor="middle">+</text>

    <g transform="translate(260, 110)">
        <!-- Rhombus -->
        <path d="M 0 -45 L 35 0 L 0 45 L -35 0 Z" fill="#f3d9fa" stroke="#862e9c" stroke-width="3"
            stroke-linejoin="round" />
        <line x1="-20" y1="-25" x2="-15" y2="-20" stroke="#e03131" stroke-width="2" />
        <text x="0" y="60" fill="#862e9c" font-size="12" font-weight="bold" text-anchor="middle">마름모 (길이 동일 패치)</text>
    </g>

    <path d="M 340 110 L 390 110" fill="none" stroke="#adb5bd" stroke-width="4" marker-end="url(#arrow-green)" />
    <text x="365" y="95" fill="#2b8a3e" font-size="14" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">퓨전!</text>

    <!-- Ultimate Square -->
    <g transform="translate(480, 110)">
        <rect x="-40" y="-40" width="80" height="80" fill="#ebfbee" stroke="#2b8a3e" stroke-width="4" />

        <!-- All Magic Active -->
        <!-- 90 Degs -->
        <path d="M -40 -30 L -30 -30 L -30 -40" fill="none" stroke="#e03131" stroke-width="2" />
        <path d="M 40 -30 L 30 -30 L 30 -40" fill="none" stroke="#e03131" stroke-width="2" />
        <path d="M -40 30 L -30 30 L -30 40" fill="none" stroke="#e03131" stroke-width="2" />
        <path d="M 40 30 L 30 30 L 30 40" fill="none" stroke="#e03131" stroke-width="2" />

        <!-- Equal Sides -->
        <line x1="-45" y1="0" x2="-35" y2="0" stroke="#1864ab" stroke-width="3" />
        <line x1="45" y1="0" x2="35" y2="0" stroke="#1864ab" stroke-width="3" />
        <line x1="0" y1="-45" x2="0" y2="-35" stroke="#1864ab" stroke-width="3" />
        <line x1="0" y1="45" x2="0" y2="35" stroke="#1864ab" stroke-width="3" />

        <!-- Diagonals: Equal AND Perpendicular -->
        <path d="M -40 -40 L 40 40" fill="none" stroke="#f08c00" stroke-width="2" stroke-dasharray="2,2" />
        <path d="M 40 -40 L -40 40" fill="none" stroke="#f08c00" stroke-width="2" stroke-dasharray="2,2" />
        <path d="M 0 -10 L 10 -10 L 10 0" fill="none" stroke="#e03131" stroke-width="2" />

        <text x="0" y="60" fill="#2b8a3e" font-size="14" font-weight="bold" text-anchor="middle">정사각형 궁극체</text>
        <rect x="-70" y="70" width="140" height="40" fill="#fff" stroke="#adb5bd" rx="3" />
        <text x="0" y="85" fill="#495057" font-size="10" font-weight="bold" text-anchor="middle">길이 똑같음 + 90도 교차!</text>
        <text x="0" y="100" fill="#495057" font-size="10" font-weight="bold" text-anchor="middle">대각선 길이도 똑같음!</text>
    </g>

    <defs>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
        </marker>
    </defs>
</svg>