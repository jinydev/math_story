<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#862e9c" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">정사각형 궁극의 진화 트리 (Fuse & Evolve)</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"부족한 반대파의 DNA를 수혈하는 순간, 황제로 즉위한다!"</text>

    <!-- Left: Rectangle Path -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="160" height="60" fill="#fff3bf" stroke="#f59f00" stroke-width="2" rx="5" />
        <text x="80" y="25" fill="#d9480f" font-size="14" font-weight="bold" text-anchor="middle">직사각형</text>
        <text x="80" y="45" fill="#e8590c" font-size="10" font-weight="bold" text-anchor="middle">(네 각 90도 완성)</text>

        <!-- Injection -->
        <path d="M 80 60 L 80 100" fill="none" stroke="#f03e3e" stroke-width="3" marker-end="url(#arrow-red)" />
        <rect x="25" y="80" width="110" height="20" fill="#fff0f6" rx="3" />
        <text x="80" y="94" fill="#c92a2a" font-size="10" font-weight="bold" text-anchor="middle">+ [마름모 DNA 수혈]</text>
    </g>

    <!-- Right: Rhombus Path -->
    <g transform="translate(380, 80)">
        <rect x="0" y="0" width="160" height="60" fill="#ffe3e3" stroke="#f03e3e" stroke-width="2" rx="5" />
        <text x="80" y="25" fill="#c92a2a" font-size="14" font-weight="bold" text-anchor="middle">마름모</text>
        <text x="80" y="45" fill="#e03131" font-size="10" font-weight="bold" text-anchor="middle">(네 변 길이 완성)</text>

        <!-- Injection -->
        <path d="M 80 60 L 80 100" fill="none" stroke="#f59f00" stroke-width="3" marker-end="url(#arrow-orange)" />
        <rect x="25" y="80" width="110" height="20" fill="#fff3bf" rx="3" />
        <text x="80" y="94" fill="#d9480f" font-size="10" font-weight="bold" text-anchor="middle">+ [직사각형 DNA 수혈]</text>
    </g>

    <!-- Connect to Bottom Center -->
    <path d="M 140 120 L 260 160" fill="none" stroke="#adb5bd" stroke-width="2" stroke-dasharray="3,3" />
    <path d="M 460 120 L 340 160" fill="none" stroke="#adb5bd" stroke-width="2" stroke-dasharray="3,3" />

    <!-- Center Bottom: Square -->
    <g transform="translate(220, 140)">
        <rect x="0" y="0" width="160" height="80" fill="#f3f0ff" stroke="#862e9c" stroke-width="3" rx="5" />
        <text x="80" y="30" fill="#6741d9" font-size="16" font-weight="bold" text-anchor="middle">정사각형 (Square)</text>
        <text x="80" y="50" fill="#862e9c" font-size="12" font-weight="bold" text-anchor="middle">"모든 마법 패시브 패치"</text>

        <!-- Sparkles -->
        <text x="10" y="20" fill="#ae3ec9" font-size="14">✨</text>
        <text x="140" y="70" fill="#ae3ec9" font-size="14">✨</text>
    </g>

    <defs>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f03e3e" />
        </marker>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59f00" />
        </marker>
    </defs>
</svg>