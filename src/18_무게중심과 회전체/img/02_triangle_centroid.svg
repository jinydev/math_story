<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#2b8a3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">접시 돌리기의 황금점: 삼각형의 무게중심 (Centroid of a Triangle)</text>

    <g transform="translate(150, 150)">

        <!-- Coordinate Axes -->
        <line x1="-30" y1="60" x2="300" y2="60" stroke="#adb5bd" stroke-width="2" />
        <line x1="-30" y1="60" x2="-30" y2="-90" stroke="#adb5bd" stroke-width="2" />

        <!-- Triangle P1(0,0), P2(240, 0), P3(120, -120) roughly representing vertices -->
        <path d="M 0 30 L 240 30 L 60 -90 Z" fill="#ebfbee" stroke="#40c057" stroke-width="3" />

        <!-- Vertices Info -->
        <!-- Point A -->
        <circle cx="0" cy="30" r="5" fill="#f03e3e" />
        <text x="-25" y="40" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold">A (x₁, y₁)</text>

        <!-- Point B -->
        <circle cx="240" cy="30" r="5" fill="#f03e3e" />
        <text x="250" y="40" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold">B (x₂, y₂)</text>

        <!-- Point C -->
        <circle cx="60" cy="-90" r="5" fill="#f03e3e" />
        <text x="60" y="-105" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">C (x₃, y₃)</text>

        <!-- Medians -->
        <!-- From C to midpoint of AB (120, 30) -->
        <line x1="60" y1="-90" x2="120" y2="30" stroke="#495057" stroke-dasharray="4,4" />
        <!-- From B to midpoint of AC (30, -30) -->
        <line x1="240" y1="30" x2="30" y2="-30" stroke="#495057" stroke-dasharray="4,4" />
        <!-- From A to midpoint of BC (150, -30) -->
        <line x1="0" y1="30" x2="150" y2="-30" stroke="#495057" stroke-dasharray="4,4" />

        <!-- Centroid G -->
        <circle cx="100" cy="-10" r="6" fill="#1864ab" />
        <text x="120" y="-15" fill="#1864ab" font-size="16" font-family="sans-serif" font-weight="bold">G (무게중심)</text>

        <!-- Formula floating -->
        <rect x="180" y="-120" width="160" height="60" fill="#e7f5ff" stroke="#74c0fc" stroke-width="2" rx="5" />
        <text x="260" y="-100" fill="#1864ab" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">X = (x1 + x2 + x3) / 3</text>
        <text x="260" y="-75" fill="#1864ab" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">Y = (y1 + y2 + y3) / 3</text>

    </g>
</svg>