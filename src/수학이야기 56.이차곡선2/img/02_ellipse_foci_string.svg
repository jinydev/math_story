<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <rect width="700" height="400" fill="#212529" rx="15" />

  <text x="350" y="40" fill="#fcc419" font-size="24" font-family="sans-serif" font-weight="bold" text-anchor="middle">타원
    렌더링: 두 초점과 고무줄 (Ellipse)</text>

  <!-- Coordinate axes (Faint) -->
  <line x1="50" y1="200" x2="650" y2="200" stroke="#495057" stroke-width="1" />
  <line x1="350" y1="50" x2="350" y2="350" stroke="#495057" stroke-width="1" />

  <!-- Ellipse Path -->
  <ellipse cx="350" cy="200" rx="250" ry="120" fill="none" stroke="#2b8a3e" stroke-width="4" stroke-dasharray="10,10" />

  <!-- Foci -->
  <line x1="150" y1="180" x2="150" y2="220" stroke="#e03131" stroke-width="4" />
  <circle cx="150" cy="200" r="8" fill="#ff8787" />
  <text x="140" y="240" fill="#ff8787" font-size="18" font-weight="bold" font-family="monospace">F (못1)</text>

  <line x1="550" y1="180" x2="550" y2="220" stroke="#0b7285" stroke-width="4" />
  <circle cx="550" cy="200" r="8" fill="#3bc9db" />
  <text x="540" y="240" fill="#3bc9db" font-size="18" font-weight="bold" font-family="monospace">F' (못2)</text>

  <!-- Strings -->
  <line x1="150" y1="200" x2="230" y2="95" stroke="#fcc419" stroke-width="3" />
  <line x1="550" y1="200" x2="230" y2="95" stroke="#fcc419" stroke-width="3" />

  <!-- Moving Pencil Point -->
  <circle cx="230" cy="95" r="10" fill="#fcc419" stroke="#fff" stroke-width="2" />
  <text x="210" y="80" fill="#fff" font-size="18" font-weight="bold" font-family="monospace">P(x, y)</text>

  <text x="175" y="140" fill="#fcc419" font-size="16" font-weight="bold">d1</text>
  <text x="400" y="140" fill="#fcc419" font-size="16" font-weight="bold">d2</text>

  <!-- Explanation box -->
  <rect x="200" y="330" width="300" height="50" fill="#343a40" stroke="#e67700" stroke-width="2" rx="5" />
  <text x="350" y="360" fill="#ffd43b" font-size="16" font-weight="bold" font-family="monospace" text-anchor="middle">
    d1 + d2 = 무조건 일정 (끈의 길이)
  </text>
  <text x="350" y="320" fill="#868e96" font-size="14" font-weight="bold" text-anchor="middle">"두 점으로부터의 거리의 합이 똑같은 궤적이
    타원이다!"</text>
</svg>