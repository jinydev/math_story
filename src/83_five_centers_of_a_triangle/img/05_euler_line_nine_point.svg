<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#495057" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">천재 수학자의 대발견: 오일러 선(Euler Line)과 구점원</text>

    <g transform="translate(300, 150)">

        <!-- Triangle -->
        <path d="M 0 -110 L -120 40 L 90 40 Z" fill="#f1f3f5" stroke="#868e96" stroke-width="2" />

        <!-- Circumcenter (O) -->
        <circle cx="0" cy="-10" r="5" fill="#f03e3e" />
        <text x="-5" y="10" fill="#f03e3e" font-size="14" font-family="sans-serif" font-weight="bold">O</text>

        <!-- Centroid (G) -->
        <circle cx="-10" cy="-23" r="5" fill="#1864ab" />
        <text x="-25" y="-15" fill="#1864ab" font-size="14" font-family="sans-serif" font-weight="bold">G</text>

        <!-- Orthocenter (H) -->
        <circle cx="-30" cy="-50" r="5" fill="#2b8a3e" />
        <text x="-50" y="-40" fill="#2b8a3e" font-size="14" font-family="sans-serif" font-weight="bold">H</text>

        <!-- Euler Line -->
        <line x1="20" y1="16" x2="-50" y2="-76" stroke="#495057" stroke-width="4" stroke-dasharray="8,8" />
        <text x="-60" y="-85" fill="#495057" font-size="16" font-family="sans-serif" font-weight="bold">오일러 선</text>

        <!-- 2:1 Ratio Lines -->
        <path d="M 0 -10 Q -5 -30 -10 -23" fill="none" stroke="#f03e3e" stroke-width="2" />
        <text x="3" y="-18" fill="#f03e3e" font-size="12" font-family="sans-serif" font-weight="bold">1</text>

        <path d="M -10 -23 Q -20 -50 -30 -50" fill="none" stroke="#2b8a3e" stroke-width="2" />
        <text x="-15" y="-35" fill="#2b8a3e" font-size="12" font-family="sans-serif" font-weight="bold">2</text>

        <!-- Nine-point circle (approximate) -->
        <circle cx="-15" cy="-30" r="55" fill="none" stroke="#fab005" stroke-width="2" stroke-dasharray="4,4" />
        <text x="-100" y="-70" fill="#f59f00" font-size="14" font-family="sans-serif" font-weight="bold">구점원</text>
    </g>

</svg>