<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#1864ab" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">O X 게임의 절대 법칙: 이항분포와 독립시행 (Binomial Distribution)</text>

    <!-- Setting: O / X Box -->
    <g transform="translate(100, 150)">
        <rect x="-80" y="-80" width="160" height="120" fill="#e7f5ff" stroke="#339af0" stroke-width="2" rx="8" />
        <text x="0" y="-55" fill="#1864ab" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">개별 시행 규칙</text>

        <text x="0" y="-20" fill="#1864ab" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">결과는 무조건 단 2개뿐!</text>

        <circle cx="-30" cy="15" r="15" fill="#339af0" />
        <text x="-30" y="20" fill="#fff" font-size="16" font-family="monospace" font-weight="bold"
            text-anchor="middle">O</text>
        <text x="-30" y="55" fill="#1864ab" font-size="12" font-family="sans-serif" text-anchor="middle">성공 (p)</text>

        <circle cx="30" cy="15" r="15" fill="#868e96" />
        <text x="30" y="20" fill="#fff" font-size="16" font-family="monospace" font-weight="bold"
            text-anchor="middle">X</text>
        <text x="30" y="55" fill="#495057" font-size="12" font-family="sans-serif" text-anchor="middle">실패 (1-p)</text>
    </g>

    <!-- Multi Independent Trials -->
    <path d="M 190 100 L 260 100" fill="none" stroke="#adb5bd" stroke-width="3" stroke-dasharray="5,5"
        marker-end="url(#arrow-grey)" />
    <text x="225" y="90" fill="#495057" font-size="12" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">독립적으로</text>
    <text x="225" y="120" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">n번 복사/붙여넣기</text>

    <!-- Result B(n, p) -->
    <g transform="translate(400, 150)">
        <rect x="-100" y="-80" width="200" height="120" fill="#fff5f5" stroke="#fa5252" stroke-width="2" rx="8" />
        <text x="0" y="-55" fill="#c92a2a" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">이항분포 탄생</text>

        <text x="0" y="-15" fill="#e03131" font-size="30" font-family="monospace" font-weight="bold"
            text-anchor="middle">B(n, p)</text>

        <rect x="-80" y="5" width="160" height="25" fill="#fa5252" rx="4" />
        <text x="0" y="22" fill="#fff" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">"n번 던져서 성공(p)할 확률 맵"</text>
    </g>

    <defs>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>