<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#ae3ec9" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">과거를 스캔하여 미래를 점치다: 확률과 통계의 본질</text>

    <!-- Flow Setup -->

    <!-- Left Box: Statistics (Past) -->
    <g transform="translate(100, 150)">
        <rect x="-80" y="-80" width="160" height="120" fill="#f3d9fa" stroke="#ae3ec9" stroke-width="2" rx="8" />
        <text x="0" y="-50" fill="#862e9c" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">통계 (Statistics)</text>

        <text x="0" y="-20" fill="#868e96" font-size="24" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">과거 (Past)</text>
        <rect x="-60" y="5" width="120" height="20" fill="#fff" rx="3" />
        <text x="0" y="19" fill="#ae3ec9" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">"어제까지 1만 번 부딪힌 결과"</text>
    </g>

    <!-- Arrow Right: Predicting -->
    <path d="M 190 100 L 400 100" fill="none" stroke="#495057" stroke-width="4" stroke-dasharray="4,4"
        marker-end="url(#arrow-grey)" />
    <text x="300" y="90" fill="#868e96" font-size="14" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">법칙 도출 (경향성)</text>

    <!-- Right Box: Probability (Future) -->
    <g transform="translate(490, 150)">
        <rect x="-80" y="-80" width="160" height="120" fill="#e7f5ff" stroke="#339af0" stroke-width="2" rx="8" />
        <text x="0" y="-50" fill="#1864ab" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">확률 (Probability)</text>

        <text x="0" y="-20" fill="#868e96" font-size="24" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">미래 (Future)</text>
        <rect x="-60" y="5" width="120" height="20" fill="#fff" rx="3" />
        <text x="0" y="19" fill="#1864ab" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">"내일 동전이 앞면일 가능성"</text>
    </g>

    <!-- Infinite Loop representation (Data) -->
    <path d="M 500 180 Q 300 230 100 180" fill="none" stroke="#2b8a3e" stroke-width="3" stroke-dasharray="5,5"
        marker-end="url(#arrow-green)" />
    <text x="300" y="220" fill="#2b8a3e" font-size="12" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">점쳐진 미래는 다시 관측되어 과거의 통계 데이터로 쌓인다!</text>

    <defs>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
        </marker>
    </defs>
</svg>