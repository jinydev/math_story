<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#2b8a3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">시행 횟수(n)가 그리는 마법의 종 🔔: 이항분포의 그래프</text>

    <!-- Setup 3 Graphs for n=10, 50, 100 -->

    <!-- n = 10 -->
    <g transform="translate(100, 150)">
        <text x="0" y="-80" fill="#495057" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">n 이 작을 때 (n=10)</text>

        <!-- Axis -->
        <line x1="-60" y1="40" x2="60" y2="40" stroke="#868e96" stroke-width="2" />

        <!-- Bars -->
        <rect x="-40" y="30" width="10" height="10" fill="#a5d8ff" />
        <rect x="-25" y="10" width="10" height="30" fill="#74c0fc" />
        <rect x="-10" y="-20" width="10" height="60" fill="#339af0" />
        <rect x="5" y="-30" width="10" height="70" fill="#1864ab" />
        <rect x="20" y="-10" width="10" height="50" fill="#339af0" />
        <rect x="35" y="20" width="10" height="20" fill="#74c0fc" />

        <text x="0" y="60" fill="#339af0" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">울퉁불퉁, 비대칭</text>
    </g>

    <!-- Mid Arrow -->
    <path d="M 180 110 L 220 110" fill="none" stroke="#2b8a3e" stroke-width="3" marker-end="url(#arrow-green)" />

    <!-- n = 50 -->
    <g transform="translate(300, 150)">
        <text x="0" y="-80" fill="#495057" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">n 이 커질 때 (n=50)</text>

        <!-- Axis -->
        <line x1="-50" y1="40" x2="50" y2="40" stroke="#868e96" stroke-width="2" />

        <!-- Poly Line (Smooth Curve forming) -->
        <path d="M -40 40 L -30 20 L -20 -10 L -10 -40 L 0 -50 L 10 -40 L 20 -10 L 30 20 L 40 40" fill="none"
            stroke="#2b8a3e" stroke-width="3" stroke-linejoin="round" />

        <text x="0" y="60" fill="#2b8a3e" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">부드러운 좌우 대칭</text>
    </g>

    <!-- End Arrow -->
    <path d="M 380 110 L 420 110" fill="none" stroke="#e03131" stroke-width="3" marker-end="url(#arrow-red)" />

    <!-- n = Large (Normal Distribution) -->
    <g transform="translate(500, 150)">
        <rect x="-70" y="-90" width="140" height="160" fill="#fff5f5" rx="10" />
        <text x="0" y="-70" fill="#c92a2a" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">n 이 충분히 크면?</text>

        <!-- Axis -->
        <line x1="-60" y1="40" x2="60" y2="40" stroke="#868e96" stroke-width="2" />

        <!-- Perfect Bell Curve -->
        <path d="M -60 40 C -40 40 -30 0 0 -50 C 30 0 40 40 60 40" fill="none" stroke="#e03131" stroke-width="4" />

        <text x="0" y="20" fill="#c92a2a" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">정규분포 환생!</text>
        <text x="0" y="60" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">완벽한 종(Bell) 모양</text>
    </g>

    <defs>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e03131" />
        </marker>
    </defs>
</svg>