<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#1864ab" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">첫 번째 선택: '비둘기집의 원리 (Pigeonhole Principle)'</text>

    <!-- Title / Setup -->
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"방(N)보다 손님(N+1)이 많으면, 반드시 합방하는 곳이
        생긴다!"</text>

    <!-- Pigeons and Holes scenario -->
    <g transform="translate(100, 80)">

        <!-- Pigeons -->
        <text x="50" y="30" font-size="30">🐦</text>
        <text x="120" y="30" font-size="30">🐦</text>
        <text x="190" y="30" font-size="30">🐦</text>
        <text x="260" y="30" font-size="30" fill="#c92a2a">🐦 (초과!)</text>

        <text x="180" y="-10" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">4마리의 비둘기
            (N+1)</text>

        <!-- Arrows -->
        <path d="M 60 40 L 60 70" fill="none" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)" />
        <path d="M 130 40 L 130 70" fill="none" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)" />
        <path d="M 200 40 L 200 70" fill="none" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)" />
        <path d="M 270 40 L 230 70" fill="none" stroke="#fa5252" stroke-width="2" marker-end="url(#arrow-red)" />

        <!-- Holes -->
        <rect x="25" y="80" width="70" height="60" fill="#fff" stroke="#adb5bd" stroke-width="2" rx="5" />
        <text x="60" y="115" font-size="20" text-anchor="middle">🛖</text>

        <rect x="95" y="80" width="70" height="60" fill="#fff" stroke="#adb5bd" stroke-width="2" rx="5" />
        <text x="130" y="115" font-size="20" text-anchor="middle">🛖</text>

        <!-- The crowded hole -->
        <rect x="165" y="80" width="100" height="60" fill="#ffe3e3" stroke="#fa5252" stroke-width="3" rx="5" />
        <text x="215" y="115" font-size="20" text-anchor="middle">🛖 (2마리)</text>

        <text x="150" y="160" fill="#e67700" font-size="14" font-weight="bold" text-anchor="middle">3개의 비둘기 집 (N)</text>

    </g>

    <!-- Logic text -->
    <rect x="420" y="80" width="150" height="100" fill="#fff" stroke="#adb5bd" rx="5" />
    <text x="495" y="105" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">👉 100% 논리적 참</text>
    <text x="440" y="130" fill="#495057" font-size="10">아무리 공평하게</text>
    <text x="440" y="145" fill="#495057" font-size="10">1마리씩 분배해도,</text>
    <text x="440" y="160" fill="#495057" font-size="10">마지막 1마리는 누군가와</text>
    <text x="440" y="175" fill="#495057" font-size="10">반드시 룸메이트가 됨!</text>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#fa5252" />
        </marker>
    </defs>
</svg>