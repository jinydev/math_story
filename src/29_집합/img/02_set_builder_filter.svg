<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%">
    <rect width="800" height="300" fill="#1e272e" />
    
    <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#f5f6fa" text-anchor="middle">
        조건제시법 (Set-Builder Notation) 필터링
    </text>
    
    <text x="400" y="70" font-family="Arial" font-size="18" fill="#fbc531" text-anchor="middle">
        { x | x는 짝수 } = [x for x in numbers if x % 2 == 0]
    </text>

    <!-- Moving Numbers -->
    <g font-family="Arial" font-size="24" font-weight="bold" fill="#dcdde1">
        <text x="50" y="160">1</text>
        <text x="150" y="160">2</text>
        <text x="250" y="160">3</text>
        <text x="350" y="160">4</text>
        
        <animateTransform attributeName="transform" type="translate" from="-100 0" to="200 0" dur="4s" repeatCount="indefinite" />
    </g>

    <!-- Filter Gate -->
    <rect x="400" y="100" width="20" height="100" fill="#e84118" />
    <text x="410" y="230" font-family="Arial" font-size="14" fill="#e84118" text-anchor="middle">Condition: % 2 == 0</text>

    <!-- Passed Numbers -->
    <g font-family="Arial" font-size="24" font-weight="bold" fill="#4cd137">
        <text x="500" y="160">2</text>
        <text x="650" y="160">4</text>
    </g>

    <text x="600" y="230" font-family="Arial" font-size="16" fill="#4cd137" text-anchor="middle">통과된 집합 원소!</text>
</svg>
