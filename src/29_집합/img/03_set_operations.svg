<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%">
    <rect width="800" height="300" fill="#2d3436" />
    
    <!-- Title -->
    <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        집합 연산의 시각화 (Set Operations)
    </text>

    <!-- Group 1: 합집합 A U B -->
    <g transform="translate(50, 80)">
        <text x="100" y="-10" font-family="Arial" font-size="18" fill="#ffeaa7" text-anchor="middle">A ∪ B (합집합 / OR |)</text>
        <!-- Set A -->
        <circle cx="80" cy="80" r="50" fill="#74b9ff" fill-opacity="0.6" stroke="#74b9ff" stroke-width="2" />
        <!-- Set B -->
        <circle cx="120" cy="80" r="50" fill="#74b9ff" fill-opacity="0.6" stroke="#ff7675" stroke-width="2" />
        <text x="50" y="85" font-family="Arial" font-size="20" font-weight="bold" fill="#fff">A</text>
        <text x="140" y="85" font-family="Arial" font-size="20" font-weight="bold" fill="#fff">B</text>
    </g>

    <!-- Group 2: 교집합 A n B -->
    <g transform="translate(300, 80)">
        <text x="100" y="-10" font-family="Arial" font-size="18" fill="#ffeaa7" text-anchor="middle">A ∩ B (교집합 / AND &amp;)</text>
        <circle cx="80" cy="80" r="50" fill="none" stroke="#74b9ff" stroke-width="2" />
        <circle cx="120" cy="80" r="50" fill="none" stroke="#ff7675" stroke-width="2" />
        <!-- Intersection Path -->
        <path d="M 100 37 A 50 50 0 0 1 100 123 A 50 50 0 0 1 100 37" fill="#00b894" fill-opacity="0.8"/>
        <text x="50" y="85" font-family="Arial" font-size="20" font-weight="bold" fill="#74b9ff">A</text>
        <text x="140" y="85" font-family="Arial" font-size="20" font-weight="bold" fill="#ff7675">B</text>
    </g>

    <!-- Group 3: 차집합 A - B -->
    <g transform="translate(550, 80)">
        <text x="100" y="-10" font-family="Arial" font-size="18" fill="#ffeaa7" text-anchor="middle">A - B (차집합 / Diff -)</text>
        <circle cx="80" cy="80" r="50" fill="#fdcb6e" fill-opacity="0.8" />
        <circle cx="120" cy="80" r="50" fill="#2d3436" stroke="#ff7675" stroke-width="2" />
        <path d="M 100 37 A 50 50 0 0 1 100 123 A 50 50 0 0 1 100 37" fill="#2d3436"/>
        <text x="50" y="85" font-family="Arial" font-size="20" font-weight="bold" fill="#fff">A</text>
        <text x="140" y="85" font-family="Arial" font-size="20" font-weight="bold" fill="#ff7675">B</text>
    </g>

</svg>
