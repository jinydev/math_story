<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%">
    <rect width="500" height="500" fill="#1e272e"/>
    <text x="250" y="40" font-family="Arial" font-size="20" font-weight="bold" fill="#d2dae2" text-anchor="middle">직선의 방정식 (y = ax + b)</text>
    
    <!-- Axes and Grid -->
    <path d="M50 0 L50 500 M150 0 L150 500 M250 0 L250 500 M350 0 L350 500 M450 0 L450 500" stroke="#485460" stroke-width="1" stroke-dasharray="4"/>
    <path d="M0 50 L500 50 M0 150 L500 150 M0 250 L500 250 M0 350 L500 350 M0 450 L500 450" stroke="#485460" stroke-width="1" stroke-dasharray="4"/>
    
    <line x1="250" y1="50" x2="250" y2="450" stroke="#808e9b" stroke-width="2"/>
    <line x1="50" y1="250" x2="450" y2="250" stroke="#808e9b" stroke-width="2"/>
    <text x="460" y="270" fill="#808e9b" font-family="Arial">x</text>
    <text x="260" y="40" fill="#808e9b" font-family="Arial">y</text>
    
    <!-- Animated Line y = 2x (steep) transitioning to y = 0.5x (shallow) -->
    <!-- Pivot around origin (250, 250) -->
    <line x1="150" y1="450" x2="350" y2="50" stroke="#0fbcf9" stroke-width="4">
        <!-- Rotate transformation -->
        <animateTransform attributeName="transform" type="rotate" values="0 250 250; 45 250 250; 0 250 250" dur="4s" repeatCount="indefinite"/>
    </line>
    
    <!-- y-intercept marking (b=0 here for simplicity)/ changing b by translation -->
    <circle cx="250" cy="250" r="8" fill="#ffdd59">
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -100; 0 0; 0 100; 0 0" dur="6s" repeatCount="indefinite"/>
    </circle>
    
    <text x="320" y="100" fill="#0fbcf9" font-family="Arial" font-size="18" font-weight="bold">
        <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
        기울기(a)와 절편(b)
    </text>
</svg>
