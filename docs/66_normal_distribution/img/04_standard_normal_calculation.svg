<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#c92a2a" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">Z 스캐너의 마법: 표준화와 등수 환산 타격 (Standardization)</text>

    <!-- Left Side: Original Messy Normal Distribution (Math score vs English score) -->
    <g transform="translate(130, 200)">
        <!-- X-axis -->
        <line x1="-120" y1="0" x2="120" y2="0" stroke="#868e96" stroke-width="2" />

        <!-- Original Curve 1 (Math: mean 60, shape tight) -->
        <path d="M -90 0 C -40 0, -20 -100, 0 -100 C 20 -100, 40 0, 90 0" fill="#ffc9c9" opacity="0.6" stroke="#e03131"
            stroke-width="2" />
        <line x1="0" y1="0" x2="0" y2="-100" stroke="#e03131" stroke-width="1" stroke-dasharray="3,3" />
        <text x="-30" y="15" fill="#e03131" font-size="10" font-weight="bold">m=60 (수학)</text>

        <!-- Student Score -->
        <circle cx="30" cy="-60" r="4" fill="#c92a2a" />
        <text x="35" y="-65" fill="#c92a2a" font-size="10" font-weight="bold">내점수 75점</text>

        <text x="0" y="-130" fill="#495057" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">"영어 80점이 잘한걸까?</text>
        <text x="0" y="-115" fill="#495057" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">수학 75점이 잘한걸까?"</text>
    </g>

    <!-- The standardization process -->
    <path d="M 270 110 L 330 110" fill="none" stroke="#2b8a3e" stroke-width="4" stroke-dasharray="4,4"
        marker-end="url(#arrow-green)" />
    <rect x="255" y="65" width="90" height="30" fill="#ebfbee" stroke="#40c057" stroke-width="2" rx="4" />
    <text x="300" y="85" fill="#2b8a3e" font-size="12" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">Z-변환 (표준화)</text>
    <text x="300" y="130" fill="#2b8a3e" font-size="12" font-family="monospace" font-weight="bold"
        text-anchor="middle">Z = (X - m) / σ</text>

    <!-- Right Side: Standard Normal Distribution -->
    <g transform="translate(470, 200)">
        <!-- X-axis -->
        <line x1="-120" y1="0" x2="120" y2="0" stroke="#868e96" stroke-width="2" />

        <!-- Standard Curve (Mean 0, Std 1) -->
        <path d="M -100 0 C -50 0, -25 -120, 0 -120 C 25 -120, 50 0, 100 0" fill="#d3f9d8" opacity="0.6"
            stroke="#2b8a3e" stroke-width="2" />
        <line x1="0" y1="0" x2="0" y2="-120" stroke="#2b8a3e" stroke-width="2" stroke-dasharray="3,3" />

        <!-- Ticks -->
        <text x="0" y="15" fill="#2b8a3e" font-size="12" font-weight="bold" text-anchor="middle">0</text>
        <line x1="40" y1="0" x2="40" y2="5" stroke="#2b8a3e" stroke-width="2" />
        <text x="40" y="20" fill="#2b8a3e" font-size="10" text-anchor="middle">1</text>
        <line x1="-40" y1="0" x2="-40" y2="5" stroke="#2b8a3e" stroke-width="2" />
        <text x="-40" y="20" fill="#2b8a3e" font-size="10" text-anchor="middle">-1</text>
        <line x1="80" y1="0" x2="80" y2="5" stroke="#2b8a3e" stroke-width="2" />
        <text x="80" y="20" fill="#2b8a3e" font-size="10" text-anchor="middle">2</text>

        <!-- Transformed scores hitting Z-scale -->
        <circle cx="60" cy="-60" r="4" fill="#c92a2a" /> <!-- Math Z=1.5 -> translated to say Z=1.5 coords -->
        <text x="65" y="-65" fill="#c92a2a" font-size="12" font-weight="bold">수학 (Z=1.5)</text>
        <text x="65" y="-50" fill="#c92a2a" font-size="10">상위 6.68%</text>

        <!-- English hypothetically got smaller Z -->
        <circle cx="20" cy="-100" r="4" fill="#1864ab" />
        <text x="25" y="-105" fill="#1864ab" font-size="12" font-weight="bold">영어 (Z=0.5)</text>

        <text x="0" y="-135" fill="#099268" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">표준정규분포 (평균 0, 편차 1)</text>
    </g>

    <defs>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
        </marker>
    </defs>
</svg>