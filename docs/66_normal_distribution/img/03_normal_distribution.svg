<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#1864ab" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">신의 붓놀림: 가장 완벽한 대칭, 정규분포 (Normal Distribution)</text>

    <!-- Bell Curve Graphic -->
    <g transform="translate(300, 200)">
        <!-- X-axis -->
        <line x1="-250" y1="0" x2="250" y2="0" stroke="#868e96" stroke-width="2" />

        <!-- Idealized Bell Curve Path -->
        <!-- Center (0, -150), inflections at approx +/- 60 -->
        <path
            d="M -250 0 C -150 0, -100 -10, -60 -60 C -30 -120, -15 -150, 0 -150 C 15 -150, 30 -120, 60 -60 C 100 -10, 150 0, 250 0"
            fill="#e7f5ff" stroke="#1864ab" stroke-width="4" />

        <!-- Mean (m) Line -->
        <line x1="0" y1="0" x2="0" y2="-150" stroke="#c92a2a" stroke-width="2" stroke-dasharray="6,4" />
        <text x="0" y="20" fill="#c92a2a" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">평균 (m)</text>

        <!-- Standard Deviation Regions (Sigma) -->
        <!-- +1 Sigma -->
        <line x1="60" y1="0" x2="60" y2="-60" stroke="#339af0" stroke-width="1.5" stroke-dasharray="3,3" />
        <text x="60" y="15" fill="#339af0" font-size="12" font-family="sans-serif" text-anchor="middle">m + 1σ</text>

        <!-- -1 Sigma -->
        <line x1="-60" y1="0" x2="-60" y2="-60" stroke="#339af0" stroke-width="1.5" stroke-dasharray="3,3" />
        <text x="-60" y="15" fill="#339af0" font-size="12" font-family="sans-serif" text-anchor="middle">m - 1σ</text>

        <!-- Arrows indicating symmetry -->
        <path d="M -80 -100 Q 0 -130 80 -100" fill="none" stroke="#f08c00" stroke-width="2"
            marker-start="url(#dot-orange)" marker-end="url(#dot-orange)" />
        <text x="0" y="-120" fill="#d9480f" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">좌우 완벽 데칼코마니 (대칭)</text>

        <!-- Equation Box -->
        <rect x="120" y="-180" width="130" height="40" fill="#fff" stroke="#adb5bd" stroke-width="1" rx="4" />
        <text x="185" y="-165" fill="#495057" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">기호 형태</text>
        <text x="185" y="-150" fill="#1864ab" font-size="14" font-family="monospace" font-weight="bold"
            text-anchor="middle">N(m, σ²)</text>
    </g>

    <defs>
        <marker id="dot-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6">
            <circle cx="5" cy="5" r="3" fill="#f08c00" />
        </marker>
    </defs>
</svg>