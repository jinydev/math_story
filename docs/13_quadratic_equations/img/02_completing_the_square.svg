<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="400">
    <defs>
        <style>
            .bg {
                fill: #f8fafc;
                rx: 10;
                stroke: #cbd5e1;
                stroke-width: 2;
            }

            /* Tiles */
            .x2-tile {
                fill: #3b82f6;
                fill-opacity: 0.8;
                stroke: #1d4ed8;
                stroke-width: 2;
            }

            .x-tile {
                fill: #34d399;
                fill-opacity: 0.8;
                stroke: #059669;
                stroke-width: 2;
            }

            .one-tile {
                fill: #fcd34d;
                fill-opacity: 0.8;
                stroke: #d97706;
                stroke-width: 1.5;
            }

            .ghost-tile {
                fill: none;
                stroke: #ef4444;
                stroke-width: 2;
                stroke-dasharray: 4;
            }

            /* Text */
            .title {
                font-family: 'Pretendard', sans-serif;
                font-size: 22px;
                fill: #0f172a;
                font-weight: bold;
                text-anchor: middle;
            }

            .formula {
                font-family: 'Courier New', monospace;
                font-size: 26px;
                fill: #0f172a;
                font-weight: bold;
                text-anchor: middle;
            }

            .label-white {
                font-family: 'Pretendard', sans-serif;
                font-size: 18px;
                fill: #ffffff;
                font-weight: bold;
                text-anchor: middle;
                dominant-baseline: middle;
            }

            .label-dark {
                font-family: 'Pretendard', sans-serif;
                font-size: 16px;
                fill: #0f172a;
                font-weight: bold;
                text-anchor: middle;
                dominant-baseline: middle;
            }

            .desc {
                font-family: 'Pretendard', sans-serif;
                font-size: 15px;
                fill: #64748b;
                text-anchor: middle;
            }

            .arrow {
                stroke: #94a3b8;
                stroke-width: 3;
                marker-end: url(#arrowhead);
            }
        </style>

        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="300" y="40" class="title">완전제곱식 퍼즐 $x^2 + 4x + 4$ 를 기하학 면적으로 조립하기</text>

    <!-- Left Side: Scattered Blocks -->
    <g transform="translate(60, 100)">
        <text x="80" y="-20" class="formula">x² + 4x + 4</text>

        <!-- x^2 block (large blue square) -->
        <rect x="0" y="20" width="100" height="100" class="x2-tile" />
        <text x="50" y="70" class="label-white">x²</text>

        <!-- 4 'x' blocks (green rectangles) scattered -->
        <rect x="120" y="20" width="25" height="100" class="x-tile" />
        <text x="132.5" y="70" class="label-white">x</text>
        <rect x="155" y="20" width="25" height="100" class="x-tile" />
        <text x="167.5" y="70" class="label-white">x</text>

        <!-- Horizontal 'x' blocks -->
        <rect x="0" y="140" width="100" height="25" class="x-tile" />
        <text x="50" y="152.5" class="label-white">x</text>
        <rect x="0" y="175" width="100" height="25" class="x-tile" />
        <text x="50" y="187.5" class="label-white">x</text>

        <!-- 4 '1' blocks (yellow tiny squares) -->
        <rect x="120" y="140" width="25" height="25" class="one-tile" />
        <text x="132.5" y="152.5" class="label-dark">1</text>
        <rect x="155" y="140" width="25" height="25" class="one-tile" />
        <text x="167.5" y="152.5" class="label-dark">1</text>
        <rect x="120" y="175" width="25" height="25" class="one-tile" />
        <text x="132.5" y="187.5" class="label-dark">1</text>
        <rect x="155" y="175" width="25" height="25" class="one-tile" />
        <text x="167.5" y="187.5" class="label-dark">1</text>
    </g>

    <!-- Combine Arrow -->
    <line x1="260" y1="200" x2="310" y2="200" class="arrow" />

    <!-- Right Side: Perfect Square Assembled -->
    <g transform="translate(350, 100)">
        <text x="75" y="-20" class="formula">(x + 2)²</text>

        <!-- x^2 at top-left -->
        <rect x="0" y="20" width="100" height="100" class="x2-tile" />
        <text x="50" y="70" class="label-white">x²</text>

        <!-- x bounds -->
        <path d="M 0 10 L 100 10" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arrowhead)"
            marker-start="url(#arrowhead)" />
        <text x="50" y="0" class="label-dark">x</text>

        <path d="M -10 20 L -10 120" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arrowhead)"
            marker-start="url(#arrowhead)" />
        <text x="-25" y="70" class="label-dark">x</text>

        <!-- Right side 'x' blocks (x2 vertically) -->
        <rect x="100" y="20" width="25" height="100" class="x-tile" />
        <text x="112.5" y="70" class="label-white">x</text>
        <rect x="125" y="20" width="25" height="100" class="x-tile" />
        <text x="137.5" y="70" class="label-white">x</text>

        <path d="M 100 10 L 150 10" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arrowhead)"
            marker-start="url(#arrowhead)" />
        <text x="125" y="0" class="label-dark">2</text>

        <!-- Bottom side 'x' blocks (x2 horizontally) -->
        <rect x="0" y="120" width="100" height="25" class="x-tile" />
        <text x="50" y="132.5" class="label-white">x</text>
        <rect x="0" y="145" width="100" height="25" class="x-tile" />
        <text x="50" y="157.5" class="label-white">x</text>

        <path d="M -10 120 L -10 170" stroke="#0f172a" stroke-width="1.5" marker-end="url(#arrowhead)"
            marker-start="url(#arrowhead)" />
        <text x="-25" y="145" class="label-dark">2</text>

        <!-- Missing corner filled with exactly 4 '1' blocks! -->
        <rect x="100" y="120" width="25" height="25" class="one-tile" />
        <rect x="125" y="120" width="25" height="25" class="one-tile" />
        <rect x="100" y="145" width="25" height="25" class="one-tile" />
        <rect x="125" y="145" width="25" height="25" class="one-tile" />
        <text x="125" y="145" class="label-dark" font-size="20px">4</text>

        <!-- Bounding outline showing it's a PERFECT SQUARE (x+2) * (x+2) -->
        <rect x="0" y="20" width="150" height="150" class="ghost-tile" />
    </g>

    <text x="300" y="340" class="desc">흩어진 타일들을 오목조목 억지로 우겨넣어 (가로 x+2) × (세로 x+2) 의</text>
    <text x="300" y="365" class="desc">빈틈없는 '거대한 하나의 정사각형' 면적으로 뭉쳐버리는 마법!</text>

</svg>