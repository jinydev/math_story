<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#ae3ec9" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">그래프를 이용한 레이저 커팅: 삼각방정식과 삼각부등식</text>

    <!-- Problem Setup -->
    <g transform="translate(100, 150)">
        <rect x="-80" y="-80" width="160" height="120" fill="#f3d9fa" stroke="#ae3ec9" stroke-width="2" rx="8" />
        <text x="0" y="-55" fill="#862e9c" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">미션 (Mission)</text>

        <text x="0" y="-20" fill="#862e9c" font-size="20" font-family="monospace" font-weight="bold"
            text-anchor="middle">sin(x) = 1/2</text>

        <rect x="-60" y="5" width="120" height="20" fill="#eebefa" rx="3" />
        <text x="0" y="19" fill="#862e9c" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">x(각도)는 몇 개일까?</text>
    </g>

    <!-- Arrow -->
    <path d="M 190 110 L 250 110" fill="none" stroke="#adb5bd" stroke-width="4" marker-end="url(#arrow-grey)" />
    <text x="220" y="90" fill="#495057" font-size="12" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">치트키</text>
    <text x="220" y="130" fill="#e03131" font-size="12" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">눈으로 보기!</text>

    <!-- Graph Cut Solution -->
    <g transform="translate(420, 150)">
        <rect x="-140" y="-80" width="280" height="120" fill="#fff5f5" stroke="#fa5252" stroke-width="2" rx="8" />
        <text x="0" y="-60" fill="#c92a2a" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">레이저 커팅 (y = 1/2 긋기)</text>

        <!-- Axes in mini graph -->
        <line x1="-120" y1="20" x2="120" y2="20" stroke="#868e96" stroke-width="1" />

        <!-- Sine curve (from x=-100 to 100, one cycle) -->
        <!-- M -100 20 C -50 -40, -10 -40, 0 20 C 10 80, 50 80, 100 20 -->
        <!-- Let's just draw y=sin(x) mapped purely -->
        <path d="M -100 20 Q -50 -40 0 20 Q 50 80 100 20" fill="none" stroke="#339af0" stroke-width="3" />

        <!-- Laser line y = 1/2 (Let's say y = -10 here) -->
        <line x1="-120" y1="-10" x2="120" y2="-10" stroke="#f03e3e" stroke-width="2" stroke-dasharray="4,4" />
        <text x="-100" y="-15" fill="#f03e3e" font-size="10" font-family="sans-serif" font-weight="bold">y = 1/2</text>

        <!-- Intersections -->
        <!-- Approx intersection points at x = -75 and x = -25 -->
        <circle cx="-80" cy="-10" r="4" fill="#e03131" />
        <circle cx="-20" cy="-10" r="4" fill="#e03131" />

        <!-- Down Arrows -->
        <path d="M -80 -5 L -80 15" fill="none" stroke="#e03131" stroke-width="1" marker-end="url(#arrow-red)" />
        <path d="M -20 -5 L -20 15" fill="none" stroke="#e03131" stroke-width="1" marker-end="url(#arrow-red)" />

        <!-- Values -->
        <text x="-80" y="35" fill="#c92a2a" font-size="12" font-family="monospace" font-weight="bold"
            text-anchor="middle">30°</text>
        <text x="-20" y="35" fill="#c92a2a" font-size="12" font-family="monospace" font-weight="bold"
            text-anchor="middle">150°</text>

    </g>

    <defs>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e03131" />
        </marker>
    </defs>
</svg>