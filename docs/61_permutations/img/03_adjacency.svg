<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
    <rect width="600" height="300" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#e8590c" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">세 번째 나열: '이웃하거나, 이웃하지 않거나'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"특수 조건을 가진 VIP들을 일렬로 세웠을 때 발생하는 수학적 대참사
        방어법"</text>

    <!-- Condition 1: 이웃하는 경우 (묶음 처리) -->
    <g transform="translate(40, 70)">
        <rect x="0" y="0" width="240" height="200" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="120" y="25" fill="#e8590c" font-size="14" font-weight="bold" text-anchor="middle">🤝 이웃해야 하는 경우
            (접착제)</text>
        <text x="120" y="45" fill="#495057" font-size="11" text-anchor="middle">"우리 셋은 무조건 손잡고 같이 다닐 거야!"</text>

        <!-- Visual -->
        <!-- The Group -->
        <rect x="20" y="60" width="110" height="50" fill="#ffe3e3" stroke="#fa5252" stroke-dasharray="2,2" rx="25" />
        <text x="35" y="93" font-size="24">👩</text>
        <text x="65" y="93" font-size="24">👦</text>
        <text x="95" y="93" font-size="24">👧</text>
        <text x="75" y="125" fill="#c92a2a" font-size="11" font-weight="bold" text-anchor="middle">1개의 덩어리 취급</text>

        <text x="135" y="93" font-size="24">👨</text>
        <text x="175" y="93" font-size="24">👵</text>
        <text x="215" y="93" font-size="24">🧓</text>

        <text x="175" y="125" fill="#495057" font-size="11" font-weight="bold" text-anchor="middle">나머지 3명</text>

        <!-- Formula -->
        <rect x="10" y="140" width="220" height="50" fill="#f1f3f5" rx="5" />
        <text x="120" y="160" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">1. 덩어리(1) + 나머지(3) =
            4! (수건돌리기)</text>
        <text x="120" y="175" fill="#e8590c" font-size="12" font-weight="bold" text-anchor="middle">2. 덩어리 내부 지들끼리 자리교체
            = 3!</text>
        <text x="120" y="195" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">최종: 4! × 3! =
            144가지</text>
    </g>

    <!-- Condition 2: 이웃하지 않아야 하는 경우 (사이에 끼워넣기) -->
    <g transform="translate(320, 70)">
        <rect x="0" y="0" width="240" height="200" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="120" y="25" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">🔥 이웃하지 않아야 하는
            경우</text>
        <text x="120" y="45" fill="#495057" font-size="11" text-anchor="middle">"둘이 싸웠음. 절대 옆에 붙여놓지 마!"</text>

        <!-- Visual -->
        <!-- Safe people first -->
        <text x="25" y="80" font-size="24">👨</text>
        <text x="75" y="80" font-size="24">👩</text>
        <text x="125" y="80" font-size="24">👵</text>
        <text x="175" y="80" font-size="24">🧓</text>
        <path d="M 20 90 L 200 90" stroke="#adb5bd" stroke-width="1" />
        <text x="110" y="105" fill="#495057" font-size="11" font-weight="bold" text-anchor="middle">친한 4명을 먼저 세운다
            (4!)</text>

        <!-- Insert fighting people -->
        <text x="10" y="60" fill="#c92a2a" font-size="16" font-weight="bold">V</text>
        <text x="60" y="60" fill="#c92a2a" font-size="16" font-weight="bold">V</text>
        <text x="110" y="60" fill="#c92a2a" font-size="16" font-weight="bold">V</text>
        <text x="160" y="60" fill="#c92a2a" font-size="16" font-weight="bold">V</text>
        <text x="210" y="60" fill="#c92a2a" font-size="16" font-weight="bold">V</text>
        <text x="110" y="125" fill="#c92a2a" font-size="11" font-weight="bold" text-anchor="middle">5개의 빈틈(V) 생성!</text>

        <text x="110" y="150" font-size="24">👦 👦 (웬수 2명)</text>

        <!-- Formula -->
        <rect x="10" y="165" width="220" height="25" fill="#f1f3f5" rx="5" />
        <text x="120" y="182" fill="#1864ab" font-size="11" font-weight="bold" text-anchor="middle">최종: 친한자(4!) × 빈틈에
            꽂기(5P2)</text>

    </g>

</svg>