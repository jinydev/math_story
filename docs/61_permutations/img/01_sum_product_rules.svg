<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#c92a2a" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">첫 번째 나열: '합의 법칙 vs 곱의 법칙'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"동시에 일어날 수 있는가? (AND vs OR 의 수학적 번역)"</text>

    <!-- Rule of SUM (OR) -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#e8590c" font-size="14" font-weight="bold" text-anchor="middle">➕ 합의 법칙 (OR)</text>
        <text x="110" y="45" fill="#495057" font-size="11" text-anchor="middle">"동시에 일어날 수 없는 사건"</text>

        <!-- Visual: Choosing ONLY 1 dessert -->
        <rect x="25" y="60" width="170" height="40" fill="#fff4e6" stroke="#f59f00" stroke-dasharray="2,2" />
        <text x="110" y="85" fill="#d9480f" font-size="12" font-weight="bold" text-anchor="middle">아이스크림(3) OR
            조각케익(2)</text>
        <text x="110" y="115" font-size="20" text-anchor="middle">🍦🍦🍦 + 🍰🍰</text>

        <text x="110" y="140" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">총 5가지 선택지 (3 + 2 =
            5)</text>
    </g>

    <!-- Divider -->
    <line x1="300" y1="80" x2="300" y2="230" stroke="#adb5bd" stroke-width="2" stroke-dasharray="4,4" />

    <!-- Rule of PRODUCT (AND) -->
    <g transform="translate(320, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">✖️ 곱의 법칙 (AND)</text>
        <text x="110" y="45" fill="#495057" font-size="11" text-anchor="middle">"연이어, 동시에 이어지는 사건"</text>

        <!-- Visual: Matching clothes -->
        <rect x="25" y="60" width="170" height="40" fill="#e7f5ff" stroke="#339af0" stroke-dasharray="2,2" />
        <text x="110" y="85" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">상의(3벌) AND 하의(2벌)
            코디</text>

        <text x="50" y="115" font-size="20">👕👕👕</text>
        <text x="110" y="115" fill="#adb5bd" font-size="14" font-weight="bold" text-anchor="middle">X</text>
        <text x="160" y="115" font-size="20">👖👖</text>

        <text x="110" y="140" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">총 코디 조합수 (3 × 2 =
            6)</text>
    </g>

</svg>