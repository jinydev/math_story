<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#c92a2a" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">마름모 (Rhombus) 의 십자가 직교 마법</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"네 변의 몽둥이를 강제로 똑같이 맞추면, 내부에 90도 수직 대각선 직교축이
        우상향/우하향 충돌한다!"</text>

    <!-- Rhombus Base -->
    <g transform="translate(60, 80)">
        <!-- Main Shape: Diamond -->
        <path d="M 100 10 L 190 75 L 100 140 L 10 75 Z" fill="#ffe3e3" stroke="#f03e3e" stroke-width="3" />

        <!-- Equal Sides Marks -->
        <line x1="50" y1="35" x2="60" y2="50" stroke="#c92a2a" stroke-width="2" />
        <line x1="140" y1="35" x2="150" y2="50" stroke="#c92a2a" stroke-width="2" />
        <line x1="50" y1="115" x2="60" y2="100" stroke="#c92a2a" stroke-width="2" />
        <line x1="140" y1="115" x2="150" y2="100" stroke="#c92a2a" stroke-width="2" />
        <text x="50" y="10" fill="#c92a2a" font-size="10" font-weight="bold">네 변 통일</text>

        <!-- Diagonals -->
        <line x1="100" y1="10" x2="100" y2="140" stroke="#fa5252" stroke-width="1.5" stroke-dasharray="3,3" />
        <line x1="10" y1="75" x2="190" y2="75" stroke="#fa5252" stroke-width="1.5" stroke-dasharray="3,3" />

        <!-- 90 degree orthogonal mark -->
        <rect x="100" y="75" width="10" height="10" fill="none" stroke="#2b8a3e" stroke-width="1.5"
            transform="rotate(180 100 75)" />
        <text x="115" y="70" fill="#2b8a3e" font-size="12" font-weight="bold">90° 직교</text>

        <!-- Angle Bisector -->
        <!-- Top angle -->
        <path d="M 90 20 A 15 15 0 0 1 110 20" fill="none" stroke="#f59f00" stroke-width="2" />
        <!-- dividing line already drawn (diagonal) -->
        <text x="100" y="40" fill="#f59f00" font-size="10" font-weight="bold" text-anchor="middle">각 반갈죽</text>
    </g>

    <!-- Transform Arrow -->
    <path d="M 280 145 C 300 110, 300 110, 320 145" fill="none" stroke="#adb5bd" stroke-width="3" stroke-dasharray="4,2"
        marker-end="url(#arrow-gray)" />
    <rect x="250" y="110" width="100" height="20" fill="#fff" stroke="#adb5bd" rx="3" />
    <text x="300" y="124" fill="#495057" font-size="10" font-weight="bold" text-anchor="middle">DNA 차이 체감</text>

    <!-- Comparison with Rectangle -->
    <g transform="translate(360, 80)">
        <rect x="0" y="0" width="200" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="100" y="25" fill="#f59f00" font-size="14" font-weight="bold" text-anchor="middle">형제 직사각형과의 비교</text>

        <!-- Rectangle Shape inside -->
        <rect x="40" y="50" width="120" height="70" fill="#fff3bf" stroke="#f59f00" stroke-width="2" />

        <!-- Rectangle Diagonals -->
        <line x1="40" y1="50" x2="160" y2="120" stroke="#862e9c" stroke-width="1.5" stroke-dasharray="2,2" />
        <line x1="160" y1="50" x2="40" y2="120" stroke="#862e9c" stroke-width="1.5" stroke-dasharray="2,2" />

        <!-- Diagonal Length mark -->
        <text x="100" y="70" fill="#862e9c" font-size="10" font-weight="bold" text-anchor="middle">대각선 길이 일치 (90도 직교
            아님!)</text>
        <text x="100" y="140" fill="#e8590c" font-size="10" font-weight="bold" text-anchor="middle">"형태가 다르면 보너스 능력도
            다름"</text>
    </g>

    <defs>
        <marker id="arrow-gray" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>