<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#212529" rx="10" />

    <text x="300" y="30" fill="#38d9a9" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">궁극의 변칙 넓이 공식 (Area of any Quadrilateral)</text>
    <text x="300" y="55" fill="#ced4da" font-size="12" text-anchor="middle">"형태가 무너졌다면, 심장부의 대각선 뼈대 두 개와 충돌 각도(θ)만
        훔쳐내라!"</text>

    <!-- Left: The Distorted Polygon -->
    <g transform="translate(60, 70)">
        <!-- Arbitrary Polygon Outline -->
        <path d="M 20 50 L 130 15 L 170 110 L 40 160 Z" fill="#2b8a3e" stroke="#69db7c" stroke-width="2"
            opacity="0.4" />

        <!-- Diagonal A -->
        <line x1="20" y1="50" x2="170" y2="110" stroke="#fcc419" stroke-width="3" stroke-dasharray="0"
            marker-start="url(#dot-yellow)" marker-end="url(#dot-yellow)" />
        <text x="40" y="70" fill="#fcc419" font-size="14" font-weight="bold">a</text>

        <!-- Diagonal B -->
        <line x1="130" y1="15" x2="40" y2="160" stroke="#4dabf7" stroke-width="3" stroke-dasharray="0"
            marker-start="url(#dot-blue)" marker-end="url(#dot-blue)" />
        <text x="110" y="35" fill="#4dabf7" font-size="14" font-weight="bold">b</text>

        <!-- Angle Theta -->
        <!-- Intersection is approximately at (90, 80) -->
        <path d="M 115 70 A 30 30 0 0 1 105 105" fill="none" stroke="#ff8787" stroke-width="2" />
        <text x="125" y="85" fill="#ff8787" font-size="16" font-weight="bold">θ</text>
    </g>

    <!-- Right: The Formula Matrix -->
    <g transform="translate(300, 70)">
        <rect x="0" y="0" width="280" height="150" fill="#1864ab" stroke="#4dabf7" stroke-width="2" rx="5"
            opacity="0.8" />
        <text x="140" y="30" fill="#e7f5ff" font-size="16" font-weight="bold" text-anchor="middle">🔥 [무적의 스캐너 연산식]
            🔥</text>

        <rect x="20" y="50" width="240" height="60" fill="#0b2b5e" rx="3" />

        <!-- Area = 1/2 * a * b * sin(theta) -->
        <text x="140" y="88" fill="#ffd43b" font-size="22" font-family="monospace" font-weight="bold"
            text-anchor="middle">
            <tspan fill="#e7f5ff">S</tspan>
            <tspan fill="#4dabf7"> = </tspan>
            <tspan fill="#ff8787">½ </tspan>
            <tspan fill="#fcc419">a</tspan>
            <tspan fill="#ced4da">×</tspan>
            <tspan fill="#4dabf7">b</tspan>
            <tspan fill="#ced4da">×</tspan>
            <tspan fill="#ff8787">sin(θ)</tspan>
        </text>

        <!-- Sub note -->
        <text x="140" y="130" fill="#74c0fc" font-size="11" font-weight="bold" text-anchor="middle">이단아(일반 찌그러진 사각형)들의
            필수 해킹툴</text>
        <text x="140" y="145" fill="#74c0fc" font-size="11" font-weight="bold" text-anchor="middle">(만약 마름모라면 θ=90도가 되어
            sin(90)=1, 따라서 ½ab)</text>
    </g>

    <defs>
        <marker id="dot-yellow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4">
            <circle cx="5" cy="5" r="4" fill="#fcc419" />
        </marker>
        <marker id="dot-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4">
            <circle cx="5" cy="5" r="4" fill="#4dabf7" />
        </marker>
    </defs>
</svg>