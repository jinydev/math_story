<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#0ca678" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">중점 연결 정리 (Midpoint Quadrilateral)</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"겉이 아무리 엉망진창이어도, 중점을 이어버리면 무조건 '평행사변형'이
        부활한다!"</text>

    <!-- Left: Random Quad to Parallelogram -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="160" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="80" y="25" fill="#495057" font-size="14" font-weight="bold" text-anchor="middle">일반 짐승 사각형</text>

        <!-- Outer Quad -->
        <path d="M 20 50 L 130 30 L 150 120 L 40 140 Z" fill="none" stroke="#adb5bd" stroke-width="2" />

        <!-- Midpoints -->
        <circle cx="75" cy="40" r="4" fill="#fa5252" />
        <circle cx="140" cy="75" r="4" fill="#fa5252" />
        <circle cx="95" cy="130" r="4" fill="#fa5252" />
        <circle cx="30" cy="95" r="4" fill="#fa5252" />
        <text x="75" y="35" fill="#fa5252" font-size="10" font-weight="bold" text-anchor="middle">M1</text>

        <!-- Inner Parallelogram -->
        <path d="M 75 40 L 140 75 L 95 130 L 30 95 Z" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2" />
        <text x="85" y="90" fill="#2b8a3e" font-size="12" font-weight="bold" text-anchor="middle">평행사변형</text>
    </g>

    <!-- Transform Arrow -->
    <path d="M 240 145 C 255 110, 255 110, 270 145" fill="none" stroke="#2b8a3e" stroke-width="3" stroke-dasharray="4,2"
        marker-end="url(#arrow-green)" />
    <rect x="230" y="110" width="50" height="20" fill="#e6fcf5" rx="3" />
    <text x="255" y="124" fill="#0ca678" font-size="10" font-weight="bold" text-anchor="middle">진화 법칙</text>

    <!-- Right: Properties Cross-inheritance -->
    <g transform="translate(300, 80)">
        <rect x="0" y="0" width="280" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="140" y="25" fill="#2b8a3e" font-size="14" font-weight="bold" text-anchor="middle">귀족 사각형의 중점 환생 (십자
            유전)</text>

        <!-- Rectangle -> Rhombus -->
        <g transform="translate(10, 40)">
            <rect x="10" y="10" width="60" height="40" fill="none" stroke="#f59f00" stroke-width="2" />
            <path d="M 40 10 L 70 30 L 40 50 L 10 30 Z" fill="#ffe3e3" stroke="#f03e3e" stroke-width="2" />
            <text x="40" y="70" fill="#e8590c" font-size="10" font-weight="bold" text-anchor="middle">직사각형 → 마름모</text>
        </g>

        <!-- Rhombus -> Rectangle -->
        <g transform="translate(110, 40)">
            <path d="M 40 10 L 70 30 L 40 50 L 10 30 Z" fill="none" stroke="#f03e3e" stroke-width="2" />
            <rect x="25" y="20" width="30" height="20" fill="#fff3bf" stroke="#f59f00" stroke-width="2" />
            <text x="40" y="70" fill="#c92a2a" font-size="10" font-weight="bold" text-anchor="middle">마름모 → 직사각형</text>
        </g>

        <!-- Square -> Square -->
        <g transform="translate(200, 40)">
            <rect x="10" y="10" width="40" height="40" fill="none" stroke="#862e9c" stroke-width="2" />
            <path d="M 30 10 L 50 30 L 30 50 L 10 30 Z" fill="#f3f0ff" stroke="#862e9c" stroke-width="2" />
            <text x="30" y="70" fill="#862e9c" font-size="10" font-weight="bold" text-anchor="middle">정사 → 정사</text>
        </g>

        <text x="140" y="120" fill="#e8590c" font-size="10" font-weight="bold" text-anchor="middle">직교 대각선 뼈대는 '직사각형'
            껍데기를.</text>
        <text x="140" y="135" fill="#e8590c" font-size="10" font-weight="bold" text-anchor="middle">동일 길이 대각선 뼈대는 '마름모'
            껍데기를 만든다.</text>
    </g>

    <defs>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
        </marker>
    </defs>
</svg>