<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A202C" />
      <stop offset="100%" stop-color="#2D3748" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" rx="15" />

  <text x="400" y="40" font-family="'Inter', sans-serif" font-size="28" font-weight="bold" fill="#F7FAFC" text-anchor="middle" filter="url(#glow)">이분법 (Bisection Method): $\sqrt{2}$ 추적기</text>
  <text x="400" y="70" font-family="'Inter', sans-serif" font-size="16" fill="#A0AEC0" text-anchor="middle">컴퓨터가 미지의 숫자(루트 2)를 탐색하기 위해 범위를 절반씩 좁혀 들어가는 알고리즘 과정</text>

  <!-- Number line base -->
  <line x1="100" y1="200" x2="700" y2="200" stroke="#4A5568" stroke-width="4"/>
  
  <!-- Step 1: Initial Bounds [1, 2] -->
  <g transform="translate(0, 0)">
    <text x="100" y="160" font-family="'Inter', sans-serif" font-size="18" fill="#F6AD55" font-weight="bold">Step 1</text>
    <circle cx="200" cy="200" r="6" fill="#4FD1C5" /> <text x="200" y="230" font-family="'Inter', sans-serif" font-size="16" fill="#4FD1C5" text-anchor="middle">1.0</text>
    <circle cx="600" cy="200" r="6" fill="#FC8181" /> <text x="600" y="230" font-family="'Inter', sans-serif" font-size="16" fill="#FC8181" text-anchor="middle">2.0</text>
    
    <!-- Range highlighting -->
    <line x1="200" y1="180" x2="600" y2="180" stroke="#ECC94B" stroke-width="4" stroke-opacity="0.3"/>
    
    <!-- Midpoint evaluation -->
    <path d="M 400 130 L 400 190" fill="none" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow_down)"/>
    <text x="400" y="120" font-family="'Inter', sans-serif" font-size="14" fill="#E2E8F0" text-anchor="middle">중간값 1.5 의 제곱은 2.25 (2보다 큼! 범위 줄여!)</text>
  </g>

  <!-- Step 2: Second Bounds [1, 1.5] -->
  <g transform="translate(0, 100)">
    <text x="100" y="160" font-family="'Inter', sans-serif" font-size="18" fill="#F6AD55" font-weight="bold">Step 2</text>
    
    <circle cx="200" cy="200" r="6" fill="#4FD1C5" /> <text x="200" y="230" font-family="'Inter', sans-serif" font-size="16" fill="#4FD1C5" text-anchor="middle">1.0</text>
    <!-- Shifted upper bound -->
    <circle cx="400" cy="200" r="6" fill="#FC8181" /> <text x="400" y="230" font-family="'Inter', sans-serif" font-size="16" fill="#FC8181" text-anchor="middle">1.5</text>
    
    <!-- Range highlighting -->
    <line x1="200" y1="180" x2="400" y2="180" stroke="#ECC94B" stroke-width="4" stroke-opacity="0.5"/>
    
    <!-- Midpoint evaluation -->
    <path d="M 300 130 L 300 190" fill="none" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow_down)"/>
    <text x="300" y="120" font-family="'Inter', sans-serif" font-size="14" fill="#E2E8F0" text-anchor="middle">중간값 1.25 의 제곱은 1.56 (2보다 작음! 하한선 올려!)</text>
  </g>

  <!-- Step 3: Third Bounds [1.25, 1.5] -->
  <g transform="translate(0, 200)">
    <text x="100" y="150" font-family="'Inter', sans-serif" font-size="18" fill="#F6AD55" font-weight="bold">Step 3...</text>
    
    <circle cx="300" cy="180" r="6" fill="#4FD1C5" /> <text x="300" y="210" font-family="'Inter', sans-serif" font-size="16" fill="#4FD1C5" text-anchor="middle">1.25</text>
    <circle cx="400" cy="180" r="6" fill="#FC8181" /> <text x="400" y="210" font-family="'Inter', sans-serif" font-size="16" fill="#FC8181" text-anchor="middle">1.5</text>
    
    <line x1="300" y1="180" x2="400" y2="180" stroke="#ECC94B" stroke-width="8" filter="url(#glow)"/>
    <text x="350" y="160" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#9F7AEA" text-anchor="middle">범위가 점점 $\sqrt{2}$ (1.414) 에 수렴!</text>
  </g>

  <!-- Visual aid points / targets -->
  <circle cx="365.68" cy="400" r="6" fill="#9F7AEA" filter="url(#glow)"/>
  <path d="M 365.68 200 L 365.68 400" fill="none" stroke="#9F7AEA" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="365.68" y="430" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#9F7AEA" text-anchor="middle">🎯 $\sqrt{2} \approx 1.414$ 지점</text>
</svg>
