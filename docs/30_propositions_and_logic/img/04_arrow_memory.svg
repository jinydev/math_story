<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="350">
    <defs>
        <style>
            .bg {
                fill: #f8fafc;
                rx: 10;
                stroke: #cbd5e1;
                stroke-width: 2;
            }

            /* Shapes */
            .box-p {
                fill: #fef08a;
                stroke: #eab308;
                stroke-width: 3;
                rx: 15;
            }

            .box-q {
                fill: #fecaca;
                stroke: #ef4444;
                stroke-width: 3;
                rx: 15;
            }

            .drop {
                fill: #ef4444;
            }

            /* blood drop */

            /* Arrow */
            .arrow {
                stroke: #334155;
                stroke-width: 6;
                stroke-linecap: round;
                marker-end: url(#arrowhead);
            }

            .arrow-dashed {
                fill: none;
                stroke: #94a3b8;
                stroke-width: 3;
                stroke-dasharray: 8 4;
                marker-end: url(#arrowhead-light);
            }

            /* Text */
            .title {
                font-family: 'Pretendard', sans-serif;
                font-size: 24px;
                fill: #0f172a;
                font-weight: bold;
                text-anchor: middle;
            }

            .big-text {
                font-family: 'Pretendard', sans-serif;
                font-size: 40px;
                font-weight: 900;
                text-anchor: middle;
                dominant-baseline: middle;
            }

            .sub-text {
                font-family: 'Pretendard', sans-serif;
                font-size: 18px;
                fill: #334155;
                font-weight: bold;
                text-anchor: middle;
                dominant-baseline: middle;
            }

            .emoji {
                font-size: 45px;
                text-anchor: middle;
                dominant-baseline: middle;
            }

            .desc-p {
                font-family: 'Pretendard', sans-serif;
                font-size: 16px;
                fill: #ca8a04;
                font-weight: bold;
                text-anchor: middle;
            }

            .desc-q {
                font-family: 'Pretendard', sans-serif;
                font-size: 16px;
                fill: #dc2626;
                font-weight: bold;
                text-anchor: middle;
            }
        </style>

        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#334155" />
        </marker>
        <marker id="arrowhead-light" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#94a3b8" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="300" y="40" class="title">🎯 헷갈리는 필요조건과 충분조건 암기법 🏹</text>

    <!-- Left Side: Condition P (Shooter) -->
    <g transform="translate(100, 150)">
        <rect x="-60" y="-50" width="120" height="100" class="box-p" />
        <text x="0" y="0" class="big-text" fill="#b45309">p</text>
        <text x="0" y="-80" class="emoji">🏹</text>
        <text x="0" y="80" class="desc-p">총통알이 충분해서 쏜다!</text>
        <text x="0" y="105" class="sub-text" fill="#ca8a04">충분조건</text>
    </g>

    <!-- Giant Middle Arrow (p -> q) -->
    <line x1="170" y1="150" x2="380" y2="150" class="arrow" />
    <text x="275" y="130" class="sub-text">참 (True)</text>

    <!-- Right Side: Condition Q (Target getting hit) -->
    <g transform="translate(450, 150)">
        <rect x="-60" y="-50" width="120" height="100" class="box-p" /> <!-- Wait, outline is red -->
        <rect x="-60" y="-50" width="120" height="100" class="box-q" />
        <text x="0" y="0" class="big-text" fill="#991b1b">q</text>
        <text x="0" y="-80" class="emoji">🩸</text>

        <!-- Blood drops falling from 'q' -->
        <path d="M-20,30 Q-15,40 -20,45 Q-25,40 -20,30 Z" class="drop" />
        <path d="M25,25 Q30,35 25,40 Q20,35 25,25 Z" class="drop" />

        <text x="0" y="80" class="desc-q">화살을 맞아서 피(필요)를 흘린다!</text>
        <text x="0" y="105" class="sub-text" fill="#dc2626">필요조건</text>
    </g>

    <!-- Reverse Arrow (for if it goes both ways) -->
    <path d="M 400 190 Q 275 250 150 190" class="arrow-dashed" />
    <text x="275" y="240" class="sub-text" fill="#64748b" font-size="14px">양쪽 다 참이면 = '필요충분조건' 🤝</text>

</svg>