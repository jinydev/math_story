<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#fff4e6" rx="10" />

    <text x="300" y="40" fill="#d9480f" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">조화수열 (Harmonic Sequence)의 비밀</text>

    <g transform="translate(30, 80)">

        <!-- Original Harmonic Row -->
        <text x="0" y="30" fill="#f08c00" font-size="20" font-family="sans-serif" font-weight="bold"
            text-anchor="start">조화수열:</text>
        <path d="M 120 15 L 150 15" stroke="#f08c00" stroke-width="2" />
        <text x="135" y="10" fill="#f08c00" font-size="18" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">1</text>
        <text x="135" y="35" fill="#f08c00" font-size="18" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">2</text>

        <path d="M 220 15 L 250 15" stroke="#f08c00" stroke-width="2" />
        <text x="235" y="10" fill="#f08c00" font-size="18" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">1</text>
        <text x="235" y="35" fill="#f08c00" font-size="18" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">5</text>

        <path d="M 320 15 L 350 15" stroke="#f08c00" stroke-width="2" />
        <text x="335" y="10" fill="#f08c00" font-size="18" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">1</text>
        <text x="335" y="35" fill="#f08c00" font-size="18" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">8</text>

        <path d="M 420 15 L 450 15" stroke="#f08c00" stroke-width="2" />
        <text x="435" y="10" fill="#f08c00" font-size="18" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">1</text>
        <text x="435" y="35" fill="#f08c00" font-size="18" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">11</text>

        <text x="495" y="25" fill="#f08c00" font-size="18" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">...</text>

        <!-- Flip Arrow -->
        <path d="M 280 60 Q 300 80 280 100" fill="none" stroke="#adb5bd" stroke-width="3" marker-end="url(#arrow)" />
        <text x="340" y="85" fill="#495057" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">역수 취하기 (Flip!)</text>

        <!-- Reciprocal AP Row -->
        <text x="0" y="140" fill="#0b7285" font-size="20" font-family="sans-serif" font-weight="bold"
            text-anchor="start">등차수열:</text>

        <circle cx="135" cy="132" r="20" fill="#22b8cf" />
        <text x="135" y="139" fill="white" font-size="20" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">2</text>

        <circle cx="235" cy="132" r="20" fill="#22b8cf" />
        <text x="235" y="139" fill="white" font-size="20" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">5</text>

        <circle cx="335" cy="132" r="20" fill="#22b8cf" />
        <text x="335" y="139" fill="white" font-size="20" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">8</text>

        <circle cx="435" cy="132" r="20" fill="#22b8cf" />
        <text x="435" y="139" fill="white" font-size="20" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">11</text>

        <!-- +3 indicators -->
        <path d="M 160 132 L 200 132" fill="none" stroke="#0b7285" stroke-width="2" marker-end="url(#arrow-blue)" />
        <text x="180" y="125" fill="#0b7285" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">+3</text>

        <path d="M 260 132 L 300 132" fill="none" stroke="#0b7285" stroke-width="2" marker-end="url(#arrow-blue)" />
        <text x="280" y="125" fill="#0b7285" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">+3</text>

        <path d="M 360 132 L 400 132" fill="none" stroke="#0b7285" stroke-width="2" marker-end="url(#arrow-blue)" />
        <text x="380" y="125" fill="#0b7285" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">+3</text>

    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#0b7285" />
        </marker>
    </defs>

</svg>