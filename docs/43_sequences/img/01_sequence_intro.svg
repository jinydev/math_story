<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <!-- Background -->
  <rect width="600" height="200" fill="#f8f9fa" rx="10" />
  
  <!-- Boxes -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="60" height="60" fill="#4dabf7" rx="8" />
    <text x="30" y="38" fill="white" font-size="24" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">1</text>
    
    <rect x="130" y="0" width="60" height="60" fill="#4dabf7" rx="8" />
    <text x="160" y="38" fill="white" font-size="24" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">3</text>
    
    <rect x="260" y="0" width="60" height="60" fill="#4dabf7" rx="8" />
    <text x="290" y="38" fill="white" font-size="24" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">5</text>
    
    <rect x="390" y="0" width="60" height="60" fill="#4dabf7" rx="8" />
    <text x="420" y="38" fill="white" font-size="24" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">7</text>
    
    <rect x="490" y="0" width="60" height="60" fill="#e9ecef" rx="8" stroke="#ced4da" stroke-width="2" stroke-dasharray="5,5" />
    <text x="520" y="38" fill="#adb5bd" font-size="24" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">?</text>
  </g>
  
  <!-- Arrows -->
  <g stroke="#ff922b" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 80 70 Q 115 40 150 70" marker-end="url(#arrow)" />
    <path d="M 210 70 Q 245 40 280 70" marker-end="url(#arrow)" />
    <path d="M 340 70 Q 375 40 410 70" marker-end="url(#arrow)" />
    <path d="M 470 70 Q 505 40 540 70" stroke-dasharray="4,4" marker-end="url(#arrow)" />
  </g>
  
  <!-- Plus Texts -->
  <g fill="#ff922b" font-size="18" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle">
    <text x="115" y="35">+2</text>
    <text x="245" y="35">+2</text>
    <text x="375" y="35">+2</text>
    <text x="505" y="35">+2</text>
  </g>
  
  <!-- Arrow Marker Definition -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff922b" />
    </marker>
  </defs>
</svg>
