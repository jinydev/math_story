<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="400">
    <defs>
        <style>
            .bg {
                fill: #f8fafc;
                rx: 10;
                stroke: #cbd5e1;
                stroke-width: 2;
            }

            /* Scale elements */
            .gold-metal {
                fill: #fbbf24;
                stroke: #d97706;
                stroke-width: 3;
                stroke-linejoin: round;
            }

            .dark-metal {
                fill: #475569;
                stroke: #334155;
                stroke-width: 3;
            }

            .chain {
                fill: none;
                stroke: #94a3b8;
                stroke-width: 2;
            }

            .pan {
                fill: #fef3c7;
                stroke: #d97706;
                stroke-width: 2;
            }

            /* Weights */
            .weight-x {
                fill: #3b82f6;
                stroke: #1d4ed8;
                stroke-width: 2;
                rx: 5;
            }

            .weight-num {
                fill: #ef4444;
                stroke: #b91c1c;
                stroke-width: 2;
                rx: 20;
            }

            /* Text */
            .text-title {
                font-family: 'Pretendard', sans-serif;
                font-size: 22px;
                fill: #0f172a;
                font-weight: bold;
                text-anchor: middle;
            }

            .text-equation {
                font-family: 'Courier New', monospace;
                font-size: 28px;
                fill: #0f172a;
                font-weight: bold;
                text-anchor: middle;
            }

            .text-weight {
                font-family: 'Pretendard', sans-serif;
                font-size: 24px;
                fill: #ffffff;
                font-weight: bold;
                text-anchor: middle;
            }

            .text-desc {
                font-family: 'Pretendard', sans-serif;
                font-size: 14px;
                fill: #64748b;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="300" y="40" class="text-title">⚖️ 등식의 성질: 양팔 저울의 완벽한 수평 유지</text>
    <text x="300" y="80" class="text-equation">2x + 3 = 11</text>

    <!-- Scale Base and Stand -->
    <path d="M 280 350 L 320 350 L 310 150 L 290 150 Z" class="dark-metal" />
    <rect x="250" y="350" width="100" height="20" rx="4" class="dark-metal" />

    <!-- Scale Beam (Balanced) -->
    <line x1="150" y1="150" x2="450" y2="150" class="gold-metal" stroke-width="8" />
    <circle cx="300" cy="150" r="10" class="dark-metal" />
    <polygon points="300,120 290,140 310,140" fill="#d97706" /> <!-- pointer -->

    <!-- Left Pan (2x + 3) -->
    <g transform="translate(150, 150)">
        <line x1="-40" y1="0" x2="0" y2="80" class="chain" />
        <line x1="40" y1="0" x2="0" y2="80" class="chain" />
        <path d="M -50 80 Q 0 120 50 80 Z" class="pan" />

        <!-- Weights on Left -->
        <!-- Two 'x' blocks -->
        <rect x="-35" y="40" width="30" height="30" class="weight-x" />
        <text x="-20" y="62" class="text-weight">x</text>

        <rect x="5" y="40" width="30" height="30" class="weight-x" />
        <text x="20" y="62" class="text-weight">x</text>

        <!-- One '+3' block -->
        <circle cx="0" cy="20" r="15" class="weight-num" />
        <text x="0" y="26" class="text-weight" font-size="14px">3</text>
    </g>

    <!-- Right Pan (11) -->
    <g transform="translate(450, 150)">
        <line x1="-40" y1="0" x2="0" y2="80" class="chain" />
        <line x1="40" y1="0" x2="0" y2="80" class="chain" />
        <path d="M -50 80 Q 0 120 50 80 Z" class="pan" />

        <!-- Weights on Right -->
        <!-- One '11' block -->
        <circle cx="0" cy="40" r="25" class="weight-num" />
        <text x="0" y="48" class="text-weight">11</text>
    </g>

    <!-- Explanation Text -->
    <text x="300" y="300" class="text-desc">양쪽 접시에서 똑같이 숫자 '3' 무게를 덜어내도(이항), 저울은 평형을 유지합니다!</text>
    <text x="300" y="325" class="text-desc" fill="#dc2626" font-weight="bold">➡️ 2x = 8 &nbsp;&nbsp; ➡️ &nbsp;&nbsp; x =
        4</text>

</svg>