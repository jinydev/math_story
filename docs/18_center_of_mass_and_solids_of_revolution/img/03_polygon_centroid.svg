<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#9c36b5" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">복잡함을 잘게 쪼개라: 다각형의 무게중심 (Polygon Centroid)</text>

    <g transform="translate(100, 150)">

        <!-- Complex Polygon -->
        <path d="M 0 0 L 100 -80 L 250 -40 L 200 60 L 50 80 Z" fill="#f3d9fa" stroke="#ae3ec9" stroke-width="3" />
        <text x="5" y="-10" fill="#ae3ec9" font-size="14" font-family="sans-serif" font-weight="bold">다각형</text>

        <!-- Triangulation Lines (from vertex 0,0) -->
        <line x1="0" y1="0" x2="250" y2="-40" stroke="#868e96" stroke-width="2" stroke-dasharray="5,5" />
        <line x1="0" y1="0" x2="200" y2="60" stroke="#868e96" stroke-width="2" stroke-dasharray="5,5" />

        <!-- T1 Centroid & Weight -->
        <circle cx="100" cy="-35" r="4" fill="#d6336c" />
        <text x="110" y="-35" fill="#d6336c" font-size="12" font-family="sans-serif" font-weight="bold">g₁ (무게
            W₁)</text>

        <!-- T2 Centroid & Weight -->
        <circle cx="150" cy="5" r="4" fill="#d6336c" />
        <text x="160" y="5" fill="#d6336c" font-size="12" font-family="sans-serif" font-weight="bold">g₂ (무게 W₂)</text>

        <!-- T3 Centroid & Weight -->
        <circle cx="80" cy="45" r="4" fill="#d6336c" />
        <text x="90" y="50" fill="#d6336c" font-size="12" font-family="sans-serif" font-weight="bold">g₃ (무게 W₃)</text>

        <!-- Overall Centroid (G) -->
        <circle cx="110" cy="5" r="8" fill="#5f3dc4" />
        <text x="125" y="25" fill="#5f3dc4" font-size="16" font-family="sans-serif" font-weight="bold">진짜 G</text>
    </g>

    <!-- Explanation -->
    <g transform="translate(380, 100)">
        <rect x="0" y="0" width="200" height="90" fill="#f1f3f5" stroke="#ced4da" stroke-width="2" rx="5" />
        <text x="100" y="25" fill="#495057" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">삼각형으로 모두 쪼갠 뒤,</text>
        <text x="100" y="50" fill="#9c36b5" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">가상의 무게 추가</text>
        <text x="100" y="75" fill="#495057" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">있는 것처럼 계산한다!</text>
    </g>

    <path d="M 280 150 Q 330 150 380 145" fill="none" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow-grey)" />

    <defs>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>