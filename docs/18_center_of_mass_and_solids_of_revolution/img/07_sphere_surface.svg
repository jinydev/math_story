<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#1864ab" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">가장 완벽한 곡면: 구의 겉넓이 (Surface Area of a Sphere)</text>

    <!-- Cylinder Wrapping a Sphere -->
    <g transform="translate(150, 150)">
        <!-- Cylinder Back Lines -->
        <ellipse cx="0" cy="-60" rx="40" ry="15" fill="none" stroke="#adb5bd" stroke-width="2" stroke-dasharray="4,4" />
        <path d="M -40 -60 L -40 60" fill="none" stroke="#adb5bd" stroke-width="2" stroke-dasharray="4,4" />
        <path d="M 40 -60 L 40 60" fill="none" stroke="#adb5bd" stroke-width="2" stroke-dasharray="4,4" />

        <!-- Sphere (3D looking) -->
        <circle cx="0" cy="0" r="40" fill="#e7f5ff" stroke="#339af0" stroke-width="2" />
        <!-- Sphere equator -->
        <ellipse cx="0" cy="0" rx="40" ry="12" fill="none" stroke="#339af0" stroke-width="2" />
        <ellipse cx="0" cy="0" rx="40" ry="12" fill="none" stroke="#339af0" stroke-width="1" stroke-dasharray="2,2"
            transform="rotate(90)" />

        <!-- Cylinder Front Lines -->
        <path d="M -40 60 A 40 15 0 0 0 40 60" fill="none" stroke="#868e96" stroke-width="3" />

        <text x="0" y="85" fill="#495057" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">공유하는 반지름 r</text>
    </g>

    <!-- Equation Visualization -->
    <g transform="translate(350, 80)">
        <rect x="0" y="0" width="220" height="120" fill="#e7f5ff" stroke="#74c0fc" stroke-width="2" rx="8" />

        <!-- 4 Great Circles -->
        <circle cx="40" cy="30" r="15" fill="#1864ab" />
        <circle cx="80" cy="30" r="15" fill="#1864ab" />
        <circle cx="120" cy="30" r="15" fill="#1864ab" />
        <circle cx="160" cy="30" r="15" fill="#1864ab" />

        <text x="100" y="70" fill="#1864ab" font-size="20" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">4 × (πr²)</text>

        <text x="100" y="100" fill="#495057" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">원 4개가 공의 껍질을 완벽히 덮는다!</text>
    </g>

    <path d="M 220 120 L 320 120" fill="none" stroke="#1864ab" stroke-width="3" marker-end="url(#arrow-blue)" />

    <defs>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#1864ab" />
        </marker>
    </defs>
</svg>