<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <!-- 왼쪽: 반듯한 카드 탑 -->
  <text x="150" y="30" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">반듯한 카드 탑</text>
  <rect x="100" y="50" width="100" height="15" fill="#e9c46a" stroke="#d4a373"/>
  <rect x="100" y="65" width="100" height="15" fill="#2a9d8f" stroke="#264653"/>
  <rect x="100" y="80" width="100" height="15" fill="#e9c46a" stroke="#d4a373"/>
  <rect x="100" y="95" width="100" height="15" fill="#2a9d8f" stroke="#264653"/>
  <rect x="100" y="110" width="100" height="15" fill="#e9c46a" stroke="#d4a373"/>
  <rect x="100" y="125" width="100" height="15" fill="#2a9d8f" stroke="#264653"/>
  <rect x="100" y="140" width="100" height="15" fill="#e9c46a" stroke="#d4a373"/>
  <rect x="100" y="155" width="100" height="15" fill="#2a9d8f" stroke="#264653"/>
  <rect x="100" y="170" width="100" height="15" fill="#e9c46a" stroke="#d4a373"/>
  <rect x="100" y="185" width="100" height="15" fill="#2a9d8f" stroke="#264653"/>
  
  <text x="300" y="130" font-family="sans-serif" font-size="24" font-weight="bold" fill="#e76f51" text-anchor="middle">=</text>

  <!-- 오른쪽: S자로 미끄러진 카드 탑 -->
  <text x="450" y="30" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">비스듬히 미끄러진 카드 탑</text>
  <rect x="420" y="50" width="100" height="15" fill="#e9c46a" stroke="#d4a373"/>
  <rect x="440" y="65" width="100" height="15" fill="#2a9d8f" stroke="#264653"/>
  <rect x="450" y="80" width="100" height="15" fill="#e9c46a" stroke="#d4a373"/>
  <rect x="445" y="95" width="100" height="15" fill="#2a9d8f" stroke="#264653"/>
  <rect x="430" y="110" width="100" height="15" fill="#e9c46a" stroke="#d4a373"/>
  <rect x="410" y="125" width="100" height="15" fill="#2a9d8f" stroke="#264653"/>
  <rect x="390" y="140" width="100" height="15" fill="#e9c46a" stroke="#d4a373"/>
  <rect x="385" y="155" width="100" height="15" fill="#2a9d8f" stroke="#264653"/>
  <rect x="395" y="170" width="100" height="15" fill="#e9c46a" stroke="#d4a373"/>
  <rect x="415" y="185" width="100" height="15" fill="#2a9d8f" stroke="#264653"/>

  <!-- 바닥선 -->
  <line x1="50" y1="200" x2="550" y2="200" stroke="#333" stroke-width="2"/>
  <text x="300" y="235" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">모양은 다르지만 카드의 장수와 전체 부피는 100% 동일하다!</text>
</svg>
