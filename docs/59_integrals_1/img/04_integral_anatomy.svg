<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 박스 -->
  <rect width="600" height="300" rx="15" fill="#2b2d42"/>
  
  <!-- 중앙 인테그럴 수식 -->
  <text x="210" y="160" font-family="serif" font-size="80" fill="#8d99ae" font-style="italic">∫</text>
  <text x="250" y="110" font-family="sans-serif" font-size="30" fill="#ef233b" font-weight="bold">b</text>
  <text x="235" y="210" font-family="sans-serif" font-size="30" fill="#ef233b" font-weight="bold">a</text>
  <text x="280" y="160" font-family="serif" font-size="50" fill="#edf2f4" font-style="italic">f(x)</text>
  <text x="370" y="160" font-family="serif" font-size="50" fill="#8d99ae" font-style="italic">dx</text>
  
  <!-- 선 연결선 & 설명표 1 (f(x)) -->
  <line x1="320" y1="120" x2="320" y2="60" stroke="#fdf0d5" stroke-width="2" stroke-dasharray="4"/>
  <text x="320" y="45" font-family="sans-serif" font-size="16" fill="#fdf0d5" text-anchor="middle">그래프(직사각형)의 세로 '높이'</text>
  
  <!-- 선 연결선 & 설명표 2 (dx) -->
  <line x1="410" y1="120" x2="410" y2="80" stroke="#fdf0d5" stroke-width="2" stroke-dasharray="4"/>
  <text x="450" y="70" font-family="sans-serif" font-size="16" fill="#fdf0d5" text-anchor="middle">무한히 얇은 '가로 폭'</text>
  
  <!-- 곱하기 표시 (f(x)와 dx 사이) -->
  <text x="355" y="150" font-family="sans-serif" font-size="20" fill="#e0e0e0" font-weight="bold">×</text>
  <text x="400" y="220" font-family="sans-serif" font-size="14" fill="#8d99ae" text-anchor="middle">(높이 × 가로 = 막대 면적!)</text>

  <!-- 선 연결선 & 설명표 3 (Integral) -->
  <line x1="170" y1="140" x2="100" y2="140" stroke="#fdf0d5" stroke-width="2" stroke-dasharray="4"/>
  <text x="100" y="130" font-family="sans-serif" font-size="16" fill="#fdf0d5" text-anchor="middle">Sum (전부 더해라!)</text>

  <!-- 선 연결선 & 설명표 4 (a와 b) -->
  <line x1="280" y1="100" x2="140" y2="60" stroke="#ef233b" stroke-width="2" stroke-dasharray="4"/>
  <text x="130" y="50" font-family="sans-serif" font-size="14" fill="#ef233b" text-anchor="middle">끝나는 지점 (종료 위치)</text>
  <line x1="260" y1="200" x2="140" y2="240" stroke="#ef233b" stroke-width="2" stroke-dasharray="4"/>
  <text x="130" y="255" font-family="sans-serif" font-size="14" fill="#ef233b" text-anchor="middle">시작하는 지점 (시작 위치)</text>
</svg>
