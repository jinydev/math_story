<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 왼쪽: 큰 타일로 덮기 -->
  <path d="M20 100 Q 80 20 140 100 T 220 100" fill="none" stroke="#2a9d8f" stroke-width="3"/>
  <rect x="20" y="100" width="40" height="50" fill="#e9c46a" stroke="#333" opacity="0.7"/>
  <rect x="60" y="80" width="40" height="70" fill="#e9c46a" stroke="#333" opacity="0.7"/>
  <rect x="100" y="50" width="40" height="100" fill="#e9c46a" stroke="#333" opacity="0.7"/>
  <rect x="140" y="100" width="40" height="50" fill="#e9c46a" stroke="#333" opacity="0.7"/>
  <text x="120" y="180" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">큰 타일 (오차 발생!)</text>
  
  <!-- 화살표 -->
  <path d="M240 100 L 260 100 L 255 95 M 260 100 L 255 105" fill="none" stroke="#e76f51" stroke-width="3"/>
  <text x="250" y="80" font-family="sans-serif" font-size="12" fill="#e76f51" text-anchor="middle">더 작게 쪼개기!</text>
  
  <!-- 오른쪽: 작은 타일로 덮기 -->
  <path d="M280 100 Q 340 20 400 100 T 480 100" fill="none" stroke="#2a9d8f" stroke-width="3"/>
  <!-- 무수히 많은 작은 사각형 (10픽셀 단위) -->
  <g fill="#f4a261" stroke="#333" stroke-width="0.5" opacity="0.8">
    <rect x="280" y="100" width="10" height="50"/>
    <rect x="290" y="85" width="10" height="65"/>
    <rect x="300" y="70" width="10" height="80"/>
    <rect x="310" y="60" width="10" height="90"/>
    <rect x="320" y="55" width="10" height="95"/>
    <rect x="330" y="52" width="10" height="98"/>
    <rect x="340" y="55" width="10" height="95"/>
    <rect x="350" y="60" width="10" height="90"/>
    <rect x="360" y="70" width="10" height="80"/>
    <rect x="370" y="85" width="10" height="65"/>
    <rect x="380" y="100" width="10" height="50"/>
    <rect x="390" y="115" width="10" height="35"/>
    <rect x="400" y="130" width="10" height="20"/>
    <rect x="410" y="140" width="10" height="10"/>
    <rect x="420" y="130" width="10" height="20"/>
    <rect x="430" y="115" width="10" height="35"/>
    <rect x="440" y="100" width="10" height="50"/>
  </g>
  <text x="380" y="180" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">작은 타일 (곡선과 완벽 일치!)</text>
</svg>
