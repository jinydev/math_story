<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A202C" />
      <stop offset="100%" stop-color="#2D3748" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Pattern for hatching "waste" area -->
    <pattern id="hatch" width="4" height="4" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#FC8181" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#bgGrad)" rx="15" />

  <text x="400" y="40" font-family="'Inter', sans-serif" font-size="26" font-weight="bold" fill="#F7FAFC" text-anchor="middle" filter="url(#glow)">직사각형 기둥으로 공간을 채우다 (Riemann Sum)</text>
  <text x="400" y="70" font-family="'Inter', sans-serif" font-size="16" fill="#A0AEC0" text-anchor="middle">"곡선 아래의 넓이를 구할 줄 모르겠으니, 우리가 아는 직사각형 기둥을 잔뜩 세워서 퉁치자!"</text>

  <!-- Frame Layouts -->
  <!-- Figure 1: N = 4 (Overshoot) -->
  <g transform="translate(80, 280)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="250" y2="0" stroke="#718096" stroke-width="3"/>
    <line x1="0" y1="0" x2="0" y2="-160" stroke="#718096" stroke-width="3"/>
    
    <text x="100" y="30" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#F6AD55" text-anchor="middle">기둥 4개 (오차가 큼)</text>

    <!-- Background Curve Fill (Target Area) -->
    <!-- The curve function will roughly be: y = -x^2 + something -->
    <path d="M 0 0 Q 100 -200 200 -50 L 200 0 Z" fill="rgba(113, 128, 150, 0.2)" />
    <!-- The actual Smooth Curve -->
    <path d="M 0 0 Q 100 -200 200 -50" fill="none" stroke="#63B3ED" stroke-width="4"/>

    <!-- Rectangles (N=4, base=50) -->
    <!-- Heights sampled from curve roughly -->
    <rect x="0" y="-80" width="50" height="80" fill="rgba(79, 209, 197, 0.4)" stroke="#4FD1C5" stroke-width="2"/>
    <rect x="50" y="-140" width="50" height="140" fill="rgba(79, 209, 197, 0.4)" stroke="#4FD1C5" stroke-width="2"/>
    <rect x="100" y="-140" width="50" height="140" fill="rgba(79, 209, 197, 0.4)" stroke="#4FD1C5" stroke-width="2"/>
    <rect x="150" y="-95" width="50" height="95" fill="rgba(79, 209, 197, 0.4)" stroke="#4FD1C5" stroke-width="2"/>

    <!-- Error Highlights -->
    <circle cx="25" cy="-80" r="10" fill="url(#hatch)" stroke="#FC8181" stroke-width="1"/>
    <circle cx="75" cy="-140" r="10" fill="url(#hatch)" stroke="#FC8181" stroke-width="1"/>
    
    <text x="-40" y="-100" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#FC8181">빨간색</text>
    <text x="-40" y="-80" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#FC8181">빗금은 오차!</text>
  </g>

  <!-- Arrow Transition -->
  <line x1="360" y1="200" x2="420" y2="200" stroke="#9F7AEA" stroke-width="4" marker-end="url(#arrow)" stroke-dasharray="6,4"/>
  <text x="390" y="180" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#9F7AEA" text-anchor="middle">가늘게 쪼갠다!</text>

  <!-- Figure 2: N = 20 (Almost perfect) -->
  <g transform="translate(480, 280)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="250" y2="0" stroke="#718096" stroke-width="3"/>
    <line x1="0" y1="0" x2="0" y2="-160" stroke="#718096" stroke-width="3"/>
    
    <text x="100" y="30" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#4FD1C5" text-anchor="middle">기둥 20개 (곡선에 완벽 밀착!)</text>
    
    <!-- Background Area -->
    <path d="M 0 0 Q 100 -200 200 -50 L 200 0 Z" fill="rgba(113, 128, 150, 0.1)" />

    <!-- We will draw 20 tiny rectangles (width 10). Height = approx curve (-x^2 eq) -->
    <!-- Hand-coded pseudo curve heights for x=0..190 -->
    <rect x="0" y="-28" width="10" height="28" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="10" y="-54" width="10" height="54" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="20" y="-76" width="10" height="76" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="30" y="-96" width="10" height="96" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="40" y="-112" width="10" height="112" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="50" y="-126" width="10" height="126" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="60" y="-136" width="10" height="136" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="70" y="-144" width="10" height="144" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="80" y="-148" width="10" height="148" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="90" y="-150" width="10" height="150" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    
    <rect x="100" y="-148" width="10" height="148" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="110" y="-144" width="10" height="144" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="120" y="-136" width="10" height="136" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="130" y="-126" width="10" height="126" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="140" y="-112" width="10" height="112" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="150" y="-96" width="10" height="96" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="160" y="-76" width="10" height="76" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="170" y="-54" width="10" height="54" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="180" y="-28" width="10" height="28" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>
    <rect x="190" y="-10" width="10" height="10" fill="rgba(79, 209, 197, 0.6)" stroke="#319795" stroke-width="1"/>

    <!-- The actual Smooth Curve on top -->
    <path d="M 0 0 Q 100 -200 200 -50" fill="none" stroke="#63B3ED" stroke-width="4" filter="url(#glow)"/>

    <text x="210" y="-150" font-family="'Inter', sans-serif" font-size="28" font-weight="bold" fill="#E2E8F0">$\sum$</text>
    <text x="230" y="-150" font-family="'Inter', sans-serif" font-size="14" fill="#A0AEC0">무한대(Infinity)</text>
  </g>

  <!-- Theory Box Bottom -->
  <g transform="translate(100, 360)">
    <rect x="0" y="0" width="600" height="70" fill="#2D3748" rx="8" stroke="#F6AD55" stroke-width="2"/>
    <text x="300" y="30" font-family="'Inter', sans-serif" font-size="16" font-weight="bold" fill="#F7FAFC" text-anchor="middle">위대한 결론: 미세하게 쪼개어 합치기!</text>
    <text x="300" y="55" font-family="'Inter', sans-serif" font-size="14" fill="#A0AEC0" text-anchor="middle">밑변(가로)의 굵기를 무한히 0에 가깝게 줄이면, 오차 빗금 공간이 사라지며 완벽한 곡선의 넓이가 된다.</text>
  </g>

</svg>
