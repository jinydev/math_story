<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Box Colors -->
    <linearGradient id="grad-a2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>

    <linearGradient id="grad-b2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <linearGradient id="grad-ab" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="15"/>

  <!-- Title -->
  <text x="400" y="50" font-family="'Inter', sans-serif" font-size="28" font-weight="bold" fill="#f8fafc" text-anchor="middle">Visual Proof of (a+b)²</text>
  <text x="400" y="80" font-family="'Inter', sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">A square with sides (a+b) is composed of 4 smaller puzzle pieces</text>

  <g transform="translate(150, 120)">
    
    <!-- Outer Border of (a+b) * (a+b) -->
    <rect x="-10" y="-10" width="320" height="320" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8 8"/>

    <!-- Labels for sides: Top Edge (a + b) -->
    <text x="100" y="-20" font-family="'Courier New', monospace" font-weight="bold" font-size="20" fill="#f8fafc" text-anchor="middle">a</text>
    <text x="250" y="-20" font-family="'Courier New', monospace" font-weight="bold" font-size="20" fill="#f8fafc" text-anchor="middle">b</text>
    <!-- Left Edge (a + b) -->
    <text x="-30" y="100" font-family="'Courier New', monospace" font-weight="bold" font-size="20" fill="#f8fafc" text-anchor="middle">a</text>
    <text x="-30" y="250" font-family="'Courier New', monospace" font-weight="bold" font-size="20" fill="#f8fafc" text-anchor="middle">b</text>

    <!-- Top-Left Piece: a^2 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="200" height="200" fill="url(#grad-a2)" filter="url(#shadow)" stroke="#f8fafc" stroke-width="2"/>
      <text x="100" y="110" font-family="'Courier New', monospace" font-size="32" font-weight="bold" fill="#fee2e2" text-anchor="middle">a²</text>
    </g>

    <!-- Top-Right Piece: ab -->
    <g transform="translate(200, 0)">
      <rect x="0" y="0" width="100" height="200" fill="url(#grad-ab)" filter="url(#shadow)" stroke="#f8fafc" stroke-width="2"/>
      <text x="50" y="110" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#d1fae5" text-anchor="middle">ab</text>
    </g>

    <!-- Bottom-Left Piece: ab -->
    <g transform="translate(0, 200)">
      <rect x="0" y="0" width="200" height="100" fill="url(#grad-ab)" filter="url(#shadow)" stroke="#f8fafc" stroke-width="2"/>
      <text x="100" y="60" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#d1fae5" text-anchor="middle">ab</text>
    </g>

    <!-- Bottom-Right Piece: b^2 -->
    <g transform="translate(200, 200)">
      <rect x="0" y="0" width="100" height="100" fill="url(#grad-b2)" filter="url(#shadow)" stroke="#f8fafc" stroke-width="2"/>
      <text x="50" y="60" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#dbeafe" text-anchor="middle">b²</text>
    </g>
  </g>

  <!-- Formula Equation Explanation -->
  <g transform="translate(560, 250)">
    <text x="0" y="-80" font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#f8fafc" text-anchor="middle">(a + b)²</text>
    
    <text x="0" y="-30" font-family="'Inter', sans-serif" font-size="22" font-weight="bold" fill="#94a3b8" text-anchor="middle">=</text>
    
    <text x="0" y="10" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#ef4444" text-anchor="middle">a²</text>
    
    <text x="0" y="45" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">+</text>
    
    <!-- 2ab text -->
    <text x="0" y="80" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#10b981" text-anchor="middle">2ab</text>
    <text x="80" y="80" font-family="'Inter', sans-serif" font-size="16" fill="#6ee7b7" text-anchor="middle">(ab + ab)</text>

    <text x="0" y="115" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#f8fafc" text-anchor="middle">+</text>
    
    <text x="0" y="150" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#3b82f6" text-anchor="middle">b²</text>
  </g>

</svg>
