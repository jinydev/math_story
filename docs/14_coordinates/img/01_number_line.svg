<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
    <!-- Background -->
    <rect width="800" height="200" fill="#1e1e24"/>
    
    <!-- Title -->
    <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">1D 수직선 (Number Line) 위 점의 이동</text>

    <!-- Number Line Base -->
    <line x1="50" y1="120" x2="750" y2="120" stroke="#ffffff" stroke-width="4"/>
    <!-- Arrows -->
    <polygon points="40,120 55,110 55,130" fill="#ffffff"/>
    <polygon points="760,120 745,110 745,130" fill="#ffffff"/>

    <!-- Ticks & Numbers -->
    <g font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">
        <line x1="100" y1="110" x2="100" y2="130" stroke="#ffffff" stroke-width="2"/> <text x="100" y="150">-4</text>
        <line x1="175" y1="110" x2="175" y2="130" stroke="#ffffff" stroke-width="2"/> <text x="175" y="150">-3</text>
        <line x1="250" y1="110" x2="250" y2="130" stroke="#ffffff" stroke-width="2"/> <text x="250" y="150">-2</text>
        <line x1="325" y1="110" x2="325" y2="130" stroke="#ffffff" stroke-width="2"/> <text x="325" y="150">-1</text>
        
        <!-- Origin -->
        <line x1="400" y1="105" x2="400" y2="135" stroke="#ff4757" stroke-width="4"/> <text x="400" y="155" fill="#ff4757" font-weight="bold">0 (원점)</text>
        
        <line x1="475" y1="110" x2="475" y2="130" stroke="#ffffff" stroke-width="2"/> <text x="475" y="150">+1</text>
        <line x1="550" y1="110" x2="550" y2="130" stroke="#ffffff" stroke-width="2"/> <text x="550" y="150">+2</text>
        <line x1="625" y1="110" x2="625" y2="130" stroke="#ffffff" stroke-width="2"/> <text x="625" y="150">+3</text>
        <line x1="700" y1="110" x2="700" y2="130" stroke="#ffffff" stroke-width="2"/> <text x="700" y="150">+4</text>
    </g>

    <!-- Moving Point -->
    <circle r="12" fill="#2ed573">
        <animate attributeName="cx" values="400; 625; 250; 400" keyTimes="0; 0.33; 0.66; 1" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="120; 120; 120; 120" dur="6s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Moving Label -->
    <g font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2ed573" text-anchor="middle">
        <text y="90">
            <animate attributeName="x" values="400; 625; 250; 400" keyTimes="0; 0.33; 0.66; 1" dur="6s" repeatCount="indefinite"/>
            <tspan><animate attributeName="x" values="400; 625; 250; 400" keyTimes="0; 0.33; 0.66; 1" dur="6s" repeatCount="indefinite"/></tspan>
            위치 추적
        </text>
    </g>
</svg>
