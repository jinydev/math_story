<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#f03e3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">세상을 덮어버린 통계: 일상생활 추정(Estimation) 해킹</text>

    <!-- Big Data Matrix Concept -->
    <g transform="translate(300, 150)">
        <!-- Central AI / Estimation Engine -->
        <circle cx="0" cy="0" r="60" fill="#fff5f5" stroke="#f03e3e" stroke-width="4" />
        <text x="0" y="-10" fill="#c92a2a" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">추정 엔진</text>
        <text x="0" y="10" fill="#e03131" font-size="10" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">"일부만 보고</text>
        <text x="0" y="25" fill="#e03131" font-size="10" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">전체를 판독한다"</text>

        <!-- Node 1: Quality Control -->
        <circle cx="-180" cy="-60" r="30" fill="#e7f5ff" stroke="#339af0" stroke-width="2" />
        <path d="M -150 -60 Q -100 -50 -50 -20" fill="none" stroke="#adb5bd" stroke-width="2"
            marker-end="url(#arrow-red)" />
        <text x="-180" y="-55" fill="#1864ab" font-size="10" font-weight="bold" text-anchor="middle">공장 불량률</text>
        <text x="-180" y="-85" fill="#495057" font-size="20">🏭</text>

        <!-- Node 2: Elections -->
        <circle cx="-150" cy="60" r="30" fill="#ebfbee" stroke="#40c057" stroke-width="2" />
        <path d="M -120 60 Q -80 40 -50 20" fill="none" stroke="#adb5bd" stroke-width="2"
            marker-end="url(#arrow-red)" />
        <text x="-150" y="65" fill="#2b8a3e" font-size="10" font-weight="bold" text-anchor="middle">출구 조사</text>
        <text x="-150" y="35" fill="#495057" font-size="20">🗳️</text>

        <!-- Node 3: Medical Trials -->
        <circle cx="180" cy="-60" r="30" fill="#f3d9fa" stroke="#ae3ec9" stroke-width="2" />
        <path d="M 150 -60 Q 100 -50 50 -20" fill="none" stroke="#adb5bd" stroke-width="2"
            marker-end="url(#arrow-red)" />
        <text x="180" y="-55" fill="#862e9c" font-size="10" font-weight="bold" text-anchor="middle">백신 효능</text>
        <text x="180" y="-85" fill="#495057" font-size="20">💉</text>

        <!-- Node 4: A/B Testing UX -->
        <circle cx="150" cy="60" r="30" fill="#fff3bf" stroke="#f59f00" stroke-width="2" />
        <path d="M 120 60 Q 80 40 50 20" fill="none" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow-red)" />
        <text x="150" y="65" fill="#d9480f" font-size="10" font-weight="bold" text-anchor="middle">AB 테스트(IT)</text>
        <text x="150" y="35" fill="#495057" font-size="20">💻</text>
    </g>

    <defs>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f03e3e" />
        </marker>
    </defs>
</svg>