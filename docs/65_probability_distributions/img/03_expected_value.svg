<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#e8590c" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">도박의 절대 진리: 기댓값 (Expected Value, E(X))</text>

    <!-- Game Setup -->
    <g transform="translate(100, 150)">
        <rect x="-80" y="-80" width="160" height="120" fill="#fff4e6" stroke="#f59f00" stroke-width="2" rx="8" />
        <text x="0" y="-55" fill="#d9480f" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">동전 던지기 게임</text>

        <circle cx="-30" cy="-10" r="15" fill="#ffd8a8" stroke="#e8590c" stroke-width="2" />
        <text x="-30" y="-5" fill="#e8590c" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">앞</text>
        <text x="-30" y="25" fill="#495057" font-size="12" font-family="sans-serif" text-anchor="middle">100원</text>

        <circle cx="30" cy="-10" r="15" fill="#ffd8a8" stroke="#e8590c" stroke-width="2" />
        <text x="30" y="-5" fill="#e8590c" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">뒤</text>
        <text x="30" y="25" fill="#495057" font-size="12" font-family="sans-serif" text-anchor="middle">0원</text>
    </g>

    <!-- Mathematical Calculation -->
    <g transform="translate(300, 150)">
        <line x1="-30" y1="-20" x2="160" y2="-20" stroke="#868e96" stroke-width="3" marker-end="url(#arrow-grey)" />

        <rect x="-10" y="-80" width="160" height="120" fill="#e7f5ff" stroke="#339af0" stroke-width="2" rx="8" />
        <text x="70" y="-55" fill="#1864ab" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">기댓값 계산: E(X)</text>

        <!-- E(X) formula -->
        <text x="70" y="-25" fill="#495057" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">위칸(X) × 아래칸(P) 다 합치기!</text>
        <text x="70" y="0" fill="#1864ab" font-size="14" font-family="monospace" font-weight="bold"
            text-anchor="middle">(100 × 0.5) + (0 × 0.5)</text>

        <text x="70" y="25" fill="#e03131" font-size="20" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">= 50 원</text>
    </g>

    <!-- The Casino Rule -->
    <g transform="translate(490, 150)">
        <rect x="-20" y="-80" width="100" height="120" fill="#fff5f5" stroke="#fa5252" stroke-width="2" rx="8" />
        <text x="30" y="-50" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">참가비가</text>
        <text x="30" y="-30" fill="#e03131" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">60 원</text>
        <text x="30" y="-10" fill="#c92a2a" font-size="12" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">이라면?</text>
        <text x="30" y="20" fill="#495057" font-size="20" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">❌</text>
    </g>

    <defs>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96" />
        </marker>
    </defs>
</svg>