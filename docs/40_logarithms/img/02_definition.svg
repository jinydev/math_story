<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#fff4e6" rx="10" />

    <text x="300" y="30" fill="#d9480f" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">거대함을 압축하는 번역기: 로그의 정의 (Definition)</text>

    <!-- Exponential Form -->
    <g transform="translate(150, 150)">
        <text x="0" y="-80" fill="#d9480f" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">지수의 세계 (Exponential)</text>

        <text x="-30" y="0" fill="#495057" font-size="36" font-family="serif" font-weight="bold">2</text>
        <text x="10" y="-30" fill="#e03131" font-size="24" font-family="serif" font-weight="bold">3</text>
        <text x="40" y="0" fill="#495057" font-size="36" font-family="serif" font-weight="bold">= 8</text>

        <text x="-25" y="40" fill="#868e96" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">밑 (Base)</text>
        <text x="20" y="-55" fill="#f03e3e" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">지수 (진짜 번역할 대상)</text>
    </g>

    <!-- Transform Arrows -->
    <path d="M 270 140 Q 300 110 330 140" fill="none" stroke="#f59f00" stroke-width="4"
        marker-end="url(#arrow-orange)" />
    <path d="M 330 160 Q 300 190 270 160" fill="none" stroke="#f59f00" stroke-width="4"
        marker-end="url(#arrow-orange)" />
    <text x="300" y="125" fill="#f59f00" font-size="14" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">완벽한 쌍방향 번역</text>

    <!-- Logarithmic Form -->
    <g transform="translate(450, 150)">
        <text x="0" y="-80" fill="#d9480f" font-size="16" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">로그의 세계 (Logarithm)</text>

        <text x="-50" y="0" fill="#495057" font-size="36" font-family="serif" font-weight="bold">log</text>
        <text x="5" y="15" fill="#868e96" font-size="24" font-family="serif" font-weight="bold">2</text>
        <text x="35" y="0" fill="#495057" font-size="36" font-family="serif" font-weight="bold">8 =</text>
        <text x="90" y="0" fill="#e03131" font-size="36" font-family="serif" font-weight="bold">3</text>

        <text x="10" y="40" fill="#868e96" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">밑</text>
        <text x="45" y="-35" fill="#495057" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">진수</text>
        <text x="90" y="40" fill="#f03e3e" font-size="14" font-family="sans-serif" font-weight="bold"
            text-anchor="middle">지수(결과 값)</text>
    </g>

    <defs>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59f00" />
        </marker>
    </defs>
</svg>