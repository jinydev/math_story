<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%">
    <rect width="800" height="300" fill="#2c3e50" />
    
    <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#ecf0f1" text-anchor="middle">
        부분집합 (Subset, ⊂)의 포함 관계
    </text>

    <!-- Set B (Big Set) -->
    <circle cx="400" cy="180" r="100" fill="#3498db" fill-opacity="0.3" stroke="#3498db" stroke-width="4" />
    <text x="400" y="95" font-family="Arial" font-size="20" font-weight="bold" fill="#3498db" text-anchor="middle">집합 B (전체 멤버)</text>
    
    <!-- Elements of B -->
    <text x="320" y="160" font-family="Arial" font-size="18" fill="#ecf0f1">4</text>
    <text x="480" y="240" font-family="Arial" font-size="18" fill="#ecf0f1">5</text>

    <!-- Set A (Subset) -->
    <circle cx="420" cy="200" r="50" fill="#e74c3c" fill-opacity="0.5" stroke="#e74c3c" stroke-width="3" />
    <text x="420" y="140" font-family="Arial" font-size="18" font-weight="bold" fill="#ff7675" text-anchor="middle">집합 A</text>

    <!-- Elements of A (also in B) -->
    <text x="395" y="195" font-family="Arial" font-size="18" fill="#ecf0f1">1</text>
    <text x="435" y="195" font-family="Arial" font-size="18" fill="#ecf0f1">2</text>
    <text x="415" y="225" font-family="Arial" font-size="18" fill="#ecf0f1">3</text>

    <!-- Label -->
    <rect x="580" y="150" width="180" height="60" fill="#34495e" rx="10" />
    <text x="670" y="175" font-family="Arial" font-size="18" font-weight="bold" fill="#2ecc71" text-anchor="middle">A ⊂ B</text>
    <text x="670" y="195" font-family="Arial" font-size="14" fill="#ecf0f1" text-anchor="middle">A.issubset(B) == True</text>

    <!-- Animation Pulse on A -->
    <circle cx="420" cy="200" r="50" fill="none" stroke="#ff7675" stroke-width="2">
        <animate attributeName="r" values="50;55;50" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite" />
    </circle>
</svg>
