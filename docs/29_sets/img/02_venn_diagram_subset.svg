<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%">
    <rect width="600" height="300" fill="#2d3436" />
    
    <!-- Title -->
    <text x="300" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        부분집합 (Subset) $B \subset A$
    </text>

    <!-- Universal Set U -->
    <rect x="50" y="70" width="500" height="200" fill="none" stroke="#b2bec3" stroke-width="4" rx="15" />
    <text x="70" y="95" font-family="Arial" font-size="20" font-weight="bold" fill="#b2bec3">U</text>

    <!-- Set A (Outer) -->
    <circle cx="280" cy="170" r="80" fill="#74b9ff" fill-opacity="0.2" stroke="#74b9ff" stroke-width="4" />
    <text x="180" y="115" font-family="Arial" font-size="24" font-weight="bold" fill="#74b9ff">A</text>

    <!-- Set B (Inner) -->
    <g>
        <animateTransform attributeName="transform" type="translate" values="200 0; 0 0; 0 0" keyTimes="0; 0.5; 1" dur="4s" repeatCount="indefinite" />
        <circle cx="280" cy="170" r="45" fill="#ff7675" fill-opacity="0.6" stroke="#ff7675" stroke-width="4" />
        <text x="280" y="177" font-family="Arial" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">B</text>
    </g>

    <!-- Text Explanation -->
    <text x="450" y="170" font-family="Arial" font-size="18" fill="#ffeaa7" text-anchor="middle">
        <tspan x="450" dy="0">집파 B가</tspan>
        <tspan x="450" dy="25">집합 A에</tspan>
        <tspan x="450" dy="25">완벽히 포함됨</tspan>
    </text>
</svg>
