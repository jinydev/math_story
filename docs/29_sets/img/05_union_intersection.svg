<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%">
    <rect width="800" height="400" fill="#2d3436" />
    
    <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        합집합(∪)과 교집합(∩)의 시각화
    </text>

    <!-- Union Box -->
    <rect x="50" y="80" width="320" height="280" fill="#636e72" rx="10" />
    <text x="210" y="110" font-family="Arial" font-size="20" font-weight="bold" fill="#ff7675" text-anchor="middle">A ∪ B (Union)</text>

    <g transform="translate(130, 200)">
        <circle cx="30" cy="0" r="70" fill="#fab1a0" fill-opacity="0.8" />
        <circle cx="130" cy="0" r="70" fill="#74b9ff" fill-opacity="0.8" />
        <!-- Overlap is filled entirely -->
        <text x="30" y="5" font-family="Arial" font-size="24" font-weight="bold" fill="#2d3436" text-anchor="middle">A</text>
        <text x="130" y="5" font-family="Arial" font-size="24" font-weight="bold" fill="#2d3436" text-anchor="middle">B</text>
        
        <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
    </g>
    <text x="210" y="330" font-family="Arial" font-size="16" fill="#ffeaa7" text-anchor="middle">Python: A | B (모든 영역)</text>


    <!-- Intersection Box -->
    <rect x="430" y="80" width="320" height="280" fill="#636e72" rx="10" />
    <text x="590" y="110" font-family="Arial" font-size="20" font-weight="bold" fill="#55efc4" text-anchor="middle">A ∩ B (Intersection)</text>

    <g transform="translate(510, 200)">
        <!-- Circles base -->
        <circle cx="30" cy="0" r="70" fill="#fab1a0" fill-opacity="0.2" stroke="#fab1a0" stroke-width="2" />
        <circle cx="130" cy="0" r="70" fill="#74b9ff" fill-opacity="0.2" stroke="#74b9ff" stroke-width="2" />
        
        <!-- Clipping path to show only intersection -->
        <defs>
            <clipPath id="intersectClip">
                <circle cx="30" cy="0" r="70" />
            </clipPath>
        </defs>
        <circle cx="130" cy="0" r="70" fill="#55efc4" clip-path="url(#intersectClip)" />
        
        <text x="30" y="5" font-family="Arial" font-size="24" font-weight="bold" fill="#fab1a0" text-anchor="middle">A</text>
        <text x="130" y="5" font-family="Arial" font-size="24" font-weight="bold" fill="#74b9ff" text-anchor="middle">B</text>
        
        <!-- Highlight animation on central part -->
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
    </g>
    <text x="590" y="330" font-family="Arial" font-size="16" fill="#ffeaa7" text-anchor="middle">Python: A & B (가운데 겹친 영역)</text>
</svg>
