<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%">
    <rect width="800" height="400" fill="#2d3436" />
    
    <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        차집합(-)과 여집합(^c)의 시각화
    </text>

    <!-- Difference Box -->
    <rect x="50" y="80" width="320" height="280" fill="#636e72" rx="10" />
    <text x="210" y="110" font-family="Arial" font-size="20" font-weight="bold" fill="#ff7675" text-anchor="middle">A - B (차집합)</text>

    <g transform="translate(130, 200)">
        <!-- Circle A (Crescent shape due to masking) -->
        <circle cx="30" cy="0" r="70" fill="#fab1a0" fill-opacity="0.9" />
        <!-- Circle B erasing A -->
        <circle cx="130" cy="0" r="70" fill="#636e72" />
        
        <circle cx="130" cy="0" r="70" fill="none" stroke="#2d3436" stroke-width="2" stroke-dasharray="5,5" />
        
        <text x="0" y="5" font-family="Arial" font-size="24" font-weight="bold" fill="#2d3436" text-anchor="middle">A</text>
        <text x="130" y="5" font-family="Arial" font-size="24" font-style="italic" fill="#b2bec3" text-anchor="middle">B (삭제됨)</text>
        
        <!-- Biting animation effect -->
        <animateTransform attributeName="transform" type="translate" values="130 200; 125 200; 130 200" dur="2s" repeatCount="indefinite" />
    </g>
    <text x="210" y="330" font-family="Arial" font-size="16" fill="#ffeaa7" text-anchor="middle">Python: A - B (순수한 A만 남김)</text>


    <!-- Complement Box -->
    <rect x="430" y="80" width="320" height="280" fill="#636e72" rx="10" />
    <text x="590" y="110" font-family="Arial" font-size="20" font-weight="bold" fill="#0984e3" text-anchor="middle">A^c (여집합)</text>
    
    <!-- Universal Set Background -->
    <g transform="translate(470, 140)">
        <rect x="0" y="0" width="240" height="140" fill="#0984e3" fill-opacity="0.8" />
        <!-- Circle A (erased out of U) -->
        <circle cx="120" cy="70" r="50" fill="#636e72" />
        
        <text x="120" y="75" font-family="Arial" font-size="20" font-weight="bold" fill="#b2bec3" text-anchor="middle">A</text>
        <text x="30" y="30" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9">U</text>
        
        <!-- Blinking Background (Everything NOT A) -->
        <animate attributeName="opacity" values="0.7; 1; 0.7" dur="2s" repeatCount="indefinite" />
    </g>

    <text x="590" y="330" font-family="Arial" font-size="16" fill="#ffeaa7" text-anchor="middle">Python: U - A (전체에서 A를 제외)</text>
</svg>
