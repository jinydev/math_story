<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
    <rect width="500" height="300" fill="#f8f9fa" rx="10" />
    <text x="250" y="30" fill="#e03131" font-size="22" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">강제 분쇄 망치: 조립제법 테이블</text>

    <text x="250" y="55" fill="#495057" font-size="14" font-family="monospace" text-anchor="middle">타겟: x³ - 4x² + x +
        6, 키(x = -1)</text>

    <g transform="translate(100, 80)">
        <!-- Vertical line -->
        <line x1="50" y1="10" x2="50" y2="120" stroke="#343a40" stroke-width="3" />
        <!-- Horizontal line -->
        <line x1="40" y1="120" x2="300" y2="120" stroke="#343a40" stroke-width="3" />

        <!-- Key -1 -->
        <text x="25" y="45" fill="#c92a2a" font-size="24" font-weight="bold" font-family="monospace"
            text-anchor="middle">-1</text>

        <!-- Top row (Coefficients) -->
        <text x="80" y="45" fill="#212529" font-size="20" font-weight="bold" font-family="monospace"
            text-anchor="middle">1</text>
        <text x="140" y="45" fill="#212529" font-size="20" font-weight="bold" font-family="monospace"
            text-anchor="middle">-4</text>
        <text x="200" y="45" fill="#212529" font-size="20" font-weight="bold" font-family="monospace"
            text-anchor="middle">1</text>
        <text x="260" y="45" fill="#212529" font-size="20" font-weight="bold" font-family="monospace"
            text-anchor="middle">6</text>

        <!-- Arrow 1 (drop) -->
        <path d="M 80 60 L 80 140" stroke="#868e96" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow)" />

        <!-- Middle row (Multiples) -->
        <text x="140" y="100" fill="#1864ab" font-size="20" font-weight="bold" font-family="monospace"
            text-anchor="middle">-1</text>
        <text x="200" y="100" fill="#1864ab" font-size="20" font-weight="bold" font-family="monospace"
            text-anchor="middle">5</text>
        <text x="260" y="100" fill="#1864ab" font-size="20" font-weight="bold" font-family="monospace"
            text-anchor="middle">-6</text>

        <!-- Arrow 2 (diagonal) -->
        <path d="M 90 150 L 130 110" stroke="#2b8a3e" stroke-width="2" marker-end="url(#arrow)" />

        <!-- Bottom row (Result + Remainder) -->
        <text x="80" y="160" fill="#e8590c" font-size="24" font-weight="bold" font-family="monospace"
            text-anchor="middle">1</text>
        <text x="140" y="160" fill="#e8590c" font-size="24" font-weight="bold" font-family="monospace"
            text-anchor="middle">-5</text>
        <text x="200" y="160" fill="#e8590c" font-size="24" font-weight="bold" font-family="monospace"
            text-anchor="middle">6</text>

        <rect x="235" y="135" width="50" height="35" fill="none" stroke="#e03131" stroke-width="2" rx="5" />
        <text x="260" y="160" fill="#e03131" font-size="24" font-weight="bold" font-family="monospace"
            text-anchor="middle">0</text>

        <!-- Labels -->
        <text x="140" y="190" fill="#d9480f" font-size="14" font-weight="bold" font-family="monospace"
            text-anchor="middle">몫: x² - 5x + 6</text>
        <text x="260" y="190" fill="#e03131" font-size="12" font-weight="bold" text-anchor="middle">나머지 제로!</text>
    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96" />
        </marker>
    </defs>
</svg>