<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#2b2b2b" rx="10" />
    <text x="300" y="30" fill="#fcc419" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">3차 방정식의 붕괴 구조 (a³ - b³)</text>

    <!-- The unified block -->
    <rect x="80" y="70" width="120" height="120" fill="#e03131" stroke="#ff8787" stroke-width="3" rx="10" />
    <text x="140" y="140" fill="#fff" font-size="32" font-weight="bold" text-anchor="middle">a³ - b³</text>
    <text x="140" y="170" fill="#ffa8a8" font-size="12" font-weight="bold" text-anchor="middle">거대 보스 몬스터</text>

    <!-- Laser slice effect -->
    <line x1="220" y1="50" x2="300" y2="200" stroke="#3bc9db" stroke-width="4" stroke-dasharray="10,5" />
    <path d="M 260 120 L 320 120" stroke="#3bc9db" stroke-width="3" marker-end="url(#arrow)" />
    <text x="290" y="110" fill="#3bc9db" font-size="14" font-weight="bold">참격 분해!</text>

    <!-- Broken parts -->
    <g transform="translate(350, 60)">
        <!-- Part 1: Small head -->
        <rect x="0" y="10" width="80" height="50" fill="#1971c2" stroke="#4dabf7" stroke-width="3" rx="5" />
        <text x="40" y="42" fill="#fff" font-size="20" font-weight="bold" text-anchor="middle">(a - b)</text>
        <text x="40" y="15" fill="#a5d8ff" font-size="10" font-weight="bold" text-anchor="middle">1차 머리통</text>

        <!-- Part 2: Large body -->
        <rect x="90" y="30" width="140" height="100" fill="#099268" stroke="#38d9a9" stroke-width="3" rx="5" />
        <text x="160" y="85" fill="#fff" font-size="18" font-weight="bold" text-anchor="middle">(a² + ab + b²)</text>
        <text x="160" y="55" fill="#96f2d7" font-size="12" font-weight="bold" text-anchor="middle">기형적인 2차 몸통</text>
        <text x="160" y="115" fill="#20c997" font-size="10" font-weight="bold" text-anchor="middle">숫자 2가 없는 것에
            주의!</text>
    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3bc9db" />
        </marker>
    </defs>
</svg>