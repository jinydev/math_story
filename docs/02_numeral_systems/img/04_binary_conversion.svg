<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="500">
    <rect width="800" height="500" fill="#2d3436" />
    <text x="400" y="40" font-family="Arial" font-size="28" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        10진수 $\rightarrow$ 2진수 변환 폭포 (Division by 2)
    </text>

    <!-- Division Steps -->
    <g transform="translate(300, 100)" font-family="monospace" font-size="24" fill="#74b9ff">
        <!-- 13 / 2 -->
        <text x="0" y="0">2  )  13</text>
        <line x1="-10" y1="10" x2="100" y2="10" stroke="#74b9ff" stroke-width="2" />
        <text x="120" y="0" fill="#ff7675">... 1</text>
        
        <!-- Animated arrow pointing up for the remainder -->
        <path d="M 140 20 L 140 40" fill="none" stroke="#ff7675" stroke-width="2" marker-end="url(#arrow)">
             <animate attributeName="stroke-dasharray" values="0,20;20,0" dur="2s" repeatCount="indefinite" />
        </path>

        <!-- 6 / 2 -->
        <text x="0" y="50">2  )   6</text>
        <line x1="-10" y1="60" x2="100" y2="60" stroke="#74b9ff" stroke-width="2" />
        <text x="120" y="50" fill="#00b894">... 0</text>

        <!-- 3 / 2 -->
        <text x="0" y="100">2  )   3</text>
        <line x1="-10" y1="110" x2="100" y2="110" stroke="#74b9ff" stroke-width="2" />
        <text x="120" y="100" fill="#ff7675">... 1</text>

        <!-- 1 -->
        <text x="50" y="150" fill="#ff7675">1</text>
    </g>

    <!-- Reading Direction Arrow -->
    <path d="M 330 250 C 250 250, 480 250, 470 100" fill="none" stroke="#fdcb6e" stroke-width="3" stroke-dasharray="10,5">
        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" repeatCount="indefinite" />
    </path>
    <text x="250" y="270" font-family="Arial" font-size="16" fill="#fdcb6e" font-weight="bold">
        결과는 역순으로 읽어 올립니다! (Bottom -> Up)
    </text>

    <!-- Result -->
    <g transform="translate(400, 350)">
        <text x="0" y="0" font-family="Arial" font-size="36" font-weight="bold" fill="#ffeaa7" text-anchor="middle">
            13(10) == 1101(2)
        </text>
        <text x="0" y="40" font-family="Arial" font-size="16" fill="#b2bec3" text-anchor="middle">
            (1x8) + (1x4) + (0x2) + (1x1) = 8 + 4 + 0 + 1 = 13
        </text>
    </g>

    <!-- Marker definition -->
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff7675" />
        </marker>
    </defs>
</svg>
