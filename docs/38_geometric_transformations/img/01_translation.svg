<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#1864ab" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">첫 번째 이동: '평행이동 (Translation)'</text>

    <!-- Subtitle -->
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"점의 이동과 도형의 이동, 왜 부호가 반대로 작동할까?"</text>

    <!-- Left Side: Point Translation -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">점의 이동 (정직함)</text>

        <!-- Point A -->
        <circle cx="50" cy="80" r="5" fill="#f59f00" />
        <text x="50" y="70" fill="#d9480f" font-size="12" font-weight="bold" text-anchor="middle">A (2, 3)</text>

        <!-- Path -->
        <path d="M 55 80 L 135 80 L 135 60 L 140 60 L 130 50 L 120 60 L 125 60 L 125 80" fill="#f1f3f5" stroke="#adb5bd"
            stroke-dasharray="2,2" />
        <path d="M 55 80 L 145 80 L 145 55" fill="none" stroke="#2b8a3e" stroke-width="2"
            marker-end="url(#arrow-green)" />

        <text x="100" y="95" fill="#2b8a3e" font-size="10" font-weight="bold">x축으로 +3</text>
        <text x="165" y="65" fill="#2b8a3e" font-size="10" font-weight="bold">y축 +2</text>

        <!-- Point A' -->
        <circle cx="145" cy="50" r="5" fill="#c92a2a" />
        <text x="145" y="40" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">A' (5, 5)</text>

        <rect x="15" y="115" width="190" height="25" fill="#e7f5ff" rx="3" />
        <text x="110" y="132" fill="#1864ab" font-size="11" font-weight="bold" font-family="monospace"
            text-anchor="middle">(x, y) ➜ (x+3, y+2)</text>
    </g>

    <!-- Right Side: Figure Translation -->
    <g transform="translate(320, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#c92a2a" font-size="14" font-weight="bold" text-anchor="middle">도형의 이동 (청개구리)</text>

        <!-- Equation Box -->
        <rect x="40" y="45" width="140" height="30" fill="#fff5f5" stroke="#fa5252" rx="3" />
        <text x="110" y="65" fill="#c92a2a" font-size="12" font-family="monospace" font-weight="bold"
            text-anchor="middle">f(x, y) = 0</text>

        <path d="M 110 80 L 110 100" fill="none" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)" />
        <text x="145" y="95" fill="#495057" font-size="10">x축 +3, y축 +2 이동</text>

        <!-- Translated Equation -->
        <rect x="25" y="105" width="170" height="30" fill="#ffe3e3" stroke="#c92a2a" stroke-width="2" rx="3" />
        <text x="110" y="125" fill="#c92a2a" font-size="12" font-family="monospace" font-weight="bold"
            text-anchor="middle">f( x - 3 , y - 2 ) = 0</text>

        <!-- Warning -->
        <text x="110" y="145" fill="#e8590c" font-size="10" font-weight="bold" text-anchor="middle">"도형의 식에는 부호가 반대로
            들어간다!"</text>
    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
        </marker>
    </defs>
</svg>