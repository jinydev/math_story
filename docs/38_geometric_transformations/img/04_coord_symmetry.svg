<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#c92a2a" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">네 번째 이동: '일반 점과 선에 대한 대칭'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"원점(0,0) 이나 x축, y축이라는 치트키가 사라진 임의의 좌표에서의 진짜
        반사!"</text>

    <!-- Left Side: General Point Symmetry -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#c92a2a" font-size="14" font-weight="bold" text-anchor="middle">일반 점 (a, b) 에 대한
            대칭</text>

        <!-- Point A -->
        <circle cx="40" cy="120" r="5" fill="#f59f00" />
        <text x="40" y="140" fill="#e8590c" font-size="12" font-weight="bold" text-anchor="middle">P (x, y)</text>

        <!-- Center Point M (a,b) -->
        <line x1="45" y1="117" x2="175" y2="43" stroke="#adb5bd" stroke-width="2" stroke-dasharray="4,2" />

        <circle cx="110" cy="80" r="6" fill="#1864ab" />
        <text x="110" y="65" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">기준점 (a, b)</text>

        <!-- Symmetric Point P' -->
        <circle cx="180" cy="40" r="5" fill="#c92a2a" />
        <text x="180" y="30" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">P' (x', y')</text>

        <!-- The Math Idea -->
        <rect x="15" y="115" width="190" height="25" fill="#ffe3e3" rx="3" />
        <text x="110" y="132" fill="#c92a2a" font-size="11" font-family="monospace" font-weight="bold"
            text-anchor="middle">"중점 공식: (x+x')/2 = a"</text>
    </g>

    <!-- Right Side: General Line Symmetry -->
    <g transform="translate(320, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#2b8a3e" font-size="14" font-weight="bold" text-anchor="middle">일반 직선 (l) 에 대한
            선대칭</text>

        <!-- General Line -->
        <line x1="40" y1="130" x2="180" y2="40" stroke="#2b8a3e" stroke-width="3" />
        <text x="175" y="30" fill="#2b8a3e" font-size="12" font-weight="bold">거울선 (l)</text>

        <!-- Original Point -->
        <circle cx="60" cy="50" r="5" fill="#f59f00" />
        <text x="60" y="40" fill="#e8590c" font-size="12" font-weight="bold" text-anchor="middle">P</text>

        <!-- Reflection Path -->
        <line x1="60" y1="50" x2="140" y2="120" stroke="#adb5bd" stroke-width="2" stroke-dasharray="2,2" />
        <!-- Perpendicular symbol -->
        <path d="M 103 84 L 110 90 L 103 97 L 96 91" fill="none" stroke="#fa5252" stroke-width="1.5" />
        <text x="80" y="100" fill="#c92a2a" font-size="10" font-weight="bold">수직 (90°)</text>

        <!-- Symmetric Point -->
        <circle cx="140" cy="120" r="5" fill="#2b8a3e" />
        <text x="140" y="138" fill="#2b8a3e" font-size="12" font-weight="bold" text-anchor="middle">P'</text>

        <!-- Conditions -->
        <rect x="15" y="115" width="190" height="25" fill="#ebfbee" rx="3" />
        <text x="110" y="132" fill="#2b8a3e" font-size="11" font-weight="bold" text-anchor="middle">1. 수직 조건! 2. 중점
            조건!</text>
    </g>

</svg>