<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="500">
    <rect width="800" height="500" fill="#2d3436" />
    <text x="400" y="50" font-family="Arial" font-size="28" font-weight="bold" fill="#dfe6e9" text-anchor="middle">
        최소공배수 (LCM): 톱니바퀴의 기적적인 동기화
    </text>

    <!-- Gear 1: 12 teeth (Smaller Gear) -->
    <!-- Circumference visually smaller. Rotates faster. -->
    <g transform="translate(300, 250)">
        <g>
            <!-- Draw 12 teeth (simplified as spokes/rectangles sticking out) -->
            <!-- Every 30 degrees -->
            <rect x="-10" y="-120" width="20" height="240" fill="#74b9ff" rx="4" />
            <rect x="-10" y="-120" width="20" height="240" fill="#74b9ff" rx="4" transform="rotate(30)" />
            <rect x="-10" y="-120" width="20" height="240" fill="#74b9ff" rx="4" transform="rotate(60)" />
            <rect x="-10" y="-120" width="20" height="240" fill="#74b9ff" rx="4" transform="rotate(90)" />
            <rect x="-10" y="-120" width="20" height="240" fill="#74b9ff" rx="4" transform="rotate(120)" />
            <rect x="-10" y="-120" width="20" height="240" fill="#74b9ff" rx="4" transform="rotate(150)" />
            
            <!-- Base circle of the gear -->
            <circle cx="0" cy="0" r="100" fill="#0984e3" stroke="#2d3436" stroke-width="4" />
            <circle cx="0" cy="0" r="30" fill="#2d3436" /> <!-- Axle hole -->
            
            <!-- Special marking indicator to show full revolution sync -->
            <circle cx="0" cy="-70" r="15" fill="#ff7675" />
            
            <!-- Animation for rotation: 12 teeth -> rotate 360 deg in 6s (60 deg/sec) -->
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite" />
        </g>
        <text x="0" y="8" font-family="Arial" font-size="24" font-weight="bold" fill="#dfe6e9" text-anchor="middle">12t</text>
    </g>

    <!-- Gear 2: 18 teeth (Larger Gear) -->
    <!-- Interlocking right next to it. Rotates slower in opposite direction -->
    <!-- Distance between centers = R1 + R2 = 100 + 150 = 250 (roughly, for visual interlock) -->
    <g transform="translate(560, 250)">
        <g>
            <!-- Draw 18 teeth -> 360/18 = 20 degrees -->
            <!-- We will do 9 rectangles -->
            <rect x="-10" y="-170" width="20" height="340" fill="#55efc4" rx="4" />
            <rect x="-10" y="-170" width="20" height="340" fill="#55efc4" rx="4" transform="rotate(20)" />
            <rect x="-10" y="-170" width="20" height="340" fill="#55efc4" rx="4" transform="rotate(40)" />
            <rect x="-10" y="-170" width="20" height="340" fill="#55efc4" rx="4" transform="rotate(60)" />
            <rect x="-10" y="-170" width="20" height="340" fill="#55efc4" rx="4" transform="rotate(80)" />
            <rect x="-10" y="-170" width="20" height="340" fill="#55efc4" rx="4" transform="rotate(100)" />
            <rect x="-10" y="-170" width="20" height="340" fill="#55efc4" rx="4" transform="rotate(120)" />
            <rect x="-10" y="-170" width="20" height="340" fill="#55efc4" rx="4" transform="rotate(140)" />
            <rect x="-10" y="-170" width="20" height="340" fill="#55efc4" rx="4" transform="rotate(160)" />

            <circle cx="0" cy="0" r="150" fill="#00b894" stroke="#2d3436" stroke-width="4" />
            <circle cx="0" cy="0" r="40" fill="#2d3436" />
            
            <!-- Special marking indicator -->
            <circle cx="0" cy="-110" r="15" fill="#fdcb6e" />
            
            <!-- Animation: 18 teeth -> has to cover same linear distance 
                 12-tooth gear turns full 360 in 6s. 
                 18-tooth gear turns full 360 in 9s. (Ratio 18/12 = 1.5)
                 Rotates counter-clockwise.
            -->
            <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="9s" repeatCount="indefinite" />
        </g>
        <text x="0" y="8" font-family="Arial" font-size="28" font-weight="bold" fill="#dfe6e9" text-anchor="middle">18t</text>
    </g>

    <!-- Info text below -->
    <text x="400" y="440" font-family="Arial" font-size="20" fill="#b2bec3" text-anchor="middle">
        12개의 이빨과 18개의 이빨이 돌아갑니다. 시작점에 찍힌 빨간/노란 마크가
    </text>
    <text x="400" y="470" font-family="Arial" font-size="20" fill="#b2bec3" text-anchor="middle">
        정확히 한 치의 오차 없이 다시 맞물리는 순간, 몇 개의 이빨이 스쳐 지나가야 할까요? (LCM: 36)
    </text>

</svg>
