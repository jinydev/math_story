<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#e8590c" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">두 번째 부등식: '그래프로 해킹하는 이차부등식'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"수식으로 풀지 마라! 함수 y=f(x)가 땅(x축) 위로 솟았냐 수몰됐냐의
        싸움이다."</text>

    <!-- Left Side: Area > 0 -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#e8590c" font-size="14" font-weight="bold" text-anchor="middle">f(x) > 0 (지상
            세계)</text>

        <!-- Axes -->
        <line x1="20" y1="100" x2="200" y2="100" stroke="#495057" stroke-width="2" /> <!-- x axis (ground) -->

        <!-- Water/Ground fill -->
        <rect x="20" y="100" width="180" height="40" fill="#e7f5ff" opacity="0.6" /> <!-- Under water -->

        <!-- Parabola -->
        <path d="M 30 40 Q 110 180 190 40" fill="none" stroke="#e8590c" stroke-width="3" />

        <!-- Roots -->
        <circle cx="70" cy="100" r="4" fill="#212529" />
        <circle cx="150" cy="100" r="4" fill="#212529" />
        <text x="60" y="115" font-size="12">α</text>
        <text x="160" y="115" font-size="12">β</text>

        <!-- Highlights for > 0 (parts above ground) -->
        <path d="M 30 40 Q 50 70 70 100" fill="none" stroke="#fcc419" stroke-width="5" opacity="0.8" />
        <path d="M 150 100 Q 170 70 190 40" fill="none" stroke="#fcc419" stroke-width="5" opacity="0.8" />

        <!-- Range Text -->
        <text x="50" y="35" fill="#d9480f" font-size="10" font-weight="bold" text-anchor="middle">x &lt; α</text>
        <text x="170" y="35" fill="#d9480f" font-size="10" font-weight="bold" text-anchor="middle">x &gt; β</text>
    </g>

    <!-- Divider -->
    <line x1="300" y1="90" x2="300" y2="230" stroke="#adb5bd" stroke-dasharray="2,2" />

    <!-- Right Side: Area < 0 -->
    <g transform="translate(320, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#1864ab" font-size="14" font-weight="bold" text-anchor="middle">f(x) &lt; 0 (수중
            세계)</text>

        <!-- Axes -->
        <line x1="20" y1="100" x2="200" y2="100" stroke="#495057" stroke-width="2" /> <!-- x axis (ground) -->

        <!-- Water/Ground fill -->
        <rect x="20" y="100" width="180" height="40" fill="#e7f5ff" opacity="0.6" /> <!-- Under water -->

        <!-- Parabola -->
        <path d="M 30 40 Q 110 180 190 40" fill="none" stroke="#adb5bd" stroke-width="2" />

        <!-- Roots -->
        <circle cx="70" cy="100" r="4" fill="#212529" />
        <circle cx="150" cy="100" r="4" fill="#212529" />
        <text x="60" y="115" font-size="12">α</text>
        <text x="160" y="115" font-size="12">β</text>

        <!-- Highlights for < 0 (parts below ground) -->
        <path d="M 70 100 Q 110 160 150 100" fill="none" stroke="#1864ab" stroke-width="5" />

        <!-- Range Text -->
        <text x="110" y="130" fill="#1864ab" font-size="10" font-weight="bold" text-anchor="middle">α &lt; x &lt;
            β</text>
    </g>

</svg>