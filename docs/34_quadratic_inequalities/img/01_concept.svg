<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#2b8a3e" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">첫 번째 부등식: '방정식을 넘어서 (Beyond Equations)'</text>
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">"딱 맞아떨어지는 점(해)을 구하는 것이 아니라, 허용 가능한 살아남는
        구역(Area) 을 찾아라!"</text>

    <!-- Left Side: Equation (Exact Point) -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#495057" font-size="14" font-weight="bold" text-anchor="middle">방정식 (Equation)
            =</text>

        <!-- Scale (Balancing logic) -->
        <path d="M 60 70 L 160 70 L 110 120 Z" fill="#e9ecef" stroke="#adb5bd" stroke-width="2" />
        <rect x="60" y="55" width="20" height="15" fill="#f03e3e" />
        <rect x="140" y="55" width="20" height="15" fill="#1864ab" />

        <text x="110" y="105" fill="#495057" font-size="20" font-weight="bold" text-anchor="middle">=</text>

        <!-- Formula -->
        <rect x="15" y="125" width="190" height="20" fill="#f1f3f5" rx="3" />
        <text x="110" y="140" fill="#495057" font-size="12" font-family="monospace" font-weight="bold"
            text-anchor="middle">x² - 4 = 0 ➜ x = ±2 (정확한 점)</text>
    </g>

    <!-- Divider -->
    <text x="300" y="160" fill="#adb5bd" font-size="30" font-weight="bold" text-anchor="middle">VS</text>

    <!-- Right Side: Inequality (Range/Area) -->
    <g transform="translate(320, 80)">
        <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="110" y="25" fill="#2b8a3e" font-size="14" font-weight="bold" text-anchor="middle">부등식 (Inequality)
            &lt;, &gt;</text>

        <!-- Target Area Logic -->
        <line x1="20" y1="90" x2="200" y2="90" stroke="#ced4da" stroke-width="2" /> <!-- Number line -->

        <!-- Roots at -2 and 2 -->
        <circle cx="70" cy="90" r="4" fill="#fff" stroke="#2b8a3e" stroke-width="2" />
        <circle cx="150" cy="90" r="4" fill="#fff" stroke="#2b8a3e" stroke-width="2" />
        <text x="70" y="110" fill="#2b8a3e" font-size="12" font-weight="bold" text-anchor="middle">-2</text>
        <text x="150" y="110" fill="#2b8a3e" font-size="12" font-weight="bold" text-anchor="middle">2</text>

        <!-- Range highlight (Inside) -->
        <rect x="70" y="86" width="80" height="8" fill="#b2f2bb" opacity="0.8" />
        <text x="110" y="75" fill="#2b8a3e" font-size="10" font-weight="bold" text-anchor="middle">"이 사이의 모든 숫자가
            정답!"</text>

        <!-- Formula -->
        <rect x="15" y="125" width="190" height="20" fill="#ebfbee" rx="3" />
        <text x="110" y="140" fill="#2b8a3e" font-size="12" font-family="monospace" font-weight="bold"
            text-anchor="middle">x² - 4 &lt; 0 ➜ -2 &lt; x &lt; 2</text>
    </g>

</svg>