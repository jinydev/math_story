<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350">
    <rect width="600" height="350" fill="#212529" rx="10" />

    <text x="300" y="35" fill="#fcc419" font-size="22" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">1 + 1 = 2 (페아노 덧셈 공리 증명)</text>

    <!-- Title/Definitions -->
    <rect x="50" y="60" width="500" height="40" fill="#343a40" stroke="#fcc419" stroke-width="2" rx="5" />
    <text x="300" y="86" fill="#ffd43b" font-size="16" font-weight="bold" font-family="monospace" text-anchor="middle">
        [규칙 1] n + 1 = S(n) &amp; [정의] 2 = S(1)
    </text>

    <!-- Step By Step Proof -->
    <text x="60" y="150" fill="#adb5bd" font-size="20" font-weight="bold" font-family="monospace">
        1 + 1
    </text>

    <line x1="140" y1="143" x2="160" y2="143" stroke="#ff8787" stroke-width="3" />
    <line x1="140" y1="149" x2="160" y2="149" stroke="#ff8787" stroke-width="3" />

    <text x="180" y="150" fill="#fff" font-size="20" font-weight="bold" font-family="monospace">
        S( 1 )
    </text>

    <rect x="175" y="125" width="60" height="35" fill="none" stroke="#2b8a3e" stroke-width="2" stroke-dasharray="4,2" />
    <text x="250" y="145" fill="#69db7c" font-size="14" font-weight="bold">([규칙 1]에 의해 치환)</text>

    <line x1="140" y1="213" x2="160" y2="213" stroke="#ff8787" stroke-width="3" />
    <line x1="140" y1="219" x2="160" y2="219" stroke="#ff8787" stroke-width="3" />

    <text x="180" y="220" fill="#3bc9db" font-size="24" font-weight="bold" font-family="monospace">
        2
    </text>

    <rect x="175" y="195" width="25" height="35" fill="none" stroke="#22b8cf" stroke-width="2" stroke-dasharray="4,2" />
    <text x="220" y="215" fill="#74c0fc" font-size="14" font-weight="bold">([정의]에 의해 결정)</text>

    <!-- Conclusion Box -->
    <rect x="180" y="270" width="240" height="60" fill="#e03131" rx="10" />
    <text x="300" y="300" fill="#fff" font-size="24" font-weight="bold" font-family="monospace" text-anchor="middle">∴ 1
        + 1 = 2</text>
    <text x="300" y="320" fill="#ffc9c9" font-size="14" font-weight="bold" text-anchor="middle">"가장 완벽한 논리 엔진"</text>

    <!-- Arrows for flow -->
    <path d="M 100 160 Q 100 215 120 215" fill="none" stroke="#495057" stroke-width="2" marker-end="url(#arrow-gray)" />

    <defs>
        <marker id="arrow-gray" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057" />
        </marker>
    </defs>
</svg>