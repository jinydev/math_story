<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400">
    <rect width="750" height="400" fill="#e9ecef" rx="15" />
    <text x="375" y="40" fill="#343a40" font-size="24" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">기수법의 진화: 덧셈적 vs 위치적</text>

    <!-- Top panel: Egyptian/Roman Additive System -->
    <rect x="50" y="70" width="650" height="130" fill="#fff" stroke="#f03e3e" stroke-width="3" rx="10" />
    <text x="70" y="100" fill="#c92a2a" font-size="20" font-weight="bold">1. 덧셈적 기수법 (과거)</text>

    <text x="70" y="140" fill="#495057" font-size="18" font-family="monospace">
        목표 숫자 "203"
    </text>
    <rect x="230" y="115" width="45" height="45" fill="#ffe3e3" stroke="#ff8787" stroke-width="2" rx="4" />
    <text x="252" y="145" fill="#e03131" font-size="24" font-weight="bold" text-anchor="middle">C</text>

    <rect x="285" y="115" width="45" height="45" fill="#ffe3e3" stroke="#ff8787" stroke-width="2" rx="4" />
    <text x="307" y="145" fill="#e03131" font-size="24" font-weight="bold" text-anchor="middle">C</text>

    <rect x="340" y="115" width="30" height="45" fill="#fff0f6" stroke="#f06595" stroke-width="2" rx="4" />
    <text x="355" y="145" fill="#d81b60" font-size="24" font-weight="bold" text-anchor="middle">I</text>

    <rect x="380" y="115" width="30" height="45" fill="#fff0f6" stroke="#f06595" stroke-width="2" rx="4" />
    <text x="395" y="145" fill="#d81b60" font-size="24" font-weight="bold" text-anchor="middle">I</text>

    <rect x="420" y="115" width="30" height="45" fill="#fff0f6" stroke="#f06595" stroke-width="2" rx="4" />
    <text x="435" y="145" fill="#d81b60" font-size="24" font-weight="bold" text-anchor="middle">I</text>

    <text x="470" y="145" fill="#868e96" font-size="14" font-weight="bold">(100+100+1+1+1)</text>

    <text x="70" y="180" fill="#e03131" font-size="14" font-weight="bold">비효율적이고 압축이 불가하며, 각 문자의 값을 무식하게 합산한다.</text>

    <!-- Bottom panel: Positional System -->
    <rect x="50" y="220" width="650" height="150" fill="#fff" stroke="#1c7ed6" stroke-width="3" rx="10" />
    <text x="70" y="250" fill="#1864ab" font-size="20" font-weight="bold">2. 위치적 기수법 (현대 메모리 배열)</text>

    <text x="70" y="300" fill="#495057" font-size="18" font-family="monospace">
        목표 숫자 "203"
    </text>

    <rect x="230" y="270" width="60" height="60" fill="#e7f5ff" stroke="#339af0" stroke-width="3" rx="8" />
    <text x="260" y="310" fill="#1864ab" font-size="34" font-family="monospace" font-weight="bold"
        text-anchor="middle">2</text>
    <text x="260" y="345" fill="#1c7ed6" font-size="12" font-weight="bold" text-anchor="middle">100의 방</text>

    <rect x="305" y="270" width="60" height="60" fill="#e3fafc" stroke="#15aabf" stroke-width="3" rx="8" />
    <text x="335" y="310" fill="#0b7285" font-size="34" font-family="monospace" font-weight="bold"
        text-anchor="middle">0</text>
    <text x="335" y="345" fill="#15aabf" font-size="12" font-weight="bold" text-anchor="middle">10의 방</text>

    <rect x="380" y="270" width="60" height="60" fill="#ebfbee" stroke="#51cf66" stroke-width="3" rx="8" />
    <text x="410" y="310" fill="#2b8a3e" font-size="34" font-family="monospace" font-weight="bold"
        text-anchor="middle">3</text>
    <text x="410" y="345" fill="#51cf66" font-size="12" font-weight="bold" text-anchor="middle">1의 방</text>

    <text x="460" y="300" fill="#868e96" font-size="14" font-weight="bold">(2*100) + (0*10) + (3*1)</text>

    <rect x="460" y="320" width="180" height="25" fill="#e3fafc" rx="5" />
    <text x="550" y="337" fill="#0c8599" font-size="12" font-weight="bold" text-anchor="middle">마법의 숫자 '0'의 빈자리 보호
        효과!</text>
</svg>