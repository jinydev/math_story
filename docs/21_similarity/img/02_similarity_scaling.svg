<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="400">
    <defs>
        <style>
            .bg {
                fill: #fdfbf7;
                rx: 10;
                stroke: #e0dcd3;
                stroke-width: 2;
            }

            .rect-small {
                fill: #a8dadc;
                stroke: #457B9D;
                stroke-width: 2;
                opacity: 0.8;
            }

            .rect-large {
                fill: #f1faee;
                stroke: #e63946;
                stroke-width: 3;
                stroke-dasharray: 6;
                opacity: 0.5;
            }

            .line {
                stroke: #1D3557;
                stroke-width: 1.5;
                marker-end: url(#arrow);
                marker-start: url(#arrow);
            }

            .text-label {
                font-family: 'Pretendard', sans-serif;
                font-size: 14px;
                fill: #1D3557;
                font-weight: bold;
            }

            .text-ratio {
                font-family: 'Pretendard', sans-serif;
                font-size: 16px;
                fill: #e63946;
                font-weight: bold;
            }

            .dashed-connect {
                stroke: #6C757D;
                stroke-width: 1;
                stroke-dasharray: 4;
            }
        </style>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#1D3557" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <!-- Small Rectangle (Original) -->
    <rect x="80" y="200" width="100" height="60" class="rect-small" />
    <text x="115" y="235" class="text-label" fill="#1D3557">도형 A</text>

    <!-- Width & Height labels for A -->
    <line x1="80" y1="185" x2="180" y2="185" class="line" />
    <text x="120" y="175" class="text-label">a (2)</text>

    <line x1="65" y1="200" x2="65" y2="260" class="line" />
    <text x="30" y="235" class="text-label">b (1)</text>

    <!-- Large Rectangle (Scaled) -->
    <rect x="250" y="100" width="250" height="150" class="rect-large" />
    <text x="350" y="180" class="text-ratio">도형 A' (A의 확대 보전)</text>

    <!-- Width & Height labels for A' -->
    <line x1="250" y1="80" x2="500" y2="80" class="line" />
    <text x="350" y="70" class="text-label">a' (5)</text>

    <line x1="520" y1="100" x2="520" y2="250" class="line" />
    <text x="535" y="180" class="text-label">b' (2.5)</text>

    <!-- Connection Lines (Mapping vertices) -->
    <line x1="80" y1="200" x2="250" y2="100" class="dashed-connect" />
    <line x1="180" y1="200" x2="500" y2="100" class="dashed-connect" />
    <line x1="80" y1="260" x2="250" y2="250" class="dashed-connect" />
    <line x1="180" y1="260" x2="500" y2="250" class="dashed-connect" />

    <!-- Info Text -->
    <text x="300" y="320" font-family="'Pretendard', sans-serif" font-size="16px" fill="#457B9D" text-anchor="middle"
        font-weight="bold">
        닮음비 관계식 (대응변의 길이비)
    </text>
    <text x="300" y="345" font-family="'Pretendard', sans-serif" font-size="15px" fill="#1D3557" text-anchor="middle">
        a : a' = b : b' = 2 : 5
    </text>
    <text x="300" y="370" font-family="'Pretendard', sans-serif" font-size="15px" fill="#1D3557" text-anchor="middle">
        도형 A와 도형 A'의 닮음비는 2 : 5 이며, 대응하는 각의 크기는 완전히 100% 똑같습니다.
    </text>
</svg>