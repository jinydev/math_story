<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 350">
  <rect width="750" height="350" fill="#2b2b2b" rx="15" />

  <text x="375" y="45" fill="#fcc419" font-size="24" font-family="sans-serif" font-weight="bold"
    text-anchor="middle">분모의 유리화 (Rationalizing the Denominator)</text>

  <!-- Left: Unstable Fraction -->
  <rect x="50" y="100" width="150" height="150" fill="#343a40" stroke="#fa5252" stroke-width="3" rx="10" />
  <text x="125" y="130" fill="#fa5252" font-size="16" font-weight="bold" text-anchor="middle">미완성 건물</text>

  <text x="125" y="175" fill="#fff" font-size="28" font-family="monospace" font-weight="bold"
    text-anchor="middle">1</text>
  <line x1="85" y1="190" x2="165" y2="190" stroke="#fff" stroke-width="3" />
  <text x="125" y="225" fill="#ff8787" font-size="28" font-family="monospace" font-weight="bold"
    text-anchor="middle">√2</text>
  <text x="125" y="275" fill="#c92a2a" font-size="14" font-weight="bold" text-anchor="middle">바닥이 진흙탕(무리수)</text>

  <!-- Middle: Magic Multiplier -->
  <text x="235" y="185" fill="#adb5bd" font-size="30" font-weight="bold">×</text>

  <rect x="290" y="100" width="150" height="150" fill="#343a40" stroke="#fcc419" stroke-width="3" rx="10" />
  <text x="365" y="130" fill="#fcc419" font-size="16" font-weight="bold" text-anchor="middle">1 둔갑술 마법</text>

  <rect x="330" y="145" width="70" height="35" fill="#ffd8a8" rx="5" />
  <text x="365" y="172" fill="#d9480f" font-size="24" font-family="monospace" font-weight="bold"
    text-anchor="middle">√2</text>

  <line x1="325" y1="190" x2="405" y2="190" stroke="#fcc419" stroke-width="3" />

  <rect x="330" y="200" width="70" height="35" fill="#ffd8a8" rx="5" />
  <text x="365" y="227" fill="#d9480f" font-size="24" font-family="monospace" font-weight="bold"
    text-anchor="middle">√2</text>
  <text x="365" y="275" fill="#e67700" font-size="14" font-weight="bold" text-anchor="middle">분모, 분자에 공평하게!</text>

  <!-- Right: Stable Fraction -->
  <text x="470" y="185" fill="#3bc9db" font-size="30" font-weight="bold">→</text>

  <rect x="520" y="100" width="180" height="150" fill="#343a40" stroke="#3bc9db" stroke-width="3" rx="10" />
  <text x="610" y="130" fill="#3bc9db" font-size="16" font-weight="bold" text-anchor="middle">완성된 건물 (안정)</text>

  <text x="610" y="175" fill="#c4f0f5" font-size="28" font-family="monospace" font-weight="bold"
    text-anchor="middle">√2</text>
  <line x1="570" y1="190" x2="650" y2="190" stroke="#3bc9db" stroke-width="3" />
  <text x="610" y="225" fill="#15aabf" font-size="28" font-family="monospace" font-weight="bold"
    text-anchor="middle">2</text>

  <rect x="585" y="195" width="50" height="40" fill="none" stroke="#22b8cf" stroke-width="2" stroke-dasharray="4,2" />
  <text x="610" y="275" fill="#0c8599" font-size="14" font-weight="bold" text-anchor="middle">바닥이 콘크리트(정수)!</text>

  <!-- Animation Arrows -->
  <path d="M 125 240 Q 235 320 330 220" fill="none" stroke="#fcc419" stroke-width="3" stroke-dasharray="6,4"
    marker-end="url(#arrow-yellow)" />

  <defs>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
      orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fcc419" />
    </marker>
  </defs>
</svg>