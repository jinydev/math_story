<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#212529" rx="10" />

  <text x="300" y="40" fill="#69db7c" font-size="22" font-family="sans-serif" font-weight="bold"
    text-anchor="middle">이차방정식 x² = 5 의 무리수 근(해)</text>

  <!-- Axes -->
  <line x1="50" y1="300" x2="550" y2="300" stroke="#495057" stroke-width="2" marker-end="url(#arrow-gray)" />
  <text x="560" y="305" fill="#adb5bd" font-size="16" font-family="monospace" font-weight="bold">x</text>

  <line x1="300" y1="350" x2="300" y2="50" stroke="#495057" stroke-width="2" marker-end="url(#arrow-gray)" />
  <text x="300" y="35" fill="#adb5bd" font-size="16" font-family="monospace" font-weight="bold"
    text-anchor="middle">y</text>

  <!-- Graph y = x^2 -->
  <!-- vertex at (300, 300), scale x by 40, scale y by 20. -->
  <path d="M 120 70 Q 300 370 480 70" fill="none" stroke="#22b8cf" stroke-width="3" />
  <text x="440" y="100" fill="#3bc9db" font-size="16" font-weight="bold" font-family="monospace">y = x²</text>

  <!-- Line y = 5 -->
  <line x1="100" y1="120" x2="500" y2="120" stroke="#e03131" stroke-width="3" stroke-dasharray="8,4" />
  <text x="520" y="125" fill="#fa5252" font-size="16" font-weight="bold" font-family="monospace">y = 5</text>

  <!-- Intersection points -->
  <!-- roots are at y=120, x offset = sqrt(180/scale) approx 100 pixels -->
  <circle cx="200" cy="120" r="6" fill="#fcc419" />
  <line x1="200" y1="120" x2="200" y2="300" stroke="#fcc419" stroke-width="2" stroke-dasharray="4,2" />
  <text x="200" y="330" fill="#ffd43b" font-size="18" font-family="monospace" font-weight="bold"
    text-anchor="middle">-√5</text>
  <rect x="160" y="340" width="80" height="25" fill="#343a40" rx="4" />
  <text x="200" y="358" fill="#ffc9c9" font-size="14" font-family="monospace" font-weight="bold"
    text-anchor="middle">-2.236...</text>

  <circle cx="400" cy="120" r="6" fill="#fcc419" />
  <line x1="400" y1="120" x2="400" y2="300" stroke="#fcc419" stroke-width="2" stroke-dasharray="4,2" />
  <text x="400" y="330" fill="#ffd43b" font-size="18" font-family="monospace" font-weight="bold"
    text-anchor="middle">+√5</text>
  <rect x="360" y="340" width="80" height="25" fill="#343a40" rx="4" />
  <text x="400" y="358" fill="#ffc9c9" font-size="14" font-family="monospace" font-weight="bold"
    text-anchor="middle">+2.236...</text>

  <!-- Text Box -->
  <rect x="150" y="70" width="300" height="30" fill="#2b2b2b" stroke="#69db7c" stroke-width="2" rx="5" />
  <text x="300" y="90" fill="#40c057" font-size="14" font-weight="bold" text-anchor="middle">제곱을 벗기면 반드시 좌우(±) 두 개의 세상이
    연린다</text>

  <defs>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
      orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057" />
    </marker>
  </defs>
</svg>