<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .axis {
                stroke: #555555;
                stroke-width: 2;
            }

            .grid {
                stroke: #20252c;
                stroke-width: 1;
            }

            .curve {
                stroke: #ff3366;
                stroke-width: 4;
                fill: none;
            }

            .point {
                fill: #ffcc00;
                stroke: #ff3366;
                stroke-width: 2;
            }

            .title {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
            }

            .formula {
                fill: #ff3366;
                font-size: 32px;
                text-anchor: middle;
            }

            .label {
                fill: #ffcc00;
                font-size: 16px;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="300" y="40" class="title">반비례: 영원히 닿지 않는 쌍곡선</text>
    <text x="300" y="80" class="formula">y = 12 / x</text>

    <!-- Coordinate System (Center at 300, 350) -->
    <g transform="translate(300, 350)">

        <!-- Grid -->
        <g class="grid">
            <line x1="-250" y1="-200" x2="250" y2="-200" />
            <line x1="-250" y1="-150" x2="250" y2="-150" />
            <line x1="-250" y1="-100" x2="250" y2="-100" />
            <line x1="-250" y1="-50" x2="250" y2="-50" />
            <line x1="-250" y1="50" x2="250" y2="50" />
            <line x1="-250" y1="100" x2="250" y2="100" />
            <line x1="-250" y1="150" x2="250" y2="150" />
            <line x1="-250" y1="200" x2="250" y2="200" />

            <line x1="-200" y1="-250" x2="-200" y2="250" />
            <line x1="-150" y1="-250" x2="-150" y2="250" />
            <line x1="-100" y1="-250" x2="-100" y2="250" />
            <line x1="-50" y1="-250" x2="-50" y2="250" />
            <line x1="50" y1="-250" x2="50" y2="250" />
            <line x1="100" y1="-250" x2="100" y2="250" />
            <line x1="150" y1="-250" x2="150" y2="250" />
            <line x1="200" y1="-250" x2="200" y2="250" />
        </g>

        <!-- Axes -->
        <line x1="-250" y1="0" x2="250" y2="0" class="axis" />
        <line x1="0" y1="-250" x2="0" y2="250" class="axis" />
        <text x="260" y="5" fill="#555555" font-size="16">X</text>
        <text x="5" y="-260" fill="#555555" font-size="16">Y</text>

        <!-- Scaling: 1 unit = 16.6px -->
        <!-- Q1 Curve y = 12/x -->
        <!-- Path roughly estimated for aesthetic curve down from top right towards bottom right -->
        <!-- Point 1 (1, 12) -> (16.6, 200) -->
        <!-- Point 2 (2, 6) -> (33.2, 100) -->
        <!-- Point 3 (3, 4) -> (50, 66.4) -->
        <!-- Point 4 (4, 3) -> (66.4, 50) -->
        <!-- Point 6 (6, 2) -> (100, 33.2) -->
        <!-- Point 12 (12, 1) -> (200, 16.6) -->
        <!-- Since y is up in math but down in SVG, multiply y heavily by negative -->
        <path d="M 8 -250 Q 15 -100 50 -66.4 Q 100 -33.2 250 -8" class="curve" />

        <!-- Q3 Curve y = 12/x -->
        <path d="M -8 250 Q -15 100 -50 66.4 Q -100 33.2 -250 8" class="curve" />

        <!-- Key Points labeled -->
        <circle cx="16.6" cy="-200" r="5" class="point" />
        <text x="25" y="-205" class="label">(1, 12)</text>

        <circle cx="33.2" cy="-100" r="5" class="point" />
        <text x="45" y="-105" class="label">(2, 6)</text>

        <circle cx="50" cy="-66.4" r="5" class="point" />

        <circle cx="66.4" cy="-50" r="5" class="point" />
        <text x="75" y="-55" class="label">(4, 3)</text>

        <circle cx="100" cy="-33.2" r="5" class="point" />

        <circle cx="200" cy="-16.6" r="5" class="point" />
        <text x="210" y="-25" class="label">(12, 1)</text>

    </g>
</svg>