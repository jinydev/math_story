<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">Python Matplotlib 3D 렌더링 시스템 구축</text>

    <!-- Big 3D Graph UI bounds -->
    <rect x="50" y="70" width="800" height="420" rx="15" fill="#0d1a26" stroke="#555566" stroke-width="4" />

    <g transform="translate(50, 70)">
        <!-- Terminal Code Window Left -->
        <rect x="0" y="0" width="250" height="420" rx="15" fill="#0a121a" stroke-right="#555566" stroke-width="2" />
        <text x="125" y="30" fill="#00ffcc" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">ax = fig.add_subplot(3d)</text>
        <line x1="10" y1="40" x2="240" y2="40" stroke="#00ffcc" stroke-dasharray="2 2" />

        <text x="20" y="70" fill="#aaaaaa" font-family="monospace" font-size="12">p1 = [1, 1, 5]</text>
        <text x="20" y="90" fill="#aaaaaa" font-family="monospace" font-size="12">p2 = [4, 4, 10]</text>
        <text x="20" y="110" fill="#ff0055" font-family="monospace" font-size="12"># 3D Line Drawing</text>
        <text x="20" y="130" fill="#ffffff" font-family="monospace" font-size="12">ax.plot(z=line_z, c='red')</text>

        <text x="20" y="180" fill="#00ffcc" font-family="monospace" font-size="12"># Crush Z values to 0!</text>
        <text x="20" y="200" fill="#4da6ff" font-family="monospace" font-size="12">shadow_z = [0, 0]</text>
        <text x="20" y="220" fill="#ffaa00" font-family="monospace" font-size="12"># 2D Shadow Drawing</text>
        <text x="20" y="240" fill="#ffffff" font-family="monospace" font-size="12">ax.plot(z=shadow_z, c='blue')</text>

        <!-- Data logs -->
        <rect x="10" y="280" width="230" height="120" rx="5" fill="#112233" stroke="#555" />
        <text x="20" y="305" fill="#ffff00" font-family="monospace" font-size="12">Original Z : 5 -> 10</text>
        <text x="20" y="325" fill="#ffff00" font-family="monospace" font-size="12">Shadow Z : 0 -> 0</text>
        <text x="20" y="360" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold">[System] Render
            Success.</text>
    </g>

    <!-- 3D Plot Area Right -->
    <g transform="translate(300, 70)">
        <!-- Axes Grid Box (Wireframe style) -->
        <!-- X axis line -->
        <line x1="50" y1="350" x2="450" y2="350" stroke="#555" stroke-width="2" />
        <text x="460" y="355" fill="#aaaaaa" font-family="monospace" font-size="14">X</text>

        <!-- Y axis line -->
        <line x1="50" y1="350" x2="150" y2="100" stroke="#555" stroke-width="2" />
        <text x="150" y="90" fill="#aaaaaa" font-family="monospace" font-size="14">Y</text>

        <!-- Z axis line -->
        <line x1="50" y1="350" x2="50" y2="50" stroke="#ffffff" stroke-width="3" filter="url(#glow)" />
        <text x="40" y="40" fill="#ffffff" font-family="monospace" font-size="18" font-weight="bold">Z (Depth)</text>

        <!-- Background grid lines for depth perception -->
        <!-- X Grid -->
        <line x1="100" y1="225" x2="500" y2="225" stroke="#333" stroke-dasharray="2 2" />
        <line x1="150" y1="100" x2="550" y2="100" stroke="#333" stroke-dasharray="2 2" />

        <!-- Original 3D Object (Red) -->
        <line x1="100" y1="200" x2="350" y2="50" stroke="#ff0055" stroke-width="8" filter="url(#glow)" />
        <text x="360" y="45" fill="#ff0055" font-family="sans-serif" font-size="14" font-weight="bold">Original 3D
            Line</text>

        <!-- Projecting light lines -->
        <line x1="100" y1="200" x2="100" y2="350" stroke="#ffff00" stroke-width="2" stroke-dasharray="5 5" />
        <line x1="350" y1="50" x2="350" y2="200" stroke="#ffff00" stroke-width="2" stroke-dasharray="5 5" />

        <!-- The 2D Shadow on XY plane (Z=0) (Blue) -->
        <!-- Slanted line on the floor grid -->
        <line x1="100" y1="350" x2="350" y2="200" stroke="#4da6ff" stroke-width="6" opacity="0.8" filter="url(#glow)" />
        <text x="360" y="210" fill="#4da6ff" font-family="sans-serif" font-size="14" font-weight="bold">XY Plane Shadow
            (z=0)</text>

    </g>

    <!-- Explanation Footer -->
    <rect x="150" y="520" width="600" height="50" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
    <text x="450" y="550" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">파이썬 3D 모듈은 <tspan
            fill="#00ffcc" font-weight="bold">Z축(높이)</tspan> 스탯을 0으로 강제 세팅하는 것만으로 완벽한 정사영을 구현합니다.</text>

</svg>