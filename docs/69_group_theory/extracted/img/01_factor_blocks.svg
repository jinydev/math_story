<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
        </marker>
    </defs>

    <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">인수분해 = 파편화된 조각들을 모아 완벽한 직사각형 면적으로 조립!</text>

    <!-- Left: Messy Polynomial x^2 + 5x + 6 -->
    <g transform="translate(50, 100)">
        <text x="150" y="0" fill="#ff4d4d" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">x² + 5x + 6</text>

        <!-- 1 large x^2 square -->
        <rect x="50" y="30" width="100" height="100" fill="#ffaa00" stroke="#111" stroke-width="2" />
        <text x="100" y="90" fill="#111" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">x²</text>

        <!-- 5 x-rectangles -->
        <rect x="180" y="30" width="30" height="100" fill="#00ffcc" stroke="#111" stroke-width="2" />
        <text x="195" y="85" fill="#111" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">x</text>

        <rect x="220" y="30" width="30" height="100" fill="#00ffcc" stroke="#111" stroke-width="2" />
        <text x="235" y="85" fill="#111" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">x</text>

        <!-- Horizontal x rects casually thrown -->
        <rect x="50" y="160" width="100" height="30" fill="#00ffcc" stroke="#111" stroke-width="2" />
        <text x="100" y="180" fill="#111" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">x</text>

        <rect x="50" y="200" width="100" height="30" fill="#00ffcc" stroke="#111" stroke-width="2" />
        <text x="100" y="220" fill="#111" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">x</text>

        <rect x="50" y="240" width="100" height="30" fill="#00ffcc" stroke="#111" stroke-width="2" />
        <text x="100" y="260" fill="#111" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">x</text>

        <!-- 6 unit squares (1x1) -->
        <g fill="#4da6ff" stroke="#111" stroke-width="1">
            <rect x="180" y="160" width="30" height="30" /> <text x="195" y="180" fill="#111" font-size="12"
                text-anchor="middle">1</text>
            <rect x="220" y="160" width="30" height="30" /> <text x="235" y="180" fill="#111" font-size="12"
                text-anchor="middle">1</text>

            <rect x="180" y="200" width="30" height="30" /> <text x="195" y="220" fill="#111" font-size="12"
                text-anchor="middle">1</text>
            <rect x="220" y="200" width="30" height="30" /> <text x="235" y="220" fill="#111" font-size="12"
                text-anchor="middle">1</text>

            <rect x="180" y="240" width="30" height="30" /> <text x="195" y="260" fill="#111" font-size="12"
                text-anchor="middle">1</text>
            <rect x="220" y="240" width="30" height="30" /> <text x="235" y="260" fill="#111" font-size="12"
                text-anchor="middle">1</text>
        </g>
    </g>

    <!-- Arrow -->
    <line x1="380" y1="250" x2="450" y2="250" stroke="#ffffff" stroke-width="6" marker-end="url(#arrow)"
        filter="url(#glow)" />
    <text x="415" y="235" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">조립 (Factor)</text>

    <!-- Right: Organized Rectangle (x+2)(x+3) -->
    <g transform="translate(500, 100)">
        <text x="110" y="0" fill="#00ffcc" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">(x + 2)(x + 3)</text>

        <!-- Base large grid forming a single rectangle -->
        <g transform="translate(30, 40)">
            <!-- Top part: x height -->
            <rect x="0" y="0" width="100" height="100" fill="#ffaa00" stroke="#111" stroke-width="2" />
            <text x="50" y="60" fill="#111" font-family="monospace" font-size="30" font-weight="bold"
                text-anchor="middle">x²</text>

            <rect x="100" y="0" width="30" height="100" fill="#00ffcc" stroke="#111" stroke-width="2" />
            <rect x="130" y="0" width="30" height="100" fill="#00ffcc" stroke="#111" stroke-width="2" />
            <rect x="160" y="0" width="30" height="100" fill="#00ffcc" stroke="#111" stroke-width="2" />

            <!-- Bottom part: 2 height -->
            <rect x="0" y="100" width="100" height="30" fill="#00ffcc" stroke="#111" stroke-width="2" />
            <rect x="0" y="130" width="100" height="30" fill="#00ffcc" stroke="#111" stroke-width="2" />

            <!-- Unit squares in corner -->
            <g fill="#4da6ff" stroke="#111" stroke-width="1">
                <rect x="100" y="100" width="30" height="30" />
                <rect x="130" y="100" width="30" height="30" />
                <rect x="160" y="100" width="30" height="30" />

                <rect x="100" y="130" width="30" height="30" />
                <rect x="130" y="130" width="30" height="30" />
                <rect x="160" y="130" width="30" height="30" />
            </g>

            <!-- Outline bracing -->
            <path d="M 0 -10 L 0 -15 L 190 -15 L 190 -10" fill="none" stroke="#fff" stroke-width="2" />
            <text x="95" y="-20" fill="#fff" font-family="monospace" font-size="18" text-anchor="middle">x + 3</text>

            <path d="M -10 0 L -15 0 L -15 160 L -10 160" fill="none" stroke="#fff" stroke-width="2" />
            <text x="-25" y="85" fill="#fff" font-family="monospace" font-size="18" text-anchor="middle"
                transform="rotate(-90 -25 85)">x + 2</text>
        </g>
    </g>

</svg>