<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">타임머신 역추적(Reverse): 결과에서 원인으로 되감기</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"이미 망가진 결과물(900원) 이
        있다면 식을 세우지 마라. 시간을 거슬러 반대로(Undo) 연산해라!"</text>

    <!-- Forward Timeline (Top) -->
    <g transform="translate(100, 150)">
        <text x="0" y="0" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold">순방향 진행 방향 (사건 발생
            순서)</text>
        <text x="0" y="25" fill="#aaaaaa" font-family="sans-serif" font-size="14">어리석은 모범생의 생각: "어떤 수 X에 절반 쓰고, 100원 줍고,
            3배 불려..."</text>

        <line x1="50" y1="80" x2="650" y2="80" stroke="#4da6ff" stroke-width="4" marker-end="url(#arrow_f)" />

        <circle cx="50" cy="80" r="15" fill="#111" stroke="#4da6ff" stroke-width="3" />
        <text x="50" y="115" fill="#4da6ff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">X</text>

        <!-- Events -->
        <rect x="180" y="60" width="80" height="40" rx="5" fill="#001133" stroke="#4da6ff" stroke-width="2" />
        <text x="220" y="86" fill="#4da6ff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">÷ 2</text>

        <rect x="380" y="60" width="80" height="40" rx="5" fill="#001133" stroke="#4da6ff" stroke-width="2" />
        <text x="420" y="86" fill="#4da6ff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">+ 100</text>

        <rect x="580" y="60" width="80" height="40" rx="5" fill="#001133" stroke="#4da6ff" stroke-width="2" />
        <text x="620" y="86" fill="#4da6ff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">× 3</text>

        <circle cx="720" cy="80" r="25" fill="#003366" stroke="#4da6ff" stroke-width="3" filter="url(#glow)" />
        <text x="720" y="86" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">900</text>
    </g>

    <!-- Divider -->
    <line x1="100" y1="320" x2="800" y2="320" stroke="#555" stroke-width="2" stroke-dasharray="5 5" />

    <!-- Reverse Timeline (Bottom) -->
    <g transform="translate(100, 360)">
        <text x="700" y="0" fill="#ff00ff" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="end"
            filter="url(#glow)">해커의 역추적 진행 (시간 되감기)</text>
        <text x="700" y="25" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="end">"결과 900원부터 시작해.
            곱하기의 반대는 나누기, 더하기의 반대는 빼기!"</text>

        <line x1="650" y1="80" x2="50" y2="80" stroke="#ff00ff" stroke-width="4" marker-end="url(#arrow_r)" />

        <!-- End Result Node (Start of reverse flow) -->
        <circle cx="720" cy="80" r="25" fill="#330033" stroke="#ff00ff" stroke-width="3" filter="url(#glow)" />
        <text x="720" y="86" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">900</text>

        <!-- Reverse Events -->
        <rect x="580" y="60" width="80" height="40" rx="5" fill="#330033" stroke="#ff00ff" stroke-width="2" />
        <text x="620" y="86" fill="#ff00ff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">÷ 3</text>
        <text x="540" y="125" fill="#ffff00" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">= 300</text>

        <rect x="380" y="60" width="80" height="40" rx="5" fill="#330033" stroke="#ff00ff" stroke-width="2" />
        <text x="420" y="86" fill="#ff00ff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">- 100</text>
        <text x="340" y="125" fill="#ffff00" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">= 200</text>

        <rect x="180" y="60" width="80" height="40" rx="5" fill="#330033" stroke="#ff00ff" stroke-width="2" />
        <text x="220" y="86" fill="#ff00ff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">× 2</text>
        <text x="140" y="125" fill="#ffff00" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">= 400</text>

        <!-- Solved Origin -->
        <circle cx="50" cy="80" r="25" fill="#333300" stroke="#ffff00" stroke-width="3" filter="url(#glow)" />
        <text x="50" y="86" fill="#ffff00" font-family="monospace" font-size="22" font-weight="bold"
            text-anchor="middle">400!</text>
    </g>

    <defs>
        <marker id="arrow_f" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#4da6ff" />
        </marker>
        <marker id="arrow_r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ff00ff" />
        </marker>
    </defs>

    <!-- Base Explain -->
    <rect x="100" y="520" width="700" height="60" rx="10" fill="#1a111a" stroke="#ffff00" stroke-width="2" />
    <text x="450" y="545" fill="#ffffff" font-family="sans-serif" font-size="15" text-anchor="middle">
        파이썬의 Stack(후입선출) 구조처럼 가장 마지막 사건부터 <tspan fill="#ff00ff" font-weight="bold">정반대의 역연산자(Inverse Operator)</tspan> 로
        해부하여,
    </text>
    <text x="450" y="570" fill="#ffffff" font-family="sans-serif" font-size="15" text-anchor="middle">
        알파벳 X 로 식을 더럽히지 않고도 아주 깔끔한 암산만으로 최초의 과거 기원 데이터를 도출해 냅니다.
    </text>
</svg>