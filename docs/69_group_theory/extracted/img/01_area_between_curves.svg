<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">두 곡선 사이의 공중 영토 넓이 (Area Between)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"방향과 상관없이 '위쪽(Top)
        지붕'에서 '아래쪽(Bottom) 바닥'을 잘라 낸 순수 패티 막대의 합산"</text>

    <!-- Graph Coordinate System -->
    <g transform="translate(150, 150)">
        <!-- Grid -->
        <path d="M 0 50 L 600 50 M 0 100 L 600 100 M 0 150 L 600 150 M 0 200 L 600 200 M 0 250 L 600 250" fill="none"
            stroke="#222" stroke-width="1" />
        <path d="M 100 0 L 100 300 M 200 0 L 200 300 M 300 0 L 300 300 M 400 0 L 400 300 M 500 0 L 500 300" fill="none"
            stroke="#222" stroke-width="1" />

        <!-- Y Axis -->
        <path d="M 50 0 L 50 300" fill="none" stroke="#555" stroke-width="2" />
        <text x="30" y="20" fill="#555" font-weight="bold">y</text>

        <!-- X Axis -->
        <path d="M 0 250 L 600 250" fill="none" stroke="#555" stroke-width="2" />
        <text x="580" y="270" fill="#555" font-weight="bold">x</text>

        <!-- The Bounds A and B -->
        <path d="M 150 0 L 150 250" fill="none" stroke="#ffffff" stroke-dasharray="5 5" opacity="0.5" />
        <text x="150" y="270" fill="#fff" font-weight="bold" font-size="18" text-anchor="middle">a</text>

        <path d="M 450 0 L 450 250" fill="none" stroke="#ffffff" stroke-dasharray="5 5" opacity="0.5" />
        <text x="450" y="270" fill="#fff" font-weight="bold" font-size="18" text-anchor="middle">b</text>

        <!-- THE REGION BETWEEN CURVES -->
        <!-- From x=150 to x=450 -->
        <path d="M 150 50 Q 300 10 450 70 L 450 180 Q 300 230 150 160 Z" fill="#aa00ff" opacity="0.4"
            filter="url(#glow)" />

        <!-- Top Curve f(x) (Redish) -->
        <path d="M 50 100 Q 300 -50 550 80" fill="none" stroke="#ff0055" stroke-width="5" filter="url(#glow)" />
        <text x="520" y="60" fill="#ff0055" font-weight="bold" font-size="18" filter="url(#glow)">Top: f(x)</text>

        <!-- Bottom Curve g(x) (Blueish) -->
        <path d="M 50 150 Q 300 250 550 150" fill="none" stroke="#0088ff" stroke-width="5" filter="url(#glow)" />
        <text x="520" y="140" fill="#0088ff" font-weight="bold" font-size="18" filter="url(#glow)">Bottom: g(x)</text>

        <!-- Representation of a single "slice" dx -->
        <rect x="280" y="38" width="10" height="155" fill="#ffffff" opacity="0.8" stroke="#ffff00" stroke-width="1"
            filter="url(#glow)" />

        <!-- Arrow pointing to slice -->
        <path d="M 350 -20 L 295 80" fill="none" stroke="#ffff00" stroke-width="2" marker-end="url(#arrow_y)" />
        <text x="360" y="-30" fill="#ffff00" font-weight="bold" font-size="14">면적 막대기 (패티) 하나</text>
        <text x="360" y="-10" fill="#ffff00" font-weight="bold" font-size="14">높이: f(x) - g(x)</text>
        <text x="360" y="10" fill="#ffff00" font-weight="bold" font-size="14">두께: dx</text>
    </g>

    <defs>
        <marker id="arrow_y" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ffff00" />
        </marker>
    </defs>

    <!-- Big Alert Bottom -->
    <rect x="100" y="470" width="700" height="90" rx="10" fill="#1b001b" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="500" fill="#ffffff" font-family="sans-serif" font-size="20" text-anchor="middle"
        font-weight="bold">
        Area = &int;<tspan font-size="12" dy="-10">b</tspan>
        <tspan font-size="12" dy="20" dx="-5">a</tspan>
        <tspan dy="-10"> [ </tspan>
        <tspan fill="#ff0055">f(x)</tspan> - <tspan fill="#0088ff">g(x)</tspan> ] dx
    </text>
    <text x="450" y="540" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        상대적 허공의 차이값(Top-Bottom) 이기 때문에, 둘 다 음수 지역에 있거나 X축에 어디 있든
    </text>
    <text x="450" y="565" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">
        절대적인 상하 관계만 맞추면 넓이는 음수 오류 없이 완벽히 도출된다.
    </text>
</svg>