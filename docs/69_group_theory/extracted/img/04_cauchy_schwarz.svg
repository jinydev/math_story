<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">코시-슈바르츠 부등식: 벡터 파워 융합 한계치</text>

    <!-- Big Equation -->
    <rect x="150" y="80" width="600" height="80" rx="40" fill="#221122" stroke="#ff0055" stroke-width="3"
        filter="url(#glow)" />
    <text x="450" y="130" fill="#ffffff" font-family="serif" font-size="28" font-weight="bold" text-anchor="middle">(a²
        + b²)(x² + y²) ≥ (ax + by)²</text>

    <!-- Left Side: Pure Independent Vectors (u & v) -->
    <g transform="translate(150, 250)">
        <rect x="0" y="0" width="250" height="250" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="125" y="40" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">독립 원본 에너지 (좌변)</text>
        <text x="125" y="70" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">두 벡터 길이의 순수 곱
            스탯</text>

        <!-- Vector U -->
        <path d="M 60 180 L 120 100" stroke="#ffaa00" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)" />
        <text x="70" y="120" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold">|u|²</text>

        <!-- Vector V -->
        <path d="M 60 180 L 190 150" stroke="#4da6ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)" />
        <text x="170" y="140" fill="#4da6ff" font-family="sans-serif" font-size="16" font-weight="bold">|v|²</text>

        <text x="125" y="220" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">|u|² × |v|²
            (압도적 파워)</text>
    </g>

    <!-- Right Side: Inner Product (Shadow) -->
    <g transform="translate(500, 250)">
        <rect x="0" y="0" width="250" height="250" rx="10" fill="#331111" stroke="#ff0055" stroke-width="2" />
        <text x="125" y="40" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">크로스 내적 파워 (우변)</text>
        <text x="125" y="70" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">한쪽으로 쏟아부은 그림자
            에너지</text>

        <!-- Vector Projection -->
        <path d="M 60 180 L 190 150" stroke="#4da6ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)" />
        <text x="195" y="145" fill="#4da6ff" font-family="sans-serif" font-size="14">v</text>

        <path d="M 60 180 L 120 100" stroke="#888" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arrow)" />
        <text x="70" y="120" fill="#888" font-family="sans-serif" font-size="14">u</text>

        <!-- Projection Shadow -->
        <line x1="120" y1="100" x2="135" y2="160" stroke="#ff0055" stroke-width="2" stroke-dasharray="5 5" />
        <path d="M 60 180 L 135 160" stroke="#ffaa00" stroke-width="5" filter="url(#glow)" />
        <text x="80" y="195" fill="#ffaa00" font-family="sans-serif" font-size="14" font-weight="bold">u의 그림자</text>

        <text x="125" y="220" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">|u·v|² (방향 손실에
            의한 스탯 감소)</text>
    </g>

    <!-- Explanation Banner -->
    <rect x="150" y="530" width="600" height="50" rx="10" fill="#0f0f15" stroke="#555566" />
    <text x="450" y="560" fill="#00ffcc" font-family="sans-serif" font-size="16" text-anchor="middle">🌟 등호(완전일치 조건): 두
        화살표(벡터)의 방향이 완벽히 겹칠 때! (평행선)</text>

</svg>