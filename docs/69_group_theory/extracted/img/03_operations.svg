<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#aaaaaa" />
        </marker>

        <marker id="arrowZ1" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#4da6ff" />
        </marker>

        <marker id="arrowZ2" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffaa00" />
        </marker>

        <marker id="arrowSum" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
        <marker id="arrowConj" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4d4d" />
        </marker>
    </defs>

    <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">벡터 덧셈과 영혼의 거울 (켤레복소수)</text>

    <!-- Left Side: Vector Addition -->
    <g transform="translate(200, 350)">
        <text x="0" y="-290" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">1. 덧셈 (평행사변형)</text>

        <!-- Axes -->
        <line x1="-50" y1="0" x2="250" y2="0" stroke="#777777" stroke-width="2" marker-end="url(#arrow)" />
        <line x1="0" y1="50" x2="0" y2="-250" stroke="#777777" stroke-width="2" marker-end="url(#arrow)" />

        <!-- z1 = 3 + i (Scaled x40) -> (120, -40) -->
        <line x1="0" y1="0" x2="115" y2="-38" stroke="#4da6ff" stroke-width="3" marker-end="url(#arrowZ1)" />
        <text x="130" y="-30" fill="#4da6ff" font-family="monospace" font-size="18" font-weight="bold">z₁ (3+i)</text>

        <!-- z2 = 1 + 4i (Scaled x40) -> (40, -160) -->
        <line x1="0" y1="0" x2="38" y2="-152" stroke="#ffaa00" stroke-width="3" marker-end="url(#arrowZ2)" />
        <text x="-10" y="-170" fill="#ffaa00" font-family="monospace" font-size="18" font-weight="bold">z₂ (1+4i)</text>

        <!-- Parallelogram lines -->
        <line x1="120" y1="-40" x2="160" y2="-200" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="5 5" />
        <line x1="40" y1="-160" x2="160" y2="-200" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="5 5" />

        <!-- Sum Vector = 4 + 5i (Scaled x40) -> (160, -200) -->
        <line x1="0" y1="0" x2="155" y2="-194" stroke="#00ffcc" stroke-width="4" marker-end="url(#arrowSum)"
            filter="url(#glow)" />
        <circle cx="160" cy="-200" r="5" fill="#00ffcc" />
        <text x="175" y="-210" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold"
            filter="url(#glow)">z₁ + z₂ (4+5i)</text>
    </g>

    <!-- Divider Line -->
    <line x1="400" y1="80" x2="400" y2="380" stroke="#445566" stroke-width="2" stroke-dasharray="10 10" />

    <!-- Right Side: Conjugate -->
    <g transform="translate(600, 250)">
        <text x="0" y="-190" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">2. 켤레복소수 (거울 반사)</text>

        <!-- Axes -->
        <line x1="-150" y1="0" x2="150" y2="0" stroke="#777777" stroke-width="3" /> <!-- Real Axis = Mirror -->
        <line x1="0" y1="150" x2="0" y2="-150" stroke="#777777" stroke-width="2" marker-end="url(#arrow)" />

        <text x="160" y="5" fill="#aaaaaa" font-family="sans-serif" font-size="14">실수 거울선</text>

        <!-- Original z = 2 + 3i (Scaled x40) -> (80, -120) -->
        <line x1="0" y1="0" x2="77" y2="-115" stroke="#4da6ff" stroke-width="3" marker-end="url(#arrowZ1)" />
        <circle cx="80" cy="-120" r="6" fill="#4da6ff" filter="url(#glow)" />
        <text x="95" y="-125" fill="#4da6ff" font-family="monospace" font-size="18" font-weight="bold">z = 2 + 3i</text>

        <!-- Mirror Reflection Line -->
        <line x1="80" y1="-120" x2="80" y2="120" stroke="#aaaaaa" stroke-width="2" stroke-dasharray="6 6" />

        <!-- Conjugate z_bar = 2 - 3i (Scaled x40) -> (80, 120) -->
        <line x1="0" y1="0" x2="77" y2="115" stroke="#ff4d4d" stroke-width="3" marker-end="url(#arrowConj)" />
        <circle cx="80" cy="120" r="6" fill="#ff4d4d" filter="url(#glow)" />
        <text x="95" y="135" fill="#ff4d4d" font-family="monospace" font-size="18" font-weight="bold">z (bar) = 2 -
            3i</text>
    </g>

    <!-- Explanation Texts -->
    <rect x="50" y="420" width="300" height="50" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
    <text x="200" y="450" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">실점은 실수끼리, 허수는 허수끼리
        합체!</text>

    <rect x="450" y="420" width="300" height="50" rx="10" fill="#2b1111" stroke="#ff4d4d" stroke-width="2" />
    <text x="600" y="450" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">허수 부호만 반대로
        (데칼코마니)</text>

</svg>