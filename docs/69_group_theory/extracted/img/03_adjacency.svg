<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">배열의 이웃 조건 제어 (Adjacency Control)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"강제 결합(Binding) 과
        강제 분리(Slotting) 알고리즘"</text>

    <!-- Left Side: Grouping (Binding) -->
    <g transform="translate(60, 150)">
        <rect x="0" y="0" width="370" height="280" rx="15" fill="#1b1122" stroke="#ff00ff" stroke-width="3" />
        <text x="185" y="30" fill="#ff00ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">1. 본드 결합 (무조건 이웃하라)</text>
        <text x="185" y="55" fill="#aaaaaa" font-family="monospace" font-size="14" text-anchor="middle">절친 A, B, C 는 무조건
            붙어 다녀야 함</text>

        <!-- The Box (Giant Acorn) -->
        <rect x="40" y="80" width="160" height="70" rx="15" fill="#330033" stroke="#ff00ff" stroke-width="2"
            stroke-dasharray="8 4" />
        <circle cx="80" cy="115" r="15" fill="#ff5555" />
        <text x="80" y="120" fill="#fff" font-weight="bold" text-anchor="middle">A</text>
        <circle cx="120" cy="115" r="15" fill="#ff5555" />
        <text x="120" y="120" fill="#fff" font-weight="bold" text-anchor="middle">B</text>
        <circle cx="160" cy="115" r="15" fill="#ff5555" />
        <text x="160" y="120" fill="#fff" font-weight="bold" text-anchor="middle">C</text>
        <text x="100" y="170" fill="#ff00ff" font-size="14" font-weight="bold" text-anchor="middle">박스 내부 폭동 (3!)</text>

        <!-- Regular folks -->
        <circle cx="230" cy="115" r="15" fill="#555" />
        <text x="230" y="120" fill="#fff" font-weight="bold" text-anchor="middle">D</text>
        <circle cx="280" cy="115" r="15" fill="#555" />
        <text x="280" y="120" fill="#fff" font-weight="bold" text-anchor="middle">E</text>
        <circle cx="330" cy="115" r="15" fill="#555" />
        <text x="330" y="120" fill="#fff" font-weight="bold" text-anchor="middle">F</text>

        <!-- Calculation Box -->
        <rect x="20" y="200" width="330" height="60" rx="5" fill="#000" stroke="#ff00ff" />
        <text x="185" y="225" fill="#ffffff" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">마치 4명인 것처럼 세우기 (4!)</text>
        <text x="185" y="245" fill="#ffff00" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">총 계산: 4! × 3! = 144 가지</text>
    </g>

    <!-- Right Side: Isolating (Slotting) -->
    <g transform="translate(470, 150)">
        <rect x="0" y="0" width="370" height="280" rx="15" fill="#001122" stroke="#4da6ff" stroke-width="3" />
        <text x="185" y="30" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">2. 빈틈 저격 (무조건 떨어져라)</text>
        <text x="185" y="55" fill="#aaaaaa" font-family="monospace" font-size="14" text-anchor="middle">앙숙 B와 C는 폭탄임. 절대
            근처에 두지 말 것.</text>

        <!-- Step 1: Base formulation -->
        <text x="185" y="85" fill="#4da6ff" font-size="14" font-weight="bold" text-anchor="middle">Step 1: 착한
            애들(A,D,E,F) 먼저 세팅 (4!)</text>

        <g transform="translate(30, 110)">
            <!-- V slots -->
            <polygon points="10,0 20,-15 30,0" fill="#4da6ff" opacity="0.6" />
            <circle cx="50" cy="-5" r="15" fill="#555" />
            <text x="50" y="0" fill="#fff" font-weight="bold" text-anchor="middle">A</text>

            <polygon points="70,0 80,-15 90,0" fill="#4da6ff" opacity="0.6" />
            <circle cx="110" cy="-5" r="15" fill="#555" />
            <text x="110" y="0" fill="#fff" font-weight="bold" text-anchor="middle">D</text>

            <polygon points="130,0 140,-15 150,0" fill="#4da6ff" opacity="0.6" />
            <circle cx="170" cy="-5" r="15" fill="#555" />
            <text x="170" y="0" fill="#fff" font-weight="bold" text-anchor="middle">E</text>

            <polygon points="190,0 200,-15 210,0" fill="#4da6ff" opacity="0.6" />
            <circle cx="230" cy="-5" r="15" fill="#555" />
            <text x="230" y="0" fill="#fff" font-weight="bold" text-anchor="middle">F</text>

            <polygon points="250,0 260,-15 270,0" fill="#4da6ff" opacity="0.6" />
        </g>

        <!-- Enemies -->
        <text x="185" y="150" fill="#ff5555" font-size="14" font-weight="bold" text-anchor="middle">Step 2: 생성된 5개의
            빈자리(▼) 중 2칸 골라서 폭탄 꽂기 (₅P₂)</text>

        <!-- Calculation Box -->
        <rect x="20" y="200" width="330" height="60" rx="5" fill="#000" stroke="#4da6ff" />
        <text x="185" y="225" fill="#ffffff" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">기반 세우기(4!) × 권한 꽂아넣기(₅P₂)</text>
        <text x="185" y="245" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">총 계산: 4! × ₅P₂ = 480 가지</text>
    </g>

    <!-- Big Alert Bottom -->
    <rect x="100" y="470" width="700" height="80" rx="10" fill="#221100" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="500" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        두 알고리즘 모두 파이썬의 강제 필터링 <tspan fill="#ffff00" font-weight="bold">If "묶음" in Array:</tspan> 혹은 <tspan
            fill="#ffff00" font-weight="bold">If "BC" not in Array:</tspan>
    </text>
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        로직과 완벽하게 동일한 구조를 가지는 메모리 데이터 다루기 기술입니다.
    </text>
</svg>