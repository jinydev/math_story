<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .div-line {
                fill: none;
                stroke: #30363d;
                stroke-width: 4;
                stroke-linecap: round;
            }

            .arrow {
                fill: none;
                stroke: #00ffff;
                stroke-width: 3;
                marker-end: url(#arrowhead);
            }

            .arrow-read {
                fill: none;
                stroke: #ff6464;
                stroke-width: 4;
                stroke-dasharray: 8, 8;
                marker-end: url(#arrowread);
                animation: flow 2s linear infinite reverse;
            }

            @keyframes flow {
                to {
                    stroke-dashoffset: 32;
                }
            }

            .num {
                fill: #ffffff;
                font-size: 32px;
            }

            .base {
                fill: #00ffff;
                font-size: 32px;
            }

            .rem {
                fill: #ff6464;
                font-size: 32px;
                filter: drop-shadow(0 0 5px rgba(255, 100, 100, 0.5));
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 15px;
                text-anchor: middle;
            }

            .box {
                fill: #161b22;
                stroke: #30363d;
                stroke-width: 2;
                rx: 8;
            }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#00ffff" />
        </marker>
        <marker id="arrowread" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ff6464" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="40" class="title">10진수를 2진수로 변환하는 '폭포수 나눗셈' 작전</text>
    <text x="400" y="70" class="desc">13을 2진법으로 바꿀 때, 몫이 0이 될 때까지 나누고 '나머지(찌꺼기)'를 역순으로 집어올린다</text>

    <!-- Center calculations -->
    <g transform="translate(300, 120)">

        <!-- Step 1: 13 / 2 -->
        <text x="0" y="0" class="base">2</text>
        <path d="M 20 -25 L 20 10 L 100 10" class="div-line" />
        <text x="35" y="0" class="num">13</text>
        <text x="120" y="0" fill="#888" font-size="20">... 나머지</text>
        <text x="230" y="0" class="rem">1</text>

        <!-- Step 2: 6 / 2 -->
        <text x="0" y="60" class="base">2</text>
        <path d="M 20 35 L 20 70 L 100 70" class="div-line" />
        <text x="50" y="60" class="num">6</text>
        <text x="120" y="60" fill="#888" font-size="20">... 나머지</text>
        <text x="230" y="60" class="rem">0</text>

        <!-- Step 3: 3 / 2 -->
        <text x="0" y="120" class="base">2</text>
        <path d="M 20 95 L 20 130 L 100 130" class="div-line" />
        <text x="50" y="120" class="num">3</text>
        <text x="120" y="120" fill="#888" font-size="20">... 나머지</text>
        <text x="230" y="120" class="rem">1</text>

        <!-- Step 4: 1 / 2 -->
        <text x="50" y="180" class="num">1</text>
        <text x="120" y="180" fill="#888" font-size="20">... 최상단 몫</text>
        <text x="230" y="180" class="rem">1</text>

        <!-- Reverse Reading Array Arrow -->
        <path d="M 270 180 L 320 180 L 320 -10 L 270 -10" class="arrow-read" />
        <text x="340" y="100" fill="#ff6464" font-size="16">마지막 몫부터</text>
        <text x="340" y="120" fill="#ff6464" font-size="16">거꾸로 주워담기</text>

    </g>

    <!-- Final Result Box -->
    <g transform="translate(150, 360)">
        <rect width="500" height="80" class="box" />
        <text x="250" y="35" fill="#ffffff" font-size="20" text-anchor="middle">10진수 13 (Decimal)</text>
        <text x="250" y="65" fill="#00ffff" font-size="24" text-anchor="middle">= 1101 (Binary 2진수)</text>
    </g>
</svg>