<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .tile-x2 {
                fill: #0050aa;
                stroke: #00ffff;
                stroke-width: 2;
            }

            .tile-x {
                fill: #008000;
                stroke: #00ff00;
                stroke-width: 2;
            }

            .tile-1 {
                fill: #aa8000;
                stroke: #ffff00;
                stroke-width: 2;
            }

            .label-lg {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
                alignment-baseline: middle;
            }

            .label-sm {
                fill: #ffffff;
                font-size: 16px;
                text-anchor: middle;
                alignment-baseline: middle;
            }

            .arrow {
                fill: none;
                stroke: #ffffff;
                stroke-width: 4;
                marker-end: url(#arrowhead);
            }

            .math-eq {
                fill: #ffffff;
                font-size: 32px;
                text-anchor: middle;
            }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="450" y="40" class="title">기하학 테트리스 조립: 완전제곱식 (Completing the Square)</text>
    <text x="450" y="65" class="desc">식이 징그러워 인수분해가 안된다면 억지로 정사각형 면적으로 꿰어 맞춘다!</text>

    <!-- Left Side: Scattered Parts (x^2 + 4x + 4) -->
    <g transform="translate(150, 200)">
        <!-- x^2 tile (100x100) -->
        <rect x="-80" y="-50" width="100" height="100" class="tile-x2" />
        <text x="-30" y="0" class="label-lg">x²</text>

        <!-- four x tiles (20x100) -->
        <rect x="40" y="-50" width="20" height="100" class="tile-x" />
        <text x="50" y="0" class="label-sm" transform="rotate(-90 50 0)">x</text>

        <rect x="70" y="-50" width="20" height="100" class="tile-x" />
        <text x="80" y="0" class="label-sm" transform="rotate(-90 80 0)">x</text>

        <!-- horizontal x tiles -->
        <rect x="-80" y="70" width="100" height="20" class="tile-x" />
        <text x="-30" y="80" class="label-sm">x</text>

        <rect x="-80" y="100" width="100" height="20" class="tile-x" />
        <text x="-30" y="110" class="label-sm">x</text>

        <!-- four 1 tiles (20x20) -->
        <rect x="50" y="70" width="20" height="20" class="tile-1" />
        <rect x="80" y="70" width="20" height="20" class="tile-1" />
        <rect x="50" y="100" width="20" height="20" class="tile-1" />
        <rect x="80" y="100" width="20" height="20" class="tile-1" />

        <text x="0" y="160" class="math-eq" font-size="28">x² + 4x <tspan fill="#ffff00">+ 4</tspan></text>
    </g>

    <!-- Transform Arrow -->
    <path d="M 320 200 Q 400 200 480 200" class="arrow" />
    <text x="400" y="180" fill="#ffff00" font-size="18" text-anchor="middle">퍼즐 조립!</text>
    <text x="400" y="230" fill="#00ffff" font-size="14" text-anchor="middle">가운데(4) 반의 제곱(+4) 추가</text>

    <!-- Right Side: Perfect Square -->
    <g transform="translate(650, 200)">
        <!-- Assembled Square (140x140) -->

        <!-- Core x^2 -->
        <rect x="-70" y="-70" width="100" height="100" class="tile-x2" />
        <!-- 2 vertical x -->
        <rect x="30" y="-70" width="20" height="100" class="tile-x" />
        <rect x="50" y="-70" width="20" height="100" class="tile-x" />
        <!-- 2 horizontal x -->
        <rect x="-70" y="30" width="100" height="20" class="tile-x" />
        <rect x="-70" y="50" width="100" height="20" class="tile-x" />
        <!-- 4 ones block -->
        <rect x="30" y="30" width="20" height="20" class="tile-1" />
        <rect x="50" y="30" width="20" height="20" class="tile-1" />
        <rect x="30" y="50" width="20" height="20" class="tile-1" />
        <rect x="50" y="50" width="20" height="20" class="tile-1" />

        <!-- Dimension Brackets -->
        <!-- Top bracket for (x+2) -->
        <path d="M -70 -80 L -70 -90 L 70 -90 L 70 -80" fill="none" stroke="#fff" stroke-width="2" />
        <text x="0" y="-100" class="label-sm" font-size="20">x + 2</text>

        <!-- Left bracket for (x+2) -->
        <path d="M -80 -70 L -90 -70 L -90 70 L -80 70" fill="none" stroke="#fff" stroke-width="2" />
        <text x="-120" y="0" class="label-sm" font-size="20" transform="rotate(-90 -120 0)">x + 2</text>

        <text x="0" y="160" class="math-eq" font-size="28" fill="#00ff00">= (x + 2)²</text>
    </g>

</svg>