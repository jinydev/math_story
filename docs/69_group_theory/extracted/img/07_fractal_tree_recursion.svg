<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .stem-l3 {
                stroke: #00ffff;
                stroke-width: 6;
                stroke-linecap: round;
            }

            .stem-l2 {
                stroke: #ffaa64;
                stroke-width: 4;
                stroke-linecap: round;
            }

            .stem-l1 {
                stroke: #64ff64;
                stroke-width: 2;
                stroke-linecap: round;
            }

            .title {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .label {
                fill: #ffffff;
                font-size: 14px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="40" class="title">프랙탈 트리(Fractal Tree): 재귀 알고리즘의 무한 자기 닮음</text>
    <text x="400" y="65" class="desc">draw_fractal_tree() 함수가 절반 크기로 2번씩 자신을 다시 호출하며 성장</text>

    <!-- Level 3 Stem (Root) -->
    <line x1="400" y1="450" x2="400" y2="300" class="stem-l3" />
    <text x="450" y="380" class="label" fill="#00ffff">Level 3 (Main)</text>

    <!-- Level 2 Branches -->
    <line x1="400" y1="300" x2="300" y2="200" class="stem-l2" />
    <line x1="400" y1="300" x2="500" y2="200" class="stem-l2" />
    <text x="310" y="250" class="label" fill="#ffaa64">Level 2</text>
    <text x="490" y="250" class="label" fill="#ffaa64">Level 2</text>

    <!-- Level 1 Branches (Left sub-tree) -->
    <line x1="300" y1="200" x2="230" y2="130" class="stem-l1" />
    <line x1="300" y1="200" x2="350" y2="120" class="stem-l1" />

    <!-- Level 1 Branches (Right sub-tree) -->
    <line x1="500" y1="200" x2="450" y2="120" class="stem-l1" />
    <line x1="500" y1="200" x2="570" y2="130" class="stem-l1" />

    <text x="210" y="120" class="label" fill="#64ff64">Level 1</text>
    <text x="590" y="120" class="label" fill="#64ff64">Level 1</text>

    <!-- Recursion logic overlay box -->
    <rect x="50" y="100" width="220" height="80" fill="#161b22" stroke="#30363d" stroke-width="2" rx="5" />
    <text x="160" y="125" fill="#ffffff" font-style="italic" font-size="14" text-anchor="middle">재귀적 분열 호출</text>
    <text x="160" y="145" fill="#64ff64" font-size="12" text-anchor="middle">func(len/2, L-1) [좌]</text>
    <text x="160" y="165" fill="#ffaa64" font-size="12" text-anchor="middle">func(len/2, L-1) [우]</text>

</svg>