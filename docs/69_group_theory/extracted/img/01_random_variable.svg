<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">현실 세계 거름망: 확률변수 (Random Variable X)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"모호한 현실의 언어를 컴퓨터가
        인식할 수 있는 깔끔한 정수형(int) 포지션으로 변환한다"</text>

    <!-- Left: Real World Reality -->
    <g transform="translate(100, 150)">
        <rect x="0" y="0" width="250" height="250" rx="10" fill="#221111" stroke="#ff4d4d" stroke-width="2" />
        <text x="125" y="40" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">현실 세계 (자연어)</text>

        <text x="125" y="90" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">"동전 3개를 던졌을
            때"</text>
        <text x="125" y="120" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">"앞면이 다 나올
            사건"</text>
        <text x="125" y="150" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">"앞면이 하나도 없을
            사건"</text>
        <text x="125" y="180" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">"앞면이 1개, 뒷면 2개
            사건..."</text>

        <text x="125" y="220" fill="#aaaaaa" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">컴퓨터: "무슨 소리야? 에러!"</text>
    </g>

    <!-- Middle: Random Variable X Mapping Pipeline -->
    <g transform="translate(400, 200)">
        <!-- Funnel / Pipeline -->
        <path d="M -30 0 L 70 0 L 50 150 L -10 150 Z" fill="#223344" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />

        <!-- Arrows -->
        <path d="M -50 75 L -35 75" stroke="#ff4d4d" stroke-width="4" marker-end="url(#arrowRed)" />
        <path d="M 75 75 L 90 75" stroke="#00ffcc" stroke-width="4" marker-end="url(#arrowCyan)" />

        <text x="20" y="60" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">함수</text>
        <text x="20" y="90" fill="#00ffcc" font-family="sans-serif" font-size="36" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">X</text>
        <text x="20" y="125" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">(앞면 개수)</text>
    </g>

    <!-- Right: Math World (Integers) -->
    <g transform="translate(550, 150)">
        <rect x="0" y="0" width="250" height="250" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="125" y="40" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">수학 세계 (정수 변환)</text>

        <rect x="50" y="70" width="150" height="30" rx="5" fill="#223344" stroke="#00ffcc" />
        <text x="125" y="90" fill="#ffffff" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">X = 3</text>

        <rect x="50" y="110" width="150" height="30" rx="5" fill="#223344" stroke="#00ffcc" />
        <text x="125" y="130" fill="#ffffff" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">X = 2</text>

        <rect x="50" y="150" width="150" height="30" rx="5" fill="#223344" stroke="#00ffcc" />
        <text x="125" y="170" fill="#ffffff" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">X = 1</text>

        <rect x="50" y="190" width="150" height="30" rx="5" fill="#223344" stroke="#00ffcc" />
        <text x="125" y="210" fill="#ffffff" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">X = 0</text>
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="450" width="600" height="80" rx="10" fill="#2b1133" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="480" fill="#ffaa00" font-family="monospace" font-size="20" font-weight="bold"
        text-anchor="middle">"동전 앞면이 두 번 나올 확률" → P(X = 2)</text>
    <text x="450" y="510" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">확률변수 X는 복잡한 현실의
        결과물들을 숫자로 일대일 매핑해주는 데이터 필터다.</text>

    <defs>
        <marker id="arrowRed" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4d4d" />
        </marker>
        <marker id="arrowCyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
    </defs>
</svg>