<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">좌표의 개수와 자유도: 차원의 진화 (Dimension Evolution)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"점(0D) 에서 공간(3D)
        까지, 숫자의 콤마(,) 가 하나 늘어날 때마다 새로운 우주가 태어난다."</text>

    <!-- 0D - Point -->
    <g transform="translate(100, 180)">
        <rect x="-20" y="0" width="160" height="250" rx="10" fill="#111122" stroke="#555555" stroke-width="2" />
        <text x="60" y="30" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">0D (점)</text>
        <text x="60" y="55" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">이동 불가 / 감금
            상태</text>

        <circle cx="60" cy="140" r="6" fill="#ffffff" filter="url(#glow)" />

        <rect x="0" y="200" width="120" height="30" rx="5" fill="#000" stroke="#555" />
        <text x="60" y="220" fill="#ffffff" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">Data: ()</text>
    </g>

    <!-- 1D - Line -->
    <g transform="translate(280, 180)">
        <rect x="-20" y="0" width="160" height="250" rx="10" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
        <text x="60" y="30" fill="#ff00ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">1D (선)</text>
        <text x="60" y="55" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">좌우 이동 /
            백터(Vector)</text>

        <!-- X Axis -->
        <path d="M 0 140 L 120 140" fill="none" stroke="#ff00ff" stroke-width="3" filter="url(#glow)" />
        <circle cx="60" cy="140" r="6" fill="#ffffff" filter="url(#glow)" />
        <text x="110" y="130" fill="#ff00ff" font-weight="bold">x</text>

        <rect x="0" y="200" width="120" height="30" rx="5" fill="#000" stroke="#ff00ff" />
        <text x="60" y="220" fill="#ff00ff" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">Data: (x)</text>
    </g>

    <!-- 2D - Plane -->
    <g transform="translate(460, 180)">
        <rect x="-20" y="0" width="160" height="250" rx="10" fill="#001a11" stroke="#00ffcc" stroke-width="2" />
        <text x="60" y="30" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">2D (면)</text>
        <text x="60" y="55" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">상하좌우 /
            행렬(Matrix)</text>

        <!-- X, Y Axes -->
        <path d="M 0 160 L 120 160" fill="none" stroke="#00ffcc" stroke-width="3" filter="url(#glow)" />
        <path d="M 60 200 L 60 80" fill="none" stroke="#00ffcc" stroke-width="3" filter="url(#glow)" />
        <circle cx="60" cy="160" r="6" fill="#ffffff" filter="url(#glow)" />
        <text x="110" y="150" fill="#00ffcc" font-weight="bold">x</text>
        <text x="70" y="90" fill="#00ffcc" font-weight="bold">y</text>

        <!-- Plane grid -->
        <path d="M 0 120 L 120 120 M 20 80 L 20 200 M 100 80 L 100 200" fill="none" stroke="#00ffcc" opacity="0.3" />

        <rect x="0" y="200" width="120" height="30" rx="5" fill="#000" stroke="#00ffcc" />
        <text x="60" y="220" fill="#00ffcc" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">Data: (x, y)</text>
    </g>

    <!-- 3D - Space -->
    <g transform="translate(640, 180)">
        <rect x="-20" y="0" width="160" height="250" rx="10" fill="#1b1100" stroke="#ffff00" stroke-width="2" />
        <text x="60" y="30" fill="#ffff00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">3D (공간)</text>
        <text x="60" y="55" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">부피 고도 /
            텐서(Tensor)</text>

        <!-- X, Y, Z Axes -->
        <path d="M 30 180 L 110 180" fill="none" stroke="#ffff00" stroke-width="3" filter="url(#glow)" /> <!-- X -->
        <path d="M 70 200 L 70 90" fill="none" stroke="#ffff00" stroke-width="3" filter="url(#glow)" /> <!-- Z -->
        <path d="M 40 210 L 100 150" fill="none" stroke="#ffff00" stroke-width="3" filter="url(#glow)" />
        <!-- Y (Depth) -->

        <circle cx="70" cy="180" r="6" fill="#ffffff" filter="url(#glow)" />
        <text x="105" y="170" fill="#ffff00" font-weight="bold">x</text>
        <text x="80" y="100" fill="#ffff00" font-weight="bold">z</text>
        <text x="100" y="145" fill="#ffff00" font-weight="bold">y</text>

        <!-- Basic Cube shape lines -->
        <path d="M 50 160 L 90 160 L 90 120 L 50 120 Z" fill="none" stroke="#ffff00" opacity="0.4" />
        <path d="M 40 170 L 80 170 L 80 130 L 40 130 Z" fill="none" stroke="#ffff00" stroke-dasharray="2 2"
            opacity="0.4" />
        <path d="M 50 160 L 40 170 M 90 160 L 80 170 M 90 120 L 80 130 M 50 120 L 40 130" fill="none" stroke="#ffff00"
            opacity="0.4" />

        <rect x="0" y="200" width="120" height="30" rx="5" fill="#000" stroke="#ffff00" />
        <text x="60" y="220" fill="#ffff00" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">Data: (x, y, z)</text>
    </g>

    <!-- Transitions -->
    <text x="250" y="300" fill="#ffffff" font-size="24" font-weight="bold" filter="url(#glow)">→</text>
    <text x="430" y="300" fill="#ffffff" font-size="24" font-weight="bold" filter="url(#glow)">→</text>
    <text x="610" y="300" fill="#ffffff" font-size="24" font-weight="bold" filter="url(#glow)">→</text>

    <!-- Big Alert Bottom -->
    <rect x="100" y="470" width="700" height="80" rx="10" fill="#0d1b2a" stroke="#4da6ff" stroke-width="2" />
    <text x="450" y="505" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        차원(Dimension) 이란 마법의 성질이 아니라 단순히 <tspan fill="#4da6ff" font-weight="bold">"좌표(숫자) 의 묶음 개수"</tspan> 를 의미한다.
    </text>
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        프로그래밍에서 배열 데이터 [ X, Y, Z, T, W ... ] 처럼 열이 길어질수록 5차원, 100차원으로 무한히 진화한다.
    </text>
</svg>