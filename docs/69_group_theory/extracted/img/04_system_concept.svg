<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .box {
                fill: none;
                stroke: #30363d;
                stroke-width: 2;
                rx: 10;
                ry: 10;
            }

            .cow {
                fill: #ffaa64;
            }

            .sheep {
                fill: #64ff64;
            }

            .coin {
                fill: #ffff00;
            }

            .op {
                fill: #ffffff;
                font-size: 30px;
                text-anchor: middle;
            }

            .icon-text {
                font-size: 40px;
                text-anchor: middle;
                alignment-baseline: middle;
            }

            .label-text {
                font-size: 20px;
                font-weight: normal;
                fill: #ffffff;
            }

            .var-text {
                font-size: 30px;
                font-weight: bold;
                text-anchor: middle;
            }

            .brace {
                fill: none;
                stroke: #00ffff;
                stroke-width: 4;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="450" y="40" class="title">연립방정식 (System of Equations): 2개의 미지수 = 2개의 단서</text>
    <text x="450" y="65" class="desc">미지수가 x, y 2개라면 그것들을 동시에 만족시키는 2세트의 조건식이 묶여야만 정체를 밝힐 수 있다.</text>

    <!-- Main System Wrapper -->
    <rect x="50" y="110" width="800" height="280" class="box" stroke="#00ffff" stroke-dasharray="6,4"
        fill="rgba(0, 255, 255, 0.05)" />

    <!-- The large brace { -->
    <path d="M 80 140 Q 60 140 60 190 T 40 250 Q 60 250 60 310 T 80 360" class="brace" />
    <text x="30" y="250" fill="#00ffff" font-size="20" transform="rotate(-90 30 250)" text-anchor="middle">연.립
        (System)</text>

    <!-- Equation 1: 2 Cows + 5 Sheep = 100 -->
    <g transform="translate(150, 170)">
        <!-- Cows -->
        <text x="0" y="0" class="icon-text cow">🐮🐮</text>
        <text x="0" y="40" class="var-text cow">2x</text>

        <text x="80" y="0" class="op">+</text>

        <!-- Sheep -->
        <text x="210" y="0" class="icon-text sheep">🐑🐑🐑🐑🐑</text>
        <text x="210" y="40" class="var-text sheep">5y</text>

        <text x="350" y="0" class="op">=</text>

        <!-- Coins -->
        <text x="450" y="0" class="icon-text coin">🪙×100</text>
        <text x="450" y="40" class="var-text coin">100</text>

        <text x="580" y="15" class="label-text" fill="#ff6464">... (식 1)</text>
    </g>

    <!-- Equation 2: 3 Cows + 2 Sheep = 95 -->
    <g transform="translate(150, 310)">
        <!-- Cows -->
        <text x="0" y="0" class="icon-text cow">🐮🐮🐮</text>
        <text x="0" y="40" class="var-text cow">3x</text>

        <text x="80" y="0" class="op">+</text>

        <!-- Sheep -->
        <text x="210" y="0" class="icon-text sheep">🐑🐑</text>
        <text x="210" y="40" class="var-text sheep">2y</text>

        <text x="350" y="0" class="op">=</text>

        <!-- Coins -->
        <text x="450" y="0" class="icon-text coin">🪙×95</text>
        <text x="450" y="40" class="var-text coin">95</text>

        <text x="580" y="15" class="label-text" fill="#ff6464">... (식 2)</text>
    </g>

</svg>