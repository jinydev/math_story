<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Left: Exploding Infinity Divergence -->
    <g transform="translate(50, 50)">
        <rect x="0" y="0" width="380" height="480" rx="15" fill="#1b1111" stroke="#ff0000" stroke-width="4"
            filter="url(#glow)" />
        <text x="190" y="50" fill="#ff0000" font-family="sans-serif" font-size="26" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">발산 폭파 (Divergence)</text>
        <text x="190" y="80" fill="#ff5555" font-family="sans-serif" font-size="16" text-anchor="middle">우주를 뚫거나 지하 멘틀
            밑으로 폭락</text>

        <!-- Formula -->
        <g transform="translate(190, 140)">
            <rect x="-100" y="-35" width="200" height="50" rx="8" fill="#331111" stroke="#ff5555" stroke-width="2" />
            <text x="0" y="0" fill="#ffffff" font-family="serif" font-size="30" font-weight="bold" text-anchor="middle">
                lim ( <tspan fill="#ffff00">n²</tspan> ) = <tspan fill="#ff0000" filter="url(#glow)">+∞</tspan>
            </text>
        </g>

        <!-- Explosion Graph Lines going straight up -->
        <g transform="translate(50, 360)">
            <line x1="0" y1="0" x2="280" y2="0" stroke="#555" stroke-width="2" /> <!-- X axis -->
            <line x1="0" y1="0" x2="0" y2="-180" stroke="#555" stroke-width="2" /> <!-- Y axis -->

            <!-- Explosion Curve -->
            <path d="M 0 0 Q 150 -10 250 -180" fill="none" stroke="#ff0000" stroke-width="6" stroke-dasharray="10 5"
                marker-end="url(#arrow_r)" />

            <circle cx="50" cy="-2" r="5" fill="#ffaa00" />
            <circle cx="100" cy="-8" r="6" fill="#ffaa00" />
            <circle cx="150" cy="-25" r="7" fill="#ff5555" />
            <circle cx="200" cy="-60" r="9" fill="#ff5555" />

            <!-- Error popup -->
            <g transform="translate(140, -130)">
                <polygon points="0,0 20,-20 100,-20 100,20 20,20" fill="#ff0000" opacity="0.8" />
                <text x="60" y="6" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
                    text-anchor="middle" filter="url(#glow)">ERROR!</text>
            </g>
        </g>

        <text x="190" y="440" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">엔진 출력이 한계 돌파
            에러로 시스템 다운!</text>
    </g>

    <!-- VS Text -->
    <text x="450" y="290" fill="#ffffff" font-family="serif" font-size="40" font-weight="bold" font-style="italic"
        text-anchor="middle" filter="url(#glow)">VS</text>

    <!-- Right: Converging to Zero -->
    <g transform="translate(470, 50)">
        <rect x="0" y="0" width="380" height="480" rx="15" fill="#111122" stroke="#00ffcc" stroke-width="4"
            filter="url(#glow)" />
        <text x="190" y="50" fill="#00ffcc" font-family="sans-serif" font-size="26" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">수렴 록다운 (Convergence)</text>
        <text x="190" y="80" fill="#4da6ff" font-family="sans-serif" font-size="16" text-anchor="middle">분모 깡패 마법: 0 코인
            먼지 되기!</text>

        <!-- Formula -->
        <g transform="translate(190, 140)">
            <rect x="-100" y="-35" width="200" height="50" rx="8" fill="#112233" stroke="#4da6ff" stroke-width="2" />
            <text x="-40" y="0" fill="#ffffff" font-family="serif" font-size="30" font-weight="bold"
                text-anchor="middle">
                lim
            </text>
            <text x="0" y="-8" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold">1</text>
            <path d="M -10 0 L 10 0" stroke="#ffffff" stroke-width="2" />
            <text x="0" y="20" fill="#ffaa00" font-family="monospace" font-size="20" font-weight="bold">n</text>
            <text x="50" y="0" fill="#ffffff" font-family="serif" font-size="30" font-weight="bold"
                text-anchor="middle">
                = <tspan fill="#00ffcc" filter="url(#glow)">0</tspan>
            </text>
        </g>

        <!-- Convergence Graph Lines coming down to X axis -->
        <g transform="translate(50, 360)">
            <line x1="0" y1="0" x2="280" y2="0" stroke="#00ffcc" stroke-width="3" filter="url(#glow)" />
            <!-- X axis acts as Limit L=0 -->
            <line x1="0" y1="0" x2="0" y2="-180" stroke="#555" stroke-width="2" /> <!-- Y axis -->

            <!-- Curve Falling to zero -->
            <path d="M 10 -180 Q 50 -10 250 -2" fill="none" stroke="#4da6ff" stroke-width="6"
                marker-end="url(#arrow_c)" />
            <circle cx="25" cy="-70" r="5" fill="#00ffcc" />
            <circle cx="50" cy="-35" r="4" fill="#00ffcc" />
            <circle cx="100" cy="-17" r="3" fill="#00ffcc" />
            <circle cx="200" cy="-4" r="2" fill="#00ffcc" />

            <!-- Zero convergence label -->
            <g transform="translate(200, -30)">
                <polygon points="0,0 15,15 70,15 70,-15 15,-15" fill="#0d2a2a" stroke="#00ffcc" stroke-width="1" />
                <text x="42" y="5" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
                    text-anchor="middle">값: 0</text>
            </g>
        </g>

        <text x="190" y="440" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">분모 n 이 커질수록 전체
            크기는 0 먼지로 얼어붙음!</text>
    </g>

    <defs>
        <marker id="arrow_r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ff0000" />
        </marker>
        <marker id="arrow_c" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#00ffcc" />
        </marker>
    </defs>

    <rect x="150" y="550" width="600" height="30" rx="5" fill="#111" stroke="#555" stroke-width="1" />
    <text x="450" y="570" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">
        분모에 무한대 폭탄(n)이 장착되면, 그 거대한 분수 덩어리 시스템은 <tspan fill="#00ffcc" font-weight="bold">무조건 0으로 찌그러집니다.</tspan>
    </text>
</svg>