<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">순열 파이프라인 (Permutation: 5P3)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"뽑혀 나온 순서의 자리 배치에
        따라 세계관이 완전히 뒤바뀐다!"</text>

    <!-- Total Pool Area -->
    <g transform="translate(100, 150)">
        <rect x="0" y="0" width="700" height="80" rx="10" fill="#221133" stroke="#ff00ff" stroke-width="2" />
        <text x="350" y="30" fill="#ff00ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">초기 후보 인벤토리 대기실 (총 5명)</text>

        <!-- Avatars -->
        <g transform="translate(100, 50)">
            <circle cx="0" cy="0" r="15" fill="#4da6ff" />
            <text x="0" y="5" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
                text-anchor="middle">A</text>

            <circle cx="100" cy="0" r="15" fill="#4da6ff" />
            <text x="100" y="5" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
                text-anchor="middle">B</text>

            <circle cx="200" cy="0" r="15" fill="#4da6ff" />
            <text x="200" y="5" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
                text-anchor="middle">C</text>

            <circle cx="300" cy="0" r="15" fill="#4da6ff" />
            <text x="300" y="5" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
                text-anchor="middle">D</text>

            <circle cx="400" cy="0" r="15" fill="#4da6ff" />
            <text x="400" y="5" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
                text-anchor="middle">E</text>
        </g>
    </g>

    <!-- Pipeline Slots -->
    <g transform="translate(150, 300)">
        <!-- Slot 1 -->
        <rect x="0" y="0" width="150" height="150" fill="#112233" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <rect x="0" y="0" width="150" height="40" fill="#00ffcc" />
        <text x="75" y="25" fill="#112233" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">1등 슬롯</text>
        <text x="75" y="80" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">처음엔 빈자리</text>
        <text x="75" y="110" fill="#00ffcc" font-family="sans-serif" font-size="30" font-weight="bold"
            text-anchor="middle">5가지</text>
        <text x="75" y="135" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">후보 생존</text>

        <text x="185" y="75" fill="#ffffff" font-family="sans-serif" font-size="40" font-weight="bold"
            text-anchor="middle">×</text>

        <!-- Slot 2 -->
        <rect x="220" y="0" width="150" height="150" fill="#221111" stroke="#ffaa00" stroke-width="3"
            filter="url(#glow)" />
        <rect x="220" y="0" width="150" height="40" fill="#ffaa00" />
        <text x="295" y="25" fill="#221111" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">2등 슬롯</text>
        <text x="295" y="80" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">1명 증발,
            남은건?</text>
        <text x="295" y="110" fill="#ffaa00" font-family="sans-serif" font-size="30" font-weight="bold"
            text-anchor="middle">4가지</text>
        <text x="295" y="135" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">후보 생존</text>

        <text x="405" y="75" fill="#ffffff" font-family="sans-serif" font-size="40" font-weight="bold"
            text-anchor="middle">×</text>

        <!-- Slot 3 -->
        <rect x="440" y="0" width="150" height="150" fill="#331111" stroke="#ff4d4d" stroke-width="3"
            filter="url(#glow)" />
        <rect x="440" y="0" width="150" height="40" fill="#ff4d4d" />
        <text x="515" y="25" fill="#331111" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">3등 슬롯</text>
        <text x="515" y="80" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">앞에 2명
            날아감</text>
        <text x="515" y="110" fill="#ff4d4d" font-family="sans-serif" font-size="30" font-weight="bold"
            text-anchor="middle">3가지</text>
        <text x="515" y="135" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">후보 생존</text>
    </g>

    <!-- Result Logic -->
    <rect x="270" y="470" width="360" height="60" rx="10" fill="#111122" stroke="#ffffff" stroke-width="2" />
    <text x="450" y="505" fill="#ffffff" font-family="monospace" font-size="24" font-weight="bold"
        text-anchor="middle">5P3 = 5 × 4 × 3 = 60가지</text>

    <!-- Explanation Bottom -->
    <rect x="150" y="550" width="600" height="30" rx="5" fill="#221133" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="570" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">앞 사건이 발생할 때마다, 뒷
        사건의 "선택지 풀(Pool)" 이 차감되며 연쇄되는 기적의 곱의 법칙</text>

</svg>