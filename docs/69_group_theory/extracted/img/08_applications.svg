<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">거대한 폭발을 통제하다: 로그 스케일 (Log Scale)</text>

    <!-- Left: Linear Scale (Exploding) -->
    <g transform="translate(250, 320)">
        <rect x="-180" y="-200" width="360" height="340" rx="15" fill="#112233" stroke="#ff4d4d" stroke-width="3" />
        <text x="0" y="-160" fill="#ff4d4d" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">1. 일반 차트 (Linear)</text>

        <!-- Axes -->
        <line x1="-120" y1="90" x2="120" y2="90" stroke="#777777" stroke-width="2" />
        <line x1="-120" y1="90" x2="-120" y2="-120" stroke="#777777" stroke-width="2" />

        <text x="-135" y="-110" fill="#aaaaaa" font-family="sans-serif" font-size="14">10억</text>
        <text x="-135" y="0" fill="#aaaaaa" font-family="sans-serif" font-size="14">5억</text>
        <text x="-135" y="90" fill="#aaaaaa" font-family="sans-serif" font-size="14">0</text>

        <!-- Exponential Curve breaking out -->
        <path d="M -120 90 Q -40 85 0 0 T 60 -150 T 100 -280" fill="none" stroke="#ff4d4d" stroke-width="5"
            filter="url(#glow)" />
        <polygon points="100,-280 95,-265 105,-265" fill="#ff4d4d" />

        <text x="120" y="110" fill="#aaaaaa" font-family="sans-serif" font-size="14">Days</text>

        <text x="10" y="125" fill="#ff4d4d" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">"모니터 천장을 뚫고 가버림"</text>
    </g>

    <!-- Right: Log Scale (Controlled) -->
    <g transform="translate(650, 320)">
        <rect x="-180" y="-200" width="360" height="340" rx="15" fill="#113322" stroke="#00ffcc" stroke-width="3" />
        <text x="0" y="-160" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">2. 로그 스케일 차트</text>

        <!-- Axes -->
        <line x1="-120" y1="90" x2="120" y2="90" stroke="#777777" stroke-width="2" />
        <line x1="-120" y1="90" x2="-120" y2="-120" stroke="#777777" stroke-width="2" />

        <!-- Y-axis ticks are log scale -->
        <text x="-140" y="-90" fill="#aaaaaa" font-family="monospace" font-size="14">10^9</text>
        <text x="-140" y="-45" fill="#aaaaaa" font-family="monospace" font-size="14">10^6</text>
        <text x="-140" y="0" fill="#aaaaaa" font-family="monospace" font-size="14">10^3</text>
        <text x="-140" y="45" fill="#aaaaaa" font-family="monospace" font-size="14">10^1</text>
        <text x="-140" y="90" fill="#aaaaaa" font-family="monospace" font-size="14">1</text>

        <!-- Straight Line for Exponential growth because it's log scale -->
        <path d="M -120 90 L 80 -100" fill="none" stroke="#00ffcc" stroke-width="5" filter="url(#glow)" />
        <circle cx="80" cy="-100" r="6" fill="#00ffcc" />

        <text x="120" y="110" fill="#aaaaaa" font-family="sans-serif" font-size="14">Days</text>

        <text x="10" y="125" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">"직선으로 변환되어 완벽히 통제됨!"</text>
    </g>

    <!-- Subtitles / Applications -->
    <rect x="150" y="480" width="600" height="90" rx="10" fill="#112233" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="505" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">세상을 지배하는 로그 스케일의
        실무 적용표</text>

    <rect x="200" y="520" width="120" height="30" rx="5" fill="#ff4d4d" />
    <text x="260" y="540" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
        text-anchor="middle">지진 (리히터 M)</text>

    <rect x="350" y="520" width="120" height="30" rx="5" fill="#ffaa00" />
    <text x="410" y="540" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
        text-anchor="middle">소리 (데시벨 dB)</text>

    <rect x="500" y="520" width="120" height="30" rx="5" fill="#00ffcc" />
    <text x="560" y="540" fill="#111111" font-family="sans-serif" font-size="14" font-weight="bold"
        text-anchor="middle">바이러스 확산</text>

    <rect x="650" y="520" width="120" height="30" rx="5" fill="#4da6ff" />
    <text x="710" y="540" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
        text-anchor="middle">주식/코인 폭등</text>

</svg>