<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .block {
                fill: rgba(255, 255, 255, 0.05);
                stroke: #8b949e;
                stroke-width: 2;
                rx: 5;
            }

            .block-base {
                stroke: #ffaa64;
                stroke-width: 3;
            }

            .block-mid {
                stroke: #64ff64;
                stroke-width: 3;
            }

            .block-top {
                stroke: #00ffff;
                stroke-width: 3;
                filter: drop-shadow(0 0 5px rgba(0, 255, 255, 0.3));
            }

            /* Maya numerals */
            .dot {
                fill: #ffffff;
            }

            .bar {
                fill: none;
                stroke: #ffffff;
                stroke-width: 15;
                stroke-linecap: round;
            }

            .shell {
                fill: none;
                stroke: #888;
                stroke-width: 4;
                stroke-dasharray: 4, 4;
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 15px;
                text-anchor: middle;
            }

            .power-text {
                fill: #ff6464;
                font-size: 18px;
                text-anchor: start;
            }

            .calc-text {
                fill: #ffffff;
                font-size: 20px;
                text-anchor: start;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="40" class="title">마야의 20진법 (Vigesimal) 탑 구조 기수법</text>
    <text x="400" y="70" class="desc">가로로 쓰는 현대와 달리, 마야인들은 아래층부터 위로 쌓으며 20의 거듭제곱 파워를 올렸다</text>

    <g transform="translate(150, 100)">

        <!-- Level 3 (Top): 400s place (20^2) -->
        <rect x="0" y="0" width="150" height="80" class="block block-top" />
        <!-- Number 7 (1 bar, 2 dots) -->
        <circle cx="50" cy="25" r="8" class="dot" />
        <circle cx="100" cy="25" r="8" class="dot" />
        <path d="M 30 55 L 120 55" class="bar" />

        <text x="180" y="30" class="power-text">3층 (최상단 부스터): x 20^2 (400)</text>
        <text x="180" y="60" class="calc-text">7 x 400 = 2,800 파워</text>

        <!-- Level 2 (Middle): 20s place (20^1) -->
        <rect x="0" y="100" width="150" height="80" class="block block-mid" />
        <!-- Number 0 (Shell symbol) -->
        <ellipse cx="75" cy="140" rx="30" ry="15" class="shell" />
        <path d="M 60 140 A 15 15 0 0 1 90 140" fill="none" stroke="#888" stroke-width="2" />

        <text x="180" y="130" class="power-text">2층 (중간 부스터): x 20^1 (20)</text>
        <text x="180" y="160" class="calc-text">0 (수냐) x 20 = 0 파워 (빈방 고정)</text>

        <!-- Level 1 (Bottom): 1s place (20^0) -->
        <rect x="0" y="200" width="150" height="80" class="block block-base" />
        <!-- Number 14 (2 bars, 4 dots) -->
        <circle cx="30" cy="225" r="8" class="dot" />
        <circle cx="60" cy="225" r="8" class="dot" />
        <circle cx="90" cy="225" r="8" class="dot" />
        <circle cx="120" cy="225" r="8" class="dot" />
        <path d="M 30 250 L 120 250" class="bar" />
        <path d="M 30 270 L 120 270" class="bar" />

        <text x="180" y="230" class="power-text">1층 (바닥 잔돈): x 20^0 (1)</text>
        <text x="180" y="260" class="calc-text">14 x 1 = 14 파워</text>

        <!-- Total Result -->
        <rect x="-30" y="310" width="560" height="50" fill="#161b22" stroke="#30363d" stroke-width="2" rx="5" />
        <text x="250" y="342" fill="#00ffff" font-size="24" text-anchor="middle">피라미드 탑의 총합 (10진수 복원) = 2,814</text>
    </g>

</svg>