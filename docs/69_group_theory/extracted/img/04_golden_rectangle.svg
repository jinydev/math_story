<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
    </defs>

    <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">황금 사각형 작도 (1 : 1.618)</text>

    <g transform="translate(150, 300)">
        <!-- Step 1: Base Square ABCD (2x2) -> Let's scale 1 unit = 100px -->
        <!-- A(0,0), B(200,0), C(200,-200), D(0,-200) -->
        <rect x="0" y="-200" width="200" height="200" fill="#2d2d44" stroke="#ffffff" stroke-width="3" />
        <text x="-25" y="25" fill="#ffffff" font-family="sans-serif" font-size="20">A</text>
        <text x="210" y="25" fill="#ffffff" font-family="sans-serif" font-size="20">B</text>
        <text x="210" y="-210" fill="#ffffff" font-family="sans-serif" font-size="20">C</text>
        <text x="-25" y="-210" fill="#ffffff" font-family="sans-serif" font-size="20">D</text>

        <!-- Midpoint M -->
        <circle cx="100" cy="0" r="6" fill="#00ffcc" filter="url(#glow)" />
        <text x="90" y="30" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold">M</text>

        <!-- Side lengths 1 and 2 -->
        <text x="50" y="-20" fill="#aaaaaa" font-family="monospace" font-size="18">1</text>
        <text x="220" y="-100" fill="#aaaaaa" font-family="monospace" font-size="18">2</text>

        <!-- Step 3: Diagonal MC (sqrt(5)) -->
        <line x1="100" y1="0" x2="200" y2="-200" stroke="#ffaa00" stroke-width="4" stroke-dasharray="8 4"
            filter="url(#glow)" />
        <text x="120" y="-110" fill="#ffaa00" font-family="monospace" font-size="20" font-weight="bold"
            transform="rotate(-63.4 120 -110)">√5</text>

        <!-- Step 4: Compass Arc down to E -->
        <!-- Radius is sqrt(100^2 + 200^2) = sqrt(50000) = 223.6 -->
        <!-- M is at (100,0). So E is at (323.6, 0) -->
        <path d="M 200 -200 A 223.6 223.6 0 0 1 323.6 0" fill="none" stroke="#00ffcc" stroke-width="3"
            stroke-dasharray="5" marker-end="url(#arrow)" filter="url(#glow)" />

        <!-- Extended base to E -->
        <line x1="200" y1="0" x2="323.6" y2="0" stroke="#ffffff" stroke-width="3" />
        <circle cx="323.6" cy="0" r="6" fill="#00ffcc" />
        <text x="330" y="30" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold">E</text>

        <!-- Complete the Golden Rectangle -->
        <!-- F at (323.6, -200) -->
        <line x1="323.6" y1="0" x2="323.6" y2="-200" stroke="#ff4d4d" stroke-width="3" filter="url(#glow)" />
        <line x1="200" y1="-200" x2="323.6" y2="-200" stroke="#ff4d4d" stroke-width="3" filter="url(#glow)" />

        <!-- Dimensions info -->
        <path d="M 100 50 L 100 65 L 323.6 65 L 323.6 50" fill="none" stroke="#ffaa00" stroke-width="2" />
        <text x="211" y="90" fill="#ffaa00" font-family="monospace" font-size="20">√5</text>

        <path d="M 0 100 L 0 115 L 323.6 115 L 323.6 100" fill="none" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="160" y="145" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold">1 + √5</text>
    </g>

    <!-- Conclusion text -->
    <text x="400" y="480" fill="#ffffff" font-family="sans-serif" font-size="22" text-anchor="middle">
        황금 비율 = 세로(2) : 가로(1+√5) = <tspan fill="#ffaa00" font-weight="bold">1 : 1.618</tspan>
    </text>

</svg>