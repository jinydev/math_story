<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">좌표의 덫: 임의의 대칭 (General Symmetry)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"수직(Perpendicular)
        과 중점(Midpoint) 이라는 두 개의 자물쇠를 풀어 해킹하라."</text>

    <!-- Left Side: General Point Symmetry -->
    <g transform="translate(60, 150)">
        <rect x="-20" y="0" width="370" height="280" rx="15" fill="#1b1122" stroke="#ff00ff" stroke-width="3" />
        <text x="165" y="30" fill="#ff00ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">임의의 점 (a, b) 대칭</text>

        <!-- Origin Frame Concept -->
        <path d="M 0 100 Q 165 50 330 100" fill="none" stroke="#555" stroke-dasharray="4 4" />

        <circle cx="50" cy="180" r="6" fill="#fff" />
        <text x="50" y="165" fill="#fff" font-weight="bold" text-anchor="middle">P(x, y)</text>

        <!-- The Pivot Point M -->
        <circle cx="165" cy="120" r="8" fill="#ff00ff" filter="url(#glow)" />
        <text x="165" y="105" fill="#ff00ff" font-weight="bold" text-anchor="middle" filter="url(#glow)">M(a, b)
            기준점</text>

        <path d="M 50 180 L 165 120" fill="none" stroke="#fff" stroke-width="2" />
        <path d="M 165 120 L 280 60" fill="none" stroke="#00ffcc" stroke-width="3" stroke-dasharray="6 4"
            marker-end="url(#arrow_c)" filter="url(#glow)" />

        <circle cx="280" cy="60" r="6" fill="#00ffcc" filter="url(#glow)" />
        <text x="280" y="45" fill="#00ffcc" font-weight="bold" text-anchor="middle" filter="url(#glow)">P'(2a-x,
            2b-y)</text>

        <!-- Midpoint Notation -->
        <text x="100" y="140" fill="#aaaaaa" font-size="12" font-weight="bold">=</text>
        <text x="230" y="75" fill="#aaaaaa" font-size="12" font-weight="bold">=</text>

        <rect x="0" y="210" width="330" height="50" rx="5" fill="#000" stroke="#ff00ff" />
        <text x="165" y="230" fill="#ffffff" font-size="14" text-anchor="middle">중점 공식의 역추적 해킹</text>
        <text x="165" y="250" fill="#ff00ff" font-weight="bold" text-anchor="middle">x' = 2a - x, y' = 2b - y</text>
    </g>

    <!-- Right Side: General Line Symmetry -->
    <g transform="translate(470, 150)">
        <rect x="-20" y="0" width="370" height="280" rx="15" fill="#001a11" stroke="#00ffcc" stroke-width="3" />
        <text x="165" y="30" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">임의의 직선 y = mx+n 대칭</text>

        <!-- The Mirror Line -->
        <path d="M 0 180 L 330 60" fill="none" stroke="#00ffcc" stroke-width="4" filter="url(#glow)" />
        <text x="280" y="90" fill="#00ffcc" font-weight="bold" filter="url(#glow)">y = mx+n</text>

        <circle cx="100" cy="50" r="6" fill="#fff" />
        <text x="100" y="40" fill="#fff" font-weight="bold" text-anchor="middle">P(x, y)</text>

        <path d="M 100 50 L 200 200" fill="none" stroke="#ffff00" stroke-width="3" stroke-dasharray="8 4"
            marker-end="url(#arrow_y)" filter="url(#glow)" />

        <circle cx="200" cy="200" r="6" fill="#ffff00" filter="url(#glow)" />
        <text x="200" y="220" fill="#ffff00" font-weight="bold" text-anchor="middle" filter="url(#glow)">P'(x',
            y')</text>

        <!-- Intersection & Right Angle -->
        <circle cx="150" cy="125" r="5" fill="#ff5555" />
        <path d="M 150 110 L 165 115 L 160 130" fill="none" stroke="#ff5555" stroke-width="2" />
        <text x="130" y="115" fill="#ff5555" font-size="12" font-weight="bold">90° 직각</text>

        <rect x="0" y="210" width="330" height="50" rx="5" fill="#000" stroke="#00ffcc" />
        <text x="165" y="230" fill="#ffffff" font-size="14" text-anchor="middle">1. 기울기 수직(m × m' = -1)</text>
        <text x="165" y="250" fill="#ffff00" font-weight="bold" text-anchor="middle">2. 중점이 거울선 위에 존재(대입)</text>
    </g>

    <defs>
        <marker id="arrow_y" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ffff00" />
        </marker>
        <marker id="arrow_c" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#00ffcc" />
        </marker>
    </defs>

    <!-- Big Alert Bottom -->
    <rect x="100" y="470" width="700" height="90" rx="10" fill="#1b0000" stroke="#ff5555" stroke-width="2" />
    <text x="450" y="505" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        직선 대칭에서 파스칼, 페르마조차 벗어나지 못했던 단 하나의 진리:
    </text>
    <text x="450" y="535" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        <tspan fill="#ff5555" font-weight="bold">수직 조건(직각으로 부딪힘)</tspan> 과 <tspan fill="#ffff00" font-weight="bold">중점
            조건(거리가 같음)</tspan> 의 절대 연립방정식!
    </text>
</svg>