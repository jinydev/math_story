<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Main Title -->
    <text x="450" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">파이썬 PyGame 충돌 스캐너: 거리(d) vs 방어반경(r)</text>

    <text x="450" y="70" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"방어막 심장에서 그은 직선 가장
        짧은 거리(d) 가 레이저 궤적 명중률을 결정한다!"</text>

    <!-- Circle (Planet Shield) -->
    <g transform="translate(250, 300)">
        <circle cx="0" cy="0" r="150" fill="none" stroke="#4da6ff" stroke-width="4" filter="url(#glow)" />
        <circle cx="0" cy="0" r="150" fill="#4da6ff" opacity="0.1" />

        <!-- Center of Planet -->
        <circle cx="0" cy="0" r="8" fill="#ffffff" filter="url(#glow)" />
        <text x="-15" y="25" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">배꼽 C(x,y)</text>

        <!-- Radius line r -->
        <line x1="0" y1="0" x2="-106" y2="106" stroke="#4da6ff" stroke-width="3" stroke-dasharray="5 5" />
        <text x="-60" y="70" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            filter="url(#glow)">반지름 r</text>

        <!-- TRIPLE LASER THREATS -->

        <!-- 1. Miss (Missing Laser) - Yellow -->
        <line x1="-300" y1="-220" x2="300" y2="-220" stroke="#ffff00" stroke-width="4" stroke-dasharray="10 5" />
        <line x1="0" y1="0" x2="0" y2="-220" stroke="#ffff00" stroke-width="3" />
        <text x="10" y="-120" fill="#ffff00" font-family="monospace" font-size="20" font-weight="bold">d > r</text>
        <rect x="-110" y="-270" width="160" height="30" rx="5" fill="#332200" stroke="#ffff00" />
        <text x="-30" y="-250" fill="#ffff00" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">1. 회피 (Missing!)</text>

        <!-- 2. Tangent (Grazed) - Green -->
        <line x1="150" y1="-250" x2="150" y2="250" stroke="#00ffcc" stroke-width="4" />
        <line x1="0" y1="0" x2="150" y2="0" stroke="#00ffcc" stroke-width="3" />
        <text x="100" y="-10" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold"
            filter="url(#glow)">d = r</text>
        <rect x="160" y="-150" width="190" height="30" rx="5" fill="#003322" stroke="#00ffcc" />
        <text x="255" y="-130" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">2. 접선 (Tangent 스파크)</text>

        <!-- 3. Secant (Pierced) - Red -->
        <line x1="-250" y1="180" x2="350" y2="20" stroke="#ff0055" stroke-width="5" />
        <!-- calculate shortest distance manually for visual: to line 4y + x - 350 = 0 approx -->
        <line x1="0" y1="0" x2="15" y2="55" stroke="#ff0055" stroke-width="3" filter="url(#glow)" />
        <!-- <text x="-25" y="45" fill="#ff0055" font-family="monospace" font-size="20" font-weight="bold">d &lt; r</text> -->
        <path d="M 0 0 L 25 90" stroke="#ff0055" stroke-width="3" />
        <text x="35" y="55" fill="#ff0055" font-family="monospace" font-size="20" font-weight="bold"
            filter="url(#glow)">d &lt; r</text>
        <rect x="180" y="100" width="190" height="30" rx="5" fill="#330011" stroke="#ff0055" />
        <text x="275" y="120" fill="#ff0055" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">3. 할선 (Secant 관통!)</text>

    </g>

    <!-- Python Logic Box -->
    <g transform="translate(620, 200)">
        <rect x="0" y="0" width="250" height="200" rx="10" fill="#111" stroke="#ffffff" stroke-width="2" />
        <text x="125" y="30" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">충돌 필터 작동 (if-else)</text>

        <text x="20" y="70" fill="#ff7b72" font-family="monospace" font-size="16" font-weight="bold">if</text>
        <text x="50" y="70" fill="#79c0ff" font-family="monospace" font-size="16">distance > radius:</text>
        <text x="40" y="90" fill="#a5d6ff" font-family="monospace" font-size="14"> return "Miss"</text>

        <text x="20" y="120" fill="#ff7b72" font-family="monospace" font-size="16" font-weight="bold">elif</text>
        <text x="70" y="120" fill="#79c0ff" font-family="monospace" font-size="16">distance == radius:</text>
        <text x="40" y="140" fill="#a5d6ff" font-family="monospace" font-size="14"> return "Tangent"</text>

        <text x="20" y="170" fill="#ff7b72" font-family="monospace" font-size="16" font-weight="bold">else:</text>
        <text x="40" y="190" fill="#a5d6ff" font-family="monospace" font-size="14"> return "Pierced!"</text>
    </g>

    <rect x="100" y="530" width="700" height="40" rx="10" fill="#0f0f15" stroke="#ffff00" stroke-width="2" />
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="15" text-anchor="middle">
        단 한 번의 직선-점 거리($d$) 공식 파서를 거친 매크로 값이 방어막 크기($r$) 코어 데이터와 록업 판정을 냅니다!
    </text>
</svg>