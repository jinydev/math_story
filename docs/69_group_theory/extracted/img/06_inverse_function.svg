<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">거울 속 쌍둥이: 지수함수와 로그함수의 역함수 관계</text>

    <!-- Chart Area -->
    <g transform="translate(450, 480)">

        <!-- Axes -->
        <line x1="-300" y1="0" x2="300" y2="0" stroke="#777777" stroke-width="2" />
        <line x1="0" y1="100" x2="0" y2="-350" stroke="#777777" stroke-width="2" />

        <text x="310" y="5" fill="#aaaaaa" font-family="sans-serif" font-size="14">X</text>
        <text x="-15" y="-360" fill="#aaaaaa" font-family="sans-serif" font-size="14">Y</text>

        <!-- y = x Mirror Line -->
        <line x1="-100" y1="100" x2="350" y2="-350" stroke="#ffffff" stroke-width="2" stroke-dasharray="10 6"
            filter="url(#glow)" />
        <text x="250" y="-270" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            transform="rotate(-45, 250, -270)">대칭 거울 (y = x)</text>

        <!-- Exponential Function (y = 2^x) -->
        <path d="M -300 -5 Q -50 -10 0 -40 T 130 -350" fill="none" stroke="#ff4d4d" stroke-width="5"
            filter="url(#glow)" />
        <text x="-150" y="-120" fill="#ff4d4d" font-family="monospace" font-size="24" font-weight="bold">지수함수 y =
            2^x</text>

        <circle cx="80" cy="-160" r="5" fill="#ffffff" />
        <text x="70" y="-170" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="end">(3, 8)</text>

        <circle cx="0" cy="-40" r="5" fill="#ffaa00" />
        <text x="-10" y="-45" fill="#ffaa00" font-family="monospace" font-size="16" text-anchor="end">(0, 1)</text>

        <!-- Logarithmic Function (y = log2 x) -->
        <path d="M 5 300 Q 10 50 40 0 T 350 -130" fill="none" stroke="#00ffcc" stroke-width="5" filter="url(#glow)" />
        <text x="180" y="70" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold">로그함수 y = log_2
            x</text>

        <circle cx="160" cy="-80" r="5" fill="#ffffff" />
        <text x="170" y="-60" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="start">(8, 3)</text>

        <circle cx="40" cy="0" r="5" fill="#ffaa00" />
        <text x="45" y="20" fill="#ffaa00" font-family="monospace" font-size="16" text-anchor="start">(1, 0)</text>

        <!-- Connecting dashes showing symmetry -->
        <line x1="80" y1="-160" x2="160" y2="-80" stroke="#ffaa00" stroke-width="2" stroke-dasharray="4 4" />
        <line x1="0" y1="-40" x2="40" y2="0" stroke="#ffaa00" stroke-width="2" stroke-dasharray="4 4" />
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="520" width="600" height="60" rx="10" fill="#112233" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="545" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">원인(x)과 결과(y)가 완벽하게
        뒤바뀌는 <tspan fill="#ff00ff" font-weight="bold">인버스 매핑(Inverse Mapping)</tspan></text>
    <text x="450" y="570" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">모든 X/Y 특징, 치솟거나
        꺾이는 궤적조차 서로 180도 데칼코마니가 된다.</text>

</svg>