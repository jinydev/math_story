<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .disk {
                fill: #161b22;
                stroke: #ffaa64;
                stroke-width: 4;
            }

            .poly-1 {
                fill: rgba(0, 255, 255, 0.4);
                stroke: #00ffff;
                stroke-width: 1.5;
            }

            .poly-2 {
                fill: rgba(255, 100, 100, 0.4);
                stroke: #ff6464;
                stroke-width: 1.5;
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="400" y="40" class="title">푸앵카레 쌍곡 원반 (Poincaré Disk Model)</text>
    <text x="400" y="65" class="desc">가장자리로 갈수록 무한히 공간이 축소되어 도형들이 작게 빨려들어가는 프랙탈 우주</text>

    <g transform="translate(400, 320)">
        <!-- Base Boundary Circle -->
        <circle cx="0" cy="0" r="220" class="disk" />

        <!-- Pseudo Hyperbolic Tessellation Simulation (Not perfectly mathematically exact, but gives visual intuition) -->

        <!-- Center Huge Hexagon pseudo-split into triangles -->
        <path d="M 0 0 L 0 -100 A 100 100 0 0 0 -86 -50 Z" class="poly-1" />
        <path d="M 0 0 L -86 -50 A 100 100 0 0 0 -86 50 Z" class="poly-2" />
        <path d="M 0 0 L -86 50 A 100 100 0 0 0 0 100 Z" class="poly-1" />
        <path d="M 0 0 L 0 100 A 100 100 0 0 0 86 50 Z" class="poly-2" />
        <path d="M 0 0 L 86 50 A 100 100 0 0 0 86 -50 Z" class="poly-1" />
        <path d="M 0 0 L 86 -50 A 100 100 0 0 0 0 -100 Z" class="poly-2" />

        <!-- Second Ring (Smaller) -->
        <!-- Top -->
        <path d="M 0 -100 A 100 100 0 0 1 -86 -50 A 70 70 0 0 0 -30 -140 A 100 100 0 0 1 0 -100 Z" class="poly-2" />
        <path d="M 0 -100 A 100 100 0 0 0 86 -50 A 70 70 0 0 1 30 -140 A 100 100 0 0 0 0 -100 Z" class="poly-1" />
        <!-- Right Top -->
        <path d="M 86 -50 A 100 100 0 0 0 86 50 A 70 70 0 0 1 140 0 A 100 100 0 0 1 86 -50 Z" class="poly-2" />

        <!-- Right Bottom -->
        <path d="M 86 50 A 100 100 0 0 0 0 100 A 70 70 0 0 1 120 120 A 100 100 0 0 0 86 50 Z" class="poly-1" />

        <!-- Bottom -->
        <path d="M 0 100 A 100 100 0 0 0 -86 50 A 70 70 0 0 0 -50 140 A 100 100 0 0 1 0 100 Z" class="poly-2" />

        <!-- Left -->
        <path d="M -86 50 A 100 100 0 0 1 -86 -50 A 70 70 0 0 0 -140 0 A 100 100 0 0 0 -86 50 Z" class="poly-1" />

        <!-- Third Ring (Even Smaller, conceptual curved arcs mapping towards edge) -->
        <path d="M 0 -160 A 160 160 0 0 1 50 -150 A 40 40 0 0 0 20 -190 A 190 190 0 0 0 0 -160 Z" class="poly-2" />
        <path d="M 0 -160 A 160 160 0 0 0 -50 -150 A 40 40 0 0 1 -20 -190 A 190 190 0 0 1 0 -160 Z" class="poly-1" />

        <path d="M -160 0 A 160 160 0 0 1 -150 -50 A 40 40 0 0 0 -190 -20 A 190 190 0 0 0 -160 0 Z" class="poly-2" />
        <path d="M -160 0 A 160 160 0 0 0 -150 50 A 40 40 0 0 1 -190 20 A 190 190 0 0 1 -160 0 Z" class="poly-1" />

        <path d="M 160 0 A 160 160 0 0 0 150 -50 A 40 40 0 0 1 190 -20 A 190 190 0 0 1 160 0 Z" class="poly-1" />
        <path d="M 160 0 A 160 160 0 0 1 150 50 A 40 40 0 0 0 190 20 A 190 190 0 0 0 160 0 Z" class="poly-2" />

        <text x="0" y="260" fill="#ffaa64" font-size="20" text-anchor="middle">쌍곡 기하학에서는 이 모든 다각형들이 "크기와 면적이 100%
            동일"하다.</text>
        <text x="0" y="285" fill="#ffffff" font-size="16" text-anchor="middle">가장자리로 향할수록 우주 공간 자체가 무한히 수축하기 때문에 생기는
            착시.</text>
    </g>

</svg>