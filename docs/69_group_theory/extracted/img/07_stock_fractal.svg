<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .chart-box {
                fill: #161b22;
                stroke: #30363d;
                stroke-width: 2;
                rx: 4;
            }

            .grid-line {
                stroke: rgba(255, 255, 255, 0.05);
                stroke-width: 1;
            }

            .stock-line {
                fill: none;
                stroke: #00ffff;
                stroke-width: 2;
                stroke-linejoin: round;
                filter: drop-shadow(0 0 3px #00ffff);
            }

            .title {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 14px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="40" class="title">자본 시장의 프랙탈 (Fractal in Stock Market)</text>
    <text x="400" y="65" class="desc">시간축과 가격축의 숫자를 지워버리면, 거시적 차트와 미시적 차트는 완벽히 동일하다</text>

    <!-- Macro Chart (10 Years) -->
    <g transform="translate(50, 100)">
        <rect width="320" height="200" class="chart-box" />
        <line x1="0" y1="50" x2="320" y2="50" class="grid-line" />
        <line x1="0" y1="100" x2="320" y2="100" class="grid-line" />
        <line x1="0" y1="150" x2="320" y2="150" class="grid-line" />

        <!-- Complex stock trajectory 1 -->
        <polyline points="
      0,180 10,170 15,185 25,160 30,165 40,140 45,155 55,130 65,145 75,110 
      85,120 95,90 100,105 110,80 120,95 130,60 140,70 150,40 160,55 170,30 
      180,45 190,20 200,80 210,65 220,110 230,100 240,150 250,135 260,160 270,140 
      280,180 290,165 300,190 310,180 320,170
    " class="stock-line" />

        <rect x="-10" y="210" width="340" height="40" fill="#0d1117" />
        <text x="160" y="235" fill="#ffffff" font-size="18" text-anchor="middle">월봉 차트 (최근 10년)</text>

        <rect x="-80" y="0" width="70" height="200" fill="#0d1117" />
        <text x="-45" y="100" fill="#888" font-size="12" text-anchor="middle" transform="rotate(-90, -45, 100)">가격
            ($)</text>
    </g>

    <text x="400" y="200" fill="#ff6464" font-size="32" text-anchor="middle">≈</text>

    <!-- Micro Chart (5 Minutes) -->
    <g transform="translate(430, 100)">
        <rect width="320" height="200" class="chart-box" />
        <line x1="0" y1="50" x2="320" y2="50" class="grid-line" />
        <line x1="0" y1="100" x2="320" y2="100" class="grid-line" />
        <line x1="0" y1="150" x2="320" y2="150" class="grid-line" />

        <!-- Same shape, generated from same logic but scaled slightly to look like a 'zoom in' or another instance -->
        <polyline points="
      0,180 10,170 15,185 25,160 30,165 40,140 45,155 55,130 65,145 75,110 
      85,120 95,90 100,105 110,80 120,95 130,60 140,70 150,40 160,55 170,30 
      180,45 190,20 200,80 210,65 220,110 230,100 240,150 250,135 260,160 270,140 
      280,180 290,165 300,190 310,180 320,170
    " class="stock-line" />

        <rect x="-10" y="210" width="340" height="40" fill="#0d1117" />
        <text x="160" y="235" fill="#ffffff" font-size="18" text-anchor="middle">초봉/틱 차트 (최근 5분)</text>
    </g>

</svg>