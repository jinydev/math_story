<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">함수 연속성 3단계 인증 게이트</text>

    <!-- Left Side: Continuity Machine Diagram -->
    <g transform="translate(100, 150)">
        <!-- Stage 1 -->
        <rect x="0" y="0" width="200" height="80" rx="15" fill="#221122" stroke="#ff0055" stroke-width="2" />
        <text x="100" y="30" fill="#ff0055" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">Step 1. 함숫값</text>
        <text x="100" y="55" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">f(a) 가 존재하는가?</text>
        <circle cx="100" cy="70" r="5" fill="#ff0055" filter="url(#glow)" />

        <path d="M 100 85 L 100 125" stroke="#00ffcc" stroke-width="4" marker-end="url(#arrow)" />

        <!-- Stage 2 -->
        <rect x="0" y="130" width="200" height="80" rx="15" fill="#112233" stroke="#4da6ff" stroke-width="2" />
        <text x="100" y="160" fill="#4da6ff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">Step 2. 극한값</text>
        <text x="100" y="185" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">lim f(x) 가 존재하는가?</text>
        <!-- Approaching arrows -->
        <path d="M 70 200 L 90 200 M 130 200 L 110 200" stroke="#4da6ff" stroke-width="3" marker-end="url(#arrow)" />

        <path d="M 100 215 L 100 255" stroke="#00ffcc" stroke-width="4" marker-end="url(#arrow)" />

        <!-- Stage 3 -->
        <rect x="0" y="260" width="200" height="80" rx="15" fill="#332211" stroke="#ffaa00" stroke-width="2" />
        <text x="100" y="290" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">Step 3. 최종 일치</text>
        <text x="100" y="315" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">lim f(x) == f(a)</text>

        <path d="M 210 300 L 260 300" stroke="#00ffcc" stroke-width="6" marker-end="url(#arrow)" filter="url(#glow)" />
    </g>

    <!-- Final Output Banner -->
    <rect x="380" y="360" width="150" height="100" rx="20" fill="#0d1a26" stroke="#00ffcc" stroke-width="4"
        filter="url(#glow)" />
    <text x="455" y="405" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
        text-anchor="middle">Pass</text>
    <text x="455" y="435" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">연속(Continuous)</text>

    <!-- Right Side: Graphic Representation of Success -->
    <g transform="translate(600, 150)">
        <rect x="0" y="0" width="200" height="200" rx="10" fill="#112233" stroke="#555566" />
        <!-- The Line -->
        <path d="M 20 150 Q 100 50 180 150" fill="none" stroke="#00ffcc" stroke-width="6" filter="url(#glow)" />
        <!-- The Point a -->
        <line x1="100" y1="20" x2="100" y2="180" stroke="#555566" stroke-dasharray="5 5" />
        <!-- The Solid Dot at a -->
        <circle cx="100" cy="100" r="8" fill="#ffaa00" stroke="#ffffff" stroke-width="2" filter="url(#glow)" />

        <!-- Left approach -->
        <path d="M 50 135 L 75 115" stroke="#ff0055" stroke-width="3" marker-end="url(#arrow)" />
        <!-- Right approach -->
        <path d="M 150 135 L 125 115" stroke="#ff0055" stroke-width="3" marker-end="url(#arrow)" />

        <text x="100" y="230" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">완벽한 스킨십</text>
    </g>

    <!-- Footer Explain -->
    <rect x="150" y="480" width="600" height="60" rx="10" fill="#0f0f15" stroke="#555566" />
    <text x="450" y="505" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">3개의 게이트 중 하나라도 실패하면(False 반환), 함수는 즉시 끊어집니다(불연속).</text>
    <text x="450" y="525" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle"> 극한값(접근 높이)과
        함숫값(나사 위치)이 아다리가 맞아야만 곡선이 매끄럽게 흐릅니다.</text>

</svg>