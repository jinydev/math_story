<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">도넛 공장의 비밀: 파푸스-굴딘 정리 (Pappus's Theorem)</text>

    <!-- Left Side: Component Setup -->
    <g transform="translate(250, 300)">
        <!-- Rotation Axis -->
        <line x1="0" y1="-150" x2="0" y2="150" stroke="#777777" stroke-width="4" stroke-dasharray="10 5"
            filter="url(#glow)" />
        <text x="-40" y="0" fill="#aaaaaa" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="end">회전축</text>

        <!-- Distance from Axis to Centroid -->
        <line x1="0" y1="0" x2="150" y2="0" stroke="#ffaa00" stroke-width="3" stroke-dasharray="6 4" />
        <text x="75" y="-10" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">회전 반경 R</text>

        <!-- The 2D Shape (A Circle) -->
        <circle cx="150" cy="0" r="40" fill="#00ffcc" opacity="0.6" stroke="#00ffcc" stroke-width="2" />
        <text x="150" y="-55" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">2D 넓이 A</text>

        <!-- Centroid G -->
        <circle cx="150" cy="0" r="6" fill="#ff4d4d" filter="url(#glow)" />
        <text x="150" y="25" fill="#ff4d4d" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">무게중심 G</text>
    </g>

    <!-- Math Symbol -->
    <text x="450" y="280" fill="#ffffff" font-family="sans-serif" font-size="40" font-weight="bold"
        text-anchor="middle">⇒</text>
    <text x="450" y="320" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">마법 공식 적용</text>

    <!-- Right Side: The Resulting Torus (Donut) -->
    <g transform="translate(680, 270)">
        <!-- Back half of Torus -->
        <ellipse cx="0" cy="0" rx="150" ry="60" fill="none" stroke="#2b8c8c" stroke-width="15" stroke-dasharray="10 6"
            opacity="0.4" />

        <!-- Front half of Torus -->
        <path d="M -150 0 A 150 60 0 0 0 150 0" fill="none" stroke="#00ffcc" stroke-width="45" filter="url(#glow)" />
        <path d="M -150 0 A 150 60 0 0 0 150 0" fill="none" stroke="#004d4d" stroke-width="20" />
        <!-- Inner shadow for 3D effect -->

        <!-- The Path of G (Red dotted line inside) -->
        <path d="M -150 0 A 150 60 0 0 0 150 0" fill="none" stroke="#ff4d4d" stroke-width="3" stroke-dasharray="6 4"
            filter="url(#glow)" />

        <!-- Cutaway section (The circle shape sliding) -->
        <ellipse cx="150" cy="0" rx="15" ry="40" fill="#ffaa00" opacity="0.8" />
        <circle cx="150" cy="0" r="3" fill="#ff4d4d" />

        <text x="0" y="-80" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">3D 도넛 (Torus) 체적</text>
    </g>

    <!-- Formula Panel -->
    <g transform="translate(150, 420)">
        <rect x="0" y="0" width="600" height="90" rx="15" fill="#111122" stroke="#ffaa00" stroke-width="3" />
        <text x="300" y="30" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">파푸스-굴딘 정리 (미적분 압축 스킬)</text>
        <text x="300" y="70" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold"
            text-anchor="middle">V = <tspan fill="#00ffcc">단면 넓이(A)</tspan> × <tspan fill="#ff4d4d">중심(G)의 이동궤적(2πR)
            </tspan></text>
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="530" width="600" height="40" rx="10" fill="#221133" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">CAD 시뮬레이터에서 훌라후프와
        자동차 타이어의 볼륨을 빛의 속도로 스캔하는 코어 엔진!</text>

</svg>