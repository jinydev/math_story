<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">방정식의 점(Point) 에서 부등식의 영토(Area) 로</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"등호(=) 는 구멍 바늘만
        허용하지만 부등호(<,>) 는 무한한 숫자를 펜스로 감싼다."</text>

    <!-- Left Side: Equation (Scale Balanced) -->
    <g transform="translate(150, 200)">
        <rect x="-80" y="-30" width="280" height="240" rx="10" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
        <text x="60" y="0" fill="#ff00ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">방정식: x² - 4 = 0</text>

        <!-- Balanced Scale Graphic -->
        <path d="M 60 140 L 60 60" fill="none" stroke="#fff" stroke-width="4" />
        <path d="M 0 60 L 120 60" fill="none" stroke="#fff" stroke-width="4" />
        <polygon points="60,140 40,160 80,160" fill="#ff00ff" />

        <!-- Scale Pans -->
        <circle cx="0" cy="80" r="20" fill="#222" stroke="#fff" stroke-width="2" />
        <circle cx="120" cy="80" r="20" fill="#222" stroke="#fff" stroke-width="2" />
        <text x="0" y="85" fill="#fff" font-weight="bold" text-anchor="middle">x²-4</text>
        <text x="120" y="85" fill="#fff" font-weight="bold" text-anchor="middle">0</text>

        <rect x="-60" y="170" width="240" height="30" rx="5" fill="#000" stroke="#ff00ff" />
        <text x="60" y="190" fill="#ff00ff" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">근(점): x = 2, x = -2 (단 2개)</text>
    </g>

    <!-- Right Side: Inequality (Scale Tilted) -->
    <g transform="translate(560, 200)">
        <rect x="-80" y="-30" width="280" height="240" rx="10" fill="#001a11" stroke="#00ffcc" stroke-width="2" />
        <text x="60" y="0" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">부등식: x² - 4 < 0</text>

                <!-- Tilted Scale Graphic -->
                <path d="M 60 140 L 60 80" fill="none" stroke="#fff" stroke-width="4" />
                <path d="M -10 40 L 130 120" fill="none" stroke="#00ffcc" stroke-width="4" filter="url(#glow)" />
                <polygon points="60,140 40,160 80,160" fill="#00ffcc" />

                <!-- Scale Pans -->
                <circle cx="-10" cy="60" r="20" fill="#004422" stroke="#00ffcc" stroke-width="2" filter="url(#glow)" />
                <circle cx="130" cy="140" r="20" fill="#222" stroke="#fff" stroke-width="2" />
                <text x="-10" y="65" fill="#00ffcc" font-weight="bold" text-anchor="middle">x²-4</text>
                <text x="130" y="145" fill="#fff" font-weight="bold" text-anchor="middle">0</text>

                <rect x="-60" y="170" width="240" height="30" rx="5" fill="#000" stroke="#00ffcc" />
                <text x="60" y="190" fill="#00ffcc" font-family="monospace" font-size="14" font-weight="bold"
                    text-anchor="middle">해(구역): -2 < x < 2 (무한 개)</text>
    </g>

    <!-- The Bridge / Connection -->
    <text x="440" y="300" fill="#ffffff" font-size="32" font-weight="bold" filter="url(#glow)">→</text>

    <!-- Number Line Visualization Bottom -->
    <g transform="translate(150, 480)">
        <rect x="-50" y="-10" width="700" height="80" rx="10" fill="#1b0000" stroke="#ffff00" stroke-width="2" />

        <!-- The line -->
        <path d="M 0 30 L 600 30" fill="none" stroke="#fff" stroke-width="4" />

        <!-- Boundaries (Equation Roots) -->
        <circle cx="200" cy="30" r="6" fill="#000" stroke="#ffff00" stroke-width="3" />
        <circle cx="400" cy="30" r="6" fill="#000" stroke="#ffff00" stroke-width="3" />
        <text x="200" y="60" fill="#ffff00" font-weight="bold" font-size="16" text-anchor="middle">-2 (경계선)</text>
        <text x="400" y="60" fill="#ffff00" font-weight="bold" font-size="16" text-anchor="middle">2 (경계선)</text>

        <!-- Inequality Area (The Bridge between) -->
        <path d="M 210 20 L 390 20" fill="none" stroke="#00ffcc" stroke-width="6" stroke-linecap="round"
            filter="url(#glow)" />
        <text x="300" y="-5" fill="#00ffcc" font-weight="bold" font-size="16" text-anchor="middle"
            filter="url(#glow)">생존 구역 (-2 < x < 2)</text>
    </g>
</svg>