<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="portalGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">로그(Logarithm)의 위대한 탄생</text>

    <!-- Left Side: The Hell of Multiplication -->
    <g transform="translate(200, 280)">
        <rect x="-150" y="-150" width="300" height="300" rx="20" fill="#2b1111" stroke="#ff4d4d" stroke-width="4"
            opacity="0.8" />
        <text x="0" y="-100" fill="#ff4d4d" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">17세기 천문학자의 지옥</text>

        <text x="0" y="-30" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">8,734,592</text>
        <text x="0" y="20" fill="#ff4d4d" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">×</text>
        <text x="0" y="70" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">1,598,302</text>

        <!-- Sweat / Stress symbols -->
        <path d="M 80 -10 Q 100 -30 110 -10 Q 120 10 100 30 Z" fill="#4da6ff" opacity="0.5" />
        <text x="0" y="120" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"일주일을 계산했는데 하나
            틀렸다.."</text>
    </g>

    <!-- Middle: Logarithm Portal -->
    <g transform="translate(450, 280)">
        <!-- Magic Portal Rings -->
        <ellipse cx="0" cy="0" rx="40" ry="120" fill="none" stroke="#00ffcc" stroke-width="8"
            filter="url(#portalGlow)" />
        <ellipse cx="0" cy="0" rx="20" ry="100" fill="none" stroke="#ffffff" stroke-width="4" filter="url(#glow)" />

        <!-- Arrows passing through -->
        <path d="M -80 -20 C -20 -80, 20 -80, 80 -20" fill="none" stroke="#ffaa00" stroke-width="4"
            stroke-dasharray="8 6" />
        <polygon points="80,-20 70,-30 75,-10" fill="#ffaa00" />

        <text x="0" y="-140" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">네이피어의 마법</text>
        <rect x="-60" y="-20" width="120" height="40" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="0" y="6" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">Log Table</text>
    </g>

    <!-- Right Side: The Heaven of Addition -->
    <g transform="translate(700, 280)">
        <rect x="-150" y="-150" width="300" height="300" rx="20" fill="#113322" stroke="#00ffcc" stroke-width="4"
            opacity="0.8" />
        <text x="0" y="-100" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">로그 변환 세계 (평화)</text>

        <text x="0" y="-30" fill="#00ffcc" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">6.9412</text>
        <text x="0" y="20" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">+</text>
        <text x="0" y="70" fill="#00ffcc" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">6.2036</text>

        <!-- Star symbols -->
        <text x="0" y="120" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">초등학생 수준의 더하기로
            끝!</text>
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="480" width="600" height="60" rx="10" fill="#112233" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="505" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">천문학자들의 수명을 2배 늘려준
        기적의 변환 시스템!</text>
    <text x="450" y="530" fill="#ffaa00" font-family="monospace" font-size="20" font-weight="bold"
        text-anchor="middle">"지옥의 곱셈 치환 -> 로그 세계의 덧셈"</text>

</svg>