<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .rect-line {
                fill: rgba(0, 255, 255, 0.05);
                stroke: #30363d;
                stroke-width: 2;
            }

            .spiral-line {
                fill: none;
                stroke: #ffaa64;
                stroke-width: 4;
                stroke-linecap: round;
                filter: drop-shadow(0 0 8px rgba(255, 170, 100, 0.8));
            }

            .num {
                fill: #ffffff;
                font-size: 16px;
                text-anchor: middle;
                alignment-baseline: middle;
            }

            .title {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 14px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="300" y="30" class="title">황금 사각형과 황금 나선 (Golden Spiral)</text>
    <text x="300" y="55" class="desc">피보나치 수(1, 1, 2, 3, 5, 8, 13) 길이의 정사각형을 이어 그릴 때 완성되는 자기유사성</text>

    <!-- Transform to center the spiral -->
    <g transform="translate(100, 100)">
        <!-- 21x21 (scaled: 21 * 10 = 210) -->

        <!-- 13x13 (130) box -->
        <rect x="0" y="0" width="260" height="260" class="rect-line" />
        <text x="130" y="130" class="num" font-size="24">13</text>

        <!-- 8x8 (160) box -->
        <rect x="260" y="100" width="160" height="160" class="rect-line" />
        <text x="340" y="180" class="num" font-size="24">8</text>

        <!-- 5x5 (100) box -->
        <rect x="260" y="0" width="100" height="100" class="rect-line" />
        <text x="310" y="50" class="num" font-size="20">5</text>

        <!-- 3x3 (60) box -->
        <rect x="360" y="0" width="60" height="60" class="rect-line" />
        <text x="390" y="30" class="num">3</text>

        <!-- 2x2 (40) box -->
        <rect x="380" y="60" width="40" height="40" class="rect-line" />
        <text x="400" y="80" class="num">2</text>

        <!-- 1x1 (20) box -->
        <rect x="360" y="60" width="20" height="20" class="rect-line" />
        <text x="370" y="70" class="num" font-size="10">1</text>

        <!-- 1x1 (20) box -->
        <rect x="360" y="80" width="20" height="20" class="rect-line" />
        <text x="370" y="90" class="num" font-size="10">1</text>

        <!-- Spiral Curve -->
        <path d="M 380 100 
             A 20 20 0 0 1 360 80 
             A 20 20 0 0 1 380 60
             A 40 40 0 0 1 420 100
             A 60 60 0 0 1 360 160
             A 100 100 0 0 1 260 60
             A 160 160 0 0 1 420 260
             A 260 260 0 0 1 0 0" class="spiral-line" />
    </g>
</svg>