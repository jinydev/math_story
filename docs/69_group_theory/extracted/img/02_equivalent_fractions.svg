<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#00ffcc" />
        </marker>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">크기가 같은 통치 분수 (Equivalent Fractions)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"조각의 개수만 늘어날 뿐, 배에
        들어오는 피자의 물리적 총량은 단 1mm 도 변하지 않는다."</text>

    <!-- Fraction 1: 1/2 -->
    <g transform="translate(150, 250)">
        <circle cx="0" cy="0" r="80" fill="#222" stroke="#fff" stroke-width="3" />
        <path d="M 0 -80 L 0 80" fill="none" stroke="#fff" stroke-width="2" />
        <path d="M 0 0 L 0 -80 A 80 80 0 0 1 80 0 A 80 80 0 0 1 0 80 Z" fill="#ff00ff" opacity="0.6"
            filter="url(#glow)" />

        <text x="0" y="110" fill="#fff" font-size="24" font-weight="bold" text-anchor="middle">1 / 2</text>
    </g>

    <!-- Evolution Arrow 1 -->
    <path d="M 260 250 L 340 250" fill="none" stroke="#00ffcc" stroke-width="4" marker-end="url(#arrow)"
        filter="url(#glow)" />
    <text x="300" y="235" fill="#00ffcc" font-weight="bold" font-size="16" text-anchor="middle">x 2</text>
    <text x="300" y="275" fill="#00ffcc" font-weight="bold" font-size="16" text-anchor="middle">x 2</text>

    <!-- Fraction 2: 2/4 -->
    <g transform="translate(450, 250)">
        <circle cx="0" cy="0" r="80" fill="#222" stroke="#fff" stroke-width="3" />
        <path d="M 0 -80 L 0 80 M -80 0 L 80 0" fill="none" stroke="#fff" stroke-width="2" />

        <path d="M 0 0 L 0 -80 A 80 80 0 0 1 80 0 A 80 80 0 0 1 0 80 Z" fill="#ff00ff" opacity="0.6"
            filter="url(#glow)" />

        <text x="0" y="110" fill="#fff" font-size="24" font-weight="bold" text-anchor="middle">2 / 4</text>
    </g>

    <!-- Evolution Arrow 2 -->
    <path d="M 560 250 L 640 250" fill="none" stroke="#00ffcc" stroke-width="4" marker-end="url(#arrow)"
        filter="url(#glow)" />
    <text x="600" y="235" fill="#00ffcc" font-weight="bold" font-size="16" text-anchor="middle">x 2</text>
    <text x="600" y="275" fill="#00ffcc" font-weight="bold" font-size="16" text-anchor="middle">x 2</text>

    <!-- Fraction 3: 4/8 -->
    <g transform="translate(750, 250)">
        <circle cx="0" cy="0" r="80" fill="#222" stroke="#fff" stroke-width="3" />
        <path d="M 0 -80 L 0 80 M -80 0 L 80 0 M -56 -56 L 56 56 M -56 56 L 56 -56" fill="none" stroke="#fff"
            stroke-width="2" />

        <path d="M 0 0 L 0 -80 A 80 80 0 0 1 80 0 A 80 80 0 0 1 0 80 Z" fill="#ff00ff" opacity="0.6"
            filter="url(#glow)" />

        <text x="0" y="110" fill="#fff" font-size="24" font-weight="bold" text-anchor="middle">4 / 8</text>
    </g>

    <!-- Equation Line Bottom -->
    <g transform="translate(450, 420)">
        <text x="0" y="0" fill="#00ffcc" font-size="40" font-weight="bold" font-family="monospace" text-anchor="middle"
            filter="url(#glow)">1/2 = 2/4 = 4/8</text>
    </g>

    <!-- Big Alert Bottom -->
    <rect x="100" y="470" width="700" height="90" rx="10" fill="#002222" stroke="#00ffcc" stroke-width="2" />
    <text x="450" y="500" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        분모와 분자에 똑같은 숫자를 곱하거나 나누어도(0 제외), 그 물리적 크기는 절대 불변한다.
    </text>
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        거꾸로 컴퓨터가 최대공약수(GCD) 로 나누어 뼈대만 남긴 것을
    </text>
    <text x="450" y="550" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">
        가장 완벽한 최적화 데이터 폼: '기약분수(Irreducible Fraction)' 라고 부른다.
    </text>
</svg>