<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            /* Euler Style */
            .eu-a {
                fill: rgba(0, 150, 255, 0.2);
                stroke: #0088ff;
                stroke-width: 3;
            }

            .eu-b {
                fill: rgba(255, 100, 100, 0.2);
                stroke: #ff6464;
                stroke-width: 3;
            }

            /* Venn Style */
            .ve-a {
                fill: none;
                stroke: #0088ff;
                stroke-width: 3;
            }

            .ve-b {
                fill: none;
                stroke: #ff6464;
                stroke-width: 3;
            }

            .ve-intersect {
                fill: url(#diagonalHatch);
            }

            .math {
                font-size: 24px;
                text-anchor: middle;
                fill: #ffffff;
            }

            .vs-text {
                font-size: 32px;
                fill: #ffd700;
                text-anchor: middle;
                font-weight: bold;
            }

            .caption {
                font-size: 18px;
                fill: #aaaaaa;
                text-anchor: middle;
            }
        </style>

        <!-- Hatch pattern for empty set -->
        <pattern id="diagonalHatch" width="10" height="10" patternTransform="rotate(45 0 0)"
            patternUnits="userSpaceOnUse">
            <line x1="0" y1="0" x2="0" y2="10" style="stroke:#888888; stroke-width:2" />
        </pattern>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="400" y="40" class="title">오일러 다이어그램 vs 벤 다이어그램 설계 사상</text>
    <text x="400" y="65" class="desc">A와 B가 서로 겹치는 원소가 아예 없을 때 (서로소) 그리는 두 학자의 접근법 차이</text>

    <!-- Left: Euler Diagram -->
    <g transform="translate(200, 250)">
        <!-- Intuitive separate circles -->
        <circle cx="-60" cy="-20" r="70" class="eu-a" />
        <text x="-60" y="-15" class="math" fill="#0088ff">A</text>

        <circle cx="90" cy="10" r="60" class="eu-b" />
        <text x="90" y="15" class="math" fill="#ff6464">B</text>

        <text x="0" y="140" fill="#00ff00" font-size="22" font-weight="bold" text-anchor="middle">오일러 (Euler)</text>
        <text x="0" y="170" class="caption">"안 겹치면 직관적으로</text>
        <text x="0" y="200" class="caption">떨어뜨려 그려라!"</text>
    </g>

    <!-- Center: VS -->
    <text x="400" y="250" class="vs-text">VS</text>

    <!-- Right: Venn Diagram -->
    <g transform="translate(600, 250)">
        <!-- Forced intersection with empty set marker -->

        <!-- Intersection hatch -->
        <path d="M -40 -10 A 70 70 0 0 1 40 -10 A 70 70 0 0 1 -40 -10 Z" class="ve-intersect" />

        <circle cx="-40" cy="-10" r="70" class="ve-a" />
        <text x="-70" y="-5" class="math" fill="#0088ff">A</text>

        <circle cx="40" cy="-10" r="70" class="ve-b" />
        <text x="70" y="-5" class="math" fill="#ff6464">B</text>

        <!-- Empty Set symbol in the middle -->
        <text x="0" y="-5" fill="#ffffff" font-size="28" font-weight="bold" text-anchor="middle">∅</text>
        <text x="0" y="25" fill="#888888" font-size="14" text-anchor="middle">(공집합)</text>

        <text x="0" y="140" fill="#00ffff" font-size="22" font-weight="bold" text-anchor="middle">벤 (Venn)</text>
        <text x="0" y="170" class="caption">"무조건 겹치게 프레임을 짠 뒤,</text>
        <text x="0" y="200" class="caption">데이터가 없으면 비워(∅) 둬라!"</text>
    </g>

</svg>