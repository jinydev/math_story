<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">대수적 구조 (Algebraic Structure): (M, *)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"동작하지 않는 고철 덩어리
        창고(M)에 생명 엔진(*)을 장착해 하나의 우주를 발진시킨다."</text>

    <!-- Left: Set M (Data) -->
    <g transform="translate(150, 250)">
        <circle cx="0" cy="0" r="80" fill="#1b1122" stroke="#0088ff" stroke-width="3" filter="url(#glow)" />
        <text x="0" y="-10" fill="#0088ff" font-weight="bold" font-size="30" text-anchor="middle">M</text>
        <text x="0" y="20" fill="#aaa" font-size="16" text-anchor="middle">집합 (재료 창고)</text>

        <circle cx="-30" cy="40" r="5" fill="#fff" />
        <circle cx="30" cy="40" r="5" fill="#fff" />
        <circle cx="0" cy="55" r="5" fill="#fff" />
    </g>

    <!-- Plus -->
    <text x="320" y="260" fill="#fff" font-weight="bold" font-size="50">+</text>

    <!-- Middle: Operation * (Method) -->
    <g transform="translate(450, 250)">
        <!-- Gear icon approximation -->
        <path
            d="M -30 -50 L -20 -70 L 20 -70 L 30 -50 L 50 -30 L 70 -20 L 70 20 L 50 30 L 30 50 L 20 70 L -20 70 L -30 50 L -50 30 L -70 20 L -70 -20 L -50 -30 Z"
            fill="#221122" stroke="#ff00ff" stroke-width="3" filter="url(#glow)" />
        <circle cx="0" cy="0" r="30" fill="#0a0a14" stroke="#ff00ff" stroke-width="2" />

        <text x="0" y="15" fill="#ff00ff" font-weight="bold" font-size="40" text-anchor="middle"
            filter="url(#glow)">*</text>
        <text x="0" y="100" fill="#aaa" font-size="16" text-anchor="middle">이항연산 (엔진)</text>
    </g>

    <!-- Arrow -->
    <path d="M 550 250 L 630 250" fill="none" stroke="#fff" stroke-width="4" marker-end="url(#arrow_w)" />

    <!-- Right: Algebraic Structure (Object) -->
    <g transform="translate(750, 250)">
        <!-- Hexagon surrounding both -->
        <polygon points="0,-120 100,-60 100,60 0,120 -100,60 -100,-60" fill="#112222" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />

        <text x="0" y="-10" fill="#00ffcc" font-weight="bold" font-size="36" text-anchor="middle" filter="url(#glow)">(
            M, * )</text>
        <text x="0" y="30" fill="#fff" font-weight="bold" font-size="18" text-anchor="middle">대수적 구조</text>
        <text x="0" y="55" fill="#aaa" font-size="14" text-anchor="middle">(Algebraic Structure)</text>
    </g>

    <defs>
        <marker id="arrow_w" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ffffff" />
        </marker>
    </defs>

    <!-- Bottom: Connection to OOP -->
    <rect x="100" y="450" width="700" height="110" rx="10" fill="#1a1a2a" stroke="#ffffff" stroke-width="2" />
    <text x="450" y="480" fill="#00ffcc" font-weight="bold" font-size="20" text-anchor="middle">
        이 거대한 수학적 조립 사상은, 최신 프로그래밍의
    </text>
    <text x="450" y="515" fill="#ff00ff" font-weight="bold" font-size="24" text-anchor="middle" filter="url(#glow)">
        객체 지향 코드 ( Object = Data Variable + Method() )
    </text>
    <text x="450" y="545" fill="#ffffff" font-size="16" text-anchor="middle">
        를 형성하는 정확한 수학적 원형 아키텍처이다!
    </text>

</svg>