<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffaa00" />
        </marker>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">공통인수 (Common Factor) 강제 추출!</text>

    <g transform="translate(100, 150)">
        <!-- Original equation mafias -->
        <rect x="0" y="0" width="100" height="80" rx="10" fill="#2d2d44" stroke="#ff4d4d" stroke-width="2" />
        <text x="50" y="50" fill="#ffffff" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">
            <tspan fill="#ffaa00">m</tspan>a
        </text>

        <text x="130" y="50" fill="#ffffff" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">+</text>

        <rect x="160" y="0" width="100" height="80" rx="10" fill="#2d2d44" stroke="#00ffcc" stroke-width="2" />
        <text x="210" y="50" fill="#ffffff" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">
            <tspan fill="#ffaa00">m</tspan>b
        </text>

        <text x="290" y="50" fill="#ffffff" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">-</text>

        <rect x="320" y="0" width="100" height="80" rx="10" fill="#2d2d44" stroke="#4da6ff" stroke-width="2" />
        <text x="370" y="50" fill="#ffffff" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">
            <tspan fill="#ffaa00">m</tspan>c
        </text>
    </g>

    <!-- Pincers extracting 'm' -->
    <path d="M 150 150 Q 150 70 350 70" fill="none" stroke="#ffaa00" stroke-width="3" stroke-dasharray="5"
        marker-end="url(#arrow)" />
    <path d="M 310 150 Q 310 70 350 70" fill="none" stroke="#ffaa00" stroke-width="3" stroke-dasharray="5" />
    <path d="M 470 150 Q 470 70 365 70" fill="none" stroke="#ffaa00" stroke-width="3" stroke-dasharray="5" />

    <!-- Final extracted state -->
    <g transform="translate(250, 250)">
        <circle cx="20" cy="50" r="35" fill="#111111" stroke="#ffaa00" stroke-width="4" filter="url(#glow)" />
        <text x="20" y="60" fill="#ffaa00" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle">m</text>

        <text x="90" y="60" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold">(</text>

        <text x="130" y="55" fill="#ff4d4d" font-family="monospace" font-size="28" font-weight="bold">a</text>
        <text x="160" y="55" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold">+</text>
        <text x="190" y="55" fill="#00ffcc" font-family="monospace" font-size="28" font-weight="bold">b</text>
        <text x="220" y="55" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold">-</text>
        <text x="250" y="55" fill="#4da6ff" font-family="monospace" font-size="28" font-weight="bold">c</text>

        <text x="290" y="60" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold">)</text>
    </g>

    <text x="400" y="360" fill="#aaaaaa" font-family="sans-serif" font-size="18" text-anchor="middle">공통으로 숨긴 알파벳 'm' 을
        핀셋으로 한 번에 모조리 잡아 뽑는다!</text>

</svg>