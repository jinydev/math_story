<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">대입 (Substitution) = 빈 상자에 숫자 넣기</text>

    <!-- Formula -->
    <g transform="translate(150, 150)">
        <text x="0" y="0" fill="#ffffff" font-family="sans-serif" font-size="24">식(Formula):</text>
        <text x="150" y="5" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold">-3</text>

        <!-- The empty box for x -->
        <rect x="210" y="-35" width="50" height="50" rx="10" fill="none" stroke="#4da6ff" stroke-width="3"
            stroke-dasharray="5" />
        <text x="235" y="0" fill="#4da6ff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">x</text>

        <text x="280" y="5" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"> + 4</text>
    </g>

    <!-- The Substitution Action -->
    <g transform="translate(385, 230)">
        <!-- Water drop / value -->
        <path d="M 0 -70 C 20 -40 20 -10 0 0 C -20 -10 -20 -40 0 -70 Z" fill="#ff4d4d" filter="url(#glow)" />
        <text x="0" y="-20" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">-2</text>

        <!-- Arrow down -->
        <path d="M 0 10 L 0 50" stroke="#ff4d4d" stroke-width="4" stroke-dasharray="6" marker-end="url(#arrow_red)" />
    </g>

    <!-- Resulting Expression -->
    <g transform="translate(150, 320)">
        <text x="0" y="0" fill="#ffffff" font-family="sans-serif" font-size="24">대입 결과:</text>
        <text x="150" y="5" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold">-3</text>

        <!-- Revived Multiplication -->
        <text x="210" y="5" fill="#ffaa00" font-family="monospace" font-size="40" font-weight="bold"> × </text>

        <!-- Substituted Value with Parentheses -->
        <text x="260" y="5" fill="#ff4d4d" font-family="monospace" font-size="40" font-weight="bold"
            filter="url(#glow)">(-2)</text>

        <text x="350" y="5" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"> + 4</text>

        <text x="450" y="5" fill="#00ffcc" font-family="monospace" font-size="40" font-weight="bold"> = 10</text>
    </g>

    <!-- Warning Text -->
    <rect x="550" y="100" width="220" height="100" rx="10" fill="#2b1111" stroke="#ff4d4d" stroke-width="2" />
    <text x="660" y="130" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">🚨 핵심 주의 🚨</text>
    <text x="660" y="160" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">음수를 대입할 때는</text>
    <text x="660" y="180" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">무조건 <tspan
            fill="#ffaa00" font-weight="bold">괄호( )</tspan> 보호막!</text>

</svg>