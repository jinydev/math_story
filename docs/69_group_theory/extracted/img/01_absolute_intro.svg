<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">조건부등식 vs 절대부등식 방어막 테스트</text>

    <!-- Conditional Inequality -->
    <g transform="translate(150, 200)">
        <rect x="0" y="0" width="250" height="300" rx="15" fill="#221122" stroke="#ff0055" stroke-width="3"
            filter="url(#glow)" />
        <text x="125" y="40" fill="#ff0055" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">조건부등식 방어막</text>
        <text x="125" y="70" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">x - 3 > 0</text>
        <line x1="20" y1="90" x2="230" y2="90" stroke="#555566" />

        <!-- Attacks -->
        <!-- Attack 1: x=5 (Pass) -->
        <path d="M -50 140 L 40 140" stroke="#00ffcc" stroke-width="3" marker-end="url(#arrow)" />
        <text x="-20" y="130" fill="#00ffcc" font-family="monospace" font-size="16">x=5</text>
        <circle cx="60" cy="140" r="10" fill="#00ffcc" filter="url(#glow)" />
        <text x="125" y="145" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">방어 성공 (True)</text>

        <!-- Attack 2: x=1 (Fail) -->
        <path d="M -50 220 L 40 220" stroke="#ff0055" stroke-width="3" marker-end="url(#arrow)" />
        <text x="-20" y="210" fill="#ff0055" font-family="monospace" font-size="16">x=1</text>
        <path d="M 50 210 L 70 230 M 70 210 L 50 230" stroke="#ff0055" stroke-width="4" filter="url(#glow)" />
        <text x="125" y="225" fill="#ff0055" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">방어막 붕괴! (False)</text>

        <text x="125" y="280" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">특정 변수에만 작동하는
            구식 쉴드</text>
    </g>

    <!-- Absolute Inequality -->
    <g transform="translate(500, 200)">
        <rect x="0" y="0" width="250" height="300" rx="15" fill="#112233" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="125" y="40" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">절대부등식 쉴드</text>
        <text x="125" y="70" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">x² + 1 ≥ 1</text>
        <line x1="20" y1="90" x2="230" y2="90" stroke="#555566" />

        <!-- Attacks -->
        <!-- Attack 1: x=100 (Pass) -->
        <path d="M -50 130 L 40 130" stroke="#ffaa00" stroke-width="3" marker-end="url(#arrow)" />
        <text x="-20" y="120" fill="#ffaa00" font-family="monospace" font-size="16">x=100</text>
        <circle cx="60" cy="130" r="10" fill="#00ffcc" filter="url(#glow)" />
        <text x="125" y="135" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">방어 성공 (True)</text>

        <!-- Attack 2: x=0 (Pass) -->
        <path d="M -50 180 L 40 180" stroke="#ffaa00" stroke-width="3" marker-end="url(#arrow)" />
        <text x="-20" y="170" fill="#ffaa00" font-family="monospace" font-size="16">x=0</text>
        <circle cx="60" cy="180" r="10" fill="#00ffcc" filter="url(#glow)" />
        <text x="125" y="185" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">방어 성공 (True)</text>

        <!-- Attack 3: x=-999 (Pass) -->
        <path d="M -50 230 L 40 230" stroke="#ffaa00" stroke-width="3" marker-end="url(#arrow)" />
        <text x="-20" y="220" fill="#ffaa00" font-family="monospace" font-size="16">x=-999</text>
        <circle cx="60" cy="230" r="10" fill="#00ffcc" filter="url(#glow)" />
        <text x="125" y="235" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">방어 성공 (True)</text>

        <text x="125" y="280" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">무적의 우주 방어막 (항상 참)</text>
    </g>

</svg>