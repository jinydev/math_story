<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="40" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">탄도학 렌더링: 수류탄 투사체 궤적 해킹 (Projectile Motion)</text>

    <!-- Main Combat Field -->
    <g transform="translate(100, 100)">

        <!-- Coordinate Grid & Ground -->
        <line x1="0" y1="350" x2="700" y2="350" stroke="#4da6ff" stroke-width="4" /> <!-- Ground line -->
        <rect x="0" y="350" width="700" height="50" fill="#001824" opacity="0.6" /> <!-- Dirt -->
        <text x="660" y="380" fill="#4da6ff" font-family="monospace" font-size="16" font-weight="bold">지면 (h=0)</text>

        <!-- Projectile Trajectory (Parabola) -->
        <!-- h(t) = -5t^2 + 30t -->
        <!-- Max height at t=3, h=45 -->
        <!-- Start at t=0 (0,350), End at t=6 (600,350) -->
        <path d="M 100 350 Q 300 0 500 350" fill="none" stroke="#ffaa00" stroke-width="6" stroke-dasharray="15 5"
            filter="url(#glow)" />

        <!-- Player Character Toss -->
        <rect x="60" y="300" width="40" height="50" rx="5" fill="#27c93f" />
        <!-- Arm -->
        <line x1="80" y1="310" x2="110" y2="280" stroke="#ffffff" stroke-width="4" />
        <text x="30" y="380" fill="#27c93f" font-family="sans-serif" font-size="16" font-weight="bold">START
            (t=0)</text>

        <!-- Point 1: Launch -->
        <circle cx="100" cy="350" r="10" fill="#ff0055" stroke="#fff" stroke-width="2" />
        <path d="M 100 350 L 150 250" stroke="#ff0055" stroke-width="4" marker-end="url(#arrow_r)" />
        <text x="70" y="240" fill="#ff0055" font-family="monospace" font-size="16" font-weight="bold">v(0) = +30</text>
        <text x="70" y="260" fill="#aaaaaa" font-family="sans-serif" font-size="14">초기 파워 치솟음</text>

        <!-- Point 2: Apex ! The Hack ! -->
        <circle cx="300" cy="175" r="14" fill="#ffff00" stroke="#fff" stroke-width="4" filter="url(#glow)" />
        <!-- Velocity is zero (horizontal) -->
        <path d="M 300 175 L 360 175" stroke="#ffff00" stroke-width="4" marker-end="url(#arrow_y)" />

        <!-- Code Box for Max Height -->
        <rect x="220" y="50" width="160" height="70" rx="10" fill="#221100" stroke="#ffff00" stroke-width="2" />
        <text x="300" y="75" fill="#ffff00" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">v(t) = 0</text>
        <text x="300" y="95" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">t = 3초 찰나</text>
        <text x="300" y="110" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">정점 높이 45m
            달성</text>

        <!-- Dotted line to ground -->
        <line x1="300" y1="189" x2="300" y2="350" stroke="#ffffff" stroke-dasharray="4 4" stroke-width="2" />
        <text x="305" y="340" fill="#ffffff" font-family="monospace">t = 3s</text>

        <!-- Point 3: G-force constant damage down -->
        <!-- Arrows pulling down along the path -->
        <line x1="200" y1="260" x2="200" y2="300" stroke="#4da6ff" stroke-width="3" marker-end="url(#arrow_b)" />
        <line x1="400" y1="260" x2="400" y2="300" stroke="#4da6ff" stroke-width="3" marker-end="url(#arrow_b)" />
        <text x="210" y="290" fill="#4da6ff" font-family="monospace" font-size="14">a=-10 G</text>
        <text x="410" y="290" fill="#4da6ff" font-family="monospace" font-size="14">a=-10 G</text>

        <!-- Point 4: Impact ! -->
        <circle cx="500" cy="350" r="16" fill="#ff0055" stroke="#fff" stroke-width="4" filter="url(#glow)" />
        <path d="M 500 350 L 530 420" stroke="#ff0055" stroke-width="6" marker-end="url(#arrow_r)" />

        <!-- Explosion effect -->
        <path d="M 480 340 L 460 320 M 490 330 L 485 300 M 510 330 L 525 300 M 520 340 L 550 320" stroke="#ffff00"
            stroke-width="3" filter="url(#glow)" />

        <!-- Code Box for Impact -->
        <rect x="520" y="250" width="160" height="70" rx="10" fill="#330011" stroke="#ff0055" stroke-width="2" />
        <text x="600" y="275" fill="#ff0055" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">h(t) = 0</text>
        <text x="600" y="295" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">t = 6초 타격!</text>
        <text x="600" y="310" fill="#ffaa00" font-family="sans-serif" font-size="14" text-anchor="middle">속도: v(6) =
            -30m/s</text>
    </g>

    <!-- Markers -->
    <defs>
        <marker id="arrow_r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ff0055" />
        </marker>
        <marker id="arrow_y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
        </marker>
        <marker id="arrow_b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#4da6ff" />
        </marker>
    </defs>

    <rect x="150" y="520" width="600" height="60" rx="10" fill="#0f0f15" stroke="#ffffff" stroke-width="2" />
    <text x="450" y="545" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        높이 공식 <tspan fill="#ffaa00" font-weight="bold">h(t)</tspan> 만 서버에 던지면, <tspan fill="#ff0055" font-weight="bold">
            미분</tspan>을 통해 "최고 높이 도달 쿨타임(v=0)" 과
    </text>
    <text x="450" y="565" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        "땅바닥 타격 데미지 타이밍(h=0)" 을 치트 물리 코드로 완전 분쇄 스캔할 수 있습니다.
    </text>
</svg>