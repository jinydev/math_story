<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">완전제곱 압축기: 실수의 방어력을 0 이상으로 튜닝하라</text>

    <!-- Original Messy Equation -->
    <g transform="translate(100, 150)">
        <rect x="0" y="0" width="250" height="200" rx="10" fill="#221122" stroke="#ff0055" stroke-width="3"
            filter="url(#glow)" />
        <text x="125" y="50" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">흩어진 난잡한 코드</text>
        <text x="125" y="110" fill="#ffffff" font-family="serif" font-size="32" font-weight="bold"
            text-anchor="middle">a² + b² ≥ 2ab</text>
        <text x="125" y="170" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">"방어력이 증명되지 않은
            상태"</text>
    </g>

    <!-- Processing Belt -->
    <path d="M 360 250 L 540 250" fill="none" stroke="#00ffcc" stroke-width="6" marker-end="url(#arrow)"
        stroke-dasharray="15 10" filter="url(#glow)" />
    <rect x="380" y="210" width="140" height="40" rx="5" fill="#112233" stroke="#00ffcc" />
    <text x="450" y="235" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
        text-anchor="middle">SymPy Factor (압축)</text>
    <text x="450" y="190" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
        text-anchor="middle">이항 및 완전제곱 묶기</text>

    <!-- Compressed Result -->
    <g transform="translate(550, 150)">
        <rect x="0" y="0" width="250" height="200" rx="10" fill="#331111" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="125" y="50" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">완전제곱 블록 장착</text>
        <text x="125" y="110" fill="#ffffff" font-family="serif" font-size="36" font-weight="bold"
            text-anchor="middle">(a - b)² ≥ 0</text>
        <text x="125" y="170" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">"실수의 제곱 패시브 발동! 참(True)"</text>
    </g>

    <!-- Core Rules Display -->
    <rect x="150" y="420" width="600" height="130" rx="10" fill="#0f0f15" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="450" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">🛡️ 3대 필수 베이스 방어막 (실수 a, b)</text>

    <rect x="180" y="470" width="150" height="60" rx="5" fill="#222" />
    <text x="255" y="500" fill="#ffffff" font-family="monospace" font-size="18" text-anchor="middle">a² ≥ 0</text>
    <text x="255" y="520" fill="#00ffcc" font-family="sans-serif" font-size="12" text-anchor="middle">단일 제곱 무적</text>

    <rect x="375" y="470" width="150" height="60" rx="5" fill="#222" />
    <text x="450" y="500" fill="#ffffff" font-family="monospace" font-size="18" text-anchor="middle">a² + b² ≥ 0</text>
    <text x="450" y="520" fill="#00ffcc" font-family="sans-serif" font-size="12" text-anchor="middle">듀얼 제곱 무적</text>

    <rect x="570" y="470" width="150" height="60" rx="5" fill="#222" />
    <text x="645" y="500" fill="#ffffff" font-family="monospace" font-size="18" text-anchor="middle">|a| ≥ 0</text>
    <text x="645" y="520" fill="#00ffcc" font-family="sans-serif" font-size="12" text-anchor="middle">절댓값 강제 양수</text>

</svg>