<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">공간의 저주 3패턴 (두 직선의 위치 관계)</text>

    <!-- Wireframe Cubes -->

    <!-- 1. Intersecting Lines -->
    <g transform="translate(100, 150)">
        <!-- Cube outline -->
        <polygon points="50,50 150,50 100,150 0,150" fill="#0d1a26" stroke="#555" />
        <polygon points="150,50 200,0 100,0 50,50" fill="#1a334d" stroke="#555" />
        <polygon points="150,50 200,0 150,100 100,150" fill="#112233" stroke="#555" />

        <!-- Transparent front face to show back -->
        <path d="M0,150 L50,50 M100,0 L50,50 M100,0 L150,100" stroke="#333" stroke-dasharray="2 2" />

        <text x="100" y="-30" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">1. 한 점에서 만난다</text>

        <!-- Intersecting lines (Front face X) -->
        <line x1="0" y1="50" x2="100" y2="150" stroke="#00ffcc" stroke-width="5" filter="url(#glow)" />
        <line x1="100" y1="50" x2="0" y2="150" stroke="#ffaa00" stroke-width="5" filter="url(#glow)" />
        <circle cx="50" cy="100" r="5" fill="#ffffff" />

        <rect x="0" y="180" width="200" height="40" rx="5" fill="#221122" stroke="#ff0055" />
        <text x="100" y="205" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">한 평면 위에 존재
            (O)</text>
    </g>

    <!-- 2. Parallel Lines -->
    <g transform="translate(350, 150)">
        <!-- Cube outline -->
        <polygon points="50,50 150,50 100,150 0,150" fill="#0d1a26" stroke="#555" />
        <polygon points="150,50 200,0 100,0 50,50" fill="#1a334d" stroke="#555" />
        <polygon points="150,50 200,0 150,100 100,150" fill="#112233" stroke="#555" />

        <text x="100" y="-30" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">2. 평행하다</text>

        <!-- Parallel lines (Top and Bottom Front Horizontal) -->
        <line x1="0" y1="150" x2="100" y2="150" stroke="#4da6ff" stroke-width="5" filter="url(#glow)" />
        <line x1="50" y1="50" x2="150" y2="50" stroke="#ff0055" stroke-width="5" filter="url(#glow)" />

        <rect x="0" y="180" width="200" height="40" rx="5" fill="#221122" stroke="#ff0055" />
        <text x="100" y="205" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">한 평면 위에 존재
            (O)</text>
    </g>

    <!-- 3. Skew Lines -->
    <g transform="translate(600, 150)">
        <!-- Cube outline -->
        <polygon points="50,50 150,50 100,150 0,150" fill="#0d1a26" stroke="#555" />
        <polygon points="150,50 200,0 100,0 50,50" fill="#1a334d" stroke="#555" />
        <polygon points="150,50 200,0 150,100 100,150" fill="#112233" stroke="#555" />

        <path d="M0,150 L50,50 M100,0 L50,50 M100,0 L150,100" stroke="#333" stroke-dasharray="2 2" />

        <text x="100" y="-30" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">3. 꼬인 위치 (Skew)</text>

        <!-- Skew lines (Front vertical, Top back horizontal) -->
        <!-- Front vertical -->
        <line x1="100" y1="50" x2="0" y2="150" stroke="#ff0055" stroke-width="5" filter="url(#glow)" />
        <!-- Top back horizontal (Needs to be "behind" the front vertical) -->
        <line x1="100" y1="0" x2="200" y2="0" stroke="#ffff00" stroke-width="5" filter="url(#glow)" />

        <rect x="0" y="180" width="200" height="40" rx="5" fill="#112233" stroke="#00ffcc" />
        <text x="100" y="205" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">한 평면 절대 불가 (X)</text>
    </g>

    <!-- Banner -->
    <rect x="150" y="470" width="600" height="70" rx="10" fill="#0f0f15" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="500" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">💡 공간의 특권: 꼬인 위치</text>
    <text x="450" y="525" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">방향도 다르고 절대로 만나지 않는
        엇갈린 두 직선 (예: 육교 다리와 그 아래 기찻길)</text>

</svg>