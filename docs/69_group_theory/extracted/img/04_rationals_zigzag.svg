<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <!-- Arrowhead markers -->
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4d94" />
        </marker>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">칸토어의 유리수 지그재그(Zigzag) 스캔</text>
    <text x="400" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">2차원 분수 그리드를 1차원
        자연수(1, 2, 3...) 줄자로 1:1 무한 매핑</text>

    <!-- Grid Area -->
    <g transform="translate(100, 150)" font-family="monospace" font-size="22" font-weight="bold" text-anchor="middle">

        <!-- Axes Labels -->
        <g fill="#4da6ff" font-size="20">
            <text x="-50" y="-30">분모</text>
            <text x="-40" y="-10">↓</text>
            <text x="50" y="-30">분자 →</text>

            <!-- Column Headers (Numerator) -->
            <text x="50" y="-5">1</text>
            <text x="150" y="-5">2</text>
            <text x="250" y="-5">3</text>
            <text x="350" y="-5">4</text>
            <text x="450" y="-5">5</text>

            <!-- Row Headers (Denominator) -->
            <text x="-30" y="35">1</text>
            <text x="-30" y="115">2</text>
            <text x="-30" y="195">3</text>
            <text x="-30" y="275">4</text>
            <text x="-30" y="355">5</text>
        </g>

        <!-- Fractions Grid (x: index*100 + 50, y: index*80 + 35) -->
        <g fill="#ffffff">
            <!-- Row 1 -->
            <text x="50" y="35">1/1</text> <text x="150" y="35">2/1</text> <text x="250" y="35">3/1</text> <text x="350"
                y="35">4/1</text> <text x="450" y="35">5/1</text> <text x="550" y="35">...</text>
            <!-- Row 2 -->
            <text x="50" y="115">1/2</text> <text x="150" y="115" fill="#555555">2/2</text> <text x="250"
                y="115">3/2</text> <text x="350" y="115" fill="#555555">4/2</text> <text x="450" y="115">5/2</text>
            <text x="550" y="115">...</text>
            <!-- Row 3 -->
            <text x="50" y="195">1/3</text> <text x="150" y="195">2/3</text> <text x="250" y="195"
                fill="#555555">3/3</text> <text x="350" y="195">4/3</text> <text x="450" y="195">5/3</text> <text
                x="550" y="195">...</text>
            <!-- Row 4 -->
            <text x="50" y="275">1/4</text> <text x="150" y="275" fill="#555555">2/4</text> <text x="250"
                y="275">3/4</text> <text x="350" y="275" fill="#555555">4/4</text> <text x="450" y="275">5/4</text>
            <text x="550" y="275">...</text>
            <!-- Row 5 -->
            <text x="50" y="355">1/5</text> <text x="150" y="355">2/5</text> <text x="250" y="355">3/5</text> <text
                x="350" y="355">4/5</text> <text x="450" y="355" fill="#555555">5/5</text> <text x="550"
                y="355">...</text>
            <!-- Row 6 -->
            <text x="50" y="420">...</text> <text x="150" y="420">...</text> <text x="250" y="420">...</text> <text
                x="350" y="420">...</text> <text x="450" y="420">...</text> <text x="550" y="420">⋱</text>
        </g>

        <!-- Zigzag Path -->
        <g stroke="#ff4d94" stroke-width="3" fill="none" marker-end="url(#arrow)" filter="url(#glow)">
            <!-- 1/1 to 2/1 -->
            <path d="M 70 30 L 125 30" />
            <!-- 2/1 to 1/2 -->
            <path d="M 140 45 L 60 100" />
            <!-- 1/2 to 1/3 -->
            <path d="M 45 125 L 45 175" />
            <!-- 1/3 to 3/1 -->
            <path d="M 65 185 L 235 45" />
            <!-- 3/1 to 4/1 -->
            <path d="M 275 30 L 325 30" />
            <!-- 4/1 to 1/4 (Skips 2/2 by passing over it) -->
            <path d="M 330 45 L 60 260" />
            <!-- 1/4 to 1/5 -->
            <path d="M 45 285 L 45 335" />
            <!-- 1/5 to 5/1 -->
            <path d="M 65 345 L 435 45" />
        </g>

        <!-- Numbering Badges (Natural Numbers 1:1 Mapping) -->
        <g fill="#00ffcc" font-size="14" font-weight="bold">
            <circle cx="25" cy="15" r="12" fill="#1a1a24" stroke="#00ffcc" stroke-width="2" /> <text x="25"
                y="20">1</text>
            <circle cx="125" cy="15" r="12" fill="#1a1a24" stroke="#00ffcc" stroke-width="2" /> <text x="125"
                y="20">2</text>
            <circle cx="25" cy="95" r="12" fill="#1a1a24" stroke="#00ffcc" stroke-width="2" /> <text x="25"
                y="100">3</text>
            <circle cx="25" cy="175" r="12" fill="#1a1a24" stroke="#00ffcc" stroke-width="2" /> <text x="25"
                y="180">4</text>
            <circle cx="125" cy="95" r="12" fill="#333" stroke="#555" stroke-width="2" /> <text x="125" y="100"
                fill="#777">X</text> <!-- Skip 2/2 -->
            <circle cx="225" cy="15" r="12" fill="#1a1a24" stroke="#00ffcc" stroke-width="2" /> <text x="225"
                y="20">5</text>
            <circle cx="325" cy="15" r="12" fill="#1a1a24" stroke="#00ffcc" stroke-width="2" /> <text x="325"
                y="20">6</text>
            <circle cx="25" cy="255" r="12" fill="#1a1a24" stroke="#00ffcc" stroke-width="2" /> <text x="25"
                y="260">7</text>
        </g>
    </g>

    <!-- Legend / Explanation -->
    <rect x="100" y="520" width="600" height="60" rx="8" fill="#2d2d44" stroke="#ff4d94" stroke-width="2" />
    <text x="400" y="545" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">회색 분수(예: 2/2 =
        1/1)는 중복이므로 스킵(Skip)합니다.</text>
    <text x="400" y="565" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">결론: 아무리 조밀한 분수라도 결국 1차원 자연수(1, 2, 3...)와 1:1 대응된다.</text>

</svg>