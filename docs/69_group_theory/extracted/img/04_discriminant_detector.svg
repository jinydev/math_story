<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .box {
                fill: #161b22;
                stroke: #30363d;
                stroke-width: 3;
                rx: 15;
                ry: 15;
            }

            .box-green {
                fill: rgba(0, 255, 0, 0.1);
                stroke: #00ff00;
                stroke-width: 4;
                rx: 15;
                ry: 15;
            }

            .box-yellow {
                fill: rgba(255, 255, 0, 0.1);
                stroke: #ffff00;
                stroke-width: 4;
                rx: 15;
                ry: 15;
            }

            .box-red {
                fill: rgba(255, 0, 0, 0.1);
                stroke: #ff0000;
                stroke-width: 4;
                rx: 15;
                ry: 15;
            }

            .math {
                font-size: 40px;
                text-anchor: middle;
            }

            .label {
                fill: #ffffff;
                font-size: 20px;
                text-anchor: middle;
            }

            .sublabel {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .arrow {
                fill: none;
                stroke: #ffffff;
                stroke-width: 3;
                marker-end: url(#arrowhead);
            }
        </style>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#ffffff" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="450" y="40" class="title">해의 개수를 맞추는 점쟁이: 판별식 (Discriminant, D)</text>
    <text x="450" y="65" class="desc">D = b² - 4ac 의 부호에 따라 루트 안의 생사(해의 갯수)가 결정된다.</text>

    <!-- Central Source -->
    <rect x="350" y="100" width="200" height="80" class="box" />
    <text x="450" y="140" class="math" fill="#00ffff">b² - 4ac</text>
    <text x="450" y="165" class="sublabel" fill="#00ffff">판별식 (D)</text>

    <!-- Branching Arrows -->
    <path d="M 450 180 L 450 200 L 200 200 L 200 250" class="arrow" />
    <path d="M 450 180 L 450 250" class="arrow" />
    <path d="M 450 180 L 450 200 L 700 200 L 700 250" class="arrow" />

    <!-- Outcome 1: D > 0 -->
    <g transform="translate(200, 310)">
        <rect x="-110" y="-60" width="220" height="150" class="box-green" />
        <text x="0" y="-20" class="math" fill="#00ff00">D &gt; 0</text>
        <text x="0" y="20" class="label">서로 다른 2실근</text>
        <text x="0" y="50" class="sublabel">루트가 살아있음 (± 작동)</text>

        <!-- Parabola sketch -->
        <path d="M -50 70 Q 0 130 50 70" fill="none" stroke="#00ff00" stroke-width="2" />
        <line x1="-60" y1="100" x2="60" y2="100" stroke="#fff" stroke-width="1" />
        <circle cx="-25" cy="100" r="4" fill="#ff0000" />
        <circle cx="25" cy="100" r="4" fill="#ff0000" />
    </g>

    <!-- Outcome 2: D = 0 -->
    <g transform="translate(450, 310)">
        <rect x="-110" y="-60" width="220" height="150" class="box-yellow" />
        <text x="0" y="-20" class="math" fill="#ffff00">D = 0</text>
        <text x="0" y="20" class="label">오직 1개의 중근</text>
        <text x="0" y="50" class="sublabel">± 뒷부분 폭파 완료</text>

        <!-- Parabola sketch -->
        <path d="M -50 70 Q 0 130 50 70" fill="none" stroke="#ffff00" stroke-width="2" />
        <line x1="-60" y1="100" x2="60" y2="100" stroke="#fff" stroke-width="1" />
        <circle cx="0" cy="100" r="4" fill="#ff0000" />
    </g>

    <!-- Outcome 3: D < 0 -->
    <g transform="translate(700, 310)">
        <rect x="-110" y="-60" width="220" height="150" class="box-red" />
        <text x="0" y="-20" class="math" fill="#ff0000">D &lt; 0</text>
        <text x="0" y="20" class="label">해가 없다 (허근)</text>
        <text x="0" y="50" class="sublabel">루트 안 음수 에러! (허수 i)</text>

        <!-- Parabola sketch -->
        <path d="M -50 60 Q 0 120 50 60" fill="none" stroke="#ff0000" stroke-width="2" />
        <line x1="-60" y1="110" x2="60" y2="110" stroke="#fff" stroke-width="1" />
    </g>

</svg>