<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">화폐에 생명력을 불어넣는 엔진: 이자(Interest)</text>

    <!-- Timeline Base -->
    <line x1="100" y1="350" x2="800" y2="350" stroke="#555566" stroke-width="4" />
    <text x="100" y="380" fill="#aaaaaa" font-family="monospace" font-size="16" text-anchor="middle">Year 0
        (Today)</text>
    <text x="450" y="380" fill="#aaaaaa" font-family="monospace" font-size="16" text-anchor="middle">Year 5</text>
    <text x="800" y="380" fill="#aaaaaa" font-family="monospace" font-size="16" text-anchor="middle">Year 10
        (Future)</text>

    <circle cx="100" cy="350" r="8" fill="#555566" />
    <circle cx="450" cy="350" r="8" fill="#555566" />
    <circle cx="800" cy="350" r="8" fill="#555566" />

    <!-- Money at Year 0: Raw Principal -->
    <g transform="translate(100, 250)">
        <circle cx="0" cy="0" r="40" fill="#ffaa00" stroke="#ffffff" stroke-width="2" filter="url(#glow)" />
        <text x="0" y="5" fill="#000000" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">₩100</text>
        <text x="0" y="60" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">초기 원금 (P)</text>
    </g>

    <!-- Pumping Mechanism -->
    <path d="M 120 180 Q 450 50 780 180" fill="none" stroke="#00ffcc" stroke-width="4" stroke-dasharray="8 4"
        marker-end="url(#arrow)" filter="url(#glow)" />

    <rect x="350" y="80" width="200" height="50" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2"
        filter="url(#glow)" />
    <text x="450" y="105" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">이자(Interest)
        펌핑</text>
    <text x="450" y="125" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
        text-anchor="middle">× ( 1 + 이율 r )</text>

    <!-- Money at Year 10: Swelled Principal + Interest -->
    <g transform="translate(800, 210)">
        <!-- Swelled Aura -->
        <circle cx="0" cy="0" r="80" fill="#ffaa00" opacity="0.3" filter="url(#glow)" />
        <circle cx="0" cy="0" r="60" fill="#ffaa00" stroke="#ffffff" stroke-width="3" filter="url(#glow)" />
        <text x="0" y="-10" fill="#000000" font-family="sans-serif" font-size="28" font-weight="bold"
            text-anchor="middle">₩100</text>
        <text x="0" y="20" fill="#000000" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">+ ₩50 (이자)</text>

        <text x="0" y="100" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">팽창된 아웃풋 (S)</text>
    </g>

    <!-- Concept Explanation -->
    <rect x="150" y="450" width="600" height="100" rx="10" fill="#221122" stroke="#ff0055" stroke-width="2" />
    <text x="450" y="480" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">화폐의 시간 가치 (Time Value of Money)</text>
    <text x="450" y="510" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">"오늘의 1만 원은 10년 뒤의
        1만 원보다 가치가 크다."</text>
    <text x="450" y="535" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">따라서 기회비용과 리스크를
        '이자'라는 마법의 파이프라인으로 보상받아야 한다.</text>

</svg>