<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#aaaaaa" />
        </marker>

        <marker id="arrowOrb" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">× i 의 마법: 90도 회전 수레바퀴</text>

    <!-- Main Rotation System -->
    <g transform="translate(400, 320)">

        <!-- Circular Path -->
        <circle cx="0" cy="0" r="150" fill="none" stroke="#223344" stroke-width="3" stroke-dasharray="10 10" />

        <!-- Axes -->
        <line x1="-250" y1="0" x2="250" y2="0" stroke="#555555" stroke-width="2" marker-end="url(#arrow)" />
        <text x="260" y="5" fill="#aaaaaa" font-family="sans-serif" font-size="16">실수축 (+)</text>
        <text x="-260" y="5" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="end">실수축 (-)</text>

        <line x1="0" y1="250" x2="0" y2="-250" stroke="#555555" stroke-width="2" marker-end="url(#arrow)" />
        <text x="10" y="-260" fill="#aaaaaa" font-family="sans-serif" font-size="16">허수축 (i)</text>
        <text x="10" y="260" fill="#aaaaaa" font-family="sans-serif" font-size="16">허수축 (-i)</text>

        <!-- Point 1: The Number 1 -->
        <circle cx="150" cy="0" r="10" fill="#ffffff" filter="url(#glow)" />
        <text x="180" y="-10" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold">1</text>

        <!-- 90 Deg Arc 1 -->
        <path d="M 120 -20 A 120 120 0 0 0 20 -120" fill="none" stroke="#00ffcc" stroke-width="4"
            marker-end="url(#arrowOrb)" />
        <rect x="50" y="-90" width="50" height="30" rx="5" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="75" y="-70" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">× i</text>

        <!-- Point 2: i -->
        <circle cx="0" cy="-150" r="10" fill="#4da6ff" filter="url(#glow)" />
        <text x="20" y="-170" fill="#4da6ff" font-family="monospace" font-size="28" font-weight="bold">i</text>

        <!-- 90 Deg Arc 2 -->
        <path d="M -20 -120 A 120 120 0 0 0 -120 -20" fill="none" stroke="#00ffcc" stroke-width="4"
            marker-end="url(#arrowOrb)" />
        <rect x="-100" y="-90" width="50" height="30" rx="5" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="-75" y="-70" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">× i</text>

        <!-- Point 3: -1 -->
        <circle cx="-150" cy="0" r="10" fill="#ff4d4d" filter="url(#glow)" />
        <text x="-190" y="-10" fill="#ff4d4d" font-family="monospace" font-size="28" font-weight="bold">-1</text>
        <text x="-190" y="15" fill="#ffaa00" font-family="sans-serif" font-size="14" font-weight="bold">(i²)</text>

        <!-- 90 Deg Arc 3 -->
        <path d="M -120 20 A 120 120 0 0 0 -20 120" fill="none" stroke="#00ffcc" stroke-width="4"
            marker-end="url(#arrowOrb)" />
        <rect x="-100" y="60" width="50" height="30" rx="5" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="-75" y="80" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">× i</text>

        <!-- Point 4: -i -->
        <circle cx="0" cy="150" r="10" fill="#ff00ff" filter="url(#glow)" />
        <text x="20" y="180" fill="#ff00ff" font-family="monospace" font-size="28" font-weight="bold">-i</text>
        <text x="-25" y="180" fill="#ffaa00" font-family="sans-serif" font-size="14" font-weight="bold">(i³)</text>

        <!-- 90 Deg Arc 4 -->
        <path d="M 20 120 A 120 120 0 0 0 120 20" fill="none" stroke="#00ffcc" stroke-width="4"
            marker-end="url(#arrowOrb)" />
        <rect x="50" y="60" width="50" height="30" rx="5" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="75" y="80" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">× i</text>

        <!-- End label -->
        <text x="210" y="25" fill="#ffaa00" font-family="sans-serif" font-size="14" font-weight="bold">(i⁴ = 1
            복귀)</text>
    </g>

    <!-- Top Explanation -->
    <rect x="150" y="80" width="500" height="50" rx="10" fill="#112233" stroke="#4da6ff" stroke-width="2" />
    <text x="400" y="112" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">그 어떤 복소수라도 뒤에 <tspan fill="#00ffcc">i 를 곱하면 즉시 90도 좌회전!</tspan></text>

</svg>