<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">수학적 귀납법 2단계: 연쇄 타격 (Chain Reaction)</text>
    <text x="400" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">가정: n=k 가 쓰러지면 ➔
        증명: n=k+1 도 무조건 쓰러진다!</text>

    <!-- Ground Line -->
    <line x1="100" y1="350" x2="700" y2="350" stroke="#555" stroke-width="4" />

    <!-- Domino 1 (Already fallen, n=1, n=2...) -->
    <g transform="translate(150, 350) rotate(70)">
        <rect x="-40" y="-120" width="80" height="120" rx="5" fill="#555" stroke="#333" stroke-width="3"
            opacity="0.5" />
        <text x="0" y="-60" fill="#aaa" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">...</text>
    </g>

    <!-- Current Target Domino (n=k) Falling -->
    <g transform="translate(300, 350) rotate(45)">
        <!-- Motion trails -->
        <rect x="-40" y="-140" width="80" height="140" rx="5" fill="#ff4d4d" opacity="0.2" />
        <rect x="-40" y="-140" width="80" height="140" rx="5" fill="#ff4d4d" opacity="0.5" transform="rotate(-15)" />

        <!-- Action Domino -->
        <rect x="-40" y="-140" width="80" height="140" rx="5" fill="#2d2d44" stroke="#ff4d4d" stroke-width="4"
            filter="url(#glow)" />
        <text x="0" y="-70" fill="#ff4d4d" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">n=k</text>
    </g>

    <!-- Next Domino (n=k+1) Standing and getting hit -->
    <g transform="translate(480, 350)">
        <!-- Action Domino -->
        <rect x="-40" y="-140" width="80" height="140" rx="5" fill="#2d2d44" stroke="#00ffcc" stroke-width="4"
            filter="url(#glow)" />
        <text x="0" y="-70" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">n=k+1</text>
    </g>

    <!-- Second Next Domino (n=k+2) Waiting -->
    <g transform="translate(620, 350)">
        <!-- Action Domino -->
        <rect x="-40" y="-140" width="80" height="140" rx="5" fill="#1d1d2d" stroke="#555" stroke-width="3" />
        <text x="0" y="-70" fill="#aaa" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">n=k+2</text>
    </g>

    <!-- Impact & Logic Box -->
    <!-- Spark at collision point -->
    <circle cx="430" cy="230" r="10" fill="#ffffff" filter="url(#glow)" />
    <path d="M 430 230 L 410 210 M 430 230 L 410 250 M 430 230 L 450 210 M 430 230 L 450 250" stroke="#ffaa00"
        stroke-width="4" />

    <!-- Equation & Logic overlay -->
    <rect x="250" y="110" width="300" height="80" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2"
        filter="url(#glow)" />
    <text x="400" y="140" fill="#ff4d4d" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">가정: P(k) 가 참이라고 치자!</text>
    <path d="M 400 150 L 400 170" stroke="#00ffcc" stroke-width="3" marker-end="url(#arrow)" />
    <text x="400" y="180" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">결과: P(k+1) 식도 조립 증명 완성!</text>

    <!-- Bottom Explanatory Text Box -->
    <rect x="50" y="420" width="700" height="40" rx="5" fill="#552222" stroke="#ff4d4d" stroke-width="2" />
    <text x="400" y="445" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">이 타격 간격의 로직만 증명되면, 수백만 번째의 도미노도 앞놈 때문에 100% 무조건 쓰러지게 된다!</text>

</svg>