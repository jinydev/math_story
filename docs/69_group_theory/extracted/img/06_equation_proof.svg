<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <!-- Arrowhead markers -->
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffaa00" />
        </marker>
    </defs>

    <text x="400" y="40" fill="#ffffff" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">등식 증명 시각화: 목표 형태 (k+1) 조립하기</text>
    <text x="400" y="70" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">1부터 n까지의 합 공식 증명 과정
        로직</text>

    <!-- [1] Assumption Block -->
    <rect x="50" y="100" width="700" height="80" rx="10" fill="#2d2d44" stroke="#4da6ff" stroke-width="2" />
    <text x="80" y="130" fill="#4da6ff" font-family="sans-serif" font-size="18" font-weight="bold">① 치트키 식 (가정, n=k 일때
        무조건 참!)</text>

    <g font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">
        <!-- Left Equation -->
        <text x="250" y="160" fill="#ffffff">1 + 2 + ... + k</text>

        <text x="400" y="160" fill="#4da6ff">=</text>

        <!-- Right Equation -->
        <text x="550" y="150" fill="#ffffff">k(k + 1)</text>
        <line x1="500" y1="155" x2="600" y2="155" stroke="#ffffff" stroke-width="2" />
        <text x="550" y="175" fill="#ffffff">2</text>
    </g>

    <!-- Transform Arrow -->
    <g stroke="#ffaa00" stroke-width="3" stroke-dasharray="8,4" fill="none" class="arrows" marker-end="url(#arrow)">
        <path d="M 400 200 L 400 250" />
    </g>
    <rect x="250" y="210" width="300" height="30" rx="5" fill="#111111" stroke="#ffaa00" />
    <text x="400" y="230" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">양변에 똑같이 " +(k+1) " 을 더한다 (타격 개시)</text>

    <!-- [2] Execution Block -->
    <rect x="50" y="270" width="700" height="80" rx="10" fill="#1d1d2d" stroke="#ffaa00" stroke-width="2" />
    <text x="80" y="300" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold">② 변형 과정 (증명을 위한 억지
        개량)</text>

    <g font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">
        <!-- Left Equation -->
        <text x="210" y="330" fill="#aaaaaa">1+2+...+k</text>
        <text x="320" y="330" fill="#00ffcc" filter="url(#glow)">+ (k+1)</text>

        <text x="400" y="330" fill="#ffaa00">=</text>

        <!-- Right Equation -->
        <text x="490" y="325" fill="#aaaaaa">k(k+1) / 2</text>
        <text x="610" y="330" fill="#00ffcc" filter="url(#glow)">+ (k+1)</text>
    </g>

    <!-- Transform Arrow 2 -->
    <g stroke="#00ffcc" stroke-width="3" fill="none" class="arrows" marker-end="url(#arrow)">
        <path d="M 550 360 L 550 410" />
    </g>
    <text x="640" y="390" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">우변을 통분하여
        조립!</text>

    <!-- [3] Final Goal Block -->
    <rect x="50" y="430" width="700" height="110" rx="10" fill="#112211" stroke="#00ffcc" stroke-width="3"
        filter="url(#glow)" />
    <text x="80" y="460" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold">③ k+1 공식 형태 빙의 완료!
        (증명 100% 끝)</text>

    <g font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">
        <!-- Left Equation -->
        <text x="250" y="505" fill="#ffffff">1 + 2 + ... + (k+1)</text>

        <text x="400" y="505" fill="#00ffcc">=</text>

        <!-- Right Equation -->
        <text x="550" y="490" fill="#00ffcc">(k+1) (k+2)</text>
        <line x1="490" y1="500" x2="610" y2="500" stroke="#00ffcc" stroke-width="2" />
        <text x="550" y="520" fill="#00ffcc">2</text>
    </g>

</svg>