<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <!-- Glow filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">실수 수직선 (Real Number Line): 우주의 완전한 채움</text>

    <!-- Step 1: Rational Number Line (with holes) -->
    <text x="100" y="110" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold">1단계: 유리수 (Rational
        Numbers) 만 있는 세계</text>

    <g transform="translate(100, 150)">
        <!-- Base broken line -->
        <line x1="0" y1="0" x2="600" y2="0" stroke="#00ffcc" stroke-width="6" stroke-dasharray="10 5" opacity="0.5" />

        <!-- Integer ticks -->
        <line x1="100" y1="-10" x2="100" y2="10" stroke="#ffffff" stroke-width="2" />
        <text x="100" y="30" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">0</text>

        <line x1="300" y1="-10" x2="300" y2="10" stroke="#ffffff" stroke-width="2" />
        <text x="300" y="30" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">1</text>

        <line x1="500" y1="-10" x2="500" y2="10" stroke="#ffffff" stroke-width="2" />
        <text x="500" y="30" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">2</text>

        <!-- Fraction points -->
        <circle cx="200" cy="0" r="4" fill="#00ffcc" />
        <text x="200" y="-15" fill="#00ffcc" font-family="sans-serif" font-size="12" text-anchor="middle">1/2</text>

        <!-- Hole at 1.414 (root 2) -->
        <circle cx="382" cy="0" r="12" fill="#1a1a24" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="4"
            filter="url(#glow)" />
        <text x="382" y="-20" fill="#ff4d4d" font-family="monospace" font-size="12" text-anchor="middle">구멍
            (Hole!)</text>
    </g>

    <!-- Step 2: Irrationals fill in to make Reals -->
    <text x="100" y="260" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold">2단계: 실수 (Real
        Numbers) = 유리수 + 무리수 결합의 완성체</text>

    <g transform="translate(100, 310)">
        <!-- Base continuous golden line -->
        <line x1="0" y1="0" x2="600" y2="0" stroke="#ffaa00" stroke-width="8" filter="url(#glow)" />

        <!-- Integer ticks -->
        <line x1="100" y1="-10" x2="100" y2="10" stroke="#ffffff" stroke-width="2" />
        <text x="100" y="30" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">0</text>

        <line x1="300" y1="-10" x2="300" y2="10" stroke="#ffffff" stroke-width="2" />
        <text x="300" y="30" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">1</text>

        <line x1="500" y1="-10" x2="500" y2="10" stroke="#ffffff" stroke-width="2" />
        <text x="500" y="30" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">2</text>

        <!-- Pi at ~3.14 (scaled relative to 0 at 100, 1 is 200px) -> Pi is at 100 + 3.14*200 = 728... Wait, 2 is at 500. So we just show root 2 at 382.8 -->

        <!-- Dropping irrational block -->
        <path d="M 382.8 -60 L 382.8 -10" stroke="#ff4d4d" stroke-width="3" stroke-dasharray="5" />
        <polygon points="382.8,-10 387.8,-20 377.8,-20" fill="#ff4d4d" />

        <circle cx="382.8" cy="0" r="8" fill="#ff4d4d" filter="url(#glow)" />
        <text x="382.8" y="-70" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">무리수 √2</text>
        <text x="382.8" y="-90" fill="#ff4d4d" font-family="monospace" font-size="12"
            text-anchor="middle">1.414213...</text>

        <text x="630" y="5" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="start">단 1픽셀의 끊어짐 없는 무한 연속!</text>
    </g>

</svg>