<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">할선(Secant) 과 방멱의 정리: 파편 에너지 질량 보존 법칙</text>

    <!-- Left: Internal Intersection -->
    <g transform="translate(100, 100)">
        <rect x="0" y="0" width="350" height="380" rx="15" fill="#1b1111" stroke="#ff0055" stroke-width="3"
            filter="url(#glow)" />
        <text x="175" y="40" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">1. 내부 관통 십자 폭발 (Cross)</text>

        <circle cx="175" cy="190" r="100" fill="none" stroke="#555" stroke-width="3" />

        <!-- Lines intersecting inside -->
        <!-- Red Line AB -->
        <line x1="85" y1="147" x2="265" y2="233" stroke="#ff5555" stroke-width="5" />
        <circle cx="85" cy="147" r="5" fill="#ffffff" filter="url(#glow)" />
        <text x="65" y="140" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold">A</text>
        <circle cx="265" cy="233" r="5" fill="#ffffff" filter="url(#glow)" />
        <text x="280" y="245" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold">B</text>

        <!-- Blue Line CD -->
        <line x1="120" y1="273" x2="250" y2="124" stroke="#4da6ff" stroke-width="5" />
        <circle cx="120" cy="273" r="5" fill="#ffffff" filter="url(#glow)" />
        <text x="100" y="290" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold">C</text>
        <circle cx="250" cy="124" r="5" fill="#ffffff" filter="url(#glow)" />
        <text x="260" y="115" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold">D</text>

        <!-- Intersection P -->
        <circle cx="166" cy="186" r="6" fill="#ffff00" filter="url(#glow)" />
        <text x="160" y="170" fill="#ffff00" font-family="sans-serif" font-size="20" font-weight="bold">P</text>

        <text x="175" y="330" fill="#ffffff" font-family="monospace" font-size="22" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">
            <tspan fill="#ff5555">PA</tspan> × <tspan fill="#ff5555">PB</tspan> = <tspan fill="#4da6ff">PC</tspan> ×
            <tspan fill="#4da6ff">PD</tspan>
        </text>
    </g>

    <!-- Right: External Intersection -->
    <g transform="translate(480, 100)">
        <rect x="0" y="0" width="370" height="380" rx="15" fill="#0d1b1a" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="185" y="40" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">2. 외부 영거리 장거리 저격 타격</text>

        <circle cx="240" cy="200" r="90" fill="none" stroke="#555" stroke-width="3" />

        <!-- External Point P -->
        <circle cx="40" cy="200" r="6" fill="#ffff00" filter="url(#glow)" />
        <text x="20" y="205" fill="#ffff00" font-family="sans-serif" font-size="20" font-weight="bold">P</text>

        <!-- Red Secant line from P piercing circle at A and B -->
        <line x1="40" y1="200" x2="320" y2="159" stroke="#ff5555" stroke-width="4" />
        <circle cx="152" cy="194" r="5" fill="#ffffff" />
        <text x="145" y="180" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">A</text>
        <circle cx="328" cy="185" r="5" fill="#ffffff" filter="url(#glow)" />
        <text x="340" y="180" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">B</text>
        <!-- Redefine the visual to match a proper secant line from 40,200 into the circle -->
        <line x1="40" y1="200" x2="310" y2="140" stroke="#ffaa00" stroke-width="5" opacity="0.8" />
        <circle cx="160" cy="173" r="5" fill="#ffffff" />
        <text x="150" y="155" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">A</text>
        <circle cx="304" cy="141" r="5" fill="#ffffff" />
        <text x="315" y="130" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">B</text>

        <!-- Blue Secant line from P piercing circle at C and D -->
        <line x1="40" y1="200" x2="300" y2="280" stroke="#00ffcc" stroke-width="5" opacity="0.8" />
        <circle cx="165" cy="238" r="5" fill="#ffffff" />
        <text x="150" y="260" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">C</text>
        <circle cx="282" cy="274" r="5" fill="#ffffff" />
        <text x="295" y="295" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">D</text>

        <!-- Mixed Tangent-Secant line (Optional sub-theme shown below) -->
        <!-- Tangent T -->
        <line x1="40" y1="200" x2="200" y2="110" stroke="#ff00ff" stroke-width="4" stroke-dasharray="8 4" />
        <circle cx="199" cy="120" r="5" fill="#ffffff" />
        <text x="185" y="105" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">T</text>

        <text x="185" y="325" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">
            (진입 × 끝까지) 불변 공식!
        </text>
        <text x="185" y="355" fill="#ffffff" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">
            <tspan fill="#ffaa00">PA × PB</tspan> = <tspan fill="#00ffcc">PC × PD</tspan> = <tspan fill="#ff00ff">PT²
            </tspan>
        </text>
    </g>

    <!-- Bottom Explainer -->
    <rect x="150" y="500" width="600" height="70" rx="10" fill="#1b1122" stroke="#4da6ff" stroke-width="2" />
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        원이라는 신비로운 방어막 시스템에 부딪히는 순간
    </text>
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        <tspan fill="#ffff00" font-weight="bold">"첫 진입(스침) 길이 × 뚫고 지나간 총 누적 길이"</tspan> 의 곱셈량 질량은 완벽히 똑같게 스크립트화 렌더링 됩니다.
    </text>
</svg>