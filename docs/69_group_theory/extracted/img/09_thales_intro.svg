<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
                filter: url(#glow);
            }

            .pyramid {
                fill: rgba(255, 170, 100, 0.2);
                stroke: #ffaa64;
                stroke-width: 3;
            }

            .stick {
                stroke: #00ffff;
                stroke-width: 5;
                stroke-linecap: round;
            }

            .shadow {
                stroke: #30363d;
                stroke-width: 6;
                stroke-dasharray: 5, 5;
            }

            .sunray {
                stroke: #ffee55;
                stroke-width: 2;
                stroke-dasharray: 6, 4;
            }

            .sun {
                fill: #ffee55;
                filter: drop-shadow(0 0 10px #ffee55);
            }

            .math-triangle {
                fill: none;
                stroke: #ff6464;
                stroke-width: 2;
            }

            .label {
                fill: #ffffff;
                font-size: 16px;
                text-anchor: middle;
            }

            .title {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="40" class="title">탈레스의 AA 닮음 비례식: 대피라미드 측량술</text>
    <text x="400" y="65" class="desc">평행하게 들어오는 태양광선이 만들어내는 두 개의 직각삼각형은 항상 닮음이다</text>

    <!-- Sun -->
    <circle cx="720" cy="100" r="30" class="sun" />

    <!-- Ground -->
    <line x1="50" y1="320" x2="750" y2="320" stroke="#8b949e" stroke-width="2" />

    <!-- Pyramid System (A B C) -->
    <!-- Shadow (B C) -->
    <line x1="150" y1="320" x2="300" y2="320" class="shadow" />
    <text x="225" y="345" class="label" fill="#ffaa64">그림자 (292m)</text>

    <!-- Height (A B) -->
    <line x1="300" y1="320" x2="300" y2="120" stroke="#ffaa64" stroke-width="3" stroke-dasharray="8,4" />
    <text x="350" y="220" class="label" fill="#ffaa64">높이 x (미지수)</text>

    <!-- Sunray A C -->
    <line x1="150" y1="320" x2="600" y2="-280" class="sunray" />

    <polygon points="150,320 300,320 300,120" class="math-triangle" />
    <text x="300" y="105" class="label">A</text>
    <text x="315" y="325" class="label">B</text>
    <text x="135" y="325" class="label">C</text>

    <!-- Stick System (A' B' C') -->
    <!-- Shadow -->
    <line x1="500" y1="320" x2="560" y2="320" class="shadow" />
    <text x="530" y="345" class="label" fill="#00ffff">그림자 2m</text>

    <!-- Stick -->
    <line x1="560" y1="320" x2="560" y2="240" class="stick" />
    <text x="615" y="280" class="label" fill="#00ffff">지팡이 1m</text>

    <!-- Sunray -->
    <line x1="500" y1="320" x2="720" y2="26.6" class="sunray" />

    <polygon points="500,320 560,320 560,240" class="math-triangle" stroke="#00ffff" />
    <text x="560" y="225" class="label">A'</text>
    <text x="575" y="325" class="label">B'</text>
    <text x="485" y="325" class="label">C'</text>

    <!-- Right Angle markers -->
    <polyline points="285,320 285,305 300,305" fill="none" stroke="#ff6464" stroke-width="2" />
    <polyline points="545,320 545,305 560,305" fill="none" stroke="#ff6464" stroke-width="2" />

    <!-- Equation Box -->
    <rect x="50" y="360" width="700" height="30" fill="#161b22" rx="5" />
    <text x="400" y="380" fill="#64ff64" font-size="18" text-anchor="middle">작은 그림자(2) : 작은 지팡이(1) = 큰 그림자(292) : 큰 피라미드
        높이(X) ➔ X = 146m</text>

</svg>