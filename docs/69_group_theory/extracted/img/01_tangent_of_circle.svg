<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="40" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">접선(Tangent): 우주에서 가장 정밀한 스침의 마법</text>

    <!-- Left: The Magic of 90 degrees -->
    <g transform="translate(100, 100)">
        <rect x="0" y="0" width="350" height="400" rx="15" fill="#1b1122" stroke="#4da6ff" stroke-width="3"
            filter="url(#glow)" />

        <text x="175" y="40" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">1. 중심선과의 무조건 90도 (직각방패)</text>

        <!-- Circle -->
        <circle cx="175" cy="220" r="100" fill="none" stroke="#ffff00" stroke-width="3" />

        <!-- Tangent Line -->
        <line x1="20" y1="320" x2="330" y2="320" stroke="#ff0055" stroke-width="5" filter="url(#glow)" />
        <text x="330" y="315" fill="#ff0055" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="end">접선(Tangent)</text>

        <!-- Radius Line -->
        <line x1="175" y1="220" x2="175" y2="320" stroke="#00ffcc" stroke-width="4" stroke-dasharray="8 4" />

        <!-- Right Angle Symbol -->
        <path d="M 175 300 L 195 300 L 195 320" fill="none" stroke="#ffffff" stroke-width="3" />
        <rect x="182" y="307" width="6" height="6" fill="#00ffcc" filter="url(#glow)" />

        <circle cx="175" cy="220" r="6" fill="#00ffcc" />
        <text x="160" y="210" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold">배꼽(중심)</text>

        <!-- Point of Tangency spark -->
        <circle cx="175" cy="320" r="8" fill="#ffffff" filter="url(#glow)" />
        <circle cx="175" cy="320" r="4" fill="#ffff00" />
        <text x="175" y="345" fill="#ffff00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">접점 (Point of Tangency)</text>
    </g>

    <!-- Right: Twin Tangents from external point -->
    <g transform="translate(500, 100)">
        <rect x="0" y="0" width="350" height="400" rx="15" fill="#0d1b1a" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />

        <text x="175" y="40" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">2. 원 밖에서 쏜 쌍권총 (길이 복제)</text>

        <!-- Circle (Planet) -->
        <circle cx="220" cy="220" r="80" fill="none" stroke="#4da6ff" stroke-width="3" />
        <circle cx="220" cy="220" r="5" fill="#4da6ff" />

        <!-- External Point P -->
        <circle cx="40" cy="220" r="7" fill="#ffff00" filter="url(#glow)" />
        <text x="25" y="225" fill="#ffff00" font-family="sans-serif" font-size="20" font-weight="bold">P</text>

        <!-- Tangent lines -->
        <!-- Tangent 1 (Top) -->
        <line x1="40" y1="220" x2="183" y2="149" stroke="#ffaa00" stroke-width="4" />
        <circle cx="183" cy="149" r="6" fill="#ffffff" filter="url(#glow)" />
        <text x="170" y="140" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold">A</text>

        <!-- Tangent 2 (Bottom) -->
        <line x1="40" y1="220" x2="183" y2="291" stroke="#ffaa00" stroke-width="4" />
        <circle cx="183" cy="291" r="6" fill="#ffffff" filter="url(#glow)" />
        <text x="170" y="310" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold">B</text>

        <!-- Radii to tangency points -->
        <line x1="220" y1="220" x2="183" y2="149" stroke="#4da6ff" stroke-width="2" stroke-dasharray="5 5" />
        <line x1="220" y1="220" x2="183" y2="291" stroke="#4da6ff" stroke-width="2" stroke-dasharray="5 5" />
        <line x1="220" y1="220" x2="40" y2="220" stroke="#777" stroke-width="1" stroke-dasharray="3 3" />

        <!-- Right Angle symbols -->
        <path d="M 173 154 L 178 163 L 187 158" fill="none" stroke="#ffffff" stroke-width="2" />
        <path d="M 173 286 L 178 277 L 187 282" fill="none" stroke="#ffffff" stroke-width="2" />

        <!-- Equality markings -->
        <line x1="100" y1="175" x2="115" y2="195" stroke="#ff0055" stroke-width="3" />
        <line x1="110" y1="170" x2="125" y2="190" stroke="#ff0055" stroke-width="3" />

        <line x1="100" y1="265" x2="115" y2="245" stroke="#ff0055" stroke-width="3" />
        <line x1="110" y1="270" x2="125" y2="250" stroke="#ff0055" stroke-width="3" />

        <text x="175" y="370" fill="#ffaa00" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">Line PA = Line PB</text>
    </g>

    <!-- Bottom Explainer -->
    <rect x="150" y="530" width="600" height="50" rx="10" fill="#1b1111" stroke="#ff0055" stroke-width="2" />
    <text x="450" y="560" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        접선이 생기면 무조건 <tspan fill="#00ffcc" font-weight="bold">90도 수직 록다운</tspan>이 걸려 피타고라스 치트키 사용이 가능해집니다!
    </text>
</svg>