<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">곡률의 비밀 코딩: 위보기(Concave Up) vs 아래보기(Concave Down)</text>

    <!-- Panels for Up and Down -->

    <!-- Left Panel: U-shape Concave UP -->
    <g transform="translate(50, 120)">
        <!-- Box -->
        <rect x="0" y="0" width="380" height="350" rx="15" fill="#1b1111" stroke="#ff0055" stroke-width="3" />

        <!-- Title -->
        <text x="190" y="40" fill="#ff0055" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">아래로 볼록 (오목한 U자)</text>
        <text x="190" y="65" fill="#ffaa00" font-family="monospace" font-size="18" text-anchor="middle">f''(x) >
            0</text>

        <!-- Curve -->
        <path d="M 50 150 Q 190 350 330 150" fill="none" stroke="#ffffff" stroke-width="6" filter="url(#glow)" />

        <!-- Tangent lines below the curve -->
        <line x1="30" y1="130" x2="130" y2="290" stroke="#ff0055" stroke-width="3" stroke-dasharray="6 3" />
        <text x="70" y="180" fill="#ff0055" font-family="sans-serif" font-size="14" transform="rotate(58 70 180)">접선기울기
            깎임</text>

        <line x1="140" y1="290" x2="240" y2="290" stroke="#ff0055" stroke-width="3" stroke-dasharray="6 3" />
        <text x="190" y="310" fill="#ff0055" font-family="sans-serif" font-size="14" text-anchor="middle">기울기 0
            (증가중)</text>

        <line x1="250" y1="290" x2="350" y2="130" stroke="#ff0055" stroke-width="3" stroke-dasharray="6 3" />
        <text x="310" y="180" fill="#ff0055" font-family="sans-serif" font-size="14"
            transform="rotate(-58 310 180)">접선기울기 치솟음</text>

        <!-- Inner water filling visual -->
        <path d="M 50 150 Q 190 350 330 150 Z" fill="rgba(255, 0, 85, 0.2)" />

        <text x="190" y="160" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">물이 담기는 그릇 모양</text>
    </g>

    <!-- Right Panel: Upside down U-shape Concave DOWN -->
    <g transform="translate(470, 120)">
        <!-- Box -->
        <rect x="0" y="0" width="380" height="350" rx="15" fill="#001824" stroke="#00ffcc" stroke-width="3" />

        <!-- Title -->
        <text x="190" y="40" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">위로 볼록 (엎어진 우산)</text>
        <text x="190" y="65" fill="#00ffcc" font-family="monospace" font-size="18" text-anchor="middle">f''(x) &lt;
            0</text>

        <!-- Curve -->
        <path d="M 50 250 Q 190 50 330 250" fill="none" stroke="#ffffff" stroke-width="6" filter="url(#glow)" />

        <!-- Tangent lines above the curve -->
        <line x1="30" y1="270" x2="130" y2="110" stroke="#00ffcc" stroke-width="3" stroke-dasharray="6 3" />
        <text x="70" y="220" fill="#00ffcc" font-family="sans-serif" font-size="14" transform="rotate(-58 70 220)">접선기울기
            감소 시작</text>

        <line x1="140" y1="110" x2="240" y2="110" stroke="#00ffcc" stroke-width="3" stroke-dasharray="6 3" />
        <text x="190" y="90" fill="#00ffcc" font-family="sans-serif" font-size="14" text-anchor="middle">기울기 0
            (무너지는증)</text>

        <line x1="250" y1="110" x2="350" y2="270" stroke="#00ffcc" stroke-width="3" stroke-dasharray="6 3" />
        <text x="310" y="220" fill="#00ffcc" font-family="sans-serif" font-size="14"
            transform="rotate(58 310 220)">접선기울기 처박힘</text>

        <!-- Inner water draining visual -->
        <path d="M 50 250 Q 190 50 330 250 Z" fill="rgba(0, 255, 204, 0.2)" />

        <text x="190" y="230" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">물이 아래로 쏟아지는 산 모양</text>
    </g>

    <!-- Summary Banner -->
    <rect x="100" y="520" width="700" height="50" rx="10" fill="#0f0f15" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="550" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">
        2차 미분결과가 + 양수면 그릇(U자형), - 음수면 우산(엎어진 U자형)으로 그래픽 외형이 구부러집니다.
    </text>
</svg>