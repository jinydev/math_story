<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .polygon {
                fill: rgba(0, 255, 255, 0.1);
                stroke: #00ffff;
                stroke-width: 3;
                stroke-linejoin: round;
            }

            .polygon2 {
                fill: rgba(255, 170, 100, 0.1);
                stroke: #ffaa64;
                stroke-width: 3;
                stroke-linejoin: round;
            }

            .angle-arc {
                fill: none;
                stroke: #ffffff;
                stroke-width: 2;
            }

            .label {
                fill: #ffffff;
                font-size: 20px;
                text-anchor: middle;
            }

            .math-text {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .title {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
            }

            .desc {
                fill: #64ff64;
                font-size: 18px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="40" class="title">도형의 닮음(Similarity) 관계: 길이의 비와 불변의 각</text>
    <text x="400" y="70" class="desc">△ABC ∼ △A'B'C' (닮음비 1 : 2)</text>

    <!-- Small Triangle -->
    <!-- Base: 100, Height: 150 -->
    <g transform="translate(150, 150)">
        <polygon points="0,150 100,150 100,0" class="polygon" />

        <!-- Right angle -->
        <polyline points="85,150 85,135 100,135" fill="none" stroke="#ffffff" stroke-width="2" />
        <!-- Other angles -->
        <path d="M 30,150 A 30 30 0 0 0 16,125" class="angle-arc" stroke="#ffaa64" />
        <path d="M 100,40 A 40 40 0 0 0 74,38" class="angle-arc" stroke="#ffaa64" />

        <!-- Values -->
        <text x="50" y="175" class="label" fill="#00ffff">3</text>
        <text x="120" y="80" class="label" fill="#00ffff">4</text>
        <text x="40" y="60" class="label" fill="#00ffff">5</text>

        <text x="-15" y="165" class="label">B</text>
        <text x="115" y="165" class="label">C</text>
        <text x="100" y="-15" class="label">A</text>
    </g>

    <!-- Large Triangle -->
    <!-- Base: 200, Height: 300 -->
    <g transform="translate(450, 50)">
        <polygon points="0,300 200,300 200,0" class="polygon2" />

        <!-- Right angle -->
        <polyline points="170,300 170,270 200,270" fill="none" stroke="#ffffff" stroke-width="2" />
        <!-- Other angles -->
        <path d="M 60,300 A 60 60 0 0 0 32,250" class="angle-arc" stroke="#ffaa64" />
        <path d="M 200,80 A 80 80 0 0 0 148,76" class="angle-arc" stroke="#ffaa64" />

        <!-- Values -->
        <text x="100" y="325" class="label" fill="#ffaa64">6 (3×2)</text>
        <text x="250" y="160" class="label" fill="#ffaa64">8 (4×2)</text>
        <text x="70" y="130" class="label" fill="#ffaa64">10 (5×2)</text>

        <text x="-15" y="315" class="label">B'</text>
        <text x="215" y="315" class="label">C'</text>
        <text x="200" y="-15" class="label">A'</text>
    </g>

    <text x="320" y="230" class="label" font-size="30">~</text>
    <text x="320" y="260" class="math-text">확대</text>

</svg>