<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">UI 디스플레이와 사기꾼 해킹: 그래프의 두 얼굴</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"모든 것을 그림 하나로 설명하는
        궁극의 시각 렌더링. 하지만 눈금선(Scale) 하나로 대중을 농락할 수도 있다!"</text>

    <!-- Left Side: Types of UI Graphs -->
    <g transform="translate(100, 140)">
        <rect x="0" y="0" width="300" height="300" rx="15" fill="#001122" stroke="#4da6ff" stroke-width="3"
            filter="url(#glow)" />
        <text x="150" y="30" fill="#4da6ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">목적에 맞춘 UI 렌더링 선택</text>

        <!-- Bar Graph -->
        <g transform="translate(20, 60)">
            <rect x="0" y="60" width="30" height="40" fill="#00ffcc" />
            <rect x="40" y="20" width="30" height="80" fill="#00ffcc" />
            <rect x="80" y="80" width="30" height="20" fill="#00ffcc" />
            <line x1="0" y1="100" x2="120" y2="100" stroke="#fff" stroke-width="2" />
            <text x="60" y="115" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">양(Volume)
                절댓값 비교 투기장</text>
        </g>

        <!-- Pie Chart -->
        <g transform="translate(210, 100)">
            <circle cx="0" cy="0" r="40" fill="none" stroke="#fff" stroke-width="2" />
            <!-- Slice 1 (Big) -->
            <path d="M 0 0 L 0 -40 A 40 40 0 1 1 -30 25 Z" fill="#ffaa00" />
            <!-- Slice 2 -->
            <path d="M 0 0 L -30 25 A 40 40 0 0 1 0 -40 Z" fill="#ff5555" />
            <text x="0" y="60" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">전체 파이 비율
                (Market Share)</text>
        </g>

        <!-- Line Plot -->
        <g transform="translate(80, 200)">
            <line x1="0" y1="60" x2="140" y2="60" stroke="#fff" stroke-width="2" />
            <line x1="0" y1="60" x2="0" y2="0" stroke="#fff" stroke-width="2" />
            <path d="M 10 50 L 50 20 L 90 40 L 130 10" fill="none" stroke="#ff00ff" stroke-width="3"
                filter="url(#glow)" />
            <circle cx="10" cy="50" r="4" fill="#fff" />
            <circle cx="50" cy="20" r="4" fill="#fff" />
            <circle cx="90" cy="40" r="4" fill="#fff" />
            <circle cx="130" cy="10" r="4" fill="#fff" />
            <text x="70" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">시간 흐름 역동성
                (Time Series)</text>
        </g>
    </g>

    <!-- Right Side: Graphic Hack (Deception) -->
    <g transform="translate(480, 140)">
        <rect x="0" y="0" width="350" height="300" rx="15" fill="#220011" stroke="#ff5555" stroke-width="3"
            filter="url(#glow)" />
        <text x="175" y="30" fill="#ff5555" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">사기꾼 해킹: 물결표 스케일 조작</text>

        <!-- Honest Graph -->
        <g transform="translate(30, 80)">
            <text x="40" y="-10" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">정직한 그래프 (0축
                시작)</text>
            <line x1="0" y1="120" x2="0" y2="0" stroke="#fff" stroke-width="2" />
            <line x1="0" y1="120" x2="80" y2="120" stroke="#fff" stroke-width="2" />

            <!-- Tiny difference -->
            <rect x="10" y="20" width="20" height="100" fill="#00ffcc" />
            <rect x="50" y="18" width="20" height="102" fill="#00ffcc" />

            <text x="20" y="14" fill="#4da6ff" font-family="monospace" font-size="10">99</text>
            <text x="60" y="12" fill="#4da6ff" font-family="monospace" font-size="10">100</text>

            <text x="40" y="150" fill="#00ffcc" font-family="sans-serif" font-size="12" font-weight="bold"
                text-anchor="middle">고작 1 차이 (안 변함)</text>
        </g>

        <!-- Hackers Arrow -->
        <path d="M 140 140 L 190 140" fill="none" stroke="#ff5555" stroke-width="4" stroke-dasharray="5 5"
            marker-end="url(#arrow_r)" />
        <text x="165" y="130" fill="#ff5555" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">HACK!</text>

        <!-- Manipulated Graph -->
        <g transform="translate(220, 80)">
            <text x="50" y="-10" fill="#ff5555" font-family="sans-serif" font-size="14" font-weight="bold"
                text-anchor="middle">물결 꼼수 그래프</text>
            <line x1="0" y1="120" x2="0" y2="0" stroke="#fff" stroke-width="2" />
            <line x1="0" y1="120" x2="100" y2="120" stroke="#fff" stroke-width="2" />

            <!-- Squiggly cut-off -->
            <path d="M -10 100 Q 0 90 10 100 T 20 100" fill="none" stroke="#ffbb00" stroke-width="3" />
            <path d="M -10 105 Q 0 95 10 105 T 20 105" fill="none" stroke="#ffbb00" stroke-width="3" />
            <text x="-25" y="110" fill="#ffbb00" font-family="monospace" font-size="14">≈</text>

            <!-- Huge fake difference -->
            <rect x="20" y="80" width="30" height="20" fill="#ff5555" />
            <rect x="70" y="20" width="30" height="80" fill="#ff5555" />

            <text x="35" y="75" fill="#ffaa00" font-family="monospace" font-size="14">99</text>
            <text x="85" y="15" fill="#ffaa00" font-family="monospace" font-size="14">100</text>
            <text x="50" y="150" fill="#ff5555" font-family="sans-serif" font-size="12" font-weight="bold"
                text-anchor="middle">4배 폭등한 것처럼 환각 유발!</text>
        </g>
    </g>

    <defs>
        <marker id="arrow_r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ff5555" />
        </marker>
    </defs>

    <!-- Base Explain -->
    <rect x="100" y="470" width="700" height="80" rx="10" fill="#110505" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="500" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        통계학자는 가장 강력한 설득 무기인 수많은 그래프 UI 엔진 라이브러리(Matplotlib 등) 를 제어합니다.
    </text>
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        하지만 이 무기를 악용하여 밑기둥을 <tspan fill="#ff00ff" font-weight="bold">물결 기호(≈) 로 잘라버리는 스케일 조작술</tspan> 은 방어할 줄 알아야 합니다.
    </text>
</svg>