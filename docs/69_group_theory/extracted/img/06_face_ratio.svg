<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .face {
                fill: rgba(255, 255, 255, 0.05);
                stroke: #8b949e;
                stroke-width: 3;
            }

            .eye {
                fill: none;
                stroke: #8b949e;
                stroke-width: 3;
            }

            .nose {
                fill: none;
                stroke: #8b949e;
                stroke-width: 3;
            }

            .mouth {
                fill: none;
                stroke: #8b949e;
                stroke-width: 3;
            }

            .ratio-line {
                fill: none;
                stroke: #00ffff;
                stroke-width: 2;
                stroke-dasharray: 6, 4;
            }

            .ratio-measure {
                fill: none;
                stroke: #ffaa64;
                stroke-width: 2;
                marker-end: url(#arrow);
                marker-start: url(#arrow);
            }

            .title {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
            }

            .label {
                fill: #ffaa64;
                font-size: 16px;
                text-anchor: middle;
            }

            .phi {
                fill: #00ffff;
                font-size: 20px;
                font-weight: bold;
            }
        </style>
        <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
            <circle cx="3" cy="3" r="3" fill="#ffaa64" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="300" y="40" class="title">얼굴 속의 황금비율 (Facial Golden Ratio)</text>

    <g transform="translate(150, 100)">
        <!-- Abstract Face Outline -->
        <ellipse cx="150" cy="200" rx="120" ry="180" class="face" />

        <!-- Eyes -->
        <path d="M 80 150 Q 100 130 120 150 Q 100 170 80 150 Z" class="eye" />
        <path d="M 180 150 Q 200 130 220 150 Q 200 170 180 150 Z" class="eye" />
        <circle cx="100" cy="150" r="5" fill="#8b949e" />
        <circle cx="200" cy="150" r="5" fill="#8b949e" />

        <!-- Nose -->
        <path d="M 150 150 L 135 240 L 150 250 L 165 240 Z" class="nose" />

        <!-- Mouth -->
        <path d="M 110 300 Q 150 280 190 300 Q 150 320 110 300 Z" class="mouth" />
        <path d="M 110 300 Q 150 300 190 300" class="mouth" />

        <!-- Golden Ratio Lines & Measurements -->

        <!-- Vertical 1/3 Divisions (approximate 1 : 1 : 1 conceptually, but showing Phi internally) -->
        <!-- Hairline to Eyebrow (1) -->
        <path d="M -20 20 L 320 20" class="ratio-line" />
        <path d="M -20 130 L 320 130" class="ratio-line" />
        <path d="M 340 20 L 340 130" class="ratio-measure" />
        <text x="360" y="80" class="label">1</text>

        <!-- Eyebrow to Nose Base (1) -->
        <path d="M -20 250 L 320 250" class="ratio-line" />
        <path d="M 340 130 L 340 250" class="ratio-measure" />
        <text x="360" y="195" class="label">1</text>

        <!-- Nose Base to Chin (1) -->
        <path d="M -20 380 L 320 380" class="ratio-line" />
        <path d="M 340 250 L 340 380" class="ratio-measure" />
        <text x="360" y="320" class="label">1</text>

        <!-- Nose Width vs Mouth Width = 1 : 1.618 -->
        <path d="M 135 250 L 135 410" class="ratio-line" stroke-dasharray="2,2" />
        <path d="M 165 250 L 165 410" class="ratio-line" stroke-dasharray="2,2" />
        <path d="M 135 400 L 165 400" class="ratio-measure" />
        <text x="150" y="430" class="label">1 (코 폭)</text>

        <path d="M 110 300 L 110 460" class="ratio-line" stroke-dasharray="2,2" />
        <path d="M 190 300 L 190 460" class="ratio-line" stroke-dasharray="2,2" />
        <path d="M 110 450 L 190 450" class="ratio-measure" stroke="#00ffff" />
        <text x="150" y="480" class="phi" fill="#00ffff">1.618 (입 폭)</text>

        <!-- Width of Eye vs Distance between eyes = 1 : 1.618 -->
        <path d="M 120 150 L 180 150" class="ratio-measure" stroke="#00ffff" />
        <text x="150" y="140" class="phi">1.618 (미간)</text>

        <path d="M 80 110 L 80 150" class="ratio-line" />
        <path d="M 120 110 L 120 150" class="ratio-line" />
        <path d="M 80 120 L 120 120" class="ratio-measure" />
        <text x="100" y="105" class="label">1(눈 폭)</text>

    </g>
</svg>