<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">가우스의 덧셈 (등차수열의 합 원리)</text>

    <!-- Total Sum Box -->
    <g transform="translate(150, 100)">

        <!-- Top Row (Forward) -->
        <text x="-40" y="0" fill="#aaaaaa" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">정상:</text>
        <text x="30" y="0" fill="#4da6ff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">1</text>
        <text x="80" y="-5" fill="#ffffff" font-family="monospace" font-size="25" font-weight="bold"
            text-anchor="middle">+</text>
        <text x="130" y="0" fill="#4da6ff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">2</text>
        <text x="180" y="-5" fill="#ffffff" font-family="monospace" font-size="25" font-weight="bold"
            text-anchor="middle">+</text>
        <text x="230" y="0" fill="#4da6ff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">3</text>
        <text x="290" y="0" fill="#ffffff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">...</text>
        <text x="350" y="-5" fill="#ffffff" font-family="monospace" font-size="25" font-weight="bold"
            text-anchor="middle">+</text>
        <text x="420" y="0" fill="#4da6ff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">100</text>
        <text x="500" y="0" fill="#ffffff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">= S_n</text>

        <!-- Bottom Row (Backward) -->
        <text x="-40" y="60" fill="#aaaaaa" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">거꾸로:</text>
        <text x="30" y="60" fill="#ffaa00" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">100</text>
        <text x="80" y="55" fill="#ffffff" font-family="monospace" font-size="25" font-weight="bold"
            text-anchor="middle">+</text>
        <text x="130" y="60" fill="#ffaa00" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">99</text>
        <text x="180" y="55" fill="#ffffff" font-family="monospace" font-size="25" font-weight="bold"
            text-anchor="middle">+</text>
        <text x="230" y="60" fill="#ffaa00" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">98</text>
        <text x="290" y="60" fill="#ffffff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">...</text>
        <text x="350" y="55" fill="#ffffff" font-family="monospace" font-size="25" font-weight="bold"
            text-anchor="middle">+</text>
        <text x="420" y="60" fill="#ffaa00" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">1</text>
        <text x="500" y="60" fill="#ffffff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">= S_n</text>

        <!-- Adding Line -->
        <line x1="-80" y1="80" x2="560" y2="80" stroke="#ffffff" stroke-width="2" />
        <text x="-70" y="70" fill="#00ffcc" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">+</text>

        <!-- Result Row (Pair Sums) -->
        <text x="-40" y="120" fill="#aaaaaa" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">합계:</text>
        <text x="30" y="120" fill="#00ffcc" font-family="monospace" font-size="35" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">101</text>
        <text x="80" y="115" fill="#ffffff" font-family="monospace" font-size="25" font-weight="bold"
            text-anchor="middle">+</text>
        <text x="130" y="120" fill="#00ffcc" font-family="monospace" font-size="35" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">101</text>
        <text x="180" y="115" fill="#ffffff" font-family="monospace" font-size="25" font-weight="bold"
            text-anchor="middle">+</text>
        <text x="230" y="120" fill="#00ffcc" font-family="monospace" font-size="35" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">101</text>
        <text x="290" y="120" fill="#ffffff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">...</text>
        <text x="350" y="115" fill="#ffffff" font-family="monospace" font-size="25" font-weight="bold"
            text-anchor="middle">+</text>
        <text x="420" y="120" fill="#00ffcc" font-family="monospace" font-size="35" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">101</text>
        <text x="500" y="120" fill="#ffffff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">= 2 S_n</text>

        <!-- Pair highlights -->
        <rect x="-5" y="-30" width="70" height="160" rx="10" fill="none" stroke="#00ffcc" stroke-width="2"
            stroke-dasharray="5" />
        <rect x="95" y="-30" width="70" height="160" rx="10" fill="none" stroke="#00ffcc" stroke-width="2"
            stroke-dasharray="5" />
        <rect x="385" y="-30" width="70" height="160" rx="10" fill="none" stroke="#00ffcc" stroke-width="2"
            stroke-dasharray="5" />

    </g>

    <!-- Explanation Text -->
    <rect x="150" y="280" width="500" height="90" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
    <text x="400" y="315" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">모든 쌍의 합이 <tspan fill="#00ffcc">101</tspan> 로 똑같아진다!</text>
    <text x="400" y="345" fill="#00ffcc" font-family="sans-serif" font-size="24" font-weight="bold"
        text-anchor="middle">2 × 총합 = 101 × 100개 ➔ 총합 = 5050</text>

</svg>