<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">외심 (Circumcenter): 세 꼭짓점을 지나는 거대한 원</text>

    <g transform="translate(250, 250)">

        <!-- Circumcircle -->
        <circle cx="0" cy="0" r="150" fill="none" stroke="#4da6ff" stroke-width="4" filter="url(#glow)" />

        <!-- Triangle Vertices ABC -->
        <!-- A = (0, -150) -->
        <!-- B = (-130, 75) -->
        <!-- C = (130, 75) -->
        <path d="M 0 -150 L -130 75 L 130 75 Z" fill="none" stroke="#ffffff" stroke-width="3" />

        <!-- Perpendicular Bisectors -->
        <!-- Side BC: midpoint (0, 75) -> perp bisector is verical line through 0 -->
        <line x1="0" y1="120" x2="0" y2="0" stroke="#ffaa00" stroke-width="2" stroke-dasharray="8 6" />

        <!-- Side AB: midpoint (-65, -37.5) -> slope = (-150-75)/(0 - -130) = -225/130 = -1.73. Perp slope = 0.57 
         Through origin (0,0) and (-65, -37.5). Indeed, passes through origin. -->
        <line x1="-100" y1="-57.7" x2="0" y2="0" stroke="#ffaa00" stroke-width="2" stroke-dasharray="8 6" />

        <!-- Side CA: midpoint (65, -37.5) -> perp bisector passes through origin -->
        <line x1="100" y1="-57.7" x2="0" y2="0" stroke="#ffaa00" stroke-width="2" stroke-dasharray="8 6" />

        <!-- Circumcenter Point O -->
        <circle cx="0" cy="0" r="6" fill="#ffaa00" filter="url(#glow)" />
        <text x="-25" y="-10" fill="#ffaa00" font-family="monospace" font-size="24" font-weight="bold"
            filter="url(#glow)">O</text>

        <!-- Radius Lines to Vertices -->
        <line x1="0" y1="0" x2="0" y2="-150" stroke="#00ffcc" stroke-width="3" />
        <line x1="0" y1="0" x2="-130" y2="75" stroke="#00ffcc" stroke-width="3" />
        <line x1="0" y1="0" x2="130" y2="75" stroke="#00ffcc" stroke-width="3" />

        <!-- Labels for Villages -->
        <circle cx="0" cy="-150" r="8" fill="#ff4d4d" />
        <text x="0" y="-165" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">A 마을</text>

        <circle cx="-130" cy="75" r="8" fill="#ff4d4d" />
        <text x="-160" y="95" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">B 마을</text>

        <circle cx="130" cy="75" r="8" fill="#ff4d4d" />
        <text x="160" y="95" fill="#ff4d4d" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">C 마을</text>

        <!-- Distance Labels -->
        <text x="30" y="-60" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold">R</text>
        <text x="-80" y="30" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold">R</text>
        <text x="50" y="30" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold">R</text>
    </g>

    <!-- Explanation Texts -->
    <rect x="550" y="150" width="230" height="200" rx="15" fill="#112233" stroke="#ffaa00" stroke-width="2" />
    <text x="570" y="185" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold">핵심 법칙</text>

    <rect x="570" y="200" width="10" height="10" fill="#ffaa00" />
    <text x="590" y="210" fill="#ffffff" font-family="sans-serif" font-size="16">수직이등분선의</text>
    <text x="590" y="235" fill="#ffffff" font-family="sans-serif" font-size="16">교점에서 만난다.</text>

    <rect x="570" y="270" width="10" height="10" fill="#00ffcc" />
    <text x="590" y="280" fill="#ffffff" font-family="sans-serif" font-size="16">각 마을(꼭짓점)</text>
    <text x="590" y="305" fill="#ffffff" font-family="sans-serif" font-size="16">까지의 거리가</text>
    <text x="590" y="330" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold">모두 반경 R로 같다!</text>

    <!-- Bottom Subtitle -->
    <rect x="150" y="440" width="500" height="40" rx="10" fill="#2b1111" stroke="#ff4d4d" stroke-width="2" />
    <text x="400" y="465" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">세 마을(A, B, C)에서 도착
        시간이 <tspan fill="#ff4d4d" font-weight="bold">완벽하게 동일한 소방서(O)의 위치</tspan></text>

</svg>