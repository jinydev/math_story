<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">중복조합 알고리즘 해제: 별과 막대기(Stars and Bars) 기법</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"3차원의 아이스크림 맛(구역) 을
        1차원 빈 공간(Index) 배열 시스템으로 강제 다운그레이드하라!"</text>

    <!-- Top: The Problem Statement -->
    <g transform="translate(100, 130)">
        <rect x="-20" y="-30" width="740" height="70" rx="10" fill="#112233" stroke="#4da6ff" stroke-width="2" />
        <text x="350" y="10" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">미션: 3가지 맛 중에서 중복을 허용하여 총 4스쿱을 골라라! (₃H₄)</text>
    </g>

    <!-- Middle Left: The Conceptual Setup (Stars and Bars) -->
    <g transform="translate(120, 240)">
        <rect x="-30" y="-30" width="300" height="150" rx="10" fill="#001122" stroke="#00ffcc" stroke-width="2" />
        <text x="120" y="0" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">1. 변환 로직 (Metaphor)</text>

        <!-- Stars -->
        <text x="-10" y="40" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">필요한 스쿱(4개)
            =</text>
        <text x="140" y="45" fill="#ffff00" font-family="sans-serif" font-size="24" filter="url(#glow)">⭐ ⭐ ⭐ ⭐</text>

        <!-- Bars -->
        <text x="-10" y="80" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">구역 구분(3가지)
            =</text>
        <rect x="140" y="65" width="6" height="20" fill="#ff00ff" filter="url(#glow)" />
        <rect x="160" y="65" width="6" height="20" fill="#ff00ff" filter="url(#glow)" />
        <text x="180" y="80" fill="#ff00ff" font-family="sans-serif" font-size="14" font-weight="bold">막대기 2개
            (N-1)</text>

        <text x="120" y="110" fill="#aaaaaa" font-family="monospace" font-size="14" text-anchor="middle">총 6개의 '빈
            칸(Index)' 이 생성됨!</text>
    </g>

    <!-- Middle Right: The Array Placement execution -->
    <g transform="translate(480, 240)">
        <rect x="-20" y="-30" width="360" height="150" rx="10" fill="#1a0011" stroke="#ff00ff" stroke-width="2" />
        <text x="160" y="0" fill="#ff00ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">2. 배열 시뮬레이션 (1차원 Array)</text>

        <!-- Example Array 1 -->
        <text x="0" y="40" fill="#aaaaaa" font-family="monospace" font-size="14">Case A:</text>
        <!-- Slots -->
        <rect x="60" y="25" width="230" height="30" fill="none" stroke="#555" />
        <text x="80" y="45" fill="#ffff00" font-size="18">⭐</text>
        <rect x="100" y="27" width="4" height="26" fill="#ff00ff" />
        <text x="120" y="45" fill="#ffff00" font-size="18">⭐</text>
        <text x="150" y="45" fill="#ffff00" font-size="18">⭐</text>
        <rect x="180" y="27" width="4" height="26" fill="#ff00ff" />
        <text x="210" y="45" fill="#ffff00" font-size="18">⭐</text>
        <!-- Result Decode -->
        <text x="300" y="45" fill="#4da6ff" font-family="sans-serif" font-size="12">딸기 1 / 바닐라 2 / 메론 1</text>

        <!-- Example Array 2 -->
        <text x="0" y="90" fill="#aaaaaa" font-family="monospace" font-size="14">Case B:</text>
        <!-- Slots -->
        <rect x="60" y="75" width="230" height="30" fill="none" stroke="#555" />
        <text x="80" y="95" fill="#ffff00" font-size="18">⭐</text>
        <text x="110" y="95" fill="#ffff00" font-size="18">⭐</text>
        <text x="140" y="95" fill="#ffff00" font-size="18">⭐</text>
        <text x="170" y="95" fill="#ffff00" font-size="18">⭐</text>
        <rect x="210" y="77" width="4" height="26" fill="#ff00ff" />
        <rect x="240" y="77" width="4" height="26" fill="#ff00ff" />
        <!-- Result Decode -->
        <text x="300" y="95" fill="#4da6ff" font-family="sans-serif" font-size="12">딸기 4 / 바닐라 0 / 메론 0</text>
    </g>

    <!-- Big Computation Arrow -->
    <path d="M 450 420 L 450 450" fill="none" stroke="#ffff00" stroke-width="4" marker-end="url(#arrow_y)" />

    <defs>
        <marker id="arrow_y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
        </marker>
    </defs>

    <!-- Bottom: The Final Math Algorithm -->
    <g transform="translate(100, 470)">
        <rect x="0" y="0" width="700" height="80" rx="10" fill="#221100" stroke="#ffaa00" stroke-width="3" />
        <text x="350" y="30" fill="#ffaa00" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">결론: 총 6개의 빈 자리 중에서, 2개의 '막대기 자리' 만 고르면 끝!</text>
        <text x="350" y="60" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">₃H₄ = ₆C₂ = (6 × 5) / (2 × 1) = 15 가지</text>
    </g>

</svg>