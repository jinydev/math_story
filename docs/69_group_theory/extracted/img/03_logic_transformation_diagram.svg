<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .circle {
                fill: #161b22;
                stroke: #30363d;
                stroke-width: 4;
            }

            .glow-orig {
                stroke: #00ffff;
                box-shadow: 0 0 10px #00ffff;
            }

            .glow-contra {
                stroke: #ff00ff;
                box-shadow: 0 0 10px #ff00ff;
            }

            .math {
                font-size: 30px;
                text-anchor: middle;
                alignment-baseline: middle;
                fill: #ffffff;
            }

            .arrow-line {
                fill: none;
                stroke-width: 4;
                stroke-dasharray: 6, 6;
            }

            .arrow-label {
                font-size: 18px;
                text-anchor: middle;
                font-weight: bold;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="400" y="40" class="title">명제의 3단 트랜스폼 네트워크 (역, 이, 대우)</text>
    <text x="400" y="65" class="desc">대우(Contrapositive)는 원본 명제와 참/거짓 운명을 영원히 공유한다!</text>

    <!-- Network Layout -->
    <!-- Top Left: p -> q (Original) -->
    <g transform="translate(200, 150)">
        <circle cx="0" cy="0" r="50" class="circle glow-orig" />
        <text x="0" y="0" class="math" fill="#00ffff">p → q</text>
        <text x="0" y="-70" fill="#00ffff" font-size="20" font-weight="bold" text-anchor="middle">[본 명제]</text>
    </g>

    <!-- Top Right: q -> p (Converse) -->
    <g transform="translate(600, 150)">
        <circle cx="0" cy="0" r="50" class="circle" />
        <text x="0" y="0" class="math">q → p</text>
        <text x="0" y="-70" fill="#ffffff" font-size="20" text-anchor="middle">[역]</text>
    </g>

    <!-- Bottom Left: ~p -> ~q (Inverse) -->
    <g transform="translate(200, 350)">
        <circle cx="0" cy="0" r="50" class="circle" />
        <text x="0" y="0" class="math">~p → ~q</text>
        <text x="0" y="80" fill="#ffffff" font-size="20" text-anchor="middle">[이]</text>
    </g>

    <!-- Bottom Right: ~q -> ~p (Contrapositive) -->
    <g transform="translate(600, 350)">
        <circle cx="0" cy="0" r="50" class="circle glow-contra" />
        <text x="0" y="0" class="math" fill="#ff00ff">~q → ~p</text>
        <text x="0" y="80" fill="#ff00ff" font-size="20" font-weight="bold" text-anchor="middle">[대우]</text>
    </g>

    <!-- Connections -->
    <!-- Horizontal Top (Reverse direction, 역) -->
    <path d="M 270 150 L 530 150" class="arrow-line" stroke="#aaa" />
    <rect x="375" y="135" width="50" height="30" fill="#0d1117" />
    <text x="400" y="155" class="arrow-label" fill="#aaa">역</text>

    <!-- Vertical Left (Negate both, 이) -->
    <path d="M 200 220 L 200 280" class="arrow-line" stroke="#aaa" />
    <rect x="185" y="235" width="30" height="30" fill="#0d1117" />
    <text x="200" y="255" class="arrow-label" fill="#aaa">이</text>

    <!-- Horizontal Bottom (역) -->
    <path d="M 270 350 L 530 350" class="arrow-line" stroke="#aaa" />
    <rect x="375" y="335" width="50" height="30" fill="#0d1117" />
    <text x="400" y="355" class="arrow-label" fill="#aaa">역</text>

    <!-- Vertical Right (이) -->
    <path d="M 600 220 L 600 280" class="arrow-line" stroke="#aaa" />
    <rect x="585" y="235" width="30" height="30" fill="#0d1117" />
    <text x="600" y="255" class="arrow-label" fill="#aaa">이</text>

    <!-- Big Diagonals (Contrapositive / 대우) -->
    <path d="M 250 190 L 550 310" class="arrow-line" stroke="#00ff00" stroke-width="6" stroke-dasharray="0" />
    <path d="M 250 310 L 550 190" class="arrow-line" stroke="#00ff00" stroke-width="6" stroke-dasharray="0" />

    <rect x="350" y="235" width="100" height="30" fill="#0d1117" />
    <text x="400" y="255" class="arrow-label" fill="#00ff00" font-size="22">대우 (공동체)</text>

</svg>