<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">해커의 그래프 개형 스케치 (증감표 → 렌더링)</text>

    <!-- Split View -->

    <!-- Top View: Table of Variations (증감표) -->
    <g transform="translate(150, 80)">
        <rect x="0" y="0" width="600" height="150" rx="10" fill="#0d1a26" stroke="#00ffcc" stroke-width="2" />
        <text x="300" y="30" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">Step 1: 증감표 (Table of Variations) 데이터 수집</text>

        <!-- Table Grid -->
        <line x1="100" y1="45" x2="100" y2="135" stroke="#334455" stroke-width="2" />
        <line x1="20" y1="75" x2="580" y2="75" stroke="#334455" stroke-width="2" />
        <line x1="20" y1="105" x2="580" y2="105" stroke="#334455" stroke-width="2" />

        <!-- Row Data -->
        <text x="60" y="65" fill="#aaaaaa" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">x 좌표</text>
        <text x="60" y="95" fill="#aaaaaa" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">f'(x)</text>
        <text x="60" y="125" fill="#aaaaaa" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">f(x)</text>

        <!-- Columns Data -->
        <!-- Col 1 -->
        <text x="160" y="65" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">···</text>
        <text x="160" y="95" fill="#ff0055" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">+</text>
        <text x="160" y="125" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">↗</text>

        <!-- Col 2: Peak -->
        <text x="260" y="65" fill="#00ffcc" font-family="monospace" font-size="16" text-anchor="middle">-2</text>
        <rect x="235" y="80" width="50" height="20" fill="#555500" />
        <text x="260" y="95" fill="#ffff00" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">0</text>
        <rect x="220" y="110" width="80" height="20" fill="#551122" />
        <text x="260" y="125" fill="#ff0055" font-family="sans-serif" font-size="14" text-anchor="middle">극대 (10)</text>

        <!-- Col 3 -->
        <text x="360" y="65" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">···</text>
        <text x="360" y="95" fill="#00ffcc" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">-</text>
        <text x="360" y="125" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">↘</text>

        <!-- Col 4: Valley -->
        <text x="460" y="65" fill="#00ffcc" font-family="monospace" font-size="16" text-anchor="middle">1</text>
        <rect x="435" y="80" width="50" height="20" fill="#555500" />
        <text x="460" y="95" fill="#ffff00" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">0</text>
        <rect x="420" y="110" width="80" height="20" fill="#113322" />
        <text x="460" y="125" fill="#00ffcc" font-family="sans-serif" font-size="14" text-anchor="middle">극소 (-5)</text>

        <!-- Col 5 -->
        <text x="540" y="65" fill="#ffffff" font-family="monospace" font-size="16" text-anchor="middle">···</text>
        <text x="540" y="95" fill="#ff0055" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">+</text>
        <text x="540" y="125" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">↗</text>
    </g>

    <!-- Downward Arrow connecting -->
    <path d="M 450 240 L 450 270" stroke="#ffaa00" stroke-width="4" marker-end="url(#arrow_down)" />
    <defs>
        <marker id="arrow_down" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffaa00" />
        </marker>
    </defs>

    <!-- Bottom View: The Plot -->
    <g transform="translate(150, 290)">
        <rect x="0" y="0" width="600" height="230" rx="10" fill="#110d1a" stroke="#4da6ff" stroke-width="2" />
        <text x="300" y="30" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">Step 2: 2D 캔버스 3차 뼈대 렌더링</text>

        <!-- Grid / Axes -->
        <line x1="50" y1="140" x2="550" y2="140" stroke="#334455" stroke-width="2" /> <!-- x axis -->
        <line x1="300" y1="50" x2="300" y2="210" stroke="#334455" stroke-width="2" /> <!-- y axis -->

        <!-- Coordinate points from table -->
        <!-- Peak: (-2, 10) -> Screen: x=150, y=70 -->
        <!-- Valley: (1, -5) -> Screen: x=360, y=190 -->

        <path d="M 50 180 C 100 80, 230 70, 255 130 S 410 190, 550 50" fill="none" stroke="#ffaa00" stroke-width="6"
            filter="url(#glow)" />

        <!-- Peak Dot -->
        <circle cx="210" cy="70" r="8" fill="#ff0055" stroke="#fff" stroke-width="2" />
        <path d="M 210 140 L 210 70" stroke="#ff0055" stroke-width="2" stroke-dasharray="4 4" />
        <text x="210" y="160" fill="#00ffcc" font-family="monospace" font-size="14" text-anchor="middle">-2</text>
        <text x="210" y="55" fill="#ff0055" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">(-2, 10) 극대</text>

        <!-- Valley Dot -->
        <circle cx="360" cy="180" r="8" fill="#00ffcc" stroke="#fff" stroke-width="2" />
        <path d="M 360 140 L 360 180" stroke="#00ffcc" stroke-width="2" stroke-dasharray="4 4" />
        <text x="360" y="130" fill="#00ffcc" font-family="monospace" font-size="14" text-anchor="middle">1</text>
        <text x="360" y="200" fill="#00ffcc" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">(1, -5) 극소</text>

        <!-- Y Intercept Bonus -->
        <!-- Intersects Y axis at around y=110 -->
        <circle cx="300" cy="130" r="6" fill="#ffffff" />
        <text x="320" y="135" fill="#aaaaaa" font-family="sans-serif" font-size="12">Y절편</text>

    </g>

    <!-- Explanation Footer -->
    <rect x="150" y="540" width="600" height="40" rx="10" fill="#0f0f15" stroke="#ffaa00" stroke-width="2" />
    <text x="450" y="565" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        증감표의 <tspan fill="#ff0055" font-weight="bold">↗ ↘ 화살표 윤곽선</tspan>을 따라 좌표 공간에 극값 기둥 두 개를 찍고 스무스하게 잇습니다.
    </text>
</svg>