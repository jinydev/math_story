<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">산술평균 vs 기하평균 (최적화 결계 방어막)</text>

    <!-- Equation -->
    <rect x="150" y="80" width="600" height="80" rx="40" fill="#112233" stroke="#00ffcc" stroke-width="3"
        filter="url(#glow)" />
    <text x="450" y="130" fill="#ffffff" font-family="serif" font-size="36" font-weight="bold" text-anchor="middle">(a +
        b) / 2 ≥ √(ab)</text>

    <!-- Left Side: Arithmetic Mean (Fence) -->
    <g transform="translate(150, 250)">
        <rect x="0" y="0" width="250" height="250" rx="10" fill="#221122" stroke="#ffaa00" stroke-width="2" />
        <text x="125" y="40" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">산술 렌더링 (합)</text>
        <text x="125" y="70" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">더해서 나눈 평범한 일상
            값</text>

        <!-- Bar Chart -->
        <rect x="50" y="180" width="40" height="40" fill="#ffaa00" />
        <text x="70" y="170" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">a=2</text>

        <rect x="110" y="100" width="40" height="120" fill="#ff0055" />
        <text x="130" y="90" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">b=8</text>

        <line x1="30" y1="140" x2="220" y2="140" stroke="#00ffcc" stroke-width="3" stroke-dasharray="8 4"
            filter="url(#glow)" />
        <text x="190" y="130" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">AM = 5</text>
    </g>

    <!-- Right Side: Geometric Mean (Area) -->
    <g transform="translate(500, 250)">
        <rect x="0" y="0" width="250" height="250" rx="10" fill="#331111" stroke="#ff0055" stroke-width="2" />
        <text x="125" y="40" fill="#ff0055" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">기하 렌더링 (곱)</text>
        <text x="125" y="70" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">곱해서 루트 씌운 기하
            치수</text>

        <!-- Geometry Area -->
        <rect x="65" y="120" width="120" height="120" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="125" y="185" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">Area =
            16</text>
        <text x="125" y="110" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">√16 = GM 4</text>

        <!-- Compare with AM -->
        <line x1="30" y1="90" x2="220" y2="90" stroke="#ffaa00" stroke-width="2" stroke-dasharray="5 5" opacity="0.5" />
        <text x="190" y="80" fill="#ffaa00" font-family="sans-serif" font-size="12" text-anchor="middle">AM (5)
            Line</text>
    </g>

    <!-- Conclusion Banner -->
    <rect x="150" y="530" width="600" height="50" rx="10" fill="#0f0f15" stroke="#555566" />
    <text x="450" y="560" fill="#00ffcc" font-family="sans-serif" font-size="16" text-anchor="middle">🌟 최적 효율: 두 막대가
        완벽히 동일할 때 (a=b) 평균 높이의 싱크로율 100%</text>

</svg>