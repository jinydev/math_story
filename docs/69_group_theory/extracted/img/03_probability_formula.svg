<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">수학적 확률 (P) 의 정의</text>

    <!-- Main Formula Box -->
    <g transform="translate(150, 100)">
        <!-- Container -->
        <rect x="0" y="0" width="500" height="150" rx="15" fill="#2d2d44" stroke="#ffaa00" stroke-width="3"
            filter="url(#glow)" />

        <!-- P = -->
        <text x="60" y="90" fill="#ffaa00" font-family="sans-serif" font-size="48" font-weight="bold">P =</text>

        <!-- Fraction line -->
        <line x1="150" y1="75" x2="450" y2="75" stroke="#ffffff" stroke-width="4" />

        <!-- Numerator -->
        <text x="300" y="55" fill="#00ffcc" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">사건 A 가 일어나는 경우의 수</text>

        <!-- Denominator -->
        <text x="300" y="115" fill="#ff4d4d" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">일어날 수 있는 전체 우주의 경우의 수</text>
    </g>

    <!-- Example Data -->
    <g transform="translate(50, 300)" font-family="sans-serif" font-size="18">
        <rect x="0" y="0" width="700" height="70" rx="10" fill="#1d1d2d" stroke="#555" stroke-width="2" />
        <text x="350" y="25" fill="#aaaaaa" text-anchor="middle">예) 주사위에서 [짝수]가 뜰 확률 해킹하기</text>

        <!-- Equation example -->
        <text x="350" y="55" fill="#ffffff" font-weight="bold" font-family="monospace" text-anchor="middle">
            P = <tspan fill="#00ffcc">3 (짝수:2,4,6)</tspan> / <tspan fill="#ff4d4d">6 (모든눈:1~6)</tspan> = <tspan
                fill="#ffaa00">1 / 2 (50%)</tspan>
        </text>
    </g>

</svg>