<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .st-u {
                fill: none;
                stroke: #30363d;
                stroke-width: 4;
            }

            .st-p {
                fill: rgba(0, 150, 255, 0.15);
                stroke: #0088ff;
                stroke-width: 3;
            }

            .st-q {
                fill: rgba(255, 100, 100, 0.2);
                stroke: #ff6464;
                stroke-width: 3;
            }

            .label-u {
                fill: #8b949e;
                font-size: 24px;
                font-weight: bold;
            }

            .label-p {
                fill: #0088ff;
                font-size: 22px;
            }

            .label-q {
                fill: #ff6464;
                font-size: 22px;
            }

            .element {
                fill: #ffffff;
                font-size: 18px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="400" y="40" class="title">진리집합 벤 다이어그램 (Truth Set Venn Diagram)</text>
    <text x="400" y="65" class="desc">집합 P (짝수) 안에 집합 Q (4의 배수) 가 환벽히 포함되는 Q ⊂ P 구조</text>

    <!-- Complete Universe U -->
    <g transform="translate(150, 120)">
        <rect x="0" y="0" width="500" height="320" class="st-u" rx="15" ry="15" />
        <text x="20" y="30" class="label-u" fill="#8b949e">U (1~10 자연수)</text>

        <!-- Outer U Elements -->
        <text x="60" y="90" class="element">1</text>
        <text x="430" y="80" class="element">3</text>
        <text x="80" y="270" class="element">5</text>
        <text x="400" y="290" class="element">7</text>
        <text x="250" y="60" class="element">9</text>

        <!-- Set P (x is even) -->
        <circle cx="250" cy="180" r="130" class="st-p" />
        <text x="250" y="85" class="label-p" text-anchor="middle">P: 짝수 집합 {2, 4, 6, 8, 10}</text>

        <!-- P elements outside Q -->
        <text x="170" y="160" class="element">2</text>
        <text x="330" y="150" class="element">6</text>
        <text x="250" y="280" class="element">10</text>

        <!-- Set Q (x is multiple of 4) -->
        <circle cx="250" cy="190" r="60" class="st-q" />
        <text x="250" y="155" class="label-q" text-anchor="middle">Q: 4의 배수</text>

        <!-- Q elements -->
        <text x="220" y="210" class="element">4</text>
        <text x="280" y="210" class="element">8</text>
    </g>

    <text x="400" y="475" class="title" fill="#00ff00" font-size="28">Q ⊂ P (Q는 P의 부분집합이다)</text>

</svg>