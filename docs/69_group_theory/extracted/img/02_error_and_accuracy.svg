<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">오차의 렌더링: 절대오차(Absolute) vs 상대오차(Relative)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"단순히 '얼마나 틀렸나' 가
        아니라, '본체 대비 얼마나 틀렸나' 가 과학의 본질이다."</text>

    <!-- Left Side: The 10cm Pencil Error -->
    <g transform="translate(80, 160)">
        <rect x="0" y="0" width="340" height="250" rx="15" fill="#1b1111" stroke="#ff5555" stroke-width="3" />
        <text x="170" y="30" fill="#ff5555" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">Case 1: 10cm 연필 측정</text>

        <!-- Pencil Graphic -->
        <rect x="40" y="70" width="160" height="20" fill="#ffaa00" stroke="#fff" />
        <polygon points="200,70 230,80 200,90" fill="#ffaa00" />

        <!-- True vs measured line -->
        <line x1="40" y1="110" x2="230" y2="110" stroke="#00ffcc" stroke-width="2" />
        <text x="40" y="130" fill="#00ffcc" font-family="monospace" font-size="14">측정값: 10 cm</text>

        <line x1="230" y1="100" x2="270" y2="100" stroke="#ff5555" stroke-width="4" filter="url(#glow)" />
        <text x="250" y="90" fill="#ff5555" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">오차: + 1 cm</text>

        <!-- Calculation -->
        <rect x="20" y="160" width="300" height="70" rx="5" fill="#000" stroke="#ff5555" />
        <text x="170" y="180" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">절대오차 = 1
            cm</text>
        <text x="170" y="200" fill="#ffff00" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">상대오차 = 1 / 10 = 0.1 (10% 파괴율)</text>
        <text x="170" y="220" fill="#ff5555" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">결과: 치명적인 측정 실패 💀</text>
    </g>

    <!-- Right Side: The 100m Bridge Error -->
    <g transform="translate(480, 160)">
        <rect x="0" y="0" width="340" height="250" rx="15" fill="#001122" stroke="#4da6ff" stroke-width="3" />
        <text x="170" y="30" fill="#4da6ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">Case 2: 100m (10,000cm) 대교 건설</text>

        <!-- Bridge Graphic -->
        <path d="M 40 90 Q 170 40 300 90" fill="none" stroke="#ffffff" stroke-width="4" />
        <line x1="40" y1="90" x2="300" y2="90" stroke="#4da6ff" stroke-width="6" />

        <!-- True vs measured line -->
        <line x1="40" y1="110" x2="300" y2="110" stroke="#00ffcc" stroke-width="2" />
        <text x="40" y="130" fill="#00ffcc" font-family="monospace" font-size="14">측정값: 10,000 cm</text>

        <!-- Error is just a tiny dot -->
        <circle cx="305" cy="110" r="3" fill="#4da6ff" filter="url(#glow)" />
        <text x="305" y="130" fill="#4da6ff" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">오차: + 1 cm</text>

        <!-- Calculation -->
        <rect x="20" y="160" width="300" height="70" rx="5" fill="#000" stroke="#4da6ff" />
        <text x="170" y="180" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">절대오차 = 1
            cm</text>
        <text x="170" y="200" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">상대오차 = 1 / 10000 = 0.0001 (0.01%)</text>
        <text x="170" y="220" fill="#4da6ff" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">결과: 최고 수준의 정밀도 달성 🏆</text>
    </g>

    <!-- VS logic -->
    <text x="450" y="280" fill="#ffff00" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">VS</text>

    <!-- Big Alert Bottom -->
    <rect x="100" y="450" width="700" height="90" rx="10" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="480" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        두 케이스 모두 물리적인 <tspan fill="#ff00ff" font-weight="bold">'1cm 의 절대오차'</tspan> 를 가졌습니다.
    </text>
    <text x="450" y="505" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        하지만 본체의 거대한 사이즈에 흡수된 다리(Bridge) 의 <tspan fill="#00ffcc" font-weight="bold">'상대오차'</tspan> 는 0으로 수렴합니다.
    </text>
    <text x="450" y="530" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">
        과학과 엔지니어링은 절대오차가 아닌 상대오차(비율) 에 목숨을 겁니다.
    </text>
</svg>