<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">파이썬 객체로 환생한 유클리드 기하학: SymPy Geometry</text>

    <!-- Title/Import box -->
    <rect x="200" y="90" width="500" height="60" rx="10" fill="#221122" stroke="#ff00ff" stroke-width="2" />
    <text x="220" y="125" fill="#ffaa00" font-family="monospace" font-size="20">from sympy.geometry import *</text>

    <!-- OOP Class Inheritance Graphic -->

    <!-- Core GeometryEntity -->
    <g transform="translate(450, 220)">
        <rect x="-120" y="-30" width="240" height="60" rx="30" fill="#112233" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="0" y="0" fill="#00ffcc" font-family="monospace" font-size="22" font-weight="bold"
            text-anchor="middle">GeometryEntity</text>
        <text x="0" y="18" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">(기하학 우주의 공통 부모
            클래스)</text>
    </g>

    <!-- Connecting Lines -->
    <path
        d="M 450 250 L 450 300 M 450 300 L 250 300 M 450 300 L 650 300 M 250 300 L 250 350 M 450 300 L 450 350 M 650 300 L 650 350"
        fill="none" stroke="#555566" stroke-width="3" />

    <!-- Point -->
    <g transform="translate(250, 380)">
        <rect x="-80" y="-30" width="160" height="60" rx="10" fill="#221122" stroke="#ff0055" stroke-width="2" />
        <text x="0" y="-5" fill="#ff0055" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">Point(x, y)</text>
        <text x="0" y="15" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">0차원 노드</text>
        <circle cx="0" cy="45" r="4" fill="#ff0055" filter="url(#glow)" />
    </g>

    <!-- Segment -->
    <g transform="translate(450, 380)">
        <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#223322" stroke="#4da6ff" stroke-width="2" />
        <text x="0" y="-5" fill="#4da6ff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">Segment(p1, p2)</text>
        <text x="0" y="15" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">1차원 빔
            (레이저)</text>
        <line x1="-30" y1="45" x2="30" y2="45" stroke="#4da6ff" stroke-width="4" filter="url(#glow)" />
        <circle cx="-30" cy="45" r="3" fill="#ffffff" />
        <circle cx="30" cy="45" r="3" fill="#ffffff" />
    </g>

    <!-- Circle -->
    <g transform="translate(650, 380)">
        <rect x="-90" y="-30" width="180" height="60" rx="10" fill="#112233" stroke="#ffff00" stroke-width="2" />
        <text x="0" y="-5" fill="#ffff00" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">Circle(p, r)</text>
        <text x="0" y="15" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">2차원
            컴퍼스(반경)</text>
        <circle cx="0" cy="45" r="15" fill="none" stroke="#ffff00" stroke-width="3" filter="url(#glow)" />
    </g>

    <!-- Action: Intersection -->
    <g transform="translate(450, 520)">
        <rect x="-250" y="-30" width="500" height="60" rx="15" fill="#331111" stroke="#ff0000" stroke-width="3"
            filter="url(#glow)" />
        <text x="0" y="5" fill="#ffffff" font-family="monospace" font-size="22" font-weight="bold"
            text-anchor="middle">intersection(Obj_A, Obj_B)</text>
        <path d="M 350 350 L 450 500 M 550 350 L 450 500" fill="none" stroke="#ff00ff" stroke-width="3"
            stroke-dasharray="6 4" opacity="0.6" />
    </g>

    <!-- Explain Text Box -->
    <g transform="translate(800, 380)">
        <path d="M 0 0 C -40 0, -50 0, -60 140 C -70 140, -100 140, -150 140" fill="none" stroke="#ff00ff"
            stroke-width="2" marker-end="url(#arrow)" />
    </g>
    <rect x="700" y="475" width="150" height="60" fill="#1a1a24" stroke="#ff00ff" stroke-width="1" rx="5" />
    <text x="775" y="500" fill="#ff00ff" font-family="sans-serif" font-size="14" text-anchor="middle">어떤 객체든
        던져넣으면</text>
    <text x="775" y="520" fill="#ff00ff" font-family="sans-serif" font-size="14" font-weight="bold"
        text-anchor="middle">충돌(100%) 스캔!</text>

</svg>