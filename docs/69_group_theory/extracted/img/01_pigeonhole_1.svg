<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">필연적 중복의 해킹: 비둘기집의 원리 (Pigeonhole Principle)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"방어벽(Set)의 한계용량(N)
        을 초과하는 데이터(N+1) 가 들어오면, 무조건 충돌(Collision) 이 터진다."</text>

    <!-- Left Side: The "Pigeons" (Data Packets) -->
    <g transform="translate(100, 160)">
        <text x="60" y="-10" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">입력 데이터 (N+1 = 4)</text>

        <!-- Pigeon 1 -->
        <rect x="20" y="20" width="80" height="40" rx="5" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="60" y="45" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">Data 1</text>

        <!-- Pigeon 2 -->
        <rect x="20" y="80" width="80" height="40" rx="5" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="60" y="105" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">Data 2</text>

        <!-- Pigeon 3 -->
        <rect x="20" y="140" width="80" height="40" rx="5" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="60" y="165" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">Data 3</text>

        <!-- Pigeon 4 (The Problem) -->
        <rect x="20" y="200" width="80" height="40" rx="5" fill="#331111" stroke="#ff5555" stroke-width="3"
            filter="url(#glow)" />
        <text x="60" y="225" fill="#ff5555" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">Data 4</text>
    </g>

    <!-- The Network Flow / Arrows -->
    <path d="M 210 200 L 400 180" fill="none" stroke="#00ffcc" stroke-dasharray="5 5" stroke-width="2"
        marker-end="url(#arrow_c)" />
    <path d="M 210 260 L 400 280" fill="none" stroke="#00ffcc" stroke-dasharray="5 5" stroke-width="2"
        marker-end="url(#arrow_c)" />
    <path d="M 210 320 L 400 380" fill="none" stroke="#00ffcc" stroke-dasharray="5 5" stroke-width="2"
        marker-end="url(#arrow_c)" />

    <!-- Collision Arrow -->
    <path d="M 210 380 Q 300 300 400 180" fill="none" stroke="#ff5555" stroke-width="4" stroke-dasharray="10 5"
        marker-end="url(#arrow_r)" filter="url(#glow)" />

    <defs>
        <marker id="arrow_c" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#00ffcc" />
        </marker>
        <marker id="arrow_r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ff5555" />
        </marker>
    </defs>

    <!-- Right Side: The "Pigeonholes" (Memory Slots / Set) -->
    <g transform="translate(420, 120)">
        <rect x="0" y="0" width="350" height="300" rx="15" fill="#111" stroke="#4da6ff" stroke-width="3" />
        <text x="175" y="40" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">메모리 공간 (N = 3)</text>

        <!-- Slot 1 (Collision Slot) -->
        <rect x="30" y="70" width="290" height="60" rx="5" fill="#220000" stroke="#ff00ff" stroke-width="2" />
        <text x="60" y="105" fill="#ff00ff" font-family="monospace" font-size="14" font-weight="bold">Slot 1:</text>
        <rect x="120" y="80" width="70" height="40" rx="3" fill="#00ffcc" opacity="0.6" />
        <text x="155" y="105" fill="#ffffff" font-family="monospace" font-size="12" font-weight="bold"
            text-anchor="middle">Data 1</text>
        <!-- Crashing Data -->
        <rect x="200" y="80" width="70" height="40" rx="3" fill="#ff5555" opacity="0.8" filter="url(#glow)" />
        <text x="235" y="105" fill="#ffffff" font-family="monospace" font-size="12" font-weight="bold"
            text-anchor="middle">Data 4</text>
        <path d="M 180 80 L 210 110" stroke="#ffff00" stroke-width="3" />
        <path d="M 180 110 L 210 80" stroke="#ffff00" stroke-width="3" />

        <!-- Alert text -->
        <text x="340" y="105" fill="#ff5555" font-family="sans-serif" font-size="16" font-weight="bold"
            filter="url(#glow)">💥 충돌!</text>

        <!-- Slot 2 -->
        <rect x="30" y="150" width="290" height="50" rx="5" fill="#002211" stroke="#4da6ff" />
        <text x="60" y="180" fill="#4da6ff" font-family="monospace" font-size="14" font-weight="bold">Slot 2:</text>
        <rect x="120" y="155" width="70" height="40" rx="3" fill="#00ffcc" opacity="0.6" />
        <text x="155" y="180" fill="#ffffff" font-family="monospace" font-size="12" font-weight="bold"
            text-anchor="middle">Data 2</text>

        <!-- Slot 3 -->
        <rect x="30" y="220" width="290" height="50" rx="5" fill="#002211" stroke="#4da6ff" />
        <text x="60" y="250" fill="#4da6ff" font-family="monospace" font-size="14" font-weight="bold">Slot 3:</text>
        <rect x="120" y="225" width="70" height="40" rx="3" fill="#00ffcc" opacity="0.6" />
        <text x="155" y="250" fill="#ffffff" font-family="monospace" font-size="12" font-weight="bold"
            text-anchor="middle">Data 3</text>
    </g>

    <!-- Big Alert Bottom -->
    <rect x="100" y="470" width="700" height="80" rx="10" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="500" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        최대한 분산시켜 할당(1방에 1개) 하려고 아무리 머리를 써도, <tspan fill="#ffff00" font-weight="bold">N+1 번째 데이터</tspan> 가
    </text>
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        도착하는 순간, 단 1개의 공간(Slot) 은 100% 무조건 <tspan fill="#ff00ff" font-weight="bold">2개 이상의 메모리 중복</tspan> 을 떠안게 됩니다.
    </text>
</svg>