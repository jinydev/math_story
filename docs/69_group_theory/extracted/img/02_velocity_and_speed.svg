<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">물리 엔진 해킹: 속도(Velocity) vs 속력(Speed)</text>

    <!-- Left: Velocity (Vector) -->
    <g transform="translate(50, 100)">
        <rect x="0" y="0" width="380" height="380" rx="15" fill="#0d141e" stroke="#4da6ff" stroke-width="3" />
        <text x="190" y="40" fill="#4da6ff" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">속도 (Velocity) v(t)</text>
        <text x="190" y="65" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">방향(+, -)을 가진 벡터
            나침반</text>

        <!-- Car 1: Positive Velocity -->
        <rect x="40" y="110" width="80" height="40" rx="8" fill="#27c93f" />
        <!-- Wheels -->
        <circle cx="60" cy="150" r="10" fill="#111" />
        <circle cx="100" cy="150" r="10" fill="#111" />

        <path d="M 130 130 L 300 130" stroke="#27c93f" stroke-width="8" marker-end="url(#arrow_g)"
            filter="url(#glow)" />
        <text x="215" y="120" fill="#27c93f" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">v = +100</text>
        <text x="215" y="155" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">전진 폭주</text>

        <!-- Car 2: Negative Velocity -->
        <rect x="260" y="240" width="80" height="40" rx="8" fill="#ff0055" />
        <circle cx="280" cy="280" r="10" fill="#111" />
        <circle cx="320" cy="280" r="10" fill="#111" />

        <path d="M 250 260 L 80 260" stroke="#ff0055" stroke-width="8" marker-end="url(#arrow_r)" filter="url(#glow)" />
        <text x="165" y="250" fill="#ff0055" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">v = -100</text>
        <text x="165" y="285" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">역주행 타격</text>

        <text x="190" y="340" fill="#4da6ff" font-family="sans-serif" font-size="16" text-anchor="middle">수학 기호 +, -는 방향
            앙글의 스위치일 뿐!</text>
    </g>

    <!-- Giant Transformation Arrow -->
    <path d="M 440 290 L 460 290" stroke="#ffff00" stroke-width="6" marker-end="url(#arrow_y)" />
    <text x="450" y="270" fill="#ffff00" font-family="monospace" font-size="20" font-weight="bold"
        text-anchor="middle">abs()</text>
    <text x="450" y="250" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">절댓값 모듈</text>

    <!-- Right: Speed (Scalar) -->
    <g transform="translate(470, 100)">
        <rect x="0" y="0" width="380" height="380" rx="15" fill="#1a140d" stroke="#ffaa00" stroke-width="3" />
        <text x="190" y="40" fill="#ffaa00" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">속력 (Speed) |v(t)|</text>
        <text x="190" y="65" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">방향이 거세된 순수 스탯
            덩어리</text>

        <!-- Speed display 1 -->
        <rect x="90" y="100" width="200" height="60" rx="10" fill="#0d1f11" stroke="#27c93f" stroke-width="2" />
        <text x="190" y="125" fill="#27c93f" font-family="monospace" font-size="16" text-anchor="middle">|+100|</text>
        <text x="190" y="150" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">= 100 km/h</text>

        <!-- Speed display 2 -->
        <rect x="90" y="230" width="200" height="60" rx="10" fill="#1f0d11" stroke="#ff0055" stroke-width="2" />
        <text x="190" y="255" fill="#ff0055" font-family="monospace" font-size="16" text-anchor="middle">|-100|</text>
        <text x="190" y="280" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">= 100 km/h</text>

        <text x="190" y="340" fill="#ffaa00" font-family="sans-serif" font-size="16" text-anchor="middle">단속 카메라는 오직 파워의
            덩어리 크기만 본다!</text>
    </g>

    <defs>
        <marker id="arrow_g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#27c93f" />
        </marker>
        <marker id="arrow_r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ff0055" />
        </marker>
        <marker id="arrow_y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
        </marker>
    </defs>

    <rect x="150" y="510" width="600" height="60" rx="10" fill="#0f0f15" stroke="#ffffff" stroke-width="2" />
    <text x="450" y="535" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        속도 크루저 <tspan fill="#ff0055" font-weight="bold">-80</tspan> 이 <tspan fill="#27c93f" font-weight="bold">+20
        </tspan> 보다 작다고 착각하면 게임 캐릭터는 삭제당합니다!
    </text>
    <text x="450" y="555" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">
        물리 엔진의 스피드 화력 비교는 오직 절댓값(속력) 으로 대결시킵니다.
    </text>
</svg>