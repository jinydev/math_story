<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">동형사상 웜홀 (Isomorphism Mapping)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"두 우주의 구조가 100% 진정한
        평행 우주임을 입증하는 수학적 포탈 엔진 f"</text>

    <!-- Left Universe (Universe A) -->
    <g transform="translate(150, 250)">
        <circle cx="0" cy="0" r="120" fill="#112233" stroke="#0088ff" stroke-width="3" filter="url(#glow)" />
        <text x="0" y="-80" fill="#0088ff" font-weight="bold" font-size="24" text-anchor="middle" filter="url(#glow)">우주
            A (Modulo 4)</text>
        <text x="0" y="-55" fill="#aaa" font-size="16" text-anchor="middle">연산자: +</text>

        <!-- Path 1 interaction inside A -->
        <circle cx="-40" cy="0" r="15" fill="#0088ff" />
        <text x="-40" y="6" fill="#fff" font-weight="bold" font-size="16" text-anchor="middle">1</text>

        <circle cx="40" cy="0" r="15" fill="#0088ff" />
        <text x="40" y="6" fill="#fff" font-weight="bold" font-size="16" text-anchor="middle">3</text>

        <!-- Operation in A -->
        <path d="M -30 20 L 0 50 L 30 20" fill="none" stroke="#fff" stroke-width="2" marker-end="url(#arrow_w)" />
        <text x="0" y="25" fill="#fff" font-weight="bold" font-size="20" text-anchor="middle">+</text>

        <circle cx="0" cy="70" r="20" fill="#ffff00" filter="url(#glow)" />
        <text x="0" y="76" fill="#000" font-weight="bold" font-size="18" text-anchor="middle">0</text>
    </g>

    <!-- Right Universe (Universe B) -->
    <g transform="translate(750, 250)">
        <circle cx="0" cy="0" r="120" fill="#331122" stroke="#ff0055" stroke-width="3" filter="url(#glow)" />
        <text x="0" y="-80" fill="#ff0055" font-weight="bold" font-size="24" text-anchor="middle" filter="url(#glow)">우주
            B (Complex)</text>
        <text x="0" y="-55" fill="#aaa" font-size="16" text-anchor="middle">연산자: ×</text>

        <!-- Path 2 interaction inside B -->
        <circle cx="-40" cy="0" r="15" fill="#ff0055" />
        <text x="-40" y="6" fill="#fff" font-weight="bold" font-size="16" text-anchor="middle">i</text>

        <circle cx="40" cy="0" r="15" fill="#ff0055" />
        <text x="40" y="6" fill="#fff" font-weight="bold" font-size="16" text-anchor="middle">-i</text>

        <!-- Operation in B -->
        <path d="M -30 20 L 0 50 L 30 20" fill="none" stroke="#fff" stroke-width="2" marker-end="url(#arrow_w)" />
        <text x="0" y="25" fill="#fff" font-weight="bold" font-size="20" text-anchor="middle">×</text>

        <circle cx="0" cy="70" r="20" fill="#ffff00" filter="url(#glow)" />
        <text x="0" y="76" fill="#000" font-weight="bold" font-size="18" text-anchor="middle">1</text>
    </g>

    <!-- The Wormhole Portals 'f' -->
    <g transform="translate(450, 250)">

        <!-- Top pathways for individual elements -->
        <path d="M -230 -10 Q 0 -60 230 -10" fill="none" stroke="#fff" stroke-dasharray="4 4" stroke-width="3"
            marker-end="url(#arrow_w)" opacity="0.6" />
        <text x="0" y="-45" fill="#00ffcc" font-weight="bold" font-size="16" text-anchor="middle">번역(포탈) f(x)</text>

        <!-- Map 1 to i -->
        <path d="M -250 -10 Q 0 -40 250 -10" fill="none" stroke="#00ffcc" stroke-width="2" marker-end="url(#arrow_c)"
            opacity="0.6" />
        <!-- Map 3 to -i -->
        <path d="M -250 10 Q 0 40 250 10" fill="none" stroke="#00ffcc" stroke-width="2" marker-end="url(#arrow_c)"
            opacity="0.6" />

        <!-- Bottom pathway for the combined resultant -->
        <path d="M -280 70 L 280 70" fill="none" stroke="#ff00ff" stroke-width="5" filter="url(#glow)"
            marker-end="url(#arrow_m)" />
        <text x="0" y="60" fill="#ff00ff" font-weight="bold" font-size="18" text-anchor="middle" filter="url(#glow)">거대
            웜홀 딕셔너리 f( a * b )</text>

        <!-- Big Equality -->
        <rect x="-170" y="140" width="340" height="60" rx="10" fill="#1b1122" stroke="#ffffff" stroke-width="2"
            filter="url(#glow)" />
        <text x="0" y="175" fill="#ffffff" font-weight="bold" font-size="22" font-family="monospace"
            text-anchor="middle">
            <tspan fill="#0088ff">f( a + b )</tspan> == <tspan fill="#ff0055">f(a) × f(b)</tspan>
        </text>

    </g>

    <defs>
        <marker id="arrow_w" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ffffff" />
        </marker>
        <marker id="arrow_c" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#00ffcc" />
        </marker>
        <marker id="arrow_m" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ff00ff" />
        </marker>
    </defs>

    <!-- Big Alert Bottom -->
    <rect x="50" y="520" width="800" height="60" rx="10" fill="#0a1a2a" stroke="#ffff00" stroke-width="2" />
    <text x="450" y="555" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        A 세상에서 싸워서 포탈로 던져진 결과나, 먼저 포탈을 건너가서 B 세상 규칙으로 싸운 결과나 100% 똑같아야 증명된다.
    </text>
</svg>