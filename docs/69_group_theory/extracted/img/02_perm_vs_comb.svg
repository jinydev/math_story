<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">데이터 과부하 대결: 순열(P) vs 조합(C)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"순열이 뻥튀기해 놓은 가짜
        인플레이션 값에다가 (r!) 를 분모로 때려 박으면 조합의 순수 우주가 남는다."</text>

    <!-- Left Side: Permutation (Bloated Universe) -->
    <g transform="translate(50, 150)">
        <rect x="0" y="0" width="370" height="300" rx="15" fill="#1b1111" stroke="#ff5555" stroke-width="3" />
        <text x="185" y="35" fill="#ff5555" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">순열 (Permutation, nPr)</text>
        <text x="185" y="60" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">3명(A,B,C) 에게 서열
            1/2/3등을 부여함</text>

        <g transform="translate(35, 90)">
            <text x="150" y="15" fill="#ffaaaa" font-family="monospace" font-size="16" font-weight="bold"
                text-anchor="middle">내부 자리바꿈 폭동 (3! = 6세트 복제)</text>

            <rect x="0" y="30" width="300" height="120" rx="5" fill="#331111" stroke="#ff5555" stroke-dasharray="4 2" />
            <text x="60" y="60" fill="#fff" font-family="monospace" font-size="16" font-weight="bold"
                text-anchor="middle">1. A - B - C</text>
            <text x="60" y="90" fill="#fff" font-family="monospace" font-size="16" font-weight="bold"
                text-anchor="middle">2. A - C - B</text>
            <text x="60" y="120" fill="#fff" font-family="monospace" font-size="16" font-weight="bold"
                text-anchor="middle">3. B - A - C</text>

            <text x="240" y="60" fill="#fff" font-family="monospace" font-size="16" font-weight="bold"
                text-anchor="middle">4. B - C - A</text>
            <text x="240" y="90" fill="#fff" font-family="monospace" font-size="16" font-weight="bold"
                text-anchor="middle">5. C - A - B</text>
            <text x="240" y="120" fill="#fff" font-family="monospace" font-size="16" font-weight="bold"
                text-anchor="middle">6. C - B - A</text>
        </g>

        <rect x="20" y="250" width="330" height="30" rx="5" fill="#000" stroke="#ff5555" />
        <text x="185" y="270" fill="#ffaa00" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">메모리 사용량 폭발: P는 중복 데이터 발생기!</text>
    </g>

    <!-- Center Weapon: Divider -->
    <g transform="translate(435, 270)">
        <circle cx="15" cy="0" r="30" fill="#110022" stroke="#ff00ff" stroke-width="3" filter="url(#glow)" />
        <text x="15" y="-5" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">나누기</text>
        <text x="15" y="15" fill="#ff00ff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">÷ 3!</text>

        <!-- Arrow from P to C -->
        <path d="M -15 0 L 0 0" fill="none" stroke="#fff" stroke-width="3" />
        <path d="M 30 0 L 45 0" fill="none" stroke="#fff" stroke-width="3" marker-end="url(#arrow_w)" />
    </g>

    <defs>
        <marker id="arrow_w" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ffffff" />
        </marker>
    </defs>

    <!-- Right Side: Combination (Compressed Universe) -->
    <g transform="translate(480, 150)">
        <rect x="0" y="0" width="370" height="300" rx="15" fill="#001a11" stroke="#00ffcc" stroke-width="3" />
        <text x="185" y="35" fill="#00ffcc" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">조합 (Combination, nCr)</text>
        <text x="185" y="60" fill="#ffffff" font-family="monospace" font-size="14" text-anchor="middle">순서(서열) 꼬리표를 찢어버려
            한 덩어리 취급</text>

        <g transform="translate(35, 90)">
            <text x="150" y="15" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
                text-anchor="middle">압축 환원 (1세트 덩어리)</text>

            <circle cx="150" cy="85" r="50" fill="#003322" stroke="#00ffcc" stroke-width="3" filter="url(#glow)" />
            <text x="150" y="70" fill="#ffffff" font-family="monospace" font-size="18" font-weight="bold"
                text-anchor="middle">{ A, B, C }</text>
            <text x="150" y="105" fill="#ffff00" font-family="sans-serif" font-size="12" font-weight="bold"
                text-anchor="middle">하나의 팀(Team)</text>
        </g>

        <rect x="20" y="250" width="330" height="30" rx="5" fill="#000" stroke="#00ffcc" />
        <text x="185" y="270" fill="#00ffcc" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">메모리 초절약: C는 본질 데이터만 색출함!</text>
    </g>

    <!-- Bottom Formula Banner -->
    <rect x="150" y="480" width="600" height="80" rx="10" fill="#0d1b2a" stroke="#4da6ff" stroke-width="2" />
    <text x="450" y="530" fill="#4da6ff" font-family="monospace" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">nCr = nPr / r!</text>

</svg>