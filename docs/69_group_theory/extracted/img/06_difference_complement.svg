<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .bg {
                fill: #1e1e2e;
            }

            .text-title {
                fill: #f9e2af;
                font-family: sans-serif;
                font-size: 24px;
                font-weight: bold;
                text-anchor: middle;
            }

            .text-symbol {
                fill: #f5c2e7;
                font-family: serif;
                font-size: 34px;
                text-anchor: middle;
                font-weight: bold;
            }

            .box {
                fill: none;
                stroke: #45475a;
                stroke-width: 2;
                rx: 10;
                ry: 10;
            }

            .box-u {
                fill: #313244;
                stroke: #cdd6f4;
                stroke-width: 2;
                rx: 5;
                ry: 5;
            }

            .circle-base {
                fill: none;
                stroke-width: 3;
            }
        </style>

        <clipPath id="diff-clip">
            <!-- We want everything in A that is NOT in B. To draw this, we draw A, but exclude B. -->
            <!-- We can use a path that traces A but cuts out B, or a simpler way is drawing A normally, then drawing B with background color. But wait, B overlaps, so we can't just draw over. Let's use SVG masks or just paths. -->
        </clipPath>
        <mask id="mask-diff">
            <rect width="100%" height="100%" fill="white" />
            <circle cx="260" cy="220" r="80" fill="black" /> <!-- subtract B -->
        </mask>

        <mask id="mask-comp">
            <rect width="100%" height="100%" fill="white" />
            <circle cx="600" cy="220" r="80" fill="black" /> <!-- subtract A from Universe -->
        </mask>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <!-- Left: Difference A - B -->
    <rect x="50" y="50" width="320" height="300" class="box" />
    <text x="210" y="90" class="text-title">차집합 (Difference)</text>
    <text x="210" y="320" class="text-symbol">A - B</text>

    <g transform="translate(-10, 0)">
        <!-- Base outlines -->
        <circle cx="180" cy="220" r="80" class="circle-base" stroke="#45475a" />
        <circle cx="260" cy="220" r="80" class="circle-base" stroke="#45475a" />

        <!-- Shaded area A - B -->
        <circle cx="180" cy="220" r="80" fill="#f38ba8" mask="url(#mask-diff)" />

        <text x="140" y="225" fill="#11111b" font-weight="bold" font-size="24">A</text>
        <text x="280" y="225" fill="#cdd6f4" font-weight="bold" font-size="24">B</text>
    </g>

    <!-- Right: Complement A^c -->
    <rect x="430" y="50" width="320" height="300" class="box" />
    <text x="590" y="90" class="text-title">여집합 (Complement)</text>
    <text x="590" y="320" class="text-symbol">A<tspan dy="-15" font-size="20">c</tspan></text>

    <!-- Universe Box shaded -->
    <rect x="470" y="110" width="240" height="170" fill="#a6e3a1" mask="url(#mask-comp)" rx="5" ry="5" />
    <rect x="470" y="110" width="240" height="170" fill="none" stroke="#cdd6f4" stroke-width="2" rx="5" ry="5" />
    <text x="490" y="130" fill="#11111b" font-weight="bold">U</text>

    <g transform="translate(-10, 0)">
        <circle cx="600" cy="220" r="80" class="circle-base" stroke="#45475a" fill="#1e1e2e" />
        <text x="600" y="230" fill="#cdd6f4" font-weight="bold" font-size="24" text-anchor="middle">A</text>
    </g>

</svg>