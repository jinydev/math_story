<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">데칼코마니 시스템: 선대칭 (Line Symmetry)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"거울이 된 축은 생존하고 반대쪽
        축은 마이너스의 심연으로 박힌다."</text>

    <!-- 3 Mirror Rooms -->

    <!-- Mirror 1: X-Axis -->
    <g transform="translate(50, 150)">
        <rect x="0" y="0" width="240" height="280" rx="10" fill="#1b1111" stroke="#ff5555" stroke-width="2" />
        <text x="120" y="30" fill="#ff5555" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">1. X축 거울 (호수)</text>

        <!-- Axes Line -->
        <path d="M 20 140 L 220 140" fill="none" stroke="#ff5555" stroke-width="4" filter="url(#glow)" />
        <text x="210" y="130" fill="#ff5555" font-weight="bold">x</text>

        <path d="M 120 50 L 120 230" fill="none" stroke="#555" stroke-width="1" />

        <!-- Original -->
        <circle cx="170" cy="80" r="6" fill="#fff" />
        <text x="170" y="70" fill="#fff" font-weight="bold" text-anchor="middle">A(x, y)</text>

        <!-- Reflection Line -->
        <path d="M 170 80 L 170 200" fill="none" stroke="#fff" stroke-dasharray="4 4" marker-end="url(#arrow_w)" />

        <!-- Reflected -->
        <circle cx="170" cy="200" r="6" fill="#ffff00" filter="url(#glow)" />
        <text x="170" y="220" fill="#ffff00" font-weight="bold" font-size="14" text-anchor="middle"
            filter="url(#glow)">A'(x, -y)</text>

        <rect x="10" y="240" width="220" height="30" rx="5" fill="#000" stroke="#ff5555" />
        <text x="120" y="260" fill="#ffffff" font-size="14" text-anchor="middle">결과: y 좌표 부호 반전!</text>
    </g>

    <!-- Mirror 2: Y-Axis -->
    <g transform="translate(330, 150)">
        <rect x="0" y="0" width="240" height="280" rx="10" fill="#001a11" stroke="#00ffcc" stroke-width="2" />
        <text x="120" y="30" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">2. Y축 거울 (벽면전신)</text>

        <!-- Axes Line -->
        <path d="M 20 140 L 220 140" fill="none" stroke="#555" stroke-width="1" />
        <path d="M 120 50 L 120 230" fill="none" stroke="#00ffcc" stroke-width="4" filter="url(#glow)" />
        <text x="135" y="60" fill="#00ffcc" font-weight="bold">y</text>

        <!-- Original -->
        <circle cx="170" cy="80" r="6" fill="#fff" />
        <text x="180" y="70" fill="#fff" font-weight="bold" text-anchor="middle">B(x, y)</text>

        <!-- Reflection Line -->
        <path d="M 170 80 L 70 80" fill="none" stroke="#fff" stroke-dasharray="4 4" marker-end="url(#arrow_w)" />

        <!-- Reflected -->
        <circle cx="70" cy="80" r="6" fill="#ffff00" filter="url(#glow)" />
        <text x="60" y="70" fill="#ffff00" font-weight="bold" font-size="14" text-anchor="middle"
            filter="url(#glow)">B'(-x, y)</text>

        <rect x="10" y="240" width="220" height="30" rx="5" fill="#000" stroke="#00ffcc" />
        <text x="120" y="260" fill="#ffffff" font-size="14" text-anchor="middle">결과: x 좌표 부호 반전!</text>
    </g>

    <!-- Mirror 3: Y=X Axis -->
    <g transform="translate(610, 150)">
        <rect x="0" y="0" width="240" height="280" rx="10" fill="#1b0022" stroke="#ff00ff" stroke-width="2" />
        <text x="120" y="30" fill="#ff00ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">3. Y = X 거울 (차원반전)</text>

        <!-- Axes Line -->
        <path d="M 20 180 L 180 180" fill="none" stroke="#555" stroke-width="1" />
        <path d="M 60 220 L 60 60" fill="none" stroke="#555" stroke-width="1" />

        <!-- Y=X Diagonal Line -->
        <path d="M 40 200 L 200 40" fill="none" stroke="#ff00ff" stroke-width="4" filter="url(#glow)" />
        <text x="195" y="35" fill="#ff00ff" font-weight="bold">y=x</text>

        <!-- Original -->
        <circle cx="140" cy="140" r="6" fill="#fff" />
        <text x="160" y="140" fill="#fff" font-weight="bold" text-anchor="middle">C(x, y)</text>

        <!-- Reflection Line -->
        <path d="M 140 140 L 100 100" fill="none" stroke="#fff" stroke-dasharray="4 4" marker-end="url(#arrow_w)" />

        <!-- Reflected -->
        <circle cx="100" cy="100" r="6" fill="#ffff00" filter="url(#glow)" />
        <text x="80" y="90" fill="#ffff00" font-weight="bold" font-size="14" text-anchor="middle"
            filter="url(#glow)">C'(y, x)</text>

        <rect x="10" y="240" width="220" height="30" rx="5" fill="#000" stroke="#ff00ff" />
        <text x="120" y="260" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">결과: 자리 맞바꿈
            (Swap)</text>
    </g>

    <defs>
        <marker id="arrow_w" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ffffff" />
        </marker>
    </defs>

    <!-- Big Alert Bottom -->
    <rect x="100" y="460" width="700" height="90" rx="10" fill="#0d1b2a" stroke="#4da6ff" stroke-width="2" />
    <text x="450" y="495" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        도형(함수) 대칭의 경우 평행이동의 반대 부호 삽입 트릭과 다르게, 아주 정직하다.
    </text>
    <text x="450" y="525" fill="#4da6ff" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">
        x축 대칭시: f(x, y)=0 => f(x, -y)=0
    </text>
</svg>