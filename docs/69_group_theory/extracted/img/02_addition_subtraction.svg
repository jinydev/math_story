<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">체급이 맞아야 박치기가 된다! 동형 행렬의 덧셈 합체</text>

    <g transform="translate(50, 200)">

        <!-- Matrix A (2x2) -->
        <path d="M 30 -10 L 10 -10 L 10 170 L 30 170" fill="none" stroke="#27c93f" stroke-width="6" />
        <path d="M 150 -10 L 170 -10 L 170 170 L 150 170" fill="none" stroke="#27c93f" stroke-width="6" />
        <text x="90" y="-30" fill="#27c93f" font-family="sans-serif" font-size="24" font-weight="bold"
            text-anchor="middle">행렬 A</text>

        <g font-family="monospace" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">
            <text x="50" y="50">1</text>
            <text x="130" y="50" fill="#ffff00">3</text> <!-- Target element -->
            <text x="50" y="130">5</text>
            <text x="130" y="130">2</text>
        </g>

        <text x="210" y="90" fill="#ffffff" font-family="sans-serif" font-size="50" font-weight="bold">+</text>

        <!-- Matrix B (2x2) -->
        <g transform="translate(260, 0)">
            <path d="M 30 -10 L 10 -10 L 10 170 L 30 170" fill="none" stroke="#4da6ff" stroke-width="6" />
            <path d="M 150 -10 L 170 -10 L 170 170 L 150 170" fill="none" stroke="#4da6ff" stroke-width="6" />
            <text x="90" y="-30" fill="#4da6ff" font-family="sans-serif" font-size="24" font-weight="bold"
                text-anchor="middle">행렬 B</text>

            <g font-family="monospace" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">
                <text x="50" y="50">4</text>
                <text x="130" y="50" fill="#ffff00">6</text> <!-- Target element -->
                <text x="50" y="130">-1</text>
                <text x="130" y="130">0</text>
            </g>
        </g>

        <text x="470" y="90" fill="#ffffff" font-family="sans-serif" font-size="50" font-weight="bold">=</text>

        <!-- Matrix C (Result) -->
        <g transform="translate(520, 0)">
            <path d="M 30 -20 L 10 -20 L 10 180 L 30 180" fill="none" stroke="#ff0055" stroke-width="6"
                filter="url(#glow)" />
            <path d="M 250 -20 L 270 -20 L 270 180 L 250 180" fill="none" stroke="#ff0055" stroke-width="6"
                filter="url(#glow)" />
            <text x="140" y="-30" fill="#ff0055" font-family="sans-serif" font-size="24" font-weight="bold"
                text-anchor="middle" filter="url(#glow)">융합체 (A+B)</text>

            <g font-family="monospace" font-size="28" font-weight="bold" fill="#aaaaaa" text-anchor="middle">
                <text x="70" y="50">1+4</text>
                <text x="200" y="50" fill="#ffff00" filter="url(#glow)">3+6 = 9</text>
                <text x="70" y="130">5-1</text>
                <text x="200" y="130">2+0</text>

                <rect x="120" y="10" width="130" height="60" fill="none" stroke="#ffff00" stroke-width="3" rx="10" />
            </g>
        </g>
    </g>

    <!-- Connection Lines for the "3+6=9" highlight -->
    <path d="M 190 230 Q 300 120 400 230" fill="none" stroke="#ffff00" stroke-width="4" stroke-dasharray="8 8"
        opacity="0.6" />
    <path d="M 410 230 Q 550 120 650 230" fill="none" stroke="#ffff00" stroke-width="4" stroke-dasharray="8 8"
        opacity="0.6" marker-end="url(#arrow_y)" />

    <defs>
        <marker id="arrow_y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
        </marker>
    </defs>

    <rect x="150" y="510" width="600" height="60" rx="10" fill="#110505" stroke="#ff0055" stroke-width="2" />
    <text x="450" y="535" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        행렬의 덧셈, 뺄셈은 똑같은 주소 코드를 가진 <tspan fill="#ffff00" font-weight="bold">같은 픽셀 원소끼리만 상호작용</tspan> 합니다.
    </text>
    <text x="450" y="555" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">
        만약 좌우 행렬의 [행 x 열] 크기(차원)가 다르면 충돌 에러가 터집니다.
    </text>
</svg>