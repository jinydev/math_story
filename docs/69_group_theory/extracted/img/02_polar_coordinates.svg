<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#aaaaaa" />
        </marker>
        <marker id="arrowPath" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">직교좌표계 (Cartesian) vs 극좌표계 (Polar)</text>

    <!-- Cartesian Coordinate System (Left) -->
    <g transform="translate(100, 220)">

        <text x="100" y="-140" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">1. 직교좌표계 (x, y)</text>

        <!-- Grid -->
        <g stroke="#334455" stroke-width="1.5">
            <line x1="0" y1="-80" x2="200" y2="-80" />
            <line x1="0" y1="-40" x2="200" y2="-40" />
            <line x1="40" y1="-120" x2="40" y2="20" />
            <line x1="80" y1="-120" x2="80" y2="20" />
            <line x1="120" y1="-120" x2="120" y2="20" />
            <line x1="160" y1="-120" x2="160" y2="20" />
            <line x1="200" y1="-120" x2="200" y2="20" />
        </g>

        <!-- Axes -->
        <line x1="-20" y1="0" x2="220" y2="0" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)" />
        <line x1="0" y1="20" x2="0" y2="-120" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)" />

        <text x="230" y="5" fill="#aaaaaa" font-family="sans-serif" font-size="16">x</text>
        <text x="-5" y="-130" fill="#aaaaaa" font-family="sans-serif" font-size="16">y</text>

        <!-- Path & Point -->
        <line x1="0" y1="0" x2="160" y2="0" stroke="#00ffcc" stroke-width="4" stroke-dasharray="8 6" />
        <text x="80" y="25" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold">x=40m</text>

        <line x1="160" y1="0" x2="160" y2="-80" stroke="#00ffcc" stroke-width="4" stroke-dasharray="8 6"
            marker-end="url(#arrowPath)" />
        <text x="175" y="-35" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold">y=30m</text>

        <circle cx="160" cy="-80" r="8" fill="#ff4d4d" />
        <text x="160" y="-100" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">P(40, 30)</text>

        <!-- Explanation -->
        <rect x="-20" y="60" width="240" height="50" rx="10" fill="#112233" stroke="#4da6ff" stroke-width="2" />
        <text x="100" y="90" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">"동쪽으로 x만큼, 북쪽으로
            y만큼!"</text>
    </g>


    <!-- Polar Coordinate System (Right) -->
    <g transform="translate(500, 220)">

        <text x="100" y="-140" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">2. 극좌표계 (r, θ)</text>

        <!-- Radar Grids (Concentric Circles) -->
        <g stroke="#554433" stroke-width="1.5" fill="none">
            <circle cx="0" cy="0" r="40" />
            <circle cx="0" cy="0" r="80" />
            <circle cx="0" cy="0" r="120" />
            <circle cx="0" cy="0" r="160" />
            <circle cx="0" cy="0" r="200" />

            <!-- Angle lines -->
            <line x1="0" y1="0" x2="173" y2="-100" /> <!-- 30 deg -->
            <line x1="0" y1="0" x2="141" y2="-141" /> <!-- 45 deg -->
            <line x1="0" y1="0" x2="100" y2="-173" /> <!-- 60 deg -->
        </g>

        <!-- Base Axis -->
        <line x1="-20" y1="0" x2="220" y2="0" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)" />

        <!-- Path & Point -->
        <line x1="0" y1="0" x2="160" y2="-120" stroke="#ffaa00" stroke-width="4" marker-end="url(#arrowPath)" />
        <text x="70" y="-80" fill="#ffaa00" font-family="monospace" font-size="20" font-weight="bold"
            transform="rotate(-37 80 -60)">r = 50m</text>

        <!-- Angle Arc -->
        <path d="M 50 0 A 50 50 0 0 0 40 -30" fill="none" stroke="#ff4d4d" stroke-width="4" />
        <text x="65" y="-15" fill="#ff4d4d" font-family="sans-serif" font-size="18" font-weight="bold">θ=37°</text>

        <circle cx="160" cy="-120" r="8" fill="#ff4d4d" />
        <text x="160" y="-140" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">P(50, 37°)</text>

        <!-- Explanation -->
        <rect x="-20" y="60" width="240" height="50" rx="10" fill="#2b1111" stroke="#ffaa00" stroke-width="2" />
        <text x="100" y="90" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">"37도 방향을 보고,
            50m 직진해라!"</text>

    </g>

</svg>