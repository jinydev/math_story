<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .circle {
                fill: #161b22;
                stroke: #30363d;
                stroke-width: 3;
            }

            .circle-win {
                fill: rgba(100, 255, 100, 0.2);
                stroke: #64ff64;
                stroke-width: 3;
            }

            .link {
                fill: none;
                stroke: #ffaa64;
                stroke-width: 2;
                stroke-linecap: round;
                marker-end: url(#arrowOran);
            }

            .label-text {
                fill: #ffffff;
                font-size: 16px;
                text-anchor: middle;
            }

            .prob-text {
                fill: #00ffff;
                font-size: 14px;
                font-style: italic;
                text-anchor: middle;
            }

            .title {
                fill: #ffffff;
                font-size: 24px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }
        </style>
        <marker id="arrowOran" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffaa64" />
        </marker>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="40" class="title">영지식 증명(ZKP) 확률 로직 트리: 어쩌다 맞출 확률</text>
    <text x="400" y="65" class="desc">"우연히 통과할 확률"이 횟수가 누적될수록 지수급수적으로 '0'에 수렴</text>

    <g transform="translate(400, 100)">
        <!-- Root Node -->
        <circle cx="0" cy="0" r="30" class="circle-win" />
        <text x="0" y="5" class="label-text">시작</text>

        <!-- Branching Round 1 -->
        <path d="M -20 20 L -120 70" class="link" />
        <path d="M 20 20 L 120 70" class="link" />
        <text x="-80" y="40" class="prob-text">통과 50%</text>
        <text x="80" y="40" class="prob-text" fill="#ff6464">실패 50%</text>

        <!-- Node Round 1 -->
        <circle cx="-130" cy="80" r="25" class="circle-win" />
        <text x="-130" y="85" class="label-text" font-size="12">1 라운드</text>

        <!-- Branching Round 2 -->
        <path d="M -145 100 L -220 150" class="link" />
        <path d="M -115 100 L -60 150" class="link" />
        <text x="-200" y="120" class="prob-text">통과 25%</text>
        <text x="-70" y="120" class="prob-text" fill="#ff6464">실패</text>

        <!-- Node Round 2 -->
        <circle cx="-230" cy="160" r="25" class="circle-win" />
        <text x="-230" y="165" class="label-text" font-size="12">2 라운드</text>

        <!-- Branching Round 3 -->
        <path d="M -240 180 L -280 230" class="link" />
        <text x="-280" y="200" class="prob-text">... (12.5%)</text>

        <!-- Final Box -->
        <rect x="-350" y="260" width="700" height="60" fill="#161b22" stroke="#64ff64" stroke-width="2" rx="10" />
        <text x="0" y="285" fill="#64ff64" font-size="18" text-anchor="middle">40번 연속 우연히 통과할 확률 = (1/2)^40</text>
        <text x="0" y="310" fill="#ffffff" font-size="18" text-anchor="middle">약 "1조 분의 1" ➔ 증명 완료!</text>
    </g>

</svg>