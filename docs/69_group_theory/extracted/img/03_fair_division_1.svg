<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">인간의 이기심을 이용한 공평 분베 알고리즘: I Cut, You Choose</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"형의 꼼수(버그) 를 원천차단하기
        위해 권력을 분리한다. 분할(Cut)의 칼과 우선 선택권(Choose)의 방패!"</text>

    <!-- Center Pizza Graphic -->
    <g transform="translate(450, 260)">
        <!-- Pizza Base -->
        <circle cx="0" cy="0" r="100" fill="#ffaa00" stroke="#ff5555" stroke-width="4" />
        <!-- Pepperonis -->
        <circle cx="-40" cy="-30" r="15" fill="#ff0000" />
        <circle cx="50" cy="20" r="15" fill="#ff0000" />
        <circle cx="-20" cy="50" r="15" fill="#ff0000" />
        <circle cx="30" cy="-60" r="15" fill="#ff0000" />
        <circle cx="0" cy="10" r="15" fill="#ff0000" />

        <!-- 50:50 Perfect Cut Line (Glowing) -->
        <line x1="0" y1="-120" x2="0" y2="120" stroke="#00ffcc" stroke-width="6" stroke-dasharray="10 5"
            filter="url(#glow)" />

        <!-- The Cutter Knife -->
        <g transform="translate(0, -110)">
            <path d="M -5 -60 L 5 -60 L 5 0 L -5 0 Z" fill="#777" />
            <path d="M -5 0 L 0 50 L 5 0 Z" fill="#ffffff" filter="url(#glow)" />
        </g>
    </g>

    <!-- Left: Player 1 (Cutter / 형) -->
    <g transform="translate(80, 180)">
        <rect x="0" y="0" width="220" height="150" rx="15" fill="#001122" stroke="#4da6ff" stroke-width="3" />
        <text x="110" y="30" fill="#4da6ff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">형: 분할자 (Cutter)</text>
        <line x1="20" y1="40" x2="200" y2="40" stroke="#4da6ff" stroke-width="1" />

        <text x="110" y="65" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">머릿속 시뮬레이션
            회로:</text>
        <text x="110" y="90" fill="#ff5555" font-family="monospace" font-size="12" font-weight="bold"
            text-anchor="middle">"60:40으로 꼼수 분열시키면..."</text>
        <text x="110" y="110" fill="#ffffff" font-family="monospace" font-size="12" text-anchor="middle">"동생이 60짜리를 뺏어갈
            거야 ㅠㅠ"</text>
        <text x="110" y="135" fill="#00ffcc" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">👉 강제된 정직함: 무조건 50:50 분할</text>
    </g>

    <!-- Right: Player 2 (Chooser / 동생) -->
    <g transform="translate(600, 180)">
        <rect x="0" y="0" width="220" height="150" rx="15" fill="#221100" stroke="#ffaa00" stroke-width="3" />
        <text x="110" y="30" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">동생: 선택자 (Chooser)</text>
        <line x1="20" y1="40" x2="200" y2="40" stroke="#ffaa00" stroke-width="1" />

        <text x="110" y="65" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">절대 무적의
            권한:</text>
        <text x="110" y="90" fill="#ff00ff" font-family="monospace" font-size="12" font-weight="bold"
            text-anchor="middle">"형의 의도 따윈 궁금하지 않아."</text>
        <text x="110" y="110" fill="#ffffff" font-family="monospace" font-size="12" text-anchor="middle">"내 눈에 조금이라도 큰 걸
            고른다."</text>
        <text x="110" y="135" fill="#ffff00" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">👉 max(pizza_slices) 발동!</text>
    </g>

    <!-- Arrow pointing from Chooser to Pizza -->
    <path d="M 600 240 Q 550 240 500 240" fill="none" stroke="#ffff00" stroke-width="4" stroke-dasharray="8 6"
        marker-end="url(#arrow_w)" />

    <defs>
        <marker id="arrow_w" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffff00" />
        </marker>
    </defs>

    <!-- Base Explain -->
    <rect x="100" y="470" width="700" height="80" rx="10" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="500" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        인간의 '선한 양심' 은 통계학에서 에러(Error) 처리 대상입니다. 해커들은 인간의 이기심을 역이용합니다.
    </text>
    <text x="450" y="530" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        상대가 <tspan fill="#ffff00" font-weight="bold">Max() 우선권</tspan>을 쥐고 있으면, 분할자(Cutter) 는 스스로 파멸하지 않기 위해 어쩔 수 없이
        <tspan fill="#00ffcc" font-weight="bold">50:50 정직 루트</tspan> 를 탑니다.
    </text>
</svg>