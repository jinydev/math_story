<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .wire-off {
                fill: none;
                stroke: #30363d;
                stroke-width: 6;
                stroke-linecap: round;
            }

            .wire-on {
                fill: none;
                stroke: #00ffff;
                stroke-width: 6;
                stroke-linecap: round;
                filter: drop-shadow(0 0 5px #00ffff);
            }

            .wire-fire {
                fill: none;
                stroke: #ff6464;
                stroke-width: 6;
                stroke-linecap: round;
                filter: drop-shadow(0 0 5px #ff6464);
            }

            .gate-box {
                fill: #161b22;
                stroke: #8b949e;
                stroke-width: 3;
                rx: 8;
            }

            .bulb-off {
                fill: #161b22;
                stroke: #30363d;
                stroke-width: 3;
            }

            .bulb-on {
                fill: #ffaa64;
                stroke: #ff6464;
                stroke-width: 3;
                filter: drop-shadow(0 0 10px #ffaa64);
                animation: pulse 1.5s infinite alternate;
            }

            @keyframes pulse {
                to {
                    filter: drop-shadow(0 0 20px #ffaa64);
                }
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 15px;
                text-anchor: middle;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="400" y="40" class="title">라이프니츠의 2진법 &amp; 부울(Boolean) 논리 엔진</text>
    <text x="400" y="70" class="desc">오직 1(True/ON)과 0(False/OFF)의 전기 충돌만으로 소프트웨어 논리가 탄생한다</text>

    <!-- AND Logic Gate -->
    <g transform="translate(100, 130)">
        <text x="150" y="-10" fill="#ffffff" font-size="20" text-anchor="middle">AND 게이트 (둘 다 참 조건)</text>

        <!-- Input wires -->
        <path d="M 0 40 L 80 40" class="wire-on" />
        <text x="20" y="30" fill="#00ffff" font-size="16">1 (ON)</text>

        <path d="M 0 110 L 80 110" class="wire-off" />
        <text x="20" y="100" fill="#888" font-size="16">0 (OFF)</text>

        <!-- Logic Box -->
        <rect x="80" y="20" width="100" height="110" class="gate-box" />
        <text x="130" y="85" fill="#8b949e" font-size="28" text-anchor="middle">AND</text>

        <!-- Output wire -->
        <path d="M 180 75 L 250 75" class="wire-off" />

        <!-- Bulb (Output) -->
        <circle cx="270" cy="75" r="20" class="bulb-off" />
        <text x="320" y="80" fill="#ff6464" font-size="18">0 (침묵/발사 취소)</text>
    </g>

    <!-- OR Logic Gate -->
    <g transform="translate(100, 320)">
        <text x="150" y="-10" fill="#ffffff" font-size="20" text-anchor="middle">OR 게이트 (둘 중 하나라도 참 조건)</text>

        <!-- Input wires -->
        <path d="M 0 40 L 80 40" class="wire-on" />
        <text x="20" y="30" fill="#00ffff" font-size="16">1 (ON)</text>

        <path d="M 0 110 L 80 110" class="wire-off" />
        <text x="20" y="100" fill="#888" font-size="16">0 (OFF)</text>

        <!-- Logic Box -->
        <rect x="80" y="20" width="100" height="110" class="gate-box" />
        <text x="130" y="85" fill="#8b949e" font-size="28" text-anchor="middle">OR</text>

        <!-- Output wire -->
        <path d="M 180 75 L 250 75" class="wire-fire" />

        <!-- Bulb (Output) -->
        <circle cx="270" cy="75" r="20" class="bulb-on" />
        <text x="320" y="80" fill="#64ff64" font-size="18">1 (점화/강제 시동!)</text>
    </g>

    <!-- Info -->
    <g transform="translate(600, 150)">
        <rect x="-20" y="0" width="180" height="300" fill="#161b22" stroke="#30363d" stroke-width="2" rx="5" />
        <text x="70" y="40" fill="#ffffff" font-size="18" text-anchor="middle">Python</text>
        <text x="70" y="65" fill="#00ffff" font-size="14" text-anchor="middle">if 1 and 0:</text>
        <text x="70" y="90" fill="#ff6464" font-size="14" text-anchor="middle"> False</text>

        <text x="70" y="150" fill="#ffffff" font-size="18" text-anchor="middle">Python</text>
        <text x="70" y="175" fill="#00ffff" font-size="14" text-anchor="middle">if 1 or 0:</text>
        <text x="70" y="200" fill="#64ff64" font-size="14" text-anchor="middle"> True</text>

        <text x="70" y="250" fill="#888" font-size="12" text-anchor="middle">컴퓨터 두뇌의</text>
        <text x="70" y="270" fill="#888" font-size="12" text-anchor="middle">모든 소프트웨어는</text>
        <text x="70" y="290" fill="#888" font-size="12" text-anchor="middle">이 물리적 논리가 조종한다</text>
    </g>
</svg>