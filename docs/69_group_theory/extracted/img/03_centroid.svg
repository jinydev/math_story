<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">무게중심 (Centroid): 질량 밸런스의 코어</text>

    <g transform="translate(300, 270)">

        <!-- Triangle Vertices ABC -->
        <!-- Let A = (0, -200), B = (-150, 100), C = (150, 100) -->
        <path d="M 0 -200 L -150 100 L 150 100 Z" fill="#2d2d3a" stroke="#ffffff" stroke-width="3" />

        <!-- Midpoints -->
        <!-- M1 (BC) = (0, 100) -->
        <circle cx="0" cy="100" r="5" fill="#aaaaaa" />
        <text x="0" y="125" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">중점</text>

        <!-- M2 (AC) = (75, -50) -->
        <circle cx="75" cy="-50" r="5" fill="#aaaaaa" />
        <text x="95" y="-60" fill="#aaaaaa" font-family="sans-serif" font-size="16">중점</text>

        <!-- M3 (AB) = (-75, -50) -->
        <circle cx="-75" cy="-50" r="5" fill="#aaaaaa" />
        <text x="-120" y="-60" fill="#aaaaaa" font-family="sans-serif" font-size="16">중점</text>

        <!-- Medians -->
        <line x1="0" y1="-200" x2="0" y2="100" stroke="#00ffcc" stroke-width="3" stroke-dasharray="6 4"
            filter="url(#glow)" />
        <line x1="-150" y1="100" x2="75" y2="-50" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="6 4" />
        <line x1="150" y1="100" x2="-75" y2="-50" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="6 4" />

        <!-- Centroid Point G -->
        <!-- G is the average of A,B,C. x = (0-150+150)/3 = 0. y = (-200+100+100)/3 = 0 -->
        <circle cx="0" cy="0" r="8" fill="#4da6ff" filter="url(#glow)" />
        <text x="-25" y="-10" fill="#4da6ff" font-family="monospace" font-size="28" font-weight="bold"
            filter="url(#glow)">G</text>

        <path d="M -15 0 A 25 25 0 1 1 15 0" fill="none" stroke="#4da6ff" stroke-width="2" stroke-dasharray="3 3" />

        <!-- 2:1 Ratio Label on Median AM1 -->
        <rect x="-35" y="-120" width="30" height="30" rx="5" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="-20" y="-100" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">2</text>

        <rect x="-35" y="40" width="30" height="30" rx="5" fill="#112233" stroke="#00ffcc" stroke-width="2" />
        <text x="-20" y="60" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">1</text>

        <!-- Marks on Sub-segments -->
        <line x1="-12" y1="-80" x2="12" y2="-80" stroke="#ffffff" stroke-width="2" />
        <line x1="-12" y1="-120" x2="12" y2="-120" stroke="#ffffff" stroke-width="2" />

        <line x1="-12" y1="50" x2="12" y2="50" stroke="#ffffff" stroke-width="2" />

        <!-- Labels for Vertices -->
        <text x="0" y="-215" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">A</text>
        <text x="-165" y="115" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">B</text>
        <text x="165" y="115" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">C</text>
    </g>

    <!-- Explanation Texts -->
    <rect x="550" y="150" width="230" height="200" rx="15" fill="#112233" stroke="#4da6ff" stroke-width="2" />
    <text x="570" y="185" fill="#4da6ff" font-family="sans-serif" font-size="20" font-weight="bold">물리학 허브의 법칙</text>

    <rect x="570" y="210" width="10" height="10" fill="#4da6ff" />
    <text x="590" y="220" fill="#ffffff" font-family="sans-serif" font-size="16">꼭짓점들과 맞은편의</text>
    <text x="590" y="245" fill="#ffffff" font-family="sans-serif" font-size="16">중점을 이은 중선들이</text>
    <text x="590" y="270" fill="#ffffff" font-family="sans-serif" font-size="16">만나는 <tspan fill="#ffaa00"
            font-weight="bold">평균 좌표</tspan>.</text>

    <rect x="570" y="310" width="10" height="10" fill="#00ffcc" />
    <text x="590" y="320" fill="#ffffff" font-family="sans-serif" font-size="16">꼭짓점에서부터 무조건</text>
    <text x="590" y="345" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold">2 : 1 황금비율 작용</text>

    <!-- Bottom Subtitle -->
    <rect x="150" y="440" width="500" height="40" rx="10" fill="#2b1111" stroke="#ff4d4d" stroke-width="2" />
    <text x="400" y="465" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">삼각형 판때기를 연필 위에
        올려놓고 손을 뗄 때, <tspan fill="#4da6ff" font-weight="bold">절대 떨어지지 않는 단 하나의 점</tspan></text>

</svg>