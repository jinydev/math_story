<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .title {
                fill: #ffffff;
                font-size: 26px;
                text-anchor: middle;
            }

            .desc {
                fill: #8b949e;
                font-size: 16px;
                text-anchor: middle;
            }

            .st-p {
                fill: #00ffff;
            }

            .st-q {
                fill: #ff6464;
            }

            .math {
                font-size: 60px;
                text-anchor: middle;
                font-weight: bold;
            }

            .label {
                font-size: 24px;
                text-anchor: middle;
            }

            .sublabel {
                font-size: 18px;
                text-anchor: middle;
            }

            .arrow {
                fill: none;
                stroke: #ffffff;
                stroke-width: 15;
                stroke-dasharray: 20, 10;
                stroke-linecap: round;
            }

            /* Gun icon (simple abstract representation) */
            .gun-barrel {
                fill: #aaa;
                stroke: #fff;
                stroke-width: 3;
            }

            .gun-handle {
                fill: #555;
                stroke: #fff;
                stroke-width: 3;
            }

            /* Blood drop */
            .blood {
                fill: #ff0000;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />
    <text x="400" y="40" class="title">총(\u2b62)과 피(\U0001fa78) 암기법 (Sufficient &amp; Necessary)</text>
    <text x="400" y="65" class="desc">만약 p 이면 q 이다 (p → q 가 참일 때)</text>

    <!-- p (Shooter) -->
    <g transform="translate(200, 250)">
        <circle cx="0" cy="0" r="80" fill="rgba(0, 255, 255, 0.1)" stroke="#00ffff" stroke-width="4" />
        <text x="0" y="15" class="math st-p">p</text>

        <text x="0" y="120" class="label st-p">충분 조건</text>
        <text x="0" y="150" class="sublabel st-p">총알이 충분하니까 쏜다!</text>

        <!-- Abstract Gun -->
        <g transform="translate(60, -20)">
            <rect x="0" y="0" width="80" height="20" class="gun-barrel" />
            <rect x="0" y="20" width="20" height="40" class="gun-handle" transform="rotate(15)" />
        </g>
    </g>

    <!-- Arrow/Bullet Path -->
    <path d="M 360 230 L 530 230" class="arrow" />
    <polygon points="530 210, 580 230, 530 250" fill="#ffffff" />
    <text x="450" y="210" fill="#ffffff" font-size="28" font-weight="bold" text-anchor="middle">→</text>

    <!-- q (Target) -->
    <g transform="translate(600, 250)">
        <circle cx="0" cy="0" r="100" fill="rgba(255, 100, 100, 0.1)" stroke="#ff6464" stroke-width="4" />
        <text x="0" y="15" class="math st-q">q</text>

        <text x="0" y="130" class="label st-q">필요 조건</text>
        <text x="0" y="160" class="sublabel st-q">화살 맞아서 피(필요) 흘려!</text>

        <!-- Abstract Blood Drops -->
        <path d="M 0 50 Q 15 80 0 100 Q -15 80 0 50" class="blood" />
        <path d="M 30 60 Q 40 85 30 100 Q 20 85 30 60" class="blood" transform="scale(0.7) translate(30, 10)" />
        <path d="M -30 40 Q -20 70 -30 90 Q -40 70 -30 40" class="blood" transform="scale(0.5) translate(-70, 70)" />
    </g>

    <!-- Memory Tip Box -->
    <rect x="150" y="420" width="500" height="50" fill="rgba(255, 255, 0, 0.1)" stroke="#ffff00" stroke-width="2" rx="5"
        ry="5" />
    <text x="400" y="452" fill="#ffff00" font-size="20" font-weight="bold" text-anchor="middle">쏘는 놈 = 충분조건 / 맞는 놈 =
        필요조건</text>

</svg>