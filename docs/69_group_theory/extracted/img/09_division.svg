<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&amp;display=swap');

            text {
                font-family: 'Roboto Mono', monospace;
                font-weight: bold;
            }

            .bg {
                fill: #0d1117;
            }

            .axis {
                stroke: #444444;
                stroke-width: 3;
            }

            .tick {
                stroke: #888888;
                stroke-width: 2;
            }

            .segment {
                stroke: #cccccc;
                stroke-width: 4;
                stroke-dasharray: 10, 5;
            }

            .point-a {
                fill: #ff0055;
                stroke: #ffffff;
                stroke-width: 2;
            }

            .point-b {
                fill: #0088ff;
                stroke: #ffffff;
                stroke-width: 2;
            }

            .point-p {
                fill: #00ff00;
                stroke: #ffffff;
                stroke-width: 2;
            }

            .title {
                fill: #ffffff;
                font-size: 22px;
                text-anchor: middle;
            }

            .math-box {
                fill: #161b22;
                stroke: #00ff00;
                stroke-width: 2;
                rx: 10;
                ry: 10;
            }

            .math-text {
                font-size: 24px;
                fill: #00ff00;
                text-anchor: middle;
            }

            .curve-m {
                stroke: #ff0055;
                stroke-width: 3;
                fill: none;
            }

            .curve-n {
                stroke: #0088ff;
                stroke-width: 3;
                fill: none;
            }
        </style>
    </defs>

    <rect width="100%" height="100%" class="bg" />

    <text x="300" y="40" class="title">선분을 쪼개는 비율: 1:3 내분점 구하기</text>

    <!-- Horizontal Axis -->
    <line x1="50" y1="200" x2="550" y2="200" class="axis" />

    <!-- Number Line Ticks -->
    <g transform="translate(0, 200)">
        <!-- 0=100, 1=150, ..., 9=550 (50px per unit) -->
        <!-- We only need 0, 1, 3(P), 9 -->
        <line x1="50" y1="-10" x2="50" y2="10" class="tick" /> <text x="50" y="30" fill="#888">0</text>
        <line x1="100" y1="-10" x2="100" y2="10" class="tick" />
        <line x1="200" y1="-10" x2="200" y2="10" class="tick" />
        <line x1="500" y1="-10" x2="500" y2="10" class="tick" />
    </g>

    <!-- The segment AB -->
    <line x1="100" y1="200" x2="500" y2="200" class="segment" />

    <!-- Points -->
    <circle cx="100" cy="200" r="8" class="point-a" />
    <text x="100" y="240" fill="#ff0055" font-size="18" text-anchor="middle">A(1)</text>

    <circle cx="500" cy="200" r="8" class="point-b" />
    <text x="500" y="240" fill="#0088ff" font-size="18" text-anchor="middle">B(9)</text>

    <circle cx="200" cy="200" r="10" class="point-p" />
    <text x="200" y="250" fill="#00ff00" font-size="20" text-anchor="middle">P(3)</text>

    <!-- Ratio Arcs -->
    <!-- m = 1 -->
    <path d="M 100 190 Q 150 140 200 190" class="curve-m" />
    <text x="150" y="130" fill="#ff0055" font-size="20" text-anchor="middle">비율 1</text>

    <!-- n = 3 -->
    <path d="M 200 190 Q 350 50 500 190" class="curve-n" />
    <text x="350" y="90" fill="#0088ff" font-size="20" text-anchor="middle">비율 3</text>

    <!-- Math Formula Box -->
    <rect x="150" y="300" width="300" height="70" class="math-box" />
    <text x="300" y="330" fill="#ffffff" font-size="18" text-anchor="middle">크로스 곱 덧셈 연산</text>
    <text x="300" y="360" class="math-text">P = (1×9 + 3×1) / (1+3) = 3</text>

</svg>