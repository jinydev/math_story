<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">동류항 (Like Terms) 끼리 모여라!</text>

    <!-- The Mess -->
    <g transform="translate(100, 150)">
        <text x="0" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold">3</text>
        <text x="25" y="0" fill="#ff4d4d" font-family="monospace" font-size="40" font-weight="bold">x</text>

        <text x="60" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"> + 2</text>
        <text x="135" y="0" fill="#ffaa00" font-family="monospace" font-size="40" font-weight="bold">y</text>

        <text x="170" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"> + 2</text>
        <text x="245" y="0" fill="#ff4d4d" font-family="monospace" font-size="40" font-weight="bold">x</text>

        <text x="280" y="0" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"> + 1</text>
        <text x="355" y="0" fill="#ffaa00" font-family="monospace" font-size="40" font-weight="bold">y</text>
    </g>

    <!-- Sorting Arrows -->
    <!-- x group -->
    <path d="M 130 180 Q 200 250 250 300" fill="none" stroke="#ff4d4d" stroke-width="4" stroke-dasharray="8"
        opacity="0.7" />
    <path d="M 350 180 Q 300 250 280 300" fill="none" stroke="#ff4d4d" stroke-width="4" stroke-dasharray="8"
        opacity="0.7" />

    <!-- y group -->
    <path d="M 240 180 Q 350 220 500 300" fill="none" stroke="#ffaa00" stroke-width="4" stroke-dasharray="8"
        opacity="0.7" />
    <path d="M 460 180 Q 480 250 530 300" fill="none" stroke="#ffaa00" stroke-width="4" stroke-dasharray="8"
        opacity="0.7" />

    <!-- The Cleaned Result -->
    <g transform="translate(260, 330)">
        <!-- Red Basket (x) -->
        <rect x="-90" y="-50" width="150" height="70" rx="10" fill="#2b1111" stroke="#ff4d4d" stroke-width="3"
            filter="url(#glow)" />
        <text x="-15" y="-5" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">5</text>
        <text x="20" y="-5" fill="#ff4d4d" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">x</text>

        <!-- Plus -->
        <text x="110" y="-5" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">+</text>

        <!-- Yellow Basket (y) -->
        <rect x="170" y="-50" width="150" height="70" rx="10" fill="#2b2200" stroke="#ffaa00" stroke-width="3"
            filter="url(#glow)" />
        <text x="245" y="-5" fill="#ffffff" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">3</text>
        <text x="280" y="-5" fill="#ffaa00" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">y</text>
    </g>

    <!-- Explanatory Text -->
    <rect x="550" y="120" width="220" height="80" rx="10" fill="#223344" stroke="#4da6ff" stroke-width="2" />
    <text x="660" y="150" fill="#4da6ff" font-family="sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle">동류항의 조건</text>
    <text x="660" y="180" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">1. 같은 문자 (x
        끼리)</text>

</svg>