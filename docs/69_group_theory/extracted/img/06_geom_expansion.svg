<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">완전제곱식 증명: (a + b)² = a² + 2ab + b²</text>

    <!-- The large geometric square -->
    <g transform="translate(150, 100)">

        <!-- Top-Left: a^2 -->
        <rect x="0" y="0" width="160" height="160" fill="#2b1111" stroke="#ff4d4d" stroke-width="3"
            filter="url(#glow)" />
        <text x="80" y="90" fill="#ff4d4d" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle">a²</text>

        <!-- Top-Right: ab -->
        <rect x="160" y="0" width="80" height="160" fill="#112b11" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="200" y="90" fill="#00ffcc" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">ab</text>

        <!-- Bottom-Left: ab -->
        <rect x="0" y="160" width="160" height="80" fill="#112b11" stroke="#00ffcc" stroke-width="3"
            filter="url(#glow)" />
        <text x="80" y="210" fill="#00ffcc" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">ab</text>

        <!-- Bottom-Right: b^2 -->
        <rect x="160" y="160" width="80" height="80" fill="#11112b" stroke="#4da6ff" stroke-width="3"
            filter="url(#glow)" />
        <text x="200" y="210" fill="#4da6ff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">b²</text>

        <!-- Length Labels -->
        <!-- Top edge -->
        <text x="80" y="-15" fill="#ffffff" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">a</text>
        <text x="200" y="-15" fill="#ffffff" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">b</text>

        <!-- Left edge -->
        <text x="-20" y="90" fill="#ffffff" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">a</text>
        <text x="-20" y="210" fill="#ffffff" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">b</text>

        <!-- Total Dimensions Brackets (simulated with paths) -->
        <!-- Top bracket -->
        <path d="M 0 -40 L 0 -50 L 240 -50 L 240 -40" fill="none" stroke="#aaaaaa" stroke-width="2" />
        <text x="120" y="-60" fill="#aaaaaa" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle">a + b</text>

        <!-- Left bracket -->
        <path d="M -40 0 L -50 0 L -50 240 L -40 240" fill="none" stroke="#aaaaaa" stroke-width="2" />
        <text x="-80" y="130" fill="#aaaaaa" font-family="monospace" font-size="24" font-weight="bold"
            text-anchor="middle" transform="rotate(-90 -80 130)">a + b</text>
    </g>

    <!-- The resulting equation explanation -->
    <g transform="translate(480, 180)">
        <text x="0" y="0" fill="#ffffff" font-family="monospace" font-size="35" font-weight="bold">총 넓이 = </text>

        <!-- Equation pieces -->
        <text x="10" y="50" fill="#ff4d4d" font-family="monospace" font-size="35" font-weight="bold"
            filter="url(#glow)">a²</text>
        <text x="60" y="50" fill="#ffffff" font-family="monospace" font-size="35" font-weight="bold"> + </text>

        <text x="110" y="50" fill="#00ffcc" font-family="monospace" font-size="35" font-weight="bold"
            filter="url(#glow)">2ab</text>
        <text x="180" y="50" fill="#ffffff" font-family="monospace" font-size="35" font-weight="bold"> + </text>

        <text x="230" y="50" fill="#4da6ff" font-family="monospace" font-size="35" font-weight="bold"
            filter="url(#glow)">b²</text>

        <!-- Subtext explaining the 2ab -->
        <path d="M 140 60 L 140 80" stroke="#00ffcc" stroke-width="2" stroke-dasharray="4" />
        <text x="140" y="100" fill="#00ffcc" font-family="sans-serif" font-size="16" text-anchor="middle">ab 직사각형이
            2개!</text>
    </g>

</svg>