<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrowRight" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff4d4d" />
        </marker>
        <marker id="arrowLeft" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
        <marker id="arrowFlip" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffaa00" />
        </marker>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">마이너스 곱하기: 180도 방향 회전 스위치</text>

    <!-- Number Line 1: 3 * (-1) = -3 -->
    <g transform="translate(100, 200)">
        <line x1="0" y1="0" x2="700" y2="0" stroke="#777777" stroke-width="4" />
        <circle cx="350" cy="0" r="8" fill="#ffffff" />
        <text x="350" y="30" fill="#ffffff" font-family="monospace" font-size="20" text-anchor="middle">0</text>

        <line x1="550" y1="-10" x2="550" y2="10" stroke="#777777" stroke-width="2" />
        <text x="550" y="30" fill="#aaaaaa" font-family="monospace" font-size="16" text-anchor="middle">+3</text>

        <line x1="150" y1="-10" x2="150" y2="10" stroke="#777777" stroke-width="2" />
        <text x="150" y="30" fill="#aaaaaa" font-family="monospace" font-size="16" text-anchor="middle">-3</text>

        <!-- Original Arrow (+3) -->
        <path d="M 350 -30 L 530 -30" fill="none" stroke="#ff4d4d" stroke-width="6" marker-end="url(#arrowRight)" />
        <text x="450" y="-45" fill="#ff4d4d" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">+3</text>

        <!-- Flip Action -->
        <path d="M 450 -60 Q 350 -150 250 -60" fill="none" stroke="#ffaa00" stroke-width="4" stroke-dasharray="6 4"
            marker-end="url(#arrowFlip)" filter="url(#glow)" />
        <text x="350" y="-120" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">× (-1) 방향 180° 뒤집기!</text>

        <!-- Result Arrow (-3) -->
        <path d="M 350 -30 L 170 -30" fill="none" stroke="#00ffcc" stroke-width="6" marker-end="url(#arrowLeft)" />
        <text x="130" y="-45" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="end">-3</text>
    </g>

    <!-- Number Line 2: (-3) * (-2) = +6 -->
    <g transform="translate(100, 420)">
        <line x1="0" y1="0" x2="700" y2="0" stroke="#777777" stroke-width="4" />
        <circle cx="350" cy="0" r="8" fill="#ffffff" />
        <text x="350" y="30" fill="#ffffff" font-family="monospace" font-size="20" text-anchor="middle">0</text>

        <line x1="150" y1="-10" x2="150" y2="10" stroke="#777777" stroke-width="2" />
        <text x="150" y="30" fill="#aaaaaa" font-family="monospace" font-size="16" text-anchor="middle">-3</text>

        <line x1="680" y1="-10" x2="680" y2="10" stroke="#777777" stroke-width="2" />
        <text x="680" y="30" fill="#aaaaaa" font-family="monospace" font-size="16" text-anchor="middle">+6</text>

        <!-- Original Arrow (-3) -->
        <path d="M 350 -30 L 170 -30" fill="none" stroke="#00ffcc" stroke-width="6" marker-end="url(#arrowLeft)" />
        <text x="250" y="-45" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">-3</text>

        <!-- Flip & Scale Action -->
        <path d="M 250 -60 Q 350 -150 550 -60" fill="none" stroke="#ffaa00" stroke-width="4" stroke-dasharray="6 4"
            marker-end="url(#arrowFlip)" filter="url(#glow)" />
        <text x="400" y="-120" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">× (-2) 크기 2배 + 180° 회전!</text>

        <!-- Result Arrow (+6) -->
        <path d="M 350 -30 L 660 -30" fill="none" stroke="#ff4d4d" stroke-width="6" marker-end="url(#arrowRight)" />
        <text x="670" y="-45" fill="#ff4d4d" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="start">+6</text>
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="520" width="600" height="50" rx="10" fill="#112233" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="550" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">"음수 × 음수 = 양수" 는
        벡터 방향이 2번 뒤집어져 원래 방향으로 돌아오는 현상이다.</text>

</svg>