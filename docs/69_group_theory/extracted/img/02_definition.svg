<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffaa00" />
        </marker>
    </defs>

    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">어깨 위 지수의 화려한 독립: 로그의 정의</text>

    <!-- Left: Exponent Expression -->
    <g transform="translate(250, 250)">
        <rect x="-180" y="-150" width="360" height="250" rx="20" fill="#112233" stroke="#4da6ff" stroke-width="3"
            opacity="0.8" />
        <text x="0" y="-100" fill="#4da6ff" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">지수 (Exponent) 세계</text>

        <!-- 2^3 = 8 -->
        <text x="-40" y="20" fill="#ff4d4d" font-family="monospace" font-size="80" font-weight="bold">2</text>
        <text x="10" y="-30" fill="#ffaa00" font-family="monospace" font-size="60" font-weight="bold">3</text>
        <text x="60" y="10" fill="#ffffff" font-family="monospace" font-size="60" font-weight="bold">= 8</text>

        <!-- Labels -->
        <text x="-25" y="60" fill="#ff4d4d" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">밑 (Base)</text>
        <text x="30" y="-80" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">지수</text>
    </g>

    <!-- Center Arrow -->
    <path d="M 460 220 Q 500 150 540 220" fill="none" stroke="#ffaa00" stroke-width="4" marker-end="url(#arrow)"
        stroke-dasharray="10 6" />
    <text x="500" y="180" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle">지수의 독립 선언!</text>

    <!-- Right: Logarithm Expression -->
    <g transform="translate(680, 250)">
        <rect x="-180" y="-150" width="360" height="250" rx="20" fill="#2b1133" stroke="#ff00ff" stroke-width="3"
            opacity="0.8" />
        <text x="0" y="-100" fill="#ff00ff" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">로그 (Logarithm) 세계</text>

        <!-- log_2 8 = 3 -->
        <text x="-120" y="20" fill="#ffffff" font-family="monospace" font-size="60" font-weight="bold">log</text>
        <text x="-5" y="40" fill="#ff4d4d" font-family="monospace" font-size="30" font-weight="bold">2</text>
        <text x="15" y="20" fill="#ffffff" font-family="monospace" font-size="60" font-weight="bold">8</text>
        <text x="65" y="10" fill="#ffffff" font-family="monospace" font-size="60" font-weight="bold">=</text>
        <text x="115" y="20" fill="#ffaa00" font-family="monospace" font-size="80" font-weight="bold"
            filter="url(#glow)">3</text>

        <!-- Labels -->
        <text x="-5" y="80" fill="#ff4d4d" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">밑 (Base)</text>
        <text x="35" y="-30" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">진수</text>
    </g>

    <!-- Explanation Bottom -->
    <rect x="150" y="380" width="600" height="80" rx="10" fill="#112233" stroke="#00ffcc" stroke-width="2" />
    <text x="450" y="410" fill="#ffffff" font-family="sans-serif" font-size="18" text-anchor="middle">"2를 몇 번 제곱해야 8이
        나오니?"</text>
    <text x="450" y="440" fill="#ffaa00" font-family="sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle">어깨에 매달려있던 <tspan fill="#ff00ff">지수(3)</tspan> 를 끌어내려 주인공으로 기르다!</text>

</svg>