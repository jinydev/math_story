<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <linearGradient id="gradientBar" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00ffcc" />
            <stop offset="95%" stop-color="#00ffcc" />
            <stop offset="95.1%" stop-color="#ff0055" />
            <stop offset="100%" stop-color="#ff0055" />
        </linearGradient>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">부동소수점 (Floating Point) 오류: 이진수 메모리의 형벌</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"컴퓨터 64비트 메모리에
        무한소수를 욱여넣으면 끄트머리에 우주적 쓰레기값 오차가 발생한다."</text>

    <!-- Python Console View -->
    <g transform="translate(250, 150)">
        <rect x="-150" y="-30" width="700" height="150" rx="10" fill="#000" stroke="#333" stroke-width="2" />
        <circle cx="-130" cy="-15" r="5" fill="#ff5555" />
        <circle cx="-110" cy="-15" r="5" fill="#ffff00" />
        <circle cx="-90" cy="-15" r="5" fill="#00ffcc" />

        <text x="-130" y="20" fill="#00ffcc" font-family="monospace" font-size="18" font-weight="bold">>>> 0.1 + 0.2
            <tspan fill="#555"># 수학적 정답: 0.3</tspan></text>
        <text x="-130" y="60" fill="#ff0055" font-family="monospace" font-size="24" font-weight="bold"
            filter="url(#glow)">0.30000000000000004</text>

        <text x="-130" y="100" fill="#ffff00" font-family="monospace" font-size="14">>>> result == 0.3</text>
        <text x="-130" y="120" fill="#ff5555" font-family="monospace" font-size="14" font-weight="bold">False</text>
    </g>

    <!-- Memory Blocks Visualization -->
    <g transform="translate(100, 350)">
        <text x="0" y="-10" fill="#fff" font-family="monospace" font-size="16">64-Bit Memory Allocation Limit</text>

        <!-- 64 bit blocks representation (visualized as a long bar) -->
        <rect x="0" y="0" width="700" height="40" fill="url(#gradientBar)" stroke="#fff" stroke-width="1" />

        <!-- Grid overlay to look like bits -->
        <path d="M 50 0 L 50 40 M 100 0 L 100 40 M 150 0 L 150 40 M 200 0 L 200 40 
             M 250 0 L 250 40 M 300 0 L 300 40 M 350 0 L 350 40 M 400 0 L 400 40 
             M 450 0 L 450 40 M 500 0 L 500 40 M 550 0 L 550 40 M 600 0 L 600 40 
             M 650 0 L 650 40" fill="none" stroke="#222" stroke-width="2" />

        <text x="330" y="25" fill="#000" font-weight="bold" font-family="monospace"
            font-size="20">0100110011001100110011...</text>

        <!-- Error indicator at the end -->
        <path d="M 665 0 L 665 -40 L 635 -40" fill="none" stroke="#ff0055" stroke-width="3" filter="url(#glow)" />
        <text x="560" y="-45" fill="#ff0055" font-weight="bold" font-size="14" filter="url(#glow)">용량 초과! 강제 반올림 오차
            (Noise)</text>

        <!-- Correct fraction -->
        <rect x="0" y="60" width="300" height="40" rx="5" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
        <text x="150" y="85" fill="#ff00ff" font-family="monospace" font-weight="bold" font-size="16"
            text-anchor="middle" filter="url(#glow)">
            fractions.Fraction(3, 10)
        </text>
        <text x="320" y="85" fill="#fff" font-size="14">-> 오차율 0% 의 가장 완벽하고 순수한 수학적 비율 데이터 저장 형태.</text>
    </g>

    <!-- Big Alert Bottom -->
    <rect x="100" y="480" width="700" height="90" rx="10" fill="#220000" stroke="#ff0055" stroke-width="3" />
    <text x="450" y="510" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        십진수 소수 0.1 과 0.2 는 컴퓨터 이진수로 변환될 때 <tspan fill="#ff0055" font-weight="bold">무한 순환소수</tspan> 가 되어버린다.
    </text>
    <text x="450" y="535" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        물리 엔진과 금융 서버를 설계할 때 소수점(Float) 대신
    </text>
    <text x="450" y="555" fill="#ff00ff" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">
        가장 순수한 분수형(Fraction) 라이브러리를 써야 하는 절대적 이유.
    </text>
</svg>