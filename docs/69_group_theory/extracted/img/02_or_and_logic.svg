<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
        </marker>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">경우의 수 확률 합의 법칙 vs 곱의 법칙 논리 회로</text>

    <!-- Left: OR Gate (합의 법칙) -->
    <g transform="translate(50, 100)">
        <rect x="0" y="0" width="320" height="350" rx="15" fill="#2d2d3a" stroke="#ff4d4d" stroke-width="2" />
        <text x="160" y="40" fill="#ff4d4d" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">합의 법칙 (OR)</text>
        <text x="160" y="65" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">"둘 중 하나만 선택
            (동시에 불가)"</text>

        <!-- Option A -->
        <rect x="40" y="100" width="100" height="120" rx="8" fill="#111122" stroke="#ffaa00" stroke-width="2" />
        <text x="90" y="130" fill="#ffaa00" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">면류</text>
        <text x="90" y="160" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">4종</text>

        <text x="160" y="170" fill="#ffffff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">+</text>

        <!-- Option B -->
        <rect x="180" y="100" width="100" height="120" rx="8" fill="#111122" stroke="#00ffcc" stroke-width="2" />
        <text x="230" y="130" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">밥류</text>
        <text x="230" y="160" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">3종</text>

        <!-- Arrow down -->
        <path d="M 160 230 L 160 260" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)" />

        <!-- Result -->
        <rect x="80" y="270" width="160" height="50" rx="8" fill="#ff4d4d" filter="url(#glow)" />
        <text x="160" y="303" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">총 7 가지</text>
    </g>

    <!-- VS Separator -->
    <text x="400" y="280" fill="#555555" font-family="sans-serif" font-size="36" font-weight="bold"
        text-anchor="middle">VS</text>

    <!-- Right: AND Gate (곱의 법칙) -->
    <g transform="translate(430, 100)">
        <rect x="0" y="0" width="320" height="350" rx="15" fill="#2d3a3a" stroke="#00ffcc" stroke-width="2" />
        <text x="160" y="40" fill="#00ffcc" font-family="sans-serif" font-size="22" font-weight="bold"
            text-anchor="middle">곱의 법칙 (AND)</text>
        <text x="160" y="65" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">"동시에 연달아 묶이는 콤보
            세트"</text>

        <!-- Option A -->
        <rect x="40" y="100" width="100" height="120" rx="8" fill="#112211" stroke="#ff4d4d" stroke-width="2" />
        <text x="90" y="130" fill="#ff4d4d" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">햄버거</text>
        <text x="90" y="160" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">3종</text>

        <text x="160" y="170" fill="#ffffff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">×</text>

        <!-- Option B -->
        <rect x="180" y="100" width="100" height="120" rx="8" fill="#112211" stroke="#4da6ff" stroke-width="2" />
        <text x="230" y="130" fill="#4da6ff" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">음료수</text>
        <text x="230" y="160" fill="#ffffff" font-family="monospace" font-size="28" font-weight="bold"
            text-anchor="middle">4종</text>

        <!-- Arrow down -->
        <path d="M 160 230 L 160 260" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)" />

        <!-- Result -->
        <rect x="80" y="270" width="160" height="50" rx="8" fill="#00ffcc" filter="url(#glow)" />
        <text x="160" y="303" fill="#111111" font-family="sans-serif" font-size="20" font-weight="bold"
            text-anchor="middle">총 12 콤보 가지</text>

        <!-- Visualizing branches subtly -->
        <path d="M 90 220 Q 160 240 200 220" stroke="#ff4d4d" stroke-width="1" fill="none" opacity="0.5" />
        <path d="M 90 220 Q 160 250 230 220" stroke="#ff4d4d" stroke-width="1" fill="none" opacity="0.5" />
        <path d="M 90 220 Q 160 260 260 220" stroke="#ff4d4d" stroke-width="1" fill="none" opacity="0.5" />
    </g>

</svg>