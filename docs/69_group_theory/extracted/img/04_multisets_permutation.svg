<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">거듭제곱의 파괴력: 중복순열 (n^r)</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"독립된 선택지(N) 가 무한
        재사용되며 자리 수(R) 만큼 폭발적으로 결합하는 구조"</text>

    <!-- High-tech Lock Concept -->
    <g transform="translate(150, 150)">

        <!-- Outer Lock Frame -->
        <rect x="-20" y="0" width="640" height="200" rx="15" fill="#111122" stroke="#4da6ff" stroke-width="3" />
        <path d="M 200 0 L 220 30 L 380 30 L 400 0" fill="#001a11" stroke="#00ffcc" stroke-width="2" />
        <text x="300" y="20" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">SECURITY SYSTEM (3 SLOTS)</text>

        <!-- Slot 1 -->
        <rect x="40" y="50" width="120" height="100" rx="10" fill="#000" stroke="#ff00ff" stroke-width="2" />
        <text x="100" y="80" fill="#ff00ff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">Slot 1</text>
        <text x="100" y="110" fill="#ffffff" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">7</text>
        <text x="100" y="140" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">(0~9, 10개
            가능)</text>

        <text x="200" y="110" fill="#4da6ff" font-size="24" font-weight="bold" text-anchor="middle">×</text>

        <!-- Slot 2 -->
        <rect x="240" y="50" width="120" height="100" rx="10" fill="#000" stroke="#ff00ff" stroke-width="2" />
        <text x="300" y="80" fill="#ff00ff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">Slot 2</text>
        <text x="300" y="110" fill="#ffffff" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">2</text>
        <text x="300" y="140" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">(!재사용: 10개
            가능!)</text> <!-- The Core Point -->

        <text x="400" y="110" fill="#4da6ff" font-size="24" font-weight="bold" text-anchor="middle">×</text>

        <!-- Slot 3 -->
        <rect x="440" y="50" width="120" height="100" rx="10" fill="#000" stroke="#ff00ff" stroke-width="2" />
        <text x="500" y="80" fill="#ff00ff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">Slot 3</text>
        <text x="500" y="110" fill="#ffffff" font-family="monospace" font-size="32" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">9</text>
        <text x="500" y="140" fill="#aaaaaa" font-family="sans-serif" font-size="12" text-anchor="middle">(!재사용: 10개
            가능!)</text>
    </g>

    <!-- Infinite Ammo Graphics -> Reusing the numbers -->
    <g transform="translate(150, 360)">
        <path d="M 100 0 Q 300 -60 500 0" fill="none" stroke="#ffff00" stroke-width="3" stroke-dasharray="10 5"
            marker-end="url(#arrow_y)" filter="url(#glow)" />
        <path d="M 300 -20 L 300 10 L 100 10 L 100 40" fill="none" stroke="#ffff00" stroke-width="3"
            stroke-dasharray="10 5" marker-end="url(#arrow_y)" filter="url(#glow)" />
        <text x="300" y="-35" fill="#ffff00" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">"앞에서 뭘 썼든 후보군 10개는 무한 스폰(재장전) 됨!"</text>
    </g>

    <defs>
        <marker id="arrow_y" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
            <polygon points="0 0, 6 2, 0 4" fill="#ffff00" />
        </marker>
    </defs>

    <!-- Big Computation Arrow & Output -->
    <rect x="150" y="440" width="600" height="100" rx="10" fill="#220000" stroke="#ff5555" stroke-width="2" />

    <text x="450" y="475" fill="#ff5555" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">공식 도출: n × n × n = n³ = 10³ = 1,000가지 암호</text>

    <text x="450" y="515" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">
        Brute-Force (무차별 대입 공격) 해커들이 파이썬 루프로 1초만에 1,000번을 대입하며 자물쇠를 박살내는 원리.
    </text>
</svg>