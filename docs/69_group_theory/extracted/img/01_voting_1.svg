<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
    <rect width="100%" height="100%" fill="#0a0a14" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title -->
    <text x="450" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">민주주의의 버그 해킹: 단순 다수결 vs 콩도르세 데스매치</text>
    <text x="450" y="80" fill="#aaaaaa" font-family="sans-serif" font-size="16" text-anchor="middle">"40% 득표로 권력을 잡는 기괴한
        분산 스킬인가, 잔인한 1:1 토너먼트로 진정한 강자를 뽑아낼 것인가."</text>

    <!-- Left: Plurality (Bug) -->
    <g transform="translate(100, 150)">
        <rect x="-20" y="-30" width="340" height="280" rx="15" fill="#1b1111" stroke="#ff5555" stroke-width="3" />
        <text x="150" y="0" fill="#ff5555" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">시스템 에러: 단순 다수결</text>

        <!-- Candidates -->
        <!-- A -->
        <rect x="20" y="40" width="40" height="120" fill="#ff00ff" stroke="#fff" stroke-width="2" />
        <text x="40" y="30" fill="#ff00ff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">A(일진)</text>
        <text x="40" y="80" fill="#ffffff" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">40표</text>
        <rect x="20" y="180" width="40" height="30" fill="#ff5555" rx="5" />
        <text x="40" y="200" fill="#fff" font-family="monospace" font-size="12" font-weight="bold"
            text-anchor="middle">당선!</text>

        <!-- B -->
        <rect x="110" y="70" width="40" height="90" fill="#4da6ff" stroke="#fff" stroke-width="2" />
        <text x="130" y="60" fill="#4da6ff" font-family="monospace" font-size="14" text-anchor="middle">B(모범)</text>
        <text x="130" y="110" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">30표</text>

        <!-- C -->
        <rect x="200" y="70" width="40" height="90" fill="#00ffcc" stroke="#fff" stroke-width="2" />
        <text x="220" y="60" fill="#00ffcc" font-family="monospace" font-size="14" text-anchor="middle">C(모범)</text>
        <text x="220" y="110" fill="#ffffff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="middle">30표</text>

        <!-- The Problem Line -->
        <path d="M 120 180 Q 175 240 230 180" fill="none" stroke="#aaaaaa" stroke-width="3" stroke-dasharray="5 5" />
        <text x="175" y="230" fill="#aaaaaa" font-family="sans-serif" font-size="14" text-anchor="middle">유사 성향 표 분산 (사표
            발생)</text>

        <!-- Verdict -->
        <text x="150" y="265" fill="#ff5555" font-family="monospace" font-size="14" font-weight="bold"
            text-anchor="middle">B, C 지지율 합 60% 무시됨 (어부지리 승)</text>
    </g>

    <!-- Right: Condorcet (Solution) -->
    <g transform="translate(500, 150)">
        <rect x="-20" y="-30" width="340" height="280" rx="15" fill="#001a11" stroke="#00ffcc" stroke-width="3" />
        <text x="150" y="0" fill="#00ffcc" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">해킹 패치: 콩도르세 쌍대비교</text>

        <!-- Match 1 -->
        <rect x="20" y="40" width="260" height="40" rx="5" fill="#052211" stroke="#00ffcc" />
        <text x="40" y="65" fill="#ff00ff" font-family="monospace" font-size="16" font-weight="bold">A (40표)</text>
        <text x="150" y="65" fill="#ffff00" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">VS</text>
        <text x="260" y="65" fill="#4da6ff" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="end">B (60표)</text>
        <path d="M 165 60 L 250 60" fill="none" stroke="#ffaa00" stroke-width="4" marker-end="url(#arrow_y)" />
        <text x="210" y="55" fill="#ffaa00" font-family="sans-serif" font-size="12" font-weight="bold"
            text-anchor="middle">B 압승!</text>

        <!-- Match 2 -->
        <rect x="20" y="100" width="260" height="40" rx="5" fill="#052211" stroke="#00ffcc" />
        <text x="40" y="125" fill="#ff00ff" font-family="monospace" font-size="16" font-weight="bold">A (40표)</text>
        <text x="150" y="125" fill="#ffff00" font-family="monospace" font-size="20" font-weight="bold"
            text-anchor="middle">VS</text>
        <text x="260" y="125" fill="#00ffcc" font-family="monospace" font-size="16" font-weight="bold"
            text-anchor="end">C (60표)</text>
        <path d="M 165 120 L 250 120" fill="none" stroke="#ffaa00" stroke-width="4" marker-end="url(#arrow_y)" />
        <text x="210" y="115" fill="#ffaa00" font-family="sans-serif" font-size="12" font-weight="bold"
            text-anchor="middle">C 압승!</text>

        <!-- Center Icon -->
        <g transform="translate(150, 200)">
            <!-- Crossed swords -->
            <line x1="-30" y1="-20" x2="30" y2="20" stroke="#ff00ff" stroke-width="4" />
            <line x1="-30" y1="20" x2="30" y2="-20" stroke="#ff00ff" stroke-width="4" />
            <circle cx="0" cy="0" r="15" fill="#111" stroke="#ffffff" stroke-width="2" />
            <text x="0" y="5" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold"
                text-anchor="middle">1:1</text>
        </g>

        <text x="150" y="260" fill="#00ffcc" font-family="sans-serif" font-size="14" font-weight="bold"
            text-anchor="middle">A는 1:1 결투 시 모두에게 패배 (진정한 약자)</text>
    </g>

    <!-- VS logic -->
    <text x="450" y="280" fill="#ffff00" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">VS</text>

    <defs>
        <marker id="arrow_y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ffaa00" />
        </marker>
    </defs>

    <!-- Base Explain -->
    <rect x="100" y="480" width="700" height="80" rx="10" fill="#1b1122" stroke="#ff00ff" stroke-width="2" />
    <text x="450" y="510" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        표가 분산되는 다수결의 빈틈을 파고들어, 전혀 지지받지 못하는 후보가 <tspan fill="#ff5555" font-weight="bold">어부지리 당선</tspan>되는 악몽을 막기 위해
    </text>
    <text x="450" y="540" fill="#ffffff" font-family="sans-serif" font-size="16" text-anchor="middle">
        프랑스의 콩도르세 백작은 후보들을 <tspan fill="#00ffcc" font-weight="bold">강제로 1:1 토너먼트에 던져버리는 쌍대비교 데스매치법</tspan> 을 창안했습니다.
    </text>
</svg>