<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
    <rect width="100%" height="100%" fill="#1a1a24" />

    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffcc" />
        </marker>
    </defs>

    <text x="400" y="50" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold" text-anchor="middle"
        filter="url(#glow)">조화수열 (Harmonic Sequence) = 뒤집어진 등차수열</text>

    <!-- Harmonic Sequence (Top) -->
    <g transform="translate(150, 100)">

        <!-- Fraction 1 -->
        <text x="0" y="0" fill="#ff4d4d" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">1</text>
        <line x1="-15" y1="10" x2="15" y2="10" stroke="#ffffff" stroke-width="3" />
        <text x="0" y="40" fill="#4da6ff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">2</text>

        <text x="60" y="25" fill="#aaaaaa" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">,</text>

        <!-- Fraction 2 -->
        <text x="120" y="0" fill="#ff4d4d" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">1</text>
        <line x1="105" y1="10" x2="135" y2="10" stroke="#ffffff" stroke-width="3" />
        <text x="120" y="40" fill="#4da6ff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">5</text>

        <text x="180" y="25" fill="#aaaaaa" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">,</text>

        <!-- Fraction 3 -->
        <text x="240" y="0" fill="#ff4d4d" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">1</text>
        <line x1="225" y1="10" x2="255" y2="10" stroke="#ffffff" stroke-width="3" />
        <text x="240" y="40" fill="#4da6ff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">8</text>

        <text x="300" y="25" fill="#aaaaaa" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">,</text>

        <!-- Fraction 4 -->
        <text x="360" y="0" fill="#ff4d4d" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">1</text>
        <line x1="345" y1="10" x2="375" y2="10" stroke="#ffffff" stroke-width="3" />
        <text x="360" y="40" fill="#4da6ff" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">11</text>

        <text x="420" y="25" fill="#aaaaaa" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">...</text>

        <!-- The Inversion Arrows -->
        <!-- Flip Arrow 1 -->
        <path d="M 0 60 Q 30 110 0 160" fill="none" stroke="#00ffcc" stroke-width="3" stroke-dasharray="6"
            marker-end="url(#arrow)" />
        <text x="-40" y="115" fill="#00ffcc" font-family="sans-serif" font-size="16" font-weight="bold"
            text-anchor="middle">역수</text>

        <!-- Flip Arrow 2 -->
        <path d="M 120 60 Q 150 110 120 160" fill="none" stroke="#00ffcc" stroke-width="3" stroke-dasharray="6"
            marker-end="url(#arrow)" />

        <!-- Flip Arrow 3 -->
        <path d="M 240 60 Q 270 110 240 160" fill="none" stroke="#00ffcc" stroke-width="3" stroke-dasharray="6"
            marker-end="url(#arrow)" />

        <!-- Flip Arrow 4 -->
        <path d="M 360 60 Q 390 110 360 160" fill="none" stroke="#00ffcc" stroke-width="3" stroke-dasharray="6"
            marker-end="url(#arrow)" />
    </g>

    <!-- Arithmetic Sequence (Bottom) -->
    <g transform="translate(150, 300)">

        <text x="0" y="0" fill="#4da6ff" font-family="monospace" font-size="40" font-weight="bold" text-anchor="middle"
            filter="url(#glow)">2</text>

        <!-- Arrow -->
        <path d="M 30 -10 Q 60 -30 90 -10" fill="none" stroke="#ffaa00" stroke-width="3" marker-end="url(#arrow)" />
        <text x="60" y="-35" fill="#ffaa00" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">+3</text>

        <text x="120" y="0" fill="#4da6ff" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">5</text>

        <!-- Arrow -->
        <path d="M 150 -10 Q 180 -30 210 -10" fill="none" stroke="#ffaa00" stroke-width="3" marker-end="url(#arrow)" />
        <text x="180" y="-35" fill="#ffaa00" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">+3</text>

        <text x="240" y="0" fill="#4da6ff" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">8</text>

        <!-- Arrow -->
        <path d="M 270 -10 Q 300 -30 330 -10" fill="none" stroke="#ffaa00" stroke-width="3" marker-end="url(#arrow)" />
        <text x="300" y="-35" fill="#ffaa00" font-family="monospace" font-size="18" font-weight="bold"
            text-anchor="middle">+3</text>

        <text x="360" y="0" fill="#4da6ff" font-family="monospace" font-size="40" font-weight="bold"
            text-anchor="middle" filter="url(#glow)">11</text>

        <text x="420" y="0" fill="#aaaaaa" font-family="monospace" font-size="30" font-weight="bold"
            text-anchor="middle">...</text>

        <!-- Box showing it's an Arithmetic sequence -->
        <rect x="-40" y="20" width="450" height="40" rx="10" fill="#112233" stroke="#ffaa00" stroke-width="2" />
        <text x="185" y="45" fill="#ffaa00" font-family="sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle">이것은 공차가 3인 완벽한 등차수열!</text>

    </g>

</svg>