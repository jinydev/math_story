<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#0b7285" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">여섯 번째 의사결정: '얼마를 기대하나요?' (기댓값, Expected Value)</text>

    <!-- Title / Setup -->
    <text x="300" y="55" fill="#495057" font-size="12" text-anchor="middle">도박장과 복권 명당이 절대 망하지 않는 수학적 원리</text>

    <!-- The Lottery Scenario -->
    <g transform="translate(60, 80)">
        <rect x="0" y="0" width="150" height="140" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="75" y="20" fill="#0b7285" font-size="14" font-weight="bold" text-anchor="middle">🎟️ 마법의 제비뽑기</text>

        <!-- Tickets -->
        <rect x="25" y="40" width="100" height="25" fill="#ffd43b" rx="2" />
        <text x="75" y="57" fill="#495057" font-size="11" font-weight="bold" text-anchor="middle">10,000원 (1장,
            10%)</text>

        <rect x="25" y="70" width="100" height="25" fill="#a5d8ff" rx="2" />
        <text x="75" y="87" fill="#495057" font-size="11" font-weight="bold" text-anchor="middle">1,000원 (3장,
            30%)</text>

        <rect x="25" y="100" width="100" height="25" fill="#f1f3f5" rx="2" />
        <text x="75" y="117" fill="#495057" font-size="11" font-weight="bold" text-anchor="middle">꽝! 0원 (6장,
            60%)</text>

    </g>

    <!-- Calculation Logic -->
    <g transform="translate(240, 80)">
        <path d="M -15 70 L 15 70" fill="none" stroke="#adb5bd" stroke-width="3" stroke-dasharray="4,2"
            marker-end="url(#arrow)" />

        <rect x="20" y="0" width="300" height="140" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="170" y="20" fill="#e67700" font-size="14" font-weight="bold" text-anchor="middle">📊 평균적인 수확량 예측
            (기댓값)</text>

        <!-- Formula breakdown -->
        <text x="30" y="45" fill="#495057" font-size="12">수익 = (수익금 × 그 확률) 달을 무한반복 합산!</text>

        <!-- Calculation Line -->
        <rect x="30" y="60" width="280" height="30" fill="#f8f9fa" />
        <text x="40" y="80" fill="#0b7285" font-size="13" font-family="monospace">
            (10K × 0.1) + (1K × 0.3) + (0 × 0.6)
        </text>

        <!-- Result -->
        <text x="170" y="110" fill="#d9480f" font-size="14" font-weight="bold" text-anchor="middle">기댓값 (E) = 1,300
            원</text>

        <text x="170" y="130" fill="#fa5252" font-size="11" font-weight="bold" text-anchor="middle">참가비가 2,000원이면 절대 이
            게임을 하면 안 된다!</text>
    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
</svg>