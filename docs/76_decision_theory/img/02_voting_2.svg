<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#f59f00" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">두 번째 의사결정: '우선순위를 포인트(Point)로! 보다 시스템'</text>

    <!-- The Problem with single choice -->
    <g transform="translate(40, 60)">
        <rect x="0" y="0" width="160" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="80" y="20" fill="#fa5252" font-size="12" font-weight="bold" text-anchor="middle">❌ 일반 투표용지</text>

        <rect x="20" y="40" width="120" height="90" fill="#ffe3e3" stroke="#fa5252" stroke-dasharray="2,2" />
        <text x="80" y="60" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">단 1명만 고르시오.</text>

        <circle cx="40" cy="85" r="8" fill="#fff" stroke="#fa5252" stroke-width="2" />
        <text x="70" y="90" fill="#495057" font-size="12">A 후보 (도장 쾅!)</text>

        <text x="80" y="120" fill="#fa5252" font-size="10" font-weight="bold" text-anchor="middle">나의 2지망, 3지망</text>
        <text x="80" y="135" fill="#fa5252" font-size="10" font-weight="bold" text-anchor="middle">마음은 완전히 무시됨!</text>
    </g>

    <!-- Magic Transformation Arrow -->
    <path d="M 220 120 L 290 120" fill="none" stroke="#f59f00" stroke-width="4" marker-end="url(#arrow-orange)" />
    <rect x="235" y="105" width="40" height="25" fill="#fff4e6" rx="4" />
    <text x="255" y="122" fill="#d9480f" font-size="10" font-weight="bold" text-anchor="middle">순위화</text>

    <!-- Borda Count Method -->
    <g transform="translate(320, 60)">
        <rect x="0" y="0" width="240" height="150" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="120" y="20" fill="#f59f00" font-size="14" font-weight="bold" text-anchor="middle">✅ 보다(Borda)의 포인트
            시스템</text>

        <!-- Rank Slots -->
        <rect x="20" y="40" width="200" height="30" fill="#fff3bf" stroke="#f08c00" />
        <text x="50" y="60" fill="#d9480f" font-size="14" font-weight="bold" text-anchor="middle">1지망</text>
        <text x="110" y="60" fill="#495057" font-size="12" font-weight="bold" text-anchor="middle">B 후보</text>
        <text x="180" y="60" fill="#e8590c" font-size="14" font-weight="bold" text-anchor="middle">🔥 +3점</text>

        <rect x="20" y="70" width="200" height="30" fill="#fff" stroke="#adb5bd" />
        <text x="50" y="90" fill="#868e96" font-size="12" font-weight="bold" text-anchor="middle">2지망</text>
        <text x="110" y="90" fill="#495057" font-size="12" font-weight="bold" text-anchor="middle">C 후보</text>
        <text x="180" y="90" fill="#495057" font-size="12" font-weight="bold" text-anchor="middle">⭐ +2점</text>

        <rect x="20" y="100" width="200" height="30" fill="#f8f9fa" stroke="#adb5bd" stroke-dasharray="2,2" />
        <text x="50" y="120" fill="#868e96" font-size="12" font-weight="bold" text-anchor="middle">3지망</text>
        <text x="110" y="120" fill="#495057" font-size="12" font-weight="bold" text-anchor="middle">A 후보</text>
        <text x="180" y="120" fill="#495057" font-size="12" text-anchor="middle">✨ +1점</text>

        <text x="120" y="145" fill="#0b7285" font-size="10" font-weight="bold" text-anchor="middle">포인트를 합산하여 '모두에게 미움 안
            받는 자' 를 선출!</text>
    </g>

    <defs>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59f00" />
        </marker>
    </defs>
</svg>