<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#228be6" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">다섯 번째 통계 보스: 구간 압축 시스템 '도수분포표와 히스토그램'</text>

    <!-- Chaos Array Data -->
    <g transform="translate(60, 60)">
        <rect x="-10" y="-10" width="120" height="70" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="50" y="10" fill="#fa5252" font-size="12" font-weight="bold" text-anchor="middle">성적 원시 리스트</text>
        <text x="50" y="30" fill="#495057" font-size="10" text-anchor="middle">[73, 85, 92, 60, 88,</text>
        <text x="50" y="45" fill="#495057" font-size="10" text-anchor="middle"> 75, 42, 99, 81, 78]</text>

        <!-- Complaint -->
        <path d="M 50 60 L 50 140" fill="none" stroke="#fa5252" stroke-width="2" marker-end="url(#arrow-red)" />
        <text x="-10" y="100" fill="#fa5252" font-size="10" font-weight="bold">너무 파편화</text>
        <text x="-10" y="115" fill="#fa5252" font-size="10" font-weight="bold">되어서 못 읽어!</text>
    </g>

    <!-- Range Grouping Converter -->
    <path d="M 180 90 L 230 90" fill="none" stroke="#228be6" stroke-width="4" marker-end="url(#arrow-blue)" />
    <rect x="180" y="75" width="40" height="15" fill="#e7f5ff" rx="2" />
    <text x="200" y="86" fill="#1864ab" font-size="9" font-weight="bold" text-anchor="middle">구간 압축</text>

    <!-- Frequency Distribution Table -->
    <g transform="translate(250, 60)">
        <!-- Header -->
        <rect x="0" y="0" width="140" height="25" fill="#e7f5ff" stroke="#339af0" />
        <text x="40" y="16" fill="#1864ab" font-size="10" font-weight="bold" text-anchor="middle">계급 (Range)</text>
        <text x="110" y="16" fill="#1864ab" font-size="10" font-weight="bold" text-anchor="middle">도수</text>
        <line x1="80" y1="0" x2="80" y2="125" stroke="#339af0" />

        <!-- Group 1 -->
        <rect x="0" y="25" width="140" height="25" fill="#fff" stroke="#adb5bd" />
        <text x="40" y="42" fill="#495057" font-size="11" text-anchor="middle">60 ~ 70미만</text>
        <text x="110" y="42" fill="#495057" font-size="12" font-weight="bold" text-anchor="middle">1</text>

        <!-- Group 2 -->
        <rect x="0" y="50" width="140" height="25" fill="#f8f9fa" stroke="#adb5bd" />
        <text x="40" y="67" fill="#495057" font-size="11" text-anchor="middle">70 ~ 80미만</text>
        <text x="110" y="67" fill="#e8590c" font-size="14" font-weight="bold" text-anchor="middle">3</text>

        <!-- Group 3 -->
        <rect x="0" y="75" width="140" height="25" fill="#fff" stroke="#adb5bd" />
        <text x="40" y="92" fill="#495057" font-size="11" text-anchor="middle">80 ~ 90미만</text>
        <text x="110" y="92" fill="#2b8a3e" font-size="14" font-weight="bold" text-anchor="middle">4</text>

        <!-- Group 4 -->
        <rect x="0" y="100" width="140" height="25" fill="#f8f9fa" stroke="#adb5bd" />
        <text x="40" y="117" fill="#495057" font-size="11" text-anchor="middle">90 ~ 100미만</text>
        <text x="110" y="117" fill="#495057" font-size="12" font-weight="bold" text-anchor="middle">2</text>
    </g>

    <!-- Arrow to Histogram -->
    <path d="M 400 90 L 440 90" fill="none" stroke="#228be6" stroke-width="4" marker-end="url(#arrow-blue)" />
    <rect x="400" y="100" width="40" height="15" fill="#e7f5ff" rx="2" />
    <text x="420" y="111" fill="#1864ab" font-size="8" font-weight="bold" text-anchor="middle">UI 시각화</text>

    <!-- Histogram -->
    <g transform="translate(460, 60)">
        <rect x="-10" y="-10" width="120" height="135" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="50" y="10" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">히스토그램</text>

        <!-- Y axis -->
        <line x1="10" y1="105" x2="10" y2="20" stroke="#495057" />
        <!-- X axis -->
        <line x1="10" y1="105" x2="100" y2="105" stroke="#495057" />

        <!-- Bars (No gaps) -->
        <rect x="10" y="85" width="20" height="20" fill="#a5d8ff" stroke="#339af0" /> <!-- 1 -->
        <rect x="30" y="45" width="20" height="60" fill="#ffa8a8" stroke="#fa5252" /> <!-- 3 -->
        <rect x="50" y="25" width="20" height="80" fill="#b2f2bb" stroke="#2b8a3e" /> <!-- 4 -->
        <rect x="70" y="65" width="20" height="40" fill="#a5d8ff" stroke="#339af0" /> <!-- 2 -->

        <!-- X labels -->
        <text x="10" y="115" fill="#495057" font-size="8">60</text>
        <text x="50" y="115" fill="#495057" font-size="8">80</text>
        <text x="90" y="115" fill="#495057" font-size="8">100</text>
    </g>

    <defs>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#228be6" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#fa5252" />
        </marker>
    </defs>
</svg>