<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#c92a2a" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">네 번째 통계 보스: '여러 가지 그래프(Graphs)를 활용한 속임수'</text>

    <!-- Left: Pie Chart (비율 중심) -->
    <g transform="translate(150, 130)">
        <rect x="-100" y="-80" width="200" height="180" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="0" y="-60" fill="#e8590c" font-size="12" font-weight="bold" text-anchor="middle">"원그래프" (비율 은폐)</text>

        <!-- Pie chart circle -->
        <path d="M 0 -30 A 50 50 0 1 0 50 20 L 0 20 Z" fill="#ffec99" stroke="#fcc419" stroke-width="2" />
        <path d="M 50 20 A 50 50 0 0 0 0 -30 L 0 20 Z" fill="#ffd8a8" stroke="#ff922b" stroke-width="2" />

        <text x="-15" y="10" fill="#e67700" font-size="14" font-weight="bold" text-anchor="middle">75%</text>
        <text x="25" y="-5" fill="#d9480f" font-size="11" font-weight="bold" text-anchor="middle">25%</text>

        <!-- Trick text -->
        <path d="M 50 40 L 80 60" fill="none" stroke="#fa5252" stroke-width="2" marker-end="url(#arrow-red)" />
        <text x="90" y="70" fill="#fa5252" font-size="10" font-weight="bold" text-anchor="start">절대량(명수)은 모름!</text>
        <text x="90" y="85" fill="#495057" font-size="9" text-anchor="start">비율만 보여주는 렌더링</text>
    </g>

    <!-- Right: Line Graph (추이 중심) -->
    <g transform="translate(450, 130)">
        <rect x="-100" y="-80" width="200" height="180" fill="#fff" stroke="#adb5bd" rx="5" />
        <text x="0" y="-60" fill="#1864ab" font-size="12" font-weight="bold" text-anchor="middle">"꺾은선 그래프" (과장
            스킬)</text>

        <!-- Axis -->
        <line x1="-70" y1="40" x2="80" y2="40" stroke="#495057" stroke-width="2" />
        <line x1="-70" y1="40" x2="-70" y2="-40" stroke="#495057" stroke-width="2" />

        <!-- Line -->
        <path d="M -60 30 L -20 20 L 20 0 L 60 -30" fill="none" stroke="#228be6" stroke-width="3" />
        <circle cx="-60" cy="30" r="4" fill="#1864ab" />
        <circle cx="-20" cy="20" r="4" fill="#1864ab" />
        <circle cx="20" cy="0" r="4" fill="#1864ab" />
        <circle cx="60" cy="-30" r="4" fill="#1864ab" />

        <!-- Trick Break Line -->
        <path d="M -75 25 Q -70 20, -65 25 T -55 25" fill="none" stroke="#fa5252" stroke-width="3" />
        <text x="-75" y="15" fill="#fa5252" font-size="10" font-weight="bold" text-anchor="end">물결선!</text>

        <!-- Trick text -->
        <path d="M -40 -30 L -10 -10" fill="none" stroke="#fa5252" stroke-width="2" marker-end="url(#arrow-red)" />
        <text x="-50" y="-40" fill="#fa5252" font-size="10" font-weight="bold" text-anchor="start">격자 1칸을 엄청</text>
        <text x="-50" y="-25" fill="#fa5252" font-size="10" font-weight="bold" text-anchor="start">크게 보임 (사기!)</text>
    </g>

    <defs>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#fa5252" />
        </marker>
    </defs>
</svg>