<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
    <rect width="600" height="250" fill="#f8f9fa" rx="10" />

    <text x="300" y="30" fill="#e8590c" font-size="20" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">두 번째 통계 보스: '자료의 분류 (Data Classification)'</text>

    <!-- Raw Data Dump -->
    <g transform="translate(50, 90)">
        <rect x="0" y="0" width="100" height="90" fill="#fff" stroke="#adb5bd" stroke-width="2" rx="5" />
        <text x="50" y="20" fill="#495057" font-size="12" font-weight="bold" text-anchor="middle">원시 데이터</text>
        <text x="50" y="40" fill="#495057" font-size="16" text-anchor="middle">🍎 🍏 🍌</text>
        <text x="50" y="60" fill="#495057" font-size="16" text-anchor="middle">🍆 🍎 🥕</text>
        <text x="50" y="80" fill="#495057" font-size="16" text-anchor="middle">🍌 🥦 🍏</text>
    </g>

    <!-- Criteria 1 (Color) -->
    <path d="M 160 110 L 220 70" fill="none" stroke="#fa5252" stroke-width="3" stroke-dasharray="4,2"
        marker-end="url(#arrow-red)" />
    <rect x="180" y="65" width="40" height="20" fill="#fff0f6" rx="3" />
    <text x="200" y="79" fill="#e03131" font-size="10" font-weight="bold" text-anchor="middle">By 색상</text>

    <g transform="translate(250, 40)">
        <rect x="0" y="0" width="120" height="60" fill="#ffe3e3" stroke="#fa5252" stroke-width="2" rx="4" />
        <text x="60" y="20" fill="#c92a2a" font-size="12" font-weight="bold" text-anchor="middle">빨간색 필터망</text>
        <text x="60" y="45" font-size="16" text-anchor="middle">🍎 🍎</text>
    </g>

    <!-- Criteria 2 (Fruit vs Veggie) -->
    <path d="M 160 150 L 220 180" fill="none" stroke="#2b8a3e" stroke-width="3" stroke-dasharray="4,2"
        marker-end="url(#arrow-green)" />
    <rect x="180" y="155" width="40" height="20" fill="#ebfbee" rx="3" />
    <text x="200" y="169" fill="#2b8a3e" font-size="10" font-weight="bold" text-anchor="middle">By 종류</text>

    <g transform="translate(250, 150)">
        <rect x="0" y="0" width="120" height="60" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2" rx="4" />
        <text x="60" y="20" fill="#2b8a3e" font-size="12" font-weight="bold" text-anchor="middle">채소(Veggie) 필터망</text>
        <text x="60" y="45" font-size="16" text-anchor="middle">🍆 🥕 🥦</text>
    </g>

    <!-- Pointing arrow -->
    <path d="M 400 120 L 460 120" fill="none" stroke="#adb5bd" stroke-width="4" marker-end="url(#arrow)" />

    <g transform="translate(480, 90)">
        <circle cx="40" cy="40" r="40" fill="#fff4e6" stroke="#f59f00" stroke-width="3" />
        <text x="40" y="30" fill="#d9480f" font-size="12" font-weight="bold" text-anchor="middle">분류 기준</text>
        <text x="40" y="45" fill="#d9480f" font-size="12" font-weight="bold" text-anchor="middle">(Criteria)</text>
        <text x="40" y="60" fill="#d9480f" font-size="10" text-anchor="middle">에 따라 결과가 다름</text>
    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#fa5252" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b8a3e" />
        </marker>
    </defs>
</svg>